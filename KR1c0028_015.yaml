body:
  text: 詩傳通釋卷十五元劉瑾撰詩朱子集傳都人士之什二之八彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望叶音亡賦也都王都也黃黃狐裘色也孔氏曰狐之黃者多不改有常也章文章也周鎬京也亂離之後人不復見昔日都邑之盛人物儀容之美而作此詩以歎惜之也輔氏曰容則德之符也言則德之發也容言如是則其德可知故為萬民所仰望也或曰先生以此時為亂離之後所作如此則東遷之後詩也曰厲王流死于彘之後都邑豈能如舊哉何必束遷之後乎故先生但以周為鎬京也彼都人士臺笠緇撮七活反叶相悅反彼君子女綢直留反直如髮叶方月反我不見兮我心不說音悅賦也臺夫扶須也陸璣曰莎草也可以為簑笠緇撮緇布冠也其制小僅可撮其髻也孔氏曰緇布冠制小故言撮若是帛為𤣥冠則有制度不得言撮王介甫曰臺笠緇撮在野與衆皆作之服女都人貴家之女也綢直如髮未詳其義然以四章五章推之亦言其髮之美耳彼都人士充耳琇音秀實彼君子女謂之尹吉我不見兮我心苑於粉反結叶繳質反賦也琇美石也以美石為瑱尹吉未詳鄭氏曰吉讀為姞其入聲尹氏姞氏周之昏姻舊姓也人見都人之女咸謂尹氏姞氏之女言其有禮法也孔氏曰常武曰王謂尹氏春秋昭公十三年尹氏立王子朝世為公卿周之舊族也韓奕云為韓姑相攸言汾王之甥左傳鄭石癸曰姞吉人也后稷之元妃也是姞與周室為昏姻也世貴舊姓昏連王室故見都人之女有禮法者謂之尹吉也李氏曰所謂尹吉猶晉言王謝唐言崔盧也愚按晉之江左王謝唐之山東崔盧皆一時之望族為世所稱也苑猶屈也積也彼都人士垂帶而厲叶落蓋反彼君子女卷音權髮如蠆仞邁反我不見兮言從之邁賦也厲垂帶之貌孔氏曰禮大帶垂三尺卷髮鬢傍短髮不可斂者曲上卷然以為飾也蠆螫釋蟲也尾末揵乾然似髮之曲上者釋文曰揵舉也長尾為蠆短尾為蠍邁行也蓋曰是不可得見也得見則我從之邁矣思之甚也匪伊垂之帶則有餘匪伊卷之髮則有旟我不見兮云何盱喜俱反矣賦也旟揚也盱望也說見何人斯篇此言士之帶非故垂之也帶自有餘耳女之髮非故卷之也髮自有旟耳言其自然閒美不假修飾也然不可得而見矣則如何而不望之乎都人士五章章六句序周人刺衣服無常也古者長民衣服不二從容有常以齊其民則民德歸一傷今不復見古人也此序蓋用緇衣之誤終朝采緑不盈一掬弓六反豫髮曲局薄言歸沐賦也自旦及食時為終朝緑王芻也爾雅注葉蓐也今呼鴟腳莎兩手曰掬局卷權也猶言首如飛蓬也謝疊山曰婦人夫不在不事容飾故伯兮曰自伯之東首如飛蓬婦人思其君子而言終朝采緑而不盈一掬者思念之深不專於事也埤雅曰藍緑皆易得之物今以憂思二之故雖終朝采掇而不盡一掬一䄡也又念其髮之曲局於是舍之而歸沐以待其君子之還也輔氏曰薄言歸沐恐君子之或歸也好飾者婦人之性終朝采藍盧談反不盈一䄡尺占反叶都甘反五日為期六日不詹音占叶多甘反賦也藍染草也濮氏曰藍可以為靛染青以之靛音奠衣蔽前謂之䄡即蔽膝也詹與瞻同五日為期去時之約也六日不詹過期而不見也劉執中曰既踰於期猶未瞻見也六日不詹未久也尚且望而憂之又况於遲久而弗歸耶之子于狩尺救反言韔敕亮反其弓叶姑𢎞反之子于釣言綸之繩賦也之子謂其君子也理絲曰綸言君子若歸而欲往狩耶我則為之韔其弓欲往釣耶我則為之綸其繩望之切思之深欲無往而不與之俱也丘氏曰今逺行從役久而不歸思其如此而不可得也輔氏曰㑏而韔弓釣而綸繩本非婦人之事望之切思之深設言其如此以見其欲無往而不與之俱是雖夫婦之正情然使其形於言焉則怨曠甚矣其釣維何維魴音房及鱮音叙叶音湑維魴及鱮薄言觀者叶掌與反賦也於其釣而有獲也又將從而觀之亦上章之意也輔氏曰此章承上章末句而言亦喜幸之詞也采緑四章章四句序刺怨曠也幽王之時多怨曠者也此詩怨曠者所自作非人刺之亦非怨曠者有所刺於上也芃芃蒲東反黍苖隂雨膏古報反之悠悠南行召伯勞力報反之興也芃芃長上聲大貌悠悠逺行之意宣王封申伯於謝命召穆公往營城邑故將徒役南行而行者作此言芃芃黍苖則唯隂雨能膏之悠悠南行則唯召伯能勞之也我任音壬我輦力展反我車我牛叶魚其反我行既集蓋云歸哉叶將黎反賦也任負任者也孔氏曰謂器物人所負持輦人挽晚車也周禮鄉師注曰輦車人挽行所以載任器也止以為蕃營輦一斧一斤一鑿一梩一鋤周加二販二築以十五人而輦愚按我任我輦載任器於輦車也牛所以駕大車也愚按我車我牛駕牛於重載之車也集成也營謝之役既成而歸也王介甫曰此章見召伯之遇役矢如此我徒我御我師我旅我行既集蓋云歸處賦也徒步行者御乘車者五百人為旅五旅為師春秋傳曰君行師從卿行旅從孔氏曰旅屬於師徒行御車乃是師旅之人别而言之厯數以類上章也王介甫曰此章見召伯之遇征夫如此肅肅謝功召伯營之烈烈征師召伯成之賦也肅肅嚴正之貌謝邑名申伯所封國也今在鄧州信陽軍愚按今河南省有鄧州及信陽州是也功工役之事也營治也烈烈威武貌征行也輔氏曰言其師旅之所以得如是烈烈然威武者皆召伯有以成之也然則兵豈能自為强弱哉顧上之人所以御之者如何耳原隰既平泉流既清召伯有成王心則寧賦也土治曰平水治曰清言召伯營謝邑相其原隰之宜通其水泉之利謝疊山曰疆其土田事畢則原隰平矣治其溝洫事畢則泉流清矣此功既成宣王之心則安也吕東萊曰中伯之體勢不重則無以以鎮定南服召穆公身為卿士豈得辭其憂責哉宣王雖深居九重宵旰之慮固未嘗一日忘之也必待召公告厥成功而王心始寧焉此真知職分者也黍苖五章章四句此宣王時詩與大雅嵩髙相表裏序刺幽王也不能膏潤天下卿士不能行召伯之職焉此宣王時美召穆公之詩非刺幽王也隰桑有阿其葉有難乃多反既見君子其樂音洛下同如何興也隰下濕之處宜桑者也孔氏曰桑宜在濕潤之所隰之近畔宜桑阿美貌難盛貌皆言枝葉條垂之狀此喜見君子之詩言隰桑有阿則其葉有難矣既見君子則其樂如何哉詞意大概與菁莪相類然所謂君子則不知其何所指矣或曰比也下章放此愚按所謂下章者指二章三章也所謂比者蓋以隰桑枝葉顔色之美比君子容貌威儀之盛亦與菁莪比意相類隰桑有阿其葉有沃烏酷反叶鬱縳反既見君子云何不樂興也沃光澤貌劉執中曰光潤如膏之沃也隰桑有阿其葉有幽叶于交反既見君子德音孔膠音交興也幽黑色也膠固也心乎愛叶許既反矣遐不謂矣中心藏之何日忘之賦也遐與何同表記作瑕鄭氏注曰瑕之言胡也謂猶告也言我中心誠愛君子而既見之則何不遂以告之而但中心藏之將使何日而忘之邪丘氏曰詩人自道其愛賢之意如此王介甫曰所謂盛德至善不能忘也楚辭所謂思公子兮未敢言意蓋如此九歌注曰思之而本敢言懼其瀆也愛之根於中者深故發之遲而存之久也隰桑四章章四句序刺幽王也小人在位君子在野思見君子盡心以事之此亦非刺詩疑與上篇皆脫簡在此也白華音花菅音姦兮白茅束兮之子之逺俾我獨兮比也白華野菅也已漚為菅孔氏曰漚之柔韌異其名謂之為菅因謂在野未漚者為野菅耳之子斥幽王也俾使也我申后自我也幽王娶申女以為后又得褒姒而黜申后故申后作此詩言白華為菅則白茅為束二物至微猶必相須為用何之子之遠而俾我獨耶讀詩之法且如此章蓋言白華與茅尚能相依而我與子乃相去之逺何哉英英白雲露彼菅茅叶莫侯反天步艱難之子不猶比也英英輕明之貌白雲水上輕清之氣當夜而上騰者也露即其散而下降者也陳少南曰雲為質而露為澤步行也天步猶言時運也猶圖也或曰猶如也言雲之澤物無微不被今時運艱難而之子不圖不如白雲之露菅茅也張子曰英英白雲且均露及菅茅何天步艱難而之子不若是乎謝疊山曰豈天運當艱難國家將亡幽王之心所以不能如天之公溥乎滮符彪反池北流浸彼稻田叶他因反嘯歌傷懷念彼碩人比也滮流貌北流豐鎬之間水多北流碩人尊大之稱亦謂幽王也言小水微流尚能浸灌王之尊大而不能通其寵澤所以使我嘯歌傷懷而念之也謝疊山曰嘯歌傷懷所謂長歌之哀過於慟哭也樵徂焦反彼桑薪卬五綱反烘火東反于煁市林反維彼碩人實勞我心比也樵采也桑薪薪之善者也卬我烘燎也煁無釡之竈可燎而不可烹飪者也孔氏曰無釡之竈其上燃火謂之烘本為此竈止以燃火照物若今火爐也桑薪宜以烹飪而但為燎燭以比嫡后之尊而反見卑賤也歐陽子曰此棄妻自傷失職也鼓鐘于宫聲聞音問于外念子懆懆七到又視我邁邁比也懆懆憂貌邁邁不顧也鼓鐘于宫則聲聞于外矣念子懆懆而反視我邁邁何哉程子曰此章自傷其誠意之不能動王也懆懆然憂戚而曾不能感動視我邁邁而去有鶖音秋在梁有鶴在林維彼碩人實勞我心比也鶖秃鶖也埤雅曰一名扶老狀如鶴而大長頸赤目頭髙八尺梁魚梁也蘇氏曰鶖鶴皆以魚為食然鶴之於鶖清濁則有問矣今鶖在梁而鶴在林鶖則飽而鶴則饑矣幽王進褒姒而黜申后譬之飬鶖而棄鶴也鴛鴦在梁戢其左翼之子無良二三其德比也戢其左翼言不失其常也愚按戢其左翼以相依于內舒其右翼以防患于外此禽鳥匹耦並棲之常也良善也二三其德則鴛鴦之不如矣王介甫曰鴛鴦能好其匹雄雌相從不失其性也幽王無良不一其德鴛鴦之不如也謝疊山曰鴛鴦不失其匹耦幽王乃喪其良心嬖妾廢后有愧于鴛鴦矣衛詩云士也罔極二三其德亦刺夫婦之相棄背也與此意合有扁步興反斯石履之卑兮之子之逺俾我疷都禮反叶裔移反兮比也扁卑貌俾使疧病也有扁然而卑之石則履之者亦卑矣如妾之賤則寵之者亦賤矣愚按夫之有婦所以相配故寵賤者以配已則已亦賤矣程子嘗論娶孀婦而曰娶失節者以配身是己失節亦此章之意也是以之子之逺而俾我疧也白華八章章四句輔氏曰一章則言夫婦之常理二章則言時運之使然三章始言其體尊勢大而反不如小水之尚能溉物四章然後自歎其以嫡后之尊而反見卑賤其言亦可謂有序矣五章又疑已雖念王而王不顧已何哉六章始以鶖比褒姒而歎王之舉措取舍之非宜七章則遂言王之二三其德曾不若鴛鴦之有常八章方極其意而謂王不自愛重寵嬖賤妾以輕賤其身所以使我憂之而成病其言有序而不亂其怨有則而不流即其言以觀其人則申后其亦賢矣哉李迂仲曰此詩大抵與緑衣相類彼専以緑衣取譬此則多譬喻體雖不同而發明嫡妾之分則一也愚按此詩章多而句少八章皆為比體一章以一事為喻反覆諷詠以泄其情而猶不能絶念於王可謂怨而不怒者矣一詩之中首以之子稱王斥之也繼稱碩人尊之也繼而稱子親之也繼又稱碩人又稱之子怨者之詞固有不暇整也序周人刺幽后也幽王取申女以為后又得褒姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治周人為之作是詩也此事有据序蓋得之但幽后字誤當為申后刺幽王也下國化之以下皆衍說耳又漢書注引此序幽字下有王廢申三字雖非詩意然亦可補序文之缺綿蠻黃鳥止于丘阿道之云遠我勞如何飲於鴆反之食音嗣之誨之命彼後車謂之載之比也綿蠻鳥聲阿曲阿也孔氏曰卷阿云有卷者阿知丘阿是丘之曲中也後車副車也此微賤勞苦而思有所託者為鳥言以自比也蓋曰綿蠻之黃鳥自言止于丘阿而不能前蓋道逺而勞甚矣當是時也有能飲之食之教之誨之又命後車以載之者乎綿蠻黃鳥止于丘隅豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之比也隅角丘隅岑蔚之處憚畏也趨疾行也綿蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之比也側傍極至也國語云齊朝駕則夕極于魯國綿蠻三章章八句序微臣刺亂也大臣不用仁心遺忘微賤不肯飲食教載之故作是詩也此詩未有刺大臣之意蓋方道其心之所欲耳若如序者之言則褊狹之甚無復溫柔敦厚之意幡幡孚煩反瓠葉采之亨叶鋪郎反之君子有酒酌言嘗之賦也幡幡瓠葉貌此亦燕飲之詩言幡幡瓠葉采之亨之至薄也李迂仲曰瓠葉新生可以為葅然君子有酒則亦以是酌而嘗之蓋述王人之謙詞言物雖薄而必與賔客共之也有兔他故反斯首炮白交反之燔音煩叶汾乾反之君子有酒酌言獻叶虛言反之賦也有兔斯首一兔也猶數魚以尾也毛曰炮加火曰燔亦薄物也獻獻之於賔也謝疊山曰瓠葉以為葅不必嘉蔬一兔以為殽不必異膳先王之燕賔客真德實意而已矣有兔斯首燔之炙音隻叶陟略反之君子有酒酌言酢才洛反之賦也炕抗火曰炙謂以物貫之而舉于火上以炙之酢報也賔既卒爵而酌主人也有免斯首燔之炮叶蒲侯反之君子有酒酌言酬市周反之賦也酬導飲也主人酌以獻賔曰獻賔酢主人主人又自飲而復飲賔曰酬其主人又自飲者是導賔使飲也但賔受之而不飲奠于席前胡庭芳曰主人既飲酢爵欲以酬賔又酌而先自飲以道之然後復酌而進于賔故謂之酬瓠葉四章章四句陳夀翁曰燕飲之禮在誠不在物此聊舉一二以見其微薄謙詞耳燕飲之詩有盛言其豐者魚麗是也有謙言其薄者此詩是也序大夫刺幽王也上棄禮而不能行雖有牲牢饔餼不肯用也故思古之人不以微薄廢禮焉序說非是漸漸並士銜反下同之石維其高矣山川悠逺維其勞矣武人東征不遑朝叶直髙反矣賦也漸漸髙峻之貌武人將帥也遑暇也言無朝旦之暇也將帥出征經厯險逺不堪勞苦而作此詩也歐陽子曰漸漸髙石悠逺山川序其所經歷險阻逺道之勞耳漸漸之石維其卒在律反矣山川悠逺曷其沒叶蒲筆反矣武人東征不遑出矣賦也卒崔嵬也謂山顛之末也曷何沒盡也言所登厯何時而可盡也不遑出謂但知深入不暇謀出也有豕白蹢音的丞涉波矣月離于畢俾滂普郎反沱徒河反矣武人東征不遑他湯河反矣賦也蹢蹄蒸衆也離月所宿也畢星名豕涉波月離畢將雨之驗也埤雅曰馬喜風豕喜雨故天將雨則豕進涉水波也畢是漉魚底義韠漉魚則其汁水淋漓而下若雨然畢星名義蓋取此今畢星上有一柄下開兩義形亦類畢故月宿之則雨胡庭芳曰畢星好雨月水之精離畢而雨星象相感如此張子曰豕之負塗曳泥其常性也今其足皆白衆與涉波而去水患之多可知矣此言久役又逢大雨甚勞苦而不暇及他事也歐陽子曰履險遇雨征行所尤苦故以為言漸漸之石三章章六句輔氏曰不遑朝矣猶可言也至於不遑出不遑他則其情危而可哀甚矣古采薇出車之詩作時豈容有此事哉世之治也同未嘗無征伐之師也然行者之勞未嘗自言而上之人則汲汲然以言其勞之可念世之亂也上之人未嘗念其勞而言之也而行者則自言其勞苦而不置焉夫使勞者自言而上之人不加恤焉則鳥在其為民之父母也序下國刺幽王也戎狄叛之荆舒不至乃命將率東征役久病於外故作是詩也序得詩意但不知果為何時耳苕音條之華音花藝音云其黃矣心之憂矣維其傷矣比也苕陵苕也本草云即今之紫葳蔓生附於喬木之上其華黃赤色亦名凌霄本草注曰紫葳一名陵苔蔓生依大木嵗夕廷引至巔有花其花夏乃盛愚按藝者黃之盛也詩人自以身逢周室之衰如苕附物而上雖榮不久故以為比而自言其心之憂傷也苕之華其葉青青子零反知我如此不如無生叶桑經反比也青青盛貌然亦何能久哉牂子桑反羊墳扶云反首三星在罶音栁人可以食鮮息淺反可以飽叶蒲苟反賦也牂羊牝羊也墳大也羊瘠則首大也莆川鄭氏曰牝羊本首小今也羸瘰反首大而身小罶笱也罶中無魚而水靜但見三星之光而已言饑饉之餘百物雕耗如此苟且得食足矣豈可望其飽哉苕之華三章章四句陳氏曰此詩其詞簡其情哀周室將亡不可救矣詩人傷之而已序大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也何草不黃何日不行叶户郎反何人不將經營四方興也草衰則黃將亦行也周室將亡征役不息行者苦之故作此詩言何草而不黃何日而不行何人而不將以經營於四方也哉何草不𤣥叶胡勻反何人不矜古頑反韓詩作鰥叶居陵反哀我征夫獨為匪民興也𤣥赤黑色也既黃而𤣥也無妻曰矜言從役過時而不得歸失其室家之樂也哀我征夫豈獨為非民哉謝疊山曰東山采薇出車杕杜諸詩序情閔勞皆以室家之望者為說同為天民血氣嗜欲豈有異哉先王以民待民幽王之待民如犬馬耳故曰哀我征夫獨為匪民匪兕徐履反匪虎率彼曠野叶上與反哀我征夫朝夕不暇叶後五反賦也率循曠空也言征夫非兕非虎何為使之循曠野而朝夕不得閒暇也有芃薄工反者狐與車叶率彼幽草有棧士板反之車行彼周道興也芃尾長貌棧車役車也周道大道也言不得休息也何草不黃四章章四句輔氏曰苕之華言國家之衰微時物之凋耗人民不聊其生天運窮矣何草不黃言士民役使之繁數征行之勞苦上之人視之與禽獸無異人事極矣周室至是無可為矣此黍離之所以降為國風也序下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也李迂仲曰文王之民無不得其所矣而猶視之如傷此周之所以興也幽王之民愁苦甚矣而幽王曾不之恤視民如禽獸此周之所以亡也興亡之鑒豈逺乎哉都人士之什十篇四十三章二百句詩傳通釋卷十五
