body:
  text: 詩傳通釋卷十二元劉瑾撰詩朱子集傳小旻之什二之五旻天疾威敷于下土謀猶回遹音聿何日斯沮在吕反謀臧不從不臧覆用叶于封反我視謀猶亦孔之邛其凶反賦也旻幽逺之意敷布猶謀回邪遹僻沮止臧善覆反邛病也大夫以王惑於邪謀不能斷以從善而作此詩言旻天之疾威布于下土使王之謀猶邪僻無日而止愚按此章稠天之意猶可見君臣隱韓之義天人合一之理謀之善者則不從而其不善者反用之故我視其謀猶亦甚病也輔氏曰昏亂之世君臣上下謀猶邪僻無有沮止之者故無所歸咎而歸之天也夫為國者固不可以無謀猶也然觀其於謀之善者則不從其不善者也則反用之則我已甚病矣不待其謀之敗而禍之來潝潝許急反訿訿音紫亦孔之哀叶於希反謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底之履反叶都黎反賦也潝潝相和也訿訿相詆也具俱底至也言小人同而不和其慮深矣前漢劉向曰言衆小在位而從邪議歙歙相是而背君子然於謀之善者則違之其不善者則從之亦何能有所定乎我龜既厭不我告猶叶于救反謀夫孔多是用不集韓詩作就叶疾救反發言盈庭誰敢執其咎叶巨又反如匪行邁謀是用不得于道叶徒侯反賦也集成也卜筮數則瀆而龜厭之故不復告其所圖之吉凶謀夫衆則是非相奪而莫適所從故所謀終亦不成蓋發言盈庭各是其是無肻任其責而決之者輔氏曰洪範曰謀及卜筮夫謀貴乎博故謀及卿士謀及庶民今乃以謀夫孔多是用不集者蓋彼之所謂謀不過盡衆人之情而主之者則一人而已而此之所謂謀夫則是各主其謀故是非相奪莫知適從所以其謀終亦無所成就也發言盈庭誰敢執其咎此亂世為謀之常態上無聽言之明則人人得以肆其説而已亦終莫能決其是非故無肯任其成敗之責者猶不行不邁而坐謀所適謀之雖審而亦何得於道路哉孔氏曰謀而不行則於道不進言而無決則於事不成哀哉為猶匪先民是程匪大猶是經維邇言是聽叶平聲維邇言是爭叶側陘反如彼築室于道謀是用不潰于成賦也先民古之聖賢也孔氏曰民者人之大名其實是聖賢也程法猶道愚按詩中猷猶字通用故前章猶訓謀此訓道而徽猷與秩秋大猷又皆作猷亦訓道經常潰遂也言哀哉今之為謀不以先民為法不以大道為常其所聽而爭者皆淺末之言以是相持如將築室而與行道之人謀之人人得為異論其能有成也哉古語曰作舍道邊三年不成蓋出於此國雖靡止或聖或否方九反叶補美反民雖靡膴火吳反或哲或謀叶莫徒反或肅或艾音乂如彼泉流無淪胥以敗叶蒲寐反賦也止定也聖通明也膴大也多也艾與乂同治也淪陷胥相也言國論雖不定然有聖者焉有否者焉民雖不多然有哲者焉有謀者焉有肅者焉有艾者焉但王不用善則雖有善者不能自存將如泉流之不反而淪胥以至於敗矣聖哲謀肅乂即洪範五事之德豈作此詩者亦傳箕子之學也與輔氏曰子曰十室之邑必有忠信天下豈有無才之世哉故告之以國論雖未定而人民之中有聖與否者焉人民雖不多而有哲謀肅艾者焉但患王不能用之耳王不能用則雖有是五者之才皆將如泉流之不反而相與淪陷於敗故以是戒王庶其能愛護而扶持之無使至於此極也由是觀之則作是詩之大夫其心量之廣大志慮之深長學問之博洽皆可見矣觀此章及第三章則其有得於箕子之學蓋深矣愚按箕子陳洪範九疇其二為貌言視聽思之五事貌之德恭而作肅言之德從而作又視之德明而作哲聽之德聰而作謀思之德睿而作聖其次敘與此不同者彼以人事發見先後有序此則便文以叶韻耳不敢暴虎不敢馮皮冰反河人知其一莫知其他湯河反戰戰兢兢如臨深淵叶一均反如履薄冰賦也徒搏曰暴徒涉曰馮如馮几然也戰戰恐也兢兢戒也如臨深淵恐墜也如履薄冰恐陷也衆人之慮不能及逺暴虎馮河之患近而易見則知避之喪國亡家之禍隱於無形則不知以為憂也故曰戰戰兢兢如臨深淵如履薄冰懼及其禍之詞也小旻六章三章章八句三章章七句蘇氏曰小旻小宛小辨小明四詩皆以小名篇所以别其為小雅也其在小雅者謂之小故其在大雅者謂之召旻大明獨宛辨闕焉意者孔子刪之矣雖去其大而其小者猶謂之小蓋即用其舊也大夫刺幽王也宛於阮反彼鳴鳩翰胡旦反飛戾天叶鐵因反我心憂傷念昔先人明發不寐有懷二人興也宛小貌鳴鳩斑鳩也陸璣曰似鵓鳩項有繡文翰羽戾至也明發謂將旦而光明開發也二人父母也此大夫遭時之亂而兄弟相戒以免禍之詩故言彼宛然之小鳥亦翰飛而至于天矣則我心之憂傷豈能不念昔之先人哉是以明發不寐而有懷乎父母也言此以為相戒之端輔氏曰兄弟相戒以免禍則發言而首及於父母者宜也人之齊聖飲酒溫克彼昏不知一醉日富叶筆力反各敬爾儀天命不又叶夷益反賦也齊肅也聖通明也克勝也富猶甚也又復也言齊聖之人雖醉猶溫恭自持以勝所謂不為酒囷也彼昏然而不知者則一於醉而日甚矣於是言各敬謹爾之威儀天命已去將不復來不可以不恐懼也時王以酒敗德臣下化之故此兄弟相戒首以為説輔氏曰時人方化上所為昏亂於酒則此兄弟相戒而首及於此者亦宜也昏亂於酒則必自喪其威儀故相戒各自敬謹我身之威儀天命不又蓋言不可恃天命之常如此會有禍亂生也人能敬我身之威儀則能敬天矣天豈在外哉此義精矣其王介甫曰戒以各敬爾儀天命不又言各則并戒君臣也中原有菽音叔庶民采叶此禮反之螟音冥蛉音零有子蜾音果螺力果反負叶蒲美反之教誨爾子式榖似叶養里反之興也中原原中也菽大豆也螟蛉桑上小青蟲也似步屈蜾螺上蜂也似蜂而小腰取桑蟲負之於木空中七日而化為其子釋文曰蜾螺即細腰蜂中本草注曰雖名土蜂不就土為窟謂摙土作房耳細腰物無雌皆取青蟲教祝變成已子嘗拆窠而視之亦生子如半粟米太所負蟲却在子下摙音璉祝音呪式用穀善也中原有菽則庶民采之矣以興善道人皆可行也螟蛉有子則蜾螺負之以興不似者可教而似也教誨爾子則用善而似之可也善也似也終上文兩句所興而言也戒之以不惟獨善其身又當教其子使為善也輔氏曰善道人皆可行不似者可教而似同一秉彛故也兄弟相戒以免禍而上念其父母下慮及其子則其意可謂懇至矣題大計反彼脊令音零載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生叶桑經反興也題視也脊令飛則鳴行則搖載則而汝沗辱也視彼脊令則且飛而且鳴矣我既日斯邁則汝亦月斯征矣言當各務努力不可暇逸取禍恐不及相救恤也夙興夜寐各求無辱於父母而已輔氏曰以脊令之載飛載鳴興兄弟各有所進之道雖或不同然俱求無泰辱於父母可也先生嘗因人讀詩而務俠不子細戒之曰今人看文字敏底一揭開版便曉但於意味却不曽得而今便只管看時也只是恁地但百遍自是強五十遍時二百遍自是強一百遍時題彼脊令載飛載鳥我日斯邁而月斯征夙興夜寐無沗爾所生這箇看時也只是恁地但裏面意思却有説不得底解不得底意思却在説不得底意思裏而交交桑扈音户率場啄粟哀我填都田反寡宜岸宜獄握粟出卜自何能穀興也交交往來之貌桑扈竊脂也俗呼青觜肉食不食粟孔氏曰俗呼青雀喜盜脂膏食之因以名云埤雅曰桑扈有二種青質者觜曲食肉好盜脂膏素質者其趐與領皆有文章所謂率場啄粟有鶯其羽者也吕東萊曰淮南子云馬不食脂桑扈不食粟填與癲同病也岸亦獄也韓詩作犴鄉亭之繫曰犴愚按字書犴一作犴犴胡地犬也野犬所以守故謂獄為犴朝廷曰獄扈不食粟而今則率場啄粟矣病寡不宜岸獄今則宜岸宜獄矣言王不恤鰥寡喜陷之於刑辟也然不可不求所以自善之道故握持其粟出而卜之曰何自而能善乎言握粟以見其貧窶之甚輔氏曰貧窶如是而猶不忘所以自善之道然後為君子也溫溫恭人如集于木惴惴之瑞反小心如臨于谷戰戰兢兢如履薄冰賦也溫溫和柔貌如集于木恐隊墜也如臨于谷恐隕也輔氏曰哀亂之世賢人君子雖無罪猶恐懼輔氏曰溫溫恭人惴惴小心皆指他人言也戰戰兢兢則自謂也言今處亂世溫柔恭敬之人則如集于木而恐墜也惴惴小心之人則如臨于谷而恐隕也我其可不戰戰兢兢如履薄水哉小宛六章章六句此詩之詞最為明白而意極懇至説者必欲為刺王之言故其説穿鑿破碎無理尤甚今悉改定讀者詳之濮氏曰此詩兄弟相戒之辭或是其人嘗有酒德之敗序謂刺王非矣感念存沒意極懇至每誦之令人悲愴輔氏曰一章言思念父母以發相戒之端二章言時俗所習以致相戒之意三章則相戒相勉以教其子四章則欲各自努力以無遺父母之羞其意可謂懇至矣五章則又言王不恤貧困鰥寡如我之病困孤獨當今之世或不免於羅織之禍故握粟出卜以求自善之道六章又言當世賢者尚且兢畏如此况我則又當如何哉大夫刺幽王也此詩不為刺王而作但兄弟遭亂畏禍而相戒之詞耳辨薄干反彼鸒音豫斯叶先齎反歸飛提提是移反民莫不榖我獨于罹何辜于天我罪伊何心之憂矣云如之何興也辨飛拊翼貌鸒雅鳥也小而多羣腹下白江東呼為鵯匹又音卑烏斯語詞也孔氏曰猶蓼彼蕭斯菀彼栁斯提提羣飛安間之貌榖善罹憂也舊説幽王太子宜臼被廢而作此詩言辨彼鸒斯則歸飛提提矣民莫不善而我獨于憂則鸒斯之不如也何辜于天我罪伊何者怨而慕也舜號泣于旻天曰父母之不我愛於我何哉蓋如此矣輔氏曰怨者怨咎已之不得其親慕者思慕其親不能忘也問伊川謂小辨之怨與舜不同何也曰舜之怨反諸身以求其所未至小辨則自以為無罪矣此其所以不同也歟問此詩只我罪伊何一句與舜於我何哉之意同至後面君子秉心維其忍之君子不惠不舒究之分明是怨其親却與舜不同曰作小辨者自是未到得舜地位蓋亦常人之情耳只我罪伊何上面説何辜于天亦似自以為無罪相似未可與舜同日語也心之憂矣云如之何則知其無可奈何而安之之詞也踧踧徒歷反周道叶徒苟反鞠九六反為茂草叶此苟反我心憂傷惄乃歷反焉如搗丁老反叶丁口反假寐永嘆維憂用老叶魯口反心之憂矣疢丑覲反如疾首興也踧踧平易也周道大道也鞠窮惄思搗舂也不脫衣冠而寐曰假寐疢猶疾也踧踧周道則將鞠為茂草矣我心憂傷則惄焉如搗矣精神憒眊至於假寐之中而不忘永歎憂之之深是以未老而老也疢如疾首則又憂之甚矣謝疊山曰惄焉如搗深悲至痛如有物之搗其心也事關心者夢中亦長吁故曰假寐咏嘆憂愁多者年少而髮白故曰維憂用老孔氏曰疾首頭痛也輔氏曰維憂用老維憂能老人非特能老人也又能使人病故又繼之以疢如疾首頭痛最叵忍疢如疾首則其病甚矣維桑與梓叶奬里反必恭敬止靡瞻匪父靡依匪母叶滿彼反不屬音燭于毛不離于裏天之生我我辰安在叶此里反興也桑梓二木古者五畝之宅樹之墻下以遺子孫給蠶食具器用者也愚按古者一夫受五畝宅二畝半在邑二畝半在田四圍墻下植木桑以給蠶食梓以具器用然此民居之制也蓋託以起興耳瞻者尊而仰之依者親而倚之屬連也毛膚體之餘氣末屬也離麗也裏心腹也辰猶時也言桑梓父母所植尚且必加恭敬况父母至尊至親宜莫不瞻依也謝疊山曰桑梓父母所植以遺子孫見其樹則思其人思其人則愛其樹所以必恭必敬也敬其桑梓豈敢忘其父母乎然父母之不我愛豈我不屬于父母之毛乎豈我不離于父母之裏乎孔氏曰太子為父所放爾并言母者以人皆有父母之恩故連言之無所歸咎則推之於天曰豈我生時不善哉何不祥至是也謝疊山曰父母不我愛求其説而不可得於是歸之於天曰不知天生我之時我之日月星辰果在何處吉歟凶歟不可得而知也韓文公詩豫生之辰月宿南斗牛奮其角箕張其口即生辰所在也菀音鬱彼栁斯鳴蜩音條嘒嘒呼惠反有漼于罪反者淵萑音丸葦韋鬼反淠淠孚計反譬彼舟流不知所戒音戒叶居氣反心之憂矣不遑假寐興也菀茂盛貌蜩蟬也嘒嘒聲也漼深貌淠淠衆也屆至遑暇也菀彼栁斯則鳴蜩嘒嘒矣有漼者淵則萑葦淠淠矣今我獨見棄遂如舟之流于水中不知其何所至乎王介甫曰舟流者蕩漾而無所止也所謂若窮人無所歸也輔氏曰見物之大者無所不容以興今王乃不能容其子使如舟之流於水中而無所屆何哉是以憂之之深昔猶假寐而今不暇也鹿斯之奔維足伎伎其宜反雉之朝雊古豆反尚求其雌叶千西反譬彼壞胡罪反木疾用無枝心之憂矣寧莫之知興也伎伎舒貌宜疾而舒留其羣也雊雉鳴也壞傷病也寧猶何也鹿斯之奔則足伎伎然雉之朝雊亦知求其妃配匹蘇氏曰鹿走而留其羣雉鳴而求其雌物無不有思於其親者今王獨棄其子何哉今我獨見棄遂如傷病之木憔悴而無枝是以憂之而人莫之知也輔氏曰以見夫物無不顧其親者以興已獨見棄遂如病木之悴而無枝何哉其意又切於前章矣相息亮反彼投兔尚或先蘇薦反叶蘇晉反之行有死人尚或墐音覲之君子秉心維其忍之心之憂矣涕既隕音藴之興也相視投奔行道墐埋秉執隕隊也相彼被遂而投人之兔尚或有哀其窮而先脫之者道有死人尚或有哀其暴露而埋藏之者蓋皆有不忍之心焉今王信讒棄逐其子曽視投兔死人之不如則其秉心亦忍矣是以心憂而涕隕也君子信讒如或酬市由反叶市救反之君子不惠不舒究之伐木掎寄彼反叶居何反矣析薪杝敕氏反叶易何反矣舍音捨彼有罪豫之他吐賀反叶湯何反矣賦而興也酬報惠愛舒緩究察也掎倚也以物倚其巔也杝隋其理也他加也言王惟讒是聽如受酬爵得即飲之孔氏曰酬酬古字通用此喻得讒即受而行之如旅酬也曽不加惠愛舒緩而究察之夫苟舒緩而究察之則讒者之情得矣伐木者尚倚其巔析薪者尚隨其理皆不妄挫折之今乃捨彼有罪之譛人而加我以非其罪曽伐木析薪之不若也此則興也莫髙匪山叶所旃反莫浚蘇俊反匪泉君子無易夷豉反由言耳屬音燭于垣無逝我梁無發我笱我躬不閲遑恤我後賦而比也山極髙矣而或陟其巔泉極深矣而或入其底故君子不可易於其言恐耳屬于垣者有所觀望左右而生讒譛也問此四句莫是以上兩句興下兩句耶曰此只是賦蓋以為莫髙如山莫浚如泉而君子亦不可易而言亦恐有人聞之也陳少南曰王無輕發言小人之為讒者尚屬耳於垣壁間以窺伺之讒賊之生也亦伺君子之向背如何耳王於是卒以褒姒為后伯服為太子故告之曰母逝我梁母發我笱我躬不閲遑恤我後蓋比詞也王介甫曰湯逝梁發笱者太子放逐而其憂終不忘國也我躬不閲遑恤我後者無如之何自決之辭東萊吕氏曰唐德宗將廢太子而立舒王李泌諌之且曰願陛下還宫勿露此意左右聞之將樹功於舒王太子危矣此正君子無易由言耳屬于垣之謂也小辨之作太子既廢矣而猶云爾者蓋推本亂之所由生言語以為階也輔氏曰此章則總其始終言之申后之黜宜臼之逐雖主於褒姒伯服之讒意者幽王之昏暴必先嘗泄此意於言語之問故其左右得以附會而成之自古如是多矣東萊先生以為推本其亂之所由生言語以為階者是也無逝我梁以下四句則事已決後絶意之辭耳小辨八章章八句幽王娶於申生太子宜臼後得褒姒而惑之生子伯服信其讒黜申后逐宜臼而宜臼作此以自怨也序以為太子之傳述太子之情以為是詩不知其何所據也傳曰髙子曰小辨小人之詩也孟子曰何以言之曰怨曰固哉髙叟之為詩也固謂執滯不通也為猶治也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也親親之心仁之發也固矣夫髙叟之為詩也曰凱風何以不怨曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也磯水激石也不可磯言微激之而遽怒也孔子曰舜其至孝矣五十而慕言舜猶怨慕小辨之怨不為不孝也趙氏曰生之膝下一體而分喘息呼吸氣通於親當親而疏怨慕號天是以小辨之怨未足為愆也張南軒曰小辨怨慕乃所以為親親故引關弓之疏戚為喻以見其為親親者焉凱風之作則以母氏不安于室而已七子引罪自責以為使母之不安則已之故辭氣不迫蓋與小辨異也當小辨之事而怨慕不形則是漠然而不知者也當凱風之事而遽形於怨則是激於情而莫遏也此則皆失親親之義故皆以不孝斷之於是舉舜之孝以為法焉髙子徒見小辨之怨遂以為小人之詩不即其事而體其親親之心亦可謂固矣序刺幽王也太子之傅作焉此詩明白為放子之作無疑但未有以見其必為宜臼耳序又以為宜臼之傅尤不知其所據也悠悠昊天曰父母且子餘反無罪無辜亂如此憮火吳反昊天已威叶紆胃反豫慎無罪叶音悴昊天泰憮豫慎無辜賦也悠悠逺大之貌且語詞憮大也已泰皆甚也慎審也大夫傷於讒無所控告而訴之於天曰悠悠昊天為人之父母胡為使無罪之人遭亂如此其大也昊天之威已甚矣我審無罪也昊天之威甚大矣我審無辜也此自訴而求免之詞也嚴氏曰首章傷已被讒也亂之初生僣側蔭反始既涵音含亂之又生君子信讒君子如怒叶奴五反亂庶遄市專反沮慈吕反君子如祉音耻亂庶遄已賦也僣始不信之端也鄭氏曰僣不信也涵容受也君子指王也遄疾沮止也祉猶喜也言亂之所以生者由讒人以不信之言始入而王涵容不察其真偽也亂之又生者則既信其讒言而用之矣君子見讒人之言若怒而責之則亂庶幾遄沮矣見賢者之言若喜而納之則亂庶幾遄已矣今涵容不斷讒信不分是以讒者益勝而君子益病也蘇氏曰小人為讒於其君必以漸入之其始也進而嘗之君容之而不拒知言之無忌於是復進既而君信之然後亂成嚴氏曰次章言亂生於讒讒生於優柔不斷所謂懷狐疑之心者來讒賊之口持不斷之意者開羣枉之門也今忠讒不分是以邪正渾淆是非易位而亂天下也君子屢盟叶謨郎反亂是用長丁丈反叶直良反君子信盜亂是用暴盜言孔甘亂是用餤音談匪其止共音恭維王之邛其恭反賦也屢數朔也盟邦國有疑則殺牲歃霎血告神以相要腰束也周禮司盟注曰盟者書其辭於策殺牲取血坎其牲加書於上而理之有疑不協也李迂仲曰考之春秋傳如伯有之亂鄭伯與其臣下盟蓋盟者生於君臣相疑而致也盜指讒人也真氏曰讒人乘間伺隙以中君子如穿窬之盜然餤進邛病也言君子不能已亂而屢盟以相要則亂是用長矣君子不能堲即韻注曰疾也讒而信盜以為虐則亂是用暴矣讒言之美如食之甘使人嗜之而不厭則亂是用進矣李迂仲曰鼷鼠俗謂甘口鼠魯國之牛鼠食其角而不知以其口甘朝廷之冦亦鼷鼠乎觀此則孔草之言豈不為亂然此讒人不能供其職事徒以為王之病而已夫良藥苦口而利於病忠言逆耳而利於行維其言之甘而悅焉則其國豈不殆哉嚴氏曰三章言信讒致亂也愚按此上三章先刺聽讒者下三章則專刺讒人奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖七損反度音鐸之躍躍他歷反毚士咸反兔遇犬穫叶黃郭反之興而比也奕奕大也秩秩序也猷道莫定也躍躍跳疾貌毚狡也奕奕寢廟則君子作之秩秩大猷則聖人莫之以興他人有心則豫得而忖度之詩人所見極大如此章本意則是惡巧言讒譛之人却以奕奕寢廟秩秩大猷起興便見其所見極夫形於言者無非義理之極致也潘時舉對云此亦是先王之澤未泯禮儀根於其心故其形於言者自無非義理也而又以躍躍毚兔遇犬獲之比焉反覆興比以見讒人之心我皆得之不能隱其情也輔氏曰躍躍有跳梁恣肆之意讒者方且跳梁恣事以害人自謂人莫得而知已也一旦遇智者臨之則其情偽顯露冇不可得而隱者誠有似乎毚兔之躍躍而忽遇犬焉則無所逃矣嚴氏曰四章言已知讒人之情也荏而甚反染柔木君子樹叶上主反之往來行言心焉數所主反之蛇蛇以支反碩言出自口叶孔五反矣巧言如簧顔之厚叶胡五反矣興也荏染柔貌柔木桐梓之屬可用者也行言行道之言也數辨也蛇蛇安舒也碩大也謂善言也顔厚者頑不知恥也荏染柔木則君子樹之矣往來行言則心能辨之矣若善言出於口者宜也巧言如簧則豈可出於口哉言之徒可羞愧而彼顔之厚不知以為耻也孟子曰為機變之巧者無所用耻焉其斯人之謂與真氏曰憸巧之言悅可人聽如笙簧然使其也知愧則不為矣愚按五章言讒人出言無耻彼何人斯居河之麋音眉無拳音權無勇職為亂階叶居溪反既微且腫市勇反爾勇伊何為猶將多爾居徒幾音紀叶居希反何賦也何人斥讒人也此必有所指矣賤而惡之故為不知其姓名而曰何人也斯語辭水草交謂之麋李迂仲曰左氏所謂孟諸之麋是也拳力階梯也骭限瘍羊為微腫足為腫孔氏曰郭璞云骭腳脛也瘍瘡也膝脛之下有瘡腫是涉水所為猶謀將大也言此讒人居下濕之地雖無權勇可以為亂而讒口交鬬專為亂之階梯又有微腫之疾亦何能勇哉而為讒謀則大且多如此是必有助之者也然其所與居之徒衆幾何人哉言亦不能甚多也嚴氏曰末章斥讒人而賤惡之也輔氏曰東萊以為非特賤之且言其本亦易驅除特王不悟耳者是也四章五章言讒言之本不難辨讒人之本不難除也巧言六章章八句以五章巧言二字名篇刺幽王也大夫傷於讒故作是詩也彼何人斯其心孔艱叶居銀反胡逝我梁不入我門叶眉貧反伊誰云從維暴之云賦也何人亦若不知其姓名也孔甚艱險也我舊説以為蘇公也暴暴公也皆畿內諸侯也舊説暴公為卿士而譛蘇公故蘇公作詩以絶之然不欲直斥暴公故但指其從行者而言彼何人者其心甚險胡為往我之梁歐陽子曰具魚梁者古人營生之詩屢言之而不入我之門乎既而問其所從則暴公也夫以從暴公而不入我門則暴公之譛已也明矣但舊説於詩無明文可考未敢信其必然耳輔氏曰彼何人斯其心孔艱責之也而不為已甚之辭胡逝我梁不入我門疑之也而猶有望之之意伊誰云從維暴之云始明言之而其情既不得而遁然亦無怨懟之辭也可謂忠厚矣二人從行誰為此禍胡果反胡逝我梁不入唁我始者不如今云不我可賦也二人暴公與其徒也唁弔失位也言二人相從而行不知誰譛已而禍之乎既使我得罪矣而其逝我梁也又不入而唁我汝始者與我親厚之時豈嘗如今不以我為可乎彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天叶鐵因反賦也陳堂塗也堂下至門之徑也李寶之曰其北當階其南接門內霤也在我之陳則又近矣聞其聲而不見其身言其蹤迹之詭祕也不愧于人則以人為可欺也天不可欺女獨不畏于天乎奈何其譛我也輔氏曰知其逝我梁逝我陳是聞其聲而不入見我是不見其身故因其實而言之又以見蹤迹之詭祕是以人為可欺也人或可欺而天其可欺乎爾獨不畏于天而譛我如是也古人責人往往至天而極如雨無正所謂胡不相畏不畏于天亦是意也彼何人斯其為飄風叶孚愔反胡不自北胡不自南叶尼心反胡逝我梁祗音支攪交卯反我心賦也飄風暴風也攪擾亂也言其往來之疾若飄風然自北自南則與我不相值也今則逝我之梁則適所以擾亂我心而已爾之安行亦不遑舍叶商居反爾之亟紀力反行遑脂爾車一者之來云何其盱况于反賦也安徐遑暇舍息亟疾盱望也字林云盱張目也易曰盱豫悔豫六三爻本義曰盱上視也隂不中正而近于四故六三上視于四而下溺于豫宜有悔者也三都賦云盱衡而誥是也愚按左太沖魏都賦云魏國先生乃盱衡而誥曰云云注謂盱舉目大視也眉上曰衡謂舉眉揚目也言爾平時徐行猶不暇息而况亟行則何暇脂其車哉今脂其車則非亟也乃託以亟行而不入見我則非其情矣何不一來見我如何使我望爾之切乎爾還而入我心易以豉反叶以支反也還而不入否難知也一者之來俾我祗也賦也還反易説祗安也言爾之往也既不入我門矣儻還而入則我心猶庶乎其説也還而不入則爾之心我不可得而知矣何不一來見我而使我心安乎李迂仲曰亦以見讒譖之人愧不敢來也董氏曰是詩至此其詞益緩若不知其譖矣伯氏吹塤况袁反仲氏吹篪音池及爾如貫諒不我知出此三物以詛側助反爾斯叶先齎反賦也伯仲兄弟也俱為王臣則有兄弟之義矣樂器土曰塤大如鵝子鋭上平底似稱去聲錘六孔孔氏曰塤周禮小師職作塤古今字異耳注云燒土為之竹曰篪長尺四寸圍三寸七孔一孔上出徑三分凡八孔橫吹之如貫如繩之貫物也言相連屬燭也諒誠也三物犬豕雞也刺其血以詛盟也王介甫曰三物如鄭莊公令出犬難豭以詛射潁考叔者毛遂取雞狗馬之血以盟也蓋古盟詛如此孔氏曰詛小於盟左襄十一年季武子將作三軍盟諸僖閎詛諸五父之衢定六年既逐陽虎盟國人于亳社詛諸五父之衢伯氏吹塤而仲氏吹篪言其心相親愛而聲相應和也與汝如物之在貫孔氏曰與汝義如兄弟和如塤篪勢相次比如物之相貫豈誠不我知而譖我哉苟曰誠不我知則出此三物以詛之可也為鬼為蜮音域則不可得有靦土典反面目視人罔極作此好歌以極反側賦也蜮短狐也江淮水皆有之能含沙以射水中人影其人輒病而不見其形也孔氏曰蜮如龞三足陸璣云一名射影含沙射影其瘡如疥埤雅曰有長角橫在口前如弩擔臨其角端曲如上弩以氣為矢因水勢以射人俗呼水弩鵝能食之靦面見人之貌也好善也反側反覆不正直也言汝為鬼為蜮則不可得而見矣女乃人也靦然有面目與人相視無窮極之時豈其情終不可測哉是以作此好歌以究極爾反側之心也王介甫曰作此詩將以絶之而曰好歌者有欲其悔悟之心焉爾何人斯八章章六句此詩與上篇文意相似疑出一手但上篇先刺聽者此篇專責讒人耳王氏曰暴公不忠于君不義于友所謂大故也故蘇公絶之然其絶之也不斥暴公言其從行而已不著其譖也示以所疑而已既絶之矣而猶告以一者之來俾我祇也蓋君子之處已也忠其遇人也恕使其由此悔悟更以善意從我固所願也雖其不能如此我固不為已甚豈若小丈夫然哉一與人絶則醜詆固拒唯恐其復合也序蘇公刺暴公也暴公為卿士而譖蘇公焉故蘇公作是詩以絶之鄭氏曰暴蘇皆畿內國名孔氏曰左傳云蘇忿生以溫為司寇則蘇國在溫春秋時蘇稱子此云公者蓋子爵而為三公者世本云暴辛公作塤蘇成公作篪譙周古史考云古有塤篪尚矣周幽王時二公特善其事耳今按書有司冦蘇公春秋傳有蘇忿生戰國及漢時有人姓暴則固應有此二人矣但此詩中只有暴字而無公字及蘇公字不知序何所據而得此事也世本説尤紕繆譙周又從而傅會之不知適所以章其謬耳李迂仲曰世本古史考見此詩言伯氏吹塤仲氏吹篪遂為此説皆求詩之過也萋七西反兮斐孚匪反兮成是貝錦彼譛人者亦已大音泰甚食荏反比也萋斐小文之貌貝水中介蟲也有文彩似錦孔氏曰錦而連貝故知為貝之文其文彩之異小大之殊甚衆古者貨貝是也埤雅曰錦文如貝謂之貝錦貝中肉如科斗而有首尾以其背用故謂之貝貝背也時有遭讒而被宫刑為巷伯者作此詩鄭氏曰宫者割其勢若今宦者也言因萋斐之形而文致之以成貝錦以比譛人者因人之小過而飾成大罪也彼為是者亦已大甚矣哆昌者反兮侈尺是反兮成是南箕彼譛人者誰適丁歷反下同與謀叶模悲反比也哆侈微張之貌南箕四星二為踵二為舌愚按即箕星也以其常見於南方故謂南箕其踵狹而舌廣則大張矣適主也誰適與謀言其謀之閟也緝緝七立反翩翩音篇叶批賓反謀欲譛人慎爾言也謂爾不信叶斯人反賦也緝緝口舌聲或曰緝緝人之罪也或曰有條理貌皆通翩翩往來貌嚴氏曰讒人情狀接續增益緝緝然如女之績往來輕飄翩翩然如鳥之飛相與經營謀為讒譛而已譛人者自以為得意矣然不慎爾言聽者有時而悟且將以爾為不信矣捷捷幡幡芳煩反叶芬邅反謀欲譛言豈不爾受既其女音汝遷賦也捷捷儇血平聲利貌幡幡反覆貌王氏曰上好譛則固將受女然好譛不已則遇譛之禍亦既遷而及女矣輔氏曰汝能譛人人亦能譛汝其禍將遷及汝矣曽氏曰上章及此皆忠告之詞輔氏曰填爾言也謂爾不信自譛者而言也豈不爾受既其女遷自聽者而言也皆所必至之理故以之忠告於為譛者庶乎其知所畏而不敢肆耳驕人好好勞人草草蒼天蒼天叶鐵因反視彼驕人矜此勞人賦也好好樂也草草憂也驕人譛行而得意勞人遇譛而失度其狀如此胡庭芳曰王氏云蒼天蒼天蓋以王之不明無所告訴而告之于天也輔氏曰視彼驕人庶乎有以抑遏沮止之也矜此勞人庶乎有以扶持慰安之也彼譛人者叶掌與反誰適與謀叶滿補反取彼譛人投畀豺士皆反虎豺虎不食投畀有北有北不受叶承呪反投畀有昊叶計候反賦也再言彼譛人者誰適與謀者甚嫉之故重言之也或曰衍去聲文也投棄也説文曰豺狼屬狗聲北北方寒涼不毛之地也愚按窮北之地多寒不生草木五榖投棄讒人於彼使凍餓之也不食不受言讒譛之人物所其惡也昊昊天也投畀昊天使制其罪此皆設言以見欲其死亡之甚故曰好賢如緇衣惡惡如巷伯埤雅曰豺虎以殺為性則宜無所不食有北以載為德則宜無不受者今曰不食不受且付昊天使剁其罪則惡巷之甚也吕東萊曰記緇衣云好賢如緇衣惡惡如伯則爵不瀆而民願刑不試而民咸服真氏曰讒人為害至深故詩人疾之亦甚舜之治四凶也以禦魑魅而大學于不仁之人欲屏諸四夷詩人之情亦若是也楊園之道猗於綺反于畝丘叶祛奇反寺人孟子作為此詩凡百君子敬而聽之興也揚園下地也猗加也畝丘高地也寺人內小臣蓋以讒被宫而為此官也愚按周禮天官寺人之官凡五人寺之言侍也侍王於路寢而掌王之內人及女宫之戒令蓋奄人也孟子其字也楊園之道而猗于畝丘以興賤者之言或有補於君子也蓋譛始于微者而其漸將及于大臣也故作詩使聽而謹之也劉氏曰其後王后太子及大夫果多以讒廢者輔氏曰譛始于微者進而嘗之也君若受之則譛者之氣益壯而心益大末流之禍豈止及其大臣而已哉雖王后太子或有所不免故堲讒必折其芽辨于微小可也然非明且逺者不能焉董氏曰幽玉之世大臣傷于讒者如蘇公小臣傷于讒如寺人孟子則上下其得以免乎愚按劉氏此言蓋從小序以此為幽王時詩也集傳既引其説而未嘗明言其為幽王詩讀者當自得之巷伯七章四章章四句一章五句一章八句一章六句陳夀翁曰巧言何人斯巷伯三篇其述讒言之禍與讒人之情狀可謂極矣巷是宫內道名秦漢所謂永巷是也愚按三輔黃圖云永長也宫中之長巷幽閉宫女之有罪者武帝時改為掖延周宣王薑后嘗待罪永巷是也伯長也王宫內道官之長即寺人也故以名篇曹氏曰巷者內人之所居伯者長也其官為寺人而職掌永巷故稱巷伯焉班固司馬遷贊云迹其所以自傷悼小雅巷伯之倫其意亦謂巷伯本以被譛而遭刑也而楊氏曰寺人內侍之微者出入于王之左右親近于王而日見之宜無間之可伺矣今也亦傷於讒則疏逺者可知故其詩曰凡百君子敬而聽之使在位知戒也其説不同然亦有理姑存于此云序刺幽王也寺人傷于讒故作是詩也習習谷風維風及雨將恐丘勇反將懼維豫與女音汝將安將樂音洛女轉棄豫叶演女反興也習習和調貌谷風東風也將且也恐懼謂危難憂患之時也此朋友相怨之詩故言習習谷風則維風及雨矣將恐將懼則維豫與女奈何將安將樂而女轉棄豫哉習習谷風維風及頽徒雷反將恐將懼置之䜴反豫于懷叶胡隈反將安將樂棄豫如遺叶夷回反興也頽風之焚輪者也孔氏曰回風從上下曰頽置與置同置于懷親之也如遺忘去而不復存省也謝疊山曰置豫于懷是進人若將加諸膝棄豫如遺是退人若將墜諸淵習習谷風維山崔徂回反嵬五回反無草不死無木不萎叶於回反忘我大德思我小怨叶韻未詳比也崔嵬山巔也習習谷風維山崔嵬則風之所被者廣然猶無不死之草無不萎之木况於朋友豈可以忘大德而思小怨乎或曰興也輔氏曰大德謂朋友之義出于天者小怨謂懟語忿色生于人者忘大德思小怨必是當時人有如此實事故末章因風以為比而明言之以戒其不可如是也或以為興者拘于例耳然不若以為比之是也谷風三章章六句吕與叔曰急則相求緩則相棄恩厚不知怨小必記皆小人之交也序刺幽王也天下俗薄朋友道絶焉蓼蓼音六者莪五河反匪莪伊蒿呼毛反哀哀父母生我劬勞比也蓼長上聲大貌莪美菜也蒿賤草也嚴氏曰莪蘿蒿也蒿革中之高者也管子云嘉榖不生而蓬蒿蒺藜秀人民勞苦孝子不得終養而作此詩言昔謂之莪而今非莪也特蒿而已以比父母生我以為美材可賴以終其身而今乃不得其養以死于是乃言父母生我之劬勞而重自哀傷也蓼蓼者莪匪莪伊蔚音尉哀哀父母生我勞瘁似醉反比也蔚牡菣僅也三月始生七月始華如胡麻華而紫赤八月為角似小豆角鋭而長嚴氏曰一名馬薪葛蒿之尢粗大者也瘁病也瓶之罄矣維罍之恥鮮息淺反民之生不如死之久叶舉里反矣無父何怙無母何恃出則銜恤入則靡至比也瓶小罍大皆酒器也罄盡鮮寡恤憂靡無也言瓶資于罍而罍資瓶猶父母與子相依為命也故瓶罄矣乃罍之恥猶父母不得其所乃子之責愚按以瓶比父母以罍比子但取其相資之義而不取義于瓶罍之小大也如左傳昭公二十四年鄭子大叔引此而曰王室之不寧晉之恥也以瓶喻周以罍喻晉亦不取小大之義也所以窮獨之民生不如死也蓋無父則無所怙無母則無所恃是以出則中心銜恤入則如無所至也輔氏曰玩此四句真能道孝子之情非身履而親歷之不知其味也父兮生我母兮鞠我拊音撫我畜許六反我長丁丈反我育我顧我復我出入腹我欲報之德昊天罔極賦也生者本其氣也鞠畜皆養也拊拊循也劉執中曰防其驚也則拊之育覆育也孔氏曰謂其寒暑或身體嫗之覆近而愛育之顧旋視也孔氏曰謂去之而反顧也復反覆也丘氏曰不能暫捨也腹懷抱也孔氏曰謂置之於懷抱罔無極窮也言父母之恩如此謝疊山曰此章形容父母愛子之心盡之矣生我如天之生物也鞠我如地之養物也拊者撫摩其身體察其肥瘠憂其疥廯也畜者謹其出入察其起居藏之堂與之中不敢縱之門庭之外惟恐其病疾也長者如南風之長養萬物調和其身體滋養其血氯日夜望其長大育者如易曰育德孟子曰教育英才涵養其德性發舒其志氣開導其聰明日夜望其成人也顧者父母行而兒不隨則回顧之也復者兒行而父母不隨則追喚之也腹者懷抱於腹間也父母有所往將出門懷抱其子而未忍捨父母自外歸既入門懷抱其子而未宜置人能深思九字之義必不忘父母之恩矣欲報之以德而其恩之大如天無窮不知所以為報也輔氏曰此章則賦父母之恩未乃歎其如天之無窮無物可以為報之意故嘗為之説曰臣之於君其忠有盡子之于視其孝無窮南山烈烈飄風發發民莫不榖我獨何害叶音曷興也烈烈高大貌發發疾貌榖善也南山烈烈則飄風發發矣民莫不榖而我獨何為遭此害也哉嚴氏曰孝子念親之沒瞻南山之烈烈感飄風之發發觸目皆悲傷也故嘆民莫不得以養其父母我獨何為遭此害而不得終養乎南山律律飄風弗弗叶分聿反民莫不榖我獨不卒興也律律猶烈烈也弗弗猶發發也卒終也言終養也輔氏曰我獨何為而遭此害也哉我獨何為而不得終養也哉此兩句最宜玩蓋末後方及其所以不得終養之意蓼莪六章四章章四句二章章八句晉王裒以父死非罪愚按司馬昭為魏安東將軍與吳戰敗昭問於衆曰近日之事誰任其咎王裒父儀對曰責在元帥昭怒而斬之每讀詩至哀哀父母生我劬勞未嘗不三復流涕受業者為廢此篇詩之感人如此輔氏曰先生戟王裒一事以見詩之感人如此必如是然後為善讀詩也以至解頤手舞足蹈皆實介是理但患人不善讀耳陳少南曰此詩孝子行役而喪其親者之所作其詞深而切李迂仲曰凱風母不安其室之詩也小辨太子見棄之詩也蓼莪孝子不得終養之詩也故具咎責怨慕哀痛如此苟不為母所棄不為父所逐不困于行役而得終養則具歡欣可知矣觀詩者當以此類求之序刺幽王也民人勞苦孝子不得終養爾有饛音蒙簋音軌飱音孫有救音求棘匕必履反周道如砥之履反其直如矢君子所履小人所視叶善止反眷音眷言顧之潸所姦反焉出涕音體興也饛滿簋貌飱熟食也孔氏曰禮簋盛黍稷救曲貌棘匕以棘為匕所以載鼎肉而升之於俎也儀禮特性注曰匕用棘心孔氏曰雜記云匕用桑長三尺吉禮則用棘砥礪石言平也矢言直也君子在位履行小人下民也眷反顧也潸涕下貌序以為東國困于役而傷于財談大夫作此以告病孔氏曰談國在京師之東言有饛簋飱則有救棘匕周道如砥則其直如矢是以君子履之而小人視焉今乃顧之而出涕者則以東方之賦役莫不由是而西輸於周也輔氏曰周道只道路之道與下章周行一意故集解以為東方之賦役莫不由是而西輸于周是即指道路而言也然以上四句平直履視之義觀之則又似指周之王道而言豈本意只是指道路而言而其中亦含此意耶小東大東叶都郎反杼直吕反柚音逐其空叶枯郎反糾糾葛屨可以履霜佻佻徒雕反公子行彼周行叶户郎反既往既來叶直力反使我心疚叶訖力反賦也小東大東東方小大之國也自周視之則諸侯之國皆在東方杼持緯者也曹氏曰梭也柚受經者也空盡也佻輕薄不奈勞苦之貌公子諸侯之貴臣也周行大路也疚病也言東方小大之國杼柚皆已空矣至于以葛屨履霜而其貴戚之臣奔走往來不勝其勞使我心憂而病也輔氏曰糾糾葛屨可以履霜舉其甚者言之也以葛屨履霜則冬裘之不備可知矣既往既來則言其來往之不一也周道一也方其盛時君子履之而小人視焉及其哀也公子行之而人心病焉時移事變而人心所感不同如此有洌音列汍音軌泉叶才勻反無浸穫薪契契苦計反寤歎哀我憚丁佐反人薪是穫薪尚可載叶節力反也哀我憚人亦可息也興也洌寒意也側出曰汍泉穫艾也契契憂苦也憚勞也尚庶幾也載載以歸也蘇氏曰薪已穫矣而復漬之則腐民已勞矣而復事之則病故已艾則庶其載而畜之已勞則庶其息而安之輔氏曰上兩章既言傷於財故此章推本其困于役而言之耳東人之子職勞不來音貴叶六直反西人之子粲粲衣服叶蒲北反舟人之子熊羆是裘叶渠之反私人之子百僚是試叶申之反賦也東人諸侯之人也職專主也來慰撫也西人京師人也粲粲鮮盛貌舟人舟楫之人也熊羆是裘言富也私人私家皂隸之屬也僚官試用也舟人私人皆西人也此言賦役不均羣小得志也李迂仲曰此章言東人之勞西人之逸小人得志綱紀敗壞無復王室之舊也或以其酒不以其漿鞙鞙胡犬反佩璲音遂不以其長維天有漢監古暫反亦有光跂丘豉反彼織女終日七襄賦也鞙鞙長貌璲瑞也鄭氏曰佩璲者以瑞玉為佩漢天河也孔氏曰漢水之精也氣發而升精華浮上宛轉隨流名曰天河一曰雲漢跂隅貌織女星名在漢旁三星跂然如隅也七襄未詳傳曰反也箋云駕也駕謂更其肆也蓋天有十二次日月所止舍所謂肆也經星一晝一夜左旋一周而有餘則終日之間自卯至酉當更七次也孔氏曰在天為次在地為辰星之行晝夜雖各六辰數者舉其終始故七即自卯至酉也愚按日月五星為緯其餘皆為經星經星周布與天為體所謂經星一晝夜左旋一周天而有餘者即天之旋一周而又過一度者也然周天十二次一晝夜十二時則一時當歷一次故終其晝日之間白卯至酉凡七時織女星當歷七次也言東人或饋之以酒而西人曽不以為漿東人或與之以鞙然之佩而西人曽不以為長維天之有漢則庶乎其有以監我歐陽子曰言我民困矣天之雲漢有光亦能下降我民乎其不言日月之明而言雲漢之光者謂不能下監也而織女之七襄則庶乎其能成文章以報我矣無所赴訴而言惟天庶乎其恤我耳輔氏曰侯邦供王賦役固其職也然為王者當有以體恤之不敢易視而輕用之可也觀禹貢之底慎財賦無逸之惟正之供則必不至于易視而輕用之矣今也東國財力俱困而饋西人以酒則視之曽不如漿與之以鞙然之佩則視之曽不以為長易視之如此則輕用之必矣此東國之所以怨病而訴之于天也雖則七襄不成報章睆華板反彼牽牛不以服箱東有啓明叶謨郎反西有長庚叶古郎反有救天畢載施之行户郎反賦也睆明星貌牽牛星名爾雅曰何鼓謂之牽牛何胡可反服駕也箱車箱也孔氏曰兩較之間謂之箱是車內容物之處較音角啓明長庚皆金星也以其先日而出故謂之啓明以其後日而入故謂之長庚劉執中曰金星朝在東所以啓日之明夕在西所以續日之長詩考曰韓詩云晨出東方為啓明昏見西方為長庚毛氏曰庚讀也蓋金水二星常附日行而或先或後但金大水小故獨以金星為言也愚按金水附日而行無定在或一在日先一在日後或俱在日先或俱在日後金星行在日後則晨見而昏不見行在日先則昏見而晨又不見也天畢畢星也狀如掩兔之畢行行列也言彼織女不能成報我之章牽牛不可以服我之箱而啓明長庚天畢者亦無實用但施之行列而已鄭氏曰織女有織名耳駕則有西無東不如人織相反報成文章牽牛不可用於服箱啓明長庚皆有助日之名而無實光也歐陽子曰雖有織女不能為我織而成章雖有牽牛不能為我駕車而輸物雖有啓明長庚不能助日為晝俾我營作雖有天畢不能為我掩捕鳥獸至是則知天亦無若我何矣維南有箕不可以簸波我反揚維北有斗不可以挹音揖酒漿維南有箕載翕許急反其舌維北有斗西柄之揭音計賦也箕斗二星以夏秋之間見於南方愚按六七月間見於南方者指當時昏見為言也云北斗者以其在箕之北也愚按此謂南斗即上文夏秋之間見南方者也或曰北斗常見不隱者也翕引也舌下二星也南斗柄固指西若北斗而西柄則亦秋時也董氏曰箕其踵似箕且有舌斗其方如斗且有柄箕四星二為踵三為舌踵狹而舌廣故曰翕斗四星為斗三星為柄言南箕既不可以簸揚粳粃北斗既不可以挹酌酒漿李迂仲曰古人多以箕斗為虛名蓋此數星皆人間器用之物有名而無實故以為喻而箕引其舌反若有所吞噬斗西揭其柄反若有所挹取于東是天非徒無若我何乃亦若助西人而見困甚怨之詞也歐陽子曰白維天有漢以下皆述談人仰訴于天之詞其意言我談人困于供億取資于地者皆已竭矣欲取下天又不可得也末言箕斗非徒不可用箕反若有所噬斗反若冇所挹取于東是皆怨諷之詞也輔氏曰二章三章以下文意竒逸其辭雖若闊疏而意脈實相連屬作此詩者非唯怨得其正其亦老于文墨者歟大東七章章八句序刺亂也東國困於役而傷於財談大夫作是詩以告病焉談大夫未有考不知何據恐或有傳耳四月維夏叶後五反六月徂暑先祖匪人胡寧忍豫叶演女反興也徂往也四月六月亦以夏正數之建已建未之月也此亦遭亂自傷之詩言四月維夏則六月徂暑矣我先祖豈非人乎何忍使我遭此禍也無所歸咎之詞也秋日凄凄七西反百卉許貴反具腓芳菲反亂離瘼音莫矣爰家語作奚其適歸興也凄凄涼風也卉草腓病離憂瘼病奚何適之也秋日凄凄則百卉具腓矣亂離瘼矣則我將何所適歸乎哉以東萊曰秋日冬日猶云秋時冬時也李迂仲曰感興言下民困病如秋日凄凄然而百草俱病也冬日烈烈飄風發發民莫不榖我獨何害叶音曷興也烈烈猶栗烈也發發疾貌榖善也李迂仲曰天下莫不被禍乃云民莫不善者此據作詩者之言也夏則暑秋則病冬則烈言禍亂日進無時而息也輔氏曰此章亦興也而先生但連上二章為説云夏則暑秋則病冬則烈言禍亂日進無時而息如此説則却似賦體其不解所以為興者蓋此章之説已見于蓼莪篇矣彭氏曰天地之運隨時變遷四時之景本無美惡惟夫歡樂者遇之則為美景憂愁者觸之則為惡况今四月之大夫夏則苦徂暑之薰灼秋則悲百卉之雕瘁冬則傷飄風之迅急是皆遇景生悲觸緒增感其心無一時得以自寬焉吟咏其詞可見當時之亂矣范氏曰言夏秋冬獨不及春蓋天氣和暢萬物發育治之象也自古治世少亂世多觀四時可知矣山有嘉卉侯栗侯梅叶莫悲反廢為殘賊莫知其尤叶于其反興也嘉善侯維廢變尤過也山冇嘉卉則維栗與梅矣錢氏曰卉草也通言之則草木皆卉也在位者變為殘賊則誰之過哉相息亮反彼泉水載清載濁叶殊玉反我日構禍曷云能榖興也相視載則構合也相彼泉水猶有時而清有時而濁而我乃日日遭害則曷云能善乎滔滔吐刀反江漢南國之紀盡瘁以仕寧莫我有叶羽已反興也滔滔大水貌江漢二水名紀綱紀也謂經帶包絡之也瘁病也有識有也滔滔江漢猶為南國之紀今也盡瘁以仕而王何其不我有哉匪鶉徒丸反匪鳶以專反叶以旬反翰飛戾天叶鐵因反匪鱣張連反匪鮪于軌反潛逃于淵叶一均反賦也輔氏曰此章本亦興體但有所䚰之物而無所興之辭故不可謂之興又有四箇匪字故亦不可謂之比而只得以為賦也鶉雕也鳶亦鷙鳥也其飛上薄雲漢鱣鮪大魚也鶉鳶則能翰飛戾天鱣鮪則能潛逃于淵我非是四者則亦無所逃矣陳少南曰言雖欲髙飛深藏而不可得也山有蕨薇隰有杞桋音夷君子作歌維以告哀叶於希反興也杞枸苟檵計也本草曰枸杞一名地骨春夏採葉秋採莖實冬採拫皆可食桋赤棟色也樹葉細而岐鋭皮理錯戾好叢生山中中為車輞山則有蕨薇隰則有杞桋君子作歌則維以告哀而已輔氏曰維以告哀而已無他事也則其情切矣四月八章章四句序大夫刺幽王也在位貪殘下國構禍怨亂並興焉小旻之什六十五章四百十四句詩傳通釋卷十二
