body:
  text: 詩傳通釋卷十四元劉瑾撰詩朱子集傳桑扈之什二之七交交桑扈侯古反有鶯其羽君子樂音洛胥叶思吕反受天之祜侯古反興也交交飛往來之貌桑扈竊脂也鶯然有文章也君子指諸侯胥語詞祜福也此亦天子燕諸侯之詩言交交桑扈則有鶯其羽矣君子樂胥則受天之祜矣頌禱之詞也輔氏曰四章雖皆頌禱之辭然亦寓期望戒勵之意愚按此章及三四章末句皆所謂頌禱之詞也交交桑扈有鶯其領君子樂胥萬邦之屏卑郢反興也領頸屏蔽也言其能為小國之藩衛葢任方伯連師之職者也王介甫曰屏之為物禦外以蔽内也之屏之翰叶胡見反百辟音璧為憲不戢荘立反不難叶乃多反受福不那賦也翰幹也所以當墻兩邊障土者也辟君憲法也言其所統之諸侯皆以之為法也戢斂難慎那多也不戢戢也不難難也不那那也葢曰豈不斂乎豈不慎乎其受福豈不多乎輔氏曰此章又言不獨為萬邦之屏翰其所統之諸侯又皆以其所為為法則其徳亦威矣方且戢且斂而不敢自恃其難其慎而不敢少忽則其受福又豈不多乎哉百辟為憲有期之之意不戢不難有戒之之然意王介甫曰戢則不肆不放逸難則不易不傲慢則受福豈不多也胡庭芳曰此亦戒之之詞也古語聲急而然也後放此愚按菀栁云不尚文王云不顯不時大明韓奕皆云不顯其光生民云不寧不康清廟云不顯不承以至嵩髙維天之命烈文執競皆言不顯並倣此義兕徐履反觥古横反其觩音求㫖酒思柔彼交匪敖五報反萬福來求賦也兕觥爵也觥角上曲貌周頌作捄㫖美也思語詞也敖傲通交際之間無所傲慢則我無事於求福而福反來求我也輔氏曰彼交匪敖亦有戒意桑扈四章章四句陳夀翁曰即維周之翰四國于蕃文武吉甫萬邦為憲等語参之則此為天子燕諸侯而頌禱之詩無疑也序刺幽王也君臣上下動無禮文焉此序只用彼交匪敖一句生説鴛鴦于飛畢之羅之君子萬年福禄宜叶牛何反之興也鴛鴦匹鳥也鄭氏曰言其止則相偶飛則為雙性馴偶也畢小罔長柄者也羅罔也君子則天子也此諸侯所以答桑扈也鴛鴦于飛則畢之羅之矣君子萬年則福禄宜之矣亦頌禱之詞也愚按四章皆為頌禱之詞鴛鴦在梁戢其左翼君子萬年宜其遐福叶筆力反興也石絶水為梁戢斂也張子曰禽鳥並棲一正一倒戢其左翼以相依於内舒其右翼以防患於外葢左不用而右便故也遐逺也久也乘繩證反馬在廏音救摧采卧反之秣音末叶莫佩反之君子萬年福禄艾魚葢反叶魚肺反之興也摧莝秣栗釋文曰摧莝芻也秣穀飼馬也艾養也蘇氏曰艾老也言以福禄終其身也亦通乗馬在廄則摧之秣之矣君子萬年則福禄艾之矣乗馬在廄秣之摧叶徂為采卧二反之君子萬年福禄綏叶宣佳士果二反之興也綏安也鴛鴦四章章四句輔氏曰鴛鴦之詩乃下禱上之詞故尤更明易上之禱下猶且述其徳桑扈是也下之禱上則亦無此意但拯其頌禱之情而已鴛鴦是也若不敢有擬議其徳者敬之至也序刺幽王也思古明王交於萬物有道自奉養有節焉此序穿鑿尤為無理有頍缺婢反者弁實維伊何爾酒既㫖爾殽既嘉叶居何反豈伊異人兄弟匪他湯何反蔦音鳥與女蘿力多反施以豉反于松栢叶逋莫反未見君子憂心奕奕叶弋灼反既見君子庶幾説音悦懌叶弋灼反賦而興又比也愚按此章諸本皆作賦而比今詳章首六句曰弁曰酒曰殽曰兄弟皆述宴時之實事其體屬賦而其六句之中實維伊何與豈伊異人語意相應又似興體七句八句則皆屬比疑此章當為賦而興又比及考輔氏童子問本正作賦而興又比令從之輔氏曰首言與宴者其弁頓然只是賦體又貼一句實維伊何則以興起下二句豈伊異人兄弟匪他也此則興體至於蔦蘿則為比也頍弁貌或曰舉首貌弁皮弁輔氏曰弁者冠之大名爵弁則士祭服韋弁即戎冠從禽非常服也惟皮弁上下通服故知皮弁也嘉㫖皆美也匪他非他人也蔦寄生也葉似當蘆子如覆盆子赤黑甜美本草曰一名寓木凡桑槲樹攑栁楊楓等樹上皆有之此物自感造化之氣而生别是一物也女蘿兔絲也蔓連草上黄赤如金釋文曰在草曰兔絲在木曰松蘿此則比也君子兄弟為賔者也奕奕憂心無所薄伯博二音也此亦燕兄弟親戚之詩故言有頍者弁實維伊何乎爾酒既㫖爾殽既嘉則豈伊異人乎乃兄弟而匪他也又言蔦蘿施於木上以比兄弟親戚纒綿依附之意是以未見而憂既見而喜也有頍者弁實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來叶陵之反蔦與女蘿施于松上叶時亮反未見君子憂心怲怲兵命反叶兵旺反既見君子庶幾有臧叶才浪反賦而興又比也愚按此章體製與上章同何期猶伊何也時善輔氏曰以時為善何也曰物得其時則善矣與維其時矣之時同具俱也怲怲憂盛滿也臧善也有頍者弁實維在首爾酒既㫖爾殽既阜方九反豈伊異人兄弟甥舅巨九反如彼雨于付反雪先集為霰蘇薦反死喪去聲無日無幾居豈反相見樂音洛酒今夕君子維宴賦而興又比也愚按上兩章前六句賦中兼興此章賦中似無興意第七第八句則仍是比疑此章當為賦而比阜猶多也甥舅謂母姑姊妹妻族也爾雅曰謂我舅者吾謂之甥母之昆弟為舅母之從父昆弟為從舅妻之父為外舅姑之子為甥舅之子為甥妻之兄弟為甥姊妹之子為甥霰雪之始凝者也將大雨雪必先微温雪自上下遇温氣而摶謂之霰久而寒勝則大雪矣孔氏曰大戴禮曾子曰陽之専氣為霰葢成隂之氣在雨水則凝滯而為雪陽氣搏而脅之不相入則消散而下因水而為霰言霰集則將雪之候以比老至則將死之徴也劉辰翁曰霰則知有雪矣老則知有死矣相㑹之始為此危語相感動以極歡趨耳故卒言死喪無日不能久相見矣但當樂飲以盡今夕之歡篤親親之意也頍弁三章章十二句序諸公刺幽王也暴戾無親不能宴樂同姓親睦九族孤危將亡故作是詩也序見詩言死䘮無日便謂孤危將亡不知古人勸人燕樂多為此言如逝者其耋他人是保之類且漢魏以來樂府猶多如此如少壯幾時人生幾何之類是也間闗車之牽胡瞎下介二反兮思孌力兖反季女逝石列石例二反兮匪饑匪渴徳音來括雖無好友叶羽已反式燕且喜賦也間闗設牽聲也牽車軸頭鐵也無事則脱行則設之昏禮親迎者乗車孌好貌逝往括㑹也此燕樂其新昏之詩故言間闗然設此車牽者葢思彼孌然之委女故乗此車往而迎之也匪饑也匪渴也望其徳音來括而心如饑渴耳雖無他人亦當宴飲以相喜樂也依彼平林有集維鷮音驕辰彼碩女令徳來教叶居爻反式燕且譽好呼報反爾無射音亦叶都故反興也依茂木貌鷮雉也㣲小於翟走而且鳴其尾長肉甚美埤雅曰鷮尾六尺字從喬者尾長而走且鳴則其首尾喬如也孔氏曰語云四足之美有麃兩足之美有鷮辰時碩大也爾即季女也射厭也依彼平林則有集維鷮辰彼碩女則以令徳來配已而敎誨之輔氏曰辰彼碩女令徳來教言碩女適及其時而以美徳來配已而敎誨之也是以式燕且譽而悦慕之無厭也雖無㫖酒式飲庶幾雖無嘉殽式食庶㡬雖無徳與女音汝式歌且舞賦也㫖嘉皆美也汝亦指季女也言我雖無㫖酒嘉殽美徳以與女女亦當飲食歌舞以相樂也陟彼髙岡析星歴反其柞才洛反薪叶音襄析其柞薪其葉湑思吕反兮鮮息淺反我覯爾我心冩叶想羽反兮興也陟登柞櫟湑盛鮮少覯見也陟岡而析薪則其葉湑兮矣我得見爾則我心寫兮矣髙山仰叶五剛反止景行行叶五郎反止四牡騑騑孚非反六轡如琴覯爾新昏以慰我心興也仰瞻望也景行大道也如琴謂六轡調和如琴瑟也孔氏曰六轡緩急調和如琴瑟也慰安也髙山則可仰景行則可行馬服御良則可以迎季女而慰我心也此又舉其始終而言也表記曰小雅曰高山仰止景行行止子曰詩之好仁如此劉辰翁曰此二句極思慕之情而好仁者以之此古人善讀詩也鄉音向道而行中道而廢鄭氏曰廢喻力極罷頓不能復行則止也忘身之老也不知年數之不足也俛焉日有孳孳斃而後已輔氏曰表記之言雖非詩之本㫖然讀者能如此則能有益於己矣時過而學者可常常涵詠此數語以自警車牽五章章六句輔氏曰一章言其望之甚切故得之甚喜也二章言徳之有譽故好之無厭也三章則自謙之辭言我雖無以子女而女則宜有以相樂也四章則言我心傾寫于女以見誠之至也五章則舉其始終而言之上四句言其始下二句言其終前已極言之矣故此但言其畧耳愚按此詩皆言悦慕賢女之意故其未得之也望其徳音來括而心如饑渴既得之也喜其今徳來教而心如輸寫至于宴樂之也又歎為謂歡之無美具而且恐無徳以相與證之闗雎亦可得性情之正者也序大夫刺幽王也褒姒疾妬無道並進讒巧敗國徳澤不加于民周人思得賢女以配君子故作是詩也以上十篇並已見楚茨篇營營青蠅止于樊音煩叶汾乾反豈弟君子無信䜛言比也營營往來飛聲亂人聴也青蠅汙穢能變白黑歐陽子曰齊詩匪鷄則鳴蒼蠅之聲葢其飛聲之衆可以亂聴猶言聚蚊成雷也蠅之為虫汙白使黑汙黑使白喻佞人變亂善惡也鄭氏曰青蠅穢物驅之使去而復還以比小人態狀可惡而又難逺樊藩也君子指王也詩人以王好聴讒言故以青蠅飛聲比之而戒王以勿聴也陳少南曰讒言多由持心傾險而後入故君子當持心樂易不聴讒言也營營青蠅止于棘䜛人罔極交亂四國叶越逼反興也棘所以為藩也孔氏曰棘榛即為藩之物極猶已也營營青蠅止于榛士巾反䜛人罔極構古豆反我二人興也構合也猶交亂也已與聴者為二人陳夀翁曰讒人罔極之禍其末至于亂四國其始先於構二人聴者察于其始而早絶之庶乎不至于罔極也青蠅三章章四句愚按首章以青蠅與君子對言故知以蠅聲比讒古下二章以青蠅與讒人對言故知屬興此比興相似而不同者凱風詩亦然序大夫刺幽王也賔之初筵左右秩秩無韻未詳後三四章倣此籩豆有楚殽户交反核户革反維旅酒既和㫖飲酒孔偕音皆叶舉里反鐘鼓既設叶書質反舉醻市由反逸逸大侯既抗叶居郎反弓矢斯張射夫既同獻爾發功發彼有的叶丁藥反以祈爾爵賦也初筵初即席也孔氏曰鋪陳曰筵藉之曰席左右筵之左右也丘氏曰謂筵上左右之人秩秩有序也楚列貌殽豆實也核籩實也鄭氏曰豆實菹醢也籩實桃梅之屬孔氏曰殽是總名此文殽核與籩豆相對故分之耳其實殽亦為核旅陳也和㫖調美也孔甚也偕齊一也設宿設而又遷於下也大射樂人宿懸厥明將射乃遷樂于下以避射位是也鄭氏曰鍾鼓於是言既設者將射改縣也愚按大射儀有樂人宿縣之文葢將射於學宫先一宿各縣鍾磬鼓鏞於堂下東西北三面鄉射禮則有樂正命遷樂于下之文集傳所引乃參約大射鄉射禮文以明此鍾鼓既設之義耳射皆用樂者葢諸侯之射則先行燕禮大夫士之射則先行鄉飲禮故也然此章乃言人君燕射燕在路寢自有常懸之樂謂宿設者先儒以為更整理之耳舉醻舉所奠之醻爵也按儀禮主人酌賔曰獻賔既酢主人主人又自飲而獻賔曰酬賔受之奠於席前而不舉至旅而遂舉所奠之爵交錯以徧也逸逸往來有序也愚按往來者東西交錯也大侯君侯也天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕鄭氏曰所謂獸侯也燕射則張之熊麋虎豹鹿豕皆正面畫其頭象於正鵠之處耳君畫一臣畫二陽竒隂耦之數也其畫皆毛物也李寳之曰言質者以已白與赤采其地而後畫布侯者直畫而天子侯身一丈其中三分居一白質畫熊其外則丹地畫以雲氣愚按凡侯有中有身有上下舌獸侯以布為之天子與圻外諸侯皆用布九幅每幅闊二尺其髙一丈八尺九幅之布最中一幅廣一丈八尺即所謂中也中之上下各二幅連中幅共髙一丈所謂身也身之上下又各二幅以為舌據侯中之廣一丈八尺以三分之一為正鵠則正鵠當廣六尺此燕射之侯不設正鵠則於正鵠之處以白采其地而畫熊為的又於其側以丹色為質畫雲氣為飾自麋侯以下其飾皆然抗張也凡射張侯而不繫左下綱中掩束之鄉射禮註曰繡持舌繩也不繫者事未至也李寳之曰舌維持侯者綱所以繫之於植者侯向堂以西為左掩向東也植音值至將射司馬命張侯弟子脱束遂繫下綱也愚按侯有上下左右舌故有左右上下綱繩出於舌外以持舌而繫之也又有維以綴侯身侯舌之四角而繫之大侯張而弓矢亦張節也射夫既同比其耦也鄭氏曰比選次其才相近者也李寳之曰射毎二人相對以決勝負曰耦射禮選羣臣為三耦李寳之曰三耦使大夫士為之若燕射則天子諸侯同一侯三耦三耦之外其餘各自取匹謂之衆耦獻猶奏也發發矢也的質也孔氏曰侯中所射之處為質也祈求也爵射不中者飲豐上之觶音寘也儀禮曰卒射司射命設豐弟子奉豐升設於西楹之西勝者之弟子洗觶升酌奠於豐上不勝者進取觶少退立卒觶進奠于豐上註曰豐形葢似豆而卑衞武公飲酒悔過而作此詩此章言因射而飲者初筵禮儀之盛愚按左右有序者儀之盛也籩豆酒殽陳列者禮之盛也而武公於立言之首特以初筵發之者若將不保其終也酒既調美而飲者齊一至於設鍾鼓舉醻爵愚按燕射主於飲酒而於獻酢旅酬之後司射乃命納射器司馬命張侯樂正命遷樂於是乃射故此詩言大侯既抗於設鐘鼓舉醻爵之後也抗大侯張弓矢而衆耦拾鉗入聲發孔氏曰拾更也射者更代發矢各心競云我以此求爵汝也籥舞笙鼓樂既和奏叶宗五反烝衎苦旦反烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛都南反叶持林反其湛曰樂音洛各奏爾能叶奴金反賔載手仇音拘叶求其二音室人入又叶由怡二音酌彼康爵以奏爾時叶酬時二音賦也籥舞文舞也烝進衎樂烈業洽合也百禮言其備也孔氏曰百禮事神之衆禮也壬大林盛也言禮之盛大也錫神錫之也爾主祭者也嘏福湛樂也各奏爾能謂子孫各酌獻尸尸酢而卒爵也愚按特牲三獻之後長兄弟洗觚獻尸尸飲畢酢之長兄弟受而卒爵少牢下篇三獻之後亦有二人洗觶酌獻之禮各奏爾能之義其謂此類歟仇讀曰㪺音拘室人有室中之事者謂佐食也鄭氏曰賔佐尸食者又復去聲也賔手挹酒室人復酌為加爵也特牲曰衆賔酌為加爵注曰獻禮既成多之為加也劉辰翁曰入又者更迭再酌也康安也酒所以安體也或曰康讀曰抗記曰崇坫康抗圭玉藻注曰崇髙也為髙坫亢所受圭奠於上焉此亦謂坫上之爵也時時祭也蘇氏曰時物也此言因祭而飲者始時禮樂之盛如此也王介甫曰先王用酒常以祭祀必有禮樂有大禮始有大樂以和之有備樂斯有備禮以成之籥舞笙鼓有備樂也以洽百禮有備禮也輔氏曰毛氏謂籥舞笙鼓者謂秉籥而舞與笙鼓相應長樂劉氏曰言文舞則武舞見矣言笙鼓則八音舉矣因射而飲者飲在射先因祭而飲者飲在祭後上二章皆言凡飲之初禮樂之盛如此則必不至于亂也愚按此言祭宴禮樂之盛亦䝉上章初筵之意然武公因酒過作詩宜于深自懲創若大禹惡而絶之也今二章乃皆盛陳飲酒之禮者葢酒非有過也飲者常至於過也飲者之於初筵亦未有過也其終既醉則不能無過也公之自悔自戒亦慎終如始而已豈必廢燕射祭祀之禮而後免於酒禍哉賔之初筵温温其恭其未醉止威儀反反叶分遭反曰既醉止威儀幡幡叶分遭反舎音捨其坐遷屢舞僊僊其未醉止威儀抑抑曰既醉止威儀怭怭毗必反是曰既醉不知其秩賦也反反顧禮也幡幡輕數音朔也遷徙屢數也僊僊軒舉之狀抑抑慎密也孔氏曰慎密謂慎禮而密静怭怭媟音薛嫚音慢也秩常也此言凡飲酒者常始乎治而卒乎亂也莊子曰以禮飲酒者始乎治常卒乎亂注云始初筵温温秩秩之時也亂幡幡怭怭載號載呶之時也輔氏曰温温其恭威儀反反抑抑始乎治也幡幡怭怭屢遷屢舞終乎亂也才飲酒稍不謹必至乎此賔既醉止載號乎毛反載呶女交反亂我邊豆屢舞僛僛起其反是曰既醉不知其郵叶于其反側弁之俄屢舞傞傞素多反既醉而出並受其福叶筆力反醉而不出是謂伐徳飲酒孔嘉叶居何反維其令儀叶牛何反賦也號呼呶讙也孔氏曰唱呌也僛僛傾側之狀郵與尤同過也側傾也俄傾貌傞傞不止也出去伐害孔甚令善也此章極言醉者之狀因言賓醉而出則與主人俱有美譽醉至若此是害其徳也輔氏曰僛僛比僊僊則甚矣側弁之俄屢舞傞傞則又甚也不知其郵亦甚於不知其秩飲酒之所以甚美者以其有令儀爾今若此則無復有儀矣蘇氏曰此章申言其亂而終誨之也凡此飲酒或醉或否叶補美反既立之監或佐之史彼醉不臧不醉反耻式勿從謂無俾大音泰怠叶養里反匪言勿言匪由勿語由醉之言俾出童羖音古三爵不識叶失志二音矧失引反敢多又叶夷益夷豉二反賦也監史司正之屬燕禮鄉射恐有解懈倦失禮者立司正以監之察儀法也鄉飲酒禮鄉射禮皆曰相為司正燕禮曰射人為司正吕東萊曰淳于髠云賜酒大王之前執法在傍御史在後此古人君燕飲之制猶存于戰國者也或立之監即執法也鄉射注所謂立司正以監察儀法者也或佐之史即御史也董氏所謂佐之史以書之者也謂告由從也童羖無角之羖羊必無之物也識記也言飲酒者或醉或不醉故既立監而佐之以史則彼醉者所為不善而不自知使不醉者反為之羞愧也安得從而告之使勿至于大怠乎告之若曰所不當言者勿言所不當從者勿語輔氏曰欲其不至於昏醉而但告之使勿太怠者何也曰凡溺于酒者其病根只在一怠字上稍自謹飭者便不至若是漢人謂無事故飲者亦此意也無事則怠矣匪言勿言匪從勿語應前章則號呼讙呶而云也言自言也語與人語也苟不可從則豈可語人哉醉而妄言則將罰汝使出童羖矣設言必無之物以恐之也汝飲至三爵已昬然無所記况敢又多飲乎又丁寧以戒之也賔之初筵五章章十四句毛氏序曰衛武公刺幽王也韓氏序曰衛武公飲酒悔過也今按此詩意與大雅抑戒相類愚按此時之意欲以自警抑詩之意亦以自警也此詩之意恐醉酒而伐徳猶抑詩所謂顛覆厥徳荒湛于酒也此詩之意反覆以威儀為言猶抑詩言抑抑威儀敬慎威儀敬爾威儀不愆于儀也此詩言載號載呶勿言勿語之意猶抑詩言慎爾出語無易由言也以至此詩有童羖之語抑詩亦有彼童而角之喻其語意多相類也然抑詩凡言女言爾集傳皆以為武公使誦詩者命已之辭今按此詩凡言賔言爾者恐亦武公自謂也必武公自悔之作當從韓義董鼎曰史鴻漸云衛人何其服酒酷之訓世守于無窮也始也商俗淫湎武王以酒誥戒之幽王之世上下沈湎武公飲酒自悔作賔之初筵見衛人非特丄時聞訓不敢自越于禁防又能以其所以禁防者傳為子孫法焉愚按酒酷言禁酒之意以為父母慶克羞耇羞饋祀則皆可用酒乃若反開飲酒之端者亦若武公謹酒而言因射而飲因祭而飲之意也夫酒之為禍内則䘮人之徳外則䘮人威儀謹酒之要亦惟致力于二者而已故此詩言徳者一而言威儀者五酒誥言徳者八而言威儀者一詳畧可互相備矣武公此詩其真有得於武王康叔之家法歟序衛武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫液武公既入而作是詩也韓詩説見本篇此序誤矣魚在在藻有頒符云反其首王在在鎬豈苦怪反樂音洛飲酒興也藻水草也頒大首貌豈亦樂也此天子燕諸侯而諸侯美天子之詩也言魚何在乎在乎藻也則有頒其首矣王何在乎在乎鎬京也則豈樂飲酒矣魚在在藻有莘所巾反其尾王在在鎬飲酒樂豈叶去幾反興也莘長也魚在在藻依于其蒲王在在鎬有那乃多反其居興也那安居處也輔氏曰此詩與鴛鴦相類辭雖簡而意則切矣不頌其徳者徳盛而非言之所能盡亦尊敬之至而不敢加以形容也但美其樂飲安居其位則非盛徳其孰能之魚藻三章章四句序刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉此序意與楚茨等篇相類采菽采菽筐音匡之筥音舉之君子來朝音潮何錫予音與之雖無予之路車乗繩證反馬又何予之𤣥衮古本反及黼音斧興也菽大豆也君子諸侯也路車金路以賜同姓象路以賜異姓也周禮中車曰金路鈎樊纓九就同姓以封象路朱樊纓七就異姓以封注云金路以金飾諸末鈎婁頷之鈎以金為之樊馬大象帶也纓馬鞅樊纓皆以五采罽飾之而九成象路以飾無鉤以朱飾勒而已其樊纓飾七成樊音盤罽音計𤣥衮𤣥衣而畫以卷衮龍也黼如斧形刺之于裳也孔氏曰以龍首卷然謂之衮吕東萊曰𤣥者衣之色衮畫於衣九章之第一章也黼綉於裳九章之第八章也上公之服周制諸公衮冕九章已見九罭篇鄭氏曰一曰龍二曰山三曰華蟲四曰火五曰宗彜皆畫六曰藻七曰粉米八曰黼九曰黻皆繡衣五章裳四章侯伯鷩鷩冕七章則自華蟲以下鄭氏曰鷩畫以雉謂華蟲也其衣三章裳四章子男毳冕五章衣自宗彛以下而裳黼黻鄭氏曰毳畫虎蜼謂宗彜也其衣三章裳二章孤卿絺知上聲冕三章則衣粉米而裳黼黻鄭氏曰絺刺粉米無畫也衣一章裳二章大夫𤣥冕則𤣥衣黻裳而已鄭氏曰𤣥者衣無文裳刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳五服同冕者首飾尊也此天子所以答魚藻也采菽采菽則必以筐筥盛之君子來朝則必有以錫予之又言今雖無以予之然已有路車乗馬𤣥衮及黼之賜矣其言如此者好之無己意猶以為薄也陳少南曰雖無予之者好之之心無己也上公九章其服用衮諸侯豈皆上公而有是賜哉詩人取其錫子之至厚者耳觱音必沸音弗檻胡覽反泉叶才勻反言采其芹巨斤反君子來朝言觀其旂巨依反叶巨斤反其旂淠淠匹弊反鸞聲嘒嘒呼惠反載驂七南反載駟君子所届叶居氣反興也觱沸泉出貌檻泉正岀也孔氏曰正出湧泉也李迂仲曰水泉從下上出曰湧泉芹水草可食淠淠動貌嘒嘒聲也王介甫曰嘒嘒言其聲之細無敢馳驅故也届至也觱沸檻泉則言采其芹諸侯來期則言觀其旂見其旂聞其鸞聲又見其馬董氏曰載驂則驂也載駟則騑也則知君子之至於是也赤芾音弗在股邪幅在下叶後五反彼交匪紓音舒叶上與反天子所予音與樂音洛只音止君子天子命叶彌并反之樂只君子福禄申之賦也脛本曰股邪幅偪也邪纒於足如今行縢所以束脛在股下也孔氏曰縢緘也名行縢者言行而緘束之也鄭氏曰偪束其脛自足至縢故曰在下彭氏曰陳氏云帶裳幅舄昭其度也幅雖㣲而有等差之度故併觀之交交際也紓緩也言諸侯服此芾偪見於天子恭敬齊咨齋二音遫不敢紓緩則為天子所予而申之以福禄也鄭氏曰天子賜之神則以福禄中重之董氏曰天子之命則有命服有命爵有命車其命之則路車乘馬𤣥衮及黻是也古者發大命頒爵禄必自其祖廟示不敢専則以徳受命其得於神也宜矣維柞之枝其葉蓬蓬樂只君子殿多見反天子之邦叶卜工反樂只君子萬福攸同平平婢延反左右亦是率從興也柞見車牽篇蓬蓬盛貌殿鎮也孔氏曰軍行在後曰殿取鎮重之義故曰殿鎮也平平辯治也左右諸侯之臣也率循也維柞之枝則其葉蓬蓬然樂只君子則宜殿天子之邦而為萬物之所聚又言其左右之臣亦從之而至此也汎汎芳劍反楊舟紼音弗纚力馳反維之樂只君子天子葵之樂只君子福禄膍類尸反之優哉游哉亦是戾叶郎之反矣興也紼繂音律孔氏曰孫炎云繂大索也李巡曰所以維持舟者纚維皆繫也言以大索纚其舟而繫之也葵揆也揆猶度也膍厚戻至也汎汎楊舟則必以紼纚維之樂只君子則天子必葵之輔氏曰天子葵之言天子能葵度諸侯之心而知其底藴也福禄必膍之於是又歎其優游而至于此也采菽五章章八句國語注曰此詩王賜諸侯命服之樂也輔氏曰首章之意至矣言其寵錫之厚而心猶以為不足也二章則言其始來之時見其車旂而喜其至三章則言其始見天子時恭敬齊遫而為天子之所予四章則言其徳足以鎮天子之邦為萬福之所聚而又喜其左右之臣相從而至五章則申言之而又歎其至也優游自適而無勉强不得已之意一有勉强之心則怠矣序刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵㑹之而無信義君子見㣲而思古焉同上騂騂息營反角弓翩匹然反其反叶分邅反矣兄弟昏姻無胥逺叶於圓反矣興也騂騂弓調和貌角弓以角飾弓也孔氏曰弓人以六材為弓謂幹角筋膠絲漆也翩反貌弓之為物張之則内向而來弛之則外反而去有似兄弟昬姻親踈逺近之意胥相也此刺王不親九族而好讒佞使宗族相怨之詩言騂騂角弓既翩然而反矣兄弟婚姻則豈可以相逺哉歐陽子曰弓之為物其體往來詩人以興九族之親王若親之以恩則内附若不以仁恩結之則亦離叛而去矣爾之逺同上矣民胥然矣爾之敎矣民胥傚矣賦也爾王也上之所為下必有甚者歐陽子曰王與骨肉如此則下民亦將傚上之所為也輔氏曰王位在徳元風俗之樞機也故爾逺則民然爾教則民傚其應甚連不可不謹也逺字承上章而言此令兄弟綽綽有裕預與二音不令兄弟交相為瘉同上賦也令善綽寛裕饒瘉病也言雖王化之不善然此善兄弟則綽綽有裕而不變彼不善之兄弟則由此而交相病矣葢指䜛己之人而言也民之無良相怨一方受爵不讓叶如羊反至于己斯亡賦也一方彼一方也相怨者各據其一方耳若以責人之心責己愛己之心愛人使彼己之間交見而無蔽輔氏曰即大學絜矩之道也則豈有相怨者哉王介甫曰民䘮其良心不叅彼己之曲直則各相怨於一方況兄弟相怨相䜛以取爵位而不知遜讓終亦必亡而已矣輔氏曰此章始則詔之以相怨之由終則戒之以不遜之禍其曉之也切矣歐陽子曰貪争不已至於亡身也劉辰翁曰末句猶云至于亡斯已也老馬反為駒叶去聲不顧其後叶下故反如食音嗣宜饇於據反如酌孔取叶音娶比也饇飽孔甚也言其但知䜛害人以取爵位而不知其不勝任如老馬憊矣而反自以為駒不顧其後將有不勝任之患也又如食之已多而宜飽矣酌之所取亦已甚矣輔氏曰老馬反為駒不顧其後此必指當時實事而言葢時有讒己以取其爵位而不度其己之不勝任者如食宜饇以比其貪黷之無厭如酌孔取以比其攫取之太甚毋教猱升木如塗塗附君子有徽猷小人與屬音蜀叶殊遇反比也猱獮猴也陸璣曰楚人謂之沐猴老者為玃長臂者為猿性善升木不待教而能也塗泥附著徽美猷道屬附也言小人骨肉之恩本薄王又好䜛佞以來之是敎猱升木又如泥塗之上加以泥塗附之也苟王有美道則小人將反為善以附之不至于如此矣劉執中曰小人樂於不善王又疎薄骨肉以倡之是教猱升木也小人樂于不善而王又益之以不善之敎是以塗塗附其塈且相著不可脱矣非所以為上之道也故陳為上之道曰君子有徽猷小人與屬也先王有至徳要道民用和睦正其五品為之孝友是之謂徽猷吕東萊曰上之化下速于影響導之以惡既易如此况于有善道以化之小民其有不與屬者乎胡庭芳曰毋教云者中二章爾敎之義而禁止之也君子小人以位言輔氏曰君者民之表上者下之倡民之善惡亦惟其上之所道且罪不在于民也望于上者切而責于人者恕詩人之情當理矣愚按大學傳曰上老老而民興孝上長長而民興弟上恤孤而民不倍上有徽猷而下之與属者其機葢如此雨于付反雪瀌瀌符驕反見睍乃見反曰音越韓詩劉向作聿下章放此消莫肯下遐稼反遺式居婁力在反荀子作屢驕比也瀌瀌盛貌睍日氣也張子曰䜛言遇明者當自止愚按盛雪見日氣則自消正如此也而王甘信之不肯貶下而遺棄之更益以長慢也雨雪浮浮見睍曰流如蠻如髦叶莫侯反我是用憂比也浮浮猶瀌瀌也流流而去也蠻南蠻也髦夷髦也書作髳孔氏曰髦西夷之别名牧誓曰及庸蜀羌髳㣲盧彭濮人彼髳此髦音義同言其無禮義而相殘賊也王介甫曰粲然有文以相接驩然有恩以相愛中國之道也中國道盡則如蠻如髦矣是夫亂之道也故我是用憂也角弓八章章四句愚按堯之協和萬邦必以親九族為本中庸之九經必以親親為先所係之大如此而其道則惟在于尊其位重其禄同其好惡此先王所以有常棣伐木頍弁行葦諸詩之深仁原澤也今若此詩所刺則䘮其治國平天下之本矣詩人所以于卒章深致其憂也序父兄刺幽王也不親九族而好䜛佞骨肉相怨故作是詩也孔氏曰骨肉謂族親也以其父祖上世同禀血氣而生如骨内之相附有菀音鬰者栁不尚息焉上帝甚蹈戰國䇿作上天甚神無自䁥焉俾予靖之後予極焉比也栁茂木也尚庶幾也上帝指王也蹈當作神言威靈可畏也䁥近靖安極求之盡也王者暴虐諸侯不朝而作此詩言彼有菀然茂盛之栁行路之人豈不庶幾欲就止息乎以比人誰不欲朝事王者而王甚威神使人畏之而不敢近耳使我朝而事之以靖王室後必將極其所欲以求于我葢諸侯皆不朝而已獨至則王必責之無己如齊威王朝周而後反為所辱也史記魯仲連曰齊威王朝周居歳餘周烈王崩齊王朝周怒於齊曰天崩地坼天子下席東藩之臣因齊後至則斮威王怒曰叱嗟而母婢也卒為天下笑故生則朝之死則叱之誠不忍其求也或曰興也下章放此輔氏曰前章只是比體以人願息於栁隂以比人願庇於王者耳若以為興則不尚息焉無自䁥焉兩句意思各别有菀者栁不尚愒欺例反焉上帝甚蹈見上無自瘵例界反叶子列反焉戰國䇿作也俾予靖之後予邁叶力制反焉愚按戰國策荀卿謝楚王書曰云云詩曰上天甚神毋自瘵焉比也愒息瘵病也邁過也求之過其分也有鳥髙飛亦傳音附于天叶鐵因反彼人之心于何其臻曷予靖之居以凶矜興也傳臻皆至也彼人斥王也居猶徒然也凶矜遭凶禍而可憐也鳥之髙飛極于天耳彼王之心于何所極乎言其貪縱無極求責無己人不知其所至也如此則豈予能靖之乎乃徒然自取凶矜耳菀栁三章章六句序刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝言王者之不可朝事也桑扈之什四十三章二百八十二句詩傳通釋卷十四
