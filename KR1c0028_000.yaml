body:
  text: 詩傳通釋序或有問於豫曰詩何為而作也豫應之曰人生而靜天之性也感於物而動性之欲也其未感也純粹至善萬理具焉所謂性也感於物而動則性之欲出焉而善惡於是乎分矣性之欲即所謂情也夫既有欲矣則不能無思既有思矣則不能無言既有言矣則言之所不能盡而發於咨嗟咏歎之餘者必有自然之音響節族奏而不能已焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也蘇氏曰其人親被王化之純發而為詩則無不善正詩是也及其感之雜也有所憂愁忿怨不得其平淫泆放蕩不合於禮者矣變詩是也愚按此言先王以詩為教者詩之言雖有善惡而皆所以為教故因其所言之是非知其所感之邪正而相已則益修其治教於人則有勸懲之政也昔周盛時上自郊廟朝廷而下達於鄉黨閭巷其言粹然無不出於正者聖人固已協之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子巡守亦必陳而觀之以行黜陟之典愚按此言先王以詩為教於郊廟朝野之正詩如周頌正雅二南之類則播之音律於列國之詩則采而觀其善惡而於諸侯人有黜陟之政也聖人蓋指周公天子指武成康也降自昭穆而後寖以陵夷至於東遷而遂廢不講矣孔子生於其時既不得位無以行勸懲黜陟之政於是特舉其籍而討論之去其重復正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久逺愚按夫子不得行黜陟之政於作詩之侯國而於詩籍有所云取則不可謂黜陟之教也使夫學者即是而有以考其得失善者師之而惡者改焉愚按夫子不得行勸懲之政於作詩之人而使學詩者有以考其得失而有所創艾興起則亦可謂勸懲之教也是以其政雖不足以行於一時而其教實被於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也唯周南召南親被文王之化以成德而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣愚按此言國風之體而有正變也蓋二南之詩皆得性情之正如關雎一篇樂不淫哀不傷全體兼備他如卷耳汝墳草蟲行露殷其雷摽有梅小星江有汜之類亦皆哀而不傷如樛木螽斯桃夭芣苡漢廣羔羊何彼穠矣之類又皆樂而不淫故二篇獨為正風其餘自邶至豳十三國之詩雖亦有得性情之正者而君臣民庶之間不能如二南風俗之純故雖邠風亦不得為正也若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而莊其義寬而密其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意尤非後世能言之士所能及之大率雅是朝廷之詩頌是郊廟之詩變雅亦是變用他腔調耳愚按此言二雅正變及周頌等篇之體不兼言商魯頌者其體異同可類推也夫正雅周頌諸篇如常棣文王清廟時邁等詩皆周公作公劉泂酌卷阿皆召公作則所謂聖人之徒者也至其變雅之作則有家父及宜臼之傅及蘇公衛武公召穆公凡伯芮伯之輩又皆所謂賢人君子者也此詩之為經所以人事浹於下天道備於上而無一理之不具也詩經全體大而天道精微細而人事曲折無不在其中絶愚按通三百篇而論其大義則其喜不至瀆怒不至怨不至亂諫不至訐天時日星之大蟲鳥草木之微人倫綱常之道風氣土地之宜神祇祖考之祀禮樂刑政之施凡天人相與之理莫不畢備於一經之中也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其正此學詩之大旨也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之詩中頭項多一是音韻一是訓詁名件一是文體學詩須是沉潛諷誦玩味義理咀嚼滋味方有所益若只草草看過一部詩只三兩日可了但不得滋味也記不起出又曰學詩之法只是熟讀涵泳自然和氣自胸中流其妙處不可得而言不待安排措置務自立説只恁平讀著意思自足功愚按此言學詩者格物致知之知之事也察之情性隱微之間審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣愚按此言學詩者詩意正心修齊治平之道行之事也問者唯唯而退余時方輯詩傳因悉次是語以冠其篇云淳熙四年丁酉冬十月戊子新安朱熹書欽定四庫全書經部三詩傳通釋詩類提要臣等謹案詩傳通釋二十卷元劉瑾撰瑾字公瑾安福人是書大旨在於發明朱傳與輔廣詩童子問相同陳啓源作毛詩稽古編於二家多所駁詰然廣書皆循文演義故所駁惟訓解之詞瑾書兼辨訂故實故所駁多考證之語如注何彼穠矣以齊桓公為襄公之子注魏風以魏為七國之魏注陟岾謂毛傳先出爾雅後出注綢繆謂心宿之象三星鼎立注鹿鳴之什謂上下通用止小雅二南其大雅獨為天子之樂注節南山以家父即春秋之家父師尹即春秋之尹氏案此項安世之説見朱善詩解頤瑾襲而隱其名也注楚茨誤讀鄭康成玉藻注以楚茨為即采齊注甫田誤讀毛傳車梁以為即小戎之梁輈注殷武杜撰殷廟之昭穆及祧廟世次皆一經指摘無可置詞故啓源譏胡廣修詩經大全收瑾説太濫案大全即用瑾此書為藍本故全録其説啓源未以二書相校故有此語謹附訂於此然徵實之學雖不足而研究義理究有淵源議論亦頗篤實於詩人美刺之旨尚有所發明未可徑廢至周頌豐年篇朱子詩序辨説既駁其誤而集傳仍用序説自相矛盾又三夏見於周禮呂叔玉注以時邁執競思文當之朱子既用其説乃又謂成康是二王諡執競是昭王後詩則不應篇名先見周禮瑾一一回護亦為啓源所糾然漢儒務守師傳唐疏皆遵注義此書既專為朱傳而作其委曲遷就固勢所必然亦無庸過為責備也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書詩傳通釋卷首元劉瑾撰詩序朱子辨説詩序之作説者不同或以為孔子程子曰大序是仲尼作或以為子夏王肅小沈重亦云大序是子夏作序子夏毛公合作或以為國史程子曰國史明乎得失之迹是也王介甫亦云皆無明文可考唯後漢書儒林傳以為衛宏作毛詩序今傳於世則序乃宏作明矣然鄭氏又以為諸序本自合為一編毛公始分以置諸篇之首則是毛公之前其傳已久宏特增廣而潤色之耳隋志曰先儒相承謂毛詩序子夏所創毛公及衛敬仲更加潤色故近世諸儒多以序之首句為毛公所分而其下推説云云者為後人所益理或有之李迂仲曰以詩序考之文辭殽亂非出一人之手如詩有六義至六曰頌則見於周官情動於中而形於言至其民困則見於樂記鴟梟之序則見於金縢都人士之序則見于緇衣清人之序則見於氏傳那序則見於國語措辭引援往往雜出傳記之文然則果作之誰乎實出漢之諸儒也但今考其首句則已有不得詩人之本意而肆為妄説者矣况沿襲云云之誤哉然計其初猶必自謂出於臆度之私非經本文故且自為一編别附經後古本詩序别作一處如易大傳及班固序傳並在後京師舊本揚子注其序亦總在後孔氏曰漢志云毛詩經二十九卷故訓傳三十卷是毛為詁訓亦與經别也自後漢以來始有就經為注者又以尚有齊魯韓氏之説並傳於世故讀者亦有以知其出於後人之手不盡信也及至毛公引以入經乃不綴篇後而超冠篇端不為注文而直作經字不為疑辭而遂為決辭其後三家之傳又絶而毛説孤行則其抵牾之迹無復可見故此序者遂若詩人先所命題而詩文反為因序以作於是讀者傳相尊信無敢擬議至於有所不通則必為之委曲遷就穿鑿而附合之寧使經之本文繚戾破碎不成文理而終不忍明以小序為出於漢儒也愚之病此久矣然猶以其所從來也逺其間容或真有傳授證驗而不可廢者故既頗采以附傳中而復并為一編以還其舊因以論其得失云輔氏曰先儒以詩序為孔子作故讀詩記載蘇氏曰詩序誠出於孔氏也則不若是詳矣孔子刪詩而取三百五篇今其亡者六焉亡詩之序未嘗詳也夫詩序之非孔子作蓋不待此而可知也然此亦是一驗又云釋文載沈重云案大序是子夏毛公合作卜商意有未盡毛更足成之隋經籍志亦云先儒相承謂毛詩序子夏所創毛公及衛敬仲宏更加潤色至於以為國史作者則見於大序與王氏説然皆是臆度懸斷無所據依故先生直據後漢儒林傳之説而斷以為衛宏作又因鄭氏之説以為宏特增廣而潤色之又取近世諸儒之説以為序之首句為毛公所分而其下推説云云為後人所益者皆曲盡人情事理至於首句之已有妄説者則非先生闓理之明考義之精不能及也至論詩序本自為一編别附經後又以尚有齊魯韓氏之説並傳於世故讀者亦有知其出於後人之手而不盡信亦得其情又論毛公引以入經乃不綴篇後而超冠篇端不為注文而直作經字不為疑辭而遂為決辭云者則可見古人於經則尊信而不敢易視於己説則謙虛退託不敢自決而有待於後人者自有深意若毛公之作則出於率易不思遂啓後人穿鑿遷就之失以至於上誣聖經而其罪有不可逭者矣嗚呼可不戒哉可不謹哉或曰豫之責夫毛公者當矣而晦翁先生又生於數千年後乃盡廢諸儒之説而遂斷小序為不足據者何哉豫應之曰不然先生之學始於致知格物而至於意誠心正其於解釋經義工夫至矣必盡取諸儒之説而子細研窮一言之善無有或遺一字之差無有能遁其誦聖人之言都一似自己言語一般蓋其學已到至處能破千古疑使聖人之經復明於後世然細考其説則其端緒又皆本於先儒之所嘗疑而未究者則亦未嘗自為臆説也學者顧第弗深考耳觀其終既已明知小序之出於漢儒而又以其間容或真有傳授證驗而不可廢者故既頗采以附傳中而復併為一編以還其舊因以論其得失云之説則其意之謹重不苟亦可見矣豈可與先儒之穿鑿遷就者同日語哉先生又嘗曰豫自二十嵗時讀詩便覺小序無意義及去了小序只玩味詩辭却又覺得道理貫徹當初亦嘗質問諸鄉先生皆云序不可廢而某之疑終不能釋後到三十嵗斷然知小序之出於漢儒所作其為繆戾有不可勝言吕伯恭不合只因序講解便有許多牽強處某嘗與之言終不肯信從讀詩記中雖多説序然冇説不行處亦廢之某因作詩傳遂成詩序辨説一册其他繆戾辨之頗詳又曰小序亦間有説得好處只是杜撰處多不知先儒何故那虛心子細看這道理便只恁説却後人又只依他那箇説去亦不看詩是有此意無若説不去處又須穿鑿説將去詩傳綱領大序按舊關雎之序其間有統論詩之綱領者數條乃詩大序宜引以冠經首使學者得以先焉又曰大序好處多然亦有不滿人意處又曰或者謂補湊而成亦有此理曰詩者志之所之也在心為志發言為詩心之所之謂之志而詩所以言志也孔氏曰詩人志意之所之適藴藏在心為志發見於言為詩輔氏曰此一節言詩之自出情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也情者性之感於物而動者也喜怒憂懼愛惡欲謂之七情形見現永長也黃實夫曰寂然不動者謂之性感於物者謂之情情之所動則惡可已惡可已則不知手舞足蹈也李迂仲曰永歌未足盡其情於是手舞之足蹈之而有舞焉歌詠其聲舞蹈其容聲容兩盡然後喜怒哀樂之情宣導於外無所湮鬱此所謂導和之至也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困治直吏反樂音洛思息吏反聲不止於言凡嗟歎永歌皆是也成文謂其清濁高下疾徐疏平聲數朔之節相應而和也然情之所感不同則音之所成亦異矣輔氏曰此一節又言嗟嘆永歌既發於聲因以其聲播於八音諧以律吕使之相應而和故謂之音而即其音而復可得其所感之情有如是之不同也孔氏曰治世之政和順民述其安樂之心作歌故其心亦安樂百室盈止婦子寧止安之極也厭厭夜飲不醉無歸樂之至也亂世之政乖戾民述其怨怒之心作歌故其音亦怨怒民莫不穀我獨何害怨之至也取彼譖人投畀豺虎怒之甚也國將亡民遭困厄哀傷思慕而作歌故其音亦哀以思知我如此不如無生哀之甚也眷焉顧之潸焉出涕思之篤也而王介甫曰治亂言世言政而亡國不言者世絶無政也故正得失動天地感鬼神莫近於詩事有得失詩因其實而諷詠之使人有所創艾刈興起至其和平怨怒之極又足以達於陰陽之氣而致祥召災蓋其出於自然而不假人力是以入人深而見功速非他教之所及也輔氏曰此一節又結上三節而言詩之用廣大深切非他教之所及也愚按詠其事之得則可起人善心諷其事之失則可創人逸志得失於是乎正其入人之深如此者蓋以人心同一理也詠其實而極其和平則達於陰陽而或致祥諷其實而極於怨怒則達乎陰陽而或召災其感動之速如此者亦以天地神力人同一氣也詩雖出於人為而理氣感通則不假人也達字貼動感字陰陽貼天地鬼神字先王以是經夫婦成孝敬厚人倫美教化移風俗先王指文武周公成王輔氏曰或疑指周公為先王先生曰此無甚害蓋周公行王事制禮樂若止言成王則失其實矣是指風雅頌之正經愚按序者言先王以詩為教正綱常而善風化故知其所指先王與正經如此經常也女正乎內男正乎外夫婦之常也孝者子之所以事父敬者臣之所以事君詩之始作多發於男女之間而達於父子君臣之際故先王以詩為教使人興於善而戒其失所以道夫婦之常而成父子君臣之道也三綱既正則人倫厚教化美而風俗移矣彭氏曰陳君舉云夫婦之經者孝敬之成也蓋天下之道只從夫婦中出而夫婦之道又只從中正中來以此氣象事親則成孝事君則成敬由是而人倫厚風俗移皆出於詩之功用也輔氏曰此一節又言文武周公成王以風雅頌之正經為教而後有此效驗始於夫婦父子君臣之三綱而後極於天下之風俗也愚按此一節專論正風雅及周頌故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌興虛應反復同此一條本出於周禮太師之官蓋三百篇之綱領管轄也輔氏曰風雅頌者三百篇之節奏實統於是而無所遺故曰綱領賦比興者三百篇之體製實出於是而不能外故曰管轄愚按詩有六義如網之有綱如衣之有領如車之有管有轄管與錧輨同車轂端鐵也轄與轄舝同車軸頭鐵也四者皆機要之所在也然綱領之用在網與衣之上則風雅頌之比也管轄之用在車之中則賦比興之譬也風雅頌者聲樂部分去聲之名也風則十五國風雅則大小雅頌則三頌也賦比興則所以製作風雅頌之體也按周禮太師掌六詩以教國子而大序謂之六義蓋古今聲詩條理無出此者風則閭巷風土男女情思之詞雅則朝會燕享公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂其所以分皆以其篇章節奏之異而别之也賦比興所以分者又以其屬詞命意之不同而别之也彭氏曰李賢良云詩者古之歌曲其聲之曲折氣之髙下作詩之始或為風為小雅為大雅為頌風之聲不可以入雅雅之聲不可以入頌不待太師與孔子而后分也風雅頌乃其音與賦比興乃其體也賦者直陳其事如葛覃卷耳之類是也比者以彼狀此如螽斯緑衣之類是也興者託物興詞如關雎兔罝之類是也凡直指其名直敘其事者賦也引物為況者比也本要言其事而虛用兩句釣起因而接續者興也又曰比是以一物比一物而所指之事常在言外興是借彼一物以引起此事而其事常在下句又曰説出那箇物事來是興不説出那箇物事是比如南有喬木只是説漢有遊女奕奕寢廟君子作之只説箇他人有心豫忖度之皆是興體比體只是從頭比下來不説破興比相近却不同又曰如藁砧今何在何日大刀頭此是比體興之為言起也言興物而起意後來古詩猶有比體如青青陵上柏磊磊澗中石人生天地間忽如逺行客又如髙山有崖林木有枝憂來無端人莫之知皆是也又曰興體不一或借眼前事説起或别將一物説起如唐詩尚有此體如青青河畔草青青水中蒲皆是借彼興起其詞非必有感有見於此物也有將物之無興起自家之所有有將物之所有興起自家之所無前輩都理會這箇不分明如何説得詩本指蓋衆作雖多而其聲音之節製作之體不外乎此故大師之教國子必使之以是六者三經而三緯之則凡詩之節奏指歸皆將不待講説而直可吟咏以得之矣三經是風雅頌是做詩底骨子賦比興却是裏面橫串底都有賦比興故謂三緯輔氏曰聲音之節謂風雅頌製作之體謂賦比興三經謂風雅頌之體一定也三緯謂賦比興之用不一也孔氏曰風雅頌者詩篇之異體賦比興者詩文之異詞賦比興是詩之所用風雅頌是詩之成形用彼三事成此三事也愚按聲音之節非風則雅非雅則頌其在當時固可吟咏以得其節奏製作之體非賦則比非比則興其在今日猶可吟咏以得其指歸蓋古今之作者教者學者皆不能外夫六義也六者之序以其篇次風固為先而風則有賦比興矣故三者次之而雅頌又次之蓋亦以是三者為之也孔氏曰四始以風為先風之所用以賦比興為辭故於風之下即次賦比興然後次以雅頌既見賦比興於風之下明雅頌亦用賦比興也言事之道直陳為正故賦在比興之先比興雖同是託物比顯而興隱當先顯而後隱故比居興先也然比興之中螽斯専於比而緑衣兼於興兔罝専於興而關雎兼於比此其例中又自有不同者學者亦不可以不知也比興之中各有兩例興有取所興為義者則以上句形容下句之情思下句指言上句之事實有全不取義者則但取一二字相應而已要之上句全虛下句常實則同也比有繼所比而言其事者有全不言其事者學者隨文會意可也輔氏曰此一節則言凡詩聲音之節製作之體有此六義而教詩與學詩者皆當先辨而識之也緑衣雖以比妾又因以興起其詞雎鳩雖以起興又以摰而有别比后妃之德也獨舉二者以例其餘耳愚按吕氏嘗謂得風之體多者為風得雅之體多詩者為雅得頌之體多者為頌而朱子亦嘗疑以七月變其音節或為風或為雅或為頌則風雅頌之例中亦恐有不同者不特比興之例為然也上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風風刺之風福鳯反風者民俗歌謡之詩如物被風之有聲又因其聲以動物也上以風化下者詩之美惡其風皆出於上而被於下也下以風刺上者上之化有不善則在下之人又歌詠其風之所自以譏其上也凡以風刺上者皆不主於政事而主於文詞不以正諫而託意以諫若風之被物彼此無心而能有所動也王介甫曰主文譎諫有巽入之道故曰風化輔氏曰此一節解風之一字有此二義也上以風為正風也然變風亦間有如此者下以風刺上則止謂變風耳風雖有此二義不同然皆有取於彼此無心而能有所動故皆曰風也至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣先儒舊説二南二十五篇為正風鹿鳴至菁莪二十二篇為正小雅文王至卷阿十八篇為正大雅皆文武成王時詩周公所定樂歌之詞邶至豳十三國為變風六月至何草不黃五十八篇為變小雅民勞至召旻十三篇為變大雅皆康昭以後所作故其為説如此國異政家殊俗者天子不能統諸侯故國國自為政諸侯不能統大夫故家家自為俗也然正變之説經無明文可考今姑從之其可疑者則具於本篇云輔氏曰此一節言風雅之有變也然正變之説詩經無文可據但其説有合乎理故且從之所謂可疑者蓋指楚茨至車牽十篇之類而言也愚按詩人各隨當時政教善惡人事得失而美刺之未嘗有意於為正為變後人比而觀之遂有正變之分所以正風雅為文武成王時詩變風雅為康昭以後所作矣邠風不可以為康昭以後之詩也大抵就各詩論之以美為正以刺為變猶之可也若拘其時世分其篇帙則其可疑者多矣國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上達於事變而懷其舊俗者也風福鳯反詩之作或出於公卿大夫或出於匹夫匹婦蓋非一人而序以為専出於國史則誤矣説者欲蓋其失乃云國史紬繹詩人之情性而歌詠之以風其上則不惟文理不通而考之周禮大史之屬掌書而不掌詩其誦詩以諌乃大師之屬瞽矇之職也故春秋傳曰史為書瞽為詩説者之云兩失之矣周禮史官如大史小史內史外史其職不過掌書無掌詩者不知明得失之迹干國史甚事周禮禮記中史並不掌詩左傳説自分曉以此見得大序亦未必是聖人做愚按此一節係變風變雅作矣之下冠變風發乎情之上而謂國史傷人倫哀刑政以作詩則序者之意以承上文言變風變雅為國史所作非以三百篇為皆作於國史然亦誤矣故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也情者性之動而禮義者性之德也動而不失其德則以先王之澤入人者深至是而猶有不忘者也黃實夫曰止乎義禮喜怒哀樂之中節者王介甫曰此獨言變之風者雅雖冇變天子猶有政焉言變風則通乎無雅後也而猶知止乎禮義則變雅之時可知矣然此言亦其大槩如此者其放逸而不止乎禮義者固已多矣如泉水載馳等詩固止乎禮義如桑中有甚禮義大序亦只是總説亦未盡輔氏曰此一節又言變風之亦有止乎禮義者蓋由先王之澤入人之深且久故也不及雅者變風如此則變雅從可知也是以一國之事繫一人之本謂之風所謂上以風化下王介甫曰風之本出於人君一人之躬行而其末見於一國之事輔氏曰此一小節再釋風之名義然只反前説上截意言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉形者體而象之之謂孔氏曰言天下之政事體象四方之風俗謂之雅也小雅皆王政之小事大雅則言王政之大體也輔氏曰此一小節釋雅之名義與大小雅之别言天下之事以體象四方之風俗而以見王政之所由廢興也正雅則可見王政之興變雅則可見王政之廢孔氏曰小雅所陳飲食賞勞燕賜征伐皆小事也大雅所陳受周代殷繼伐荷先王之福祿尊祖考以配天醉酒飽德求賢用士皆大事也詩體既異樂音亦殊至於變雅則由音體有小大而不復由政事之大小矣不正小雅二十二篇皆政之一事正大雅十八篇意主於一事大抵皆詠歌先王之功德申固福祿之辭而政之大本係焉其音節亦不同矣及其變也則亦各以其聲而附之也歟嚴氏曰以政之小大為二雅之别驗之經而不合竊謂雅之大小特以其體之不同耳蓋明白正大直言其事者雅之體也純乎雅之體者為雅之大雜乎風之體者為雅之小太史公稱國風好色而不淫小雅怨誹而不亂若離騷可謂兼之言離騷兼國風小雅而不言兼大雅見小雅與風騷相類而大雅不可與風騷並言也頌者美盛德之形容以其成功告於神明也告古毒反頌皆天子所制郊廟之樂歌頌容古字通故其取義如此輔氏曰此一小節釋頌之名義頌容古字通故頌為形容之義李迂仲曰頌字訓容漢書曰徐生善容容字作此頌字顔師古注云頌字與形容字古人通用彭氏曰盛德不可見也故美其形容成功不可忘也故告于神明愚按論頌詩之大體固是天子郊廟樂歌而所以美盛德告成功者也但驗之三頌諸篇亦不能盡然也是謂四始詩之至也史記曰關雎之亂以為風始關雎是樂之卒章故曰關雎之亂楚辭亦有亂曰是也自關關雎鳩至鐘鼓樂之皆是亂鹿鳴為小雅始文王為大雅始清廟為頌始所謂四始也王介甫曰風也二雅也頌也雖相因而成而其序不相襲也故謂之四始彭氏曰吕博士云自一國之事以下備言風雅頌之所因而作而卒之以是謂四始詩之作各有攸始也詩之所以為詩者至是無餘藴矣李迂仲曰四始以下皆詩之至也後世雖有作者其孰能加於此乎邵子曰刪詩之後世不復有詩矣蓋謂此也所謂無詩者非謂詩不復作也但謂夫子不取耳故康節云自從刪後更無詩蓋伯樂之所不顧則謂之無馬可矣夫子之所不取則謂之無詩可矣多古人發出意思自好看看三百篇詩則後來之詩不足觀矣輔氏曰此二句總結上三節而贊其為詩之極至也夫詩之作其來逺矣至夫子刪詩則無復餘藴後世作者連篇纍牘不為不多然學之者果可以興觀羣怨乎用之者果可以正得失動天地厚人倫美教化乎後人讀之者又果可以達於政而專對乎至於風雲之狀月露之形則固無益於事矣若夫哀淫愁怨導欲增悲則又非徒無益也邵子之言警人深矣舜典帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲夔舜臣名胄子謂天子至卿大夫子弟愚按即所謂天子之元子衆子以至公侯卿大夫元士之適子者也教之因其德性之美而防其過愚按因其性之直而防其過故欲其溫因其性之寬而防其過故欲其栗因其性之剛而防其過故欲其無虐因其性之簡而防其過故欲其無傲凡所以養其中和之德救其氣質之偏者蓋皆樂之功用也詩言志歌永言聲依永律和聲聲謂五聲宫商角徴羽宫最濁而羽極清所以協歌之上下律謂十二律黃鍾大吕大簇湊夾鍾姑洗跣仲吕㽔賓林鍾夷則南吕無射亦應鍾黃最濁而應極清又所以旋相為宫而節其聲之上下人聲自有髙下聖人制五聲以括之宫聲洪濁其次為商羽聲輕清其次為徵清濁洪纎之中為角此五聲之制以括人聲之髙下又制十二律以節五聲又各有髙下每聲又分十二等謂如以黃鍾為宫則是大簇為商姑洗為角林鍾為徴南吕為羽還至無射為宫便是黃鍾為商大簇為角中吕為徵林鍾為羽然而無射之律只長四寸八分有竒而黃鍾長九寸大簇長八寸林鍾長六寸則宫聲槩下面商羽角三聲不過故有所謂四清聲夾鍾大吕黃鍾大簇是也蓋用其半數謂如黃鍾九寸只用四寸半餘三律亦然如此則宫聲可以槩之其聲和矣看來十二律皆有清聲只説四者意其取數之甚多者言之耳蔡九峯曰心之所之謂之志心之所之必形於言故曰詩言志既形於言必有長短之節故曰歌永言既有長短必有髙下清濁之殊故曰聲依永大抵歌聲長而濁者為宫以漸而清且短則為商為角為徵為羽所為聲依永也既有長短清濁則又必以十二律和之乃能成文而不亂假令黃鍾為宫則大簇為商姑洗為角林鍾為徵南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫者所謂律和聲也愚按黃鍾屬子大吕丑大簇寅夾鍾卯姑洗辰仲吕已㽔賓午林鍾未夷則申南吕酉無射戌應鍾亥一律一吕陰陽相間黃鍾生林鍾自子至未凡八位林鍾生大簇自未至寅亦八位餘律皆然所謂隔八者也黃鍾林鍾大簇南吕姑洗應鍾㽔賓相生則三律下生三吕皆三分損一三吕上生三律皆三分益一㽔賓大吕夷則夾鍾無射中吕黃鍾相生則三律下生三吕反三分益一三吕上生三律反三分損一通六下六上而十二律旋相為宫焉每律備五聲則成六十聲每律加變宫變徵則成八十四聲矣八音克諧無相奪倫神人以和八音金石絲竹匏土革木也金鍾鎛也石磬也絲琴瑟也竹管簫也匏笙也土塤也革鼗鼓也木柷敔也蔡九峯曰人聲既和乃以其聲被之八音而為樂則無不諧叶而不相侵亂失其倫次可以奏之朝廷郊廟而神人以和矣周禮大師教六詩曰風曰賦曰比曰興曰雅曰頌説見大序以六德為之本中和祗庸孝友愚按此六者周禮大司樂謂之樂德中者無所偏倚和者無所乖戾祗者莊敬庸者有常孝者善事父母友者善于兄弟以六律為之音六律謂黃鍾至無射六陽律也大吕至應鍾為六陰律與之相間去聲故曰六間又曰六吕愚按間者言其陰陽相間吕者言其陰陽相侣周禮又謂之六同不言六陰律者陽統陰也其為教之本末猶舜之意也輔氏曰以六德為本者無是六德則雖強聒以六詩無益也此即舜命夔以樂教胄子必因其直寬剛簡而使無過之意以六律為之音此即律和聲之意本謂德性末為聲音愚按本六德而教六詩而叶六律即帝舜命夔自直溫而詩歌自詩歌而聲律之意禮記王制天子五年一巡狩命大師陳詩以觀民風鄭氏曰五年者虞夏殷之制也周則十之二年一巡狩陳詩者采其詩而視論語孔子曰吾自衛反魯然後樂正雅頌各得其所前漢禮樂志云王官失業雅頌相錯孔子論而定之故其言如此魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘缺失次孔子周流四方參互考訂以知其説晚知道終不行故歸而正之洪興祖曰王迹熄而詩亡其存者謬亂失次孔子復得之他國以歸定著為三百五篇於是雅頌各得其所史記云古者詩本三千餘篇孔子去其重取其可施於禮義者三百五篇孔頴達曰按書傳所引之詩見在者多亡逸者少則孔子所録不容十分去九馬遷之言未可信也愚按三百五篇其間亦未必皆可施於禮義但存其實以為鑒戒耳子所雅言詩書執禮皆雅言也雅常也詩以理情性書以道政事禮以謹節文皆切於日用之實故常言之禮獨言執者以人所執守而言非徒誦説而已也嘗獨立鯉趨而過庭子曰學詩乎對曰未也不學詩無以言鯉退而學詩鯉孔子之子伯魚也事理通達而心氣和平故能言輔氏曰詩本人情該物理故學之者事理通達其為言溫柔敦厚使人不狡不訐故學之者心氣和平事理通達則無昏塞之患心氣和平則無躁急之失此所以能言也子曰興於詩興起也詩本人情其言易曉而諷詠之間優柔浸漬又有以感人而入於其心故誦而習焉則其或邪或正或勸或懲皆有以使人志意油然興起於善而自不能已也程氏曰古之學者必先學詩則誦讀其言美惡是非勸戒有以啓發故曰興真氏曰三百篇詩雖難曉今諸老先生發明其義了然可知如能反覆涵泳直可以感發其性情則所謂興於詩者亦未嘗不存也子曰小子何莫學夫詩詩可以興感發志意可以觀考見得失可以羣和而不流可以怨怨而不怒黃直卿曰興羣怨皆指學詩者而言觀則指詩而言謂考見其人之得失也然以為觀已得失亦通邇之事父逺之事君人倫之道詩無不備二者舉重而言多識於鳥獸草木之名其緒餘又足以資多識輔氏曰論語之論及詩者多矣而惟此章為備反覆周悉無一或遺學者苟於此而盡心焉則有以感發其志意而為善不懈有以考見其得失而於事無惑和而不流則得羣居之道怨而不怒則盡人情之微以至事父事君則於人倫之際各盡其道多識於鳥獸草木之名則可以為傅物洽聞之君子子曰詩三百一言以蔽之曰思無邪凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已然其言微婉且或各因一事而發求其直指全體而言則未有若思無邪之切者故夫子言詩三百篇而惟此一言足以盡蓋其義思無邪只是要正人心約而言之三百篇只是一箇思無邪析而言之一篇之中自有一箇思無邪黃直卿曰三百篇之詩亦多矣而一言足以盡蓋其義所以明思無邪一言之辭約而理盡微婉者若言人之善而託諸車服之盛親族之貴之類是也各因一事者若刺奢刺貪之類是也直指全體者直指則非微婉矣全體則非一事矣就人心之思而言其無邪故曰直指全體也此其所以能蓋三百篇之義也歟南容三去聲復白圭孔子以其兄之子妻去聲之白圭大雅抑之五章也南容孔子弟子居南宫字子容抑篇曰白圭之玷尚可磨也斯言之玷不可為也南容一曰三復此言事見家語蓋深有意於謹言也故孔子以兄子妻之子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為程子曰須是未讀詩者授以政不達使不專對既讀詩後便達於政便能專對始是讀詩黃直卿曰詩三百人未有不讀者也而達於政事能專對者何其少邪亦視其所以讀之者如何耳為人邪為已邪誦説邪踐行邪鹵莽邪精切邪二者之不同而能不能判矣胡伯量曰詩之作皆原於人情及諷詠其所言則事物之理莫不具載故其情合於事理之正則可以知風俗之盛政治之得其情背於事物之正則可以知風俗之衰政治之失因是而通為政之方也詩之言溫厚不至於薄和平不至於訏能諷詠則人皆易曉因是故能専對也然讀詩者每不能如此豈非誦之而不能熟熟之而不能思思之而不能切歟可不戒哉子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也樂音洛好去聲子貢蓋自謂能無諂無驕者子貢姓端木名賜諂卑屈也驕矜肆也常人溺於貧富之中而不知所以自守故必有二者之病無諂無驕則知自守矣而未能超乎貧富之外也故以二言質之夫子夫子以為二者特隨處用力而免於顯過耳故但以為可蓋僅可而有所未盡之辭也又言必其理義渾然全體貫徹貧則心廣體胖而忘其貧富則安處善樂循理而不自知其富然後乃可為至爾無諂無驕是就貧富裏用功比他樂與好禮者自爭一等蓋樂自不知有貧好禮自不知有富曽氏之説亦善曽氏曰以貧故無諂以富故無驕處貧富之道耳樂非以貧好禮非以富出於情性而貧富不能解也輔氏曰心廣體胖者指其樂之之象安處善樂循理者論其好禮之實愚按隨貧富而用力自守則不能全體貫徹也無諂無驕免於顯過則不能理義渾然也是故為貧富而自守囿於貧富之中者也彼樂與好禮者則由禮義渾然根於其心流行發見於日用之間其貧也但知自樂而不知今之為貧其富也但知好禮而不知今之為富所謂全體貫徹也是其自始至終此心之理不為貧富而增損存亡乃超乎貧富之外者也子貢曰詩云如切如磋如琢如磨其斯之謂與治骨角者既切之而復浮去聲磋之治玉石者既琢之而復磨之治之之功不已而益精也子貢因夫子告以無諂無驕不如樂與好禮而知凡學之不可少得而自足必當因其所至而益加勉焉故引此詩以明之子貢舉詩之意不是專以此為貧而樂富而好禮底工夫蓋見得一切事皆合如此不可安於小成而不自勉也子曰賜也始可與言詩已矣告諸往而知來者往者其所已言者來者其所未言者他説意思濶非止説貧富故云告往知來告其所已言者謂處貧富之道而知其所未言者謂學問之功也黃直卿曰謂告以無諂不如樂無驕不如好禮此所已言也知義理之無窮學之不可以有得而遽足此所未言也夫子論貧富而子貢悟為學是告往而知來須是見得切磋琢磨在無諂無驕樂與好禮之外方曉得所已言所未言子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也倩七練反盼普莧反絢呼縣反此逸詩也倩好口輔也盼目黑白分也素粉地畫之質也絢采色畫之飾也言人有此倩盼之美質而又加以華采之飾如有素地而加采色也子夏疑其反謂以素為飾故問之饒氏曰讀書須是先理會訓詁曉得訓詁便須涵泳其意不可只滯在訓詁上然未有不曉訓詁而能通其意者子夏是未曉得素以為絢一句訓詁所以問子曰繪事後素繪胡對反繪事繪畫之事也後素後於素也考工記曰繪畫之事後素功是也蓋先以粉地為質而後可施以五采猶人有美質然後可加以文飾曰禮後乎子曰起豫者商也始可與言詩已矣禮必以忠信為質猶繪事必以粉素為先起猶發也起豫言能起發我之志意楊氏曰子曰繪事後素而子夏曰禮後乎可謂能繼其志矣非得於意言之表者能之乎商賜可與言詩者以此若夫玩心於章句之末則其為詩也固而已矣所謂起豫則亦相長之義也輔氏曰子貢因論好禮與樂之學而知切磋琢磨之詩為自治益精之意子夏因論素以為絢之詩而知人之學禮當以質為先故皆可與言詩楊氏之説最明切讀書者不可泥於章句之下而學詩者尤貴有得於意言之表不然則局於章句訓詁而詩之教益於人者鮮矣饒氏曰夫子稱商賜可與言詩皆是善其能觸類而長也學者讀書於見在文意也未能通解況敢望其能觸類乎李迂仲曰觀詩者必當得其外意如衣錦尚絅但言衣服之盛而中庸曰惡其文之著也推之以為慎獨之學巧笑美目但言顔色之好而子曰繪事後素子夏則推之以知其禮後之説也陳君舉曰六經皆經聖人手而於詩也致力蓋詳論語一書語詩多於他經而二南則正色言之關雎一篇尤再惓惓夫子之意深矣愚按此引論語言詩凡十章而言不仍其先後之次朱子於此得無意乎切以淺見推之雅頌各得其所一章首明三百篇之定體也詩體之音節既定則可學矣故次兩章記夫子常以詩為教也既學則必有成效如所謂興觀羣怨之類是也故以此二章次之然學貴乎知要善讀詩而有得雖思邪之一言白圭之一章用之有餘不善讀者雖三百其篇而無用也故此二章乂次之若子貢子夏之問答又皆得詩人意外意者故以此二章終焉但未知朱子之意然否咸丘蒙問曰詩云普天之下莫非王土率土之濱莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何孟子曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故説詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也程子曰舉一字是文成句是辭愚謂意謂己意志謂詩人之志逆迎之也其至否遲速不敢自必而聽於彼也普遍也率循也乃作詩者自言天下皆王臣何獨使我以賢才而勞苦乎非謂天子可臣其父也蓋説詩之法不可以一字而害一句之義不可以一句而害設辭之志當以己意迎取作者之志乃可得之若但以其辭而已則如雲漢所言是周之民真無遺種矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也又曰逆是前去追迎之之意蓋是將自家意思去前面等候詩人之志來又曰譬如有一客來自家去迎他他來則接之不來則已若必去捉他來則不可張子曰知詩莫如孟子以意迎志讀詩之法也程子曰詩者言之述也言之不足而長言之詠歌之所由興也其發於誠感之深至於不知手之舞足之蹈故其入於人也亦深古之人幼而聞歌誦之聲長而識美刺之意故人之學由詩而興後世老師宿儒尚不知詩之義後學豈能興起乎又曰興於詩者吟詠情性涵暢道德之中而歆動之有吾與點也之氣象輔氏曰讀詩者吟詠其情性使人意沉浸紓快於道德之中有所慕樂而動蕩鼓舞之直與曽點浴沂風雩之氣象一般方能有益又曰學者不可不看詩便使人長一格讀詩便長人一格今人讀詩何緣會長一格興處全不緊要然是起人意處正在於興會得詩人之異便有一格長張子曰置心平易然後可以言詩涵泳從容則忽不自知而自解頥矣若以文害辭以辭害意則幾何而不為髙叟之固哉又曰求詩者貴平易不要崎嶇求合蓋詩人之情性溫厚平易老成今以崎嶇求之其心先狹隘無由可見輔氏曰溫厚平易老成六字説盡詩人情性溫厚謂和而不流怨而不怒平易謂所言皆眼前事老成謂憂深思逺達於人情事物之變此等意思唯平心易氣以逆之則可有得又曰詩人之志主平易故無艱險之言大率所言皆目前事而義理存乎其中以平易求之則思逺以廣愈艱險則愈淺近矣輔氏曰艱險與平易正相反蓋云目前事若無義理在其間是特鄙俚之言耳唯所言皆目前事而却有義理此其所以為詩也然人能言到此亦甚難以平易求之則無窒礙故其意思廣逺橫渠云置心平易始知詩然解悠悠蒼天此何人哉却不平易黃實夫曰橫渠數説此知味之學觀詩之法也上蔡謝氏曰學詩須先識得六義體面而諷味以得之愚按六義之説見於周禮大序其辨甚明其用可識而自鄭氏以來諸儒相襲不唯不能知其所用反引異説而汨陳之唯謝氏此説為庶幾得其用耳上蔡甚曉得詩觀此説是他識得要領處體程子曰學詩而不分六義豈能知詩也輔氏曰面蓋言體製體段言六義各有箇體面學詩不可不先理會得古詩即今之歌曲往往能使人感動至學詩却無感動興起處只為泥章句故也明道先生善説詩未嘗章解句釋但優遊玩味吟哦上下便使人有得處如曰瞻彼日月悠悠我思道之云逺曷云能來思之切矣百爾君子不知德行不忮不求何用不臧歸於正也輔氏曰思之切而不歸于正便入哀傷淫佚去也又曰明道先生談詩並不曽下一字訓詁只轉却一兩字點掇地念過便教人省悟陳大猷曰蒸民詩首四句孔子只就中添四字滄浪之歌孔子只換兩斯字曽不辭費而意味無窮明道説詩正得此意詩傳通釋外綱領詩源流鄭氏曰詩之興也諒不於上皇之世孔氏曰伏羲三皇最先者故謂之上皇其時淳朴故知無詩大庭軒轅逮於髙辛其時有亡載籍亦蔑云焉孔氏曰大庭神農别號虞書曰詩言志然則詩昉於此乎林氏曰舜與臯陶之賡歌三百篇之權輿也黃實夫曰自有天地有萬物而詩之理已寓嬰兒之嬉笑童子之謳吟皆有詩之情而未動也桴以蕢鼓以土籥以葦皆有詩之用而未文也康衢順則之謡元首股肱之歌皆詩也故曰詩言志至於五子述大禹之戒相與歌詠傷今而思古則變風變雅已備矣吕東萊曰觀舜臯陶之歌則見詩之雅頌觀五子之歌則見詩之變風變雅程子曰虞之君臣迭相賡和始見於書夏殷之世雖有作者其傳鮮矣至周而益文人之怨樂必形於言政之美惡必有刺美至夫子時所傳者多矣夫子刪之得三百篇可以垂世立教陳夀翁曰舜臯喜起明良之歌即虞詩也五子之歌即夏詩也商詩多亡唯存商頌五篇外此風雅二頌皆周詩也歐陽子曰詩述商周自玄鳥生民上陳稷契下訖陳靈千五六百年之間旁及列國君臣世次國地山川封域圖牒鳥獸草木蟲魚之名與其風俗方言訓詁盛衰治亂美刺之由無所不載朱子曰嘗考詩之原委古今凡三變蓋自書傳所記虞夏以來下及魏晉自為一等自晉宋間顔謝以下及唐初自為一等沈宋以後定著律詩下及晚唐自為一等又曰自唐初以前法猶未變至律詩而後詩與法始皆大變以至今日益巧益密無復古人之故嘗妄欲抄取經史諸書所載韻語及文選漢魏古詞以盡乎郭景純陶淵明之作自為一編而附三百篇楚詞之後以為詩之根本準則又於其下二等之中擇近於古者各為一編以為之羽翼輿衛其不合者則悉去之章句音韻孔氏曰自古有篇章之名東山序曰一章言其完是也句則古者謂之言論語曰詩三百一言以蔽之曰思無邪則以一句為一言秦漢以來乃有句稱風雅無一章者頌則多一章而已詩之大體必須依韻之兮矣也之類本取以為辭雖在句不以為義故處末者皆字上為韻左右流之寤寐求之之類是也亦有即將助句之字以當聲韻者是究是圖亶其然乎之類是也或問諸章句起於誰朱子曰有故言者是指毛公無故言者是鄭康成胡庭芳曰如古注關雎篇末云關雎五章章四句故言三章注五章鄭康成所分故言以下是毛公本意是也考索吳氏曰詩韻無不協者如來之為釐慶之為羌馬之為姥之類詩音舊有九家唐陸德明始以見定為一家之學今釋文是也至開元中修五經文字我心慘慘書作懆音七到反伐鼓淵淵書作鼘音於巾反皆與釋文音訓有異乃知德明之學在當時亦未必盡用而詩音之亡或有所自矣朱子曰詩音韻是自然如此古人音韻寬後人分得密後隔開了又曰看詩須并協韻讀便見得他語自齊整又更略知協韻所由來甚善又曰只要韻相協好吟哦諷誦易見道理亦無甚要緊今且將七分工夫理會義理二三分工夫理會這般去處或問吳才老協韻何據曰他皆有據泉州有其書每一字多者引十餘證少者亦兩三證然亦有推不去者因言商頌下民有嚴協不敢怠遑吳氏音嚴為莊云避漢諱却無道理某後讀楚辭天問見嚴字乃押從莊剛方字去乃知是叶韻嚴韻作昻也又此間鄉音嚴作户剛反天問才老豈不讀往往偶然失之又如常棣外禦其侮叶蒸也無戎吳氏復疑侮當作蒙某却疑古人訓戎為汝如以佐戎辟戎雖小子則戎汝音或通後讀常武詩有南仲大祖大師皇父整我六師以修我戎則協音汝明矣又曰協韻乃吳才老所作某續添之又曰古人情意溫厚寬和言語自恁地好當時協韻只是要便於諷詠而已到得後來一向於字韻上嚴切却無意思漢不如周魏晉不如漢唐不如魏晉本朝又不如唐如元微之劉禹錫之徒和詩猶自有相重密本朝和詩便皆不要一字相同不知却愈壞了詩愚按詩之篇章數少者一章如周頌等篇是也多者或十六章如桑柔是也章之為句少者亦二句如盧令等章多者或三二十句如載芟等章句之字數多是四字如關關雎鳩之類有一字為句者如天作第六句有二字者如鱒魴之類有三字者如螽斯羽之類有五字者如維以不永懷之類有六字者如我姑酌彼金罍之類有七字者如送我乎淇之上矣之類又有八字者如胡瞻爾庭有縣貆兮之類若句之叶韻則有句句用韻者有隔兩句用韻者有隔韻相叶者有隔數句相叶者且章句音韻不特詩為然求之四書亦或有章句之分求之諸經亦時有音韻之叶書則舜臯陶之歌及五子之歌洪範無偏無陂之詠儀禮則士冠禮祝辭醮辭字辭易則爻辭彖象雜卦之類莫不叶韻蓋皆欲其便於吟咏而已詩樂書舜典帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和説見集傳綱領益稷帝曰豫欲聞六律五聲八音在治忽以出納五言汝聽蔡九峰曰在察也忽治之反也聲音之道與政通故審音以知樂審樂以知政而治之得失可知也五言者詩歌之叶於五聲者也自上達下謂之出自下達上謂之納陳大猷曰納采詩而納於上如命大師陳詩以觀民風是也出出詩而播之樂章如關雎用之鄉人用之邦國是也工以納言時而揚之蔡九峰曰命掌樂之官以其所納之言時而揚之也周禮大師教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之本以六律為之音説見集傳綱領樂師凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節鄭氏曰騶虞采蘋采蘩皆樂章名在召南唯貍首在樂記也瞽矇掌九德六詩之歌以役大師射人王射樂以騶虞九節大夫采蘋五節士采蘩五節鄭氏曰奏樂以為射節之差儀禮鄉飲酒禮工歌鹿鳴四牡皇皇者華鄭氏曰鹿鳴采其嘉賓示我以善道又有孔昭之德可則效也四牡采其忠孝之至也皇華采其自以為不及欲咨謀於賢知也笙南陔白華華黍鄭氏曰以笙吹此詩乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀鄭氏曰間代也謂一歌則一吹魚麗采其物多酒旨所以優賓也嘉魚采其以禮下賢者與之宴樂也南山有臺采其憂友賢者為邦家之基民之父母而欲其身之壽考也乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋鄭氏曰合樂謂歌與衆音俱作也關雎葛覃卷耳言后妃之德鵲巢言國君夫人之德采蘩言夫人不失職采蘋言大夫妻能循法度夫婦之道生民之本王政之端此六篇者其教之原也故國君與臣下及四方之賓燕用之合樂也李寶之曰合樂謂堂上歌瑟堂下鐘磬合奏此詩也鄉飲酒義曰工入升歌三終笙入三終間歌三終合歌三終歌及笙每篇為一終間歌每篇為一終合樂鵲巢合關雎采蘩合葛覃采蘋合卷耳每篇在為一終孔氏曰召南三篇越草蟲取采蘋蓋采蘋本草蟲之前孔子以後簡札始倒工告子樂正曰正歌備鄉射禮乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋鄭氏曰不歌不笙不間志在射略於樂也不略合樂者周南召南鄉樂也不可略其正也樂正命大師奏騶虞間若一乃奏騶虞以射歌騶虞若采蘋皆五終鄭氏曰騶虞天子之射節而用之者方冇樂賢之志取其宜也其他賓客卿大夫則歌采蘋間若一樂之節李寶之曰五節之間長短希數如一重樂節也燕禮工歌鹿鳴四牡皇皇者華笙奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀遂歌鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋李寶之曰歌鄉樂者亦與衆聲俱作而歌之鄉飲酒自歌其樂故不言鄉樂也吕東萊曰吕和叔云近講習鄉飲酒鄉射之禮惟恐鄉樂音節不明雖傳得胡安定所定雅音譜有周南召南小雅十數篇而猶闕由庚由儀崇丘南陔白華華黍騶虞七篇大射儀乃歌鹿鳴三終鄭氏曰不歌四牡皇華主於講道略於勞苦與咨事李寶之曰風者鄉樂小雅國君之樂大樂大射皆主於射略於樂然不可略其正故鄉射遂歌鄉樂大射儀乃歌鹿鳴也乃管新宫三終鄭氏曰乃管吹蕩管以播之其篇亡李寶之曰或謂即斯干奏貍首以射鄭氏曰貍首逸詩也貍之言不來也其詩有射諸侯首不朝者之言因以名篇射義所載曽孫侯氏是也李寶之曰詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御於君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂則安則譽也此詩諸侯之射節也四正正爵四行也四行者獻賓獻公獻卿獻大夫乃作樂而射也以燕以射先行燕禮乃射也禮記內則曰十有三年合樂誦詩舞勺何氏曰朱子云樂謂六樂之器學樂誦詩舞勺即周頌則詩為樂章與舞人為節故以詩為樂也樂記子夏曰夫古者為父子君臣以為紀綱紀綱既正天下大定然後正六律和五聲弦歌詩頌此之謂樂子贛見師乙而問焉曰賜聞聲歌各有宜也師乙曰寬而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉故歌者上賞如抗下暇如隊墜曲如折止如稿木倨中去聲矩句如字中鈎勾纍纍乎端如貫珠鄭氏曰言歌聲之著動人心之審所有此事射義騶虞者樂官備也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節卿大夫以循法為節士以不失職為節左氏傳襄公二十九年吳公子札來聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎杜氏曰此皆各依其本國歌所常用聲曲聽聲以為論故無疑言為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎杜氏曰凡美哉皆美其聲譏其煩碎知不能久也為之歌齊曰美哉泱泱乎大風也哉杜氏曰泱泱𢎞大之聲表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎杜氏曰秦本在西戎秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲襄公佐平王東遷而受其故地故曰周之舊為之歌魏曰美哉渢馮渢乎大而婉險而易行杜氏曰渢渢中庸之聲婉約也險當為儉字之誤也大而約則儉節易行以德輔此則明主也為之歌唐曰思嗣深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎杜氏曰淫聲放蕩無所畏忌故曰國無主自鄶以下無譏焉杜氏曰季子聞此二國歌不復譏論之以其微也為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體杜氏曰論其聲其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施去聲而不費取而不貪處而不底抵行而不流五聲和八風平節有度守有序盛德之所同也杜氏曰頌有殷魯故曰盛德所同荀子曰詩者中聲之所止也朱子曰此言為正經而發也毛氏曰古者教以詩樂誦之歌之弦之舞之朱子曰詩者樂之章也故必學樂然後誦詩所謂樂者蓋琴瑟塤篪之類樂之一物以漸習之而節夫詩之音律者然詩本於人之情性有美刺風喻之旨其言近而易曉而從容詠歎之間所以漸漬感動於人者又為易入至於聲音之髙下舞蹈之疾徐所以養其耳目和其心志使人倫肌浹髓而安於仁義禮智之實又有非思勉之所及者又曰三代之時禮樂用於朝廷而下達於閭巷學者諷詠其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲之所助於詩者為多然猶曰興於詩成於樂其求之固有序矣又曰詩較感發人故在先樂則如太史公所謂動蕩血氣流通精神者所以涵養前所得也是以聖賢言詩主於聲者少而發於義者多仲尼所謂思無邪孟子所謂以意逆志者誠以詩之所以作本乎其志之所存然後詩可得而言也得其志而不得其聲者有矣未有不得其志而能通其聲者也就使得之止其鍾鼓之鏗鏘而已豈聖人樂云樂云之意乎況今去孔孟千餘年古樂散亡無復可考而欲以聲求詩則未知古樂之遺聲今皆可推而得乎三百五篇皆可協之音律而被之絃管已乎誠能得之則所助於詩多矣然恐未得為詩之本也況未必可得則今之所講得無有畫餅之譏乎故愚竊以為詩出乎志者也樂出乎詩者也然則志者詩之本而樂者末也又曰詩之作本言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也末雖亡不害本之存患學者不能平心和氣從容諷詠以求之情性之中有得乎此然後可得而言顧所得之淺深何如耳有舜文之文德則聲為律而身為度簫韶二南之聲不患其不作此雖未易言然其理蓋不誣也問詩樂既廢如何曰既無此家具也只得以義理養其心涵泳從容無斯須不和不樂便是樂刪次論語子曰吾自衛反魯然後樂正雅頌各得其所朱子曰當時收詩時已各有編次但經夫子時散失故夫子重新整理未見得刪與不刪如云雅頌各得其所則是還其舊位又曰看來只采得許多詩夫子不曽刪去只是刋定而已好詩便要興發人之善心不好詩便要起人羞惡之心又説見集傳綱領歐陽子曰周南召南邶鄘衛王鄭齊豳秦魏唐陳鄶曹小雅大雅頌此孔子未刪之前周大師樂歌之次第也吕東萊曰季札觀樂次序如此周召邶鄘衛王鄭齊魏唐秦陳檜曹豳此今詩次第也考索張雷叟曰二南王化之基也邶鄘衛商民之先變者也俗變於近而王不能正則王不王也鄭首叛也齊首霸也晉并魏則又伯而秦其甚也是皆王之不王而諸侯肆行莫之禁也陳淫也檜亂也曹奢也紛紛乎益甚而益不可正苟有后稷先公之化如邠者庶乎其可也此名之先後也周召邶鄘衛檜鄭齊魏唐秦陳曹豳王此鄭氏詩譜次第也孔氏曰鄭譜以鄭因虢檜之地而國之先譜檜後譜鄭王在邠後者退就雅頌并言王世故耳程子曰詩有四始而風居首本乎一人而成乎國俗謂之風發於正理而形於天下謂之雅稱美盛德與告其成功謂之頌先之家及於政以底成功其敘然也諸侯之風先後各有義周南召南陳正家之道人倫之端王道之本風之正也故為首二南之風行則人倫正朝廷治及乎周道衰政教失風遂變矣於是諸侯擅相侵伐衛首并邶鄘之地故為變風之首一國之詩而三其名得於衛地者為衛得於邶鄘者為邶鄘所以見其首亂也董氏曰風首衛且先邶鄘以著滅也刑政不能治天下諸侯放恣擅相并滅王迹熄矣故雅亡而為一國之風董氏曰諸侯至於滅國王政不行矣故以王風敘衛下廢法失道則王畿之內亦不能保鄭今畿內之封因周之衰遂自為列國故次以鄭君臣上下之分失則人倫亂而入於禽獸人君身為禽獸之行其風可知故次以齊天下之風至於如此則無不亂之國無不變之俗魏舜禹之都唐帝堯之國久被聖人之化漸成美厚之俗歷二叔之世而遺風尚存今亦變矣故因其舊名而謂之唐所以見意唐魏之風且變則先代之風化中國之禮義消亡極矣是以夷狄強大天下亦相胥而夷矣故次以秦秦之始封秦谷西戎之地國亂乃東侵而始大其俗尚夷故美其始有車馬禮樂而刺其未能用周禮也禮義之俗亡夷狄之風行先聖王之流風遺俗盡矣故次以陳陳舜之後也聖人之都風化所厚也聖人之國典法所存也王澤竭而風化熄矣夷道行而典禮亡矣天下之所以安且治者聖人之道行也聖人之道絶則危亡至矣人情迫於危亡則思治安故思治者亂之極也檜曹懼於危亡而思周道故為亂之終孔氏曰檜曹國小而君奢民勞而政僻季札之所不譏國風次之於末宜哉亂既極必有治之之道危既甚必有安之之理自昔天下何嘗不拯亂而興治革危而為安周家之先由是道也其居豳也趨時務農以厚民生善政美化由兹而始王業之所興也故次以豳孔氏曰豳者周公之事欲尊周公故次於衆國之後小雅之前非諸國之例也王業成而為政於天下故次以雅雅者王者之政也小之先大固其敘也孔氏曰雅見積漸之義故小雅先於大雅政之衰則至於亡詩之亡王道之亡也天下之治始於以正風風天下其終也盛德之著而成功可以告於神明始終之義也故次以頌頌之有魯蓋生於不足王道之隆所歌頌者如是及其衰也如魯之事一已足矣孔氏曰魯以得用天子之禮故借天子美稱之名改稱為頌非周頌之流也置之商頌前者以魯是周同姓故先前代也商則頌前代之美不可廢也故附其後焉
