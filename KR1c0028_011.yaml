body:
  text: 詩傳通釋卷十一元劉瑾撰詩朱子集傳祈父之什二之四析勤衣反父音甫予王之爪牙叶五胡反胡轉予于恤靡所止居賦也祈父司馬也職掌封圻之兵甲故以為號酒誥曰圻父薄違是也孔氏曰古者祈圻畿字通用故此作祈書作圻蔡九峰曰圻父廹逐違命者也予六軍之士也或曰司右虎賁奔之屬也董氏曰司馬之屬有司右虎賁旅賁皆奉事王之左右者也故司右曰凡國之勇力之士能用五兵者屬焉虎賁曰掌先後王而趨以卒伍旅賁曰掌執戈盾夾王車此所謂爪牙者也爪牙鳥獸所用以為威者也孔氏曰鳥用爪獸用牙以防衛此人自謂王之爪牙以鳥獸為喻也恤憂也軍士怨於乆役故呼祈父而告之曰予乃王之爪牙汝何轉我於憂恤之地使我無所止居乎鄭氏曰此責司馬之辭謂見使從軍也六軍之士出自六鄉法不取於王之爪牙之士張子曰禁衛天子之爪牙而使之逺戍所謂轉予於恤也古人容昜出一句便不可及詩人造理深其辭儘難學祈父予王之爪士鉏里反胡轉予于恤靡所底之履反止賦也爪士爪牙之士也底至也祈父亶不聰胡轉予于恤有母之尸饔賦也亶誠尸主也饔熟食也言不得奉養而使母反主勞苦之事也東萊吕氏曰越勾踐伐呉有父母耆老而無昆弟者皆遣歸魏公子無忌救趙亦令獨子無兄弟者歸養則古者有親老而無兄弟其當免征役必有成法故責司馬之不聰其意謂此法人皆聞之汝獨不聞乎乃驅吾從戎使吾親不免薪水之勞也責司馬者不敢斥王也愚按不斥王而責司馬此詩人之忠厚也亦若北山所謂大夫不均之意祈父三章章四句輔氏曰上兩章言我乃王之爪牙汝何轉我於憂恤之地使我無所止居如此則是自戕其上之衛末章言汝乃驅吾從戎而使吾親不免薪水之勞如此則是不體其下之情其言之序亦先公而後私也不戕其上之衛則上得以安必體夫下之情則下不忘其死勾踐無忌之事其用兵猶有古之遺法自秦而下不復如此矣序以為刺宣王之詩説者又以為宣王三十九年戰于千畆王師敗績于姜氏之戎故軍士怨而作此詩東萊吕氏曰大子晉諌靈王之詞曰自我先王厲宣幽平而貪天禍至于今未弭宣王中興之主也至與幽厲並數之其詞雖過觀是詩所刺則子晉之言豈無所自歟吕東萊曰讀是詩見宣王變古制者二焉前兩章刺其以宿衛之士從征役末章見其有親老而無他兄弟者當免征役乃驅之從戎也但今考之詩文未有以見其必為宣王耳下篇放此序刺宣王也皎皎古了反白駒食我場苗縶陟立反之維之以永今朝所謂伊人於焉逍遥賦也皎皎潔白也張子曰以表賢者潔白之意駒馬之未壯者謂賢者所乘也場圃也孔氏曰苗而云埸者以埸圃同地對則異名散則通縶絆其足維繫其靷也永乆也伊人指賢者也逍遥遊息也吕與叔曰徘徊少留之貎為此詩者以賢者之去而不可留也故託以其所乘之駒食我場苗而縶維之庶幾以永今朝使其人得以於此逍遥而不去若後人留客而投其轄於井中也前漢書曰陳遵每大飲輒閉門取客車轄投井中雖有急終不得去皎皎白駒食我場藿火郭反縶之維之以永今夕叶祥龠反所謂伊人於焉嘉客叶克各反賦也藿猶苗也嚴氏曰藿豆葉用以作羹夕猶朝也嘉客猶逍遥也謝疊山曰賢者髙蹈逺引吾知其不可留矣猶欲縶維其白駒以强留之雖一朝一夕亦滿吾意好徳之彛性尊賢之良心在人自不能泯也皎皎白駒賁彼義反又音奔然來叶云俱反思爾公爾侠叶供孤反逸豫無期慎爾優游叶汪胡反勉爾遁思叶新齎反賦也賁然光采之貎也謝疊山曰賁者華采也賢人所過之地山川草木皆有精采蓬戸蓽門皆有輝華也或以為來之疾也王氏讀為奔字言其來之速也思語詞也爾指乘駒之賢人也慎勿過也勉毋决也遁思猶言去意也言此乘白駒者若其肯來則以爾為公以爾為侯而逸樂無期矣猶言横來大者王小者侯也愚按漢髙帝遣使召田横盖謂之大者是王小者是侯招横使來也豈可以過於優游决於遁思而終不我顧哉蓋愛之切而不知好爵之不足縻留之苦而不恤其志之不得遂也愚按此章上四句見其愛之切末二句見其留之苦皎皎白駒在彼空谷生芻楚俱反一束其人如玉毋金玉爾音而有遐心賦也賢者必去而不可留矣於是歎其乘白駒入空谷束生芻以秣之而其人之徳美如玉也蓋己邈乎其不可親矣然猶冀其相聞而無絶也故語之曰毋貴重爾之音聲而有逺我之心也孔氏曰毋得自愛音聲貴如金王不以遺問我夫輔氏曰此章則賢者既去而好賢之誠終無已也見賢而好之固人之情也至於賢者已去而眷戀之情猶不已且祝其無貴重其音聲以有逺我之心焉夫然後見其好賢之誠也白駒四章章六句序大夫刺宣王也宣王始也任賢使能如申伯山甫韓侯或為將或為相或為諸侯如方叔召虎或征蠻荆或伐獫狁或平准夷至其晚年怠心一生如虢文公之徒諫既不行則小人乗間而用事矣故觀祈父之詩則司馬非其人矣小人在位則賢者必不得志矣故白駒之詩留賢者而不肯留也黄鳥黄鳥無集于榖無啄陟角反我粟此邦之人不我肯榖言旋言歸復我邦族賦也榖木名穀善愚按此二榖字異義然據韻則一從木一從禾旋囘復反也民適異國不得其所故作此詩託為呼其黄鳥而告之曰爾無集于榖而啄我之粟苟此邦之人不以善道相與則我亦不乆於此而將歸矣黄鳥黄鳥無集于桑無啄我梁此邦之人不可與明叶謨郎反言旋言歸復我諸兄叶虗王反比也吕東萊曰人之所以相依者以其明足以知其緩急休戚故也不可與明則不可與處矣黄鳥黄鳥無集于栩况甫反無啄我黍此邦之人不可與處言旋言歸復我諸父扶雨反比也王晦叔曰不我肯穀則不相恤矣不可與明則不相知矣是以不可與處也輔氏曰首言復我邦族而已中言復我諸兄末言復我諸父人情困苦之極則愈益思其親者焉黄鳥三章章七句東萊吕氏曰宣王之末民有失所者意他國之可居也及其至彼則又不若故鄉焉故思而欲歸使民如此亦異於還定安集之時矣今按詩文未見其為宣王之世下篇亦然序刺宣王也我行其野蔽必制反芾方味反其樗敕雩反昬姻之故言就爾居爾不我畜復我邦家叶古胡反賦也樗惡木也李迂仲曰樗不才之木莊子云大枝擁腫而不中繩墨小枝卷曲而不中規矩壻之父婦之父相謂曰婚姻爾雅曰壻之父為姻婦之父為婚又曰婦之父母壻之父母相謂為婚姻畜養也民適異國依其婚姻而不見收卹故作此詩言我行於野中依惡木以自蔽於是思昏姻之故而就爾居而爾不我畜也則將復我之邦家矣我行其野言采其蓫敕六反昬姻之故言就爾宿爾不我畜言歸思復賦也蓫牛􅪞頺惡菜也今人謂之羊蹄菜我行其野言采其葍音福叶筆力反不思舊姻求爾新特成論語作誠不以富亦秪音支以異叶逸織反賦也葍䔰浮去聲惡菜也特匹也言爾之不思舊姻而求新匹也雖實不以彼之富而厭我之貧亦秪以其新而異於故耳此見詩人責人忠厚之意輔氏曰常人之情有不得已來依親舊而不見收恤則怨怒形於色辭苛責痛詆無所不至而此詩但言爾不我畜則復我邦家而已至其末章則又原其情實而歸之忠厚焉此情性之正而詩之所謂可以怨者於此見矣我行其野三章章六句王氏曰先王躬行仁義以𨗳民厚矣猶以為未也又建官置師以孝友睦姻任䘏六行教民為其有父母也故教以孝為其有兄弟也故教以友為其有同姓也故教以睦為其有異姓也故教以姻為隣里鄉黨相保相愛也故教以任相賙相救也故教以恤能剛大曰孝順於父母友和於兄弟睦睦於宗族姻親於外親任信於朋友恤周於隣里鄉黨以為徒教之或不率也故使官師以時書其徳行而勸之以為徒勸之或不率也於是乎有不孝不睦不婣不弟不仕不卹之刑焉何氏曰鄭氏云制刑之意終不為卑者而罪其長故六行則教兄以友而制刑則謂之不悌使少者不敢陵長也賈氏云此不悌即六行之友上文言友在睦婣之上專施於兄弟此變言弟退在睦婣之下兼施於師長方是時也安有如此詩所刺之民乎序刺宣王也秩秩斯干叶居焉反幽幽南山叶所旃反如竹苞叶補苟反矣如松茂叶莫口反矣兄及弟矣式相好呼報反叶許厚反矣無相猶叶余乆反矣賦也秩秩有序也斯此也干水涯也南山終南之山也劉執中曰南山在鎬京之陽苞叢生而固也猶謀也此築室既成而燕飲以落之因歌其事言此室臨水而面山其下之固如竹之苞其上之宻如松之茂又言居是室者兄弟相好而無相謀則頌禱之辭猶所謂聚國族於斯者也嚴氏曰宣王作室之地在柣秩然整齊之干岸面對幽幽然深逺之南山言地勢之壯也其盤基之厚如竹之叢生其結架之宻如松之茂盛言宫室之美也於是頌禱之願其入居此室之後兄弟各相和好無有相圖者矣歐陽子曰古人成室而落之必有稱頌祝禱之言如記擅弓晋獻文子成室張老曰云云歌於斯哭於斯聚國族於斯君子謂之善頌善禱者是矣張子曰猶似也人情大抵施之不報則輟故恩不能終兄弟之間各盡已之所宜施者無學其不相報而廢恩也君臣父子朋友之間亦莫不用此道盡已而已愚按此於文義或未必然然意則善矣問横渠説不要相學指何事而言曰不要相學不好處且如兄能友弟弟却不能恭其兄兄豈可學弟之不恭而遂亦不友如弟能恭其兄兄乃不友其弟為弟者豈可亦因兄之不友而遂忘其恭如冦萊公撻倒用印事王文正公謂他既不是則不可學他不是亦是此意然詩之本意猶字作相圖謀輔氏曰言兄弟相好者恐與蓼蕭三章同意天子諸侯繼立多與兄弟相疑忌所以祝其相好而無相謀也或曰猶當作尤似續妣必履反祖築室百堵西南其戸胡五反爰居爰處爰笑爰語賦也似嗣也妣先於祖者協下韻爾或曰謂姜嫄后稷也曽氏曰似續妣祖以生民閟宫之詩考之豈謂姜嫄后稷與西南其戸天子之宫其室非一在東者西其戸在北者南其戸猶言南東其畆也爰於也輔氏曰大凡人之為居室未有不欲為子孫計而使之繼嗣其祖妣之業者也西南其戸者舉西南以見東北也爰笑爰語則所謂歌於斯者也約之閣閣椓陟角反之槖槖音託風雨攸除直慮反鳥䑕攸去君子攸芋香于反叶王遇反賦也約束板也閣閣上下相乗也嚴氏曰即所謂束板以載也椓築也槖槖杵聲也除亦去也無風雨鳥䑕之害言其上下四旁皆牢宻也芋尊大也君子之所居以為尊且大也濮氏曰此以下由外而内由垣墻而堂寢次第當然也愚按此章言其墻壁之美而為君子尊大之居也盖古人築垣為壁堂上東西墻謂之序室房及夾室謂之墉堂下謂之壁謂之墻其實一也隨所在而異其名考于儀禮可見如跂音企斯翼如矢斯棘如鳥斯革叶訖立反如翬音輝斯飛君子攸躋子西反賦也跂竦立也孔氏曰如跂如人跂足直立翼敬也棘急也矢行緩則枉急則直也革變翬矩鄭氏曰伊雒而南雉素質五色皆備成章曰翬躋升也言其大勢嚴正如人之竦立而其恭翼翼也其亷隅整飭如矢之急而直也其棟宇峻起如鳥之警而革也其簷阿華采而軒翔如翬之飛而矯其翼也吕與叔曰如翬斯飛覆以瓦而加丹臒有文采而勢騫舉也蓋其堂之美如此而君子之所升以聽事也殖殖市力反其庭有覺其楹噲噲音快其正叶音征噦噦呼㑹反其㝠君子攸寧賦也殖殖平正也庭宫寢之前庭也李寳之曰堂下至門謂之庭庭三堂之深覺髙大而直也楹柱也噲噲猶快快也正向明之處也噦噦深廣之貎㝠奥窔要之間也王介甫曰噲噲其正則知噦噦其㝠是偏也噦噦其㝠則知噲噲其正是明也董氏曰正所謂陽室也㝠所謂隂室也李實之曰室中西南隅謂之奥邢昺云室戸不當中而近東西南隅最為深隱故謂之奥東南隅謂之窔郭氏云窔亦隱闈言其室之美如此而君子之所休息以安身也下莞音官上簟叶徒檢徒錦二反乃安斯寢叶于檢于錦二反乃寢乃興乃占我夢叶彌登反吉夢維何維熊維羆彼宜反叶彼何反維虺詐鬼反維蛇市奢反叶于其士何二反賦也莞蒲席也竹葦曰簟孔氏曰西方人呼蒲為莞蒲司几筵有莞筵蒲筵則兩種席也濮氏曰莞又云燈心草生池澤中即苻蘺也下莞則鋪席其上則竹葦之簟所以覆席羆似熊而長頭髙脚猛憨呼談切憾平聲多力能拔樹孔氏曰羆黄白文黄白色徤本草曰熊類大豕而性輕好攀縁上髙木虺蛇屬細頸大頭色如文綬大者長七八尺祝其君安其室居夢兆而有祥亦頌禱之詞也下章放此嚴氏曰設為之詞非實有是夢也歐陽子曰下至卒章盛陳占夢生子之事者謂安此寢而生男女男則世為君王女子宜人之家室皆禱頌之詞也大音泰人占之維熊維羆男子之祥維虺維蛇女子之祥愚按熊蛇字叶韻上同賦也大人大卜之屬占夢之官也愚按周禮大卜為卜筮官之長凡卜師卜人龜人菙氏占人簭人占夢皆其官屬也菙音水熊羆陽物在山彊力壯毅男子之祥也虺蛇隂物穴處柔弱隱伏女子之祥也或曰夢之有占何也曰人之精神與天地隂陽流通故晝之所為夜之所夢其善惡吉凶各以類至是以先王建官設屬使之觀天地之㑹辨隂陽之氣周禮占夢注曰天地之㑹建厭所處之日辰隂陽之氣休王前後厭音琰王音旺以日月星辰占六夢之吉凶占夢曰一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢注云日月星辰謂日月之行及合辰所在也正夢無所感動平安自夢噩夢驚愕而夢思慶覺時所思念之而夢寤夢覺時道之而夢喜夢喜悦而夢懼夢恐懼而夢噩音愕獻吉夢贈惡夢占夢曰季冬獻吉夢于王乃舍萌于四方以贈惡夢注云獻羣臣之吉夢于王詩云牧人乃夢此所獻吉夢也舍讀為釋舍萌猶釋菜萌菜始生也贈送也欲以新善去故惡其於天人相與之際察之詳而敬之至矣輔氏曰詳占夢之意則先王致察於天人之際可謂宻矣惜乎其法之不傳也然後世之人情性不治畫之所為猶且昏惑瞀亂而不自知覺則其見於夢寐者率多紛紜乖戾未必與天地之氣相流通其間縱有徵兆之可驗者亦須迂囘隱約必待其既驗而後可知極有未易遽曉者想古占法雖存亦未必能盡也故曰王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正真氏曰巫掌祀以鬼神之事告王史掌書以三皇五帝之事告王掌卜筮者以吉凶誎王瞽曚之叟以歌詩諌王一人之身而左右前後挟而維之以引以翼有孝有徳雖欲斯須自放得乎故王中心他無所為惟守至正而已乃生男子載寢之牀載衣於既反之裳載弄之璋其泣喤喤華彭反叶胡光反朱芾音弗斯皇室家君王賦也半圭曰璋喤大聲也芾天子純朱諸侯黄朱吕東萊曰白虎通云芾者蔽也行以蔽前天子朱芾諸侯赤芾以韋為之上廣一尺下廣二尺皇猶煌煌也君諸侯也寢之於牀尊之也衣之以裳服之盛也弄之以璋尚其徳也言男子之生於是室者皆將服朱芾煌煌然有室有家為君為王矣乃生女子載寢之地載衣之禓他計反載弄之瓦叶魚位反無非無儀叶音義唯酒食是議無父母詒以之反罹叶音麗賦也禓褓也孔氏曰禓縛兒被也瓦紡塼也瓦紡時所用之物舊見人畫列女傳漆室女手執一物如今銀子様者意其為紡塼也然未可必儀善罹憂也寢之於地卑之也衣之以褓即其用而無加也弄之以瓦習其所有事也有非非婦人也有善非婦人也盖女子以順為正無非足矣有善則亦非其吉祥可願之事也唯酒食是議而無遺父母之憂則可矣易曰无攸遂在中饋貞吉易家人六二爻程子曰柔順中正婦人之道也婦人居中而主饋者也故曰中饋之愚按婦人於事無所敢自遂正位乎内事在饋食間而已六二隂爻居隂位則柔順得正居下體之中則得中故其象為无攸遂在中饋而其占者能如此則為得正而吉无攸遂即無非無儀也在中饋即唯酒食是議也而孟子之母亦曰婦人之禮精五飯幂宻酒漿養舅姑縫衣裳而已矣故有閨門之脩而無境外之志此之謂也記月令五飯春食麥夏食菽食稷秋食麻冬食黍列女傳曰孟子曰今道不用而母老是以憂也母曰夫婦人之禮云云易曰在中饋旡攸遂詩曰無非無儀以言婦人無擅制之義也子行乎子義吾行乎吾禮而已君子謂孟母知婦道斯干九章四章章七句五章章五句吕與叔曰一章願其保兄弟於斯二章願其繼祖妣於斯三章四章五章願其安身體於斯六章七章八章九章願其傳子孫於斯輔氏曰一章則言其宫之面勢而禱其兄弟之相好也二章則言其宫之寛廣而禱其祖妣之是嗣也三章則言其宫之成而禱其君子所居以為尊大也四章則言其堂之美而禱其君子所躋升以聽事也五章則言其室之美而禱其君子所休息以安身也六章以至九章則禱其身安夢兆於是而生男則室家君王於是而生女則無遺父母之憂也頌禱之辭始於兄弟之和睦而終於兒女之賢善家道之成無踰於此者矣舊説厲王既流于彘宫室圮壞愚按厲王出居于彘凡十四年而后宣王立故疑其國都宫室之壞也故宣王即位更作宫室既成而落之今亦未有以見其必為是時之詩也或曰儀禮下管新宫春秋傳宋元公賦新宫恐即此詩然亦未有明證燕禮曰下管新宫大射儀曰乃管新宫三終李寳之云昭公二十五年宋公享叔孫昭子賦新宫與此所笙奏或謂即斯干詩輔氏曰若以儀禮之下管新宫當之則此詩非宣王之詩矣序宣王考室也鄭氏曰考成也孔氏曰雜記云路寢成則考之而不釁注曰設盛食以落之誰謂爾無羊三百維羣誰謂爾無牛九十其犉而純反爾羊來思其角濈濈莊立反爾牛來思其耳濕濕始立反賦也黄牛黒唇曰犉羊以三百為羣其羣不可數也牛之犉者九十非犉者尚多也董氏曰三百維羣以羣計也九十其犉以犉計也黒唇為犉則黑皆為牰黒耳為犚亦各以其數也皆音砌牰音袖犚音尉聚其角而息濈濈然呞癡而動其耳濕濕然擇文曰呞食已復出嚼之也王氏曰濈濈和也羊以善觸為患故言其和謂聚而不相觸也濕濕潤澤也牛病則耳燥安則潤澤也陸農師曰古之視牛者以耳祭義所謂大夫袒而毛牛尚耳此詩言牧事有成而牛羊衆多也或降于阿或飲于池叶唐何反或寢或訛爾牧來思何河可反蓑素多反何笠或負其餱音侯三十維物叶㣲律反爾牲則具叶居律反賦也訛動何揭音竭擔也也蓑笠所以備雨三十維物齊其色而别之凡為色三十也言牛羊無驚畏鄭氏曰降阿飲池或寢或訛者美其無所驚畏也而牧人持雨具齎飲食從其所適以順其性是以生養蕃息至於其色無所不備而於用無所不有也爾牧來思以薪以蒸之承反以雌以雄叶于陵反爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升賦也麄曰薪細曰䒱雌雄禽獸也矜矜兢兢堅强也騫虧也崩羣疾也王介甫曰矜矜兢兢牧之者不失其性而至堅强也不騫不崩言羊得其性而無耗敗也言羊而不言牛者羊善耗敗則牛可知矣埤雅曰羊死善耗敗故於不騫不崩本羊言之六畜之死皆善耗敗而羊為甚要術曰羊有疾輟相汙徐鉉曰羊以瘦為病故羸從羊詩曰不騫為是故也肱臂也既盡也升入牢也言牧人有餘力則取薪蒸搏禽獸其羊亦馴擾從人不假箠楚但以手麾之使來則畢來使廾則既升也牧人乃夢衆維魚矣旐音兆維旟音餘矣大人占之衆維魚矣實維豐年叶尼因反旐維旟矣室家溱溱側巾反賦也占夢之説未詳溱溱衆也或曰衆謂人也旐郊野所建統人少旟州里所建統人多周禮大司馬曰郊野載旐司常曰州里建旟蓋人不知魚之多旐所統不如旟所統之衆故夢人乃是魚則為豐年旐乃是旟則為人衆毛氏曰隂陽和則魚衆多埤雅曰俗云春魚遺子如粟埋於泥中明年水及故岸則皆化而為魚如遇旱乾水不及故岸則其子為日暴乃生飛蝗故説者以為隂陽和則魚多豐年夢魚理或然也嚴氏曰考牧之詩亦當有頌禱之語以終之宣王承饑饉離㪚之後所願者年豐民庶故就牧事設夢以頌禱之耳李迂仲曰此章亦如斯干言占夢之事也吕東萊曰以斯干無羊之卒章觀之所願乎上者子孫昌盛所願乎下者歲熟民滋皆不願乎其外也無羊四章章八句黄實夫曰古人以畜之多寡而卜其人之盛衰故奉牲以告曰博碩肥腯謂民力之普存也謂其備腯咸有也於是民和而神降之福此禱頌之詞所以詳及於牛羊之衆多牧人之安逸以見民物富庶之效也斯干無羊之夢皆是設辭非果有是事序宣王考牧也節音截下同彼南山維石巖巖赫赫師尹民具爾瞻叶側銜反憂心如惔徒藍反不敢戲談國既卒子律反斬叶側御反何用不監古銜反興也節髙峻貎截然大貎巖巖積石貎赫赫顯盛貎師尹大泰師尹氏也大師三公尹氏蓋吉甫之後春秋書尹氏卒公羊子以為譏世卿者即此也隱公三年公羊傳曰其稱尹氏何譏世卿注世卿者父死子繼也言氏者起其世也若曰世世尹氏也李迂仲曰春秋後又書尹氏立王子朝則尹氏之為世卿其來甚乆具俱瞻視惔燔卒終斬絶監視也此詩家父甫所作刺王用尹氏以致亂言節彼南山則維石巖巖矣赫赫師尹則民具爾聸矣而其所為不善使人憂心如火燔灼又畏其威而不敢言也然則國既終斬絶矣汝何用而不察哉嚴氏曰言師尹失民望鎬京面對終南故以所見起興節彼南山有實其猗於宜反叶於何反赫赫師尹不平謂何天方薦徂殿反瘥才何反䘮息浪反亂𢎞多民言無嘉叶居何反憯七感反莫懲嗟叶遭哥反興也有實其猗未詳其義傳曰實滿猗長也箋云猗倚也言草木滿其旁倚之畎谷也或以為草木之實猗猗然皆不甚通輔氏曰有實其猗先生以為諸説皆不甚通者盖與不平之意不相似耳然鄭氏之意大鑿而或者之説似可通故蘇氏亦云草木山之實也山之生物平均如一凡草木之生於上者無不猗猗其長也如此則與不平之意相近矣愚按以左傳我落其實與衛風緑竹猗猗之語觀之或可為集傳第三説之証薦荐通重直用反也瘥病𢎞大憯曾懲創也節然南山則有實其猗矣赫赫師尹而不平其心則謂之何哉蘇氏曰為政者不平其心則下之榮瘁勞佚有大相絶者矣是以神怒而重之以䘮去聲亂人怨而謗讟徒谷反其上然尹氏曽不懲創咨嗟求所以自改之也尹氏大音泰師維周之氐丁禮反叶都黎反秉國之均四方是維天子是毗婢尸反俾民不迷不弔昊天不宜空我師叶霜夷反賦也氐本均平均本當從金如所謂泥之在均者不知鈞是何物潘時舉曰恐只是為瓦器者所謂車盤是也盖運得愈急則其成器愈快曰也秉國之均只是此義今訓平者此物亦惟平乃能運維持毗輔弔愍空窮師衆也言尹氏大師維周之氐王介甫曰京室以大族為氐朝廷以尊官為氐氐者安危存亡所出也尹氏大族也大師尊官也而秉國之均則是宜有以維持四方毗輔天子而使民不迷乃其職也今乃不平其心而既不見愍弔於昊天矣則不宜乆在其位使天降禍亂而我衆并及空窮也吕東萊曰空我師如空其國空其地之類盖曰人之類將滅矣甚言之也弗躬弗親庶民弗信叶斯人反弗問弗仕徂里反下同勿罔君子叶奬里反式夷式已無小人殆叶養里反瑣瑣素火反姻亞則無膴音武仕賦也仕事罔欺也君子指王也夷平已止王介甫曰已廢退也孟子所謂士師不能治事則己之與此已同義殆危也瑣瑣小貎壻之父曰姻兩壻相謂曰亞孔氏曰言每一人娶姊一人娶妹相亞次也膴厚也言王委政於尹氏尹氏又委政於姻婭之小人而以其未嘗問未嘗事者欺其君也故戒之曰汝之弗躬弗親庶民已不信矣其所弗問弗事則豈可以罔君子哉當平其心視所任之人有不當者則已之無以小人之故而至於危殆其國也𤨏𤨏姻婭而必皆膴仕則小人進矣自古小人其初只是他自竊國柄少間又引得别人來一齊不好了如尹氏大師却只是他一箇不好到那瑣瑣姻婭處是幾箇人不好了昊天不傭敕龍反降此鞠九六反訩音凶昊天不恵降此大戾君子如届音戒叶居例反俾民心闋古穴反叶苦桂反君子如夷惡鳥路反怒是違賦也傭均鞠窮訩亂戾乖届至闋息違逺也昊天不均而降此窮極之亂昊天不順而降此乖戾之變嚴氏曰罹師尹之禍而歸之於天曰降此鞠訩降此大戾謂天生小人以禍天下也然所以靖之者亦在夫人而已君子無所偏而平其心則式夷式已而民之惡怒逺矣傷王與尹氏之不能也夫為政不平以召禍亂者人也而詩人以為天實為之者蓋無所歸咎而歸之天也抑有以見君臣隱諱之義焉有以見天人合一之理焉後皆放此輔氏曰鞠凶大戻不過如二章所言天怒人怨之事也然其所以銷去之者亦在夫人而已矣故君子如届俾民心闋君子如夷惡怒是違不啻如反手之易初言天而後止言人者天人一理人心悦則天意解矣先生發明有以見君臣隱諱之義有以鬼天人合一之理之説先儒所不及施之變雅刺詩皆可通也愚按此詩後章言不弔不平正月言天之杌我天夭是椓十月之交言天命不徹雨無正言降䘮疾威小旻言旻天疾威小弁言天之生我我辰安在巧言言昊天已威昊天泰憮以及變大雅板言上帝板板天之方難方蹶方虐方懠蕩言疾威上帝天降熖徳聸仰言不恵而降厲召旻言疾威而降䘮皆與此章言天之意同一致者其詩人之情性有同然者與不弔昊天叶鐵因反亂靡有定叶唐丁反式月斯生叶桑經反俾民不寧憂心如酲音呈誰秉國成不自為政叶諸盈反卒勞百姓叶桑經反賦也酒病曰酲成平卒終也蘇氏曰天不之恤故亂未有所止而禍患與歲月増長上聲君子憂之曰誰秉國成者嚴氏曰憂心如酲猶黍離言中心如醉胡庭芳曰秉國成即上章秉國均斤尹氏也乃不自為政而以付之姻婭之小人其卒使民為去聲之受其勞弊以至此也駕彼四牡四牡項領我聸四方蹙蹙子六反靡所騁敕領反賦也項大也蹙蹙縮小之貎言駕四牡而四牡項領可以騁矣而視四方則皆昏亂蹙蹙然無可徃之所亦將何所騁哉東萊吕氏曰本根病則枝葉皆瘁是以無可徃之地也嚴氏曰家父駕此四牡其四牡大領非不肥壯然視四方蹙蹙然縮小無可馳騁之地是以留而不去蓋由亂則若見天地之狹如唐人詩云出門即有礙誰謂天地寛也彼特為一身言之此則為天下國家而言也方茂爾惡相息亮反爾矛矣既夷既懌如相醻市由反矣賦也茂盛相視懌説也言方盛其惡以相加則視其矛㦸如欲戰鬭及既夷平悦懌則相與歡然如賔主而相醻酢不以為怪也蓋小人之性無常而習於鬭亂其喜怒之不可期如此是以君子無所適而可也昊天不平我王不寧不懲其心覆芳服反怨其正叶諸盈反賦也尹氏之不平若天使之故曰昊天不平若是則我王亦不得寧矣然尹氏猶不自懲創其心乃反怨人之正己者則其為惡何時而已哉吕東萊曰篇將終矣復嘆曰昊天其使尹氏不平乎我王其不得安寧乎今尹氏不懲創其惡覆怨正人之攻己者方且報復而未已吾是以憂吾君之不得寧也此憂豈為身哉輔氏曰不懲其心覆怨其正自古小人處禍亂之常態凡有不得者皆反求諸已其身正而天下歸之則君子已亂之要術也家父音甫作誦叶疾容反以究王訩式訛爾心以畜許六反萬邦叶卜工反賦也家氏父字周大夫也究窮訛化畜養也家父自言作為此誦以窮究王政昏亂之所由兾其改心易慮以畜養萬邦也陳氏曰尹氏厲威使人不得戯談而家父作詩乃復自表其出於已以身當尹氏之怒而不辭者蓋家父周之世臣義與國俱存亡故也孔氏曰詩人之情不一或微加諷諭或指斥愆咎或隱匿姓名或自顯官字家父盡忠竭誠不彈誅罰故自載字寺人孟子亦此類也東萊吕氏曰篇終矣故窮其亂本而歸之王心焉致亂者雖尹氏而用尹氏者則王心之蔽也輔氏曰東萊謂篇終矣故窮其亂本而歸之王心焉此説當矣故直至此章方説個王字蓋言至此則王亦不得不任其責前章雖當譏尹氏之用小人而不及王然王之所以用尹氏者亦不能逃其責矣李氏曰孟子曰人不足與適也政不足與間也惟大人為能格君心之非蓋用人之失政事之過雖皆君之非然不必先論也惟格君心之非則政事無不善矣用人皆得其當矣節南山十章六章章八句四章章四句序以此為幽王之詩而春秋桓十五年有家父來求車於周為桓王之世上距幽王之終已七十五年不知其人之同異大抵序之時世皆不足信今姑闕焉可也愚按春秋隱公三年三月平王崩而四月尹氏卒桓公八年桓王使家父來聘十五年使家父來求車計家父來聘之時上距尹氏之卒才十七年恐即此詩之尹氏家父也且此詩刺尹氏為政不平而曰國既卒斬何用不監曰䘮亂𢎞多􅉃莫懲嗟曰降此鞠訩降此大戾等語皆似亂亡以後之詞疑此或東遷後詩也序家父刺宣王也家父見本篇正音政月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京叶居良反哀我小心癙音䑕憂以痒音羊賦也正月夏之四月謂之正月者以純陽用事為正陽之月也繁多訛偽將大也京京亦大也癙憂幽憂也痒病也此詩亦大夫所作言霜降失節不以其時范氏曰正月長養之月也繁霜肅殺之氣也既使我心憂傷矣而造為姦偽之言以惑羣聽者又方甚大董氏曰霜降非時災降于上也訛言非常禍起於下也上下如此則國亡無日矣吕東萊曰凡譸張為幻以罔上惑衆者皆謂之訛言然衆人莫以為憂故我獨憂之以至於病也父母生我胡俾我瘉音庾不自我先不自我後叶下五反好言自口叶孔五反下同莠餘乆反言自口憂心愈愈是以有侮賦也瘉病自從莠醜也王介甫曰莠惡也榖謂之善則莠惡可知愈愈益甚之意疾痛故呼父母而傷己適丁是時也訛言之人虗偽反覆言之好醜皆不出於心而但出於口是以我之憂心益甚而反見侵侮也輔氏曰夫君子之處亂世彼以為是而已以為非彼以為樂而已以為憂動與衆違此所以反見侵侮也憂心惸惸其營反念我無禄民之無辜并必政反其臣僕哀我人斯于何從禄聸烏爰止于誰之屋賦也惸惸憂意也無禄猶言不幸爾辜罪并俱也古者以罪人為臣僕亡國所虜亦以為臣僕箕子所謂商其淪䘮我罔為臣僕是也言不幸而遭國之將亡與此無罪之臣將俱被囚虜而同為臣僕未知將復從何人而受禄謝疊山曰忠臣不事二君義士不食周粟所可哀者一世之人不知當從何人而受禄乎輔氏曰民指在下之民人則并上下而言之如視鳥之飛不知其將止於誰之屋也聸彼中林侯薪侯蒸之丞反民今方殆視天夢夢莫工反叶莫登反既克有定靡人弗勝音升有皇上帝伊誰云憎興也中林林中也侯維殆危也夢夢不明也皇大也上帝天之神也程子曰以其形體謂之天以其主宰謂之帝言聸彼中林則維薪維䒱分明可見也愚按大者為薪細者為䒱甚分明也民今方危殆疾痛號訴於天而視天反夢夢然若無意於分别善惡者然此特值其未定之時耳及其既定則未有不為天所勝者也夫天豈有所憎而禍之乎福善禍淫亦自然之理而已申包胥曰人衆則勝天天定亦能勝人疑出於此謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊音信之占夢叶莫登反具曰予聖誰知烏之雌雄叶胡陵反賦也山脊曰岡廣平曰陵懲止也故老舊臣也訊問也占夢官名掌占夢者也具俱也烏之雌雄相似而難辨者也歐陽子曰凡禽烏雌雄多以首尾毛色不同别之烏之首尾毛色雌雄不異人所難别謂山蓋卑而其實則岡陵之崇也今民之訛言如此矣而王猶安然莫之止也及其詢之故老訊之占夢則又皆自以為聖人亦誰能别其言之是非乎輔氏曰故老舊臣可以决事理之是非者也占夢之官可以决徵兆吉凶者也今也不平心據實而言而但皆自以為聖人而已耳誰能别其言之果是果非乎子思言於衛侯曰君之國事將日非矣公曰何故對曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰予聖誰知烏之雌雄抑亦似君之君臣乎謂天蓋髙不敢不局叶居亦反謂地蓋厚不敢不蹐井亦反維號音豪斯言有倫有脊哀今之人胡為虺吁鬼反蜴星厯反賦也局曲也孔氏曰曲身也蹐累足也説文曰少歩也號長言之也脊理蜴螈也虺蜴皆毒螫釋之蟲也孔氏曰釋魚云蠑螈蜥蜴也蠑音榮蜥音昔蜴音亦言遭世之亂天雖髙而不敢不局地雖厚而不敢不蹐其所號呼而為此言者又皆有倫理而可考也哀今之人胡為肆毒以害人而使之至此乎王介甫曰人號呼而出斯局蹐之言者非誤也乃有倫序有脊理謝疊山曰身在天地間如無所容則人之害人者為虺為蜴世道亦可哀矣輔氏曰所謂此者即上所言跼蹐而不敢自安者也瞻彼阪音反田有菀音欝其特天之扤五忽反我如不我克彼求我則如不我得執我仇仇亦不我力興也阪田崎嶇墝敲埆學又音確之處菀茂盛之貎特特生之苗也扤動也胡庭芳曰扤有齟齬頓挫之意力謂用力聸彼阪田猶有菀然之特而天之扤我如恐其不我克何哉亦無所歸咎之詞也夫始而求之以為法則惟恐不我得也及其得之則又執我堅固如仇讎然然終亦莫能用也求之甚艱而棄之甚易其無常如此鄭氏曰言有貪賢之名無用賢之實蘇氏曰書云凡人未見聖若不克見既見聖亦弗克由聖此之謂也心之憂矣如或結之今兹之正胡然厲叶力桀反矣燎力詔反之方揚寧或滅之赫赫宗周褒姒音似烕呼悦反之賦也正政也厲暴惡也火田為燎揚盛也宗周鎬京也褒姒幽王之嬖妾褒國女姒姓也褒人有罪入此女以贖罪是為褒姒幽王為廢申后及太子而立以為后烕亦滅也言我心之憂如結者為國政之暴惡故也燎之方盛之時則寧有能撲而滅之者乎然赫赫然之宗周而一褒姒足以滅之蓋傷之也時宗周未滅以褒姒滛妬䜛諂而王惑之知其必滅周也歐陽子曰此上七章皆述王信訛言亂政至此始言滅周主於褒姒者謂王溺女色而致昏惑推其禍亂之本以歸罪也或曰此東遷後詩也時宗周已滅矣其言褒姒烕之有監戒之意而無憂懼之情似亦道已然之事而非慮其將然之詞今亦未能必其然否也愚按章末四句語意反覆相應其言燎之難滅正以嘆傷宗周之易烕真似道已然之事竊恐或説為長且使宗周未滅褒姒方寵則詩人之言未應指斥如是也若以下篇豔妻煽方處之語証之彼詞則又㣲婉雖作於褒姒嬖盛之時固無嫌也終其永懷又窘求隕反隂雨其車既載才再反乃棄爾輔叶扶雨反載如字輸爾載才再反將七羊反伯助予演女反比也隂雨則泥濘寧去聲而車易以陷也載車所載也輔如今人縛杖於輻以防輔車也孔氏曰輔是可解脱之物輸墮隳也將請也伯或者之字也蘇氏曰王為淫虐譬如行險而不知止君子永思其終知其必有大難故曰終其永懷又窘隂雨王又不虞難之將至而棄賢臣焉故曰乃棄爾輔君子求助於未危故難不至苟其載之既墮而後號伯以助予則無及矣無棄爾輔員音云于爾輻方六反叶筆力反屢顧爾僕不輸爾載叶節力反終踰絶險曾是不意叶乙力反比也貟益也輔所以益輻也屢數顧視也僕將車者也此承上章言若能無棄爾輔以益其輻而又數數顧視其僕則不墮爾所載而踰於絶險若初不以為意者蓋能謹其初則厥終無難也范氏曰治天下者任重道逺故以將車為喻一説王曾不以是為意乎胡庭芳曰苟能如上文所戒尚可以踰厯絶險之地而保其終也顧乃曾是不以為意乎魚在于沼之紹反叶音灼亦匪克樂音洛潛雖伏矣亦孔之炤音灼憂心慘慘七感反當作懆七各反念國之為虐比也沼池也炤明易見也魚在于沼其為生已蹙矣其潜雖深然亦炤然而易見言禍亂之及無所逃也嚴氏曰魚相忘於江湖者也今在池沼非所樂矣喻君子立亂朝亦非所樂也魚雖蔵伏然沼之水淺亦甚炤然易見無所逃於罔罟之害喻君子雖自韜晦亦未必能避患也彼有㫖酒又有嘉殽户交反無韻未詳洽比毗志反其隣昏姻孔云念我獨兮憂心慇慇賦也洽比皆合也云旋也李迂仲曰與其親戚周旋也慇慇然痛也言小人得志有㫖酒嘉殽以合比其鄰里怡懌其昏姻而我獨憂心至於疾痛也王介甫曰君子困蹙而小人得志也歐陽子曰大夫既自傷將及禍而又哀彼衆人不知危亡可憂而猶有以酒肴與其鄰里親戚為樂者而我獨憂也昔人有言燕雀處堂母子相安自以為樂也突决棟焚而怡然不知禍之將及其此之謂乎李迂仲曰國勢如此而小人徒乃羣居飲酒以相樂殆燕雀之類也佌佌音此彼有屋蓛蓛音速方有榖民今之無禄天天於遥反是椓陟角反叶都木反哿哥我反矣冨人哀此惸獨賦也佌佌小貎蓛蓛窶巨陋貎指王所用之小人也榖禄夭禍椓害哿可獨單也佌佌然之小人既有屋矣蓛蓛窶陋者又將有榖矣而民今獨無禄者是天禍椓䘮之耳亦無所歸咎之詞也亂至於此富人猶或可勝惸獨甚矣李迂仲曰哀亂之由要其極也貧富俱受其禍言其一時之虐政冨者之財猶可以勝其求貧者愈不堪也胡庭芳曰前章念我獨兮憂心慇慇若唯及其私矣此章哿矣富人哀此惸獨其不忘天下之情如此吕東萊曰勞役之甚者自較其輕重故曰土國漕我獨南行困苦之甚者自較其淺深故曰哿矣冨人哀此惸獨使民至是蓋甚可憐矣此孟子所以言文王發政施仁必先鰥寡孤獨也正月十三章八章章八句五章章六句序大夫刺幽王也十月之交朔日辛卯叶莫後反日有食之亦孔之醜彼月而㣲此日而微今此下民亦孔之哀叶於希反賦也十月以夏正言之建亥之月也交日月交㑹謂晦朔之間也厯法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度問周天之度是自然是強分曰天一晝夜行一周又過一度以其行過處一日作一度三百六十五度四分度之一方是一周也董鼎曰沈存中云天何嘗有度以日行三百六十五日而一朞强謂之度以歩日月五星行度而已陳尚得云天日者氣數之始其每日之進退既有常則故一日之進退遂為一度三百六十五日四分日之一進退一周而周天之數遂為三百六十五度四分度之一凡星辰逺近之相去月與五星之行皆以其度為度焉度数也則也天本無度以與日離合而成天日東西行其周布本東西而縱横南北皆以其度為數愚按古厯法每度九百四十分四分度之一該九百四十分内之一百三十五分然天之為體即星辰次舍周布之定體也天之為度即二十八宿縱横布列之度數也天之左行一日一周而過一度即其星辰次舍度数之全體旋轉於大虚空中既一周匝而復過其既匝之西以度凖之適满一度是一日内共該行過三百六十六度二百三十五分也日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七董鼎曰書傳謂日月亦左旋横渠曰天左旋處其中者順之故日月五星亦左旋此洞見天道之流行就地面而順觀之也論語或問曰經星隨天左旋日月五緯右旋詩傳曰日月右行於天此歩占日月之躔次於天度而逆取之也儒家論天道則皆順而左旋厯家考天度則日月五星逆而右轉也愚按十九分度之七者以月行第十四度分為十九分而月又行及其七分也每分四十九分四釐七毫三絲六忽八㣲四塵有竒七分共計三百四十六分三釐一毫五絲七忽八微九塵有竒但先儒以為日月皆左行於天今以昏旦之中星騐之則知日實右行以毎夜月躔之宿度驗之則知月實右行若據左行之説推之日行一日一周天則一時當行三十度有竒假於堯時冬至日在天之虚計其日自子時天與日並行起至申時日没則天之虚淪於申位日之行當躔畢宿而張宿昏中矣安得堯典以為星昴乎今曰星昴則是昏時日仍躔虚其為右行而一日一度者可知矣又以今冬至日在箕八度而昏中壁驗之亦是右行無疑至於月之在行一日不及天十三度十九分度之七則是一日行及三百五十一度有奇一時當行二十九度有竒假令某日酉時月初出躔某宿計其行至子時當踰本宿之西一百一十六度之外矣嘗試驗之而月躔仍在本宿之傍不逺則是右行而一日止行十三度有餘者又可知矣故日一歲而一周天月二十九日有竒而一周天又逐及於日而與之㑹一歲凡十二㑹蔡九峯曰日行積三百六十五日九百四十分日之二百三十五而與天㑹是一歲日行之數也月行積二十九日九百四十分日之四百九十九而與日㑹也愚按一歲者以氣周言之日行自子年立春至丑年立春必厯過三百六十五日零三時復得子年立春節所躔之天度為一周天也月行至二十六日間厯過三百六十五度二百三十五分而與初一日某時合朔所躔之天度交㑹為一周天之數既周天之後又行越三日二時厯三十九度四百九十九分而與日㑹董鼎曰陳尚徳云月行二十七日有竒而周天又二日有竒始與日㑹文公以為二十九日有竒周天而與日㑹盖未詳也日一年與天一㑹月一年與天十三㑹與日十二㑹方㑹則月光都盡而為晦後漢律厯志曰以速及舒光盡體伏謂之晦已㑹則月光復蘇而為朔愚按朔之為言蘇也朔後晦前各十五日日月相對則月光正滿而為望愚按彭魯叔曰月行與日對相去百八十二度六十二分有竒分天之中謂之望望在十五日其常也或進在十四日或有退在十六日其變也望之無定日者由合朔之日時蚤暮也然凡望時必各在也其月朔後晦前之十五日晦朔而日月之合東西同度南北同道則月揜日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣天止如一圓匣赤道是匣子相合縫處在天之中黄道半在赤道内半在赤道外東西兩處與赤道相交度却是將天横分為許多度數㑹時日月在黄赤道相交處相撞著望時日月正相向如一在子一在午日所以食於朔者日常在上㑹時月在下面遮了日故日食月食謂之闇虚盖火日外影其中實闇至明中有闇虚其虛至㣲望時月與之對無分毫相差為闇虛所射故食愚按唐詳翁曰唐一行日議云日行黄道月有九道遇交則有薄食之變至於合朔如合璧則不食其交不軌道則食也故驗日食者必以日躔月道之交驗之耳月不行黄道只行其餘八道但此八道皆斜出入於黄道内外月一次經天則一次入一次出一歲凡十三次經天二十六次出入於黄道惟有兩次與日㑹故䟽云通計一百七十三有餘而有一交於此時方有食然王者脩徳行政用賢去奸能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則隂盛陽㣲當食必食雖曰行有常度而實為非常之變矣謝疊山曰隂盛陽㣲而日為之食幽王之時臣欺君妾惑主小人陵君子犬戎侵中國隂道長陽道消人事所感天象示之此日所以㣲也愚按唐祥翁曰杜預云日月動物雖行度有大量不能不小有盈縮故雖有交㑹而不食者或有頻交而食者然日月同度同道之際行有分數則食亦有分數也若以常度論之一歲兩交當兩食而春秋二百四十二年日食三十六唐二百九十年食百餘者此所謂雖交而不食或頻交而食者也在乎人君行事之所惑召耳蘇氏曰日食天變之大者也然正陽之月古尤忌之夏之四月為純陽故謂之正月十月純隂疑其無陽故謂之陽月純陽而食陽弱之甚也純隂而食隂壯之盛也㣲虧也彼月則宜有時而虧矣此日不宜虧而今亦虧是亂亡之兆也謝疊山曰日衆明之本而為隂所食其惡甚矣非日之醜乃天之變國之灾也國亡則民之受禍烈矣今此下民亦可哀之甚矣李迂仲曰唐志云十月之交以厯推之在幽王之六年日月告凶不用其行叶戸郎反四國無政不用其良彼月而食則維其常此日而食于何不臧賦也行道也凡日月之食皆有常度矣而以為不用其行者月不避日失其道也然其所以然者則以四國無政不用善人故也左傳昭公七年晉士文伯曰國無政不用善則自取謫于日月之灾如此則日月之食皆非常矣而以月食為其常日食為不臧者隂亢陽而不勝猶可言也隂勝陽而揜之不可言也王介甫曰月食非其常也然比日食則以陽侵隂猶為常也此日而食則為變大矣故春秋日食必書而月食則無紀焉亦以此爾李迂仲曰春秋月食未嘗書豈月未嘗食耶亦以為常故爾爗爗丁輙反震電不寧不令叶盧經反百川沸騰山冡崒徂恤反崩髙岸為谷深谷為陵哀今之人胡憯七感反莫懲賦也爗爗電光貎震雷也寧安徐也令善前漢李尋傳注曰雷電失序不安不善沸出騰乗也山頂曰冡崒崔嵬也高岸崩陷故為谷深谷填塞故為陵􅉃曾也言非但日食而已十月而雷電山崩水溢亦災異之甚者是宜恐懼修省改紀其政而幽王曾莫之懲也嚴氏曰十月雷電天道乖矣川沸山崩陵谷遷變地道亂矣胡為莫懲創也謝疊山曰災異如此幽王之心曽不懲創詩人不指幽王而曰哀今之人㣲而婉也董子曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君而欲止其亂也前漢孔光曰皇極之道不立則咎徴薦臻天古與王者故灾異數見以譴告之欲其改更若不畏懼而輕忽簡誣則凶罰加焉詩曰畏天之威于時保之皆謂不懼者凶懼之則吉也皇父音甫卿士畨維司徒家伯為宰仲允膳夫棸側留反子内史蹶俱衛反維趣七走反馬叶满補反楀音矩維師氏豔餘贍反妻煽音扇方處賦也皇父家伯仲允皆字也畨棸蹶楀皆氏也孔氏曰父及伯仲是字之義畨棸蹶楀單言又棸子以子配之若曽子閔子然故知皆氏卿士六卿之外更為都官以緫六官之事也或曰卿士蓋卿之士周禮大宰之屬有上中下士周禮大宰卿一人宰夫上士八人中士十六人下士三十二人公羊所謂宰士愚按見公羊傳隱元年左氏所謂周公以蔡仲為已卿士是也蔡九峯曰周公為冢宰食邑於圻内圻内諸侯孟仲二卿故周公用仲為卿蓋以宰屬而兼緫六官位卑而權重也愚按以宰屬而揔六官固位卑權重矣如前説為都官以揔六卿亦位卑而權重也故詩人酋言之焉司徒掌邦教冢宰掌邦治皆卿也周禮天官大宰卿一人地官大司徒卿一人膳夫上士掌王之飲食嗣膳羞者也天官膳夫上士二人鄭氏曰食飯也飲酒漿也膳牲肉也羞有滋味者内史中大夫掌爵禄廢置殺生予奪之法者也春官内史中大夫一人掌王八柄之法趣馬中士掌王馬之政者也孔氏曰夏官趣馬下士此言中士者誤也師氏亦中大夫掌司朝得失之事者也地官師氏中大夫一人居虎門之左司王朝掌國得失之事注曰司猶察也察王視朝若有善道可行者則以詔王記若得失若春秋是也美色曰豔豔妻即褒姒也煽熾也王介甫曰言其勢盛若火之煽然方處方居其所未變徙也言所以致變異者由小人用事於外而嬖妾蠱惑王心於内以為之主故也李迂仲曰此上三章言灾異之事下五章言灾異之由由所用非人也故責外所用之人又責其内寵言所以致之之由也抑此皇父豈曰不時胡為我作不即我謀叶謨悲反徹我牆屋田卒汙音烏萊叶陵之反曰子不戕在良反禮則然矣叶於姬反賦也抑發語詞時農隙之時也作動即就卒盡也汙停水也萊草穢也孔氏曰汙者記曰汙其宫而豬焉是也萊者楚茨云田萊多荒是也戕害也言皇父不自以為不時欲動我以徙而不與我謀乃遽徹我牆屋使我田不獲治卑者汙而髙者萊又曰非我戕汝乃下供上役之常禮耳彭氏曰三代之君不敢鄙夷其民以從已之欲每有興作謀及庶民如盤庚遷都登進厥民而告之三代世守此道故詩人曰胡為我作不即我謀孔氏曰皇父以親寵封於圻内築鄙邑令邑人苦之役之不以時先毁墻屋而後令遷邑人廢其家業故述其情如此謝疊山曰皇父使民無以為生矣乃曰予不戕虐汝也下供上役禮則當然其不仁甚矣王介甫曰此章專言皇父專恣而害及於民也皇父孔聖作都于向式亮反下同擇三有事亶侯多藏才浪反不憗魚觀反遺一老俾守我王叶于放反擇有車馬以居徂向賦也孔甚聖通明也王介甫曰皇父自謂甚聖故因而譏之曰孔聖也都大邑也周禮畿内大都方百里小都方五十里皆天子公卿所封也向地名在東都畿内今孟州河陽縣是也愚按孟州河陽縣今屬河東山西道三有事三卿也孔氏曰皇父封圻内當二卿今立三卿以比列國也亶信侯維藏蓄也憗者心不欲而自强之詞有車馬者亦冨民也徂徃也言皇父自以為聖而作都則不求賢而但取冨人以為卿又不自强留一人以衛天子但有車馬者則悉與俱徃不忠於上而但知貪利以自私也謝疊山曰皇父棄舊臣耆徳而不用不能强勉留一老以守我王其不忠甚矣平王東遷作文侯之命推原召亂之由亦曰㒺有耆夀俊在厥服西周之亡實兆於此使皇父秉政之時能留一老以守我王如周召之師保如仲山甫之保王躬則幽王有馮有翼未至於身辱國亡也皇父之罪莫大於此黽民允反勉從事不敢告勞無罪無辜䜛口囂囂五刀反下民之孽魚列反匪降自天叶鐵因反噂了損反沓徒合反背蒲昧反憎職競由人賦也囂衆多貎孽災害也噂聚也沓重複也職主競力也言黽勉從皇父之役未嘗敢告勞也猶且無罪而遭䜛蘇氏曰無罪而且見䜛而况敢告勞乎然下民之孽非天之所為也噂噂沓沓多言以相説而背則相憎專力為此者皆由䜛口之人耳陳少南曰噂聚談也沓猥并也小人相見之状如此背則憎疾也用如此小人在位所以興孽不可歸於天也悠悠我里亦孔之痗莫背反叶呼洧反四方有羡徐面反我獨居憂民莫不逸我獨不敢休天命不徹叶直質反我不敢傚我友自逸賦也悠悠憂也里居痗病羡餘逸樂徹均也當是之時天下病矣而獨憂我里之甚病且以為四方皆有餘而我獨憂衆人皆得逸豫而我獨勞者以皇父病之而被禍尤甚故也然此乃天命之不均吾豈敢不安於所遇而必傚我友之自逸哉謝疊山曰君子不以一身之夏勤為賢亦不以衆人之逸樂為非凡人命有窮通我之憂勤乃天之所付者如是安之而已不敢效我友之自逸也其詞甚婉其志堅而不可變也愚按上章既言匪降自天而此復以勞逸不均歸於天命者亦無所歸咎之詞也十月之交八章章八句胡庭芳曰王氏云此詩前三章言災異之變四章言致災由於小人而皇父小人之魁也故五六章專言皇父之惡七章言小人在位天降之災則天變生於人妖也八章言已之憂勞而一篇之義終矣序大夫刺幽王也浩浩昊天不駿其徳降䘮息䘮反饑饉其靳反斬伐四國叶于逼反旻宻巾反天疾威弗慮弗圖舍音赦彼有罪既伏其辜若此無罪淪胥以鋪普烏反賦也浩浩廣大也昊亦廣大之意駿大徳恵也榖不熟曰饑𬞞不熟曰饉疾威猶暴虐也慮圖皆謀也舍置淪陷胥相鋪徧也此時饑饉之後羣臣離散其不去者作詩以責去者故推本而言昊天不大其恵降此饑饉而殺伐四國如何旻天曽不思慮圖謀而遽為此乎首章推本而言天變也元氣廣大為昊天仁覆閔下為旻天故此章以昊天言不駿其徳以旻天言其疾威天非有二也盖亦無所歸咎而各以義類歸怨於天耳彼有罪而饑死則是既伏其辜矣舍之可也此無罪者亦相與而陷於死亡則如之何哉周宗既滅靡所止戾正大夫離居莫知我勩夷世反三事大夫莫肯夙夜叶戈灼反邦君諸侯莫肯朝夕叶祥龠反庶曰式臧覆芳服反出為惡賦也宗族姓也戾定也正長也周官八職一曰正謂六官之長皆上大夫也離居蓋以饑饉散去而因以避䜛譛之禍也我不去者自我也勩勞也三事三公也董鼎曰陳夀翁云如漢魏以來史云位登三事皆指為三公大夫六卿及中下大夫也臧善覆反也言將有易姓之禍其兆己見而天變人離又如此愚按易姓之禍言周宗之滅也天變上章所言是也人離此章所言是也庶幾曰王改而為善乃覆出為惡而不悛也李迂仲曰時王上為天所怒下為民所怨内則宗族破滅外則羣臣諸侯携貳孤立而不懼此所謂安其危而利其菑樂其所以亡者范氏曰靡所止戾未知天之所命民之所定也莫肯夙夜無在公之節也莫肯朝夕無尊王之禮也嚴氏曰二章言人心離散也或曰疑此亦東遷後詩也陳器之曰亦字乃因前正月篇而言耳愚按詩言周宗既烕似亦道已然之事而非慮其將然之辭似果作於東遷之後也如何昊天叶鐡因反下同辟言不信叶斯人反如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天賦也如何昊天呼天而訴之也辟法臻至也凡百君子指羣臣也言如何乎昊天也法度之言而不聽信則如彼行往而無所底至也然凡百君子豈可以王之為惡而不敬其身哉不敬爾身不相畏也不相畏不畏天也蘇氏曰君子呼天而告之曰奈何哉法度之言王終莫肯信者如人恣行而忘反我不知其所至矣輔氏曰法度之言聽而行之則績效隨見有所底止今既不聽法度之言則如猖狂妄行者亦將何所底至哉常人之情無特操者見王所為如此則皆從風而靡故戒之曰凡百君子各敬爾身豈可因王之為惡而遽自放逸以棄其身哉人惟一心而已能敬其身則能敬人能敬天矣詩人發此意至為深切學者不可不深體而力行也王介甫曰世雖昏亂君子不可以為惡自敬故也畏人故也畏天故也愚按三章言王不見聴而已不可忘其忠敬也戎成不退叶吐類反下同饑成不遂曽在登反我􅉏思列反御􅉃􅉃于感反日瘁徂醉反凡百君子莫肯用訊叶息悴反聽言則答譛言則退賦也戎兵遂進也易曰不能退不能遂是也易大壯上六曰羝羊觸藩不能退不能遂􅉏御近侍也國語曰居寢有􅉏御之箴愚按楚語􅉏作䙝注云近也蓋如漢侍中之官也􅉃􅉃憂貌瘁病訊告也言兵冦已成而王之為惡不退饑饉已成而王之遷善不遂使我􅉏御之臣憂之而慘慘日瘁也凡百君子莫肯以是告王者雖王有問而欲聽其言則亦答之而已不敢盡言也一有譛言及已則皆退而離居莫肯夙夜朝夕於王矣其意若曰王雖不善而君臣之義豈可以若是恝乎劉辰翁曰聽言則答譛言則退八字極臣下落落之態輔氏曰聽言則答譛言則退則皆不敬其身者聽言則答而從者也譛言則退畏罪者也面從者不盡其情畏罪者唯知有已皆不能敬也􅉏有習之意自謙之辭也愚按四章言王為不善而羣臣無忠告也哀哉不能言匪舌是出尺遂反維公是瘁哿矣能言巧言如流俾躬處休賦也出出之也瘁病哿可也言之忠者當世之所謂不能言者也故非但出諸口而適以瘁其躬佞人之言當世所謂能言者也故巧好其言如水之流無所凝滯而使其身處於安樂之地蓋亂世昏主惡忠直而好諛佞類如此詩人所以深歎之也胡庭芳曰五章言忠佞不分禍福反易也輔氏曰上章既責諸臣故此下而章則又體其情而言之此章言彼其所以離散而去者蓋亦有不得已者蓋言之忠者則非但出諸口適以病其身至於巧言如流順從而不逆者乃使其身得處於休逸之地則彼其所以離散而去者是豈得已意哉其志亦可哀也已愚按哀哉二字見詩人深歎之維曰于仕鉏里反孔棘且殆叶養里反云不可使得罪于天子叶奬里反亦云可使怨及朋友叶羽已反賦也于徃棘急殆危也蘇氏曰人皆曰往仕耳曾不知仕之急且危也當是之時直道者王之所謂不可使而枉道者王之所謂可使也直道者得罪於君而枉道者見怨於友此仕之所以難也嚴氏曰六章言亂世進退皆有咎也從道則違時從時則違道寕得罪於天子不可得罪於公議也孔氏曰朋友之道相切以善今從君為惡故朋友怨之輔氏曰此章則又言人皆曰徃仕而不知仕之急且危也何者直道而盡言者則得罪於其君巧言以徇人者則見怨於其友蓋朋友以相切嗟為道若枉道以從君則朋友必見棄絶矣以是言之則當時之仕又豈易為哉忠言獲罪而巧言處休直道見枊而枉道見容皆亂世之常事也謂爾遷于王都曰予未有室家叶古胡反鼠思息嗣反泣血叶虚屈反無言不疾昔爾出居誰從作爾室賦也爾指離居者鼠思猶言癙憂也吕與叔曰癙憂幽憂也與鼠思義同當是時言之難能而仕之多患如此愚按此承上文五章六章而言也故羣臣有去者有居者居者不忍王之無臣已之無徒則告去者使復還于王都去者不聽而托於無家以拒之至於憂思泣血何氏曰孔氏云人淚必因悲聲而出若血出則不由聲也今無聲而涕出如血之出故曰泣血有無言而不痛疾者蓋其懼禍之深至於如此然所謂無家者則非其情也故詰之曰昔爾之去也誰為爾作室者而今以是辭我哉嚴氏曰七章責引去者也輔氏曰此章則又盡言已意以告諸離居者使之復反於王都彼既不從則又言其痛切之情為可念者而猶盡言以詰之而庶其或見聽可謂既能盡人之情而又能盡已之志也然則此􅉏御之臣盖亦非常人矣雨無正七章二章章十句二章章八句三章章六句歐陽公曰古之人於詩多不命題而篇名徃徃無義例其或有命名者則必述詩之意如巷伯常武之類是也今雨無正之名據序所言與詩絶異當闕其所疑元城劉氏曰嘗讀韓詩有雨無極篇序云雨無極正大夫刺幽王也至其詩之文則比毛詩篇首多雨無其極傷我稼穡八字愚按劉説似有理然第一二章本皆十句今遽増之則長短不齊非詩之例又此詩實正大夫離居之後􅉏御之臣所作其曰正大夫刺幽王者亦非是且其為幽王詩亦未有所考也愚按詩文四章言曽我􅉏御慘慘日瘁固可見其作於􅉏御之臣矣但二章首言周宗既滅繼言正大夫離居卒章又言謂爾遷於王都曰予未有室家似是東遷之際羣臣懼禍者因以離居不復隨王同遷於東都故見於詩詞如此而文侯之命亦曰即我御事㒺或耆夀俊在厥服則其驗也參考正月所謂赫赫宗周褒姒烕之及節南山國既卒斬何用不監等語疑此三詩猶皆為東周之變雅其後雅亡於上而國風作於下於是春秋託始於隱公實為平王之四十九年也序大夫刺幽王也雨自上下者也衆多如雨而非所以為政也此序尤無義理歐陽公劉氏説已見本篇祈父之什十篇六十四章四百二十六句詩傳通釋卷十一
