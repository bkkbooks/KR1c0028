body:
  text: 詩傳通釋卷二元劉瑾撰詩朱子集傳邶音佩一之三邶鄘衛三國名在禹貢冀州西阻太行北逾衡漳東南跨河以及兖州桑土之野及商之季而紂都焉武王克商分自紂城朝歌而北謂之邶南謂之鄘東謂之衛以封諸侯邶鄘不詳其始封衛則武王弟康叔之國也愚按武王作酒誥戒康叔而曰明大命于妹邦妹邦即紂都則康叔封衛明在武王時矣邶鄘之地豈其始為武庚三叔之封至成王滅武庚誅三監乃復以封他國而其後又并入于衛也歟衛本都河北朝歌之東淇水之北百泉之南其後不知何時并得邶鄘之地至懿公為狄所滅戴公東徙渡河野處漕邑文公又徙居于楚丘朝歌故城在今衛州衛縣西二十二里所謂殷墟衛故都即今衛縣漕楚丘皆在滑州大抵今懐衛澶蟬相滑濮等州開封大名府界皆衛境也愚按懐州今改懐孟路衛州今改衛輝路相州今改彰徳路大名府今改大名路所治有滑州及澶州今改開州並𨽻河東山西道濮州今為東昌路濮州隷山東東西道開封府今改汴梁路𨽻河南省但邶鄘地既入衛其詩皆為衛事而猶繫其故國之名則不可曉存其舊號者豈其聲之異歟又曰衛有衛音鄘有鄘音邶有邶音故詩有鄘音者係之鄘有邶音者係之邶輔氏曰先生初説亦疑其為聲之異今但以為不可考者葢此等既不繋詩之大義又他無所考不若闕之為得也程子曰一國之詩而三其名得于衛地者為衛得于邶鄘者為邶鄘嚴氏曰存邶鄘之名不與衛之滅國也愚按緑衣燕燕等詩莊姜自作共姜作栢舟桑中言沬鄉皆正作于衛國而或係邶或係鄘泉水載馳竹竿皆作于外國而一係邶一係鄘一係衛意大師各從得詩之地而係之也其所以必係邶鄘故名者無乃欲寓興滅繼絶之心如春秋昭公八年楚既滅陳而九年經書陳灾穀梁以為存陳亦此意也是以大師存邶鄘之名置于衛前亦如魏風先于唐之例夫子存其名而不削因其序而不革耳而舊説以此十三國皆為變風焉嚴氏曰闗雎鵲巢為三百篇綱領風之正也反乎此者變也邶鄘衛皆衛風也衛禍機于袵席覃及宗社居變風之首二南之變也張學龍曰正風以闗雎為首者得夫婦人倫之至正者也變風以邶栢舟為首者莊姜處夫婦人倫之變者也次鄘栢舟者處子母之變者也蘇氏曰春秋所見百七十餘國變風之作春秋數世矣而載于大師者獨十三國意者列國不皆有詩其有詩者雖檜曹之小邶鄘之亡而有不能已也汎芳劒反彼柏舟亦汎其流耿耿古幸反不寐如有隠憂㣲我無酒以敖五羔反以遊比也汎流貌柏木名耿耿小明憂之貌也耿耿猶儆儆不寐貌也輔氏曰葢人有所憂則其心耿耿然唯于憂之一路分明耳其他固有所不及也古人下字不苟如此唯其心耿耿然故不能寐也𨼆痛也㣲猶非也婦人不得于其夫故以柏舟自比問柏舟看來與闗雎亦無異彼何以為興曰他下面便説淑女見得是因彼興此此詩才説柏舟下面更無貼意見得其義是比愚按有全章皆比者如螽斯之類固專屬比矣亦有比意之外繼陳其事如此章之類者今以集傳賦而比之體反觀之比而興之體例求之則此類恐亦可以為比而賦也言以柏為舟堅緻音稚密也牢實而不以乘載無所依薄愚按薄字訓附以説卦雷風相薄証之只讀作泊若以離騷九章芳不得薄之薄証之則音為傅而亦訓為附也但汎然于水中而已嚴氏曰二柏舟用意皆在下句邶柏舟在于亦汎其流鄘柏舟在于在彼中河也故其𨼆憂之深如此非為無酒可以遨遊而解之也列女傳以此為婦人之詩今考其辭氣卑順柔弱且居變風之首而與下篇相類豈亦莊姜之詩也歟胡庭若曰列女傳以為衛宦夫人之詩此魯詩説也此詩詞氣誠為卑弱而末云不能奮飛可見婦人詩何則人臣道不合則去是有可去之義若姜氏則無可去之義矣故曰不能奮飛況以下四篇皆婦人作二南與鄘柏舟皆首婦人亦是一證鄭氏曰莊姜莊公夫人齊女姓姜氏我心匪鑒不可以茹如預反亦有兄弟不可以據薄言往愬逢彼之怒賦也鑒鏡茹度待洛反據依愬告也言我心既非鑒而不能度物雖有兄弟而又不可依以為重故往告之而反遭其怒也輔氏曰内既不得于其夫外又不得于其兄弟其情之無聊亦甚矣我心匪石不可轉也我心匪席不可卷眷勉反也威儀棣棣不可選也賦也棣棣富而閑習之貌輔氏曰富謂富盛也富盛則全備而無欠闕閑習則從容而不生踈吕東萊曰言威儀閑習自有常度選簡擇也言石可轉而我心不可轉席可卷而我心不可卷威儀無一不善又不可得而簡擇取舎皆自反而無闕之意輔氏曰可心之不轉不可卷言其有常也威儀之不可選言其皆善也唯其存諸中者有常而不可移故形于外者皆善而不可揀也憂心悄悄七小反愠于羣小覯古豆反閔既多受侮不少靜言思之寤辟避亦反有摽符小反賦也悄悄憂貌愠怒意羣小衆妾也言見怒于衆妾也覯見閔病也辟拊心也摽拊心貌孔氏曰寤覺之中拊心而手摽然日居月諸胡迭待結反而㣲心之憂矣如匪澣户管反衣靜言思之不能奮飛比也居諸語辭迭更㣲虧也嚴氏曰㣲謂不明也日月食則不明十月之交云彼月而㣲此日而㣲言日當常明月則有時而虧猶正嫡當尊衆妾當卑今衆妾反勝正嫡是日月更迭而虧是以憂之至于煩寃憒公對反亂也眊音冒目不明也如衣不澣之衣恨其不能奮起而飛去也柏舟五章章六句讀詩須當諷味看他詩人之意在甚處如婦人不得于其夫宜其怨之深矣而曰我思古人實𫉬我心又曰靜言思之不能奮飛其詞氣忠厚惻怛怨而不過如此所謂止乎禮義而中喜怒哀樂之節者所以雖為變風而繼二南之後者以此臣之不得于君子之不得于父弟之不得于兄朋友之不相信皆當以此為法如屈原不忍其憤懐沙赴水此賢者之過也賈誼云歴九州而相其君兮何必懐此都也又失之逺矣讀詩須合如此看所謂詩可以興可以觀可以羣可以怨是詩中大義不可不理㑹得是靜言思之不能奮飛猶似未有和平意曰也只如此説無過當處既有可怨之事亦須還他有些怨底意思終不成只如平時却與土木相似只看舜之號泣于旻天更有甚于此者喜怒哀樂但發之不過其則耳亦豈可無聖賢處憂危只要不失其正如緑衣言我思古人實𫉬我心這般意思却又分外好輔氏曰首章以柏舟為比比其可用乘載也末章以日月為比比其當明而虧當尊而卑也所謂詞氣卑順柔弱全篇固然而末後兩章尢可見張學龍曰莊妻處夫婦之變正靜自守而不忍斥言其夫共姜處子母之變以死誓無他感動其母然母之慈愛猶可回也故共姜處之易夫之昏惑不可移故莊姜處之難此所以冠鄘衛居變風之首也序言仁而不遇也衛頃公之時仁人不遇小人在側詩之文意事類可以思而得其時世名氏則不可以強推故凡小序唯詩文明白直指其事如甘棠定中南山株林之屬若證驗的切見于書史如載馳碩人清人黄鳥之類決無可疑者其次則詞旨大槩可知必為其事而不可的知其為某時某人者尚多有之若為小序者姑以其意探尋探索依約而言則雖有所不知亦不害其為不自欺雖有未當人亦當恕其所不及今乃不然不知其時者必強以為某王某公之時不知其人者必強以為某甲某乙之事于是傅㑹書史依託名諡鑿空妄語以誑後人其所以然者特以恥其有所不知而惟恐人之不見信而已且如柏舟不知其出于婦人而以為男子不知其不得于夫而以為不遇于君此則失矣然有所不及而不自欺則亦未至于大害理也今乃斷然以為衛頃公之時則其故為欺罔以誤後人之罪不可揜矣葢其偶見此詩冠于三衛變風之首是以求之春秋之前而史記所書莊桓以上衛之諸君事皆無可考者諡亦無甚惡者獨頃公有賂王請命之事其諡又為甄心動懼之名如漢諸侯王必其嘗以罪謫然後如以此諡以是意其必有棄賢用佞之失而遂以此詩予音與之諡法中如墮廢社稷曰頃便得柏舟一詩硬差排為衛頃公便云仁人不遇小人在側鄭漁仲謂小序只是後人將史傳去揀并著諡却附㑹作小序美刺若將以衒其多知而必于取信不知將有明者從旁觀之則適所以暴其真不知而啓其深不信也凡小序之失以此推之什得八九矣又其為説必使詩無一篇不為美刺時君國政而作固已不切于情性之自然而又拘于時世之先後其或書傳所載當此一時偶無賢君美諡則雖有詞之美者亦例以為陳古而刺今是使讀者疑于當時之人絶無善則稱君過則稱已之意而一不得志則扼腕切齒嘻笑冷語以懟其上者所在而成羣大率古人作詩與今人一般其間亦各有感物道情吟詠性情幾時盡是譏刺他人只縁序者立例篇篇要作美刺説將詩人意思穿鑿壊了且如今人見人才做一事便作一詩歌詠之或譏刺之是甚麽道理如此一佀里巷無知之人胡亂稱頌諛説把持放雕何以為情性之正是其輕躁險薄尤有害于温柔敦厚之教故予不可以不辨温柔敦厚詩人之教也使篇篇是譏刺人安得温柔敦厚緑兮衣兮緑衣黄裏心之憂矣曷維其已比也緑蒼勝黄之間色黄中央土之正色青黄赤白黒五方之正色也緑紅碧紫纁五方之間色也葢以木之青克土之黄合青黄而成緑為東方之間色間色賤而以為衣正色黄而以為裏言皆失其所也已止也莊公惑于嬖妾曹氏曰莊公揚武公子左傳謂公子州吁嬖人之子也有寵此所謂妾或州吁之母歟夫人莊姜賢而失位故作此詩言緑衣黄裏以比賤妾尊顯而正嫡幽㣲孔氏曰間色為衣而見正色反為裏而隠猶妾䝉寵而顯夫人反見疏而㣲也使我憂之不能自己也張南軒曰言嫡妾之亂其獘將有不可勝言者憂在宗國也夫豈為一身之私哉謝叠山曰嫡妾易位尊卑不明家不齊則國不治莊姜之心豈但憂一身哉為君憂為君之子憂為國家後日憂其憂何時能止也緑兮衣兮緑衣黄裳心之憂矣曷維其亡比也上曰衣下曰裳記曰衣正色裳間色今以緑為衣而黄者自裏轉而為裳其失所益甚矣孔氏曰間色為衣而在上正色為裳而處下猶妾䝉寵而尊夫人反見疏而卑前以表裏喻幽顯此以上下喻尊卑亡之為言忘也緑兮衣兮女音汝所治平聲兮我思古人俾無訧音尤叶于其反兮比也女指其君子而言也治謂理而織之也俾使訧過也言緑方為絲而女又治之以比妾方少艾而女又嬖之也然則我將如之何哉亦思古人有嘗遭此而善處之者以自厲焉使不至于有過而已輔氏曰彼之所為自違悖而我之所為則欲其無過而已此其所以為賢也絺兮綌兮淒七西反其以風叶孚愔反我思古人實獲我心比也淒寒風也絺綌而遇寒風猶已之過時而見棄也愚按班婕妤紈扇詩正此意也故思古人之善處此者真能先得我心之所求也古人所為恰與我合只此便是至善前乎千百世之已往後乎千百世之未來只是此道理孟子所謂若合符節政謂是爾緑衣四章章四句莊姜事見春秋傳此詩無所考姑從序説下三篇同左氏傳隠公三年初衛莊公娶于齊東宫得臣之妹曰莊姜美而無子戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之嚴氏曰女子之情饒怨此詩但刺莊公不能正嫡妾之分其詞氣温柔敦厚如此故曰詩可以怨黄氏曰觀詩至緑衣然後知先王之風澤深厚夫以婦人女子而所知如此詞氣坦夷固與氣息茀然者不可同年語矣葢不得已而後言仁厚積中而然也陳壽翁曰不得于夫而不疾其妾惟思古人以自修其身憂而不傷怨而不怒孔子謂詩可以怨其此類也夫序衛莊姜傷已也妾上僭夫人失位故作是詩也此詩下至終風四篇序皆以為莊姜之詩今姑從之唯燕燕一篇詩文略可據耳燕燕于飛差初宜反池其羽之子于歸逺送于野叶上與反瞻望弗及泣涕如雨興也燕鳦壹也謂之燕燕者重言之也孔氏曰古人重言之漢書童謠燕燕尾涎涎是也差池不齊之貌之子指戴媯也歸大歸也公羊傳注曰大歸者廢棄來歸也毛氏曰歸宗也莊姜無子以陳女戴媯之子完為己子莊公卒完即位嬖人之子州吁弑之故戴媯大歸于陳而莊姜送之作此詩也王介甫曰燕方春時以其匹至其羽相與差池其鳴一上一下故感以起興蘇氏曰禮婦人送迎不出門逺送于野情之所不能已也張南軒曰獨言泣涕之情者葢國家之事有不可勝悲者晉褚大后批桓温廢立詔云未亡人不幸罹此百憂感念存沒心焉如割其有合于詩人之情歟嚴氏曰風人含不盡之意此但叙離别之恨而子弑國危之戚皆隠然在不言之中矣燕燕于飛頡户結反之頏户郎反之之子于歸逺于將之瞻望弗及佇立以泣興也飛而上曰頡飛而下曰頏將送也佇立久立也燕燕于飛下上時掌反其音之子于歸逺送于南叶尼心反瞻望弗及實勞我心興也鳴而上曰上音鳴而下曰下音送于南者陳在衛南輔氏曰泣涕如雨初别時也佇立以泣已别而久立以泣也實勞我心既去而思之不忘也仲氏任而今反只音紙其心塞淵叶一均反終温且惠淑慎其身先君之思以勗凶肉反寡人賦也仲氏戴媯字也以恩相信曰任只語辭塞實淵深終竟温和惠順淑善也先君謂莊公也勗勉也寡人寡徳之人莊姜自稱也言戴媯之賢如此又以先君之思勉我使我常念之而不失其守也孔氏曰言仲氏有徳行其心誠實而深逺又終能温和恭順善自謹慎其身内外之徳既如此又于將歸之時以思先君之故勸勉寡人以禮義也楊氏曰州吁之暴桓公之死戴媯之去皆夫人失位不見答于先君所致也輔氏曰以恩愛相信嫡妾相與之情于是為至塞實不虚妄也淵深不淺露也二者其本也温和惠順又終竟如此而無作輟焉則是得其情性之常也淑又婦人之美徳而慎則持身之謹也有是衆徳而又謹于持身其賢為可知矣而戴媯猶以先君之思勉其夫人真可謂温且惠矣或謂戴媯不以莊公已死而勉莊姜以思之可見温和惠順而能終也亦縁他之心塞實淵深所稟之厚故能如此曰古人文字之美詞氣温和理義精密如此秦漢以後無此等語某讀詩于此數語讀書至先王肇修人紀至兹惟艱哉深誦嘆之又曰譬如畫工傳神一般直是寫得他精神出燕燕四章章六句于潘氏曰前三章但見莊姜拳拳戴媯有不能已者四章乃見莊姜于戴媯非是情愛之私由其有塞淵温惠之徳能自淑慎其身又能以先君之思勉莊姜以不忘則見戴媯平日于莊姜相勸勉以善者多矣故于其歸而愛之如此無非情性之正也胡庭芳曰黄氏云觀此詩見其與商之三仁去就更相警戒各欲自靖自獻于先王者無異國風雖變猶有如是之婦人此所謂先王之澤未泯而康叔之餘烈猶在也序衛莊姜送歸妾也逺送于南一句可為送戴媯之騐日居月諸照臨下土乃如之人兮逝不古處昌吕反胡能有定寜不我顧叶果五反賦也日居月諸呼而訴之也之人指莊公也逝𤼵語辭古處未詳或云以古道相處也長樂王氏曰不以古夫婦之道處我胡寜皆何也莊姜不見答于莊公故呼日月而訴之言日月之照臨下土久矣今乃有如是之人而不以古道相處輔氏曰觀緑衣之詩所謂我思古人則于此歎莊公不以古道處已者宜也自處以古人為法而望人以古道處已莊姜之處已望人皆有則矣是其心志回惑亦何能有定哉而何為其獨不我顧也見棄如此而猶有望之之意焉此詩人之所以為厚也愚按每章章末二句皆有望之之意日居月諸下土是冒乃如之人兮逝不相好呼報反胡能有定寜不我報賦也冒覆也報答也日居月諸出自東方乃如之人兮徳音無良胡能有定俾也可忘賦也日旦必出東方月望亦出東方徳音美其辭無良醜其實也嚴氏曰此徳音無良及邶谷風徳音莫違皆婦人言其夫待已之意俾也可忘言何獨使我為可忘者耶日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述賦也畜養卒終也不得其夫而歎父母養我之不終葢憂患疾痛之極必呼父母人之至情也愚按日居月諸呼日月而訴之也父兮母兮呼父母而訴之也猶舜號泣于旻天于父母之意述循也言不循義理也日月四章章六句輔氏曰呼日月而但云照臨下土尊之之辭也呼父母而遂言畜我不卒親之之辭也一章云寜不我顧言不相顧盻也二章言寜不我報言不相酬答也三章云俾也可忘則䝉上章胡字言何獨使我為可忘者邪辭雖緩而意則切矣四章言報我不述則又言莊公雖有時相報答而都不循乎義理也雖為也莊公所棄而猶有望之之意焉是其性情之厚此詩當在燕燕之前下篇放此胡庭芳曰此篇分明作于莊公之時胡能有定只是説莊公心志回惑反覆無定之意故不我顧不我報俾也可忘而報我不述也以問日月終風二篇據集傳云當在燕燕之前某觀之終風當在先日月當次之葢詳終風之詞莊公于姜猶有往來之詩至日月則見公已絶不顧姜而姜不免㣲怨矣燕燕則莊公薨後送歸妾情不能堪耳以此觀之則終風當先日月當次曰恐或如此序衛莊姜傷已也遭州吁之難傷已不見答于先君以至困窮之詩也此詩序以為莊姜之作今未有以見其不然但謂遭州吁之難而作則未然耳葢詩言寜不我顧猶又望之之意又言徳音無良亦非所宜施于前人者明是莊公在時所作其篇次亦當在燕燕之前也終風且暴顧我則笑叶音燥謔許約反浪笑敖五報反中心是悼比也終風終日風也暴疾也謔戯言也浪放蕩也悼傷也莊公之為人狂蕩暴疾莊姜葢不忍斥言之故但以終風且暴為比言雖其狂暴如此然亦有顧我則笑之時但皆出于戯慢之意而無愛敬之誠則又使我不敢言而心獨傷之耳葢莊公暴慢無常而莊姜正靜自守所以忤其意而不見答也終風且霾亡皆又叶音貍惠然肯來叶如字又陵之反莫往莫來悠悠我思叶新才新齎二反比也霾雨去聲土䝉霿音茂又音夢也爾雅孫炎曰大風揚塵土從上而下也惠順也悠悠思之長也終風且霾以比莊公之狂惑也雖云狂惑然亦或惠然而肯來毛氏曰時有順心也但又有莫往莫來之時則使我悠悠而思之望其君子之深厚之至也終風且曀於計反不日有曀寤言不寐願言則嚏都麗反比也隂而風曰曀有又也蘇氏曰古有又通不日有曀言既曀矣不旋日而又曀也亦比人之狂惑暫開而復蔽也願思也嚏鼽仇嚏也人氣感傷閉鬱又為風霧所襲則有是疾也輔氏曰寤則憂而不能寐思之則感傷氣閉而成疾其憂危甚矣曀曀其隂虺虺其靁寤言不寐願言則懐虺音卉比也曀曀隂貌虺虺靁將𤼵而未震之聲以比人之狂惑愈深而未已也吕東萊曰驟雨迅雷其止可待至于曀曀之隂虺虺之雷則殊未有開霽之期也懐思也終風四章章四句説見上愚按一章言莊公狂暴二章言其狂惑皆止一句為比而莊公猶有顧笑惠來之時所謂暴慢無常狂惑暫開者也三章則暫開而復蔽四章則愈深而未巳皆是以兩句為比若以此詩繼緑衣之後次日月次燕燕讀之尤可備見姜氏初作柏舟緑衣唯自憂歎而止于和平木嘗指譏公之為人也至終風則言其狂惑蔽固而猶不忍斥言及日月然後極其詞此豈情之所得已哉序衛莊姜傷已也遭州吁之暴見侮慢而不能正也詳味此詩有夫婦之情無母子之意若果莊妻之詩則亦當在莊公之世而列于燕燕之前序説誤矣劉辰翁曰州吁無戯笑之理分明是怨莊公也擊鼓其鏜吐當反踴躍用兵叶晡芒反土國城漕我獨南行叶户郎反賦也鏜擊鼓聲也踴躍坐作擊刺之狀也兵謂戈㦸之屬土土功也國國中也漕衛邑名嚴氏曰漕鄘地也在河南衛人從軍者自言其所為因言衛國之民或役土功于國或築城于漕而我獨南行有鋒鏑滴死亡之憂危苦尤甚也李迂仲曰土國城漕非不勞苦而獨處于境内今我之在外死亡未可知也鄭氏曰南行從軍南行伐鄭從孫子仲平陳與宋不我以歸憂心有忡敕中反叶敕衆反賦也孫氏子仲字時軍帥也平和也合二國之好也鄭氏曰謂使告宋曰君為主敝邑以賦與陳蔡從胡庭芳曰必先和陳宋而後進兵也舊説以此為春秋隠公四年州吁自立之時宋衛陳蔡伐鄭之事恐或然也以猶與也言不與我而歸也爰居爰處爰喪息浪反其馬叶蒲補反于以求之于林之下叶後五反賦也爰于也于是居于是處于是喪其馬而求之于林下見其失伍離次無鬬志也死生契苦結反濶叶苦劣反與子成説執子之手與子偕老叶魯吼反賦也契濶隔逺之意成説謂成其約誓之言從役者念其室家因言始為室家之時期以死生契濶不相忘棄又相與執手而期以偕老也于音吁下同嗟濶叶苦劣反兮不我活叶户劣反兮于嗟洵音荀兮不我信叶師人反兮賦也于嗟歎辭也濶契濶也活生洵信也信與申同釋文曰即古伸字言昔者契濶之約如此而今不得活偕老之信如此而今不得伸意必死亡不復得與其室家遂前約之信也擊鼓四章章四句按左傳伐鄭圍其東門五日而還出師不為久而衛人之怨如此身犯大逆衆叛親離莫肯為之用爾序怨州吁也衛州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也春秋隠公四年宋衛陳蔡伐鄭正州吁自立之時序葢據詩文平陳與宋而引此為説恐或然也胡庭芳曰按四年三月州吁弑桓公自立夏將修先君之怨于鄭使告宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從宋許之于是陳蔡方睦于衛遂從陳蔡伐鄭圍其東門五日而還九月如陳見殺然傳記魯衆仲之言曰州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民于是乎不務令徳而欲以亂成必不免矣按州吁篡弑之賊此序但譏其勇而無禮固為淺陋而衆仲之言亦止于此葢君臣之義不明于天下久矣春秋其得不作乎凱風自南叶凡心反吹彼棘心棘心天天於驕反母氏劬勞叶音僚比也南風謂之凱風長養萬物者也孔氏曰李巡云萬物喜樂故曰凱風凱樂也風性樂養萬物棘小木叢生多刺難長而心又其稚弱而未成者也天天少好貌劬勞病苦也衛之淫風流行雖有七子之母猶不能安其室故其子作此詩以凱風比母棘心比子之幼時葢曰母生衆子幼而育之其劬勞甚矣嚴氏曰棘至夏始生凱風南來吹彼稚弱之棘心至于天天然少好則風之為力多矣比母以慈愛之情養我七子之身至于少長則母亦當苦矣母之養子于少時最勞苦本其始而言以起自責之端也凱風自南吹彼棘薪母氏聖善我無令人興也愚按上章言凱風棘心而下句無應故屬比此章言風與棘而下文以母與子應故屬興二章相似而不同也聖叡令善也棘可以為薪則成矣然非美才故以興子之壯大而無善也復以聖善稱其母而自謂無令人其自責也深矣劉執中曰自言七子之中有一令善之人則母亦不舍之而去也爰有寒泉在浚之下叶後五反有子七人母氏勞苦興也浚衛邑諸子自責言寒泉在浚之下猶能有所滋益于浚而有子七人反不能事母而使母至于勞苦乎陳少南曰寒泉在浚邑邑人賴之以生養今子七人反不能養一母而使母勞苦求嫁也孔氏曰寒泉有益于浚浚民得以逸樂以興七子無益于母乃寒泉之不如于是乃若㣲指其事而痛自刻責以感動其母心也母以淫風流行不能自守而諸子自責但以不能事母使母勞苦為詞孔氏曰母欲嫁者本為淫風流行但七子不可斥言故言母為勞苦而思嫁也上章言母氏劬勞謂少長七子劬勞也此謂母今日勞苦思嫁與上不同也婉詞幾諫不顯其親之惡可謂孝矣下章放此睍胡顯反睆華板反黄鳥載好其音有子七人莫慰母心興也睍睆清和圓轉之意胡庭芳曰黄鳥即黄鶯其音清和流轉言黄鳥猶能好其音以悦人而我七子獨不能慰悦母心哉孔氏曰自責言黄鳥之不如也輔氏曰三章以無情興有情四章以無知興有知凱風四章章四句曽氏曰凱風盛于夏時黄鳥鳴于夏木寒泉亦夏所宜耳寒泉能使人甘之有子而使母勞苦黄鳥能使人悦之有子而莫慰母心陳君舉曰瞽叟日頑舜則負罪聖人豈緣飾哉其心誠曰吾罪焉而已矣此詩每曰有子七人葢曰吾屬在此無益也抑以見一門昆弟皆舜耕厯山氣象謝叠山曰不怨母而責已孝之至也韓文公羑里操曰臣罪當誅兮天王聖明蘇文忠公寄詩其弟曰聖主如天萬物春小臣愚闇自亡身皆從此詩變化來見為子為臣忠厚之至輔氏曰母之不善在他人見之則可自其子觀之則只見其母聖善而七子之中自無令人而已不然則不足以感悟其母以成其善志也其曰聖善過為歸美之辭耳此唯子可以施之于母臣而事君如此則未安也韓退之作羑里操云臣罪當誅兮天王明聖雖程子亦以此言為得文王之心而先生嘗云看得文王之心不解如此葢聖人之處患難其樂天知命尊君親上之意固自不能無豈有紂如是無道而乃強以為聖明者哉序美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾以孟子之説證之序説亦是但此乃七子自責之辭非美七子之作也雄雉于飛泄泄移世反其羽我之懐矣自詒伊阻興也雉野雞雄者有冠長尾身有文采善鬬泄泄飛之緩也懐思詒遺去聲阻隔也婦人以其君子從役于外故言雄雉之飛舒緩自得如此而我之所思者乃從役于外而自遺阻隔也輔氏曰我之懐矣指其夫也自詒伊阻不以怨人也雄雉于飛下上時掌反其音展矣君子實勞我心興也下上其音言其飛鳴自得也展誠也言誠又言實所以甚言此君子之勞我心也輔氏曰言有盡而意無窮也瞻彼日月悠悠我思叶新齎反道之云逺曷云能來叶陵之反賦也悠悠思之長也見日月之往來而思其君子從役之久也程子曰日月取其迭往迭來之意又日月隂陽相配又旦暮所見動人情思總包意其間鄭氏曰視日月之行迭往迭來今君子獨久行役而不來使我心悠悠然思之百爾君子不知徳行下孟反叶户郎反不忮之䜴反不求何用不臧賦也百猶凡也忮害求貪臧善也言凡爾君子豈不知徳行乎輔氏曰不知徳行之不與鄂不韡韡之不同若能不忮害又不貪求陳君舉曰忮心生于忿怒求心生于貪慕故人之恥貧賤患難者能不忮則或入于求能不求則或入于忮故忮者常生于嫉人求者常至于枉已則何所為而不善哉憂其逺行之犯患冀其善處而得全也吕東萊曰思其君子之切而知其未得歸也于是自解曰凡百君子但不忮害不貪求則何所用而不善雖久處軍旅之間固未害也胡庭芳曰此亦𤼵乎情止乎禮義之意雄雉四章章四句謝上蔡曰君子之于詩非徒誦其言又將以考其情性非徒以考其情性又將以考先王之澤葢法度禮樂雖亡于此猶能併與其深㣲之意而傳之故其為言率皆樂而不淫憂而不困怨而不怒哀而不傷如緑衣傷已之詩也不過曰我思古人俾無訧兮擊鼓怨上之詩也不過曰土國城漕我獨南行至軍旅數起大夫久役止曰自詒伊阻行役無期度思其危難以風焉不過曰苟無飢渴而已作詩者如此讀詩者其可以邪心讀之乎序刺衛宣公也淫亂不恤國事軍旅數起大夫久後男女怨曠國人患之而作是詩序所謂大夫久役男女怨曠者得之但未有以見其為宣公之時與淫亂不恤國事之意耳兼此詩亦婦人作非國人之所為也匏有苦葉濟有深涉深則厲淺則掲苦例反比也匏瓠護也匏之苦者不可食特可佩以渡水而已然今尚有葉則亦未可用之時也孔氏曰外傳魯語叔向曰苦匏不材于人供濟而已韋昭注云不材于人言不可水食也嚴氏曰匏經霜其葉枯落然後乾之腰以渡濟渡處也行渡水曰涉以衣而涉曰厲爾雅邢昺疏云此衣謂禈也言水深至于禈以上者而涉渡之名厲褰騫衣而涉曰掲此刺淫亂之詩言匏未可用而渡處方深行者當量其淺深而後可渡以比男女之際亦當量度禮義而行也毛氏曰遭事制宜如遇水深則厲淺則掲矣男女之際安可無禮義不也范氏曰深則厲淺則掲宜斟酌也若不顧理義猶度水之深淺而欲濟也有瀰彌爾反濟盈有鷕以小反雉鳴濟盈不濡軌居美反叶居有反雉鳴求其牡比也瀰水滿貌鷕雌雉聲軌車轍也張學龍曰説文曰軌車轍也從車九帆車軾前也從車凡音犯諸家辨之詳矣然集傳獨從軌葢以九牡聲之叶也軓聲則難叶矣飛曰雌雄走曰牝牡夫濟盈必濡其轍雉鳴當求其雄此常理也今濟盈而曰不濡軌雉鳴而反求其牡張學龍曰走曰牝牡此爾雅釋獸之正例諸家以牝雞雄狐為證言飛走通也殊不識詩人之意曰當濡其轍今乃不濡其轍迹是大可怪也當求其雄今乃求其牡獸是大異常也如此歌之則得詩人之意知集傳之旨矣以比淫亂之人不度禮義非其配耦而犯禮以相求也雝雝鳴鴈叶魚肝反旭許玉反日始旦士如歸妻迨冰未泮賦也雝雝聲和也孔氏曰生執之以行禮故言雁聲雁鳥名似鵝畏寒秋南春北旭日初出貌毛氏曰日始出為大昕之時昕音欣昏禮李寶之曰娶妻之禮以昏為期因以名焉日入二刻半為昏納采用雁孔氏曰六禮唯納徴用幣餘皆用雁鄭氏曰用雁者取其順隂陽往來程子曰取其不再偶也本草注曰雁為陽鳥葢得中和之氣熱即北寒即南以就和氣所以為贄者一取其信一取其和也凡贄用生雁左首以生色繒交絡之愚按集傳但言納采用雁者唯舉六禮之始耳親迎去聲以昏而納采請期以旦鄭氏曰自納采至請期皆用昕親迎用昏孔氏曰用昕者君子行禮貴其始親近用昏鄭氏取隂陽往來之義歸妻以冰泮而納采請期迨冰未泮之時言古人之于婚姻其求之不暴而節之以禮如此以深刺去聲淫亂之人也胡庭芳曰味士如歸妻之辭可見是刺淫者若責之曰士如欲歸妻自有婚姻之禮何得如此淫亂也若刺宣公不當以士言招招照遙反舟子叶奬里反人涉卬五郎反否叶補美反人涉卬否卬須我友叶羽軌反比也招招號毫召之貌孔氏曰王逸云以手曰招以口曰召舟子舟人主濟渡者卬我也舟人招人以渡人皆從之而我獨否者待我友之招而後從之也以比男女必待其配耦而相從而刺此人之不然也匏有苦葉四章章四句輔氏曰此詩意雖正而體製異于諸作若有不敢正言之意一章言為事當有所度量二章言苟不以不能度量則必至于反常而逆理三章則詔之婚姻常禮四章則言人當有可有不可以刺淫亂之人亂常逆理而無有不可也愚按此詩一章二章四章反覆諷刺皆以濟涉之事為比豈所指淫人居津水之傍歟抑詩人以一時所見而取譬歟序刺衛宣公也公與夫人並為淫亂未有以見其為刺宣公夫人之詩習習谷風以隂以雨黽勉同心不宜有怒叶䁔五反采葑孚容反采菲妃鬼反無以下體徳音莫違及爾同死叶想止反比也習習和舒也東風謂之谷風毛氏曰隂陽和而谷風至葑蔓萬菁精也菲似葍福莖麄葉厚而長有毛下體根也嚴氏曰江南有菘江北有蔓菁相似而異春食苗夏食心秋食莖冬食根菲葍類爾雅謂蒠菜河内謂蓿菜三月中蒸為茹滑美可作羮根如指正白可啖葑菲根莖皆可食而其根則有時而美惡徳音美譽也婦人為夫所棄故作此詩以敘其悲怨之情言隂陽和而後雨澤降如夫婦和而後家道成故為夫婦者當黽勉以同心而不宜至于有怒又言采葑菲者不可以其根之惡而棄其莖之美如為夫婦者不可以其顔色之衰而棄其徳音之善但徳音之不違則可以與爾同死矣輔氏曰上四句以隂陽和比夫婦之和下四句以葑菲根比婦人之色程子曰夫婦之道貴于有終徳音美音也當期好音無違至于偕老行道遲遲中心有違不逺伊邇薄送我畿音祈誰謂荼音徒苦其甘如薺音泚宴爾新昏如兄如弟待禮反賦而比也遲遲舒行貌違相背也畿門内也吕東萊曰韓詩云白石為門畿葢門閫也荼苦菜蓼屬也詳見良耜薺甘菜本草云薺味甘人取其葉作葅及羮宴樂也新昏夫所更娶之妻也言我之被棄行于道路遲遲不進葢其足前而心有所不忍如相背然而故夫之送我乃不逺而甚邇亦至其門内而止耳又言荼雖甚苦反甘如薺以比已之見棄其苦有甚于荼而其夫方且宴樂其新昏如兄如弟而不見恤陳少南曰物莫苦于荼婦人見棄其情苦甚則荼反甘如薺矣于是祝其夫曰宴爾新昏常如兄弟之親無復如我之見棄也葢婦人從一而終今雖見棄猶有望夫之情厚之至也愚按此章上四句賦其望夫之意而及其夫之薄情下四句則比已之甚苦而歎其夫之方樂賦體與比體相繼成章後凡言賦而比者文意亦放此云然以此婦仁厚之意求之後世如嚴灌夫之妻慎氏被出作詩别曰却挂孤帆從此去不堪重過望夫山可謂賢矣涇以渭濁湜湜音殖其沚音止宴爾新昏不我屑以毋逝我梁毋𤼵我笱古口反我躬不閲遑恤我後胡口反比也涇渭二水名涇水出今原州百泉縣笄頭山東南至永興軍髙陵入渭渭水出渭州渭源縣鳥䑕山至同州馮翊縣入河吕東萊曰詩人多述土風此衛詩而逺引涇渭者葢涇濁渭清天下所共知如云海鹹河淡也愚按原州百泉縣即今鞏昌路鎮原州及平涼府地永興軍髙陵即今安西路髙陵縣渭州渭源縣即今鞏昌路臨洮府渭源縣同州馮翊縣即今安西路同州地湜湜清貌沚水渚也屑潔以與逝之也梁堰宴石障水而空控其中以通魚之往來者也笱以竹為器而承梁之空以取魚者也閲容也涇濁渭清然涇未屬渭之時雖濁而未甚見由二水既合而清濁益分然其别出之渚流或稍緩則猶有清處婦人以自比其容貌之衰久矣又以新昏形之益見憔悴然其心則固猶有可取者但以故夫之安于新昏故不以我為潔而與之耳又言毋逝我之梁毋𤼵我之笱以比欲戒新昏毋居我之處毋行我之事而又自思我身且不見容何暇恤我已去之後哉知不能禁而絶意之辭也輔氏曰不忍遂棄其家事者仁也知其不能禁而絶意焉者知也就其深矣方之舟之就其淺矣泳之㳺之何有何亡黽勉求之凡民有喪匍音蒲匐蒲北反救叶居尤反之興也方桴舟船也潛行曰泳浮水曰游愚按泳與㳺今俗所謂㴹與泅也匍匐手足並行急遽之甚也説文曰匍手行也匐伏地也孔氏曰匍匐本小兒求行之狀其盡力顛蹶似之故取名婦人自陳其治家勤勞之事言我隨事盡其心力而為之深則方舟淺則泳㳺不計其有與亡而強勉以求之孔氏曰隨水深淺期于必渡猶隨事難易期于必成不問貧富吾皆盡力求之愚按深淺以興有亡方舟泳㳺以興勉求也又周睦其隣里鄉黨莫不盡其道也輔氏曰勤勞家事周恤隣里即首章之所謂徳音下章之所謂我徳也婦人無外事以勤家睦隣為徳而已此可見其勤而不怨不能我慉許六反反以我為讎既阻我徳賈音古用不售市救反叶市周反昔育恐育鞠居六反及爾顛覆芳服反既生既育比予于毒賦也慉養阻却鞠窮也承上章言我于女家勤勞如此而女既不我養而反以我為仇讎惟其心既拒却我之善故雖勤勞如此而不見取如賈之不見售也程子曰凡人所以憎而不知其善者由其心阻絶其善故也廣韻注曰售謂物出手也因念其昔時相與為生惟恐其生理窮盡而及爾皆至于顛覆今既遂其生矣乃反比我于毒而棄之乎張子曰育恐謂生于恐懼之中育鞠謂生于困窮之際亦通李迂仲曰正所謂將恐將懼推子與汝將安將樂汝轉棄予是也輔氏曰或問昔育恐育鞠張子之説固善然推之下文及爾顛覆之云意不甚貫不若前説為順先生曰此姑存異義耳然舊説亦不甚明白也我有旨蓄勅六反亦以御魚吕反下同冬宴爾新昏以我御窮有洸音光有潰户對反既詒我肄羊至反不念昔者伊余來塈許器反興也旨美蓄聚御當也洸武貌潰怒色也項氏曰洸水涌也其勇如水涌水之潰者其勢横暴而四出故怒之盛者為潰肄勞塈息也又言我之所以蓄聚美菜者葢欲以禦冬月乏無之時至于春夏則不食之矣愚按古人場圃同地秋杪則築堅圃地為場以納禾稼至來春又耕治之以種菜茹故蓄菜但以禦冬也今君子安于新昏而厭棄我是但使我禦其窮苦之時至于安樂則棄之也曽氏曰人之于物得新可以捐故然厚者猶有所不忍夫婦義當偕老乃姑以御窮而已其薄惡可知又言于我極其武怒而盡遺我以勤勞之事曽不念昔者我之來息時也追言其始見君子之時接禮之厚怨之深也輔氏曰末二章又可見其怨而不怒谷風六章章八句看詩義理外更好看他文章且如谷風他只是如此説出來然而序得事曲折先後皆有次第而今費盡氣力類去做後尚做得不好輔氏曰觀此一詩比物連因事興辭條理秩然有序勤而不怨怨而不怒玩而味之可謂賢婦人矣而見棄于夫者亦獨何哉序刺夫婦失道也衛人化其上淫于新昏而棄其舊室夫婦離絶國俗傷敗焉亦未有以見化其上之意式㣲式㣲胡不歸㣲君之故胡為乎中露賦也式𤼵語辭㣲猶衰也再言之者言衰之甚也鄭氏曰㣲乎㣲者也范淳夫曰諸侯失國而寄于他國之邑㣲莫甚焉郭璞注云言至㣲也㣲猶非也愚按此章二㣲字義不同中露露中也言有霑濡之辱而無所芘覆阜也舊説以為黎侯失國而寓于衛釋文曰杜預云黎在上黨壺闗縣鄭氏曰寓寄也黎侯為狄人所逐棄其國而寄于衛其臣勸之曰衰㣲甚矣何不歸哉我若非以君之故則亦胡為而辱于此哉孔氏曰主憂臣勞主辱臣死固當不憚淹恤今言我若無君何為處此者自言已勞以勸君歸也輔氏曰式㣲式㣲胡不歸羞惡之心義之端也㣲君之故胡為乎中露忠敬之誠仁之至也式㣲式㣲胡不歸㣲君之躬胡為乎泥中賦也泥中言有陷溺之難而不見拯救也式㣲二章章四句此無所考姑從序説陳器之問式㣲詩以為勸邪戒邪曰亦不必如此看只是隨他當時所作之意如此可見得有羇旅狼狽之君如此而方伯連師無救卹之意胡庭芳曰補傳云以詩作于衛地故編之衛風序黎侯寓于衛其臣勸以歸也詩中無黎侯字未詳是否下篇同旄丘之葛叶居謁反兮何誕之節兮叔兮伯叶音逼兮何多日也興也前髙後下曰旄丘誕濶也叔伯衛之諸臣也謝疊山曰叔伯字也舊説黎之臣子自言久寓于衛時物變矣故登旄丘之上見其葛長大而節䟽濶因託以起興曰旄丘之葛何其節之濶也衛之諸臣何其多日而不見救也呂東萊曰葛始生其節蹙而密既長其節濶而疎黎人見葛之長感時之久而衛猶未見救爾此詩本責衛君而但斥其臣可見其優柔而不迫也輔氏曰本責衛君而但斥其臣望之雖切而其辭益緩真可見其温柔寛厚之情也何其處也必有與也何其久叶舉里反也必有以也賦也處安處也與與國也以他故也因上章何多日也而言何其安處而不來意必有與國相俟而俱來耳又言何其久而不來意其或有他故而不得來耳詩之曲盡人情如此狐裘蒙戎匪車不東叔兮伯兮靡所與同賦也大夫狐蒼裘孔氏曰蒼裘所施禮無明文唯王藻注云𤣥衣之裘葢大夫士𤣥端之裘也𤣥端衣皆𤣥裘象衣色故用狐青蒙戎亂貌言弊也又自言客久而裘弊矣豈我之車不東告于女乎言叔兮伯兮不與我同心雖往告之而不肯來耳至是始㣲諷切之或曰狐裘蒙戎指衛大夫而譏其憒膾亂之意匪車不東言非其車不肯東來救我也但其人不肯與俱來耳今按黎國在衛西前説近是瑣素果反兮尾兮流離之子叶奬里反叔兮伯兮褎由救反如充耳賦也瑣細尾末也流離漂散也褎多笑貌充耳塞耳也耳聾之人恒多笑言黎之君臣流離瑣尾若此其可憐也而衛之諸臣褎然如塞耳而無聞何哉至是然後盡其辭焉流離患難之餘而其言之有序而不迫如此其人亦可知矣輔氏曰褎如充耳責之也自緩而疑自疑而諷自諷而責是皆性情之正也旄丘四章章四句説同上篇劉辰翁曰一章何多日也未有怨望之意也二章必有與也必有以也有望于衛未怨也三章靡所與同㣲怨也四章褎如充耳不能不怨矣蘇氏曰諸侯雖異國而相為蔽苟黎亡則衛及矣奈何靡所與同哉葢時衛在河北黎衛壤地相接故狄之為患黎衛共之李迂仲曰衛不救黎非惟失穆乃四隣之道抑亦唇亡齒寒矣其後為為狄所滅齊侯以管仲之言而救之觀衛之徳齊為最深則知黎之怨衛為最切黄實夫曰衛失國而薺救之黎失國而衛不救此齊之所以伯而衛之所以不振也序責衛伯也狄人迫逐黎侯黎侯寓于衛衛不能修方伯連率帥之職黎之臣子以責于衛也序見詩有伯兮二字而以為責衛伯之詞誤矣陳氏曰説者以此為宣公之詩然宣公之後百餘年衛穆公之時晉滅赤狄潞氏數之以其奪黎氏地然則此其穆公之詩乎不可得而知也愚按以此詩為作于衛宣之時固無可考但上篇黎臣有勸歸之辭則此時黎之宗社疑未滅也豈其後黎侯復國至衛穆公時方為赤狄所滅故晉人數赤狄之罪立黎侯而還以此意之式㣲旄丘二詩雖未有以見其必作于衛宣之時恐亦未必作于衛穆時也簡兮簡兮方將萬舞日之方中在前上處賦也簡簡易不恭之意萬者舞之總名武用干戚文用羽籥也吕東萊曰萬舞二舞之總名干舞者武舞之别名籥舞者文舞之别名也文舞又謂之羽舞愚按干盾也戚斧也羽籥此詩三章所言是也皆舞者所執之物日之方中在前上處言當明顯之處王介甫曰至明而易見之時至近而易察之地于是焉不能察而用之賢者不得志而仕于伶官鄭氏曰伶氏世掌樂官而善焉故後世號樂官為伶官有輕世肆志之心焉故其言如此劉辰翁曰簡兮簡兮坦坦施施有慢世玩物之意味方將字可見若自譽而實自嘲也輔氏曰此章既自成以為簡易次章又自以為碩人只此便可見其為不恭也當明顯之處公然為此而不以為辱亦是不恭之意與次章所謂公庭萬舞同先生謂其若自譽而實自嘲者深得其旨也王氏以為于至近易明之地而不能察所以刺者失其旨矣碩人俁俁疑矩反公庭萬舞有力如虎執轡如組音組賦也碩大也俁俁大貌轡今之韁也組織絲為之言其柔也御能使馬則轡柔如組矣又自譽其才之無所不備亦上章之意也愚按既能樂舞又善御馬亦若上章之自譽而實自嘲也左手執籥除若反右手秉翟直亭歴反叶角反赫如渥於角反赭音者叶陟畧反公言錫爵賦也執籥秉翟者文舞也籥如笛而六孔或曰三孔釋文曰以竹為籥長三尺執之以舞郭璞云似笛而小翟雉羽也赫赤貌渥厚漬也孔氏曰渥者浸潤之名信南山曰既優既渥是也言漬之久厚而有光澤故以喻顔色之潤赭赤色言其顔色之充盛也公言錫爵即儀禮燕飲而獻工之禮也燕禮主人洗升獻工工不興一人拜受爵李寳之曰詩錫爵謂此獻工之禮也以碩人而得此則亦辱矣程子曰錫之以爵勞賤者之道乃反以其賚予與之親洽為榮而誇美之亦玩世不恭之意也輔氏曰前已言其輕意肆志之心又言其玩世不恭之意何也曰意唯輕之是以玩之志惟肆焉故不恭也知其世之不可與有為故輕玩之心生焉于其所不足為而姑為之于其所不足誇而反誇之是皆不恭之意也山有榛側巾反隰有苓音零云誰之思西方美人彼美人兮西方之人兮興也愚按楚詞湘夫人歌曰沅有芷兮澧有蘭思公子兮未敢言越人歌曰山有木兮木有枝心悦君兮君不知秋風辭曰蘭有秀兮菊有芳攜佳人兮不能忘皆與此章起興之例同故朱子嘗曰知此則知興體矣榛似栗而小下濕曰隰苓一名大苦葉似地黄即今甘草也西方美人託言以指西周之盛王如離騷亦以美人目其君也離騷經曰恐美人之遲暮集註云言美好之婦人葢託辭而寄意于君也又曰西方之人者歎其逺而不得見之詞也賢者不得志于衰世之下國而思盛際之顯王故其言如此而意逺矣張學龍曰榛之實甘美而山有之苓之莖甘美而隰有之以興為人之君而美好者惟西周有之所以思之者其人也思之而不得見之故重歎之而思之深也此葢伶官碩人之詞其詞甚婉而實諷衛國之無賢君也然也思盛世之聖明而不責衰世之幽厲此詩人之忠厚簡兮四章三章章四句一章六句舊三章章六句今改定張子曰為禄仕而抱闗擊柝則猶恭其職也為伶官則雜于侏儒俳優之間不恭甚矣其得謂之賢者雖其迹如此而其中固有以過人又能卷而懐之是亦可以為賢矣東方朔似之潘子善問如張子之説是固可以為賢然以聖賢出處律之恐未可以為盡善曰古之伶官亦非甚賤其所執者猶是先王之正樂故獻工之禮亦與之交酢但賢者而為此則自不得志耳輔氏曰朔之所以自譽者皆所以自嘲其恢諧類俳優正與此詩之意相似李迂仲曰伶官者賤役耳今以賢人為之正猶君子陽陽之詩序言君子遭亂相招為禄仕全身逺害屈于賤役也序刺不用賢也衛之賢者仕于伶官皆可以承事王者也此序略得詩意而詞不足以達之毖悲位反彼泉水亦流于淇有懐于衛靡日不思叶新齎反孌力轉反彼諸姫聊與之謀叶謨悲反興也毖泉始出之貌泉水即今衛州共恭城之百泉也淇水出相去聲州林慮閭縣愚按林慮縣今改林州東流泉水自西北而東南來注之孔氏曰邶鄘衛三國境地相連故邶云亦流于淇鄘云送我乎淇之上矣衛云瞻彼淇奥之類皆言淇也孌好貌諸姫謂姪娣也衛女嫁于諸侯父母終思歸寜而不得故作此詩言毖然之泉水亦流于淇矣我之有懐于衛則亦無日而不思矣是以即諸姫而與之謀為歸衛之計如下兩章之云也出宿于泲子禮反飲餞音踐于禰乃禮反女子有行逺于萬反父母兄弟待禮反問我諸姑遂及伯姊叶奬禮反賦也泲地名飲餞者古之行者必有祖道之祭祭畢處者送之飲于其側而後行也孔氏曰所以祖祭者重已方有事于道故祭道之神也軷祭又名祖聘禮及詩云出祖是也又名道曽子問云道而出是也皆先軷而飲餞乃出宿此先言出宿者見飲餞為出宿而設禰亦地名皆自衛來時所經之處也諸姑伯姊即所謂諸姬也愚按夫人之嫁必有姪娣二人為媵而同姓二國往媵之亦有姪娣皆謂之媵凡八人集傳以此詩為夫人作而以諸姬為姪娣又謂諸姑伯姊即諸姬然則八人之中亦有是夫人姑姊輩行者乎言始嫁來時則固已逺其父母兄弟矣況今父母既終而復可歸哉是以問于諸姑伯姊而謀其可否云耳鄭氏曰國君夫人父母在則歸寜沒則使大夫寜于兄弟出宿于干叶居焉反飲餞于言載脂載牽胡瞎反叶下介反還音旋車言邁遄市專反臻于衛此字本與邁害叶今讀誤不瑕有害賦也干言地名適衛所經之地也脂以脂膏塗其牽使滑澤也牽車軸也不駕則脱之設之而後行也釋文曰牽車軸頭金嚴氏曰載脂謂先以脂塗其牽其用在脂故曰載脂載牽謂塗畢乃設牽于車其用在牽故曰載牽還回旋也旋其嫁來之車也遄疾臻至也瑕何古音相近通用言如是則其至衛疾矣然豈不害于義理乎疑之而不敢遂之辭也我思肥泉兹之永歎叶他㳙反思須與漕叶徂侯反我心悠悠駕言出遊以冩我憂賦也肥泉水名須漕衛邑也悠悠思之長也冩除也既不敢歸然其思衛地不能忘也安得出㳺于彼而冩其憂哉鄭氏曰肥泉自衛而來所渡水故思此而長歎須漕自衛而來所經邑故又思之憂問恐此只是因思歸不得故欲出㳺于國以冩其否曰夫人之逰亦不可輕出只是思逰于彼地耳泉水四章章六句楊氏曰衛女思歸發乎情也其卒也不歸止乎禮義也聖人著之于經以示後世使知適異國者父母終無歸寜之義則能自克者知所處矣胡庭芳曰一章託泉水起興而謀于諸姬也二章述初嫁時宿餞衛郊既逺父母今父母終而欲歸故以問諸姑伯姊何如耳三章又欲效初嫁時宿餞于所嫁國之干言脂牽歸衛第未知有害于義理乎此正謀諸姬之語也四章既不可歸于是但思肥泉思須漕以重衛國悠悠之景慕欲往逰以冩憂而已所謂發乎情止乎禮義者也陳君舉曰泉水竹竿載馳皆衛女思歸也泉水竹竿歴道欲歸之意終篇唯欲出逰以驅吾愁思而已所謂正乎禮義載馳之詩其歸尤急末章無有愧止之辭葢泉水竹竿作于無事之時故其辭緩以婉載驅賦于故國已亡之日故其辭切以怨序衛女思歸也嫁于諸侯父母終思歸寜而不得故作是詩以自見也出自北門叶眉貧反憂心殷殷終窶其矩反且貧莫知我艱叶居銀反已焉哉叶將其反下同天實為之謂之何哉比也北門背陽向隂殷殷憂也窶者貧而無以為禮也孔氏曰窶謂無財可以為禮貧謂無財可以自給然二者皆無財之事故爾雅貧窶通也李迂仲曰兼言之以見貧之甚也衛之賢者處亂世事暗君不得其志故因出北門而賦以自比問只作賦説如何曰當作賦而比當時必欲出北門而後作此詩亦有比意思孔氏曰言出自北門背明向隂而行猶居亂世嚮暗君而仕也張子曰偶出北門因有此言又歎其貧窶人莫知之而歸之于天也孔氏曰我之困苦天實為之使我遭此君知復奈何哉君臣道不合則去今無去心忠之至也鄭氏曰詩人事君無二志故自决歸之于天輔氏曰終者已焉之辭葢自以為無復有望也故歎之曰已焉哉天實為之謂之何哉此葢知其無可奈何而歸之天也是亦所謂發乎情止乎禮義者矣王事適我政事一埤避支反益我我入自外室人交徧讁知革反叶竹棘反我已焉哉天實為之謂之何哉賦也王事王命使為之事也適之也政事其國之政事也一猶皆也埤厚室家讁責也王事既適我矣政事又一切以埤益我其勞如此而窶貧又甚室人至無以自安而交徧讁我則其困于内外極矣孔氏曰言非直已貧窶君又政偏已兼其苦我自外而歸則室家之人更迭而徧來責我外為君所困内為家人不知故又自決歸之于天范氏曰闗雎之化行則婦人能閔其君子至于衰世則室家日見而有不知其心者玉事敦叶都回反我政事一埤遺唯季反叶夷回反我我入自外室人交徧摧徂回反我已焉哉天實為之謂之何哉賦也敦猶投擲也遺加摧沮也鄭氏曰摧者刺譏之言輔氏曰摧謂摧折沮抑之又甚于讁也北門三章章七句楊氏曰忠信重禄所以勸士也衛之忠臣至于窶貧而莫知其艱則無勸士之道矣仕之所以不得志也先王視臣如手足豈有以事投遺之而不知其艱哉然不擇事而安之無懟憾之辭知其無可奈何而歸之于天所以為忠臣也謝疊山曰鹿鳴四牡之燕樂出車杕杜之勞來一人之勞苦君無不知一毫之事功君無不報此先王所以體羣臣也千嵗治安根本葢在此也北門之忠臣至于終窶且貧禄不足代耕矣出則當王事之獨勞入則當政事之煩使室人不能忍飢寒而交徧讁之此人情所難堪者上不怨其君下不怨其家窮而呼天亦無一毫怨天之辭此樂天知命之士也有臣如此而不能忠信重禄以勸之衛之所以亡也序仕不得志也言衛之忠臣不得其志爾愚按朱子以此序稍平故不注然集傳以此詩為仕者自作則序意與詩亦㣲不合北風其涼雨于付反雪其雱普康反惠而好呼報反下同我攜手同行叶户郎反其虚其邪音徐下同既亟只音紙下同且子餘反下同比也北風寒涼之風也凉寒氣也雱雪盛貌惠愛行去也虛寛貌邪一作徐緩也釋文曰爾雅作徐亟急也只且語助辭言北風雨雪以比國家危亂將至而氣象愁慘也故欲與其相好之人去而避之且曰是尚可以寛徐乎彼其禍亂之迫已甚而去不可不速矣輔氏曰惠而好我攜手同行不忘故舊之仁也其虚其邪既亟只且見幾而作之智也北風其喈音皆叶居奚反雨雪其霏芳非反惠而好我攜手同歸其虚其邪既亟只且比也喈疾聲也霏雨雪分散之狀謝叠山曰北風怒而有聲不止于涼矣雨雪霏霏而密不止于雱矣喻禍害愈急也歸者去而不反之辭也莫赤匪狐莫黒匪烏惠而好我攜手同車其虚其邪既亟只且比也狐獸名似犬黄赤色烏鵶黒色皆不祥之物人所惡見者也所見無非此物則國將危亂可知潘子善問狐與烏不知比何物曰不但指一物而言當國將危亂時凡所見者無非不好底景象也同行同歸猶賤者也同車則貴者亦去矣謝叠山曰一章曰三同行三章曰同歸章曰同車一節急一節風人之法度也程子曰同車亦偕行耳但辭意益迫切同車有已駕之意北風三章章六句愚按詩中有同車之語疑此為仕于衛者所作其虚其邪既亟只且三章三言之豈果于忘君哉葢見幾而作不俟終日若國已危則無可去之義矣序刺虐也衛國並為威虐百姓不親莫不相攜持而去焉衛以淫亂亡國未聞其有威虐之政如序所云者恐非是程子曰序謂百姓不親相攜而去然考詩之辭乃君子見幾而作相招無及于禍患者也靜女其姝赤朱反俟我于城隅愛而不見搔蘇刀反首踟直知反蹰直誅反賦也靜者閒雅之意姝美色也城隅幽僻之處不見者期而不至也踟蹰猶躑躅音擲觸也此淫奔期㑹之詩也問淫奔之人方相與狎暱又何取乎閒雅曰淫奔之人不知其為可醜但見其可愛耳以女而俟人于城隅安得謂之閒雅而此曰靜女者猶所謂徳音無良也無良則不足以為徳音矣而曰徳音亦愛之之辭也歐陽子曰衛俗淫亂幽靜難誘之女且然則其他可知靜女其孌貽我彤徒冬反管叶古兖反彤管有煒于鬼反説音悦懌音亦女美賦也孌好貌于是則見之矣彤管未詳何物歐陽子曰古者鍼筆皆有管樂器亦有管不知此管是何物但彤是色之美者鍼與針同葢相贈以結殷勤之意耳煒赤貌言既得此物而又悦懌此女之美也自牧歸荑徒兮徒計二反洵美且異夷曳二音匪女音汝之為美美人之貽與異同賦也牧外野也歸亦貽也荑茅之始生者吕東萊曰大過九二枯楊生梯鄭康成易作夷然則荑者凡草木根芽皆是非獨茅也洵信也女指荑而言也言靜女又贈我以荑而其夷亦美且異然非此荑之為美特以美人之所贈故其物亦美耳靜女三章章四句序刺時也衛君無道夫人無徳此序全然不似詩意劉辰翁曰只是男女相遺之詩新臺有泚此禮反河水瀰瀰莫邇反燕婉之求籧音渠篨音除不鮮斯踐反叶想止反賦也泚鮮明也劉執中曰水中臺影鮮明之貌胡庭芳曰臺在河上曰泚曰洒皆從水義瀰瀰盛也燕安婉順也籧篨不能俯疾之醜者也葢籧篨本竹席之名人或編以為囷其狀如人之擁腫而不能俯者故又因以名此疾也鮮少也舊説以為衛宣公為其子伋娶于齊而聞其美欲自娶之乃作新臺于河上而要腰之國人惡之而作此詩以刺之言齊女本求與伋為燕婉之好而反得宣公醜惡之人也孔氏曰宣公晉桓公子李迂仲曰新臺臨河今澶州遺址尚存謝叠山曰籧篨乃惡蒺宣公非有此疾國人惡其無禮義亂大倫故以惡疾比之既無人道亦非人形也新臺有洒七罪反叶先典反河水浼浼毎罪反叶美辯反燕婉之求籧篨不殄賦也洒髙峻也劉執中曰謂水光之中見其臺之髙峻也浼浼平也殄絶也言其病不已也魚網之設鴻則離之燕婉之求得此戚施興也鴻雁之大者離麗也戚施不能仰亦醜疾也吕東萊曰國人惡宣公而以惡疾指之不能俯者籧篨之疾證不能仰者戚施之疾証非于此取義也言設魚網而反得鴻以興求燕婉而反得醜疾之人所得非所求也曽氏曰籧篨戚施皆惡疾之人不能為人者也宣公之行非復人理尚可謂之人歟燕婉之求而得此匪人深惡之之詞也新臺三章章四句凡宣姜事首末見春秋傳然于詩則皆未有考也諸篇放此李迂仲曰聖人存此以垂戒後世宜懲其轍而乃有踵其惡者楚平王納太子建妻唐明皇納夀王妃比三君者其惡一也其後宣公之子汲夀皆為所殺惠公奔齊子懿公為狄所滅楚平王有鞭尸之禍唐明皇身竄南蜀幾失天下則知淫亂之禍其報如此可不戒哉愚按宣姜事首末見左氏傳桓公十六年及閔公二年序刺衛宣公也納伋之妻作新臺于河上而要之國人惡之而作是詩也二子乘舟汎汎芳劍反其景叶舉兩反願言思子中心養養以兩反賦也二子謂伋壽也乘舟渡河如齊也景古影字葛洪始加彡為影字養養猶漾漾憂不知所定之貌舊説以為宣公納伋之妻是為宣姜生壽及朔朔與宣姜愬伋于公公令伋之齊使賊先待于隘而殺之壽知之以告伋伋曰君命也不可以逃壽竊其節而先往賊殺之伋至曰君命殺我壽有何罪賊又殺之國人傷之而作是詩也蘇氏曰國人傷其往而不返汎汎然徒見其影故救之不可得是以思之養養然詩攷曰劉向新序云伋之傅母恐其死也而作詩二子乘舟汎汎其逝此字本與害叶今讀誤願言思子不瑕有害賦也逝往也不瑕疑詞義見泉水此則見其不歸而疑之也輔氏曰字義雖與泉水同然泉水所謂害者害于義也此所謂害者害其身而已故先生謂此則見其不歸而疑之之辭葢不忍正言其死且為君諱也陳壽翁曰二子之死明矣猶為疑辭而不盡言以彰君惡詩人之厚也二子乘舟二章章四句太史公曰余讀世家言至于宣公之子以婦見誅弟壽爭死以相讓此與晉太子申生不敢明驪姬之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相戮亦獨何哉太史公之言有所抑揚謂三人皆惡傷父志而終于死亡其情則可取雖于理為未當然視父子相殺兄弟相戮者則大相逺矣又曰伋當逃避使宣公無殺子之事不陷于惡乃為得禮如不忍去而死之尚可也壽無救于兄而重父之過其死也亦何為乎但國人憐而哀之故聖人録國人之情著宣公之過亦以見二子事親之道有未盡也舜之事瞽瞍烝烝又不格姦欲使之未嘗不在側索而殺之未嘗可得此舜之所以為法于天下也輔氏曰二子處此亦不得為是而夫子取此詩者所以著宣公志行之惡而其禍至于如是之酷以為萬世戒爾故先生嘗謂太史公欠此意然其言有抑揚可以感發人故取之非便以二子所處為是也序思伋壽也衛宣公之二子爭相為死國人傷而思之作是詩也説已見本篇邶十九篇七十二章三百六十三句愚按衛詩三十九篇而邶風才十有九然觀緑衣則妾僭嫡矣燕燕則臣弑君矣谷風則夫婦之道乖新臺則男女之倫㓕二子乘舟則父子之恩絶旄丘則無恤鄰之義簡兮則無尊賢之心北門則失勸士之道亂常敗政莫甚于此所以居變風之首歟於乎渡河野處已兆矣不待讀定之方中而后知也詩傳通釋卷二
