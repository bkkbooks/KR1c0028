body:
  text: 詩傳通釋卷六元劉瑾撰詩朱子集傳唐一之什唐國名本帝堯舊都在禹貢冀州之域太行恆山之西大原大嶽之野鄭氏曰今大原晉陽是堯始居比後乃遷河東平陽周成王以封弟叔虞為唐侯孔氏曰晉世家云成王與叔虞戲削桐葉為圭曰以此封若於是封叔虞於唐地名晉陽是也南有晉水至子燮乃改國號曰晉後徙曲沃又徙居絳孔氏曰唐叔生晉侯燮燮生武侯寧族族生成侯服人成侯徙曲沃穆侯徙絳昭侯以下又徙翼及武公并晉又都絳也其地土瘠民貧勤儉質朴憂深思逺有堯之遺風焉前漢志曰河東本唐堯所居有先王遺教君子深思小人儉嗇張南軒曰堯之遺風只是儉而用禮一事亦不必事事稱有遺風也其詩不謂之晉而謂之唐蓋仍其始封之舊號耳愚按叔虞封唐燮侯號晉十七傳至晉侯緡為曲沃武公所并然武公能滅晉之宗而不能滅唐之號能冒晉之號而不能繼唐之統君子欲絶武公於晉而不可故總名其詩為唐以寓意焉然則晉詩稱唐見曲沃武公滅宗國之罪而魏風首晉又以見曲沃獻公滅同姓之惡世變如此春秋欲不作不可也唐叔所都在今大原府曲沃及絳皆在今絳州愚按今大原路改冀寧路今絳州有曲沃縣絳縣並隸河東山西道蟋蟀在堂嵗聿允橘反其莫音慕今我不樂音洛下同日月其除直慮反無已大音泰康職思其居叶音據好呼報反樂無荒良士瞿瞿俱具反賦也蟋蟀蟲名似蝗而小正黑有光澤如漆有角翅或謂之促織陸璣曰一名蜻蛚里語曰促織鳴懶婦驚九月在堂聿遂莫晚孔氏曰七月説蟋蟀云九月在户此言在堂謂在室户之外與户相近是九月可知過此月後則嵗遂將暮矣除去也大康過於樂也職主也瞿瞿却顧之貌唐俗勤儉故其民間終嵗勞苦不能少休及其嵗晚務間之時乃敢相與燕飲為樂而言今蟋蟀在堂而嵗忽已晚矣當此之時而不為樂則日月將舍我而去矣然其憂深而思逺也故方燕樂而又遽相戒曰今雖不可以不為樂然不已過於樂乎盍亦顧念其職之所居者使其雖好樂而無荒若彼之良士長慮而却顧焉則可以不至於危亡也輔氏曰今我不樂日月其除張而不弛文武不能也無已大康職思其居弛而不張文武不為也好樂無荒良士瞿瞿一張一弛文武之道也嚴氏曰職思其居啓其憂也好樂無荒作其勤也良士瞿瞿警其懼也三言而君國之道盡矣蓋其民俗之厚而前聖遺風之逺如此愚按自堯而至於周蓋千餘年矣而其風化流傳固結於唐人之心故其民間質實勤儉之習親愛和樂之恩警戒忠告之情備見於詩此其俗之所以為厚也蟋蟀在堂嵗聿其逝今我不樂日月其邁叶力制反無已大康職思其外叶五墜反好樂無荒良士蹶蹶俱衛反賦也逝邁皆去也外餘也其所治之事固當思之而所治之餘亦不敢忽蓋其事變或出於平常思慮之所不及故當過而備之也歐陽子曰職思其外者廣周慮也蹶蹶動而敏於事也蟋蟀在堂役車其休今我不樂日月其慆吐刀反叶他侯無已大康職思其憂好樂無荒良士休休賦也庶人乘役車嵗晚則百工休矣孔氏曰春官巾車注云役車方箱則載任器以供役收納禾稼亦用此車故役車休息是農工畢也慆過也休休安間之貌樂而有節不至於淫所以安也輔氏曰庶人之役車猶休矣則君子可無一日之樂乎職居其居謂所居之職也職思其外謂所職之外也職思其愛謂思之極而至於憂也瞿瞿顧慮周旋之貌未見於為也蹶蹶則見於為矣蹶蹶動而敏於事之貌未見其安也安則瞿瞿蹶蹶之效也始則瞿瞿然而思中則蹶蹶然而為終則休休然而安必如是始可以樂而謂之良士爾蟋蟀三章章八句輔氏曰嵗聿其逝則不止於嵗聿其莫矣役車其休則不止於嵗聿其逝矣日月其邁則不止於日月其除矣日月其慆則不止於日月其邁矣職思其外則不止於職思其居矣職思其憂則不止於職思其外矣蹶蹶則不止於瞿瞿矣休休則又瞿瞿蹶蹶之效也其意皆由近而逺自淺而深是則所謂憂深而思逺者也陳壽翁曰始思其居則所居處之中次思其外則又出於所居之外終思其憂則思之逺而憂之深可見矣楊氏曰此詩欲及時自樂也而卒曰好樂無荒可謂有禮矣當是時風雖變而堯之遺風未亡也唐風自是尚有勤儉之意作詩是一箇不敢故懷底人説今我不樂便又説無已大康愚按此詩必曰蟋蟀在堂而後曰今我不樂則能不遊于逸矣既曰今我不樂又曰無已大康則能不淫於樂矣曰職思其外則敝戒無虞也曰好樂無荒則無怠無荒也以詩人之克勤克儉所憂所思雖無唐虞君臣之德業而其發於詩者與伯益告戒之詞同條共貰信乎前聖遺風之逺也序刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自虞樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉河東地瘠民貧風俗勤儉乃其風土氣習有以使之至今猶然則在三代之時可知矣序所謂儉不中禮固當有之但所謂刺僖公者蓋特以諡得之而所謂欲其及時以禮自娛樂者又與詩意正相反耳況古今風俗之變常必由儉以入奢而其變之漸又必由上以及下今謂君之儉反過於初而民之俗猶知用禮則尤恐其無是理也獨其憂深思逺有堯之遺風為得之然其所以不謂之晉而謂之唐者又初不謂此也唐自是未改號晉時國名序者便率合謂此晉也而謂之唐乃有堯之遺風本意豈因此而謂之唐是皆鑿説愚按季札見歌唐曰思深哉其有陶唐氏之道風乎不然何其憂之逺也意序者據此遂謂因其有堯遺風而謂之唐不知大師特係以始封之號爾初無與於堯也山有樞烏侯昌朱二反隰有榆夷周以朱二反子有衣裳弗曳弗婁力侯力俱二反子有車馬弗馳弗驅袪尤虧于二反宛於阮反其死矣他人是愈他侯以朱二反興也樞荎垤也今刺去聲榆也榆白枌也吕東萊曰陸璣云樞其針刺如柘其葉如榆為茹美滑於白榆也榆之皮色白者名枌郭璞云枌榆先牛葉却著英皮色白婁亦曳也孔氏曰曳者衣裳在身行必曳之廣韻注曰曳牽也又引也馳走驅䇿也宛坐見貌愈樂也此詩蓋以答前篇之意而解其憂故言山則有樞矣隰則有榆矣詩所以能興起人處全在興如山有樞隰有榆别無意義只是興起下面子有車馬子有衣裳耳子有衣裳車馬而不服不乘則一旦宛然以死而他人取之以為已樂矣蓋言不可不及時為樂然其憂愈深而意愈蹙矣愚按宛其死矣而衣裳車馬徒為他人之樂是其憂逺及於身後其意欲盡樂於生時則雖解前篇深逺之憂而憂反愈深雖答前篇為樂之意而意則愈蹙矣山有栲音考叶去九反隰有杻女九反子有廷內弗灑弗掃叶蘇后反子有鍾鼓弗鼓弗考叶去九反宛其死矣他人是保叶補苟反興也栲山樗也似樗色小白葉差狹孔氏曰栲亦類黍樹俗語曰櫄樗栲漆相似如一杻檍億也葉似杏而尖白色皮正赤其理多曲少直材可為弓弩幹者也陸璣曰杻二月中開花似練而細藻正白蓋樹今官園種之正名曰萬嵗考擊也保居有也山有漆音七隰有栗子有酒食何不日鼓瑟且以喜樂音洛且以永日宛其死矣他人入室興也君子無故琴瑟不離於側永長也人多憂則覺日短飲食作樂可以永長此日也孔氏曰曲禮下云士無故不徹琴瑟注云故謂災患喪病言永日者人而無事則日長難度若飲食作樂則忘憂愁可以永長此日山有樞三章章八句謝疊山曰始言他人是愈中言他人是保末言他人入室一節悲一節此亦憂深思逺也吕東萊曰前漢地志云蟋蟀山有樞皆思奢儉之中念死生之慮序刺晉昭公也不能修道以正其國有財不能用有鍾鼓不能以自樂有朝廷不能灑掃政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之此詩蓋亦答蟋蟀之意而寬其憂非臣子所得施於君父者序説大誤揚之水白石鑿鑿子洛反素衣朱襮音博從子于沃叶鬱縛反既見君子云何不樂音洛比也鑿鑿巉巖貌襮領也諸侯之服繡黼領而丹朱純凖也孔氏曰此諸侯朝服祭服之裏衣也以素為衣丹為緣繡黼為領刺繡以為衣領名為襮嚴氏曰冕服絲衣也中衣用素素絲也皮辨服朝服玄端麻衣也中衣用布凡服先以明衣親身次加中衣冬則次加裘裘上加裼衣衣上加朝服此以素為衣是以絲為之謂冕及爵辨之中衣也子指桓叔也沃曲沃也晉昭侯封其叔父成師于曲沃是為桓叔案左傳史記晉穆侯太子曰仇其弟曰成師穆侯薨仇立是為文侯文侯薨昭侯立封成師于曲沃師服諫曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家今晉甸侯也而建國本既弱矣其能久乎成師卒諡曰桓叔其後沃盛強而晉微弱國人將叛而歸之故作此詩言水緩弱而石巉巖以比晉衰而沃盛故欲以諸侯之服從桓叔于曲沃且自喜其見君子而無不樂也歐陽子曰揚之水其力弱以比昭公微弱不能制曲沃而桓叔之強於晉國如白石鑿鑿然見於水中爾其民從而樂之揚之水白石皓皓古老反叶胡暴反素衣朱繡叶先妙反從子于鵠叶居號反既見君子云何其憂叶一笑反比也朱繡即朱襮也鵠曲沃邑也揚之水白石粼粼利新反我聞有命叶彌并反不敢以告人比也粼粼水清石見之貌聞其命而不敢以告人者為之隱也桓叔將以傾晉而民為之隱蓋欲其成矣輔氏曰民為桓叔隱而欲其事之成此可見其情之大可畏也大禹之訓曰子臨兆民凛乎若朽索之馭六馬為人上者奈何弗敬其旨深哉胡庭芳曰不敢云者亦以見桓叔之強有可畏之勢不是不告人特不敢耳李氏曰古者不軌之臣欲行其志必先施小惠以收衆情然後民翕然從之田氏之於齊亦猶是也故其召公子陽生於魯國人皆知其已至而不言所謂我聞有命不敢以告人也嚴氏曰命謂桓叔命其徒以舉事禍將作矣我間其事不敢以告人也言不敢告人乃所以深告昭公揚之水三章二章章六句一章四句序刺晉昭公也昭公分國以封沃沃盛強昭公微弱國人將叛而歸沃焉詩文明白序説不誤椒聊之實蕃衍盈升彼其音記之子碩大無朋椒聊且子餘反逺條且興而比也椒樹似茱萸有針刺其實味辛而香烈聊語助也朋比也釋文曰比必履反謂無比例也一音毗至反且歎詞逺條長枝也椒之蕃盛則采之盈升矣彼其之子則碩大而無朋矣椒聊且逺條且歎其枝逺而實益蕃也范氏曰椒聊且者本其始也逺條且者言其枝别時逺而無窮也陳少南曰是椒也其條逺矣言子孫大也此不知其所指序亦以為沃也椒聊之實蕃衍盈掬九六反彼其之子碩大且篤椒聊且逺條且興而比也兩手曰掬李迂仲曰陸農師云兩手為掬兩掬為升先曰升後曰掬互相備而已篤厚也椒聊二章章六句嚴氏曰此詩言桓叔之強而不及昭公其意則憂昭公之弱言在此而意在彼也輔氏曰揚之水椒聊二詩述當時民情棄舊君而樂桓叔也如此則其俗之薄甚矣聖人何取焉夫民罔常懷懷于有仁民之去就繫上之人如何耳上則無道而責民之我棄不可也是以古之聖人臨乎民上凛乎若朽索之馭六馬焉凡有不得者皆反求諸已而已故聖人録此二詩以見民無常懷而在上者不可不強於自治也序刺晉昭公也君子見沃之盛強能修其政知其蕃衍盛大子孫將有晉國焉此詩未見其必為沃而作也綢直留反繆芒侯反束薪三星在天叶鐵因反今夕何夕見此良人子兮子兮如此良人何興也綢繆猶纒綿也孔氏曰綢繆是束薪之狀故云猶纒綿也三星心也在天昏始見於東方建辰之月也鄭氏曰昏而不見嫁之候今見在天則三月末是不得其時愚按心宿之象三星鼎立故因謂之三星然凡三星者非止心之一宿而知此詩為指心宿者蓋春秋之初辰月末日在畢昏時日淪地之西位而心宿始見於地之東方此詩男女既過仲春之月而得成婚故適見心宿也良人夫稱也國亂民貧男女有失其時而後得遂其婚姻之禮者詩人敘其婦語夫之詞曰方綢繆以束薪也而仰見三星之在天今夕不知其何夕也而忽見良人之在此既又自謂曰子兮子兮其將奈此良人何哉喜之甚而自慶之詞也綢繆束芻叶側九反三星在隅叶語口反今夕何夕見此邂户解反逅胡豆反叶狠口反子兮子兮如此邂逅何興也隅東南隅也昏見之星至此則夜久矣邂逅相遇之意此為夫婦相語之詞也綢繆束楚三星在户侯古反今夕何夕見此粲采旦反者叶昌與反子兮子兮如此粲者何興也户室户也户必南出昏見之星至此則夜分矣粲美也此為夫語婦之詞也或曰女三為粲一妻二妾也李迂仲曰國語雖曰三女為粲而又曰粲美物是言美女也綢繆三章章六句李迂仲曰淫泆之禍生於奢侈唐之風俗尚儉昏姻雖不得其時猶未至於淫奔也序刺晉亂也國亂則昏姻不得其時焉此但為昏姻者相得而喜之詞未必為刺晉國之亂也有杕之杜其葉湑湑私敘反獨行踽踽俱禹反豈無他人不如我同父扶兩反嗟行之人胡不比毗志反焉人無兄弟胡不佽七利反焉興也杕特也杜赤棠也孔氏曰陸璣云赤棠與白棠同耳但子有赤白美惡赤棠子澀而酢無味湑湑盛貌踽踽無所親之貌同父兄弟也比輔佽助也此無兄弟者自傷其孤特而求助於人之詞言杕然之杜其葉猶湑湑然人無兄弟則獨行踽踽曽杜之不知矣然豈無他人之可與同行也哉特以其不如我兄弟是以不免於踽踽耳於是嗟嘆行路之人何不閔我之獨行而見親憐我之無兄弟而見助乎有杕之杜其葉菁菁子零反獨行睘睘求瑩反豈無他人不如我同姓叶桑經反嗟行之人胡不比焉人無兄弟胡不佽焉興也菁菁亦盛貌睘睘無所依貌嚴氏曰同姓亦謂兄弟變文成章耳枤杜二章章九句序刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并焉此乃人無兄弟而自歎之詞未必如序之説也況曲沃實晉之同姓其服屬又未逺乎羔裘豹祛起居起據二反自我人居居斤於斤御二反豈無他人維子之故攻乎古慕二反賦也羔裘君純羔大夫以豹飾祛袂也孔氏曰袂是袖之大名袪是袖頭之小稱居居未詳羔裘豹褎徐救反自我人究究豈無他人維子之好呼報反叶呼候反賦也褎猶祛也究究亦未詳羔裘二章章四句此詩不知所謂不敢強解序刺時也晉人刺其在位不恤其民也詩中未見此意肅肅鴇羽集于苞栩況禹反王事靡盬音古不能蓻稷黍父母何怙候古反悠悠蒼天曷其有所比也肅肅羽聲鴇鳥名似鴈而大無後趾集止也苞叢生也栩柞櫟也其子為皂斗殼可以染皂者是也本草注曰櫟木二四月開黃花八九月結實其實為皂斗斛櫟皆有斗爾雅櫟其實救釋曰救盛實之房也其實橡也有救彚自裏柞櫟也杼也栩也皆櫟之通名橡斗子煮食可止飢殼堪染皂盬不攻緻稚也孔氏曰盬與蠱字異義同左傳於文皿蟲為蠱穀之飛亦為蠱然則蟲害器敗穀者皆謂之蠱是鹽不攻牢不堅緻之意也李迂仲曰王事靡盬謂勤於王事而無不攻緻也蓻樹怙恃也民從征役而不得養其父母故作此詩言鴇之性不樹止而今乃飛集于苞栩之上如民之性本不便於勞苦今乃久從征役而不得耕田以供子職也悠悠蒼天何時使我得其所乎孔氏曰鴇連蹄樹止則為苦喻今從征役亦甚危苦此王家之事無不攻緻故盡力為之不復能種黍稷父母當何所怙乎人窮則反本田則告天故訴天而告怨也輔氏曰王事靡盬者或勤王之事或敵王之愾皆不可知天子不恤侯國侯國不恤其民使民久從征役不得耕耨父母飢餓無所恃賴則其窮亦甚矣然但呼天而告之猶兾有時而得所也雖唐風之厚然其情之危亦岌岌然矣惟君子為能通天下之志故王道必使斯民養生送死仰事俯育之無憾不然則亦何所不至哉肅肅鴇翼集于苞棘王事靡盬不能蓻黍稷父母何食悠悠蒼天曷其有極比也極已也肅肅鴇行戶郎反集于苞桑王事靡盬不能蓻稻粱父母何嘗悠悠蒼天曷其有常比也行列也稻即今南方所食稻米水生而色白者也本草曰稻米有粳米即人常所食但有白赤大小四五種粱粟類也有數色本草注曰几云粱米皆是粟類青梁殼穗有毛粒青米亦微青而細於黃白粱黃粱穗大毛長殼米俱粗於白粱嘗食也常復其常也范氏曰思得休息以反其常厭亂之甚也鴇羽三章章七句陳少南曰春秋之時諸侯猶以王命征役故曰王事靡盬但調發未必均故君子苦之愚按變風多作於春秋時斯時也天下不知有王之時也而北門云王事適我伯兮云為王前驅此事亦云王事而且以靡盬為言雖皆怨者之詞猶幸王命之行於列國亦可以見君臣之義根於人心也亦可以見文武成康之遺澤也序刺時也昭公之後大亂五世君子下從征役不得養其父母而作是時也序意得之但其時世則未可知耳豈曰無衣七兮不如子之衣安且吉兮賦也侯伯七命其車旗衣服皆以七為節王介輔曰周禮司服所謂侯伯之服自鷩冕而下如公之服即典命所謂侯伯七命衣服以七為節也吕東萊曰周禮注鷩冕七章衣三章一曰華蟲畫以雉即鷩也二曰火三曰宗彛皆畫為繢裳四章一曰藻二曰粉米三曰黼四曰黻皆以為繡鷩音鱉子天子也史記曲沃桓叔之孫武公李迂仲曰桓叔生莊伯鱓鱓生武公稱伐晉滅之盡以其寶器賂周釐王王以武公為晉君列於諸侯此詩蓋述其請命之意言我非無是七章之衣也而必請命者蓋以不如天子之命服之為安且吉也輔氏曰安謂不􅑾杌吉謂無後患此特以利害言耳非誠知義命之所在也李迂仲曰唐劉仁恭嘗謂使者曰旌節吾自有但要長安本色耳此詩與仁恭之言無異蓋當是時周室雖衰典刑猶在武公既負弒君篡國之罪則人得討之而無以自立於天地之間故賂王請命而為説如此然其倨慢無禮亦已甚矣輔氏曰請命于天子而敢自謂豈曰無衣不如子之所命則其辭之悖慢無禮亦甚矣大率意得志蒲者其辭多如此嚴氏曰武公有無王之心而後動於惡篡弒大惡也王法之所不容誅也彼其請命于天子之使豈真知有王哉正以人心所不與非假王靈則終不能定晉也此正與唐蕃鎮戕其主帥而代之以坐邀旌節者無以異釐王貪其寶玩而不思天理民彛之不可廢是以誅討不加而爵命行焉則王綱於是乎不振而人紀或幾乎絶矣嗚呼痛哉豈曰無衣六兮不如子之衣安且燠於六反兮賦也天子之卿六命變七言六者謙也不敢以當侯伯之命得受六命之服比于天子之卿亦幸矣王介甫曰六者子男之服也子男之服以五為節而曰六者天子之卿六命與子男同服故也燠暖也言其可以久也吕與叔曰義理有所未安雖食不飽雖衣不暖無衣二章章三句嚴氏曰武公之事國人所不與也以晉世家考之初潘父弒昭侯而迎桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平是為孝侯此桓叔初舉而國人不與也其後曲沃莊伯弒孝侯于翼晉人又攻莊伯莊伯復入曲沃晉人復立孝侯子郤是為鄂侯此莊伯再舉國人又不與也及鄂侯卒莊伯伐晉晉人立鄂侯子光是為哀侯此莊伯三舉而國人又不與也及武公誘小子侯殺之晉復立哀侯弟緍此武公五舉而國人終不與也最後武公伐晉侯緍滅之盡以其寶器賂周僖王王命武公為諸侯然後晉人不得已而從之耳然聖人致嚴于名分之際陳成子之事至沐浴而請討蓋以人倫之大變天理所不容人人得而討之無衣之詩不刪者所以著世變之窮傷周之衰也吕東萊曰以史記左傳考之平王二十六年晉昭侯封成師于曲沃專封而王不問一失也平王三十二年潘父弒昭侯欲納成師而王又不問二失也四十七年曲沃莊伯弒晉孝侯而王又不問三失也桓王二年曲沃莊伯攻晉王非特不討反使尹氏武氏助之四失也至是武公纂晉僖王反受賂命為諸侯五失也以此五失觀之則禮樂征伐移於諸侯降於大夫竊於陪臣其所由來者漸矣愚按春秋之始魯惠公以其妾仲子為妻及仲子沒卑王則使宰咺來歸賵魯桓公以弟殺兄及沒莊王則使榮叔來錫命周之典禮皆周之自壞也嵗改月化下愈陵上愈替於是武公纂晉僖王命為侯三晉義濊武公之祀亦得以威烈王之命為侯嗚呼司馬公之通鑑固不得不後春秋而作也然以釐王武公之事觀之朱子所謂迷先幾者信矣序美晉武公也武公始并晉國其大夫為之請命乎天子之使而作是詩也序以史記為文詳見本篇但此詩若非武公自作以述其賂王請命之意則詩人所作以著其事而隂刺之序乃以為美之失其旨矣且武公殺君纂國大逆不道乃王法之所必誅而不赦者雖曰尚知王命之重而能請之以自安是亦禦人於白晝大都之中而自知其罪之甚重則分薄贓餌貪吏以求私有其重寶而免於刑戮是乃猾賊之尤耳以是為美吾恐其奬姦誨盜而非所以為教也小序之陋固多然其顛倒順逆亂倫悖理未有如此之甚者故豫特深辨之以正人心以誅賊黨意庶幾乎大序所謂正得失者而因以自附於春秋之義云愚按晉趙盾亡不越境反不討賊許世子不嘗藥春秋且不少從末減皆結正其殺君之罪况武公纂逆如此而請命之事反可以為美乎朱子此論足以正人心於千載之後誅亂賊於千載之上矣然則此義行而亂臣賊子懼有杕之杜生于道左彼君子兮噬韓詩作逝肯適我中心好呼報反之曷飲於鴆反食音嗣之比也左東也噬發語詞曷何也此人好賢而恐不足以致之故言此杕然之杜生于道左其蔭不足以休息如已之寡弱不足恃賴則彼君子者亦安肯顧而適我哉然其中心好之則不已也但無自而得飲食之耳夫以好賢之心如此則賢者安有不至而何寡弱之足患哉有杕之杜生于道周彼君子兮噬肯來遊中心好之曷飲食之比也周曲也有枤之杜二章章六句序刺晉武公也武公寡特兼其宗族而不求賢以自輔焉此序全非詩意葛生蒙楚蘞音廉蔓于野叶上與反豫美亡此誰與獨處興也蘞草名似栝樓葉盛而細蔓延也豫美婦人指其夫也婦人以其夫久從征役而不歸故言葛生而蒙于楚蘞生而蔓于野各有所依託程氏曰葛之生託於物蘝之生依於地興婦人從君子而豫之所美者獨不在是則誰與而獨處於此乎葛生蒙棘蘝蔓于域豫美亡此誰與獨息興也域塋營域也息止也角枕粲兮錦衾爛兮豫美亡此誰與獨旦賦也粲爛華美鮮明之貌獨旦獨處至旦也夏之日冬之夜叶羊茹反百嵗之後歸于其居叶姬御反賦也夏日永冬夜永居墳墓也夏曰冬夜獨居憂思於是為切然君子之歸無期不可得而見矣要死而相從耳張南軒曰知其死亡之無日矣則斷之以百嵗之後庶幾得同歸于丘而已其亦傷之至也鄭氏曰言此者婦人專一義之至情之盡蘇氏曰思之深而無異心此唐風之厚也冬之夜同上夏之日百嵗之後叶音户歸于其室賦也室壙也葛生五章章四句輔氏曰前三章人情之常也後二章唐風之厚也大序所謂發乎情民之性也止乎禮義先王之澤也者是詩可以當之矣序刺晉獻公也好攻戰則國人多喪矣程氏曰此詩思存者非悼亡者朱子説見下序采苓采苓首陽之巔叶典因反人之為言苟亦無信叶斯人反舍音捨下同旃之然反舍旃苟亦無然人之為言胡得焉比也首陽首山之南也孔氏曰首陽在河東蒲坂南李迂仲曰亦名雷首山愚按集傳以首為山名陽為山之南春秋傳亦曰趙宣子田于首山然此詩下章又云首陽之東則似首陽二字同為山名論語集注亦嘗指首陽為山名矣豈泛名其山則曰首山主山南而言則又獨得首陽之稱乎巔山頂也旃之也此刺聽讒之詩言子欲采苓於首陽之巔乎然人之為是言以告子者未可遽以為信也姑舍置之而無遽以為然徐察而審聽之則造言者無所得而讒止矣彭氏曰某氏云人之為言不可遽信則固當舍置然舍之而不究其實則讒言猶幸於得中而無所懲必究其有無之實則為言者無所得而自止矣或曰興也下章放此吕東萊曰采苓采苦采葑不曰郊野而曰首陽者興采聽之當逺也孔子曰浸潤之譛膚受之訴不行焉可謂逺也已矣不輕聽易動而徐觀其是非惟逺者能之采苦采苦首陽之下叶後五反人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉比也苦苦菜也生山田及澤中得霜甜脆而美孔氏曰苦所謂堇荼也與許也采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉比也從聽也采苓三章章八句埤雅曰苓生於隰葑生於圃則首陽之巔不必有苓其下不必有苦其東不必有葑則理可以無聽從矣序刺晉獻公也獻公好聽讒焉獻公固喜攻戰而好讒佞然未見此二詩果作於其時也唐國十二篇三十三章二百三句黃實夫曰鄭衛齊陳之國皆以世變多故有淫奔之風惟魏晉以聖人所都之故而淫奔之俗不聞聖人之化入人深如此秦一之十一秦國名在禹貢雍州之域近鳥鼠山初伯益佐禹治水有功賜姓嬴氏孔氏曰鄭語云嬴伯翳之後地理志云嬴伯益之後則伯益伯翳聲轉字異猶一人也問姓氏如何分别曰姓是大總腦處氏是後來次第分别處如魯本姬姓其後有孟氏季氏同為姬姓而氏不同也其後中仲潏決居西戎以保西垂六世孫大駱生成及非子非子事周孝王養馬於汧牽渭之間馬大繁息孝王封為附庸而邑之秦至宣王時犬戎滅成之族宣王遂命非子曽孫秦仲為大夫誅西戎不克見殺及幽王為西戎犬戎所殺平王東遷秦仲孫襄公以兵送之王封襄公為諸侯曰能逐犬戎即有岐豐之地襄公遂有周西都畿內八百里之地李迂仲曰史記襄公十二年伐戎至岐而卒至其子文公遂收周餘民有其地孔氏曰周之二都相接為畿其地東西橫長西都方八百里也至玄孫德公又徙於雍孔氏曰僖十三年左傳云秦輸粟于晉自雍及絳昭元年云秦后子享晉侯自雍及絳是秦自德公已後常居雍也秦即今之秦州雍今京兆府興平縣是也愚按秦州即今鞏昌路秦州京兆府興平縣即今安西路興平縣並隸陜西省有車鄰鄰有馬白顛都田反叶典因反未見君子寺人之令力呈反賦也鄰鄰衆車之聲白顛額有白毛今謂之的顙孔氏曰的白也顙額也今之戴星馬王介甫曰白顛蓋名馬驊騮盜驪赤免的盧之稱君子指秦君寺人內小臣也孔氏曰寺人在內細小之臣非謂寺人即是內小臣之官也左傳齊有寺人貂晉有寺人披是諸侯有寺人也嚴氏曰寺人閹宦令使也是時秦君始有車馬及此寺人之官將見者必先使寺人通之故國人創見而誇美之也蘇氏曰几此皆人君之常禮而秦之先君昔所未常有也阪音反有漆隰有栗既見君子並坐鼓瑟今者不樂音洛逝者其耋田節反叶地一反興也八十曰耋阪則有漆矣隰則有栗矣既見君子則並坐鼓瑟矣失今不樂則逝者其耋矣劉辰翁曰俯仰一時之景以寫其中之所甚快者此所以為興也朱子每句著則矣字多得興意嚴氏曰既見君子並坐鼓瑟簡易相親之俗也今者不樂逝者其耋悲壯感歎之氣也秦之強以此而止於為秦亦以此輔氏曰未見秦君而覩其車馬之盛寺人之令而誇美之矣則其既見秦君也則相與並坐鼓瑟而又歎以為苟今時而不作樂則逝者其耋矣蓋國家方興禮義初備而人情喜樂故至於此阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亡興也簧笙中金葉吹笙則鼓動之以出聲者也車鄰三章一章四句二章章六句嚴氏曰秦興而帝王之影響盡矣車鄰其濫觴也世道升降之機在是歟序美秦仲也秦仲始大有車馬侍御之好焉未見其必為秦仲之詩大率秦風唯黃鳥渭陽為有據其他諸詩皆不可考愚按秦仲但為宣王大夫未必得備寺人之官此詩疑作於平王命襄公為侯之後駟驖田結反孔阜符有反六轡在手公之媚眉冀反子從公于狩叶始九反賦也駟驖四馬皆黑色如鐵也孔甚也阜肥大也六轡者兩服兩驂各四轡而驂馬內兩轡納之於觖決與觼同故惟六轡在手也嚴氏曰馬之有轡所以制馬使隨人意在手言把握其轡能制馬遲速唯手是聽也媚子所親愛之人也此亦前篇之意也嚴氏曰駟驖孔阜言馬之良也六轡在手言御之良也公之媚子從公于狩見便嬖足使令於前也奉時辰牡辰牡孔碩叶常灼反公曰左之舍音捨拔蒲末反則獲叶黃郭反賦也時是辰時也牡獸之牡者辰牡者冬獻狼夏獻麋春秋獻鹿豕之類奉之者虞人翼以待射石也孔氏曰冬獻狼以下皆天官獸人文獸人所獻以供膳虞人無奉獸之文故引獸人之文以解時牡目獸之供食各有時節故曰時牡碩肥大也公曰左之者命御者使左其車以射獸之左也蓋射必中其左乃為中殺五御所謂逐禽左者為是故也逐禽左逆驅禽獸使左當人君以射之也何氏曰公曰左之御者從左以逐之君從左以射之公羊傳解第一殺第二殺第三殺皆自左膘射之達于右則左當人君之左指禽獸之左膘而言膘音縹拔矢括也孔氏曰矢末為括以鏃為首故拔其末曰左之而捨拔無不獲者言獸之多而射御之善也遊于北園四馬既間叶胡田反輶音由車鸞鑣彼驕反載獫力驗反歇許竭反驕許喬反賦也田事已畢故遊于北園間調習也輶輕去聲又如字也鸞鈴也效鸞鳥之聲鑣馬銜也驅去又區逆之車置鸞於馬銜之兩旁孔氏曰夏官田僕掌設驅逆之車驅驅禽逐前趨後逆御還之使不出圍御音迓埤雅曰輶車置鸞於鑣異於乘車者驅逆之車則尚輕疾故也乘去聲車則鸞在衡和在軾也獫歇驕皆田犬名長喙諱曰獫短喙曰歇驕以車載犬蓋以休其足力也韓愈畫記有騎去聲擁田犬者亦此類愚按韓子書記曰騎擁田犬者一人騎而牽者二人云云駟驖三章章四句輔氏曰駟驖孔阜言其馬之盛也六轡在手言其御之善也公之媚子從公于狩言公有所親愛之人隨公以田獵疑即指御者而言也奉時辰牡辰牡孔碩虞人奉翼大獸以待公之射禮儀之備也公曰左之舍拔則獲射御之精也遊于北園因出狩而遊觀也四馬既間車馬皆閉習也猶車鸞鑣載獫歇驕雖田犬而亦處之得宜也此皆昔無而今有故厯敘其事而誇美之也秦本保于西戎自非子為附庸而邑之秦遂入于中國自襄公為諸侯盡有周西都畿內岐豐之地然後始備中國之禮儀侍御而詩人美之然觀其所美者如此則其所缺者亦多矣張南軒曰讀車鄰駟驖之詩則知秦之立國自其始創則不過盛其車馬奉養之事競於射獵之為而已蓋不及於用賢制民也則其流風亦習乎是而已前漢地理志曰天水隴西山多林木民以板為室屋及安定北地上郡西河皆迫近我狄修習武備髙上氣力以射獵為先故秦詩曰在其板屋又曰修我甲兵與子偕行及車鄰駟驖小戎之篇皆言車馬田狩之事序美襄公也始命有田狩之事園囿之樂焉孔氏曰有蕃曰園有墻曰囿囿者域養禽獸之所也黃實夫曰田狩之事園囿之樂何足為美蓋以襄公有功王室始受天子之命人亦樂子之也愚按朱子雖以此序稍平不復辨説然又謂秦詩時世多不可考今據詩中言公乃臣子稱其君之詞疑此詩亦作於襄公受命為侯之後也小戎俴錢淺反收五楘音木梁輈陟留反遊環脅驅叶居懼反又居録反隂靷音胤鋈音沃續叶辭屢反又如字文茵音因暢敕亮反轂叶又去聲駕我騏音其馵之樹反又之録反言念君子溫其如玉在其板屋亂我心曲賦也小戎兵車也董氏曰六月言元戎此天子之車也諸侯之戎車謂之小戎宜也俴淺也收軫也謂車前後兩端橫木所以收斂所載者也凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸故曰小戎俴收也孔氏曰兵車當輿之內前軫至後軫惟深四尺四寸人之升車自後登之入於車內故以淺深言之五五束也楘厯録祿然文章之貌也梁輈從前軫以前稍曲而上至衡則向下鉤之橫衡於輈下而輈形穹隆上曲如屋之梁又以皮革五處束之其文章厯録然也孔氏曰輈上曲勾衡衡者厄也陳少南曰輈車轘也前駕於服馬之上衡之後則承前軫直逼後軫梁輈則穹其上以便服馬之進退車之進退以輈為主懼輈之不堅也故一輈五分其穹每分以皮束之使堅是謂之五楘愚按梁輈即所謂軏也遊環靷斤去聲環也以皮為環當兩服馬之背上遊移前却無定處引兩驂馬之外轡貫其中而執之所以制驂馬使不得外出左傳曰如驂之有靷是也左傳定九年注言如驂馬之隨靳也釋文靳者言無常處脅驅亦以皮為之前係於衡之兩端後係於軫之兩端當服馬脅之外所以驅驂馬使不得內入也隂掩軌犯也軌在軾前而以板橫側掩之以其隂映此故謂之隂也靷以皮二條前係驂馬之頸後係隂版之上也續隂板之上有續靷之處消白金沃灌其環以為飾也孔氏曰鋈沃也謂消白金以沃灌靷環續則是作環相接蓋車衡之長六尺六寸止容二服驂馬之頸不當於衡故别為二靷以引車亦謂之靳左傳曰兩靷將絶是也孔氏曰驂馬頸不當衡則為二靷係隂版上今驂馬引之大叔于田云兩服齊首兩驂如手明驂馬首不與服馬齊左傳襄十四年服虔云軥車軛也兩邊有馬頸是一衡之下唯有服馬二頸也哀公二年云兩靷將絶是橫之前别有驂馬二靷也文茵車中所坐虎皮褥也暢長也轂者車輪之中外持幅內受軸者也大車之轂一尺有半兵車之轂長三尺二寸故兵車曰暢轂孔氏曰言長於大車之轂騏騏文也孔氏曰色之青黑者為綦馬名為騏知其色作綦文馬左足白曰馵君子婦人目其夫也溫其如玉美之之詞也板屋者西戎之俗以板為屋心曲心中委曲之處也西戎者秦之臣子所與不共戴天之讐也襄公上承天子之命率其國人往而征之故其從役者之家人先誇車甲之盛如此而後及其私情蓋以義興師則雖婦人亦知勇於赴敵而無所怨矣襄公報君父之仇其所以不自己者豈忮忿之心哉乃大倫之正天理之發以大義驅其人而戰之此襄公所以能用其人而秦人所以樂為之用也愚按每章前六句誇車甲也復四句私情也四牡孔阜扶有反六轡在手騏駵音留是中叶諸仍反騧古花反驪是驂叶疏簮反龍盾順允反之合鋈以觼古冗反軜音納言念君子溫其在邑叶烏合反方何為期胡然我念之賦也赤馬黑鬛曰駵中兩服馬也黃馬黑喙曰騧驪黑色也盾干也孔氏曰盾以木為之畫龍於盾合而載之以為車上之衛必載二者備破毁也觼環之有舌者軜驂內轡也置觼於軾前以係軜故謂之觼軜亦消沃白金以為飾也孔氏曰轡所以制馬令隨人意驂馬欲入則逼於脅驅內轡不須牽挽故知納驂內轡係於軾前其係之處以白金為觼也邑西鄙之邑也方將也將以何時為歸期乎何為使我思之極也俴駟孔羣厹音求矛鋈錞徒對反叶朱倫反蒙伐有苑叶音氲虎韔敕亮反鏤膺交韔二弓叶姑𢎞反竹閉緄古本反縢直登反言念君子載寢載興厭厭於鹽反良人秩秩德音叶一陵反賦也俴駟四馬皆以淺薄之金為甲欲其輕而易於馬之旋習也孔甚羣和也孔氏曰金甲堅剛則苦其不和故美其能甚羣言和調也物不和則不得羣聚故以和為羣也厹矛三隅矛也鋈錞以白金沃矛之下端平底者也孔氏曰厹矛刃有三角鋈白金飾其錞曲禮曰進戈者前其鐏進矛戟者前其鐓是矛之下端者當有錞也鋭底曰鐏平底曰鐓鐏存去聲蒙雜也伐中干也盾之别名苑文貌畫雜羽之文於盾上也虎韔以虎皮為弓室也鏤膺鏤金以飾馬當胸帶也交韔交二弓於韔中謂顛倒安置之必二弓以備壞也閉弓檠景也儀禮作祕緄繩縢約也以竹為閉而以繩約之於弛弓之裏檠弓體使正也孔氏曰儀禮既夕記説明器之弓云有䪐注云䪐弓檠也弛則縳之於弓裏備損壞也以竹為之然則置弓䪐裏以繩係之李寶之曰祕狀如弓載寢載興言思之深而起居不寧也厭厭安也秩秩有序也李迂仲曰婦人謂夫乃安靜善人其德音又秩秩然有序今乃從征役我是以思念之也小戎三章章十句輔氏曰一章主言車二章主言馬三章主言兵器所謂婦人必其卿大夫為將帥之妻也蓋君子良人溫其如王厭厭秩秩皆非士卒所能當也極其憂思情也無所怨刺義也二者並行而不相悖此詩所謂板屋者可見是伐西戎時事故先生於序下雖以為時世無所據而未可知然於詩之首章下復以襄公為説也序美襄公也備其兵甲以討西戎西戎方強而征役不休國人則矜其車甲婦人能閔其君子焉此詩時世未必然而義則得之説見本篇蒹古恬反葭音加蒼蒼白霜為霜所謂伊人在水一方遡所路反洄音回從之道阻且長遡遊從之宛在水中央賦也蒹似萑丸而細髙數尺又謂之薕亷葭蘆也嚴氏曰蒹一名薕又名荻一物而三名陸璣云水草牛食也之肥強山隂陸氏云今人以為薕箔因以得名葭蘆葦也又名華一物而四名疏曰初生為葭長大為蘆成則名葦萑菼也又名隼亦一物而四名蒹葭萑三物共十一名蒹葭未敗而露始為霜秋水時至百川灌河之時也伊人猶言彼人也一方彼一方也遡洄逆流而上也遡遊順流而下也宛然坐見貌在水之中央言近而不可至也言秋水方盛之時所謂彼人者乃在水之一方上下求之而皆不可得然不知其何所指也蒹葭凄凄白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡遊從之宛在水中坻直尸反賦也凄凄猶蒼蒼也晞乾也湄水草之交也躋升也言難至也小渚曰坻蒹葭采采叶此禮反白露未已所謂伊人在水之涘叶以始二音遡洄從之道阻且右叶羽軌反遡遊從之宛在水中沚賦也采采言其盛而可采也已止也右不相直而出其右也小渚曰沚蒹葭三章章八句序刺襄公也未能用周禮將無以固其國焉此詩未詳所謂然序説之鑿則必不然矣終南何有有條有梅叶莫悲反君子至止錦衣狐裘叶渠之反顔如渥於角反丹其君也哉叶將黎反興也終南山名在今京兆府南愚按京兆府即今安西路條山楸秋也皮葉白色亦白材理好宜為車版君子指其君也至止至終南之下也錦衣狐裘諸侯之服也玉藻曰君衣去聲狐白裘錦衣以裼之孔氏曰玉藻注云君衣狐白毛之裘則以素錦為衣覆之使可裼也渥漬也其君也哉言容貌衣服稱其為君也此秦人美其君之詞亦車鄰駟驖之意也劉辰翁曰其君也哉亦似賦其始見也猶寺人之令也終南何有有紀有堂君子至止黻音弗衣繡裳佩王將將七羊反夀考不忘興也紀山之廉角也堂山之寬平處也黻之狀亞兩已相戾也繡刺繡也孔氏曰黻皆在裳言黻衣者衣大名與繡裳異其文耳將將佩玉聲也夀考不忘者欲其居此位服此服長久而安寧也終南二章章六句序戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之歐陽子曰周雖以岐豐賜秦使自攻取而襄公未嘗一以兵至岐至文始逐戎而取岐豐之地交交黃鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其冗叶戶橘反惴惴其栗彼蒼者天音尖因反殱子廉反我良人如可贖兮人百其身興也交交飛而往來之貌從穆公從死也子車氏奄息名特傑出之稱冗壙也惴惴懼貌栗懼殱盡良善贖貿茂也秦穆公卒孔氏曰穆公名任好以子車氏之三子為殉孔氏曰殺人以葬環其左右曰殉皆秦之良也國人哀之為之賦黃鳥事見春秋傳愚按見文公六年即此詩也言交交黃鳥則止于棘矣誰從穆公則子車奄息也蓋以所見起興也臨冗而惴惴蓋生納之壙中也三子皆國之良而一旦殺之若可貿以他人則人皆願百其身以易之矣交交黃鳥止于桑誰從穆公子車仲行户郎反維此仲行百夫之防臨其冗惴惴其栗彼蒼者天殱我良人如可贖兮人百其身興也防當也吕東萊曰訓防為當者蓋如隄防之防水言一人可以當百夫也交交黃鳥止于楚誰從穆公子車針虎維此針虎百夫之禦臨其冗惴惴其栗彼蒼者天殱我良人如可贖兮人百其身興也禦猶當也黃鳥三章章十二句春秋傳曰君子曰秦穆公之不為盟主也宜哉死而棄民先王違世猶貽之法而況奪之善人乎今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也愚按穆公於此其罪不可逃矣但或以為穆公遺命如此而三子自殺以從則三子亦不得為無罪今觀臨冗惴栗之言則是康公從父之亂命迫而納之於壙其罪有所歸矣董氏曰陳乾昔子魏顆皆從其治命不以為殉君子美之然則康公得無罪乎陳少南曰穆公悔過自誓見於泰誓舉人之周用人之一未易得如穆公者至從死一事説者以為穆公之命夫屬纊方亂未可遽從帷堂未徹無所復請以未可從之命而康公從之是不孝也以不可復請之命而康公行之是不仁也又按史記秦武公卒初以人從死死者六十六人至穆公遂用百七十七人而三良與焉蓋其初特出於戎翟之俗而無明王賢伯以討其罪於是習以為常則雖以穆公之賢而不免論其事者亦徒閔三良之不幸而歎秦之衰至於王政不綱諸侯擅命殺人不忌至於如此則莫知其為非也嗚呼俗之敝也久矣其後始皇之葬後宫皆令從死工匠生閉墓中尚何怪哉始皇葬驪山下錮三泉令匠作機弩有穿近者輒射之上具天文下具地理後宫無子者皆令從死工匠為機者皆閉之墓也愚按古之葬者有明器但備物而不可用如芻靈亦其類也不幸流俗之敝而至於作俑又不幸而至於用人然作俑者夫子且以為不仁而謂其無後況秦武公既用殉五傳至穆公而又用殉夫子之言反似無驗孰知穆絶公之後二十一傳至莊襄王而吕氏之子遂嬴氏之統維夫始皇不知所監驪山葬後未三此年而吕氏之祀又絶嗚呼不仁之禍及子孫如序哀三良也國人刺穆公以人從死而作是詩也此序最為有據伊橘反彼晨風叶孚愔反鬱彼北林未見君子憂心欽欽如何如何忘我實多興也疾飛貌晨風鸇也孔氏曰陸璣云似鷂青黃色燕頷句喙嚮風搖趐乃因風飛急疾擊鳥雀食之鬱茂盛貌君子指其夫也欽欽憂而不忘之貌婦人以夫不在而言彼晨風則歸于鬱然之北林矣故我未見君子而憂心欽欽也彼君子者如之何而忘我之多乎此與扊扅音剡移之歌同意蓋秦俗也愚按晉獻公滅虞百里奚亡秦走宛楚鄙人執之秦穆公聞其賢以五羖羊皮贖之授以國政後因作樂所賃浣婦自言知音呼之援琴而歌曰百里奚五羊皮臨别時烹伏雌炊扊扅今冨貴忘我為因問之乃其妻也山有苞櫟盧狄反叶厯各反隰有六駁邦角反未見君子憂心靡樂音洛如何如何忘我實多興也駁梓榆也其皮青白如駁陸璣曰樹皮青白駁犖遙視似駁馬故謂之駁山則有苞櫟矣隰則有六駁矣孔氏曰王肅云言六據所見而言也未見君子則憂心靡樂矣靡樂則憂之甚也山有苞棣音悌隰有樹檖未見君子憂心如醉如何如何忘我實多興也棣唐棣檖赤羅也陸農師曰其文細密如羅又有白羅皆文木實似梨而小酢可食陸璣曰一名山梨一名鹿梨一名鼠梨極有脆美者如醉則憂又甚矣晨風三章章六句序刺康公也忘穆公之業始棄其賢臣焉此婦人念其君子之辭序説誤矣豈曰無衣與子同袍抱毛反叶步謀反王于興師修我戈矛與子同仇賦也袍襺繭也孔氏曰玉藻云纊為襺緼為袍純著新綿名為襺雜名舊絮名為袍戈長六尺六寸矛長二丈王于興師以天子之命而興師也秦俗強悍樂於戰鬭故其人平居而相謂曰豈曰以子之無衣而與子同袍乎蓋以王于興師則將修我戈矛而與子同仇也其歡愛之心足以相死如此蘇氏曰秦本周地故其民猶思周之盛時而稱先王焉陳君舉曰襄公攘西戎救王室之難得列諸侯故秦雖逺處西垂而其民知有王室之尊王事之重東遷之後王室雖微而本於人心者未泯也讀文侯之命者歎平王之無志其有以哉或曰興也取與子同三字為義後章放此豈曰無衣與子同澤叶徒洛反王于興師修我矛戟叶訖約反與子偕作賦也澤裏衣也以其親膚近於垢澤故謂之澤戟車戟也長丈六尺鄭氏曰車戟常也豈曰無衣與子同裳王于興師修我甲兵叶晡茫反與子偕行户郎反賦也行往也無衣三章章五句秦人之俗大抵尚氣槩先勇力忘生輕死故其見於詩如此然本其初而論之岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗至於如此則已悍然有招翹愚按過秦論注云舉也八州而朝潮同列之氣矣何哉雍州土厚水深其民厚重質直無鄭衛驕惰浮靡之習以善導之則易以興起而篤於仁義以猛驅之則其疆毅果敢之資亦足以疆兵力農而成冨強之業非山東諸國所及也嗚呼後世欲為定都立國之計者誠不可不監乎此而凡為國者其於導民之路尤不可不審其所之也輔氏曰先生發秦人厚重質直之意與夫強悍果敢之質及周秦所以導之者不同而皆易於有成先儒之所未及也至謂後世之定都立國當監乎此者又有盛於藝祖皇帝之聖訓焉亦嘗疑之堯與文武皆聖人也然堯之風厯三代而尚有遺於晉至文武之風則一變為秦而不復有遺者何哉蓋堯之時風氣方開純朴未散譬之人則孩提之時也至文武時則其人壯大矣今人於孩提之時教之則雖老大有不忘者至於年日益壯雖強聒之旋得旋失終不能久而不忘也謝疊山曰幽王沒於驪山此中國之大恥周家萬世不可忘之大讐也讀文侯之命可以知諸侯無復讐之志矣獨無衣一詩毅然以天下大義為己任其心忠而誠其氣剛而大其詞壯而直吾乃知岐豐之地被文武周公之化最深雖世降俗末人心天理不可泯滅者尚異於列國也序刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉序意與詩文不協説已見本篇矣我送舅氏曰至渭陽何以贈之路車乘繩證反黃賦也舅氏秦康公之舅晉公子重平聲耳也毛氏曰母之昆弟曰舅出亡在外穆公召而納之時康公為太子送之渭陽而作此詩渭水名秦時都雍至渭陽者蓋東行送之於咸陽之地也路車諸侯之車也董氏曰中車金路以封同姓象路以封異姓革路以封四衛木路以封蕃國皆諸侯也故人君之車曰路車乘黃四馬皆黃也嚴氏曰何以贈舅氏乎惟路車乘馬而已歉然猶以為薄意有餘也我送舅氏悠悠我思叶新齎反何以贈之瓊瑰古回反玉佩叶蒲眉反賦也悠悠長也序以為時康公之母穆姬已卒故康公送其舅而念母之不見也嚴氏曰送舅而有所思則思母也或曰穆姬之卒不可考此但别其舅而懷思耳瓊瑰石而次玉孔氏曰瓊者玉之美名非玉名也瑰是美石之名曹氏曰玉佩珩璜琚瑀之屬渭陽二章章四句按春秋傳晉獻公蒸於齊薑生秦穆夫人太子申生娶大戎胡姬生重耳小戎子生夷吾驪姬生奚齊其娣生卓子驪姬譛申生申生自殺又譛二公子二公子皆出奔獻公卒奚齊卓子繼立皆為大夫里克所弒秦穆公納夷吾是為惠公卒子圉立是為懷公立之明年秦穆公又召重耳而納之是為文公王氏曰至渭陽者送之逺也悠悠我思者思之長也路車乘黃瓊瑰玉佩者贈之厚也謝疊山曰送之逺贈之厚念母之心可見矣廣漢張氏曰康公為大子送舅氏而念母之不見是固良心也而卒不能自克於令狐之役愚按左傳文公七年晉敗秦師于令狐令音伶怨欲害乎良心也使康公知循是心養其端而充之則怨欲可消矣序康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為大子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也此序得之但我見舅氏如母存焉兩句若為康公之辭者其情哀矣然無所繫屬不成文理蓋此以下又别一手所為也及其即位而作是詩蓋亦但見首句云康公而下云時為大子故生此説其淺暗拘滯大率如此於我乎夏屋渠渠今也每食無餘于音吁嗟乎不承權輿賦也夏大也渠渠深廣貌承繼也權輿始也此言其君始有渠渠之夏屋以待賢者而其後禮意寖衰供億寖薄杜氏曰供給億安也至於賢者每食而無餘於是嘆之言不能繼其始也於我乎每食四簋叶已有反今也每食不飽叶捕苟反于嗟乎不承權輿賦也簋瓦器容斗二勝方曰簠圓曰簋簠盛稻粱簋盛黍稷孔氏曰簋以木為之圓曰簋內方外圓方曰簠內圓外方四簋禮食之盛也輔氏曰夏屋渠渠無不致其備也每食無餘無一致其備也每食四簋無不極其至也每食不飽無一極其至也其進鋭者其退速惟有恆者然後可久也權輿二章章五句漢楚元王敬禮申公白公穆生穆王不嗜酒元王每置酒嘗為穆王設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂稱疾申公白公強起之曰獨不念先王之德歟今王一旦失小禮何足至此穆生曰先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去亦此詩之意也謝疊山曰秦君用賢禮貌衰而不去至於每食不飽豈非飢餓免死者乎其君固可刺當時號為賢者亦為可恥矣輔氏曰引穆生之事為證者推原詩人之心蓋本於此不然則其所訃者不過區區於安居餔之事而已恐非賢者之志也序刺康公也忘先君之舊臣與賢者有始而無終也秦國十篇二十七章百八十一句謝疊山曰中國而純乎人欲則化為夷狄夷狄而知有天理則化為中國秦本戎狄不得齒中國之會盟春秋夷之邑於岐豐用文武成康之遺民習文武成康之舊俗一旦惡人欲而崇天理其發於詩者有尊君親上之義有趨事赴功之勇故季杞聽其樂曰是謂夏聲能夏始大憂其將有中國矣詩傳通釋卷六
