body:
  text: 詩傳通釋卷九元劉瑾撰詩朱子集傳小雅二大雅說附雅者正也正樂之歌也其篇本有大小之殊而先儒說又各有正變之别鄭氏曰小邪大雅周室居西都之時詩也小雅自鹿鳴至菁莪十六篇大雅自文王至卷阿十八篇為正經小雅六月大雅民勞之後皆謂之變雅以今考之正小雅燕饗之樂也嚴氏曰正小雅皆中庸尊賢親親體羣臣柔逺人懷諸侯之事也正大雅㑹朝之樂受釐愚按釐與禧同祭而受福也陳戒之辭也輔氏曰定正小雅為燕享之樂歌正大雅為㑹朝之樂歌比之大序政有小大之說更為明切故或歡欣和說以盡羣下之情或恭敬齊莊以發先王之德詞氣不同音節亦異小雅施之君臣之間大雅則止人君可歌愚按小雅正詩歌之以燕樂勞饗羣臣故其詞氣歡欣和悅以通上下之情大雅正詩或歌于㑹朝之時如文王大明等篇或陳于祭祀之後如生民行葦等篇或陳于進戒之際如公劉卷阿等篇則其詞氣又皆恭敬齊莊以發先生之德此其詞之異者今猶可考若其音節之異則不可聞矣多周公制作時所定也周公相成王定樂歌每事以詩寫其至誠和樂而被之音聲舉是事則奏是詩及其變也則事未必同而各以其聲附之孔氏曰王政既衰變雅兼作取大雅之音歌其政之變者謂之變大雅取小雅之音歌其政之變者謂之變小雅故變雅皆由音體有大小不復由政事之大小也此亦是變用他大雅小雅腔調耳輔氏曰至于其變則不可以例言但以其聲之有合故以附焉而已其次序時世則有不可考者矣愚按其有可考者則已各見本篇鹿鳴之什二之一雅頌無諸國别故以十篇為一卷而謂之什猶軍法以十人為什也孔氏曰風及商魯頌以當國為别詩少可以同卷二雅周頌篇數既多故分其篇每十為卷卷首之篇則為什長以統餘篇之目也呦呦音幽鹿鳴叶音芒食野之蘋叶音旁我有嘉賔鼓瑟吹笙叶師莊反吹笙鼓簧音黃承筐是將人之好呼報反我示我周行叶户郎反興也呦呦聲和也蘋藾賴蕭也青色白莖如筯陸機曰始生香可食又可蒸食我主人也賔所燕之客或本國之臣或諸侯之使也愚按周禮王燕則以膳夫為獻主儀禮諸侯燕其臣或外使亦以宰夫代為主人而皆不自為主燕卿與大夫則别立大夫為賔燕外使則以其介為賔而皆不以所為宴者為賔曰主曰賔皆代為之則君與所為宴之臣各得全其尊也瑟笙燕禮所用之樂也儀禮燕禮云工四人二瑟工歌鹿鳴四牡皇皇者華笙入奏南陔白華華黍又曰升歌鹿鳴李寶之曰鼓瑟工歌鹿鳴之三是也吹笙笙奏南陔以下是也簧笙中之簧也嚴氏曰笙以匏為之十三管列匏中而施簧管端吹笙則鼓動其簧而發聲承奉也筐所以盛幣帛者也將行也奉筐而行幣帛飲䕃則以酬賔送酒食嗣則以侑賔勸飽也孔氏曰飲有酬賔送酒之幣食有侑賔勸飽之幣愚按儀禮有享有食有燕燕則無幣食則無獻酒于享有酬幣于食有侑幣鄭氏謂酬幣以酬賔勸酒侑幣以為食賔殷勤之意未至復發幣以侑勸之周行大道也古者于旅也語故欲于此聞其言也孔氏曰鄉射記曰古者于旅也語注云禮成樂備乃可以言語先王之道疾今人言語無節愚按燕飲至旅酬正禮已終然後言語以盡嘉賔之忠告而明聖人之大道也此燕饗賔客之詩也李寶之曰享在廟燕在寢享重而燕輕享則君親獻燕則不親獻蓋君臣之分以嚴為主朝廷之禮以敬為主然一于嚴敬則情或不通而無以盡其忠告谷之益故先王因其飲食聚㑹而制為燕饗之禮以通上下之情而其樂歌又以鹿鳴起興真氏曰鹿食蘋則相呼呦呦焉而樂君臣賔主之相樂亦猶是也而言其禮意之厚如此庶乎人之好我而示我以大道也孔氏曰王肅云飲食以享之琴瑟以樂之幣帛以將之則庶乎好愛我而示我以道矣謝疊山曰古之聖賢無一時而忘學問無一事而非道德鹿鳴之具樂將幣人見其和樂而已不知吾君所望于嘉賔者有愛我之心則當視我以至道也講聖人之道德談先王之禮樂皆相示以道也記曰私惠不歸德君子不自留焉蓋其所望于羣臣嘉賔者唯在于示我以大道則必不以私惠為德而自留矣嗚呼此其所以和樂而不淫也與輔氏曰言人若以私意為惠而不本歸于德義則君子不肯自留處也今其所望于羣臣嘉賔者唯在于示我以大道則羣臣嘉賔之受宴也決非以其私意而不顧德以自留處也故曰此其所以和樂而不淫也歟愚按陳澔曰記言人有私意于我而不合于德義之公君子決不留之于已也故引詩言不留私惠之義呦呦鹿鳴食野之蒿我有嘉賔德音孔昭叶側豪反視民不恌他雕反叶音佻君子是則是效胡教反叶胡高反我有旨酒嘉賔式燕以敖牛刀反興也蒿菣僅也即青蒿也本章注曰春生苗葉秋開淡黃花結子如粟米大孔甚昭明也視與示同孔氏曰古字以目視物以物示人同作視字後世目視物為示傍見示人物作單示字由是經傳中視與示多相亂恌偷薄也敖游也言嘉賔之德音甚明足以示民使不偷薄而君子所當則效則亦不待言語之間而其所以示我者深矣程子曰言嘉賔聞望昭明示民以厚之之意使人儀法之呦呦鹿鳴食野之芩其今反我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂音洛且湛都南反叶待林反我有旨酒以燕樂嘉賔之心興也芩草名莖如叉股葉如竹蔓生陸機曰生澤中下地鹹處牛馬喜食之湛樂之久也燕安也言安樂其心則非止養其體娛其外而已蓋所以致其殷勤之厚而欲其教示之無已也毛氏曰不能致其樂則不能得其志不能得其志則不能竭其力輔氏曰此章再言樂之以樂以見和樂之意永久無斁有旨酒以宴樂其心則又不止于養口體為觀聽之美而已其所望于嘉賔教示之意益深至矣鹿鳴三章章八句按序以此為燕羣臣嘉賔之詩而燕禮亦云工歌鹿鳴四牡皇皇者華即謂此也李迂仲曰武王以後以此詩為宴羣臣之歌也鄉飲酒用樂亦然而學記言大學始教宵雅肄三亦謂此三詩鄉飲酒注曰諸侯鄉大夫貢士而與之飲酒歌鹿鳴采其嘉賔示我以善道又有明德可則效也四牡采其忠孝之至也皇華采其欲咨謀于賢智也學記注曰宵小也肄習也三謂鹿鳴四牡皇華也董氏曰古宵小同故謂小人為宵人然則又為上下通用之樂矣豈本為燕羣臣嘉賔而作其後乃推而用之鄉人也歟上下常用之樂如鹿鳴三篇及嘉魚魚麗南山有臺三篇風則是關雎卷耳采蘩采蘋等篇不知當初何故獨取此數篇也愚按先王作此詩以宴享賔客後乃推而用于諸侯之燕禮又用于鄉大夫貢士之禮又用于大學之教習蓋不專用于天子也今據大射儀亦有歌鹿鳴之文則又通用于諸侯之射禮矣然考儀禮凡上下通用之樂止是小雅二南諸詩而無歌大雅者可見大雅獨為天子之樂此二雅大小所以分也然于朝曰君臣焉于燕曰賔主焉先王以禮使臣之厚于此見矣范氏曰食之以禮樂之以樂將之以實求之以誠此所以得其心也賢者豈以飲食幣帛為悅哉夫婚姻不備則貞女不行也禮樂不備則賢者不處也賢者不處則豈得樂而盡其心乎輔氏曰范氏說破君子豈為飲食幣帛而悅之意甚好然則先王制禮所以殷勤如此者亦非以為媚賢之具也各盡其道而已愚按先王之宴臣下食之以賔客之禮樂之以琴瑟之樂將之以筐篚之實而其求之之誠則又燕樂其心而欲其示我以周行此其多儀之及物所以為王公之尊賢也序燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣嚴氏曰古者上下交而為泰于鹿鳴諸詩見之序得詩意但未盡其用耳其說已見本篇四牡騑騑芳非反周道倭於危反遲豈不懷歸王事靡盬音古我心傷悲賦也騑騑行不止之貌周道大路也倭遲回逺之貌盬不堅固也董氏曰說文煮海為鹽煮池為盬盬苦而易敗故傳以不堅訓之此勞使並去聲臣之詩也夫扶君之使臣臣之事君禮也故為臣者奔走于王事特以盡其職分之所當為而已何敢自以為勞哉然君之心則不敢以是而自安也故燕饗之際敘其情以閔其勞言駕此四牡而出使去聲于外其道路之回逺如此當是時豈不思歸乎特以王事不可以不堅固不敢徇私以廢公是以內顧而傷悲也臣勞于事而不自言君探其情而代之言上下之間可謂各盡其道矣輔氏曰古之勞詩皆如此傳曰思歸者私恩也靡盬者公議也傷悲者情思去聲也孔氏曰傷悲出自其情故曰情思情思即私恩正謂念憶父母也無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事范氏曰臣之事上也必先公而後私君之勞臣也必先恩而後義四牡騑騑嘽嘽他丹反駱音洛馬叶滿補反豈不懷歸王事靡盬不遑啓處賦也嘽嘽衆盛之貌白馬黑鬛曰駱遑暇啓跪處居也項氏曰古者席地故有跪有坐跪起身居則坐也嚴氏曰跪者雙膝著地而直身坐者雙膝著地而坐也李迂仲曰大意謂不遑暇居處耳輔氏曰我心傷悲既述其私恩之不能忘不遑啓處又述其公義之不可已所謂天理人情之至也翩翩音篇者隼當作佳朱惟反載飛載下叶後五反集于苞栩況甫反王事靡盬不遑將父扶雨反興也翩翩飛貌隼夫不弗平聲也今鵓鳩也凡鳥之短尾者皆佳屬將養也翩翩者隼猶或飛或下而集于所安之處今使人乃勞苦于外而不遑養去聲其父此君人者所以不能自安而深以為憂也范氏曰忠臣孝子之行役未嘗不念其親君之使臣豈待其勞苦而自傷哉亦憂其憂如已而已矣此聖人所以感人心也輔氏曰君之于臣能體悉之如此則臣之所以報上者又當如何哉古人事君得以展布四體而死生以之者亦以人君感之者無不盡其道也謝疊山曰忠孝不兩全此人情之所難也先王勞使臣而言之及此探人情真切而言之也翩翩者隼載飛載止集于苞杞音起王事靡盬不遑將母叶滿彼反興也杞枸苟檵計也嚴氏曰本草云根名地骨莖幹三五尺作叢詩中有三杞將仲子樹杞栁屬也南山有杞湛露杞棘山木也此詩苞杞四月杞桋北山言采其杞枸杞也輔氏曰上兩章既述其私恩公義矣故三章四章又述其託物起興而自道其不遑養親之情駕彼四駱載驟助救反駸駸侵寢二音豈不懷歸是用作歌將母來諗深審二音賦也駸駸驟貌諗告也以其不獲養去聲父母之情而來告于君也非使去聲人作是歌也設言其情而勞去聲之耳謝疊山曰聖人以孝治天下聞有以養母來忠告者安得不俞其請乎此蓋設言欲使人臣孝兩全也孔氏曰臣有勞苦患上不知今君勞臣言汝曰豈不思歸作歌來告是探其情以勞之獨言將母者因上章之文也孔氏曰母以恩意偏多故承上章再言之范氏曰父至尊也母至親也知母之親則知父之尊矣卒章再言母本其恩所起以教愛也愛母則敬父矣敬父則尊君矣未有愛親而不愛其君者也輔氏曰三四章既述其不得養親之情矣此章又言其以是情而告于上所謂臣下不敢自言而君上探其情而為之言者詳于私恩而略于公義君之勞臣當然也四牡五章章五句按序言此詩所以勞使臣之來甚協詩意輔氏曰或已國使臣之歸或諸侯使臣之來皆可用也故春秋傳亦云而外傳以為章使臣之勤所謂使臣雖叔孫之自稱亦正合其本事也襄公四年左氏傳曰穆叔如晉晉侯享之歌鹿鳴之三三拜韓獻子使子員問之對曰鹿鳴君所以嘉寡君也敢不拜嘉四牡君以勞使臣也敢不重拜皇皇者華君教使臣曰必咨于周敢不重拜外傳之魯語云叔孫穆子對曰鹿鳴君所以嘉先君好也敢不拜嘉四牡君所以章使臣之勤也敢不拜章皇華君告使臣曰每懷靡及諏謀度詢必咨于周敢不拜教但儀禮又以為上下通用之樂疑亦本為勞使三字並去聲臣而作其後乃移以他用耳潘子善問曰鹿鳴四牡皇華儀禮皆以為上下通用之樂不知如君勞使臣王事靡盬之類庶人安得而用之曰鄉飲酒亦用而大學始教宵雅肄三官其始也正謂習此蓋入學之始須教他知有君臣之義始得鳴愚按此詩始作本為勞使臣也其後又與鹿之宴賔皇華之遣使者同為一時通用之樂而此詩中以王事為言則此三詩其皆作于武王以後也歟序勞使臣之來也有功而見知則說矣首句同上然其下云云者語疏而義鄙矣皇皇者華芳無反與失叶于彼原隰侁侁所巾反征夫每懷靡及興也皇皇猶煌煌也華草木之華也髙平曰原下濕曰隰侁侁衆多疾行之貌征夫使臣與其屬也孔氏曰使與上介衆介也懷思也此遣使臣之詩也君之使臣固欲其宣上德而達下情而臣之受命亦惟恐其無以副君之意也輔氏曰惟恐無以副君之意此所以每懷靡及也苟存此意則諏謀度詢必咨于周自不容已也程子曰遣使四方以觀省風俗采察善惡訪問疾苦宣道化于天下故為使者惟慮不能宣達也故先王之遣使臣也美其行道之勤而述其心之所懷曰彼煌煌之華則于彼原隰矣此侁侁然之征夫則其所懷思常若有所不及矣歐陽子曰言原隰者其道所經也每懷靡及者于事每思唯恐不及也蓋亦因以為戒然其辭之婉而不迫如此詩之忠厚亦可見矣輔氏曰以為戒者即穆子所謂君教使臣之意夫欲以為教戒而不遂直言之乃設言言使臣之情自如此所謂婉而不迫也我馬維駒恭于恭侯二反六轡如濡如朱如由二反載馳載驅虧于虧由二反周爰咨諏子須子侯二反賦也如濡鮮澤也周遍爰於也咨諏訪問也李迂仲曰周爰咨諏遍于其所而詢問之使臣自以每懷靡及故廣詢博訪以補其不及而盡其職也程子曰咨訪使臣之大務歐陽子曰周詳訪問以博采廣聞不徒將一事而出也輔氏曰每懷靡及者心也諏謀度詢者事也有是心則有是事矣程子之意蓋謂人君正以耳目不得與逺民相接故遣使以宣已意而通下情為之使者豈可不咨訪以副君意哉故後四章皆述此意而已我馬維騏音其六轡如絲叶新齎反載馳載驅周爰咨謀叶莫悲反賦也如絲調忍音刃直也也謀猶諏也變文以協韻爾下章放此歐陽子曰諏謀度詢但叶韻爾詩家此類甚多陳少南曰穆叔言咨事為諏咨難為謀咨禮為度咨親為詢彼蓋敷衍文詞經旨不在是也我馬維駱六轡沃烏毒反若載馳載驅周爰咨度待洛反賦也沃若猶如濡也度猶謀也愚按沃若有鮮澤之義故猶二章之如濡咨度則變文以叶韻故猶三章之咨謀也我馬維駰六轡既均載馳載驅周爰咨詢賦也隂白雜毛曰駰隂黑色孔氏曰雜毛是體有二種之毛相問雜均調也詢猶度也皇皇者華五章章四句按序以此詩為君遣使臣春秋內外傳皆云君教使臣其說已見前篇儀禮亦見鹿鳴疑亦本為遣使臣而作其後乃移以他用也然叔孫穆子所謂君教使臣曰每懷靡及諏謀度詢必咨于周敢不拜教可謂得詩之意矣范氏曰王者遣使于四方教之以咨諏善道將以廣聰明也夫臣欲助其君之德必求賢以自助故臣能從善則可以善君矣臣能聽諫則可以諫君矣未有不自治而能正君者也輔氏曰范氏說是餘意夫君臣一體已不能咨諏善道則君亦安能聽用已言哉三蘇氏曰四牡皇華先勞而後遣何也鹿鳴之常施于禮樂不獨用于勞遣意者以其聲為先後歟大雅氣象宏闊小雅雖各指一事然說得精切至到古人工歌宵雅之三將作重事近令孫子誦之則見其詩果是懇至如鹿鳴見得賔主相好之誠如德音孔昭以燕樂嘉賔之心情意懇切而不失義理之正四牡古注云無公義非忠臣也無私情非孝子也此語甚切當如既云王事靡盬又云不遑將父母皆是人情少不得底說得懇切如皇華首云每懷靡及其後便咨謀咨詢看此等詩不用小序意義自然明白序君遣使臣也送之以禮樂言逺而有光華也首句同上然詩所謂華者草木之華非光華也常棣之華鄂五各反不韡韡韋鬼反凡今之人莫如兄弟待禮反音體興也常棣棣也子如櫻桃可食李迂仲曰何彼穠矣與論語言唐棣之華則爾雅所謂移也此常棣與采薇言維常之華則爾雅所謂棣也鄂鄂然外見之貌不猶豈不也韡韡光明貌此燕兄弟之樂歌故言常棣之華則其鄂然而外見者豈不韡韡乎凡今之人則豈有如兄弟者乎孔氏曰毛傳以為常棣之木衆華俱發實韡韡而光明故以興兄弟范氏曰凡今之人言舉世之人也莫如兄弟親之至也輔氏曰只是以豈不韡韡興豈有如兄弟一句耳死喪之威兄弟孔懷叶胡威反原隰裒薄侯反矣兄弟求矣賦也威畏懷思裒聚也言死喪之禍他人所畏惡烏故反惟兄弟為相恤耳至于積尸裒聚于原野之間亦惟兄弟為相求也此詩蓋周公既誅管蔡而作故此章以下專以死喪急難鬬鬩之事為言其志切其情哀乃處兄弟之變如孟子所謂其兄關彎弓而射石之則已垂涕泣而道之者此詩是制禮作樂時作這是先被他害所以當天下平定後更作此詩故其詞哀切不似諸詩和平胡庭芳曰王氏云文武以來宴兄弟亦必有詩然鹿鳴四牡等篇詞多和平惟常棣一篇詞多激切意若有所懲創則周公因管蔡之事其後更為此詩無疑序以為閔管蔡之失道者得之而又以為文武之詩則誤矣大抵舊說詩之時世皆不足信舉此自相矛盾石凖反者以見其一端後不能悉辨也輔氏曰二章至四章雖是周公處管蔡之變故以死喪急難鬬鬩之事為言然兄弟真切之情亦惟于此際而後見分曉若于安平之時觀之則人或以為朋友與兄弟等耳先王之制朋友之服視兄弟故特言之脊井益反令音零在原兄弟急難叶泥沿反每有良朋況也永歎吐丹反叶它㳙反興也脊令雍渠水鳥也陸機曰大如鷃雀長腳長尾尖喙背上青灰色腹下白頸上黑如連錢況發語詞或曰當作恍況上聲脊令飛則鳴行則搖有急難之意故以起興程子曰脊令首尾相應急難之際兄弟相應如是也丘氏曰脊令飛則鳴行則搖不少自止猶兄弟在急難中其心亦不少自止濮氏曰小宛題彼脊令載飛載鳴亦言于兄弟之詩而言當此之時雖有良朋不過為去聲之長歎息而已力或不能相及也東萊吕氏曰疏其所親而親其所疏此失其本心者也故此反覆言朋友之不如兄弟蓋示之以親疏之分去聲使之反循其本也蘇氏曰人之急難相救不舍斯須如脊令者唯兄弟也雖有良朋其甚者不過為之長歎息而已小人好以親為怨而樂從其疏故此詩每以告之本心既得則由親及疏秩然有序兄弟之親既篤朋友之義亦敦矣初非薄于朋友也苟雜施而不孫去聲雖曰厚于朋友如無源之水朝滿夕除胡可保哉或曰人之在難去聲朋友亦可以坐視與曰每有良朋況也永歎則非不憂憫但視兄弟急難為有差等耳詩人之詞容有抑揚李迂仲曰以天屬之親故急難之際能盡其兄弟之恩也然則朋友之義可廢乎曰非也親疏之義則然鄉人鬬者閉户可也同室鬬者被髮纓冠而救之親疏之義如此然常棣周公作也聖人之言小大高下皆宜而前後左右不相悖音佩兄弟鬩許歷反于牆外禦其務春秋傳作侮罔甫反每有良朋蒸之承反也無戎叶而主反賦也鬩鬬狠也禦禁也蒸發語聲戎助也言兄弟設有不幸鬬狠于內然有外侮則同心禦之矣雖有良朋豈能有所助乎王介甫曰狠于內非令兄弟也然及其禦侮則雖每有良朋曽不如不令之兄弟之可恃也富辰曰兄弟雖有小念不廢懿親僖公二十四年左氏傳注曰懿美也言內雖不和猶宜外扞異族之侵侮國語富辰諫襄王曰古人有言曰兄弟讒鬩侮人百里注云鬩狠也兄弟雖以讒言相違狠猶禁他人侵侮已者百里諭逺也輔氏曰死喪相恤急難相救固足以見兄弟之情矣至于方且鬬鬩于內而忽有外侮則同心而禁禦之則尤見其情之不容已者朋友于此則豈能如兄弟之相助乎喪亂既平既安且寧雖有兄弟不如友生叶桑經反賦也上章言患難之時兄弟相救非朋友可比愚按經文所謂喪亂者通言二章之死喪三章之急難四章之外侮也集傳所謂非朋友可比者雖言三章之良朋永歎四章之良朋無助然二章之所謂懷與求者亦非朋友所能及也此章遂言安寧之後乃有視兄弟不如友生者悖理之甚也蘇氏曰人居喪亂既平之後不知前日兄弟之可恃而以至親相責望則兄弟易以生怨故有以為朋友賢于兄弟者儐賔𦙍反爾籩豆飲酒之飫於慮反兄弟既具和樂音洛且孺賦也儐陳飫饜具俱也孺小兒之慕父母也程子曰孺親慕之義小兒親慕父母故謂之孺子言陳籩豆以醉飽而兄弟有不具焉則無與共享其樂矣謝疊山曰凡人飲燕待親戚朋友之禮常盛待兄弟之禮常簡愛有餘者敬或不足顔情稔熟者禮文有時而脫略也籩豆畢陳飲酒而至于饜飫亦可樂矣何如㑹集兄弟不惟和樂其情親義厚無異于孺子相慕也儒子之無不愛其親無不敬其兄者人欲未萌天理昭著也妻子好呼報反合如鼓瑟琴兄弟既翕許及反和樂且湛答南反叶持林反賦也翕合也言妻子好合如琴瑟之和而兄弟有不合焉則無以久其樂矣謝疊氏曰兄弟不和則家庭之間無非乖氣雖有妻子之樂亦不安其樂矣惟兄弟和樂則一家之情無不相宜妻子之樂亦可長久蓋天合者微有乖睽人合者亦不得康寧也李迂仲曰兄弟既翕必先于妻子者人之壯也各妻其妻各子其子兄弟之所以乖爭者未必不本于此若不能敦兄弟之愛則雖家室妻孥必不能久相樂也蘇宜久問六章七章就他逸樂時良心發處指出謂酒食備而兄弟有不具則無以共其樂妻子合而兄弟有不翕則無以久其樂蓋居患難則人情不期而相親故天理常易復處逸樂多為物欲所轉移故天理常隱而難尋故卒章有是究是圖亶其然乎之語反覆玩味真能使人孝友之心油然而生也曰此所謂生于憂患死于逸樂那二章正是遏人欲而存天理須是恁地看輔氏曰二章至四章言急難危殆之時惟兄弟為能相救六章七章又言燕樂和平之際無兄弟則亦無與共享而久安之反覆而言則兄弟之情相與切至而不可解者自見矣宜爾室家叶古胡反樂爾妻帑音奴是究是圖亶其然乎就用乎字為韻賦也帑子究窮圖謀亶信也宜爾室家者兄弟具而後樂且孺也樂爾妻帑者兄弟翕而後樂且湛也兄弟于人其重如此試以是究而圖之豈不信其然乎東萊吕氏曰告人以兄弟之當親未有不以為然者也苟非是究是圖實從事于此則亦未有誠知其然者也不誠知其然則所知者特其名而已矣凡學蓋莫不然王晦叔曰人情皆知保其室家私其妻子而罕知厚其兄弟然兄弟不咸以至毁其室家危其妻子者有之矣管蔡是也今欲室家之相宜妻子之相樂豈可獨忘兄弟哉誠能窮究樂妻子之理以圖謀好兄弟之事必以我言為然常人思慮不能及逺以為兄弟親疏無甚損益患其淺陋而不信故使深思而逺圖之也輔氏曰儐爾籩豆飲酒之飫然兄弟不具則雖和樂而無親慕之意妻子好合如鼓瑟琴然兄弟不翕則雖和樂而無不厭之誠然則兄弟之具翕是乃所以宜爾室家樂爾妻帑也此理固當是究是圖而信其然矣乎疑辭也不自以為然而使之反求諸心以見其真情實理之所在周公亦可謂善教人者也又觀周公之言如此則其所以誅管蔡者是豈得已者乎所謂處聖人之不幸也常棣八章章四句此詩首章略言至親莫如兄弟之意次章乃以意外不測之事言之以明兄弟之情其切如此三章但言急難則淺于死喪矣至于四章則又以其情義之甚薄而猶有所不能已者言之其序若曰不待死喪然後相收但有急難便當相助言又不幸而至于或有小忿猶必共禦外侮其所以言之者雖若益輕以約而所以著夫兄弟之義者益深且切矣輔氏曰自死喪而急難自急難而小忿所謂言之雖若益輕以約也然所以著夫兄弟之義者則自厚而至于薄雖薄而猶有不能自已者焉則所謂益深且切矣至于五章遂言安寧之後乃謂兄弟不如友生則是至親反為路人而人道或幾乎息矣故下兩章乃復極言兄弟之恩異形同氣死生苦樂無適而不相須之意卒章又申告之使反復窮極而驗其信然可謂委曲漸次說盡人情矣讀者宜深味之程子曰此詩句少而章多章多所以極其鄭重句少則各陳一事故也愚按五章言喪亂既平以結二章三章四章所言患難相與之意而繼言安寧之後兄弟之恩乃有疏薄者以起六章七章所陳兄弟之恩無適而不相須之意卒章又以宜室家結六章所言樂妻帑結七章所言而復繼言其理之誠然使人有以考驗之也詩凡八章惟卒章無兄弟字餘章反覆言兄弟者凡八其言人情之曲折天倫之厚重者哀傷激切故不若其他宴樂兄弟樂歌之和平也序燕兄弟也閔管蔡之失道故作常棣焉序得之但與魚麗之序相矛盾以詩意考之蓋此得而彼失也國語富辰之言以為周文公之詩亦其明驗但春秋傳為富辰之言又以為召穆公思周德之不類故糾合宗族于成周而作此詩二書之言皆出富辰且其時去召穆公又未逺不知其說何故如此孔氏曰外傳云周文公之詩曰兄弟閲于牆外禦其侮則此詩自是周公所作但召穆公虎見厲王之時兄弟恩疏重歌此周公之詩以親之耳故鄭氏答趙商云凡賦詩者或造篇或誦古杜預以作詩為作樂而奏此詩恐亦非是伐木丁丁陟耕反鳥鳴嚶嚶於耕反出自幽谷遷于喬木嚶其鳴矣求其友聲相息亮反彼鳥矣猶求友聲矧伊人矣不求友生叶桑經反神之聽之終和且平興也丁丁伐木聲嚶嚶鳥聲之和也幽深遷升喬髙相視矧況也此燕朋友故舊之樂歌故以伐木之丁丁興鳥鳴之嚶嚶而言鳥之求友遂以鳥之求友喻人之不可無友也人能篤朋友之好去聲則神之聽之終和且平矣陳少南曰聞伐木于山中者其聲丁丁然相應又聞鳥鳴于山間嚶嚶然和者相隨出于幽谷而遷高木聽其和好之聲則是以類相求因起興而曰相視彼鳥猶如此人其可不如乎鬼問神之聽之終和且平曰若能盡其道于朋友雖神亦必聽之相之而錫之以和平之福又曰楊氏云五品天敘人之大倫也朋友居一焉故謂之達道不由其道則人倫廢而天理滅得罪于天矣其能終和且平乎伐木許許呼古反釃所宜反酒有藇象吕反既有肥羜直吕反以速諸父扶雨反寧適不來微我弗顧叶居五反於音烏粲灑所懈反掃蘇報反叶蘇吼反陳饋八簋叶已有反既有肥牡以速諸舅其九反寧適不來微我有咎其九反興也許許衆人共力之聲淮南子曰舉大木者呼邪余遮反許蓋舉重勸力之歌也愚按淮南子道應訓章翟煎對梁惠王曰夫舉大木者前呼邪許後亦應之也詩考曰韓詩云勞者歌其事釃酒者或以筐或以草泲躋上聲之而去上聲其糟也禮所謂縮酌用茅是也問縮酌用茅恐茅乃以酹曰某亦疑今人用茅縮酒古人芻狗乃酹酒之物則茅之縮酒乃今人醡酒也想古人不肯用絹帛故以茅縮酒也藇美貌羜未成羊也爾雅注曰俗呼五月羔為羜速召也諸父朋友之同姓而尊者也毛氏曰人君友其賢臣孔氏曰稱之以父親親之辭也天子呼諸侯同姓大國曰伯父同姓小國曰叔父微無顧念也於歎辭粲鮮明貌八簋器之盛也劉執中曰簋八則籩豆倍之天子燕禮之數諸舅朋友之異姓而尊者也孔氏曰天子呼諸侯異姓大國曰伯舅小國曰叔舅先諸父而後諸舅者親疏之殺所界反也咎過也言具酒食以樂朋友如此寧使彼適有故而不來而無使我恩意之不至也范氏曰寧適不來豈必期其至哉不來在人弗顧在我躬自厚而不責于人也孔子曰所求乎朋友先施之未能也此可謂能先施矣輔氏曰微我弗顧言無使我恩意之不至而不顧念夫朋友也微我有咎言無使我恩意之不至而于朋友之義有過失也夫朋友之隙常生于遞相責望故此詩之意但欲盡其在我者而不問其彼之于我何如是誠處朋友之要道也伐木于阪叶孚臠反釃酒有衍籩豆有踐在演反兄弟無逺民之失德乾餱音侯以愆叶起淺反有酒湑思吕反我無酒酤音古我坎坎鼓我蹲蹲七句反舞我逮音待我暇叶後五反矣飲此湑矣興也衍多也踐陳列貌兄弟朋友之同儕者無逺皆在也先諸舅而後兄弟者尊卑之等也愚按詩言兄弟多矣鄭風揚之水婚姻之黨唐杕杜常棣頍辨斯干行葦等篇同氣之親也此詩則同儕之友也各隨所指不同耳乾餱食之薄者也嚴氏曰乾餱乾食公劉乃裹餱糧王制乾豆注謂臘之以為豆實愆過也湑亦釃也毛氏曰以筐曰釃以藪曰湑孔氏曰筐竹器也藪草也釃酒者或用筐或用草于今猶然酤買也坎坎擊鼓聲蹲蹲舞貌謝疊山曰湑我我湑之也酟我我酟之也鼓我我鼓之也舞我我舞之也此八字皆例下句法可見占文之妙也逮及也言人之所以至于失朋友之義者非必有大故或但以乾餱之薄不以分人而至于有愆耳故我于朋友不訃其有無但及閒暇則飲酒以相樂也程子曰有盛具當以燕樂朋友無相疏逺或乾餱不相及亦人之失德也故有酒則我醑之無酒則我酟之以至鼓舞我為之我及暇時則相與燕飲以篤恩意蘇氏曰民之失德乾餱相譴故君子于其朋友故舊無所愛者有則湑之無則酟之不以有無為辭也奏之以鼓重之以舞盡其有以樂之也輔氏曰民之失德乾餱以愆曰民則自上言下之辭言細民之相失或以薄物飲酒不以相分之故蓋前章既言其厚故此章又以薄者言之且乾餱之愆亦微過耳于微過而尤不敢不謹則其大者可知矣伐木三章章十二句劉氏曰此詩每章首輒云伐木凡三云伐木故知當為三章舊作六章誤矣今從其說正之問伐木大意皆自言待朋友不可不加厚之意所以感發之也曰然序燕朋友故舊也自天子至于庶人未有不須友以成者輔氏曰蓋以朋友為人倫之一不可以貴賤尊卑間也親親以睦友賢不棄不遺故舊則民德歸厚矣天保定爾亦孔之固俾爾單音丹厚何福不除直慮反俾爾多益以莫不庶賦也保安也爾指君也歐陽子曰詩人爾其君者蓋稱天以為言劉辰翁曰詩人爾君雖古人爾汝之常抑非此無以著其親愛諄至之情也固堅單盡也除除舊而生新也程子曰除更新也日進之義庶衆也人君以鹿鳴以下五詩燕其臣臣受賜者歌此詩以答其君言天之安定我君而使之獲福如此也王介甫曰君恩至重臣雖有犬馬之勞不足以上答唯稱其福祿以報之此出于歡心而不強以為者也輔氏曰此章言天之安定我君亦甚堅固也使我君無不極其單厚其于福祉無不見其除舊而生新也使我君多見其悠久之益以莫不庶便見其盛大之意終篇不過是此二意也愚按鹿鳴以下五詩所言非同一事所歌非同一時所宴非同一臣而其臣之答之則唯同歌此詩者蓋凡臣子之祝報其君唯願其福祿壽考而已試取前五詩分而讀之而各以此詩答之尤可見其一時君臣相與殷勤忠厚之意天保定爾俾爾戩子淺反榖罄無不宜受天百祿降爾遐福維日不足賦也聞人氏名滋曰戩與翦同盡也榖善也盡善云者猶其曰單厚多益也罄盡遐逺也爾有以受天之祿矣而又降爾以福言天人之際交相與也書所謂昭受上帝天其申命用休語意正如此輔氏曰此章又言天使我君無不盡善云為動作左右前後無不宜適而亦既受天之百祿矣而天之所以申命其悠久之福者方且維日不足也罄無不宜受天百祿者已然之事也降爾遐福維日不足方來之事也歐陽子曰既曰何福不除矣又曰俾爾戩榖矣又曰無所不宜而受天百祿又曰降爾遐福其所以殷勤重復如此而猶曰維日不足也愚按人君之對越上天者既能有以受百祿矣而天之眷人君者又降遐福而維日不足其所以交相與者如此固與大禹贊舜所謂昭受申命之意相類且與嘉樂之詩所謂宜民宜人受祿于天保佑命之自天申之語意正同蓋此詩歌于宴享之際以答前詩嘉樂歌于繹祭之日以答鳬鷖皆祝願人君之辭也天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增賦也興盛也髙平曰陸大陸曰阜大阜曰陵皆髙大之意也董氏曰爾雅山脊曰岡大阜曰陵則岡為山之髙者陵為阜之大者此日進而不已也川之方至言其盛長之未可量也歐陽子曰此又欲其國家興盛如山阜岡陵之髙大如川流之浸長而又增之吕與叔曰上章言受百祿降遐福此莫不庶也既庶矣則欲積纍至于崇髙故曰以莫不興如山阜岡陵言其興也既興矣欲增益而不絶故曰以莫不增如川方至言其增也吉蠲古𤣥反為饎尺志反是用孝享叶虛良反禴餘若反祠蒸嘗于公先王君曰卜爾萬壽無疆賦也吉言諏徂日擇士之善蠲言齊戒滌濯之潔愚按諏日者君臣諏謀祭日于旬有一日之先至次日乃卜所諏之日吉否如少牢饋食大夫先與有司諏丁巳之日至明日乃筮其日之吉凶也擇士者大射于射宫以選與祭之士齊戒謂七日齊三日戒之類滌濯謂溉濯祭器掃除宗廟之類饎酒食也享獻也宗廟之祭春曰祠夏曰禴秋曰嘗冬曰蒸孔氏曰自殷以上則禴禘蒸嘗王制文也周去夏禘以春禴當之更名春曰祠品爾雅注曰祠之言食礿新菜可瀹嘗嘗新榖蒸進物劉辰翁曰禴祠蒸嘗各倒一字此音節也公先公也謂后稷以下至公叔祖類也先王大王以下也鄭氏曰先公謂后稷至諸盩盩音綢傳數世而公叔祖類生古公亶父即太王古公亶父之父世本作太公組紺諸盩三代世表作叔類孔氏曰周之所追王太王以下太王之前皆為先公季問古無追王之禮武王周公以王業肇于太王王文王故追王三王至于組紺以上則止祀以先公之禮曰然周禮祀先王以衮冕祀先公以鷩冕鷩冕諸侯之服但乃是天子祭先公之禮耳君通謂先公先王也卜猶期也此尸傳神意以嘏主人之詞孔氏曰少牢禮云皇尸命工祝承致多福無疆于女孝孫之等是傳神辭嘏主人也歐陽子曰此章又言非惟天之福我君如此至于四時豐潔酒食祀其先公先王而神亦降之福文王時周未有曰先王者此必武王以後所作也愚按此詩所以答前五篇然則前五詩亦作于武王以後明矣神之弔都歷反矣詒以之反爾多福叶筆力反民之質矣日用飲食羣黎百姓遍為爾德賦也弔至也神之至矣猶言祖考來格也詒遺去聲質實也言其質實無僞日用飲食而已王介甫曰民無所施其智巧也日用飲食而已羣衆也黎黑也猶秦言黔首也百姓庶民也為爾德者則而象之猶助爾而為德也彭氏曰神詒之多福民及百姓皆被及之日用飲食則豐富充足遍為爾德則孝弟忠信蓋上有多福之君則下受多福之庇也始言民繼言羣黎百姓廣而言之正修已安人安百姓之意也范氏曰君所以為神民之主神則降福民則日用飲食而不知所以然羣黎百姓皆為君德此君人者之至願也嚴氏曰此祝君之福而祝君之德歸美之中有責難者寓若盡言福祿則全篇皆容悅之辭豈古者君臣相與之義邪凡詩人頌福多兼德言之又曰德者民心所自得而曰遍為爾德者民因君而全其天故民之德皆君之德猶曰莫匪爾極也輔氏曰民之質矣日用飲食則言在下之民由而不知之意以見其君之德存神過化民皆由之而不知但質實無僞日用飲食而已凡動靜作止無不在其君德化之中其所為者蓋莫非君之德也正如洪範五皇極所謂凡厥庶民于汝極錫汝保極之意鄭氏所謂則而象之先生所謂猶助汝為德之意皆在其中矣愚按此承上章祭祀而言神之降福推而至于民之質實百姓之為德莫非君之福也亦莫非君之德也所謂德者其一篇之本領歟如月之恆胡登反如日之升如南山之壽不騫起䖍反不崩如松柏之茂無不爾或承賦也恆弦升出也月上弦而就盈孔氏曰八日九日月體大率正半昏而中似弓之張而弦直謂之上弦也此取漸進之義故云上弦不言望日始出而就明騫虧也承繼也言舊葉將落而新葉已生相繼而長茂也問承是繼承相接續之義如何曰松柏非是葉不凋但舊葉凋時新葉已生木犀亦然歐陽子曰前既欲其興盛則又欲其永久故多引常久不壞之物以為況吕與叔曰上言神享之矣民服之矣福祿無以加矣又欲常享是福有進而無退有成而無虧相承而無衰故以日月南山松柏喻焉輔氏曰此章則又言其進盛悠久相繼無窮之意而已天保六章章六句歐陽子曰六章皆下愛其上之辭其文甚顯而易明大抵文意重復以見其愛上深至如此耳程子曰天保詩盛陳人君受天之祜福祿之厚蒙被臣民由君德之所致也潘子善曰一章至三章皆人臣頌祝其君之言然辭煩而不殺者以其愛君之心無己也四章則以祭祀先王先公為言五章則以遍為爾德為言蓋謂人君之德必上無愧于祖考下無愧于斯民然後福祿愈逺而愈彰故末章終之以無不爾或承董叔重云蓼蕭詩云令德壽豈亦是此意蓋人君必有此德而後可以稱是福也序下報上也君能下去聲下如字以成其政臣能歸美以報其上焉序之得失與鹿鳴相似臣歌天保詩答上五詩之燕之說序略得詩意而古注言鹿鳴至伐木皆君所以下其臣臣亦歸美于上崇君之尊而福祿之以答其歌却說得尤分明采薇采薇薇亦作叶則故反止曰歸曰歸嵗亦莫音慕止靡室靡家叶古乎反玁音險狁音允之故不遑起居玁狁之故愚按此章作與慕故叶薇與歸叶家又與居叶興也薇菜名作生出土也劉執中曰謂芽初出土莫晚靡無也玁狁北狄也遍暇啓跪也此遣戍役之詩彭氏曰止言遣戍役而不及將帥何也四郊多壘卿大夫之辱也士以大夫以體國為心固有不待勉者至于小民之愚或為上之苦我固不可無辭以遣之也若夫師還之日皆從而勞之聖人忠厚之意也以其出戍之時采薇以食而念歸期之逺也故為其自言而以采薇起興曰采薇采薇則薇亦作止矣曰歸曰歸則嵗亦莫止矣嚴氏曰雖托為軍士自計之辭亦因示歸期以安其心凡此所以使我舍上聲其室家而不暇啓居者非上之人故為是以苦我也直以玁狁侵陵之故有所不得已而然耳蓋敘其勤苦悲傷之情而又風諷以義也輔氏曰薇之作是始出戍時也嵗之莫是來嵗歸時也此章言其始行之情故云靡室靡家不遑啓居知其為玁狁之故則上之遣我者出于不得已而我之義亦有所不容已也此所謂風之以義愚按不遑起居則勤苦矣曰歸曰歸靡室靡家則悲傷矣此所以敘其私情也一一則曰玁狁之故二則曰玁狁之故又因風以公義也詩之中唯以私情公義反覆為言所以感人者深矣程子曰毒民不由其上則人懷敵愾慨之心矣輔氏曰程子此言萬世用兵之定法順之則吉悖之則凶又曰戍役兩朞而還今年春莫行明年夏代者至復阜留備秋至過十一月而歸又明年中仲春至春暮遣次戍者每秋與冬初兩畨戍者皆在疆圉如今之防秋也許益之曰防秋宋遣戍之名熊剛大曰北狄畏暑耐寒又秋氣折膠則弓弩可用故秋冬易為侵暴每留屯以防之采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載飢載渴叶巨烈反我戍未定靡使歸聘興也柔始生而弱也李迂仲曰始遣戍時薇始生其後薇長而柔又其後薇壯而剛以見天時之變爾烈烈憂貌載則也定止聘問也言戍人念歸期之逺而憂勞之甚蘇氏曰內憂歸期之逺而外為飢渴之所困亦甚病矣然戍事未已則無人可使歸而問其室家之安否也輔氏曰此章言其在路之情故曰憂心烈烈載飢載渴凡人在道路時飢渴固有所不免故卒章言其歸路之情亦曰載渴載飢我戍未定靡使歸聘言我行猶未至戍所則固無人可使歸問其室家之訊也戍者勤苦之情大概最切者有四一則有舍其室家之悲二則有不遑啓居之勞三則有載飢載渴之苦四則有不得其家音信之憂故此詩于首兩章備道此四事以慰之愚按此章曰歸而心憂載飢復載渴其私情亦甚苦矣然我戍未定而靡使歸聘則公義以為重也采薇采薇薇亦剛止曰歸曰歸歲亦陽止王事靡盬不遑啓處憂心孔疚叶訖力反我行不來叶六直反興也剛既成而剛也陽十月也時純隂用事嫌于無陽故名之曰陽月也程子曰疑于無陽故謂陽月然何時無陽如日有光之類蓋隂陽之氣有常存而不移者有消長而無窮者復問十月何以為陽月曰剝盡為坤復則一陽生也之一陽不是頓然便生乃自坤卦積來如一月三十日以復之一陽分作三十分從小雪後一日生一分到十月半一陽始成以此見天地無休息孔氏曰十月名為陽君子愛陽而惡隂也四月秀葽靡草死豈無隂乎明隂陽常兼有也孔甚疚病也來歸也此見士之竭力致死無還心也劉執中曰言將帥與役者勇于報國而不敢顧其親也程氏曰歸期須嵗之陽王事不可盬也故啓處不遑憂心雖甚病我行不可歸也輔氏曰憂心孔疚切于仁也我行不來安于義也情與理並行不相悖也愚按此章後四句既風以義而敘其情又敘其情而風以義彼爾維何維常之華芳無胡瓜二反彼路斯何君子之車斤於尺奢二反戎車既駕四牡業業豈敢定居一月三捷興也爾華盛貌常常棣也路戎車也君子謂將帥也孔氏曰乘路車而稱君子故知謂將帥得稱路者左傳鄭子蟜叔孫豹王賜之大路是卿車得稱路也業業壯也捷勝也彼爾然而盛者常棣之華也彼路車者君子之車也戎車既駕而四牡盛矣則何敢以定居乎庶乎一月之間三戰而三捷矣程子曰四章五章皆勸以義也輔氏曰既言其情又言其義則體之者切而風之者深矣夫所謂風之者亦非是當時之人初無此意而上之人特為此以風勵之也此亦皆戍卒之本情但聖人能通其志耳上之人能通其志如此則下之人亦皆以上之心為心可知矣駕彼四牡四牡騤騤求龜反君子所依小人所腓符非反四牡翼翼象弭彌氏反魚服叶蒲北反豈不日戒叶訖力反玁狁孔棘賦也騤騤強也依猶乘也非猶芘也程子曰腓隨動也如足之腓足動則隨而動也吳伯豐曰傳曰腓猶芘也又引程子曰腓隨動也如足之腓足動則隨而動也某按易咸傳曰腓足肚行則先動足乃舉之非如腓之自動也易本義亦曰欲行則先自動由程子前說觀之則腓為隨足以動之物由後二說觀之則腓為先足而動明矣不當引之以解此詩之義不若猶芘之得也生民詩牛羊腓字之傳亦以腓為庇若施于此詩與上文君子所依意義亦相類也先生曰此非大義所係今詳兩說誠不合當刪去然板本已定只于補說中說破可也又百卉具腓又有他訓不知此字竟是何義翼翼行杭列整治之狀象弭以象骨飾弓弰音消又帥交反弓末也也嚴氏曰左傳云左執鞭弭曲禮云右執蕭蕭弭頭即受弦處以象齒飾之則弦之上下不至齟齬也魚獸名似猪東海有之其皮背上斑文腹下純青可為弓鞬矢服也鞬建平聲弓衣也戒警棘急也言戎車者將帥之所依乘戍役之所芘倚劉執中曰君子則依之以為備禦也小人則腓之以為進退也嚴氏曰遣將率戍役同歌是詩故以君子小人兼言且其行列整治而器械精好如此程子曰器械弭服是也豈不日相警戒乎玁狁之難去聲甚急誠不可以忘備也陳少南曰玁狁孔棘宜若倉皇不暇為計矣方且優遊暇豫作歌詩以導達其誠心此所以旌旗變色士卒生氣也愚按此及上章皆託為軍士自言車馬器械之盛備而于章末專以公義為言所以美之所以風之也昔我往矣楊栁依依今我來思雨于付反雪霏霏芳菲反行道遲遲載渴載飢我心傷悲莫知我哀叶于希反賦也楊栁蒲栁也霏霏雪甚貌遲遲長逺也此章又設為役人預自道其歸時之事以見其勤勞之甚也嚴氏曰楊栁依依即首章采薇之時雨雪霏霏即首章嵗亦莫止首尾中言亦丁寧以安其心也程子曰春而往冬而還行逺而時久言行道遲遲則見歸思之切也輔氏曰昔我往矣楊栁依依則始去之時二月也今我來思雨雪霏霏則來年得歸之十二月也路之長逺身之飢渴是亦勞苦之甚而傷悲之極也莫知我哀此句尤切夫上之人既已述其情之如此則其知之可謂盡矣而猶曰莫知我哀可見其體悉之心無有窮極也且于其遣戍之初而遽言及此則亦不憂上之人不知我矣程子曰此皆極道其勞苦憂傷之情也上能察其情則雖勞而不怨雖憂而能勵矣胡庭芳曰王氏云人情所患莫切于行役之勞飢渴之害故中心傷悲而莫有知其哀者則幾于不得其所而無所告訴今歌詩遣之述其勤苦則人不知其哀而上知之此君子能盡人之惰故人忘其死也李迂仲曰遣之而謂莫知我哀則知之者深矣愚按此章預道其往反勞苦憂傷之甚又專敘其情以為終也范氏曰豫于采薇見先王以人道使人後世則牛羊而已采薇六章章八句潘子善問首章言征夫之出蓋以玁狁不可不征故捨其室家而不遑寧處二章則既出而不能不念其家三章則則竭力致死而無還心蓋不復念家矣四章五章惟勉于王事而欲成戰伐之功也卒章則言事成之後極陳其勞苦憂傷之情也其序恐如此曰雅者正也乃王公大人所作皆有次序而文意不苟極可玩味風則成于婦人小子之口故但可觀其大略耳謝疊山曰采薇一詩見先王仁厚之至所謂體羣臣所謂本人情所謂說以使民民忘其勞當以東山詩合觀序遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還杖杜以勤歸也此未必文王之詩以天子之命者衍說也我出我車于彼牧叶莫狄反矣自天子所謂我來叶六直反矣召彼僕夫謂之載叶節力反矣王事多難乃旦反維其棘矣賦也牧郊外也自從也天子周王也僕夫御夫也此勞去聲還旋率帥之詩追言其始受命出征之時出車于郊外而語去聲其人曰我受命于天子之所而來于是乎召御夫使之載其車以行而戒之曰王事多難去聲是行也不可以緩矣歐陽子曰南仲為將始駕戎車出至于郊則稱天子之命使我來將此衆遂戒其僕夫以趨王事之急難謝疊山曰此章有尊敬王命之禮有憂勤王事之義有整暇勇決之才有奔走犯難之忠嚴氏曰一章述其前時之忠敬以慰勞之也輔氏曰前四句則所以承乎上者嚴且重矣後四句則所以飭乎下者厲且敏矣我出我車于彼郊叶音高矣設此旐音兆矣建彼旄音毛矣彼旟音餘旐斯胡不斾斾叶蒲寐反憂心悄悄僕夫況瘁似醉反賦也郊在牧內愚按都城外五十里為近郊百里為逺郊也蓋前軍已至牧而後軍猶在郊也丘氏曰將言建旐設旄之事又本出車言之也設陳也龜蛇曰旐建立也旄注旄于旗干之首也鳥隼曰旟鳥隼龜蛇曲禮所謂前朱雀而後𤣥武也周禮圖注曰考工記云鳥隼七斿以象鶉火畫朱雀與隼以示勇捷沈存中云朱雀莫知何物但謂鳥而朱者然天文家朱鳥乃取象于鶉如鶉首鶉尾鶉火是也故𤣥武謂龜蛇也位在北方故曰𤣥身有鱗甲曰武楊氏曰師行之法四方之星各隨其方以為左右前後記曲禮曰前朱雀而後𤣥武左青龍而右白虎鄭氏云以此四獸為軍陳象天也進退有度各司其局鄭氏曰度謂伐與步數局部分也則士無失伍離次矣斾斾飛揚之貌嚴氏曰生民荏菽斾斾亦揚起也悄悄憂貌況兹也或云當作恍況士聲言出車在郊建設旗幟熾彼旗幟者豈不斾斾而飛揚乎但將帥方以任大責重為憂而僕夫亦為之恐懼而憔悴耳胡不猶言遐不言豈不斾斾乎但我自憂心悄悄而僕夫又況悴耳輔氏曰兵隂事也必如此然後與隂氣合而嚴重方整為謀必深圖功必成不然輕佻率易殆同兒戲耳烏能有所為哉東萊吕氏曰古者出師以喪禮處之命下之日士皆泣涕夫子之言行三軍亦曰臨事而懼皆此意也謝疊山曰子行三軍必也臨事而懼兵凶器戰危事不可以易心處之為將帥者憂心則悄悄為僕夫者情況則憔悴皆臨事而懼善于用兵也黃直卿曰臨事而懷懼則有持重謹畏之心此誠行軍法也嚴氏曰二章述其前時之戒懼以慰勞之也王命南仲往城于方出車彭彭叶鋪郎反旗旐央央於良反天子命我城彼朔方赫赫南仲玁狁于襄賦也王周王也南仲此時大將也方朔方今靈夏等州之地毛氏曰近玁狁之國也愚按即今甘肅省寧夏路靈州等處之地彭彭衆盛貌交龍為旗此所謂左青龍也央央鮮明也赫赫威名光顯也襄除也或曰上也與懷山襄陵之襄同蔡九峯曰襄駕出其上也言勝之也東萊吕氏曰大將傳天子之命以令軍衆于是車馬衆盛旗旐鮮明威靈氣熖赫然動人矣兵事以哀敬為本而所尚則威二章之戒懼三章之奮揚並行而不相悖也輔氏曰言大將傳天子之命以令軍衆而三軍之衆亦方知其所以出師之意在于城朔方以拒玁狁矣理直義明故車馬為之壯盛旗幟為之鮮明而大將南仲之威名亦隨之而顯赫雖未臨乎朔方而逆知玁狁之難于是而可除矣有前章之戒懼然後有此章之奮揚所謂靜翕而動闢自然之理也程子曰城朔方而玁狁之難除禦戎狄之道守備為本不以攻伐為先也程子曰此章指元帥之名以顯其城朔方之功也愚按此上三章皆本于公義以勞之也昔我往矣黍稷方華叶芳無反今我來思雨于付反雪載塗王事多難不遑啓居豈不懷歸畏此簡書賦也華盛也塗凍釋而泥塗也孔氏曰雪落而釋為泥塗簡書戒命也鄰國有急則以簡書相戒命也或曰簡書策命臨遣之詞也潘子善問二說曰後說為長當以後說載前前說只據左氏簡書同惡相恤之謂然此天子之所戒命不得謂之鄰國也孔氏曰古者無紙若有事則書之于簡謂之簡書此言其既歸在塗而本其往時所見與今還時所遭以見其出之久也東萊吕氏曰采薇之所謂往遣戍時也此詩之所謂往在道時也采薇之所謂來戍畢時也此詩之所謂來歸而在道時也胡庭芳曰王氏云黍稷方華季夏時也雨雪載塗春凍始釋時也玁狁在北昆夷在西是謂多難故下章序伐西戎之功劉執中曰王事多難言玁狁雖衰而西戎又入也自此而西不遑起居也輔氏曰此章述其往來時久啓處不遑之情且曰當此時非不思歸也畏此簡書而不敢耳此尤可見其體悉之詳也嚴氏曰此章述南仲北伐還師又承命西伐之事也愚按此章後四句反覆言公義私情以勞之也喓喓於遙反草蟲躍躍他歷反阜螽未見君子憂心忡忡敕中反既見君子我心則降户江反叶胡攻反赫赫南仲薄伐西戎賦也此言將帥之出征也其室家感時物之變而念之以為未見而憂之如此必既見而後心可降耳然此南仲今何在乎方往伐西戎而未歸也豈既却玁狁而還師以伐昆夷也與薄之為言聊也蓋不勞餘力矣輔氏曰是詩凡言我者皆是設為將帥之言唯我心則降一句則又是設為將帥室家之言雖家室之人皆以為薄伐西戎不勞餘力則王者之師有征而無戰可知也愚按此承上章述南仲北伐既還又成西伐之功久出而未得歸見室家此亦述其室家之情以勞之也春日遲遲卉許貴反木萋萋七西反倉庚喈喈音皆叶居奚反采蘩祁祁巨移反執訊音信獲醜薄言還音旋歸赫赫南仲玁狁于夷賦也卉草也萋萋盛貌倉庚黃鸝也喈喈聲之和也訊其魁首當訊問者也醜徒衆也夷平也歐陽氏曰述其歸時春日暄妍草木榮茂而禽鳥和鳴于此之時執訊獲醜而歸豈不樂哉鄭氏曰此時亦伐西戎獨言平玁狁者玁狁大故以為始以為終嚴氏曰獨言玁狁者舉出師所主也愚按南仲始受命出師蓋以獫狁之難也此章述其凱旋而以平獫狁為言所以美其事之終而功之大此則述其歸日之歡情以勞之也出車六章章八句程子曰此詩所賦自受命至還歸其事有叙大要在歸功將帥輔氏曰行師之道始出尚嚴肅既歸則尚和樂故出則有誓而歸曰凱還凱樂也讀此詩前三章則如秋霜之肅後三章則如春風之和如此然後謂之王者之師且曰玁狁于夷而已則固不貴乎略地屠城輿尸喋血之事也序勞還率也同上詩所謂天子所謂王命皆周王耳有杕大計反之杜有睆華板反其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止賦也睆實貌嗣續也陽十月也遑暇也此勞去聲還旋役之詩故追述其未還之時室家感于時物之變而思之曰特生之杜有睆其實則秋冬之交矣而征夫以王事出乃以日繼日而無休息之期至于十月可以歸而猶不至故女心悲傷而曰征夫亦可以暇矣曷為不歸哉輔氏曰日月陽止亦謂來年十月將歸時也述其室家之情不直言其思之而必曰王事靡盬焉則雖其室家亦知義也愚按次年十月乃戍畢之時故采薇遣戍之際預言嵗亦陽止以為歸期此章之思望征夫者亦以日月陽止而知其遑暇也或曰興也董氏曰因其所感而興耳下章倣此愚按指二章而言也有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止賦也萋萋盛貌春將暮之時也歸止可以歸也吕與叔曰嵗暮之期既不至將至春之暮猶未歸也愚按戍者之還當以仲春至家故此章于杕杜萋萋之時而知征夫之可以歸也輔氏曰王事靡盬者公義也我心傷悲者私情也雖其室家亦情義並行而不相悖陟彼北山言采其杞王事靡盬憂我父母叶滿侑反檀車幝幝尺善反四牡痯痯古緩反叶古轉反征夫不逺賦也檀木堅宜為車幝幝敝貌痯痯罷皮貌登山采杞則春已莫而杞可食矣蓋託以望其君子而念其以王事詒父母之憂也輔氏曰雖託于登山采杞以望其君子然又念其以王事詒父母之憂則非獨以室家之情而已也李迂仲曰此言王事靡盬憂我父母何以異于鴇羽王事靡盬不能藝黍稷父母何怙然鴇羽下之人自訴其勞苦此下之人勞苦而上知之然檀車之堅而敝矣四牡之壯而罷矣則征夫之歸亦不逺矣范氏曰車幝幝馬痯痯若見其將至矣愚按杞可采食而征夫猶未至則春已莫而愈過期矣故知其行必不逺矣匪載匪來叶立直反憂心孔疚叶訖力反期逝不至叶朱力反而多為恤卜筮偕叶舉里反止㑹言近叶渠紀反止征夫邇止賦也載裝疚病逝往恤憂偕俱㑹合也言征夫不裝載而來歸固已使我念之而甚病矣况歸期已過而猶不至則使我多為憂恤宜如何哉毛氏曰逺行不必如期室家之情以期望之胡庭芳曰王氏云而多為恤飢渴歟疾病歟死傷歟是何期逝不至也故且卜且筮相襲俱作合言于繇宙而皆曰近矣則征夫其亦邇而將至矣輔氏曰征夫不逺想料之辭也征夫邇止決定之辭也歸期近而思愈切者人情也期逝不至然後憂傷孔疚焉行者過期而不至則居者之憂百端矣范氏曰以卜筮終之言思之切而無所不為也杖杜四章章七句愚按前三章皆述其室家私情而兼公義為言卒章則又專勞之以私情大概與四牡采薇出車同本于公私情義以慰之也鄭氏曰遣將帥及戍役同歌同時欲其同心也反而勞之異歌異日殊尊卑也記曰賜君子小人不同日此其義也王氏曰出而用兵則均服同食一衆心也入而振旅則殊尊卑辨貴賤定衆志也范氏曰出車勞率故美其功杖杜勞衆故極其情先王以己之心為人之心故能曲盡其情使民忘其死以忠于上也李迂仲曰其遣也則預述其懷歸之事其還歸也又不忘其行役之勞故三詩遣勞帥役之事雖不同而叙其往反終始之情則一也胡庭芳曰王氏云上之人能知其下中心委曲之情而形于歌詠則下悅之出車杖杜是也上之人不能知而其下自陳勞苦之狀悲傷之情則怨也揚之水鴇羽是也輔氏曰鄭王范氏所發之意皆得詩人之旨但勞帥勞役體悉其情無所不至而略不及論功行賞之事者何哉蓋古者竭誠盡瘁以勤王之事者人臣之義也君臣各行其事而已下不以賞而望乎上上不以賞而夸乎下此君臣相與之至情也豈後世所能及哉愚按集傳鄭氏王氏之說總論采薇出車杖杜也范氏之說兼論出車杖杜二詩也序勞還役也同上南陔此笙詩也有聲無詞舊在魚麗之後以儀禮考之其篇次當在此輔氏曰已下三篇不綴于皇皇者華之後而附于此者欲以笙詩六篇相次也今正之說見華黍序孝子相戒以養也此笙詩也譜序篇次名義及其所用已見本篇鹿鳴之什十篇一篇無辭凡四十六章二百九十七句白華之什二之二毛公以南陔以下三章無辭故升魚麗以足鹿鳴什數而附笙詩三篇于其後因以南有嘉魚為次什之首今悉依儀禮正之白華笙詩也說見上下篇序孝子之潔白也同上此序尤無理華黍亦笙詩也鄉飲酒禮鼓瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦鼓瑟而歌鹿鳴四牡皇華然後笙入立于縣中李寶之曰諸侯軒縣縣中者北縣之南也鄉飲酒唯有磬故笙立于磬南奏南陔白華華黍南陔以下今無以考其名篇之義然曰笙曰樂曰奏而不言歌則有聲而無詞明矣董氏曰笙入者有聲而無詩也蓋詩有歌有聲見于詩者歌也寓于樂者聲也以其用于鄉人邦國故當時人習其義是以因其事而識其聲知其義也然則亡其辭者乃本亡之非失亡也劉辰翁曰雅詩之入歌者今皆在入笙者獨不存疑南陔六詩當時元只有聲如今之琴譜本無其詞也吾甚笑束晢補亡之無謂所以知其篇第在此者意古經篇題之下必有譜焉如投壺魯鼓薛鼓之節而亡之耳愚按魯鼓薛鼓之節其譜見禮記投壺篇末蓋魯薛二國投壺燕射擊鼓之節也其圓者擊鼙其方者擊鼓其節不同亦皆有聲而無詞也序時和嵗豐宜黍稷也有其義而亡其辭同上然所謂有其義者非真有所謂亡其辭者乃本無也魚麗力馳反于罶音栁與酒叶鱨音嘗鯊音沙叶蘇何反君子有酒旨且多興也麗歷也罶以曲薄為笱而承梁之空孔者也鱨揚也今黃頰魚是也似燕頭魚身形厚而長大頰骨正黃魚之大而有力解飛者埤雅曰今黃鱗魚也性浮而善飛躍故一曰揚也燕頭魚身頰骨正黃一名黃揚鯊鮀徒何反也魚狹而小常張口吹沙故又名吹沙濮氏曰鯊魚多種有極大者其皮如沙今人以為刀劒鞘吹沙小魚耳埤雅曰鯊大如指狹圓而長有黑點君子指主人旨且多旨而又多也此燕饗通用之樂歌即燕饗所薦之羞而極道其美且多見主人禮意之勤以優賔也濮氏曰言酒則殽隨之言物有所該者廣愚按此詩後三章所指物之多矣旨矣有矣即前之所言酒之且多且旨且有者也乃樂工極道主人所薦之物如此以見優賔之意或曰賦也下二章放此古人以魚為重故魚麗南有嘉魚皆特舉以歌之愚按若作賦體說則詩中所言魚亦是當時所薦之羞也魚麗于罶魴鱧音禮君子有酒多且旨興也鱧鮦衝上聲又音同也又曰鯇睆也胡庭芳曰嚴氏云毛郭皆以鱧為鮦潘子善問今黑鯉魚道家以為厭者也舍人謂鱧名鯇埤雅曰今𤣥鯉也諸魚中唯此魚瞻甘可食其首戴星夜則北嚮鱨鯊之美不若魴鱧魴鱧之美不若鰋鯉故其序如此魚麗于罶鰋音偃鯉君子有酒旨且有叶羽已反興也鰋鮎念平聲也本草曰大首方口背青黑無鱗毛多涎即鯷魚也鯷音題嚴氏曰以鮎釋鰋郭璞云各自一魚鰋今偃額白魚也毛質略當言似鮎耳埤雅云鱨魚黃魴魚青鱧魚𤣥鰋魚白鯉魚赤則五色之魚皆備有猶多也物其多矣維其嘉叶居何反矣賦也物其旨矣維其偕叶舉里反矣賦也物其有叶羽已反矣維其時叶上紙反矣賦也蘇氏曰多則患其不嘉旨則患其不齊有則患其不時今多而能嘉旨而能齊有而能時言曲全也輔氏曰後三章乃重歎前三章多旨有三字耳陳夀翁曰王應之云後三章衍前三章之詞前章多旨有皆以酒言而衍之之詞皆曰物以見物之與酒稱也魚麗六章三章章四句三章章二句按儀禮鄉飲酒及燕禮前樂既畢皆間去聲歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也言一歌一吹也然則此六者蓋一時之詩而皆為燕饗賔客上下通用之樂魚麗諸篇皆君臣燕飲之詩道主人意以譽賔如今宴飲致語之類亦有間叙賔客辭者漢書載客歌驪駒主人歌客無庸歸亦此意毛公分魚麗以足前什而說者不察遂分魚麗以上為文武詩嘉魚以下為成王詩其失甚矣序美萬物盛多能備禮也文武以天保以上治內采薇以下治外始于憂勤終于逸樂故美萬物盛多可以告于神明矣此篇以下時世次第序說之失已見本篇其內外終始之說蓋一節之可取云由庚此亦笙詩說見魚麗序萬物得由其道也見南陔南有嘉魚蒸之承反然罩罩張教竹卓二反君子有酒嘉賔式燕以樂五教歷各二反興也南謂江漢之間嘉魚鯉質鱒鯽肌出于沔南之丙冗陸農師曰嘉魚鯉質鱒鱗肌肉美食乳泉出于丙穴先儒謂穴在漢中沔南縣北穴口向丙故曰丙也蒸然發語聲也罩篧總入聲也編細竹以罩魚者也重言罩罩非一之詞也此亦燕饗通用之樂故其辭曰南有嘉魚則必蒸然而罩罩之矣君子有酒則必與嘉賔共之而式燕以樂矣此亦因所薦之物而道達主人樂賔之意也愚按詩言燕樂衎綏既燕而又燕故知為道達主人樂賔之意南有嘉魚蒸然汕汕所諫反君子有酒嘉賔式燕以衎苦旦反興也汕樔嘲也以薄汕魚也鄭氏曰樔今之撩罟也撩療僚潦三音衎樂也南有樛居虬反木甘瓠音護纍力追反之君子有酒嘉賔式燕綏之興也東萊吕氏曰瓠有甘有苦甘瓠則可食者也樛木下垂而美實纍之固結而不可解也愚謂此興之取義者似比而實興也翩翩者隼之誰反蒸然來叶六直陵之二反思君子有酒嘉賔式燕又叶夷昔反或如字思興也此興之全不取義者也輔氏曰詩中興體固有此兩樣但此二章相比故于此發之也思語辭也又既燕而又燕以見其至誠有加而無已也孔氏曰思皆為辭嘉賔既來用此酒與之燕又燕也頻與之燕言親之甚也或曰又思言其又思念而不忘也來思之思語詞又思既燕而又思之以見其至誠有加而無已也凡思字為語助者上字叶韻為思慮之思者本字協韻此章則來字與末句思字協韻也南有嘉魚四章章四句說見魚麗序樂與賢也太平之君子至誠樂與賢者共之也序得詩意而不明其用其曰太平之君子者本無謂而說者又以專指成王皆失之矣崇丘說見魚麗序萬物得極其高大也見上南山有臺叶田飴反北山有萊叶陵之反樂音洛只音紙君子邦家之基樂只君子萬壽無期興也臺夫符須即莎草也本草曰其實名香附子萊草名葉香可食者也陸璣曰兖州人蒸以為茹謂之萊蒸君子指賔客也此亦燕饗通用之樂故其辭曰南山則有臺矣北山則有萊矣樂只君子則邦家之基矣樂只君子則萬壽無期矣所以道達主人尊賔之意美其德而祝其壽也愚按詩中所謂德音所謂民之父母邦家之基與光皆所以美其德也所謂壽耉者皆所以祝其壽也通前魚麗嘉魚兩篇皆一時樂工所歌彼為優賔樂賔則此詩所以美之祝之者為尊賔也或疑賔客不足以當萬壽之語愚謂此詩上下通用之樂當時賔客容有爵齒俱尊足當之者蓋古人簡質如士冠禮祝辭亦云眉壽萬年又況古器物銘所謂用蘄萬壽用蘄眉壽萬年無疆之類皆為自祝之辭則此詩以萬壽祝賔庸何傷乎南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆興也輔氏曰首章邦家之基美其可以為邦家之基本所謂治生乎君子賢者為國人禎幹也次章言邦家之光美其可以為邦家之顯榮所謂儒者在顯朝則美政在位則美俗也既足以為邦家之基木與榮故因祝其壽之無期限而無疆界者也愚按此章亦美其德而祝其壽也南山有杞北山有李樂只君子民之父母叶滿彼反樂只君子德音不已興也杞樹如樗一名狗骨陸璣曰杞山木而滑其子為木虻入藥愚按此章則專美其德也南山有栲音考叶音口北山有杻女九反樂只君子遐不眉壽叶直酉反樂只君子德音是茂叶莫口反興也栲山樗杻檍音憶也遐何通眉壽秀眉也愚按醫書以眉毛過垂眼下者為壽長占人稱髙壽者曰眉壽其以此歟此章又所以祝其壽而壽其德也南山有枸俱甫反北山有楰音庾樂只君子遐不黃耉音苟叶果五反樂只君子保艾五蓋反爾後叶下五反興也枸枳枸樹髙大似白楊有子著枝端大如指長數寸噉啖之甘美如飴移八月熟亦名木蜜本草曰木蜜生南方枝葉皆可噉實可煎食如飴其子一名枳椇味如蜜以木作屋屋中酒則味薄椇音矩潘子善問問枸曰僟枸子建陽謂之皆拱子俗謂之癩漢指頭吾鄉呼為兼勾味甘而解酒毒人家左右前後有此木則醖酒不成楰鼠梓樹葉木理如楸亦名苦楸黃老人髮復黃也耉老人面凍梨色如浮垢也孔氏曰髮白而復黃而如凍梨之色保安艾養也愚按此章又專祝其壽也南山有臺五章章六句輔氏曰後二章言遐不眉壽遐不黃耉與首章次章末句相應萬壽無期萬壽無疆者願之之辭也遐但不眉壽遐不黃耉者必之之辭也德音是茂言不不已而已而又愈益茂盛也保艾爾後則不但為今日計而又願其安養其後世之子孫也人君得賢則基圖鞏固故曰邦家之基有光華故曰邦家之光愛利及民故曰民之父母燕及後世故曰保艾爾後說見魚麗序樂得賢也得賢則能為邦家立太平之基矣序首句誤詳見本篇看詩便有感發人意思今讀之無所感發者正是被諸儒解殺了死著詩人興起人底意思如南山有臺之序蓋見詩中有邦家之基故如此說才如此說定便局了一詩之意由儀說見魚麗序萬物之生各得其宜也有其義而亡其辭見上蓼音六彼蕭斯零露湑息吕反兮既見君子我心寫叶想羽反兮燕笑語兮是以有譽處兮興也蓼長如字又音上聲大貌蕭蒿也嚴氏曰蕭香蒿也荻也牛尾蒿也湑湑然蕭上露貌君子指諸侯也寫輸寫也燕謂燕飲譽善聲也處安樂也蘇氏曰譽豫通凡詩之譽皆言樂也亦通諸侯朝于天子天子與之燕以示慈惠愚按左傳晉卻至曰宴以示慈惠蓋謂升殽于俎相與共食所以示慈愛恩惠也故歌此詩言蓼彼蕭斯則零露湑然矣既見君子則我心輸寫而無留恨矣是以燕笑語而有譽處也其曰既見蓋于其初燕而歌之也輔氏曰諸侯來朝天子天子見之而得以輸寫其心而無所留隱相與燕飲語笑和悅則上下皆可以保有其聲譽與和樂也苟上之于下也有所疑而不敢盡其情下之于上也有所畏而不敢申其意則是上下不交否之時也禍端亂萌皆由于此尚何能保有其安樂于長久乎蓼彼蕭斯零露瀼瀼如羊反既見君子為龍為光其德不爽叶師莊反壽考不忘興也瀼瀼露蕃貌龍寵也為龍為光喜其德之詞也爽差也其德不爽則壽考不忘矣褒美而祝頌之又因以勸戒之也輔氏曰使天子以得見諸侯為寵光則諸侯之德之美可知矣故因以戒之曰使其德常如此而不至于有爽差焉則諸侯當享夀考而上之人亦永不忘之矣愚按既褒美其德之光寵而祝頌其壽考安寧又于褒美之中寓其勸之戒之之意若曰德之不爽然後壽而不忘德之虧者壽之虧也蓼彼蕭斯零露泥泥乃禮反既見君子孔燕豈弟宜兄宜弟待禮反令德壽豈開改反叶去禮反興也泥泥露濡貌孔甚豈樂弟易也宜兄宜弟猶曰宜其家人蓋諸侯繼世而立多疑忌其兄弟如晉詛無畜音勗養也羣公子秦針鉗懼選之類左傳宣公二年曰初晉驪姬之亂詛無畜羣公子自是晉無公族杜氏注云詛盟誓無公子故廢公族之官又昭公元年曰秦后子有寵于桓如二君于景其母曰弗去懼選癸卯針適晉注云后子秦桓公子景公母弟針也選數也恐景公數其罪而加戮也故以宜兄宜弟美之亦所以警戒之也愚按諸侯繼世而立三年喪畢則入朝于王此詩于其來朝而歌之故因言宜兄宜弟以美之戒之壽豈壽而且樂也輔氏曰言既見君子相與厚為燕飲以嘉其樂易之德則又推言能以是樂易之德而宜其兄弟焉則其令德將既壽而且樂矣濮氏曰甚燕而情樂易則知其宜兄弟而德可久也愚按令德壽豈即上章末二句之意而宜兄宜弟者又即不爽其德之本而所以為教國人者也蓼彼蕭斯零露濃濃奴同反既見君子鞗徒雕反革沖沖敕弓反和鸞雍雍萬福攸同興也濃濃厚貌鞗轡也革轡首也馬轡所把之外有餘而垂者也孔氏曰鞗革皮為之故曰鞗革沖沖垂貌和鸞皆鈴也在軾曰和在鑣曰鸞皆諸侯車馬之飾也何氏曰京山程氏云和金口木舌鸞金口金舌鸞在衡上近于馬和在軾上衡是車前橫木駕馬者即軓也軾是車上橫板手所憑伏以致敬者升車則馬動馬動則鸞鳴鸞鳴則和應自然有箇節奏若車行速則不相應行遲則不響若雜然都響皆不合節奏埤雅曰鸞雌曰和雄曰鸞愚按集傳于駟鐵以為乘車之鸞在衡則此傳鑣字恐當作衡庭燎亦以君子目諸侯而稱其鸞旗之美正此類也愚按采菽二章文意亦然攸所同聚也蓼蕭四章章六句輔氏曰一章燕笑語兮是以有譽處兮通上下而言之天子與諸侯皆然也下三章則專美諸侯二章三章則又因以勸戒而警戒之也序澤及四海也序不知此為燕諸侯之詩但見零露之云即以為澤及四海其失與野有蔓草同臆說淺妄類如此云湛湛直減反露斯匪陽不晞音希厭厭於鹽反夜飲不醉無歸興也湛湛露盛貌陽日晞乾也厭厭安也亦久也足也輔氏曰厭厭二字具安久足三義安故久久故足夜飲私燕也燕禮宵則兩階及庭門皆設大燭焉歐陽子曰燕當以晝而言夜飲者燕禮有宵則設燭之禮是古雖以禮飲酒有至夜者以申私燕之恩盡殷勤之意儀禮燕禮曰宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為大燭于門外李寶之云燕禮輕無庭燎設大燭而已此亦天子燕諸侯之詩言湛湛露斯非日則不晞以興厭厭夜飲不醉則不歸蓋于其夜飲之終而歌之也燕禮君曰無不醉賔及鄉大夫皆對曰諾敢不醉湛湛露斯在彼豐草厭厭夜飲在宗載考興也豐茂也夜飲必于宗室蓋路寢之屬也丘氏曰言在所尊者之室嚴氏曰燕禮云膳宰具官饌于寢東注云寢路寢也考成也輔氏曰燕于路寢之中所以示親親之意載考謂成其禮既云成其禮則必無過當之事矣愚按在宗室而成燕禮也湛湛露斯在彼杞棘顯允君子莫不令德興也顯明允信也謝疊山曰顯者其心明白洞達允者其心忠信誠慤無一毫可疑也君子指諸侯為賔者也令善也令德謂其飲多而不亂德足以將之也吕東萊曰以德將之不至于亂中無所主則為麴糵所迷矣輔氏曰莫不令德言與燕之諸侯無不有是德也其桐其椅於宜反其實離離豈弟君子莫不令儀興也離離垂也令儀言醉而不喪其威儀也輔氏曰莫不令儀言與燕之諸侯無不有是儀也湛露四章章四句春秋傳寧武子曰諸侯朝正于王杜氏曰朝而受政教也王宴樂之于是賦湛露曽氏曰前兩章言厭厭夜飲後兩章言令德令儀雖過三爵亦可謂不繼以淫矣潘子善問蓼蕭湛露二詩先生曰文義也只如此却要諷詠實見他至誠和樂之意方好輔氏曰顯允明信也豈弟樂易也明信者固宜其有德矣樂易者則恐其或略于威儀也樂易君子而威儀無不令焉此其所以為成德也既醉則情或佚矣在宗則儀可略矣然莫不令儀此其所以為成禮也不醉無歸見其情之厚也在宗載考見其情之親也莫不令德見其情之存乎中者善也莫不令儀見其儀之見于外者善也厚而不親則上之待下者猶未至也德雖令而儀有闕焉則臣之持身猶不足也序天子燕諸侯也白華之什十篇五篇無辭凡二十三章一百四句詩傳通釋卷九
