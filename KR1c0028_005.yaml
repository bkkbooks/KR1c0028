body:
  text: 詩傳通釋卷五元劉瑾撰詩朱子集傳齊一之八齊國名本少昊時爽鳩氏所居之地孔氏曰爽鳩氏司冦也爽鳩鷹也鷙故為司冦主盜賊少昊以鳥名官其人之名氏則未聞也在禹貢為青州之域周武王以封太公望東至于海西至于河南至于穆陵北至于無棣太公姜姓本四嶽之後孔氏曰齊世家云吕尚者其先為四嶽封于吕姓姜氏從其封姓故曰吕尚西伯獵遇與語大悅曰自吾先君太公曰當有聖人適周周因以興吾太公望子久矣故號之曰太公望載歸立為太師文王崩武王平商封于營丘既封於齊通工商之業便魚鹽之利民多歸之故為大國熊去非曰齊乃東方形勝要害之得地世號為東西秦秦得百二齊亦十二蓋可見矣大抵齊地富强近利故孔子謂齊變而後至魯也今青齊淄濰德棣等州是其地也愚按青州即今益都路齊州即令濟南路淄州即今般陽路與濰州德州棣州並隸山東東西道雞既鳴矣朝音潮既盈矣匪雞則鳴蒼蠅之聲賦也言古之賢妃御於君所至於將旦之時必告君曰雞既鳴矣㑹朝之臣既已盈矣欲令君早起而視朝也然其實非雞之鳴也乃蒼蠅之聲也蓋賢妃當夙興之時心常恐晚故聞其似者而以為真非其心存警畏而不留於逸欲何以能此李迂仲曰心苟在焉則間蒼蠅之聲以為雞鳴心不在焉雖雷霆在側而耳不聞焉故詩人叙其事而美之也孔氏曰以其君荒淫無賢妃之助故陳賢妃貞女警成其君之語東方明叶謨郎反矣朝既昌矣匪東方則明同上月出之光賦也東方明則日將出矣昌盛也此再告也輔氏曰一章疑於耳也二章疑於日也古之賢妃進御於君當其夙興之時心常恐晚故於耳目聞見之際疑其似者而以為真玩繹其辭則其戰兢警惕真有臨深履薄之意至誠所感則其為君焉冇留於宴眤之私者哉愚按此章以月光為東方明乃日見其似而以為真也如前章則是耳聞其不甚似者而以為真也蟲飛薨薨甘與子同夢叶莫縢反㑹且歸矣無庶豫子憎賦也蟲飛夜將旦而百蟲作也甘樂㑹朝也此三告也言當此時我豈不樂與子同寢而夢哉然羣臣之㑹於朝者俟君不出將散而歸矣無乃以我之故而并以子為憎乎王介甫曰甘與子同夢情也㑹且歸矣無庶豫子憎義也雞鳴三章章四句李迂仲曰自古人君修身謹行而無流連荒亡之禍者非特有忠臣義士亦由賢妃貞女夙夜警戒以成其德周宣之姜后齊桓之衛姬楚莊之樊妃是也不獨人君為然吳許升為博徒妻吕氏躬勤家業以養其姑數勸升修學升每為不義輒流涕進規升感激自勵乃尋師逺學遂成名賢女之助如此愚按夫為妻綱古之人身修而家齊者上也思齊所謂刑于寡妻是也夫道不足幸冇賢妃助之成德者次也此詩所述是也彼有相與昏淫耽樂卒以覆亡如瞻卬所刺幽王褒姒者無足道矣序思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉此序得之但哀公未有所考豈亦以諡惡而得之歟子之還音旋兮遭我乎峱乃刀反之間叶居賢反兮並驅從兩肩兮揖我謂我儇許全反兮賦也還便捷之貌峱山名也從逐也獸三嵗曰肩釋文曰亦作􅜏孔氏曰獻肩于公則肩是大獸故言三嵗儇利也獵者交錯於道路且以便捷輕利相稱譽如此鄭氏曰俱出獵而相遭也謂我儇譽之也譽之者以報前言還也而不自知其非也則其俗之不美可見而其來亦必有所自矣愚按集傳但言必有所自蓋不質其為哀公所致也子之茂叶莫口反兮遭我乎峱之道叶徒厚反兮並驅從兩牡兮揖我謂我好叶計厚反兮賦也茂美也子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮賦也昌盛也山南曰陽狼似大鋭頭白頰高前廣後爾雅舍人曰狼牡名貛牝名狼貛音歡臧善也還三章章四句謝疊山曰千萬人之習俗原于一人之好尚千百年之敝化生于一時之放心齊俗好田如此為人上者可不謹哉表范氏曰表記云上之好惡不可不謹也是民之也國君禽荒而國人以習於田獵為賢間於馳逐哉為好安于所習而不自知其非道民之道可不慎序刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉同上俟我於著直據反叶直居反乎而充耳以素叶孫租反乎而尚之以瓊華叶芳無反乎而賦也俟待也我嫁者自謂也著門屏之間也孔氏曰門屏之間謂之寧門內屏外人君視朝所寧立處也著與寧音義同充耳以纊曠懸瑱殿所謂紞膽也孔氏曰懸瑱當耳故謂之塞耳紞懸瑱之繩用雜綵線織之尚加也瓊華美石似玉者即所以為瑱也古者五等之爵朝㑹祭祀皆以充耳不知此詩是說何人所說尚之以青黃素瓊瑤英大抵只是押韻不知古人充耳以瑱或用玉或用象看來是以線穿垂在當耳處東萊吕氏曰昏禮壻往婦家親迎既奠鴈御輪而先歸俟于門外婦至則揖以入時齊俗不親迎故女至壻門始見其俟已也俟我於庭乎而充耳以青乎而尚之以瓊瑩音榮乎而賦也庭在大門之內寢門之外李實之曰堂下至門謂之庭瓊瑩亦美石似玉也吕氏曰此昏禮所謂壻道婦及寢門揖入之時也俟我於堂乎而充耳以黃乎而尚之以瓊英叶於良反乎而賦也瓊英亦美石似玉者孔氏曰木謂之華草謂之榮榮而不實者謂之英然則瓊英瓊華瓊瑩皆玉石光色謝疊山曰其充耳則以素以青以黃其加飾則瓊華瓊瑩瓊英修容盛飾非不美也惜乎不知禮耳吕氏曰升階而後至堂此昏禮所謂升自西階之時也東萊口既不親迎故但行婦至壻家之禮壻道婦入故於著於庭於堂每節皆俟之也著三章章三句序刺時也時不親迎也東方之日兮彼姝赤朱反者子在我室兮在我室兮履我即兮興也履躡即就也言此女躡我之跡而相就也歐陽子曰相邀以奔之詞也東方之月兮彼姝者子在我闥叶它悅反兮在我闥兮履我發叶方月反兮興也闥門內也發行去也言躡我而行去也東方之日二章章五句輔氏曰東方之日東方之月恐是因其時以起興言彼淫奔之女旦則躡我之迹而去暮則躡我之迹而去也序刺衰也君臣失道男女淫奔不能以禮化也此男女淫奔者所自作非有刺也其曰君臣失道者尤無所謂東方未明叶謨郎反顛倒都老反衣裳顛之倒叶都妙反之自公召之賦也自從也羣臣之朝潮别必列反色始入此詩人刺其君興居無節號令不時言東方未明而顛倒其衣裳則既早矣而又已有從君所而來召之者焉蓋猶以為晚也或曰所以然者以有自公所而召之者故也東方未晞顛倒裳衣倒之顛叶典因反之自公令力證反叶力呈反之賦也晞明之始升也孔氏日晞是日之光氣湛露云匪陽不晞謂見日之光氣而物乾故以晞為乾兼葭云白露未晞言露在朝旦未見旦日氣故以為乾義此無取于乾故言明之始升謂將時日之光氣始升也令號令也折音哲栁樊圃叶博故反狂夫瞿瞿俱具反不能晨夜叶羊茹反不夙則莫音慕比也栁楊之下垂者柔脆之木也樊藩也圃菜園也孔氏曰樊郭璞云藩籬也種菜之地謂之圃其外藩籬謂之園故曰圃菜園也瞿瞿驚顧之貌夙早也折栁樊圃雖不足恃然狂夫見之猶驚顧而不敢越以比晨夜之限甚明人所易知今乃不能知而不失之早則失之莫也程子曰栁柔脆易折之物折之為藩籬非堅固也狂夫亦知其有限晝夜之限非不明也乃不能知而不早則晏言無節之甚東方未明三章章四句序刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉夏官挈壺氏下士六人挈懸挈之名壺盛水器蓋置壺浮箭以為晝夜之節也孔氏曰挈壺氏以水為漏凖晝夜共為百刻冬夏之間則有長短太史立成法於每嵗之間加減刻數以一年有二十四氣一氣之間分為二通率七日强半而易一箭周年而用箭四十八也厯言晝夜者以昏明為限漏刻不明固可以見其無政然所以興居無節號令不時則未必皆挈壺氏之罪也南山崔崔子維反雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷叶胡威反止比也南山齊南山也崔崔高大貌狐邪媚之獸孔氏曰對文則飛曰雌雄走曰牝牡散則可以相通左傳云獲其雄狐亦謂牡為雄綏綏求匹之貌魯道適魯之道也蕩平易也齊子襄公之妹魯桓公夫人文姜襄公通焉者也孔氏曰襄公諸兒僖公子愚按桓公名軌一名允惠公庶子由從也婦人謂嫁曰歸懷思也止語辭言南山有狐以比襄公居髙位而行邪行鄭氏曰雄狐行求匹耦于南山之上形貌綏綏然喻襄公居人君之尊而為淫泆之行可恥惡如狐且文姜既從此道歸于魯矣襄公何為而復思之乎葛屨五雨如字又音亮冠緌如誰反雙叶所終反止魯道有蕩齊子庸止既曰庸止曷又從止比也兩二屨也緌冠上飾也屨必兩緌必雙物各有耦不可亂也吕與叔曰屨與屨為耦雖五雨各相耦冠緌之雙亦自為耦襄公文姜非其耦也庸用也用此道以嫁于魯也從相從也吕與叔曰此上二章罪襄公言其理如是而襄公違之以淫泆者何也蓻麻如之何衡音橫從子容反其畝莫後反取七喻反妻如之何必告工毒反父母莫後反既曰告同上止曷又鞠居六反止興也蓻樹鞠窮也欲樹麻者必先縱橫耕治其田畝毛氏曰衡獵之從獵之種之然後得麻孔氏曰獵是行步踐履之名釋氏曰衡亦作橫韓詩云東西耕曰橫從韓詩作由云南北耕曰由欲娶妻者必先告其父母今魯桓公既告父母而娶矣又曷為使之得窮其欲而至此哉吕東萊曰納之不正則容有不敢制者今魯侯既以正禮納文姜當蚤裁制之曷為又使窮其姦而至于極也析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止興也克能也極亦窮也吕與叔曰此上二章罪魯桓公言其理如是桓公縱之窮極其惡何也愚按娶妻固必由于父母之命媒灼之言然考桓公即位三年姑娶文姜時惠公仲子之薨已久則但告廟而不及稟命矣其年正月公㑹齊侯于嬴自相議婚則不専由媒妁矣是知二事皆正桓公之所少者又況公不親迎而使羽父逆乎齊僖送女至歡公乃往㑹可謂重于僖公而輕于夫婦之倫矣是其不謹於正始宜乎姜氏之欲馴致於鞠窮也南山四章章六句春秋桓公十八年公與夫人姜氏如齊公薨於齊胡康侯曰與者許可之詞曰與者罪在公也夫淫亂者文姜而春秋罪桓公治其本也傳曰公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼厯遂及文姜如齊齊侯通焉公謫之以告夏四月享公使公子彭生乘公公薨于車此詩前二章刺齊襄後二章刺魯桓也序刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之孔氏曰下二章責魯桓縱恣文姜序以主刺襄公故不言魯桓大夫遇是惡作詩而去之言作詩之意以見君惡之甚于經無所當也此序據春秋經傳為文說見本篇無田音佃甫田維莠羊九反驕驕叶音髙無思逺人勞心忉忉音刀比也田謂耕治之也甫大也莠害苗之草也驕驕張王並去聲之意忉忉憂勞也言無田甫田也田甫田而力不給則草盛矣無思逺人也思逺人而人不至則心勞矣以戒時人厭小而務大忽近而圖逺將徒勞而無功也蘇氏曰田必自其小者始小者冇餘而甫田可啓矣思逺人必自其近者始近者既服而逺者自至矣輔氏曰厭小而務大田甫田者也妄作者之所為也忽近而圖逺思逺人者也妄想者之所冀也妄作則事不遂妄想則心徒勞無田甫田維莠桀桀無思逺人勞心怛怛叶旦悅反比也桀桀猶驕驕也東萊曰驕驕桀桀皆稂莠侵凌嘉穀之狀怛怛猶忉忉婉兮孌古患反叶古懸反兮總角丱叶龍眷反兮未幾居豈反見兮突而辨兮比也婉孌少好貌丱兩角貌未幾未多時也突忽然高出之貌辨冠名孔氏曰辨者冠之大號也言總角之童見之未久而忽然載辨以出者非其躐等而求之也蓋循其序而勢有必至耳此又以明小之可大邇之可逺能循其序而修之則可以忽然而至其極若躐等而欲速則反有所不達矣甫田三章章四句序大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也未見其為襄公之詩盧令令音零其人美且仁賦也盧田犬也孔氏曰犬有田犬守犬戰國策云韓國盧天下之駿犬是盧為田犬也令令犬頷下環聲此詩大意與還略同盧重直龍反環其人美且鬈音權賦也重環子母環也孔氏曰重環謂環相重大環貫一小環也鬈鬚鬢好貌盧重鋂音梅其人美且偲七才反賦也鋂一環貫二也孔氏曰一大環貫二小環偲多鬚之貌輔氏曰仁則美其德也鬈與偲則美其貌也春秋傳所謂于思即此字古通用耳愚按左傳宣公二年宋之城者譏華元曰于思于思棄申復來陸氏曰思西才反多鬚貌則此思字音腮盧令三章章二句序刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉義與還同序說非是敝笱在梁其魚魴鰥古頑反叶古倫反齊子歸止其從才用反如雲比也敝壞笱罟也魴鰥大魚也孔氏曰孔叢子云衛人釣得鰥魚其大盈車子思問曰如何得對曰吾下釣垂一魴之餌鰥過而不視又以豚之半鰥則吞矣是則鰥為大魚也歸歸齊也如雲言衆也齊人以敝笱不能制大魚比魯莊公不能防間文姜胡旦曰魴鰥鱮皆魚之可制者也為其笱之敝敗而不能制文姜本可防間而制之由魯莊微弱不能防間也防所以止水間所以扞物故防間有禁制之意故歸齊而從之者衆也胡庭芳曰齊子歸止而有如雲之從責莊公不能禁之之意在其中矣敝笱在梁其魚魴鱮才吕反齊子歸止其從如雨比也鱮似魴厚而頭大或謂之鰱孔氏曰陸璣云鱮頭尢大魚之不美者故里語曰罔魚得鱮不如啖茹埤雅曰鱮性旅行故其字從與亦謂之連也如雨亦多也楊氏曰如雲如雨言從之者衆也許穆夫人思歸而唁其兄許人尤之終以義不得而止若魯莊公剛有制使魯人無肯從音如許人焉則文姜雖欲適齊尚可得乎敝笱在梁其魚唯唯唯葵反齊子歸止其從如水比也唯唯行出入之貌如水亦多也敝笱三章章四句按春秋魯莊公二年夫人姜氏㑹齊侯于禚灼胡康侯曰婦人無外事送迎不出門既嫁從夫夫死從子令㑹齊侯于禚是莊公不能防間其母失子道也杜氏曰禚齊地四年夫人姜氏享齊侯于祝丘胡康侯曰雨君相見享于廟中禮也非兩君相見又去其國而享諸侯甚矣杜氏曰祝丘魯地五年夫人姜氏如齊師胡康侯曰曰㑹曰享猶為之名也至是如齊師羞恧之心亡矣夫人之行不可復制矣七年夫人姜氏㑹齊侯于防又㑹齊侯于穀胡康侯曰防魯地穀齊地一嵗而再㑹焉其為惡益逺矣春秋莊公十五年夫人姜氏如齊十九年夫人姜氏如莒二十年夫人姜氏如莒胡康侯曰禮義天下之大防也其葉亂之所由生猶坊止水之所自來也衛女思歸寧而不得故泉水賦許穆夫人思唁其兄而阻於義故載馳作聖人録於國風以示後世使知男女之别也今夫人如齊以寧其父母而父母已終以寧其兄弟人義不得宗國猶爾而况如莒乎婦人從人者也夫死從子而莊公失子之道不能防間其母禁亂之所由生故初㑹于禚次享于祝丘又次于齊師又次㑹于防于穀乂次如齊又再如莒此以舊坊為無所用而廢之者也是以至此極觀春秋所書之法則知防間之道矣序刺文姜也齊人惡魯桓公微弱不能防間文姜使至淫亂為二國患焉桓當作莊愚按桓公十八年不聽申繻之諫必欲與文姜坰如齊則姜氏此一行非由桓公不能制而然也及公薨于齊而姜氏返魯莊公嗣位而姜氏孫于齊未久復返于魯自後姜氏之會齊侯者相望于春秋之䇿則防間之說屬之桓公乎屬之莊公乎故曰桓當作莊載驅薄薄普各反簟茀朱鞹苦郭反魯道有蕩齊子發夕叶祥籥反賦也薄薄疾驅聲簟方文席也茀車後户也孔氏曰謂以竹為簟蔽車之後户也朱朱漆也鞹獸皮之去毛者蓋車革質而朱漆也夕猶宿也發夕謂離於所宿之舍齊人刺文姜乘此車而來㑹襄公也四驪力馳反濟濟子禮反垂轡濔濔乃禮反魯道有蕩齊子豈開改反弟叶待禮反賦也驪馬黑色也濟濟美貌濔濔柔貌豈弟樂易也言無忌憚羞恥之意也汶音問水湯湯失章反行人彭彭必亡反魯道有蕩齊子翶翔賦也汶水名在齊南魯北二國之竟境湯湯水盛貌彭彭多貌言行人之多亦以見其無恥也汶水滔滔吐刀反行人儦儦表驕反叶音褒魯道有蕩齊子遊敖賦也滔滔流貌儦儦衆貌遊遨猶翺翔也載驅四章章四句謝疊山曰曰豈弟曰翺翔曰遊敖文姜之情態歡欣快樂如此無禮義無羞恥無忌憚盡見于此詩矣詩人鋪叙之詳形容之巧刺之深疾之甚也序齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉此亦刺文姜之詩猗嗟昌兮頎音祈而長兮抑若揚兮美目禓兮巧趨蹌兮射則臧兮賦也猗嗟歎詞昌盛也頎長貌抑而若揚美之盛也輔氏曰抑若揚兮所以甚言其美也雖抑之而猶若揚而況於揚之乎揚目之動也蹌趨翼如也臧善也齊人極道魯莊公威儀伎藝之美如此愚按射則臧不出正舞則選四矢反皆伎藝之美其餘所言皆威儀之美所以刺其不能以禮防間其母若曰惜乎其獨少此耳猗嗟名兮美目清兮儀既成兮終日射食亦反侯不出正音征兮展我甥叶桑經反兮賦也名猶稱也言其威儀伎藝之可名也清目清明也儀既成言其終事而禮無違也侯張布而射之者也正設的於侯中而射之者也大射則張皮侯而設鵠梏賔射則張布侯而設正孔氏曰射皆三番而止云終日射侯者美其久射而能中又曰正者侯中所射之處布侯畫正正大如鵠三分侯廣而正居一焉侯身長一丈八又者正方六尺侯身一丈四尺者正方四尺六寸大半寸侯身一丈者正方三尺三寸少半寸正以綵畫為之王射五正畫中朱次白次蒼次黃𤣥居外諸侯射三正損𤣥黃孤卿大夫士同射二正去白蒼而畫以朱緑其外之廣皆居侯中三分之一而中央之綵方二尺也正之言正也射者內志正則能中亦鳥名齊魯之間名題肩為正烏之捷黠者射難中以中為俊故取名展誠也姊妹之子曰甥言稱其為齊之甥而又以明非齊侯之子此詩人之微詞也按春秋桓公三年夫人姜氏至自齊六年九月子同生即莊公也十八年桓公乃與夫人如齊則莊公誠非齊侯之子矣猗嗟孌叶龍眷反兮清揚婉叶許願反兮舞則選雪戀反兮射則貫叶扄縣反兮四矢反叶孚絢反兮以禦亂叶靈眷反兮賦也孌好貌清目之美者揚眉之美者婉亦好貌選異於衆也或曰齊於樂節也貫中而貫革也四矢禮射每發四矢鄭氏曰禮射謂以禮樂射也大射賔射燕射是矣四矢象有事於四方反復也中皆得其故處也言莊公射藝之精可以禦亂如以金僕姑射南宫長上聲萬可見矣范氏曰射足以禦亂而禮不足以防淫也左傳莊公十一年注曰金僕姑矢名南宫長萬宋大夫猗嗟三章章六句或曰子可以制母乎趙子曰夫死從子通乎其下況國君乎君者人神之主風教之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公哀敬之不至威命之不行耳輔氏曰趙子之說義理之正聖賢復生不可易也東萊吕氏曰此詩三章譏刺之意皆在言外嗟嘆再三則莊公所大闕者不言可見矣嚴氏曰變風之體意在言外冇全篇首尾皆託之他詞但中間祇下一二語自然使人默㑹如此詩極言其人容貌威儀伎藝之美而以歎息之詞發之是其人所不足者必有在於容貌威儀伎藝之外矣中間展我甥兮一句只一甥字便見得是刺魯莊公只一展字便見得是人以莊公為齊侯之子讀者既默㑹其意見得自猗嗟而下句句稱美處節節是歎息不滿處詞不急迫而意深切矣謝疊山曰一章射則臧兮射則善矣德則未見其善亦可惜也二章展我甥兮莊公誠為我齊國之甥今人乃以為齊侯之子亦可惜也三章以禦亂兮莊公善射似可以禦亂也齊侯文姜之淫亂則無䇿以禦之亦可惜也李迂仲曰夫子曰君子多乎哉不多也世人乃専心于此而忘其本故莊公有威儀伎藝之美而不免猗嗟之刺昭公習威儀之亟而不能止乾侯之禍漢成帝善修容儀升車正立不內顧而不能制趙氏之橫雖多才多藝而不能務本何所補哉序刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉此序得之齊國十一篇三十四章一百四十三句魏一之九魏國名本舜禹故都孔氏曰舜都蒲坂禹都平陽或安邑皆河東界魏境內有其都爾魏不居其墟也在禹貢冀州雷首之北析城之西南枕河曲北涉汾水其地狹隘而民貧俗儉蓋有聖賢之遺風焉吕東萊曰水經注魏國城西南並去大河可二十餘里北去首山十餘里處河山之間土地迫隘鄭氏曰昔舜耕厯山陶河濵禹菲飲食惡衣服畢宫室此儉約之化于是猶存周初以封同姓後為晉獻公所滅而取其地鄭氏曰魯閔公元年晉獻公滅之以其地賜大夫畢萬愚按先儒以魏所封為文王子畢公高之後也今河中府解州即其地也愚按今河東山西道有河中府及解州蘇氏曰魏地入晉久矣其詩疑皆為晉而作故列於唐風之前猶邶鄘之於衛也蘇氏曰檜者鄭所城也檜詩不為鄭而邶鄘為衛魏為晉何也邶鄘衛之詩作于既威其詩所為者衛晉也至于檜詩未亡而先作矣今按篇中公行公路公族皆晉官疑實晉詩又恐魏亦嘗有此官蓋不可考矣糾糾吉黝反葛屨可以履霜摻摻所銜反女手可以縫裳要於遙反之襋紀力反之好人服叶浦北反之興也糾糾繚戾寒涼之意夏葛屨冬皮屨孔氏曰夏葛屨猶絺綌所以當暑特為便于時耳非行禮之服若行禮雖夏猶當用皮摻摻猶纎纎也女婦未廟見現之稱也娶婦三月廟見然後執婦功孔氏曰三月廟見謂無舅姑者婦入三月乃見舅姑之廟若有舅姑則士昏禮云質明贊見婦于舅姑不待三月也雖即見舅姑亦三月乃助祭行未祭行亦未成婦也要裳要襋衣領好人猶大人也魏地狹隘其俗儉嗇而褊急故以葛屨履霜起興而刺其使女縫裳輔氏曰糾糾葛屨本非可以履霜然自儉嗇者言之則亦可以履霜矣以興摻摻女手本未可以縫裳然自褊急者言之則亦可使之縫裳矣又使治其要襋而遂服之也此詩疑即縫裳之女所作好人提提徒兮反宛於阮反然左辟音避佩其象揥敕帝反維是𥚹心是以為刺叶音砌賦也提提安舒之意宛然讓之貌也嚴氏曰宛委曲遜順貌讓而辟者必左孔氏曰不敢當主故就客位揥所以摘剔髮用象為之貴者之飾也其人如此若無有可刺矣所以刺之者以其𥚹迫急促如前章之云耳輔氏曰此章則刺其內外表裏之不相副自其外而觀之則其進止之安舒遜讓之有節服飾之貴盛宜若無可刺者矣然其心之𥚹迫急促如前章之云是以不能不刺之也葛屨二章一章六句一章五句廣漢張氏曰夫子謂與其奢也寧儉則儉雖失中本非惡德然而儉之過則至於吝嗇迫隘計較分毫之間而謀利之心始急矣葛屨汾沮洳園有桃三詩皆言急迫瑣碎之意序刺𥚹也魏地狹隘其民機巧趨利其君儉嗇𥚹急而無德以將之彼汾沮洳言采其莫音慕彼其音記之子美無度美無度殊異乎公路興也汾水名出太原晉陽山西南入河沮洳水浸處下濕之地莫菜也似栁葉厚而長有毛刺可為羮孔氏曰陸璣云莫莖大如箸赤節節一葉今人繅以取繭緒其味酢而滑始生又可生食無度言不可以尺寸量也公路者掌公之路車晉以卿大夫之庶子為之此亦刺儉不中禮之詩言若此人者美則美矣然其儉嗇𥚹急之態殊不似貴人也彼汾一方言采其桑彼其之子美如英叶於良反美如英殊異乎公行户郎反興也一方彼一方也史記扁鵲視見垣一方人愚按扁鵲姓秦名越人長桑君與之藥使以上池之水飲藥三十日視垣見一方人以此視病盡見五臟癥結所謂垣一方者猶此詩言汾一方古語皆然也癥音徵英華也公行即公路也以其主兵車之行列故謂之公行也孔氏曰公路公行一也宣公二年晉宦卿之適為公族庶子為公行彼汾一曲言采其藚音續彼其之子美如玉美如玉殊異乎公族興也一曲謂水曲流處藚水舄昔也葉如車前草孔氏曰藚牛脣水舄也如續斷寸寸有節拔之可復令澤寫也公族掌公之宗族晉以卿大夫之適嫡子為之孔氏曰成公十八年左傳曰晉荀㑹欒黶韓無忌為公族大夫使訓子弟是公族主君之同姓也黶音黯汾沮洳三章章六句序刺儉也其君儉以能勤刺不得禮也此未必為其君而作崔靈恩集注其君作君子義雖稍通然未必序者之本意也園有桃其實之殽心之憂矣我歌且謠音遙不知我者謂我士也驕彼人是哉叶將黎反子曰何其音基心之憂矣其誰知之其誰知之蓋亦勿思叶新齎反興也殽食也合曲曰歌徒歌曰謠孔氏曰謠既徒歌則歌不徒矣歌謠對文如此散則歌未必合樂也其語辭詩人憂其國小而無政故作是詩言園有桃則其實之殽矣心有憂則我歌且謠矣程子曰此詩憂深思逺矣國無政事則亡故憂思之深至歌且謠然不知我之心者見其歌謠而反以為驕且曰彼之所為已是矣而子之言獨何為哉蓋舉國之人莫覺其非而反以憂之者為驕也於是憂者重嗟歎之以為此之可憂初不難知彼之非我特未之思耳誠思之則將不暇非我而自憂矣園有棘其實之食心之憂矣聊以行國叶于逼反不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思興也棘棗之短者埤雅曰大者棗小者棘於文重朿為棗並束為棘蓋棗性重喬棘則低矣故其制字如此本草注棘有赤白二種小棗也叢高三四尺花葉莖實俱似棗也聊且略之辭歌謠之不足則出遊于國中而寫憂也極至也罔極言其心縱恣無所至極園有桃二章章十二句謝疊山曰使忠臣義士之心略見知於人通國上下不羣吠而衆惡之問其所憂者何說今之所當行者何事魏侯聞而大悔悟急為扶顛持危之謀晉豈能驟滅其國哉國雖亡亦未必如是之速也鳴呼惜哉輔氏曰黍離之憂憂王室之已覆也園有桃之憂憂魏國之將亡也憂其已覆而不我知則也亦已矣憂其將亡而不我知則欲其思之者亦宜序刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無德教日以侵削故作是詩也國小而迫日以侵削者得之餘非是陟彼岵音户兮瞻望父兮父曰嗟豫子行役夙夜無已上慎旃哉猶來無止賦也山無草木曰岵上猶尚也孝子行役不忘其親故登山以望其父之所在因想像其父念已之言曰嗟乎我之子行役夙夜勤勞不得止息又祝之曰庶幾慎之哉猶可以來歸無止於彼而不來也蓋生則必歸死則止而不來矣或曰止獲也言無為人所獲也陟彼屺音起兮瞻望母叶滿彼反兮母曰嗟豫季行役夙夜無寐上慎旃哉猶來無棄賦也山有草木曰屺孔氏曰釋山云多草木岵無草木屺與傳正反當是傳寫誤也愚按集傳釋岵屺之名不從爾雅而柤毛傳亦如卷耳之釋崔嵬與砠也季少子也尤憐愛少子者婦人之情也無寐亦言其勞之甚也棄謂死而棄其尸也陟彼岡兮瞻望兄叶虛王反兮兄曰嗟豫弟行役夙夜必偕叶舉里反上慎旃哉猶來無死叶想止反賦也山脊曰岡陳少南曰岵也屺也岡也皆山之髙處而可以瞻望者詩人各取其一以叶韻耳必偕言與其儕同作同止不得自如也陟岵三章章六句輔氏曰既思其父又思其母又思其兄既想像其念已之言又想像其祝已之言曰庶幾其謹之哉則斯人也必能以其親之心為心亦可謂賢矣愚按詩人以已之思親而知親之念已雖曰設為親念已之言實以深寓已念親之心也章末二語所以自警亦所以自悲可以見其忠孝之心矣近世如陳后山憶子詩曰吾母亦念我與爾寧相忘尤足長人孝愛之情也序孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也十畝之間叶居賢反兮桑者間間叶胡田反兮行與子還叶音旋兮賦也十畝之間郊外所受場圃之地也張子曰周制國郛之外有聽為場圃之地者疑家受十畝以育草本吕東萊曰所謂十畝者特甚言之爾未可以為定數也間間往來者自得之貌行猶將也還猶歸也政亂國危賢者不樂仕於朝而思與其友歸於農圃故其詞如此十畝之外叶五墜反兮桑者泄泄以世反兮行與子逝兮賦也十畝之外鄰圃也泄泄猶間間也逝往也十畝之間二章章三句序刺時也言其國削小民無所居焉國削則其民隨之序文殊無理其說已見本篇矣坎坎伐檀叶徒沿反兮置之河之干叶居焉反兮河水清且漣力㕓反猗於宜反不稼不穡胡取禾三百㕓直連反兮不狩不獵胡瞻爾庭有縣音𤣥貆音暄兮彼君子兮不素餐七丹反叶七宣反兮賦也坎坎用力之聲檀木可為車者置與置同干崖也漣風行水成文也猗與兮同詩考曰魯詩作兮語詞也書斷斷猗大學作兮莊子亦云而我猶為人猗是也大宗師曰而已反其真而我猶為人猗林氏曰猗助語也種之曰稼斂之曰穡孔氏曰以稼穡相對皆先稼後穡故知種曰稼斂曰穡若散則相通胡何也一夫所居曰㕓孔氏曰㕓民居之區域也狩亦獵也貆貉類鄭氏曰貉子曰貆素空餐食也詩人言有人於此用力伐檀將以為車而行陸也今乃置之河干則河水清漣而無所用雖欲自食其力而不可得矣然其志則自以為不耕則不可以得禾不獵則不可以得獸是以甘心窮餓而不悔也詩人述其事而嘆之以為是真能不空食者輔氏曰不稼不穡則不可以得粒食不狩不獵則不可以得鮮食人之所食雖多而此二者為大故舉而言之所謂甘心窮餓而不悔者詩中雖無此意然觀其志之所有如此而詩人又以為真能不素餐者當有此事矣後世若徐稚之流非其力不食其厲志蓋如此愚按後漢徐孺子家貧常自耕稼非其力不食蓋其厲志之勤必欲服勞而後食亦若此詩賢者之志也又如范文正公居官每計一日飲食奉養之費與所為之事相稱則無復愧恥苟或不然終夜不能安寢亦可謂能厲其志者也坎坎伐輻音福叶筆力反兮置之河之側叶莊力反兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮賦也輻車輻也伐木以為輻也直波文之直也十萬曰億蓋言禾秉之數也孔氏曰田方百畝於今數為九百萬畝而王制云方百里為田九十億畝是億為十萬也禾秉之數謂刈禾之把數獸三嵗曰特坎坎伐輪兮置之河之漘順倫反兮河水清且淪猗不稼不穡胡取禾三百囷丘倫反兮不狩不獵胡瞻爾庭有縣鶉音純兮彼君子兮不素飱素門反叶素倫反兮賦也輪車輪也伐木以為輪也淪小風水成文轉如輪也囷圓倉也鶉䳺屬熟食曰飱伐檀三章章九句孔叢子子曰於伐檀見賢者之先事後食也愚按有勞心而得食者有勞力而得食者冇躬耕而自食者豈必人人自耕以食哉但不可無其事而食其食耳伐檀君子意正如此故詩人美其草貧樂賤雖不見用而不苟食也序刺貪也在位貪鄙無功而受祿君子不得進仕爾此詩専美君子之不素餐序言刺貪失其指矣碩鼠碩鼠無食我黍三嵗貫古亂反女音汝莫我肯顧叶果五反逝將去女適彼樂音洛下同土樂土樂土爰得我所比也碩大也三嵗言其久也貫習顧念逝往也樂土有道之國也爰於也民困於貪殘之政故託言大鼠害已而去之也輔氏曰三嵗貫女則民之於上至矣莫我肯顧則上之於民甚矣於是而決去焉非民之罪也逝將去女云者則是將去而猶冇不忍之意也不然尚何言之有碩鼠碩鼠無食我麥叶訖力反三嵗貫女莫我肯德逝將去女適彼樂國叶于逼反樂國樂國爰得我直比也德歸恩也范氏曰莫我肯德者不以我為德也民出力以事上不以為德而反蠶食之所以去也直猶宜也碩鼠碩鼠無食我苗叶音毛三嵗貫女莫我肯勞逝將去女適彼樂郊叶音高樂郊樂郊誰之永號户毛反比也謝叠山曰食黍不足而食麥食麥不足而食苗苗者禾方樹而未秀也食至於此以比其貪之甚也勞勤苦也謂不以我為勤勞也永號長呼也言既往樂郊則無復有害已者當復為誰而永號乎碩鼠三章章八句張南軒曰碩鼠之詩聖人所為取者以其上失道如此國人疾之甚而欲去之猶有所未忍也故著其情于詩著其情於詩乃其所未忍絶也序刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大鼠也孔氏曰蠶食桑漸漸以食使桑盡也猶重斂漸漸以稅使民困也解頤新語云蠶食喻重斂者莫切于此鼠食物且食且畏四顧不寧喻貪畏者莫切於此此亦託於碩鼠以刺其有司之詞未必直以碩鼠比其君也魏國七篇十八章一百二十八句嚴氏曰魏唐無淫詩蓋猶有先聖之風化焉輔氏曰寬裕者其流長急迫者其意短魏以地狹而褊急如此其何以傳世至於長久哉故變風作於平桓之世而國遂滅於惠公之十七年止五六十年間耳詩人之意固憂之矣詩傳通釋卷五
