body:
  text: 詩傳通釋卷十九元劉瑾撰詩朱子集傳頌四頌者宗廟之樂歌大序所謂美盛德之形容以其成功告于神明者也蓋頌與容古字通用故序以此言之孔氏曰頌之言容歌成功之容狀也周頌三十一篇多周公所定而亦或有康王以後之詩周公相武王成王天下既平作為樂章薦之郊廟所謂周頌也然其篇第之先後則不可究矣又其間多闕文疑義焉愚按康王以後之詩昊天有成命及執競噫嘻是也魯頌四篇商頌五篇因亦以類附焉孔氏曰雅不言周頌言周者以别商魯三頌之名雖同而其體制各别也胡庭芳曰補傳云商周二頌皆以告神而魯頌用以頌禱後世文人獻頌特效魯耳陳君舉白别以尊卑之禮故魯頌以諸侯而後於周間以親疏之義故商頌以先代而後於魯凡五卷愚按雅頌無諸國别元以十篇為一卷故此分周頌三什為四之一四之二四之三魯頌四篇為四之四商頌五篇為四之五通為五卷周頌清廟之什四之一於音烏穆清廟肅雍顯相息亮反濟濟子禮反多士秉文之德對越在天駿奔走在廟不顯不承無射音亦與斁同於人斯賦也於歎辭穆深逺也清凊靜也釋文曰肅然清靜之稱李迂仲曰事神之道尚潔故曰清廟鄭氏曰廟之言貌也死者不可得見故立宫室象貌之耳肅敬雍和顯明相助也謂助祭之公卿諸侯也吕東萊曰士虞禮祝詞曰孝子某顯相夙興然則主人之外餘皆顯相也成王祭主也周公及助祭之諸侯皆顯相也嚴氏曰稱助祭之人曰顯相者謂其有顯著之德美稱之也濟濟衆也多士與預祭執事之人也越於也駿大而疾也孔氏曰疾奔走言勸事也承尊奉也斯語辭此周公既成洛邑而朝諸侯因率之以祀文王之樂歌曹氏曰洛誥周公告王曰王肇稱殷禮祀于新邑豫齊百工俾從王于周則是成王就新邑祀文武周公率諸侯以從之耳明堂位所謂周公朝諸侯踐天子位者皆漢儒之妄也吕東萊曰朝諸侯者特相成王以朝諸侯而已周公非自居南面而受諸侯之朝率以祀文王者洛誥所謂王在新邑蒸祭嵗是也言於穆哉此清靜之廟其助祭之公侯皆敬且和吕東萊曰言顯相之肅雍則成王穆然奉祭之氣象不言可見矣而其執事之人又無不執行文王之德既對越其在天之神而又駿奔走其在廟之主王介甫曰肅雍秉德故能對越文王奔走在廟以承清廟之事也嚴氏曰對答在天之靈謂如見文王洋洋在上也疾奔走於在廟之事謂敏於趨事也如此則是文王之德豈不顯乎豈不承乎信乎其無有厭斁於人也王介甫曰於是文王之德可謂顯矣成王率諸侯多士駿奔走在廟則可謂承矣顯也承也如此無射于人矣胡庭芳曰此詩唯一句説廟後皆從與祭者身上説詩雖未當明頌文王之德自有隱然見于言意之表者何則文王往矣今助祭之公侯執事之人所對越奔走而敬恭嚴事者無厭斁乃如此于此可以見盛德至善淪肌浹髓沒世自有不能忘者矣輔氏曰文王之德不可明言凡一時在位之人所以能敬且和與執行文王之德者即文王盛德之所在也必于其不可容言之中而見其不可掩之實則詩人之意得矣讀此詩想當時聞其歌者真若洋洋乎如在其上知在其左右又何待多著言語委曲形容而後足以見之哉清廟一章八句書稱王在新邑蒸祭嵗文王騂牛一武王騂牛一實周公攝政之七年而此其升歌之辭也洛誥又曰王賔殺禋咸格王入大室祼蔡九峯曰王在洛舉蒸祭之禮曰嵗云者嵗舉之祭也王賔猶虞賔助祭諸侯也諸侯以王殺牲禋祭祖廟故咸至也大室清廟中央室也吕東萊曰按洛誥云在十有二月惟周公誕保文武受命惟七年則是周公成洛邑而作此詩在于七年也愚按書言蒸祭文武而此樂歌止頌文王之德者父子並祭統於尊也書大傳曰周公升歌清廟苟在廟中嘗見文王者愀然如復見文王焉孔氏曰記每云升歌清廟然則祭宗廟之盛歌文王之德莫重於清廟故為周頌之首陳夀翁曰雍雍肅肅乃文王盛德輝光形於外者今助祭者有肅雍之德執事者秉文王之德足以配對文王則是文王盛德之容宛然如在目中矣嘗見文王者愀然如復見文王斯言殆非虛也樂記曰清廟之瑟朱弦而疏越一倡而三嘆有遺音者矣鄭氏曰朱弦練朱弦練則聲濁越瑟底孔也疏之使聲遲也倡發歌句也三歎三人從歎之耳孔氏曰一倡謂一人始倡歌三嘆謂三人讃嘆也樂歌文王之道不極音聲故但以熟弦廣孔少倡寡和此音有德傳於無窮是有餘音不已也人一倡三歎者一人倡之三和之如今人換歌之類漢因秦樂乾干豆上奏登歌通典注曰乾豆脯羞之類獨上歌不以管絃亂人聲欲在位者遍聞之猶古清廟之歌也愚按堂上之樂以人聲為貴故舜之韶樂鳴球琴瑟以詠清廟之瑟朱弦而疏越秦漢之薦乾豆亦唯堂上獨奏登歌之曲謂之登歌者豈以堂上特歌而名之也歟序祀文王也周公既成洛邑朝諸侯率以祀文王焉維天之命於音烏穆不已於同上乎音呼不顯文王之德之純賦也天命即天道也程子曰言天之自然者曰天道言天之賦豫萬物者曰天命不已言無窮也純不雜也此亦祭文王之詩言天道無窮而文王之德純一不雜與天無間以贊文王之德之盛也子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已嚴氏曰凡言聖人如天者以此擬彼天與聖人猶為二也此詩但言以天命之不已與文德之純對立而並言之蓋有不容擬議者子思又發明之如此其旨深矣程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後真氏曰純是至誠無一毫人偽惟其純誠無雜自然能不已如天之春而夏夏而秋秋而冬晝而夜夜而晝循環運轉一息不停以其誠也聖人之自壯而老自始而終無一息之懈亦以其誠也既誠自然能不已假春秋傳作何以溢春秋傳作恤我我其收之駿惠我文王曾孫篤之何之為假聲之轉也恤之為溢字之訛也收受駿大惠順也曽孫後王也鄭氏曰自孫之下皆稱曽孫孫愚按後王主祭者皆得稱曽篤厚也吕東萊曰毛氏謂能厚行之然詩人之意本勉後人篤厚之而不忘所謂行者固亦在其中矣言文王之神將何以恤我乎有則我當受之以大順文王之道後王又當篤厚之而不忘也嚴氏曰我既以大惠文王自勉繼自今為子孫者當世世篤厚之勿忘也去聖浸逺典刑易墜非用意篤厚不能守也維天之命一章八句嚴氏曰頌者成功告神必言子孫勉力保守以慰祖考之意故此詩曰曾孫篤之天作曰子孫保之輔氏曰上四句言文王之德與天為一也後四句言已與後王皆當法文王不已之德也何以恤我不敢自必之辭也我其收之幸之之辭也駿惠我文王自期之辭也曽孫篤之又望于後人之辭也陳夀翁曰此詩言文王純一之德上配天道之無窮下被及子孫于無窮子孫當惠順之而不逆篤厚之而不忘也序太平告文王也詩中未見告太平之意維清緝熙文王之典肇禋音因迄許乞反用有成維周之禎賦也清清明也緝續熙明肇始禋祀迄至也此亦祭文王之詩言所當清明而緝熙者文王之典也故自始祀至今有成實維周之禎祥也嚴氏曰清則潔靜而不雜緝則悠久而不已熙則廣大而光明而以典言之者謂其德寓於法也文王有典以貽後人王業雖未成而自始祀至其後而有成焉是文王之典為周之禎祥也祥者吉之先見也曹氏曰然則文王之法實啓有周之祥也然此詩疑有闕文焉輔氏曰典謂法度典章所謂祀典蓋亦在其中故下文便説肇禋周之祀典自文王始之至周公而成之文王之典實維周之禎祥者可知矣不以符瑞為祥而以典法為禎蓋有是典法然後有是盛效此其為禎祥也大矣維清一章五句序奏象舞也詩中未見奏象舞之意烈文辟音璧下同公錫兹祉福惠我無疆子孫保之賦也烈光也辟公諸侯也王晦叔曰為國君故稱辟舉五等之貴故稱公此祭於宗廟而獻助祭諸侯之樂歌輔氏曰烈武也文文也辟公猶言君公也祭畢則飲福受胙故於其獻助祭諸侯而歌此言諸侯助祭使我獲福則是諸侯錫此祉福而惠我以無疆使我子孫保之也嚴氏曰助祭諸侯錫我以此福矣豈徒目前淺近計哉蓋惠我周家以無疆之休使我子孫世世永保之也無封靡于爾邦維王其崇之念兹戎功繼序其皇之封靡之義未詳或曰封専利以自封殖也靡汰侈也崇尊尚也戎大皇大也言汝能無封靡于汝邦則王當尊汝王介甫曰戒其無封以専利無靡以傷財則為王之所崇也又念汝有此助祭錫福之大功則使汝之子孫繼序而益大之也無競維人四方其訓之不顯維德百辟其刑之於音鳥乎音呼前王不忘又言莫強於人莫顯於德先王之德所以人不能忘者用此道也此戒飭而勸勉之也黃實夫曰此成王感發諸侯不盡之意愚按上文四句戒飭之也此五句勸勉之也中庸引不顯惟德百辟其刑之而曰故君子篤恭而天下平不顯猶言豈不顯也此借引以為幽深玄逺之意言天子有不顯之德而諸侯法之則其德愈深而效愈逺矣篤厚也篤恭言不顯其敬也篤恭而天下平乃聖人至德淵微自然之應也真問不顯維德按詩中例言豈不顯也今借引此詩作不顯説如何曰是箇幽深玄逺意是不顯中之顯大學引於乎前王不忘而曰君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也於戲嘆詞前王謂文武也君子謂後賢後王小人謂後民也此言前王所以新民者止于至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也又曰賢其賢者聞而知之仰其德業之盛也親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂也利其利者耕田鑿井而享其利也此皆先王盛德至喜之餘澤故雖已沒世而人猶思之愈久而不能忘也烈文一章十三句此篇以公疆兩韻相叶未審當從何讀意亦可互用也愚按第一句與第六第七句相叶第三句與第五第八第十三句相叶亦隔互叶韻也序成王即政諸侯助祭也詩中未見即政之意天作高山大音泰王荒之彼作矣文王康之彼徂矣岐沈括曰後漢書西南夷傳作彼岨者岐今按彼書岨但作徂而引韓詩薛君章句亦但訓為往獨矣字正作者如沈氏説然其注未復云岐雖阻僻則似又有岨意韓子亦云彼岐有岨疑或别有所據故今從之而定讀岐字絶句有夷之行叶户郎反子孫保之賦也高山謂岐山也荒治王介甫曰治荒謂之荒康安也岨險僻之意也夷平行路也此祭大王之詩言天作岐山而大王始治之大王既作而文王又安之於是彼險僻之岐山人歸者衆而有平易之道路子孫當世世保守而不失也嚴氏曰作者造立之言也遷岐非得已而周以岐興詩人以為是非人所能為故言此岐山天實為之也黃實夫曰遷岐之役曰帝省其山曰帝遷明德曰帝作邦作對又曰天作似以岐可興周而天故使大王之遷岐也然其一篇則在於大王之荒文王之康子孫之保而不獨歸之于天也繫段氏曰劉氏云其始作之固自乎天其終保之亦乎人嚴氏曰大王文王之業子孫當保守而不墜也成功告神明之頌多言子孫當保守之意蓋子孫能保守則可以慰祖宗之心矣輔氏曰高山大川皆天造地設也大禹但能奠之耳故曰天作治荒謂之荒猶治亂謂之亂也大王治荒之而亦曰彼作矣者推大王與天同功也祖先所以經理其始計安其後者既已甚艱勤矣則子孫固宜世世保之而不失也天作一章八句序祀先王先公也胡庭芳曰詩只稱大王文王則祀不及先公明也若祭其人不頌其德可乎然朱子定以為祭大王詩不及文王者豈以詩不言王季也若并祭王季頌其子不頌其父乃預祭其問亦非所安也故只以為祭大王詩也昊天有成命二后受之成王不敢康夙夜基命宥密於音烏緝熙單厥心肆其靖之賦也二后文武也成王名誦武王之子也愚按朱子於下武詩成王二字則辨先儒之誤而謂非王誦之諡於此詩成王字則正先儒之誤而以為諡名固各有當也基積纍于下以承藉乎上也宥宏深也密靜密也於嘆詞靖安也此詩多道成王之德疑祀成王之詩也言天祚周以天下既有定命而文武受之矣成王繼之又能不敢康寧而其夙夜積德以承藉天命者又宏深而靜密是能繼續光明文武之業而盡其心故又能安靖天下而保其所受之命也輔氏曰不敢康戒謹恐懼也不宏則體不盡不深則見不徹不靜則不能到沖漠無朕處不密則不能到萬象森具處宏深陽之德也靜密陰之德也合是二德則能承藉乎天之命我者也夙夜無間斷也能夙夜基命宥密則能繼續光明文武之業而盡其心才有間斷則文武之業便有蔽昧處而已之心亦不能盡矣天命也文武之業也已之心也天下之安也皆是一統底事黃氏曰文武受天命興王業者如此則成王所以基而承之繼而廣之者亦惟盡此心而已蓋文武以上天之心為心後王以文武之心為心無愧於文武之心而後能安文武之天下無負於天命而後無愧于文武也國語叔向引此詩而言曰是道成王之德也成王能明文昭定武烈者也以此證之則其為祀成王之詩無疑矣昊天有成命一章七句此康王以後之詩陳安卿問康王何緣無詩曰昊天有成命之類便是康王詩而今却要解那成王做成王業費盡氣力要從王業上説去不知怎生地序郊祀天地也此詩詳考經文而以國語證之其為康王以後祀成王之詩無疑而毛鄭舊説定以頌為成王之時周公所作故凡頌中有成王及成康字者例皆曲為之説以附己意其迂滯僻澀不成文理甚不難見而古今諸儒無有覺其謬者獨歐陽公著時世論以斥之其辨明矣然讀者狃於舊聞亦未遽肯深信也歐陽子曰此詩言二后者文武也則成王者成王也當為康王以後之詩而毛鄭以頌皆是成王之作遂以成王為成此王功執競曰不顯成康自彼成康所謂成康者成王康王也猶文王武王謂之文武云耳然則執競當是昭王以後之詩而毛以為成大功而安之鄭以為成安祖考之道皆以為武王也噫嘻曰噫嘻成王者亦成王也而毛鄭皆以為武王由其以頌皆為成王時作耳以為成王康王豈不簡且直而于詩文理易通如毛鄭之説豈不迂而曲文理亦不完而難通學者何苦從其迂曲而難通者哉小序又以此詩篇首有昊天二字遂定以為郊祀天地之詩諸儒往往亦襲其誤殊不知其首言天命者止於一句次言文武受之者亦止一句至於成王以下然後詳説不敢康寧緝熙安靜之意乃至五句而後已則其不為祀天地而為祀成王無可疑者又況古昔聖人制為祭祀之禮必以象類故祀天於南祭地於北而其壇壝樂舞器幣之屬亦各不同若曰合祭天地於圜丘則古者未嘗有此瀆亂厖雜之禮若曰一詩而兩用如所謂冬薦魚春獻鮪者則此詩専言天而不及地若於澤中方丘奏之則於義何所取乎序説之云反覆推之皆有不通其謬無可疑者故今特上據國語旁采歐陽以定其説庶幾有以不失此詩之本指耳或曰國語所謂始於德讓中於信寬終於固和和故曰成者其語成字不為王誦之諡而韋昭之注大略亦如毛鄭之説矣此又何耶曰叔向蓋言成王之所以為成以是三者正猶子思所謂文王之所以為文班固所謂尊號曰昭不亦宜乎者耳韋昭何以知其必謂文武以是成其王道而不為王誦之諡乎蓋其為説本出毛鄭而不悟其非也今欲一滌千古之謬而不免於以誤而證誤則亦將何時而已耶詩中説成王不敢康成王只是成王何須牽合作成王業之王自小序恁地傳會便謂周公作此以告成功便將成王字穿鑿説了又幾曽是郊祀天地後來遂生一場多端有南北郊之事此詩自説昊天有成命又不曽説地如何説祭天地之詩設使合祭亦須幾句説著后土如漢諸郊祀詩祭其神便説其事矣或者又曰蘇氏最為不信小序而於此詩無異詞且又以為周公制作已定後王不容復有改易成王非創業之主不應得以基命稱之此又何耶蘇氏曰此詩有成王不敢康而執競有不顯成康世或以為此言成王誦康王釗也然則周頌有康王子孫之詩也周公制禮禮之所及樂必從之樂之所及詩必從之故頌之施于禮樂者備矣後世無容易之且詩曰成王不敢康夙夜基命宥密又曰自彼成康奄有四方成王非基命之君而周之奄有四方非自成康始也曰蘇氏之不信小序固未嘗見其不可信之實也愚於漢廣之篇已嘗論之不足援以為據也夫周公制作亦及其當時之事而止耳若乃後王之廟所奏之樂自當隨時附益若商之玄鳥作於武丁孫子之世漢之廟樂亦隨世而更定焉通典曰漢高廟奏武德舞孝景采武德舞以為昭德以尊大宗廟孝宣采昭德舞為盛德以尊世宗廟諸帝廟皆奏文始四時五行之舞四時舞者孝文所作也豈有周之後王乃獨不得褒顯其先王之功德而必以改周公為嫌耶基者非必造之於始亦承之於下之謂也濮氏曰文公采歐陽時世論以斥序之非而獨表章國語斷其無可疑今觀基命之語與洛誥所謂王如弗敢及天基命定命之意合其為頌成王審矣何必委曲謂文武成此王業乎如曰邦家之基豈必謂大王王李之臣乎以是為説亦不得而通矣況其所以為此實未能忘北郊集議之餘忿今固不得而取也我將我享維羊維牛維天其右叶音由之賦也將奉享獻右尊也神坐東向在饌之右所以尊之也問所解右字與舊説不同曰周禮有享右祭祀之文如詩中此例亦多如既右烈考亦右文母之類如我將所云作保佑更難方説維羊維牛如何便説保佑到伊嘏文王既右享之也説未得佑助之佑愚按右人以右為尊如云位在其右尤出其右故右有尊義此宗祀文王於明堂以配上帝之樂歌言奉其牛羊以享上帝而曰天庶其降而在此牛羊之右乎蓋不敢必也吕東萊曰明堂祀上帝而文王配焉故先言祀天而次言祀文王此段言祀天也後段言祀文王也愚按天比文王為尊以尊事之故不敢必天之享而以其字言之儀式刑文王之典日靖四方伊嘏古雅反文王既右享叶虛良反之儀式刑皆法也嚴氏曰纍言之者謂法之不已也劉辰翁曰諄復言之以見取法之甚也輔氏曰儀以為儀也式以為式也刑以為法也疊言此三字以是凡所云為動作不敢忘也嘏錫福也孔氏曰特牲少牢皆載祝以神詞嘏主人與之以福言我儀式刑文王之典以靖天下則此能錫福之文王既降而在此之右以享我祭若有以見其必然矣愚按文王比天帝為親以親望之故知文王之必享我祭而以既字言之我其夙夜畏天之威于時保之又言天與文王既皆右享我矣則我其敢不夙夜畏天之威以保天與文王所以降鑒之意乎李迂仲曰雖曰享吾之祭亦豈可自滿哉故當夙興夜寐亹亹怵惕畏天之威我將一章十句程子曰萬物本乎天人本乎祖故冬至祭天而以祖配之冬至氣之始也萬物成形於帝而人成形於父故季秋享帝而以父配之以季秋成物之時也陳氏曰古者祭天於圜丘掃地而行事器用陶匏牲用犢其禮極簡聖人之意以為未足以盡其意之委曲故於季秋之月有大享之禮焉濮氏曰文王之祀既不敢同后稷於郊又無屈天神于宗廟之理故特尊其祀於明堂也斯其為曲盡矣天即帝也郊而曰天所以尊之也故以后稷配焉后稷逺矣配稷於郊亦以尊稷也明堂而曰帝所以親之也以文王配焉文王親也配文王於明堂亦以親文王也問帝即是天天即是帝却分祭何也曰為壇而祭故謂之天祭於屋下而以神祇祭之故謂之帝又曰后稷生於薑嫄以上更推不去故配天須以稷然上帝即天也聚天之神而言之則曰上帝此武王祀文王推父以配上帝者配帝須以父也曹氏曰以天道事之則藁秸以為席陶匏以為器繭栗之牲掃地而祭所以尊之也以帝遒事之則牛羊以為牲簠簋以為器鼎爼之實其薦用熟所以親之也尊尊而親親同道備矣然則郊者古禮而明堂者周制也周公以義起之也問祀文王於明堂周公以義起之非古禮也不知周公以後將以文王配不耶以時王之父配耶曰諸儒正持此二義至今決且周公制禮不知在武王之時成王之時若在成王時則文王乃其祖也又問繼周者當何如曰只得以有功者配之王人曰昔者周公宗祀文王於明堂乃不言武者以禮樂出於周公制作故以作禮樂者言之若是成王祭上帝則須配以武王若宣王祭帝則亦以厲王也東萊吕氏曰於天維庶其饗之不敢加一詞焉於文王則言儀式其典曰靖四方天不待贊法文王所以法天也率章惟言畏天之威而不及文王者統於尊也畏天所以畏文王也天與文王一也序祀文王於明堂也時邁其邦昊天其子之賦也邁行也邦諸侯之國也周制十有二年王巡守殷國柴望祭告諸侯畢朝周禮大行人曰十有二嵗王巡守殷國書周官曰六年五服一朝又六年王乃時巡諸侯各朝于方嶽蔡九峯曰柴燔柴以祀天也望望秩以祀山川也五嶽四瀆之屬望而祭之故曰望而胡庭芳曰望祭各設于巡守之方其位茅以辨之植表於中周禮所謂旁招以茅晉語所謂置茅蕝設表望是也此巡守而朝會祭告之樂歌也孔氏曰武王巡狩至于方嶽乃作告至之樂歌也愚按此雖武王初定天下而巡守所作之歌其後王之巡守者因而皆用之歟言我之巡守諸侯也天其子我乎哉蓋不敢必也徐氏曰子者親而愛之也嚴氏曰有天下曰天子子之謂使其王也愚按所謂不敢必者亦以其字言之蓋初為疑辭也下又言允王維后允王保之者則終之以決辭也然此二句總言巡守之事以發端也實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后右尊序次曹氏曰序者帝王之傳序也錢氏曰謂以周繼夏商也震動疊懼懷來柔安允信也既而曰天實右序有周矣是以使我薄言震之而四方諸侯莫不震懼又能懷柔百神曹氏曰祭法云有天下者祭百神故巡守所至百神皆祭焉以至于河之深廣嶽之崇高而莫不感格則是信乎周王之為天下君矣嚴氏曰天實右序有周矣武王之巡守也于諸侯薄警動之而莫不震懼又所至方嶽之下懷百神祀河嶽其人神之受職非人所能為也天實右序之也故天下莫不信武王之宜君天下也李迂仲曰以諸侯則莫不威畏以百神則莫不懷柔人神各得其所信乎王能盡為君之道也愚按此一節言巡守而祭告百神之事也明昭有周式序在位載戢側立反干戈載櫜古刀反弓矢我求懿德肆于時夏户雅反允王保之戢聚櫜韜孔氏曰櫜弓衣一名韜故納弓於衣謂韜弓肆陳也夏中國也又言明昭乎我周也既以慶讓黜陟之典式序在位之諸侯李迂仲曰孟子載巡守之事入其疆而慶讓行王制言不順不敬有黜地削爵之罰有功德于民者有加地進律之賞凡此皆所以按諸侯之功罪而升黜之所謂式序在位也又收斂其干戈弓矢而益求懿美之德以布陳于中國則信乎王之能保天命也李迂仲曰武王取天下矣必求文德以施中國則可以保天下也嚴氏曰天實明昭有周矣武王之巡守也以慶罰之典序諸侯之在位者又斂其干戈韜其弓矢惟求美德陳于中國其治道之彰著亦非人所能為也天實明昭有周故天下莫不信武王之能保天下也其右序有周與明昭有周語意一同明昭不言實承上省文也言天之右序有周而結之以允王維后謂膺天命而無愧也言天之明昭有周而結之以允王保之謂保天命於無窮也愚按天既右序成周使人神受職則我周王信為天下之君而為天之子矣我周既式序諸侯而以德化中國則信為天之子而保天之命也然此一節則言巡守朝會黜陟之事也或曰此詩即所謂肆夏以其肆于時夏之語而命之也國語注曰夏樂章之名輔氏曰昊天其子之不敢必也然細思之則知天實右序于我周也故諸侯莫不震懼而畢朝百神莫不感格而來享蓋王巡狩殷國則諸侯畢朝羣祀具舉故也信乎周王之為大下君則昊天誠子之矣自實右序有周而下言已然之事自明昭有周而下則言已後之事自期其當如此也式序在位所以對天之右序有周也懿德文德也此與諸侯相期以文德治乎諸夏而無或相尋於干戈弓矢之中也所謂偃武修文者是也如此則信乎王之能保受於天命矣雖詰爾戎兵張皇六師設司馬以教閲在周自有不可廢者而與諸侯相期之志則固不在此也時邁一章十五句春秋傳曰昔武王克商作頌曰載戢干戈而外傳又以為周公公之頌則此詩乃武王之世周公所作也陳少南曰武王凱歌方終而有方嶽之行觀此詩是告方嶽以革命之事因其時而震服諸侯故其詩與他廟樂不同黃實夫曰時邁之作見武王所以得天下所以保天下者皆無愧也武王巡守之事詩有時邁書有武成時邁告祭之樂章也武成識其政事以示天下來世也庚戌柴望大告武成此告祭懷實柔之實也昭我周王天休震動此莫不震疉之也庶邦冡君暨百工受命于周此式序在位之實也偃武修文歸馬放牛此非戢櫜之意乎建官位事重民五教惇信明義崇德報功此非懿德以保之乎外傳又曰金奏肆夏樊遏渠天子以饗元侯也鄭氏曰以鍾鑮播之鼓磬應之所謂金奏也韋昭注云肆夏一名樊韶夏一名遏納夏一名渠即周禮九夏之三也吕叔玉云肄夏時邁也樊遏執競也渠思文也顔達龍曰三夏者歌之大也天子享元侯用之故尸出入奏肆夏牲出入奏韶夏四方賔來奏納夏其聲載于樂章其職掌於鍾師然杜預韋昭之説輿吕叔玉雖不同而時邁執競思文即三夏之異名也鄭氏曰九夏疑皆詩篇名頌之類也載在樂章樂崩亦從而亡是以頌不能具愚按時邁思文皆周公所作而周禮九夏亦制作于周公固可以時邁為肆夏思文為納夏矣至于執競則昭王以後之詩而乃定為昭夏左傳國語之注恐難盡信序巡守告祭柴望也范氏曰古者天子巡守至方嶽以柴望告祭所以懷柔百神也後世議禮失其傳而謂之封襌非也執競武王無競維烈不顯成康上帝是皇賦也此祭武王成王康王之詩競強也言武王持其自強不息之心故其功烈之盛天下莫得而競李迂仲曰易曰天行健君子自強不息人君亦自強然後可以成功豈不顯哉成王康王之德亦上帝之所君也自彼成康奄有四方斤斤紀覲反其明叶謨郎反斤斤明之察也言成康之德明著如此也李迂仲曰言昭臨四方無所不察也鐘鼓喤喤華彭反叶胡先反磬管音管將將七羊反降福穰穰如羊反喤喤和也將將集也穰穰多也言今作樂以祭而受福也嚴氏曰此言樂作而神福之也降福簡簡威儀反反既醉既飽福祿來反簡簡大也反反謹重也反覆也言受福之多而愈益謹重是以既醉既飽而福祿之來反覆而不厭也李迂仲曰既醉既飽蓋祭終而飲福耳上言祭時樂備而和故神降之福此言祭終而飲威儀備具此福祿所以反復日至而未艾也嚴氏曰此言禮行而神申福之也執競一章十四句輔氏曰武王能持自強之心而不息故天下莫能強于功烈之盛此蓋內外之符也成王康王之德所以顯明而上帝之所以君之者豈無自而然哉此四句皆主武王而言之也自彼成康奄有四方乃専言成康之德斤斤訓明與察亦有不已無間斷之意應上顯字而言鐘鼓喤喤磬管將將降福穰穰則言作樂以祭樂聲之和而受福之多降福簡簡而下四句又言既祭而燕威儀謹重故福祿之來反覆無厭所以然者皆由武王之自強不息成康之明斤斤不已之故此昭王以後之詩國語説見前篇序祀武王也此詩并及成康則序誤矣其説己具於昊天有成命之篇蘇氏以周之奄有四方不自成康之時因從小序之説此亦以辭害意之失皇矣之詩於王季章中蓋己有此句矣又豈可以其太蚤而别為之説耶詩人之言或先或後要不失為周有天下之意耳濮氏曰諸儒言序之過往往徒費其詞而意終不慊故朱子辨而正之夫復何疑思文后稷克配彼天立我蒸民莫匪爾極貽我來牟帝命率育叶曰逼反無此疆爾界叶訖力反陳常于時夏賦也思語詞文言有文德也輔氏曰聖人之德文武最盛文陽也武陰也而文取數尤多舍刑威征討之外皆文也真氏曰聖人盛德藴於中而光輝發于外如威儀之中度語言之當理皆文也堯之文思舜之文明孔子稱堯曰煥乎其有文章子貢曰夫子之文章皆此之謂也六經論語之言文章皆取其自然形見者後世始以筆墨著述為文與聖賢之所謂文者異矣立粒通極至也德之至也貽遺也來小麥牟大麥也本草曰小麥味甘大麥味鹹為五穀長注大來今稞麥一名牟麥形似小麥皮厚故謂大麥率遍育養也言后稷之德真可配天愚按真可配天故謂之克配如文王之克明德也蓋使我蒸民得以粒食者莫非其德之至也曹氏曰天地能生之而不能養之苟不得其養則亦弗克遂其生矣惟后稷能以粒食養人故其德足以配天立即書所謂蒸民乃粒爾指后稷而言蓋曰使我衆民得以粒食者莫非爾后稷之所立者是望耳極字非指所受之中也且其貽我民以來牟之種乃上帝之命以此遍養下民者嚴氏曰后稷遺我民以二麥之種此乃天命后稷遍養斯民也然稷播百穀獨舉來牟者以其先熟濟民之食尤切也段氏曰詩言來牟者二蓋麥者五穀成熟之最先一嵗豐稔之占又正闕乏之時故養民者以此為喜也是以無有逺近彼此之殊而得以陳其君臣父子之常道於中國也李迂仲曰此所謂富而教之也若民無恆産因無恆心矣輔氏曰帝命以此遍養下民故稷因以教民稼穡種藝遍于天下無有疆界之限民既得以生養君臣父子之常道因可以陳布于中國也孟子論稷教稼穡契教人倫之事蓋夫生育之道無此疆爾界之殊至于五常之教則必先以中國為急故舉其所急者言之而已或曰此所謂納夏者亦以其有時夏之語而命之也思文一章八句國語説見時邁篇吕束萊曰國語以此為周公公之頌是此篇亦周公所作濮氏曰此郊祀獻后稷之樂歌祭天宜有詩而今亡矣決不可以昊天有成命當之孔氏曰后稷之配南郊與文王之配明堂其義一也而我將主言文王享其祭祀不説文王可以配上帝此篇主説后稷有德可以配天不説后稷享其祭祀非有異也序后稷配天也李迂仲曰即孝經所謂郊祀后稷以配天者也黃實夫曰后稷配天一事也而生民為敘事之辭此雅頌所以異也清廟之什十篇十章九十五句周頌臣工之什四之二嗟嗟臣工敬爾在公王釐力之反爾成來咨來茹如預反賦也嗟嗟重歎以深敕之也臣工羣臣百官也公公家也釐賜也成成法也茹度也此戒農官之詩先言王有成法以賜女女當來咨度也輔氏曰命他官皆無詩而特命農官則有詩者想是周人以聞國故成王周公特作詩以戒飭之以重其事也蓋周家當時每事皆有成法布在天下泛於后稷教民稼穡之事乎羣臣百官或有所不知故俟之來咨來度也嗟嗟保介維莫音慕之春亦又何求如何新畬音余於音烏皇來牟將受厥明明昭上帝迄用康年命我衆人庤持利反乃錢子淺反鎛音博奄觀銍珍栗反艾音刈保介見月令吕覽愚按吕覽即吕氏春秋月令亦吕氏春秋十二紀之首也其説不同然皆為籍田而言蓋農官之副也鄭氏據月令天子親載耒耜措之于參保介之御間以為車右被甲持兵故曰保介今按吕氏春秋亦有此文但參字在于字上髙誘注云保介副也鄭説迂晦不若高誘之明白也輔氏曰保介助王耕籍田者介有副意故以為農官之副莫春斗柄建辰夏正之三月也畬三嵗田也曹氏曰凡田一嵗曰災初反草也二嵗曰新田始為田也三嵗曰畬乃成熟也於皇嘆美之詞來牟麥也明上帝之明賜也言麥將熟也迄至也康年猶豐年也衆人甸徒也愚按周禮甸師下士二人府一人史二人胥三十人徒三百人甸師掌帥其屬而耕耨王籍意此詩所詩臣工即甸師也故但深敕之以成法而不明戒之以事所謂保介者即府吏之屬也故亦深敕之以農事而又不使親其勞所謂衆人則甸徒三百人也故使之具農器以親耕穫也然則此詩為籍田而作歟庤具錢銚挑鏄鉏皆田器也銍穫禾短鎌也孔氏曰鏄耨也柄長尺其耨六寸所以入苗間管子曰一農之事必有一銍一耨一銚然後成農二者皆田器也艾穫也此乃言所戒之事言三月則當治其新畬矣今如何哉嚴氏曰新墾之田用力尤難故首問之輔氏曰維暮之春亦又何求戒之使及時務農也又問所治之新畬今如何新田則費工多故舉新而該舊也於是命甸徒具農器以治其新畬而又將忽見其收成也李迂仲曰能庤乃錢鏄乃能有銍艾之望也王介甫曰治其事于前則收其功于後不可不勉也臣工一章十五句劉辰翁曰嗟嗟臣工至來咨來茹未有所言也至嗟嗟保介則進其從者而與之言亦惟閔其農事而己能知民事艱難而問之曰如何新如何畬其下則又述其相與贊喜勞勸之意焉嚴氏曰既嗟嘆而告臣工又嗟嘆而戒保介皆以重農之意告之也序諸侯助祭遣於廟也序誤孔氏曰頌雖告神為主但天下太平歌頌君德亦有非祭祀者臣工噫嘻有客振鷺皆不論神明之事是頌體不一不必皆是告神明也噫嘻成王既昭假音格爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦叶音擬賦也噫嘻亦歎詞也昭明假格也爾田官也時是駿大發耕也私私田也三十里萬夫之地四旁冇川內方三十三里有奇言三十里舉成數也周禮遂人曰夫間有遂萬夫有川孔氏曰一夫百畝方百步積萬夫方之是廣長各百夫以百乘百是萬也夫有百步三夫為一里則百夫為三十三里餘百步步三分里之一為小半里也耦二人並耕也此連上篇亦戒農官之詞昭假爾猶言格汝衆庶蓋成王始置田官而嘗戒命之也爾當率是農夫播其百穀使之大發其私田皆服其耕事萬人為耦而並耕也蓋耕本以二人為耦今合一川之衆為言故云萬人畢出并力齊心如合一耦也胡庭芳曰十千維耦者蓋萬夫合耦而耕實五千耦耳五千耦而并力齊心如一耦也此必鄉遂之官司稼之屬其職以萬夫為界者溝洫用貢法無公田故皆謂之私陳安卿曰周制國中鄉遂之地用貢法田不井授但為溝洫一夫受田百畝與同溝之人通力合作計畝均收大率十而賦其一趙氏曰陳器之云鄉遂用貢法周禮遂人是也按遂人云百夫有洫十夫有溝竊意鄉遂之地在近郊逺郊之間六軍之所從出必是平原廣野可畫為萬夫之田有溝有洫之有途路也蘇氏曰民曰雨我公田遂及我私而君曰駿發爾私終三十里其上下之間交相忠愛如此噫嘻一章八句歐陽子曰此是康王以後之詩輔氏曰臣工是成王戒農官之辭噫嘻疑是康王戒農官之辭既昭格爾言昔時成王嘗進爾農官而戒命之矣三爾字皆指農官而言其職既以萬夫為界則萬夫之發私田服耕事皆農官之已事也序春夏祈穀于上帝也序誤振鷺于飛于彼西雍我客戾止亦有斯容賦也振羣飛貌鷺白鳥雍澤也王氏曰辟雍有水鷺所集也在西郊故曰西雍客謂二王之後夏之後杞商之後宋於周為客天子有事膰焉有喪拜焉者也孔氏曰客者敵主之言先代之後時王偏所尊敬特謂之客也又曰史記杞世家云武王求禹後得束樓遂封於祀其殷後則初封武庚後以叛而誅之更封微子於宋李迂仲曰我客云者不純臣待之如所謂虞賔在位作賔王家也此二王之後來助祭之詩言鷺飛于西雍之水而我客來助祭者其容貌修整亦如鷺之潔白也嚴氏曰振振然羣飛之鷺集于西郊辟雍之澤其羽毛潔白容止舒間可觀也杞宋之君皆來助祭於此亦有此容也或曰興也在彼無惡烏路反在此無斁叶丁故反庶幾夙夜叶羊茹反以永終譽彼其國也在國無惡之者在此無厭之者如是則庶幾其能夙夜以永終此譽矣李迂仲曰庶幾終譽此所謂愛人以德也成王告微子曰與國咸休永世無窮又曰俾我有周無斁皆此意也陳氏曰在彼不以我革其命而有惡於我知天命無常惟德是與其心服也在我不以彼墜其命而有厭於彼崇德象賢統承先王忠厚之至也輔氏曰在彼無惡其心公也在此無斁其心厚也公則順天厚則盡道必如是然後可以夙夜以永終此譽也尊之曰客又以鷺比所謂譽也庶幾不敢必之辭也夙夜無或息之意也永長也終竟也愚按所引陳説在彼無惡之意與上文傳意微異故朱子初解舊本於此説之下有亦通二字振鷺一章八句李迂仲曰杞宋天子後也其禮加於諸侯故特為此詩也葉賀孫問振鷺詩不是正祭之樂歌乃獻助祭之臣未審如何曰看此文意都無告神之語恐是獻助祭之臣古者祭祀每一受胙主與賔尸皆有獻酬之禮既畢然後亞獻至獻畢復受胙如此禮意甚好有接續意思到唐時尚然今併受胙于諸獻既畢之後主與賔意思皆隔了古者一祭之中所以多事曹氏曰必存二代之後者所以尊其先世受命之君俾承祀而不廢且示天下公器又使時君常以覆車為鑒耳序二王之後來助祭之樂歌也濮氏曰疑此微子來朝始至而王燕勞之工所奏之樂歌也序言二王之後習於傳聞亦不見其來助祭之意豐年多黍多稌音杜亦有高廪力錦反萬億及秭咨履反為酒為醴蒸畀柤妣以洽百禮降福孔皆叶舉里反賦也稌稻也黍宜高燥而寒稌宜下濕而暑黍稌皆熟則百穀無不熟矣李迂仲曰稌粳也職方氏謂雍冀高燥其穀宜黍荆揚下濕其穀宜稻是黍利高燥稌利下濕也豐年之時或高或下無所不熟亦助語辭數萬至萬曰億數億至億曰秭蒸進畀子洽備皆遍也此秋冬報賽田事之樂歌蓋祀田祖先農方社之屬也胡庭芳曰按濮氏謂此年穀始登而薦宗廟之樂歌豈非以其有蒸卑祖妣之辭歟愚按序以噫嘻為春夏祈此詩為秋冬報載芟為春祈良耜為秋報朱子初解皆用其説今此集傳乃其改本於彼三詩傳文及序説既皆不取小序獨此篇於序説亦謂其誤而傳猶用序意者豈後來所改有未盡歟然得濮氏胡氏之説亦足以補之矣言其收入之多至於可以供祭祀備百禮而神降之福將甚遍也嚴氏曰有此黍稷之多以之為清酒以之為醴齊進與先祖先妣而祭祀之所以會合其事神之衆禮百物皆所以為禮而行禮以酒為主也豐年一章七句序秋冬報也序誤陳器之曰據改本説則當去序誤字有瞽有瞽在周之庭賦也瞽樂官無目者也鄭氏曰瞽矇也目無所見於音聲審也周禮上瞽四十人中瞽百人下瞽百六十人有視瞭者相之序以此為始作樂而合乎祖之詩濮氏曰王者功成作樂而始合奏于祖廟此工歌也祖通言先祖兩句總序其事也輔氏曰瞽言作樂之人也庭言作樂之處也兩句總序其事是也設業設虡音巨崇牙樹羽應田縣鼓鞉音挑磬柷尺叔反圉魚女反既備乃奏叶音祖簫管備舉以上叶瞽字業虡崇牙見靈臺篇樹羽置五采之羽於崇牙之上也孔氏曰值者為虡橫者為栒大板謂之業所以飾此栒而為崇牙刻之如鋸齒捷業然故曰業具形卷然可以縣鼓磬樹五采之羽以為文盡繒為翣載以璧樹翣於枸之角明堂位所謂周之璧翣應小鞞田大鼓也孔氏曰釋樂云小鼓謂之應大射禮云應鞞在建鼓東見為一器故知應小鞞也應既是小田宜為大鄭氏曰田當作􅉧引小鼓也孔氏曰以經傳皆無田鼓之名而大師職云令奏鼓􅉧注云為大鼓先引故知田當作􅉧縣鼓周制也夏后氏足鼓殷楹鼓周縣鼓記明堂位注曰足謂四足楹謂之柱貫中上出也縣縣之簨虡也周曹氏曰足鼓則以趺永之楹鼓則以柱貫之鼓始垂於簨虡故謂之垂鼓也鞉如鼓而小有柄兩耳持其柄而搖之則傍耳還自擊磬石磬也柷狀如漆桶以木為之中有椎連底撞幢又去聲之令左右擊以起樂者也圉亦作敔狀如伏虎背上有二十七鉏鋙刻以木長尺擽厯又音略之以止樂者也孔氏曰釋樂云所以鼓柷謂之止所以鼓敔謂之籈郭璞云柷方二尺四寸深一尺八寸中有柄椎連底挏之止其椎名也敔以木長尺櫟之籈其名也籈音真挏音同考索某氏曰柷方二尺四寸陰也敔二十七鉏鋙陽也樂作陽也以陰數成之樂止陰也以陽數成之固天地自然之理也簫編小竹管為之管如笛笛併兩而吹之者也王介甫曰簫太者編二十三管長尺四寸小者十六管長尺二寸參差象鳳翼孔氏曰小師注云管如笛形小蓋並吹兩管也喤喤音橫厥聲肅雍和鳴先祖是聽我客戾止永觀厥成以上叶庭字我客二王後也觀視也成樂闋也如簫韶九成之成成樂之一終也蔡九峯曰樂者象成者也故曰成曹氏曰永觀厥成觀之無厭斁也獨言二王後者猶言虞賔在位我有嘉客蓋尤以是為盛耳謝疊山曰舜作樂而曰虞賔在位祖考來格成王合樂而曰先祖是聽我客戾止以先代之後與先祖並言尊之至也書曰崇德象賢統承先王修其禮物非尊其後尊聖帝明王也愚按虞賔在位則舜之作樂以此為盛我有嘉客則商人作樂以此為盛我客戾止則周人作樂以此為盛也有瞽一章十三句濮氏曰始言樂官中言樂器終言樂聲之美序始作樂而合乎祖也猗於宜反與音余漆沮七余反潛有多魚有鱣張連反有鮪叶于軌反鰷音條鱨音常鰋音偃鯉以享以祀叶逸織反以介景福叶筆力反賦也猗與歎詞潛摻音滲也爾雅云魚之所息謂之橬音諶橬摻也音滲字林作罧音心去聲蓋積柴養魚使得藏隱避寒因以薄圍取之也或曰藏之深也嚴氏曰王氏以為潛藏之潛言取之深也解頤新語云魚喜潛鰷白鰷也陸璣曰鰷形狹而長若條然月令季冬命漁師始漁天子親往乃嘗魚先薦寢廟鄭氏曰天子必親往視漁明漁非常事重之也此時魚潔美季春薦鮪于寢廟鄭氏曰進時美物此其樂歌也彭氏曰子孫之祭其先祖九州之美味莫不畢備然其樂歌必言其所興之地取其所産之物而薦之者以示不忘本之意抑亦思其所嗜之意潛一章六句輔氏曰魚乃澤物之美者故薦之宗廟以致其孝心焉今月令但有季冬薦寢廟之文而已季春薦鮪乃序説也古注以為冬魚性定春鮪始來似亦可取魚性定故其肉味美可薦但春鮪始來尤可貴耳序季冬薦魚春獻鮪也孔氏曰冬言季春亦季春也冬月既寒魚不行孕性定而肥充冬則衆魚皆可薦春惟獻鮪而已有來雍雍與公叶篇內同至止肅肅相息亮反維辟音壁公天子穆穆賦也雍雍和也肅肅敬也相助祭也辟公諸侯也穆穆天子之容也其助祭者公侯其主祭者天子也此武王祭文王之詩言諸侯之來皆和且敬愚按諸侯之來者非一故以雍雍言其和其至止於廟中也故以肅肅言其敬輔氏曰來而不和則有勉強不得已之心至而不敬則有怠緩不敏事之意以助我之祭事而天子有穆穆之容也於音烏薦廣牡相同上豫肆祀叶養里反假古雅反哉皇考叶音口綏豫孝子叶奬里反於歎詞廣牡大牲也王介甫曰碩大肥腯之謂也肆陳假大也皇考文王也綏安也孝子武王自稱也言此和敬之諸侯薦大牲以助我之祭事嚴氏曰言得天下之歡心以奉其先王也而大哉之文王庶其享之以安我孝子之心也宣哲維人文武維后燕及皇天叶鐡因反克昌厥後宣通哲知燕安也此美文王之德宣哲則盡人之道文武則備君之德故能安人以及于天曹氏曰安及皇天則陰陽和而風雨時日月光而星辰靜無錯行妄動之變而克昌其後嗣也輔氏曰言文王之安于人而格于天所以能昌盛我後嗣之人也人為萬物之靈維通與知所以盡人之道文武之德所該者甚衆故曰備君之德堯之德廣運亦曰乃武乃文而已人道立故天道成是以能安人者則能燕及于天也天之佑君者莫大於豫以賢子孫是以能燕及於天則能昌我後嗣也蘇氏曰周人以諱事神文王名昌而此詩曰克昌厥後何也曰周之所謂諱不以其名號之耳不遂廢其文也諱其名而廢其文者周禮之末失也李迂仲曰周人以諱事神者如稱文王則不斥之曰文王昌書稱惟爾元孫某史官不敢斥其名故也如穆王名滿當時亦有王孫滿襄王名鄭當時亦有衛侯鄭魯武公名敖而後世之人有公孫敖觀此則知此詩克昌厥後噫嘻言駿發爾私皆未嘗諱也孔子作春秋如匡王名班而書曹伯班簡王名夷而書晉侯夷吾皆未嘗諱綏我眉夀叶殖酉反介以繁祉既右音乂烈考叶音口亦右文母叶滿彼反右尊也周禮所謂享右祭祀是也春官大祝掌辨九􅉔以享右祭祀􅉔音拜烈考猶皇考也文母大姒也胡庭芳曰以文母證之則烈考為文王無疑此詩為武王祭文王之詩無疑言文王昌厥後而安之以眉夀助之以多福使我得以右于烈考文母也輔氏曰綏我眉夀下四句則承上文而言所以綏我之實如比故我所以得享右乎烈考與文母也愚按先儒於介字皆訓助朱傳於此章亦然而於他詩皆訓大其義可互見也雍一章十六句周禮樂師及徹帥學士而歌徹説者以為即此此鄭氏曰學士國子也徹者歌雍論語亦曰以雍徹徹祭畢而取其俎也天子宗廟之祭則歌雍以徹然則此蓋徹祭所歌而亦名為徹也序禘太祖也祭法曰周人禘嚳又曰天子七廟三昭三穆及太祖之廟而七周之太祖即后稷也禘嚳於后稷之廟而以后稷配之所謂禘其祖之所自出以其祖配之者也祭法又曰周祖文王而春秋家説三年喪畢致新死者之主于廟亦謂之吉禘是祖一號而二廟禘一名而二祭也今此序云禘大祖則宜為禘嚳於后稷之廟矣而其詩之詞無及於嚳稷者若以為吉禘于文王則與序已不協而詩文亦無此意恐序之誤也此詩但為武王祭文王而徹俎之詩而後通用於他廟耳載見賢遍反下同辟音璧王曰求厥章龍旗陽陽和鈴央央於良反鞗音條革有鶬七羊反休有烈光賦也載則也發語辭也章法度也交龍曰旗陽明也軾前曰和旗上曰鈴孔氏曰和亦鈴也爾雅曰有鈴曰旗郭璞云縣鈴於竿畫交龍於旗央央有鶬皆聲和也按商頌鶬鶬鄭云聲和也休美也此諸侯助祭于武王廟之詩先言其來朝稟受法度曹氏曰孫慶賀刑威以制萬國者辟王也故諸侯來朝就求典章馬其車服之盛如此輔氏曰法度云者所該廣德禮刑政皆是也諸侯求見天子豈所特勉循故事而已言其功烈與輝光乂皆休美也旗以為章識故先言之和鈴鞗革皆有和聲故次言之率見昭考以孝以享叶虗良反昭考武王也廟制大祖居中左昭右穆周廟文王當穆武王當昭故書稱穆考文王而此詩及訪落皆謂武王為昭考太祖廟在比昭穆各以次而南廟皆南向羣廟之列左為昭而右為穆也若武王謂文王為穆考成王稱武工為昭考則自其始祔而然蓋但以左右為昭穆而不以昭穆為尊卑也愚按后稷為始封之君其廟居中自二世為昭三世為穆遞數至十五世而文王廟次當穆十六世而武王廟次當昭也此乃言王率諸侯以祭武王廟也以介眉夀永言保之思皇多祜後五反烈文辟公綏以多福俾緝熙于純嘏叶音古思語辭皇大也美也又言孝享以介眉夀而受多福是皆諸侯助祭有以致之使我得繼而明之以至于純嘏也蓋歸德于諸侯之詞猶烈文之意也輔氏曰我當長言保之以有此既大且多之福然凡若此者皆是有德之諸侯助祭以致之安我以是多福而使我繼續以明之至于純嘏純嘏則又全備於多福也載見一章十四句彭氏曰諸侯來朝意氣歡悅車服鮮明所謂休有烈光也率之以見于昭考之廟以致考享之禮以助眉夀之福凡今所以永保多祜皆爾辟公有以綏之而使得以緝熙于純嘏也序諸侯始見乎武王廟也序以載訓始故云始見恐未必然也有客有客亦白其馬叶滿補反有萋有且七序反敦都回反琢其旅賦也客微子也曹氏曰封於微而爵為子微蓋商圻內國名周既滅商封微子於宋以祀其先王而以客禮待之不敢臣也吕東萊曰成王殺武庚叛者殺之爾封微子賢者封之爾孔氏曰客止一人而重言之是丁寧殊異以尊大之也亦語辭也殷尚白修其禮物仍殷之舊也蔡九峯曰修其典禮文物不使廢壞以備一代之法也萋且未詳傳曰敬慎貌曹氏曰萋如萋兮斐兮且如籩豆有且言其萋且有文敦琢選擇也旅其卿大夫從行者也孔氏曰敦琢是治玉之名人而言敦琢故為選擇明尊其所往故擇其卿大夫之賢者與之朝王此微子來見祖廟之詩孔氏曰命微子為宋公代殷後乃來朝而見于周之祖廟而此一節言其始至也黃實夫曰馬有潔白之色人冇萋且之敬旅有敦琢之賢則周人之于微子無往而不見其可愛也有客宿宿有客信信言授之縶陟立反以縶其馬同上一宿曰宿再宿曰信吕東萊曰譙郡張氏云宿宿者凡一宿者再也信信者凡再宿者再也之嚴氏曰樂其留久也縶其馬愛之不欲其去也嚴氏曰恐其去之速也此一節言其將去也薄言追之左右綏之既有淫威降福孔夷追之己去而復還之愛之無已也左右綏之言所以安而留之者無方也淫威未詳舊説淫大也統承先王用天子禮樂所謂淫威也夷易也大也此一節言其留之也曹氏曰威等威也微子用其先王之車服禮樂其等威之大異乎列國之諸侯矣王介甫曰既有淫威則所享宜盛大故降福孔夷也段氏曰劉氏云有德而神降之福故以降福終焉有客一章十二句輔氏曰萋且敬慎貌又似有文章貌敦琢選擇也亦有整飭之意其始至也慎重其事如此非以媚乎周也誠之至也所謂在彼無惡也宿宿一宿而又一宿也信信再宿而又再宿愛之而不欲其去也去而復追還之所以安而留之者又無方焉殷勤之意如此非以私商也厚之至也所謂在此無斁也既與之以甚大之威儀則其降之以甚大之祉福可知矣此則慰安而勸勉之辭也序微子來見祖廟也孔氏曰來見祖廟必是助祭不言所祭之名不指所在之廟無得而知也李迂仲曰有客乃微子始受命之詩濮氏曰此宋公來朝將去而王燕餞之與振鷺詩為首末也序以為來見祖廟則語意不明商之祖廟固無由在京師而周之廟非助祭於王何得以見之於音鳥皇武王無競惟烈允文文王克開厥後嗣武受之勝殷遏劉耆音指定爾功賦也於歎辭皇大遏止劉殺耆致也周公象武王之功為大武之樂曹氏曰伐紂以除害樂其能成武功也言武王無競之功實文王開之而武王嗣而受之勝殷止殺以致定其功也黃實夫曰止殺如武成所謂以遏亂略是也李迂仲曰大武之意在於止戈大武之詩在於止殺也嚴氏曰信乎文王有文德以開後人之基緒矣然殷虐未除則文德未能盡逹於天下故武王繼之以武而受之伐紂以止殺然後致定其功所以歸重武王之功明非武王之武無以成文王之文也陳夀翁曰武王之烈實丕承乎文王之德故不以武為武而以止殺致定為武武烈之中實有文德寓焉輔氏曰武王故稱其莫強之烈文王故稱其信有之文父子一心文武一道但文王開始武王成終有先後之次耳勝殷止殺以致定其功所謂神武不殺者也此詩與書武成所載文王克成厥勳子小字其承厥志之意同世儒執以為文王全無取天下之心者不幾於固乎武一章七句春秋傳以此為大武之首章也濮氏曰左傳以此詩為大武之首章賚為第三章桓為第六章然周頌皆一章而已無疊章也或者後世取而用之於其事不可知也大武周公象武公武功之舞歌此詩以奏之曹氏曰孔子語賔牟賈以武樂始於總干而山立終于周道四逹禮樂交通豈止於武功而已哉禮曰朱干玉戚冕而舞大武明堂位曰下管象朱干玉戚冕而舞大武注云象周頌武詩也以管播之朱干赤大盾也戚斧也冕冠名祭統注云管象吹管而舞武象之樂也干戚武象之舞所執也何氏曰內則成童舞象象舞武舞也謂干戈之小舞也象用兵刺伐之舞蓋象武王伐紂而成功也然傳以此詩為武王所作則篇內已有武王之諡而其説誤矣序奏大武也臣工之什十篇十章一百六句周頌閔子小子之什四之三閔豫小子遭家不造叶徂候反嬛嬛其傾反在疚音救於音鳥乎音呼皇考叶扶候反永世克孝叶呼候反賦也成王免喪始朝于先王之廟而作此詩也閔病也豫小子成王自稱也造成也嬛與煢同無所依怙之意疚哀病也匡衡曰焭焭在疚言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也李迂仲曰嬛與哀此煢獨之義同嬛孤獨也左傳亦有在疚之文亦是居喪之稱也王雖朝于廟然去喪未甚逺故猶以死喪為言皇考武王也歎武王之終身能孝也愚按此釋經文第四第五句輔氏曰周至成王之時可謂成矣而曰遭家不造者王業雖成天下雖治而成王之心常若未成未治也如此然後能保其成若自謂已成已治則殆矣匡衡可謂善説詩也喪畢思慕所以釋煢煢字意氣未能平所以釋在疚字蓋所以就文武之葉崇大化之本則又以言其效驗也惟成王之能如此所以知武王之所以繼志述事者為終身能孝也念兹皇祖陟降庭叶去聲止維豫小子夙夜敬止皇祖文王也承上文言武王之孝思念文王常若見其陟降於庭猶所謂見堯於墻見堯於羮也後漢書李固曰堯沒舜仰慕三年坐則見堯於墻食則見堯於羮楚詞云三公揖讓登降堂只音紙與此文勢正相似而匡衡引此句顔注亦云若神明臨其朝廷是也匡衡時未行毛説顔監又精史學而不梏於専經之陋故其言獨得經之本旨也余舊讀詩而愛顔説然尚疑其無據及讀楚詞乃有登降堂只之文於是益信陟降庭止之為古語也愚按大招曰三公穆穆登降堂只其言三公登降堂正猶此言皇祖陟降庭其言只為語已詞正猶此言止也但集傳所引揖讓二字彼文正作穆穆則此或傳寫之誤耳於乎二字同上皇王繼序思不忘皇王兼指文武也承上文言我之所以夙夜敬止者思繼此序而不忘耳李迂仲曰武王能以念兹皇祖為孝則成王亦當以思繼祖考為孝愚按成王因見于廟對越祖考惻然自念而嘆既曰於乎皇考又曰於乎皇王所感之意深矣閔豫小子一章十一句陳夀翁曰思親而見其如在者此人子終身慕親之孝當親殁而愈篤者也記曰致愛則存致慤則著著存不忘乎心夫安得不敬乎惟武王之孝於文王者有此心故成王之孝於武王者亦惟致敬以不忘乎此心此武王之逹孝所以上無愧於文王而下可示法於成王也此成王除喪朝廟所作疑後世遂以為嗣王朝廟之樂後三篇放此愚按此篇及訪落敬之小毖四詩詞意相表裏如云遭家不造率時昭考未堪家多難及懲創管蔡之事皆可驗其為成王之詩而小序于四詩皆泛言嗣王故乂疑其後為嗣王朝廟通用之樂歌也序嗣王朝於廟也愚按朱子辨説見小毖序下訪豫落止率時昭考於音烏乎音呼悠哉朕有未艾五蓋反將豫就之繼猶判渙維豫小子未堪家多難乃旦反紹庭上下陟降厥家休矣皇考以保明其身賦也訪問落始曹氏曰凡宫室始成則落之故以落為始悠逺也艾如夜未艾之艾判分渙散保安明顯也王介甫曰保安則無危亡之憂明顯則無昏塞之患成王既朝于廟因作此詩以道延訪羣臣之意言我將謀之於始以循我昭考武王之道然而其道逺矣豫不能及也將使豫勉強以就之而所以繼之者猶恐其判渙而不合也則亦繼其上下於庭陟降於家庶幾賴皇考之休有以保明吾身而已矣輔氏曰延訪羣臣所以盡下情率時昭考所以守家法二者相資盡下情而不守家法則內無主守家法而不盡下情則外無助於乎悠哉朕未有艾又歎武王之道甚逺而恐在我有所不能及也味此意則成王固已默識夫武王之道若不曽用工夫則便以為易矣豈識此味哉將豫就之繼猶判渙言將使我勉強以就之猶恐其力量不足意思不能接續或至於判渙不能收拾聚蓄其道於我之一身也於是又歎以為豫乃幼沖小子未能任國家之多難此蓋指上武庚之事而言則亦當繼紹武王內外所行之事下於庭指其外事也陟降于家指其內事也庶幾賴武王之休以保安明顯我之身而已李迂仲曰自訪豫落止至繼猶判渙皆是仰先王之盛德嘆眇躬之涼薄苦前哲之高逺也胡庭芳曰自繼猶判渙而上猶有皇皇如有求而弗獲之意自繼豫小子而下則焄蒿悽愴如或見之也其曰訪豫落止率時昭考此如有所求也於乎悠哉朕未有艾歎其道之逺而未有所止也將道在是而可就矣乃倏爾分判渙散而靡有可就者焉於是歎曰維子小子未堪家多難將何以淑其後乎姑上下以紹於庭除之間乃若陟降于厥家焉是則皇考休美之道初若可就而倏判渙者今則焄蒿悽愴若或見之果足以保明吾之身矣誦其詩想其形容成王之思慕皇考爰繼爰述何其微婉懇切反覆曲盡有無窮之嘆詠也哉訪落一章十二句説同上篇陳夀翁曰武王之道若悠逺而難繼而武王之上下於庭陟降於家者其迹未逺則近而可繼成王紹武王之上下陟降於家庭者是即武王念文王而見其陟降於庭者也如此之紹庭上下陟降厥家者豈不由於前詩之夙夜敬止繼序思不忘哉維其能敬以思繼武王念文王之心所以能以武王之如見文王于庭者而紹武王於家庭也二詩語意相照應如此蘇氏曰上篇言將繼其祖考之詩也訪落謀所以繼之之詩也黃實夫曰上篇言陟降庭止而此言紹庭上下陟降厥家上篇言繼序思不忘而此言休矣皇考以保明其身皆是一時所作李迂仲曰人君者天下之本也始即位臨政者又人君之本也故伊尹告文甲以嗣王新服厥命惟新厥德召公亦曰王乃初服此訪落所由作也愚按夫子稱武王善繼志述事而以為踐其位行其禮奏其樂事死如生事亡如存固可見武王之達孝矣即前篇所謂永世克孝者也成王之繼武王而曰繼序思不忘曰繼猶判渙曰紹庭上下無非繼述之心其孝可謂不匱矣序嗣王謀於廟也愚按朱子辨説見小毖序下篇同敬之敬之天維顯思叶新夷反命不易以陂反哉叶奬黎反無曰髙髙在上陟降厥士日監在兹叶律之反賦也顯明也思語辭也士事也成王受羣臣之戒而述其言曰敬之哉敬之哉天道甚明其命不易保也嚴氏曰敬而又敬者誠之不已也蓋以天道甚明禍福不爽故豫奪無常其命難保也李迂仲曰善則福之淫則禍之栽者培之傾者覆之未有善而不獲福未有惡而不獲禍天之道蓋顯矣故其命靡常所以為不易也無謂其高而不吾察當知其聰明明畏常若陟降於吾之所為而無日不臨監于此者不可以不敬也輔氏曰母不敬可以對越上帝天道之明命不易保唯敬則能對越之若曰髙髙在上則便是不敬不敬則自絶于天矣常敬則見其陟降於已所為之事日監在兹也陟降厥士即所謂昊天曰明及爾出王昊天曰旦及爾遊衍也維豫小子叶奬里反不聰敬止日就月將學有緝熙于光明叶謨郎反佛符弗反又音弼時仔音兹肩示我顯德行下孟反叶户郎反將進也日就月將是日成月長就成也將大也佛弼通鄭氏曰輔也嚴氏曰輔謂之弼者言正救其失不専順從之也學記云其求之也佛佛不順也猶孟子所謂法家佛士也仔肩任也嚴氏曰仔肩為負荷之意故為任此乃自為答之之言我不聰而未能敬也然願學焉庶幾日有所就月有所進續而明之以至于光明又賴羣臣輔助我所負荷之任而示我以顯明之德行則庶乎其可及爾輔氏曰不聰知有所不及之事不敬行有所未至之事日就就事上言月將就大本上言成王自知其知與行皆有所未至故欲勉學問庶幾日於事上有所就月於本土有所將繼續不己以至於光明又賴羣臣助我所任之事而示我以顯明之德行則庶乎其可及耳曰就月將學有緝熙子光明所以自責於已佛時仔肩示我顯德行所以外資於人責于己者盡資於人者廣則大學明明德以至于平天下之事庶乎其可及矣故先生嘗語學者曰詩中説得學有緝熙于光明此句最好蓋心地本自光明只被利欲昏了今所以為學者要令其光明處轉光明所以下緝熙緝如緝麻之緝連緝不已之意熙則訓明字心地光明則此事有此理此物有此理自然見得且如人心未嘗不見明見他人做得是便道是做得不是便道不是何嘗不光明只是才明便昏了敬之一章十二句陳夀翁曰成王以天之當敬者臣之忠也答羣臣以未能敬者君之謙也憂其未能敬而內為學於已外求助於臣是即求所以盡此敬也學求造于光明而臣復示我以德之顯明則天不在髙高在上之天而在吾心之天矣其為敬天孰大於是胡庭芳曰此篇成王自戒并戒羣臣以求助之作也成王知我有顯道命之難諶不可不致其敬也故曰敬之敬之天惟顯思命每靡常而匪易也無曰高高在上其實陟降于所為之事而日監在兹也今豫小子雖非有聰明之資然而自知所敬日就月將以勉勉於學求以緝熙于光明爾衆士其輔弼我示我以顯然之德行庶幾其可以體而行之以為迓續天命之本也序羣臣進戒嗣王也胡庭芳曰詩中不見得是羣臣進戒嗣王自維子小子以下則嗣王先自述而後求羣臣之助也序説恐亦誤矣豫其懲直升反而毖後患莫豫荓普經反蜂自求辛螫施隻反肇允彼桃蟲拚芳煩反飛維鳥未堪家多難乃旦反豫又集于蓼音了賦也懲有所傷而知戒也毖慎荓使也蜂小物而有毒王介甫曰蜂善辛螫肇始允信也桃蟲鷦鷯小鳥也拚飛貌鳥大鳥也鷦鷯之雛化而為雕故古語曰鷦鷯生雕言始小而終大也陸農師曰鷦鷯巢於葦苕繫之以髮其巢至精密以麻紩之如刺襪然故一名襪雀其化輒為雕蓼辛苦之物也此亦訪落之意成王自言豫何所懲而謹後患乎荓蜂而得辛螫信桃蟲而不知能為大鳥此其所當懲者蓋指管蔡之事也蘇氏曰成王始信管蔡而疑周公既而悟其姦故曰豫其懲而謹後患也蜂不可使而使之則是自求辛螫矣始信其為桃蟲及其拚飛則維鳥矣以比信二叔則其禍如此也愚按朱子以此詩作於成王免喪之際則是武王崩後之三年也按書曰周公位冡宰正百工羣叔流言則是武王方崩流言即興周公避而居東二年之秋天有雷風之變篇於是王迎公歸明年免喪朝廟而此四詩繼作故此深懲管蔡之事也然我方幼沖未堪多難而又集於辛苦之地羣臣奈何捨我而弗助哉小毖一章八句蘇氏曰小毖者謹之於小也謹之于小則大患無由至矣愚按謹之於小者即謹之於始也即所謂訪落之意也謹之於始不以蜂為小而使之則其後無辛螫之患矣不信其為桃蟲之小則其後無翻飛大烏之患矣名篇者特于毖字上加一小字其意深矣序嗣王求助也此四篇一時之詩序但各以其意為説不能究其本末也載芟載柞側百反叶疾各反其耕澤澤音釋叶徒洛反賦也除草曰芟除木曰柞秋官柞氏掌攻草木是也曹氏曰秋官剃氏掌殺草秋繩而芟之是除草曰芟剃音弟繩音孕含實曰繩澤澤解上聲散也釋氏曰土解也嚴氏曰専言新墾之田者其用力尤難故也愚按第一節言墾土也千耦其耘徂隰徂畛音真耘去苗間草也愚按朱子初解嘗從鄭箋以耘為除根株蓋除草木之根株也今此傳改為去苗間草然以下文之次序觀之恐此句未遽説耘苗也故曹氏以為反土之後草木根株有芟柞不盡者則復耘之也隰為田之處也嚴氏曰下濕曰隰畛田畔也某氏曰千言其多也耦言並行也或徂隰或徂畛言耕夫遍野無曠土也愚按第二節言治田也侯主侯伯侯亞侯旅侯強侯以有嗿他感反其饁于輒反思媚其婦有依其士與以反有略其耜叶養里反俶載南畝叶滿委反主家長也伯長子也亞仲叔也李迂仲曰亞伯之次也旅衆子弟也強民之有餘力而來助者遂人所謂以強豫與任氓氓者也孔氏曰謂其人強壯治一夫之田有餘力能佐助他事者也能左右之曰以太宰所謂間間民轉移執事者鄭氏曰間民謂無事業者轉移為人執事若今時傭力之人隨主人所左右者也嚴氏曰言衆力競勸無遊民也嗿衆飲食聲也媚順依愛士夫也言餉婦與耕夫相慰勞去聲也李迂仲曰婦人行饁夫則順其婦婦示依其夫也曹氏曰士不辭耕稼之勞而知愛其婦婦不憚饁餉之煩而知依其夫有和樂之風焉嚴氏曰夫耕婦饁歡然相愛見治世之氣象焉略利曹氏曰耜耒首作木為之利則入土也俶始載事也曹氏曰前曰其耕澤澤初反土也今曰俶載南畝則將重矣愚按第三節言男女長幼齊力於始耕也播厥百穀實函斯活叶呼酷反函合活生也既播之其實含氣而生也曹氏曰百穀之性各有所宜而水旱豐凶不可預料故悉種之所以為備也鄭氏曰實種子也愚按第四節言苗生也驛驛其達叶他悅反有厭其桀驛驛苗生貌達出土也厭受氣足也傑先長者也愚按第五節言苗生之盛也厭厭其苗綿綿其麃表驕反綿綿詳密也麃耘也主介甫曰前曰千耦其耘則既耕而耘今曰綿綿其麃則既苗而耘也既苗而耘則以綿綿為善恐傷苗也嚴氏曰芟耘麃皆除草也芟與柞並言是新闢田除地上之草也既耕而言耘是反土而除土中之草根也既苗而言麃是除苗間之草也愚按第六節言耘苗也載穫濟濟子禮反有實其積子賜反叶上聲萬億及秭為酒為醴蒸畀祖妣以洽百禮濟濟人衆貌實積之實也積露積也胡庭芳曰上言實函此言實積皆指穀實酒三酒醴五齊祭祀則酒正供之祭有十倫其禮實繁而皆以酒行之故酒可以洽百禮王介甫曰以洽百禮既蒸畀祖妣而逹之祭祀賔客無所不洽也愚按第七節言收入之多以供祭祀也有飶蒲即反其香邦家之光有椒其馨胡考之寧飶芬香也未詳何物胡夀也孔氏曰周書諡法保民耆艾曰胡李迂仲曰胡考耉老也以燕享賔客則邦家之所以光也以共養耆老則胡考之所以安也愚按第八節又言可以待賔養老也匪且有且匪今斯今叶音經振古如兹無韻未詳且此振極也言非獨此處有此稼穡之事非獨今時有今豐年之慶蓋自極古以來已如此矣猶言自古有年也陳少南曰振古以來皆如上文之所謂也嚴氏曰自古以來皆如此繼此以往尤願勿替也愚按第九節則追言田事之所由來者逺矣載芟一章三十一句此詩未詳所用然辭意與豐年相似其用應亦不殊愚按朱子既辨此詩無祈田之意又以豐年之序所謂秋冬報者為誤矣而又謂此詩之用當與豐字不殊蓋據此篇第七節而言也然則此詩所謂為酒醴畀祖妣其亦秋成之際薦新于宗廟而歌之也歟序春籍田而祈社稷也朱子辨説見下篇序畟畟楚側反良耜叶養里反俶尺叔反載南畝叶蒲委反賦也畟畟嚴利也孔氏曰是刃利之狀也愚按第一節言始耕播厥百穀實函斯活叶呼酷反説見前篇愚按第二節言苗生也或來瞻女音汝載筐及筥其餉式亮反伊黍或來瞻女婦子之來饁者也筐筥餉具也李迂仲曰此言婦子行饁之器與所盛之物也彭氏曰其餉伊黍無珍味也愚按第三節言餉田也其笠伊糾叶其了反其鎛音博斯趙直了反以薅呼毛反荼蓼糾然笠之輕舉也毛氏曰笠所以禦暑兩趙刺入聲薅去上聲也荼陸草蓼水草一物而有水陸之異也孔氏曰田有原有隰故並舉水陸之草今南方人猶謂蓼為辣荼或用以毒溪取魚即所謂荼毒也彭氏曰此見其無華飾無怠力所以記耕民之狀也愚按第四節言耘苗也荼蓼朽止黍稷茂叶莫口反止毒草朽則土熟而苗盛愚按第五節言苗盛也穫之挃挃珍栗反積之栗栗其崇如墉其比毗志反如櫛側瑟反以開百室挃挃穫聲也栗栗積之密也櫛理髮器言密也百室一族之人也五家為比五比為閭四閭為族族人輩作相助故同時入穀也鄭氏曰如墉如櫛言積之髙大且相比近也一族同時納穀親親也百室者出必共洫間而耕入必共族中而居也愚按第六節言收穫之多而齊也百室盈止婦子寧止盈滿寧安也李迂仲曰百室既盈婦子於是寧蓋終嵗勤動不得安寧今農事已畢故各享其樂也樂愚按第七節言共豐稔也殺時犉如純反牡有救音求其角叶盧谷反以似以續續古之人無韻未詳黃牛黑唇曰犉救曲貌續謂續先祖以祭祀蘇氏口以似以續興來嵗繼往嵗也續古之人庶幾不替其先也愚按篇末言田事畢而以祭祀也其曰續古之人亦上篇振古如兹之意良耜一章二十三句或疑思文臣工噫嘻豐年載芟良耜等篇即所謂豳頌者其詳見於豳風及大田篇之末亦未知其是否也蘇氏曰聖人之為詩道其耕耨播種之勤而述其終嵗倉廪豐實婦子喜樂之際以感動其意夫詩之可以興者所以感發人之善志也先言勤勞後言逸樂使勤者可以自忘其勞而怠者亦知以自奮也序秋報社稷也兩篇未見其有祈報之異胡庭芳曰此二詩誠不見其祈報之異不過閔其耕種之勞敘其饋餉之情論其黍稷茂盛收穫之福或為酒醴以祀祖妣而為邦家胡考之光寧或百室盈婦子寧殺犉牡以嗣以續此皆田家勤勞安逸之事而非告神之樂歌也豈與七月楚茨信南山甫田大田等詩同一歌詠其事以寓其鼓舞神化之道而堅其樂事赴功之心也邪若拘拘於祈服則感發之意微矣愚按此與載芟詞意相類但無載芟第一第二第八節之意耳絲衣其紑孚浮反載辨俅俅音求自堂徂基自羊徂牛鼐乃代反鼎及鼒叶津之反兕觥其觩音求旨酒思柔不吳音話不敖音傲胡考之休賦也絲衣祭服也紑潔貌載戴也辨爵辨也士祭於王之服孔氏曰爵辨之服玄衣纁裳皆絲為之故曰絲衣雜記云士辨而祭於公冠而祭於已爵辨其色赤而微黑如爵頭然曹氏曰餘皆用布惟冕與爵辨服用絲大夫以上祭服謂之冕士祭服謂之辨其首服辨則不用絲故知絲衣為助祭之服也俅俅恭順貌孔氏曰人貌恭順基門孰之基愚按門側之堂謂之孰蓋門之內外夾其東西皆有孰一門凡四孰外兩孰南向內兩孰北嚮謂之堂則宜有基此詩所指則內孰之基也鼐大鼎鼒小鼎也思語辭柔和也吳譁也李迂仲曰大聲也此亦祭而飲酒之詩言此服絲衣爵辨之人升門堂視壺濯籩豆之屬降往於基告濯具又視牲從羊至牛反告充己乃舉鼎冪告潔禮之次也又能謹其威儀不喧譁不怠敖故能得夀之福愚按儀禮士之祭前祭一日夕時主人及賔皆入分立堂下東西宗人升自西階視壺濯於堂上東序視豆籩鉶於房東視几席及敦於西廂反降而告祭器之灌溉几席之備具於是賔主皆出即位于門東西鼎在門外北面北上牲在鼎西南北首束足東上宗人往視牲反位告其充肥遂舉冪告鼎之潔其禮皆若此詩之次也孔氏曰堂基但言所往之處牛羊但言所視之物互相足也嚴氏曰告濯其省器也告充省牲也告潔省饌也王介甫曰自羊徂牛先小後大也鼐鼎及鼒先大後小也先後反覆展視所以致勤敬也李迂仲曰上五句未祭之先整潔戒敕如此下四句既祭之後敬謹如此則祭時謹敬可知矣輔氏曰第一二句言其衣冠鮮潔而整肅也三四五句言其行禮順習而有序也六七句言其酒器如式而酒味和旨也八九句言其威儀敬靜而謹飭也如是則宜乎得夀考之福矣玩此一詩真可畫也絲衣一章九句此詩或紑俅牛觩柔休並叶基韻或基鼒並叶紑韻序繹賔尸也高子曰靈星之尸也序誤高子尤誤蘇氏曰絲衣本宗廟之詩其曰靈星失矣於音烏鑠式灼反王師遵養時晦時純熙矣是用大介我龍受之蹻蹻居來反王之造叶徂候反載用有嗣叶音祠實維爾公允師賦也於歎辭鑠盛遵循熙光介甲也所謂一戎衣也龍寵也蹻蹻武貌造為載則公事允信也此亦頌武王之詩言其初有於鑠之師而不用退自循養與時皆晦既純光矣然後一戎衣而天下大定後人於是寵而受此蹻蹻然王者之功歐陽子曰成王寵受之者蹻蹻然武功武王之所為也其所以嗣之者亦維武王之事是師爾輔氏曰北詩頌武王之武功言其初雖有甚盛之師而退自循養與時俱晦不見其有迹直至時節到來既純光矣然後一著戎衣而天下翕然大定此其所以為武王之武也後王於是寵而受此蹻蹻然之武功其所以嗣之者亦惟武王之事是師可也不先時而動不後時而靡君之用武也能如是是亦武王也己酌一章八句酌即勺也內則十三舞勺即以此詩為節而舞也何氏曰勺籥也舞籥文舞也孔氏云籥舞不用兵器以其尚幼故習小舞也賈氏云詩為樂章與舞人為節故以詩為舞也儀禮燕禮曰若舞則勺注曰勺頌篇也萬舞而奏之所以勸有功也然此詩與賚般皆不用詩中字名篇蘇氏曰方其不可而遵養時晦見其可而後為之此所以為酌也嚴氏曰初則遵養繼則蹻蹻酌其時措之宜也疑取樂節之名如曰武宿夜云爾禮記曰舞莫重於武宿夜注云武曲名正義云武王至商郊停止宿夜士卒皆歡樂歌舞以待旦故名焉序告成大武也言能酌先祖之道以養天下也詩中無酌字未見酌先祖之道以養天下之意嚴氏曰詩中言遵養非謂養天下也綏萬邦婁力注反豐年天命匪解佳賣反桓桓武王保有厥士于以四方克定厥家於音烏昭于天皇以間之賦也綏安也桓桓武貌大軍之後必有凶年而武王克商則除害以安天下故屢獲豐年之祥傳所謂周飢克殷而年豐是也王介甫曰師之所處荆棘生焉桓武志也而曰屢豐年則其為武志也異乎人之武志矣李迂仲曰武王用兵為天下除害故能召和氣也左傳僖公十九年衛大旱寧莊子曰昔周飢克殷而年豐然天命之於周久而不厭也故此桓桓之武王保有其士而用之於四方曹氏曰今年豐婁應則天之眷佐有周固匪解矣然武王之所以致此者由得士以為之用也以定其家其德上昭于天也間字之義未詳傳曰間代也言君天下以代商也嚴氏曰多方云有邦間之此亦頌武王之功輔氏曰綏萬邦者武王之本志也屢豐年者上天之嘉應也有是志則有是應先天而天弗違也天命匪解者天命之無厭也桓桓武王者武王之無怠也天命之無厭乃武王之無怠也後天而奉天時也天命武王不間毫髮保有厥士于以四方克定厥家此武王之武所成就也是以其德上昭于天而君天下以代乎商也桓一章九句春秋傳以此為大武之六章則今之篇次蓋已失其舊矣又篇內已有武王之諡則其謂武王時作者亦誤也嚴氏曰解頤新語云武王有其事成王制作於是作詩歌其事以告于武王耳序以為講武類禡之詩豈後世取其義而用之於其事也歟序講武類禡也桓武志也嚴氏曰解頤新語云講武而類乎上帝禡於所征之地皆師祭也謂之武志蓋發明武王將出征而講武類禡也孔氏曰作講武類禡之樂歌也禡祭造軍法者其神蚩尤或曰黃帝禡周禮作貉又或作類古今異也文王既勤止我應受之敷時繹思我徂維求定時周之命於音烏繹思賦也應當也敷布時是也繹尋繹也於嘆辭繹思尋繹而思念也此頌文武之功而言其大封功臣之意也言文王之勤勞天下至矣其子孫受而有之然而不敢専也布此文王功德之在人而可繹思者以賚有功而往求天下之安定王介甫曰大賚善人封建以為諸侯與共天下則所以求天下之定也又以為凡此皆周之命而非復商之舊矣遂嘆美之欲諸臣受封賞者繹思文王之德而不忘也輔氏曰武王之封賞功臣人見其為武王之恩也自武王之心言之乃是文王功德之在人心而可思繹者耳非己之恩也以是而往求天下之安定則庶乎其可矣然則受其封賞者又可以不思繹文王之德哉時周之命集傳以為凡此皆周之命而非復商之舊者是矣此又提起來説以興起人心也大封功臣于廟而歌此詩其言只止於此而都不及車服錫豫之物蓋以是為重而不以物為重也賚一章六句春秋傳以此為大武之二章而序以為大封於廟之詩説同上篇愚按大武作於武王崩後此頌為武樂第三章故詩中皆述武王封賞之意而推本文王之德朱傳所謂歟頌文王之功亦若大武首章兼頌文武之德也序大封於廟也賚豫與也言所以錫豫善人也孔氏曰左傳云武王封兄弟之國十五人姬姓之國四十人武成説武王列爵惟五分土惟三樂記言將帥之士使為諸侯此皆武王大封之事李迂仲曰封必於廟蓋歸功于祖宗不敢専也黃實夫曰善人云者見上不妄豫下不妄受孔子曰周有大賚善人是富於音烏皇時周陟其髙山嶞吐果反山喬嶽允猶翕許及反河敷天之下裒蒲侯反時之對時周之命賦也髙山泛言山耳嶞則其狹而長者喬髙也嶽則其髙而大者允猶未詳或曰允信也猶與由同翕河河善泛溢今得其性故翕而不暴也對答也言美哉此周也其巡守而登此山以柴望又道於河以周四嶽凡以敷天之下莫不有望於我故聚而朝之方嶽之下以答其意耳黃實夫曰得天下必告于名山大川禮也舜受天下于堯猶必望於山川編于羣臣受命之始不得不然也而況武王革命之主乎故此詩首末皆言是周之受命也愚按上四句言巡守而祭告河嶽之事也下三句言巡守而朝會諸侯之事也般盤一章七句般義未詳曹氏曰説文云般旋也象舟之旋從舟從殳殳所以旋也今名篇曰般取般旋之義巡狩而遍乎四嶽河海所謂般旋也嚴氏曰般遊也蘇氏曰朱傳以桓賚皆大武篇中之一章又以酌賚般名篇取樂節之名如曰武宿夜云耳然則酌與賚般一體亦大武篇中之二章歟序巡守而祀四嶽河海也濮氏曰如序所云宜與邁相似亦告祭之樂歌也此二篇説見本篇閔豫小子之什十一篇一百三十六句詩傳通釋卷十九
