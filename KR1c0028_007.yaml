body:
  text: 詩傳通釋卷七元劉瑾撰詩朱子集傳陳一之十二陳國名太嘷伏羲氏之墟在禹貢豫州之東其地廣平無名山大川西望外方東不及孟諸周武王時帝舜之胄有虞閼遏父為周陶正武王賴其利器用與其神明之後以元女大姬妻其子滿而封之于陳都扵宛丘之側與黄帝帝堯之後共為三恪是為胡公孔氏曰左傳史趙云胡氏不淫故周賜之姓使祀虞帝則胡公姓媯武王所賜三恪尊於諸侯卑於二王之後樂記武王未下車封黄帝後於薊封帝堯後於祝封帝舜後於陳下車乃封夏後於祀封殷後於宋則陳與薊祝是為三恪大姬婦人尊貴好樂巫覡歌舞之事其民化之今之陳州即其地也愚按今河南省汴梁路有陳州及宛丘縣子之湯他郎他浪二反兮宛丘之上辰羊辰亮二反兮洵音荀有情兮而無望武方武放二反兮賦也子指遊蕩之人也湯蕩也四方髙中央下曰宛丘濮氏曰宛丘因以為其地之名洵信也望人所瞻望也國人見此人常遊蕩於宛丘之上故叙其事以刺之言雖信有情思而可樂矣然無威儀可曕望也坎其擊鼔宛丘之下叶後五反無冬無夏叶與下同值直置反其鷺羽賦也坎擊鼔聲值植也鷺舂鉏今鷺鷥好而㓗白頭上有長毛十數枚羽以其羽為翳舞者持以指麾也孔氏曰持鷺羽翳身而舞言無時不出遊而鼔舞於是也李迂仲曰無冬無夏但言常舞也范氏曰冬夏祁寒大暑之時也人之好樂於是時必少息焉今也無冬無夏則其他時可知矣坎其擊缶方有反宛丘之道叶徒厚反無冬無夏值其鷺翿音導叶殖有反賦也缶瓦器可以節樂孔氏曰易離卦鼓缶而歌是樂器坎卦樽酒簋貳用缶又是酒器左襄九年宋災具緶缶則又是汲器然則缶可節樂若今擊甌又可盛水盛酒即今瓦盆也翿翳也宛丘三章章四句序刺幽公也淫荒昏亂游蕩無度焉陳國小無事實幽公但以諡惡故得游蕩無度之詩未敢信也東門之枌符云反宛丘之栩况浦反子仲之子婆娑素何反其下叶後五反賦也枌白榆也先生葉郤著莢皮色白子仲之子子仲氏之女也婆娑舞貌張子曰婆娑不必是舞但裴徊翺翔之義此男女聚㑹歌舞而賦其事以相樂也嚴氏曰味此詩不績其麻正是誚責之詞非相樂之詞首序疾亂之說或然也榖旦于差初佳反叶七何反南方之原無韻未詳不績其麻叶謨婆反市也婆娑賦也榖善差擇也既差擇善旦以會于南方之原於是棄其業以舞於市而往會也黄實夫曰邠之風俗其男耕其婦饁其女桑至於八月載績則蠶事畢而麻事起今陳之俗至於不績其麻市也婆娑所謂上有好者下必甚也榖旦于逝越以鬷子公反邁叶力制反視爾如荍祁饒反貽我握掓賦也逝往越於鬷衆也適行也荍芘毗芣浮也又名荆葵紫色濮氏曰芘芣紫荆春時開花葉未生花紫色自根反榦而上連接甚密有類蟻窠故爾雅名蚍蜉俗曰火蟻椒芬芳之物也言又以善旦而往於是以其衆行而男女相與道其慕恱之詞曰我視爾顔色之美如芘芣之華於是遺我以一握之椒而交情好也東門之枌三章章四句王日休曰陳風多言東門豈此門之外獨甚歟序疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾同上衡門之下可以棲音西遲泌悲位反之洋洋可以樂音洛飢賦也衡門横木為門也門之深者有阿塾堂宇此惟衡木為之孔氏曰衡古文横字此横木為門言其淺也棲遲遊息也泌泉水也洋洋水流貌此隠居自樂而無求者之詞言衡門雖淺陋然亦可以游息泌水雖不可飽然亦可以玩樂而忘飢也豈其食魚必河之魴音房豈其取音娶妻必齊之姜賦也陸農師曰里語云洛鯉河魴貴於牛羊則魴鯉乃魚之美者姜齊姓豈其食魚必河之鯉豈其取妻必宋之子叶奬里反賦也陸農師曰鯉魚之貴者故爾雅釋魚以鯉冠篇而神農書曰鯉最為魚之主子宋姓衡門三章章四句濮氏曰集傳以為隠居自樂無求於世如衞風考槃者興味深長也愚按能隱居者必能自樂能自樂者必能句無求故三者之意備見於一詩之間首章上二可見其隠居下二句可見其自樂後兩章又可見隨遇而安無求於世也序誘僖公也愿而無立志故作是詩以誘掖其君也僖者小心畏忌之名故以為愿而無立志而配以此詩不知其為賢者自樂而無求之意也東門之池可以漚烏豆反麻叶謨婆反彼美淑姬可與晤五故反歌興也池城池也漚漬也治麻者必先以水漬之孔氏曰漸漬使之柔忍晤猶解也此亦男女會遇之詞葢因其會遇之地所見之物以起興也胡庭芳曰補傳云陳風三言東門盖指所見以起興也東門之池可以漚紵直吕反彼美淑姬可與晤語興也紵麻屬陸璣曰紵科生數十莖宿根在地中至春自生荆揚間一歳三收剥去其皮之表但得其裏緝以織布東門之池可以漚菅古顔反叶居賢反彼美淑姬可以晤言興也菅葉似茅而滑澤莖有白粉柔韌宜為索也濮氏曰左傳雖冇綜麻無棄菅蒯蒯與菅皆謂苕也黄華者俗名黄芒即蒯也白華者俗名白芒即菅也東門之池三章章四句序刺時也疾其君之淫昏而思賢女以配君子也此淫奔之詩序說葢誤東門之楊其葉牂牂予桑反昏以為期明星煌煌興也東門相期之地也楊柳之揚起者也牂牂盛貌明星啓明也煌煌大明貌此亦男女期會而有負約不至者故因其所見以起興也東門之楊其葉肺肺普肺反昏以為期明星晢晢之世反興也肺肺猶牂牂晢晢猶煌煌也東門之楊二章章四句序刺時也昏姻失時男女多違親迎女猶有不至者也同上墓門有棘斧以斯所宜反之夫也不良國人知之知而不已誰昔然矣興也墓門凶僻之地多生荆棘斯析也夫指所刺之人也誰昔昔也猶言疇昔也言墓門有棘則斧以斯之矣此人不良則國人知之矣國人知之猶不自改則自疇昔而已然非一曰之積矣所謂不良之人亦不知其何所指也墓門有梅有鴞萃止夫也不良歌以訊叶息悴反之訊予不顔叶果五反顛倒思予叶寅女反興也鴟鴞惡聲之鳥也陸璣曰鴞大如班鳩緑色入人家凶賈誼鵩賦是也今謂之鵂鶹亦名怪鴟濮氏曰漢書霍山家鴞數鳴楚詞注鴟鴞二物又云鵩似鴞本草云其實一耳其肉甚美可為羹􅌜又可為炙莊子見彈而求鴞炙是也􅌜音壑萃集訊告也顛倒狼狽之狀墓門有梅則有鴞萃之矣夫也不良則有歌其惡以訊之者矣訊之而不予顧至於顛倒然後思予則豈有所及哉或曰訊予之予疑當依前章作而字墓門二章章六句序刺陳佗也陳佗無良師𫝊以至於不義惡加於萬民焉陳國君臣事無可紀㒔陳佗以亂賊被討見書於春秋故以無良之詩與之序之作大抵類此不知其信然否也防有鵲巢邛其恭反有㫖苕徒雕反叶徒刀反誰侜陟留反予美心焉忉忉都勞反興也防人所築以捍水者邛丘㫖美也苕苕饒也莖如勞豆而細葉似蒺䔧而青其莖葉緑色可生食如小豆藿也侜張也猶鄭風之所謂迋也濮氏曰侜謂誑誕則字與譸同書譸張為幻然似有裝載増加之意以其字之從舟也予美指所與私者也忉忉憂貌此男女之有私而憂或間之之詞故曰防則有鵲巢矣邛則有㫖苕矣今此何人而侜張予之所美使我憂之而至於忉忉乎中唐有甓蒲歴反邛有㫖鷊五歴反誰侜予美心焉惕惕吐歴反興也廟中路謂之唐孔氏曰堂下至門之徑也甓瓴零甋滴也爾雅注曰㼾甎也音鹿專鷊小草雜色如綬愚按埤雅鷊木烏名亦名綬烏咽下冇囊如小綬且五色此傳所釋鷊草之名豈因其似鷊鳥而取義乎惕惕猶忉忉也防有鵲巢二章章四句序憂讒賊也宣公好信䜛君子憂懼焉此非刺其君之詩月出皎兮佼古卯反人僚音了兮舒窈烏了反糾已小反兮勞心悄七小反兮興也皎月光也佼人美人也李迂仲曰孟子云子都之佼揚雄方言自闗之東河濟之間謂好為佼僚好也窈幽逺也糾愁結也悄憂也錢氏曰黙憂也此亦男女相恱而相念之詞言月出則皎然矣佼人則僚然矣安得見之而舒窈糾之情乎是以為之勞心而悄然也月出皓胡老反兮佼人懰力乆反叶朗老反兮舒懮於乆反受叶時倒反兮勞心慅七老反兮興也懰好貌懮受憂思也慅猶悄也王介甫曰慅言不安而騷動也月出照兮佼人燎力召反兮舒天於表反紹實照反兮勞心慘當作懆七弔反兮興也燎明也天紹糾緊之意慘憂也王介甫曰言不舒而憂愁月出三章章四句吕東萊曰此詩用字聱牙意者其方言歟序刺好色也在位不好德而説美色焉此不得為刺詩胡為乎株林從夏户雅反南叶見心反下同匪適株林從夏南賦也株林夏氏邑也李迂仲曰王氏以為株邑也邑外曰郊郊外曰牧牧外曰野野外曰林據詩中曰株林又曰株野又曰株王氏之言是也夏南徵舒字也鄭氏曰徴舒字子南孔氏曰以字配氏靈公淫於夏徵舒之母朝夕而往夏氏之邑故其民相與語曰君胡為乎株林乎曰從夏南耳然則非適株林也特以從夏南故耳葢淫乎夏姬不可言也故以從其子言之詩人之忠厚如此駕我乘繩證反馬叶滿補反説音税于株野叶上與反乘平聲我乘駒朝食于株賦也説舎也馬六尺以下曰駒鄭氏曰我國人我君也株林二章章四句春秋傳夏姬鄭穆公之女也嫁於陳大夫夏御叔靈公與其大夫孔寧儀行父通焉洩冶諫不聽而殺之宣九年傳曰靈公與孔寧儀行父通於夏姬皆哀其衵服以戱於朝洩冶誎曰公卿宣淫民無效焉公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩泄後卒為其子徵舒所弑而徵舒復為楚莊王所誅孔氏曰宣十年書陳徵舒弑其君平國傳曰靈公與儀行父飲酒於夏氏公謂行父曰徵舒似汝對曰亦似君徵舒病之公出自其廐射而殺之殺宣十一年傳曰楚子為陳夏氏亂故遂入陳夏徵舒轘諸栗門序刺靈公也淫乎夏姬驅馳而往朝夕不休息焉陳風獨此篇為有據彼澤之陂叶音波有蒲與荷音何有美一人傷如之何寤寐無為涕他弟反泗音四滂昔光反沱徒何反興也陂澤障也董氏曰澤水所鍾也蒲水草可為席者説文曰蒲似莞而𥚹有脊滑柔而温荷芙蕖也爾雅曰荷芙蕖其莖茄其葉蕸其本蔤其華遂蓞其實蓮其根藕郭璞曰荷别名芙蓉蔤莖下白蒻在泥中者蓮謂房也茄音加蕸音遐蔤亡筆反蒻音弱自目曰涕自鼻曰泗此詩之㫖與月出相類言彼澤之陂則有蒲與荷矣有美一人而不可見則雖憂傷而如之何哉寤寐無為涕泗滂沱而已矣彼澤之陂有蒲與蕳古顔反叶居賢反有美一人碩大且卷其貟反寤寐無為中心悁悁鳥𤣥反興也蕳蘭也卷鬢髪之美也李迂仲曰盧令其人美且鬈字雖不同其義則一悁悁猶悒悒也彼澤之陂有蒲菡戸感反蓞大感反叶待檢反有美一人碩大且儼魚檢反寤寐無為輾轉伏枕叶知險反興也菡蓞荷華也儼矜莊貌輾轉伏枕卧而不寐思之深且乆也澤陂三章章六句序刺時也言靈公君臣淫於其國男女相說憂思感傷焉陳國十篇二十六章一百二十四句東萊吕氏曰變風終於陳靈其間男女夫婦之詩一何多邪曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯男女者三綱之本萬事之先也正風之所以為正者舉其正以勸之也變風之所以為變者舉其不正者以戒之也道之升降時之治亂俗之汙隆民之死生於是乎在録之煩悉篇之重複亦何疑哉蘇氏曰變風終於陳靈何也陳靈以後未嘗無詩而仲尼有所不取也輔氏曰陳風十篇男女淫泆之詩居其大半此則遊蕩無度好樂荒淫之所召也愚按變風終於陳靈其間詩凡一百二十八篇以集傳考之男女夫婦之詩凡六十六篇不啻居其半也檜一之十三檜國名髙辛氏火正祝融之墟孔氏曰左傳梓慎云鄭祝融之墟也鄭滅檜而處之故知檜是祝融之境在禹貢豫州外方之北滎波之南居溱洧之間其君妘姓祝融之後孔氏曰祝融重黎也重黎之弟呉回生陸終生子六人四曰檜人案世本會人即檜之祖釋文曰王肅云周武王封祝融之後於濟洛河潁之間為檜子周衰為鄭武公所滅而遷國焉今之鄭州即其地也愚按即今河南省汴梁路鄭州是也蘇氏以為檜詩皆為鄭作如邶鄘之於衞也未知是否羔裘逍遥狐裘以朝直遥反叶直勞反豈不爾思勞心忉忉音刀賦也緇衣羔裘諸侯之朝服錦衣狐裘其朝天子之服也嚴氏曰玉藻云君衣狐白裘錦衣以裼之天子以裼視朝諸侯在天子之朝亦服之舊說檜君好潔其衣服逍遥遊宴而不能自强於政治故詩人憂之張南軒曰其所事惟在衣服之間則其不能强於政治可知矣嚴氏曰非以羔裘狐裘為大故而以逍遥翺翔為可憂也羔裘翺翔狐裘在堂豈不爾思我心憂傷賦也翺翔猶逍遥也堂公堂也羔裘如膏古報反日出有曜羊照反叶羊號反豈不爾思中心是悼賦也膏脂所漬也日出有耀日照之則有光也羔裘三章章四句蘇氏曰勞心忉忉思之也我心憂傷悲之也中心是悼則知其不復可救也羔裘如膏日出有曜其君之服飾非不美也豈不爾思中心是悼則其所闕者葢可見矣序大夫以道去其君也國小而迫君不用道好潔其衣服逍遥遊燕而不能自强於政治故作是詩也愚按詩中但言豈不爾思亦未有以見去其君之意庶見素冠兮棘人欒欒力端反兮勞心慱慱徒端反兮賦也庶幸也縞杲冠素紕皮既祥之冠也黒經白緯曰縞縁去聲邊曰紕李迂仲曰其冠用縞以素為紕故謂之素冠棘急也喪事欲其總總總爾胡庭芳曰棘人只是如棘之人若所謂瘦瘠如柴之義也欒欒瘠貌慱慱憂勞之貌祥冠祥則冠之禫則除之愚按喪禮再期而大祥自喪至此不計閏凡二十五月大祥之後中月而禫中間也禫祭名澹澹然平安之意至此不訃閏凡二十七月禫音蓞今人皆不能行三年之喪矣安得見此服乎當時賢者庶㡬見之至於憂勞也李迂仲曰詩人思見服既祥之素冠棘人形貌之欒欒者今無此人所以此心慱慱而憂也輔氏曰言庶見素冠兮而繼之以棘人欒欒兮葢言情與服之相稱也不然服於外而忘於内則亦何以為哉庶見素衣兮我心傷悲兮聊與子同歸兮賦也素冠則素衣矣與子同歸愛慕之詞也李迂仲曰言庶幾欲見服既祥之素衣者今無此人故我心悲傷也如有其人則我且與之同歸矣謝疊山曰同歸如書云同歸于治同歸于亂非與之同歸其家也庶見素韠音畢兮我心藴於粉反結叶訖力反兮聊與子如一兮賦也韠蔽膝也以韋為之孔氏曰古者佃漁而食因衣其皮先知蔽前後知蔽後後王易以布帛而猶存其蔽前者不忘本也冕服謂之韍其餘曰韠韠從裳色素衣素裳則素韠矣藴結思之不解也與子如一甚於同歸矣輔氏曰素衣素冠不祥之服也常情之所厭見也檜國之俗不能行三年之喪則不復見此既祥之衣冠矣而當時賢者庶㡬見之而不可得則至於憂勞如此是其心必有大不安者也幸而得見之則又為之愛慕而欲與同歸為一焉是又必冇大慊於其心者也此秉彞之心也先王之制喪服亦以是心而已豈强民而為之哉素冠三章章三句按喪禮為父為君斬衰三年鄭氏曰天子諸侯及卿大夫有地者皆曰君李實之曰以布為衰綴之於衣因統名此衣為衰先言斬者斬之而後成衰裳也不言裁割而言斬者取痛甚之意喪服四制曰其恩厚重者其服重故為父三年以恩制者也為君三年以義制者也昔宰予欲短喪夫子曰子生三年然後免於父母之懐予也有三年之愛於其父母乎三年之喪天下之通喪也輔氏曰子生三年後然免於父母之懷此君子所以不忍其親而喪必三年之故自天子達於庶人也李迂仲曰三年之喪皆出於人情之所同然聖人因人情而為節文練祥與禫衣冠皆有隆殺如此豈聖人為此以强人哉傳曰子夏三年之喪畢見於夫子援琴而弦衎衎而樂作而曰先王制禮不敢不及夫子曰君子也閔子騫三年之喪畢見於夫子援琴而絃切切而哀作而曰先王制禮不敢過也夫子曰君子也子路曰敢問何謂也夫子曰子夏哀已盡能引而致之於禮故曰君子也閔子騫哀未盡能自割以禮故曰君子也夫三年之喪賢者之所輕不削者之所勉輔氏曰子夏閔子騫之事毛傳所載如此與禮記不同先生併取宰予之事言之而不加一辭焉然熟讀而詳玩之則自有所發而可以為情性之正矣又曰非以三年之喪為足以報其親所謂喪三年以為極亡則弗之志矣者也至於聖人既為之中制則賢者必當俯而就不肖者必當跂而及也序刺不能三年也曽氏曰不能三年雖不知為服嵗月然宰我謂期可已矣齊宣王曰為期之喪猶愈於已乎古之不能三年者意皆如此隰有萇大羊反楚猗於可反儺乃可反其枝夭於驕反之沃沃烏毒反樂音洛子之無知賦也萇楚銚遥弋今羊桃也子如小麥亦似桃陸璣曰葉如桃而光尖長而狹花紫赤色其枝莖弱過一尺引蔓干草上一名業楚生平澤中子細如棗核苗弱不能為樹猗儺柔順也天少好貌沃沃光澤貌子指萇楚也政煩賦重人不堪其苦嘆其不如草木之無知而無憂也隰有萇楚猗儺其華方無胡𤓰二反夭之沃沃樂子之無家古胡古牙二反賦也無家言無累也隰有萇楚猗儺其實夭之沃沃樂子之無室賦也無室猶無家也隰有萇楚三章章四句序疾恣也國人疾其君之淫恣而思無情慾者也此序之誤說見本篇匪風發叶方月反兮匪車偈起竭反兮顧瞻周道中心怛都逹反叶旦恱反兮賦也發飄揚貌偈疾驅貌周道適周之路也怛傷也周室衰微賢人憂歎而作此詩言常時風發而車偈而中心怛然今非風發也非車偈也特顧瞻周道而思王室之陵遟故中心為之怛然耳匪風飄符遥反叶匹妙反兮匪車嘌符遥反叶匹妙反兮顧瞻周道中心弔兮賦也囘風謂之飄嘌漂摇不安之貌弔亦傷也誰能亨魚溉古愛反之釡符甫反􅑄音尋誰將西歸懷之好音興也溉滌也􅑄釡屬孔氏曰孫炎云闗東謂甑為􅑄亨魚用釜不用甑以其俱是食故連言之耳西歸歸于周也鄭氏曰檜在周之東故言西歸誰能亨魚乎有則我願為之溉其釡􅑄誰將西歸乎有則我願慰之以好音以見思之之甚但有西歸之人即思有以厚之也匪風三章章四句黄實夫曰周之得民當於此詩觀之輔氏曰王政不綱周室陵遲諸侯放恣無復知有尊王之義者而詩人顧瞻周道而為之憂傷聞有歸周之人則為之嘆慕慰勉而不能自已如此熟讀而詳玩之則足以見君臣之彞矣吕東萊曰匪風下泉思周之詩獨作於曹檜何也曰政出天子則强不陵弱各得其所政出諸侯則徵發之煩共億之困征伐之暴唯小國偏受其害所以睠懷宗周為獨切也戰國時房喜謂韓王曰大國惡有天子而小國利之以此二詩驗之其理益明序思周道也國小政亂憂及禍難而思周道焉詩言周道但謂適周之路如四牡所謂周道逶遲耳序言思周道者葢不達此意也檜國四篇十二章四十五句曹一之十四曹國名其地在禹貢兖州陶丘之北雷夏荷歌澤之野周武王以封其弟振鐸今之曹州即其地也愚按今東昌路有曹州隷山東東西道蜉蝣之羽衣裳楚楚叶創舉反心之憂矣於我歸處比也蜉蝣渠畧也似蛣乞蜣羌身狹而長角黄黒色朝生暮死埤雅曰蟲似天牛而小有甲角長三四寸朝生暮殞有浮游之義故曰蜉蝣也孔氏曰陸璣云蜉蝣甲下有趐能飛夏日隂雨時地中出楚楚鮮明貌此詩葢以時人有玩細娛而忘逺慮者故以蜉蝣為比而刺之言蜉蝣之羽翼猶衣裳之楚楚可愛也然其朝生暮死不能久存故我心憂之而欲其餘我歸處耳序以為刺其君或然而未有考也輔氏曰人心之體上下四方無不包括古往今來無不通貫可為大矣金也玩細娛忘逺慮至如蜉蝣之朝生暮死而不自知則亦不靈甚矣此詩人所以憂之而欲其於我歸處也所以欲其於我歸處者盖思有以警誨之耳又曰衣裳楚楚乃是言蜉蝣之羽耳故以為比若以蜉蝣之羽興衣裳楚楚則是興體也蜉蝣之翼采采衣服叶蒲北反心之憂矣於我歸息比也采采華飾也息止也蜉蝣掘閲求勿反麻衣如雪心之憂矣於我歸説音税叶輸藝反比也掘閲未詳説舍息也蜉蝣三章章四句吕東萊曰曹之賢者憂其君危亡近在旦夕儻無所依其於我處乎葢欲如楚芋尹申亥舎靈王於家之為也彼曹君方潔其衣服志氣揚揚而賢者已憫之如亡國喪家之人可哀也哉謝疊山曰此忠臣愛君憂國之真情其慮深其思逺若禍亡之無日不自知其辭之痛側也序刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉孔氏曰昭公班僖公子釋文曰諸本此序多無昭公字言昭公未有考彼候人兮何何可反戈與祋都律都外二反彼其音記之子三百赤芾芳勿蒲昧二反興也候人道路迎送賔客之官何揭祋殳殊也孔氏曰夏官候人上士六人下士十有二人徒百有二十人身荷戈役謂候人之屬非候人之官長也又曰戈鈎矛㦸也如㦸而横安刃但頭不向上為鉤直刃長八寸横刃長六寸刃下接柄處四寸並廣一寸弋殳俱是短兵之子指小人芾冕服之韠也嚴氏曰芾韍古字通用記玉藻曰韠下廣二尺上廣一尺長三尺頸五寸肩革帶博二寸芾制同祭服謂之芾他服謂之韠尊祭服也祭服冕以祭一命緼温芾黝酉珩再命赤芾黝珩三命赤芾葱珩大夫以上赤芾乘軒鄭氏曰緼赤黄之間色珩珮玉之珩也黒謂之黝青謂之葱周禮公侯伯之卿三命其大夫再命士一命此刺其君逺君子而近小人之詞言彼候人而何戈與祋者宜也彼其之子而三百赤芾何哉晉文公入曹數其不用禧負羈而乗軒者三百人其謂是歟杜氏曰軒大夫車言其無徳居位者多輔氏曰諸侯之制大夫五人而已而曹國之小赤芾而乗軒者至三百之衆此未章所以有薈蔚朝隮之比也其謂是歟盖疑辭不敢質言也維鵜徒低反在梁不濡其翼彼其之子不稱尺證反其服叶蒲北反興也鵜洿烏又音互澤水鳥也俗所謂淘河也孔氏曰形如鴞而大喙長尺餘頷下胡大如數升囊郭璞云今之鵜鶘也好羣飛入水食魚故名洿澤本草曰如蒼鵝身是水沫惟胷前有两塊肉如拳云昔為人竊肉入河化為此鳥因名逃河維鵜在梁不濡其咮陟救反彼其之子不遂其媾古豆反興也咮喙遂稱媾寵也遂之曰稱猶今人謂遂意曰稱意薈烏會反兮蔚於貴反兮南山朝隮丁兮反婉於阮反兮孌力轉反兮季女斯飢比也薈蔚草木盛多之貌朝隮雲氣升騰也婉少貌孌好貌薈蔚朝隮言小人衆多而氣燄盛也季女婉孌自保不妄從人而反飢困言賢者守道而反貧賤也候人四章章四句序刺近小人也共公逺君子而好近小人焉此序但以三百赤芾合於左氏所記晉侯入曹之事遂以為共公未知然否鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結叶訖力反兮興也鳲鳩秸戞鞠匊也亦名戴勝今之布榖也陸璣曰一名桑鳩或謂之題肩齊人謂之擊正本草曰北人云撥榖似鷂長尾飼嗣子朝從上下暮從下上平均如一也嚴氏曰郯子所謂鳲鳩氏司空鳲鳩平均故為司空平水土也如結如物之固結而不散也詩人美君子之用心均平專一故言鳲鳩在桑則其子七矣淑人君子則其儀一矣其儀一則心如結矣然不知其何所指也陳氏曰君子動容貌斯逺暴慢正顔色斯近信出辭氣斯逺鄙倍其見於威儀動作之間者有常度矣豈固為是拘拘者哉盖和順積中而英華發外是以由其威儀一於外而心如結於内者從可知也輔氏曰陳氏引曽子之言為說不惟解得此詩意出又正得曽子所言之本㫖内外無二理見其内可以占其外也鳲鳩在桑其子在梅叶莫悲反淑人君子其帶伊絲叶新齎反其帶伊絲其弁伊騏音其興也鳲鳩常言在桑其子每章異木子自飛去母常不移也蘇氏曰從其在梅則失其在棘從其在棘則失其在榛居一以俟之無不及者帶大帶也大帶用素絲有雜色飾焉孔氏曰玉藻云帶君朱緑大夫𤣥華是有雜色飾弁皮弁也騏馬之青黒色者弁之色亦如此也書云四人騏弁今作綦言鳲鳩在桑則其子在梅矣淑人君子則其帶伊絲矣其帶伊絲則其弁伊騏矣言有常度不差忒也鳲鳩在桑其子在棘淑人君子其儀不忒它得反其儀不忒正是四國叶于逼反興也有常度而其心一故儀不忒儀不忒則足以正四國矣大學傳曰其為父子兄弟足法而後民法之也鳲鳩在桑其子在榛側巾反淑人君子正是國人正是國人胡不萬年叶尼因反興也儀不忒故能正國人胡不萬年願其壽考之詞也鳲鳩四章章六句愚按鳲鳩之子雖非一而鳲鳩飼之之心則如一其子之飛往雖無常而鳲鳩居以待之則有常詩人託興之取義者亦以應接事物之變四國人民之衆而君子則度有常而心如一也然其言之有序以為君子之心如結是以其儀專一而有常度有常度是以其帶其弁亦有常而不差忒不差忒是以其儀不忒而可以表正四國表正四國則其終也可以受天之禄而壽考萬年是雖祝願之詞固亦天人感通之理也陳壽翁曰心結而儀一且不忒表裏一致也四國國人之皆正逺邇一致也由之久而胡不萬年久近一致也國人願其年壽之久豈非欲賴其表正之久哉序刺不壹也在位無君子用心之不壹也此美詩非刺詩冽音列彼下泉浸彼苞稂音郎愾苦愛反我寢嘆念彼周京叶居良反比而興也冽寒也嚴氏曰列旁二㸃者從氷寒也下泉泉下流者也苞草叢生也稂童梁莠屬也陸璣曰禾黍秀為穗而不成則嶷然謂之童梁今人謂之宿田翁或謂之守田愾嘆息之聲也周京天子所居也王室陵遟而小國困弊故以寒泉下流而苞稂見傷為比遂興其愾然以念周京也冽彼下泉浸彼苞蕭叶踈鳩反愾我寤嘆念彼京周比而興也蕭蒿也陸璣曰今俗謂之牛尾蒿京周猶周京也冽彼下泉浸彼苞蓍音尸愾我寤歎念彼京師叶霜夷反比而興也蓍筮草也陸璣曰似藾蕭青色科生本草其生如蒿髙五六尺一本多者至三五十莖生便條直異於衆蒿秋後有花出枝端上紅紫色形如菊用其筮為筮以知吉㓙故謂之神物史記云蓍满百莖者其下有神龜守之上有青雲覆之京師猶京周也孔氏曰周京與京周京師一也因異章而變文爾詳見大雅公劉篇芃芃薄工反黍苗隂雨膏古報反之四國有王郇音荀伯勞力報反之比而興也芃芃美貌邭伯郇侯文王之後嘗為州伯治諸侯有功孔氏曰左傳富辰稱畢原酆郇文之昭也李迂仲曰郇國今河中倚氏縣王制謂二百一十國為州州有伯是九州中有九伯也言黍苗既芃芃然矣又有隂雨以膏之四國既有王矣而又有郇伯以勞之傷今之不然也輔氏曰冽彼下泉浸彼苞稂則衰苶之意可見芃芃黍苗隂雨膏之則生生之意可見何詩人之善於形容也下泉四章章四句程子曰易剥之為卦也諸陽消剥已盡獨有上九一爻尚存如碩大之果不見食將有復生之理一陽在上如碩大之果人不及食獨留於上只不食便有復生之理上九亦變則純隂矣然陽無可盡之理變於上則生於下無間可容息也問變於上則生於下乃剥復相因之理畢竟相須經由坤坤卦純隂無陽如此則陽有斷滅也何以能生於復曰凡隂陽之生一爻當一月須是滿三十日方滿得那腔子做得一畫成今坤卦非是無陽始生甚微做一畫未成非是坤卦純隂便無陽也隂道極盛之時其亂可知亂極則自當思治故衆心願載於君子君子得輿也詩匪風下泉所以居變風之終也君子在上而小人皆載於下是君子得輿之象陳氏曰亂極而不治變極而不正則天理滅矣人道絶矣聖人於變風之極則係之以思治之詩以示循環之理以言亂之可治變之可正也吕東萊曰匪風下泉雖皆思周道之詩然匪風作於東遷之前此一時也下泉作於齊桓之後此又一時也嚴氏曰匪風思周而宣王中興下泉思周而周不復興無其人也輔氏曰匪風下泉二詩雖皆思周道之詩然匪風作於東遷之前其意尚覬乎周道之復興故曰誰將西歸懷之好音若下泉則作於齊桓之後不復有覬望之意矣直慨嘆想慕之而已程子因解剥卦而及匪風下泉二詩居變風之終之說可謂得聖人之意矣陳氏所謂以示循環之理以言亂之可治變之可正尤足以補程子之說故並載之序思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也曹無他事序因候人而遂以為共公然此乃天下之大勢非共公之罪也曹國四篇十五章六十八句詩傳通釋卷七
