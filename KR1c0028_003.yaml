body:
  text: 詩傳通釋卷三元劉瑾撰詩朱子集傳鄘一之四説見上篇汎彼柏舟在彼中河髧徒坎反彼兩髦音毛實維我儀叶牛何反之死矢靡他湯河反母也天叶鐵因反只音紙下同不諒人只興也中河中於何也髧髮垂貌兩髦者翦髮夾囟信廣韻注曰頭㑹腦葢也子事父母之飾親死然後去之此葢指共伯也項氏曰内則注云髦象幼時鬌兒生三月翦髮為鬌男角女羈夾囟曰角兩髻也午達曰羈三髻也鬌音朶又曰髦者以髮作偽髻垂兩眉之上如今小兒用一帶連雙髻横繋額上是也孔氏曰夾囟故兩髦也士既殯而脱髦諸侯小斂則脱之若父母有先死者於死三日脱之服闋又著之共伯僖侯世子名餘共諡伯字以未成君故不稱爵我共姜自我也釋文曰共伯之妻也婦人從夫諡姜姓也儀匹之至矢誓靡無也只語助辭諒信也舊説以為衛世子共伯蚤死其妻共姜守義父母欲奪而嫁之故共姜作此以自誓言栢舟則在彼中河兩髦則實我之匹雖至於死誓無他心母之於我覆育之恩如天罔極而何其不諒我之心乎不及父者疑時獨母在或非父意耳輔氏曰實維我匹一定而決不可易也之死矢靡他雖死而誓不敢易也夫母之欲嫁共姜想亦不過是惑於愛而慮其終耳今味共姜自誓之言其至誠貞固之意如此則母之惑可解而慮可釋矣汎彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝他得反母也天只不諒人只興也特亦匹也特有孤特之義而以為匹者古人用字多如此猶治之謂亂也慝邪也以是為慝則其絶之甚矣栢舟二章章七句范氏曰衰亂之世淫風大行共姜得禮之正而能守義故以首鄘風也孔叢子子曰于栢舟見匹婦執志之不可易也或問有孤孀貧窮無託者可再嫁否程子曰只是後世怕寒餓死故有是説然餓死事極小失節事極大真氏曰栢舟之不再適葢婦人之大節故孔子别之使萬世取法焉程子之論可為後世深戒陳夀翁曰衛之淫風流行而有共姜特立之節真可遏人欲之横流矣讀此詩者豈不可以感發人之善心乎序共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之此事無所見於他書序者或有所傳今姑從之牆有茨不可埽叶蘇后反也中冓古候反之言不可道叶徒厚反也所可道也言之醜也興也茨蒺藜也蔓生細葉子有三角刺人本草曰一名即䔧注云子有刺狀如菱而小軍家鑄鐡作之以布敵路亦呼蒺藜中冓謂舍之交積材木也吕東萊曰前漢梁王共傳應劭注云中冓材構在堂之中也顔師古云構謂舍之交積材木也當從應顔説葢閫内隠奥之處也中冓之言若曰閨門之言也道言醜惡也舊説以為宣公卒惠公幼其庶兄頑烝於宣姜孔氏曰左傳閔公二年曰初惠公之即位也少齊人使昭伯烝於宣姜不可强之生齊子戴公文公宋桓許穆夫人服䖍云昭伯宣公之長庶伋之兄宣姜惠公朔之母故詩人作此詩以刺之言其閨中之事皆醜惡而不可言理或然也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也興也襄除也詳詳言之也言之長者不欲言而託以語長難竟也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也興也束束而去之也讀誦言也辱猶醜也牆有茨三章章六句楊氏曰公子頑通乎君母閨中之言至不可讀其汙甚矣聖人何取焉而著之於經也葢自古淫亂之君自以謂密於閨門之中世無得而知者故自肆而不反聖人所以著之於經使後世為惡者知雖閨中之言亦無隠而不彰也其為訓戒深矣輔氏曰楊氏之説葢不獨為此篇發凡聖人所録淫亂之詩其意皆如此即先生所謂惡者可以懲創人之逸志者也序衛人刺其上也公子頑通乎君母國人疾之而不可道也君子偕老副笄六珈音加叶居河反委委於危反佗佗待河反如山如河象服是宜叶牛何反子之不淑云如之何賦也君子夫也偕老言偕生而偕死女子之生以身事人則當與之同生與之同死故夫死稱未亡人言亦待死而已不當復有他適之志也副祭服之首飾編篇上聲一如字髮為之孔氏曰副之言覆所以覆首為之飾編列他髮為之假作紒形加於首上服之以従祭祀紒音髻笄衡笄也垂于副之兩旁當耳其下以紞都敢反懸瑱孔氏曰衡笄以玉為之珈之言加也以玉加於笄而為飾也孔氏曰必飾之以六委委佗佗雍容自得之貌如山安重也如河𢎞廣也象服法度之服也淑善也言夫人當與君子偕老故其服飾之盛如此而雍容自得安重寛廣又有以宜其象服毛氏曰能與君子偕老乃宜居尊位而服盛服也今宣姜之不善乃如此雖有是服亦將如之何哉言不稱也玭音此兮玭兮其之翟叶去聲也鬒真忍反髮如雲不屑蘇節反髢徒帝反也玉之瑱吐殿反也象之揥勅帝反也楊且子餘反之晳星厯反叶征例反也胡然而天也胡然而帝也賦也玭鮮盛貌翟衣祭服刻繒為翟雉之形而彩畫之以為飾也孔氏曰翟雉名彩畫為飾不用真羽嚴氏曰鄭氏云江淮而西青質五色皆備成章曰揄揄翟則畫揄雉衛侯爵夫人服揄翟鬒黒也如雲言多而美也屑潔也髢髲音被髢也人少髮則以髢葢之髮自美則不潔於髢而用之也瑱塞耳也象象骨也揥所以摘剔髮也嚴氏曰揥所以摘髮故孔氏以搔首釋之若今之篦兒也揚眉上廣也且語助辭晳白也胡然而天胡然而帝言其服飾容貌之美見者驚猶鬼神也輔氏曰其者指宣姜而言玭兮玭兮其之翟也言服之美也鬒髮如雲不屑髢也言質之美也足乎己者無待於外也玉之瑱也象之揥也言飾之美也揚且之晳也言色之美也服飾容貎之美盛如天如帝然是豈可以徒居哉孔氏曰此章論祭服言欲徳當神明故尊之比天帝卒章論事君子見賔客之服故以美女言之瑳七我反兮瑳兮其之展陟戰反叶諸延反也蒙彼縐側救反絺是紲息列反袢符袁反叶汾乾反也子之清揚揚且之顔叶魚堅反也展如之人兮邦之媛于眷反叶于權反也賦也瑳亦鮮盛貌展衣者以禮見現於君及見賔客之服也毛氏曰展衣以丹穀為衣鄭氏曰展衣宜白禮記作襢襢音戰蒙覆阜也縐絺絺之蹙蹙者當暑之服也孔氏曰葛之精者曰絺其精尤細靡者縐也言細而縷縐紲袢束縳意以展衣蒙絺綌而為之紲袢所以自歛飭勅也或曰蒙謂加絺綌於䙝衣之上所謂表而出之也先著裏衣表絺綌而出之于外欲其不見體也清視清明也揚眉上廣也孔氏曰以目視清明因名為清揚者眉上之美名因謂眉上眉下皆曰揚目上目下皆曰清故野有蔓草傳云清揚眉目之間猗嗟傳云目下為清顔額角豐滿也展誠也美女曰媛見其徒有美色而無人君之徳也君子偕老三章一章七句一章九句一章八句東萊吕氏曰首章之末云子之不淑云如之何責之也二章之末云胡然而天也胡然而帝也問之也三章之末云展如之人兮邦之媛也惜之也辭益婉而意益深矣輔氏曰凡人之責人辭愈多則氣愈暴氣愈暴則辭愈厲此則志不帥氣而氣反動其志者也君子之責人則辭愈多而氣愈緩氣愈緩而辭愈和此則發乎情止乎禮義也且心有所忿懥則不得其正如此詩之詞益婉而意益深則心不至於失其正矣東萊先生責之問之惜之三字説盡詩意極好玩味嚴氏曰此詩唯述夫人服飾之盛容皃之尊不及淫亂之事但中間有子之不淑一語而譏刺之意盡見愚按三章皆極言宣姜服飾容皃之盛如此玩其詞想其人有徳以稱之固足以尊其瞻視享其安榮苟無其徳不㡬於誨淫者乎惟詩人寛厚意在言外故其立言如此葢與猗嗟之詩同意序刺衛夫人也夫人淫亂失事君子之道故陳人君之徳服飾之盛宜與君子偕老也公子頑事見春秋傳但此詩所以作亦未可考鶉之奔奔放此爰采唐矣沬音妹之鄉矣云誰之思美孟姜矣期我乎桑中叶諸良反要於遙反我乎上宫叶居王反送我乎淇之上叶辰羊反矣賦也唐蒙菜也一名兔絲孔氏曰釋草云唐䝉名女蘿女蘿名兔絲則唐與䝉或并或別故經直言唐而毛傳言唐䝉也本草曰生田野蔓延草木之上沬衛邑也書所謂妹邦者也孔氏曰酒誥注妹邦紂所都朝歌即沬也孟長也姜齊女言貴族也蘇氏曰美孟姜矣雖長而無禮也有齊季女雖幼而知禮也桑中上宫淇上又沬鄉之中小地名也要猶迎也衛俗淫亂世族在位相竊妻妾故此人自言將采唐於沬而與其所思之人相期㑹迎送如此也爰采麥叶訖力反矣沬之比矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣賦也麥榖名秋種夏熟者白虎通曰麥金也金旺而生火旺而死弋春秋或作姒春秋定姒公榖作定弋葢杞女夏后氏之後亦貴族也爰采葑矣沬之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣賦也葑蔓菁也庸未聞疑亦貴族也劉執中曰采唐麥葑者欲適幽逺行其淫亂不敢正名而託以采此也愚按孟姜孟弋孟庸亦託言貴族以指所私之人非必當時實有此三姓之女也桑中三章章七句樂記曰鄭衛之音亂世之音也比於慢矣比去聲猶同也桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也輔氏曰誣上只是欺謾其上之人大抵行私者皆有此心桑中之詩雖肆言無忌然誣上行私之心自在此皆緣民情流蕩無所限節之故民情所以如此則又因政散之故上之人苟有政事則何至於此鄭氏曰濮水之上地有桑間者亡國之音於此水出也昔殷紂使師延作靡靡之樂已而自沈于濮水後師涓過焉夜聞而冩之為晉中公鼓之是之謂也按桑間即此篇故小序亦用樂記之語愚按朱子以桑間即此桑中詩而証者以樂記之語然則鄭氏謂師涓所聞自是濮上之音也序刺奔也衛之公室淫亂男女相奔至於世族在位相竊妻妾期於幽逺政散民流而不可止此詩乃淫奔者所自作序之首句以為刺奔誤矣其下云云者乃復得之樂記之説已畧見本篇矣而或者以為刺詩之體固有鋪陳其事不加一辭而閔惜懲創之意自見於言外者此類是也豈必譙讓質責然後為刺也哉此説不然夫詩之為刺固有不加一辭而意自見者清人猗嗟之屬是己然嘗試玩之則其賦之之人猶在所賦之外而詞意之間猶有賔主之分也豈有將欲刺人之惡乃反自為彼人之言以陷其身於所刺之中而不自知也哉必不然也明矣又況此等之人安於為惡其於此等之詩計其平日固已自其口出而無慚矣又何待吾之鋪陳而後始知其所為之如此亦豈畏吾之閔惜而遂幡然遽有懲創之心耶以是為刺不惟無益殆恐不免于鼓之舞之而反以勸其惡也或者又曰詩三百篇皆雅樂也祭祀朝聘之所用也桑間濮上之音鄭衛之樂也世俗之所用也雅鄭不同部其來尚矣且夫子答顔淵之問於鄭聲亟欲放而絶之豈其刪詩乃錄淫奔者之詞而使之合奏於雅樂之中乎亦不然也雅者二雅是也鄭者緇衣以下二十一篇是也衛者邶鄘衛三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝聘之所用也鄭衛桑濮里巷狹邪之所歌也夫子之於鄭衛葢深絶其聲於樂以為法而嚴立其詞於詩以為戒如聖人固不語亂而春秋所記無非亂臣賊子之事葢不如是無以見當時風俗事變之實而垂監戒於後世故不得已而存之所謂道並行而不相悖者也今不察此乃欲為之諱其鄭衛桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其將以薦之何等之鬼神用之何等之賔客而於聖人為邦之法又豈不為陽守而陰叛之邪其亦誤矣曰然則大序所謂止乎禮義夫子所謂思無邪者又何謂邪曰大序指栢舟綠衣泉水竹竿之屬而言以為多出於此耳非謂篇篇皆然而桑中之類亦止乎禮義也夫子之言正為其有邪正美惡之雜故特言此以明其皆可以懲惡勸善而使人得其性情之正耳非以桑中之類亦以無邪之思作之也曰荀卿所謂詩者中聲之所止太史公亦謂三百篇者夫子皆絃歌之以求合于韶武之音何邪曰荀卿之言固為正經而發若史遷之説則恐亦未足為據也豈有哇淫之曲而可以强合於韶武之音也邪孔子之稱思無邪以為詩三百篇勸善懲惡雖其要歸皆出於正然未有若此言之約而盡者耳非以作詩之人所思皆無邪也今必曰彼以無邪之思鋪陳淫亂之事而閔惜懲創之意自見於言外則曷若曰彼雖以有邪之思作之而我以無邪之思讀之則彼之自狀其醜者若所以為我警懼懲創之資耶而况曲為訓説而求其無邪於彼不若反而得之於心之易也巧為辨數而歸無邪於彼不若反而責之於我之切也若夫雅也鄭也衛也求之諸篇各有其目矣是則自衛反魯以来未之有改而風雅之篇說者又有正變之别焉至於桑中小序政散民流而不可止之文與樂記合則是詩之為桑間又不為無所據者今必曰三百篇皆雅而鄭風不為鄭邶鄘衛之風不為衛桑中不為桑間亡國之音則其篇帙淆亂邪正錯操非獲孔子之舊矣且於小序之無稽可笑者篤信之而於其有據者反不之信此又何邪夫廷二南正風房中之樂也鄉樂也二雅之正朝之樂也商周之頌宗廟之樂也是或見於序文或出於傳記皆有可考至于變雅則固已無施於事而變風又特里巷之歌其領在樂官者以為可以識時變觀土風而賢於四夷之樂耳葢古者天子巡狩命大師陳詩以觀民風固不可問其美惡而悉存以訓也然其與先王雅頌之正篇帙不同施用亦異如前所陳則不固不容龎雜矣今於雅鄭之實察之既不詳于龎雜之名畏之又大甚顧乃引夫淫放之鄙詞而文以風刺之美説必欲强而置諸先王雅頌之列是乃自反為龎雜之甚而不自知也夫以胡樂與鄭衛合奏猶曰不可而況强以桑中溱洧為雅樂又欲合於鹿鳴文王清廟之什而奏之宗廟之中朝廷之上乎其以二詩為猶止于中聲者太史公所謂孔子皆弦歌之以求合韶武之音其誤葢亦如此然古樂既亡無所考正則吾不敢必為之説獨以其理與其詞推之有以知其必不然耳又以為近於勸百諷一而止乎禮義則又信大序之過者夫有所謂諷者若漢廣知不可而不求大車有所畏而不敢則猶有所謂禮義之止也若桑中溱洧則吾不知其何詞之諷而何禮義之止乎哉若曰孔子嘗欲放鄭聲矣不當於此又收之以備六籍此則曾南豐於戰國䇿劉元城於三不足之論皆嘗言之又豈俟吾言而後白也哉大抵吾説之病不過得罪於桑間洧外之人而其力猶足完先王之樂彼説而善則二詩之幸而雅樂之不幸甚矣抑其於溱洧而取范氏之説則又似以鄭詩為鄭聲者豈理之自然固有不可奪者邪因讀桑中之説而惜前論之不及竟又痛伯恭父之不可作也因讀其後以為使伯恭父而聞此雖未必遽以為然亦當後我逌然而一嘆也烏呼悲夫愚按上文朱子前後辨説皆為東萊而發觀其序讀詩記曰某少時淺陋之説伯恭父誤有取焉其後歴時既久自知未安如雅鄭邪正之云者未免有所更定則伯恭父反不能不置疑於其間方將相與反復其説以求真是之歸而伯恭父已下世矣嗟乎東萊朱子一時同志皆大有功於詩經者也豈固欲相戹哉因附錄于此鶉音純之奔奔鵲之彊彊音姜人之無良我以為兄叶虚王反興也鶉䳺諳屬本草曰鶉初生謂之羅鶉至初秋謂之早秋中秋以後謂之白唐一物四名也奔奔彊彊居有常匹飛則相隨之貌人謂公子頑良善也衛人刺宣姜與頑非匹耦而相從也故為惠公之言以刺之曰人之無良鶉鵲之不若而我反以為兄何哉孔氏曰言鶉則鶉自相隨奔奔然鵲則鵲自相隨彊彊然各有常匹不亂其類今宣姜為母頑則為子而與之淫亂曾鶉鵲之不如而我反以為兄也哉鵲之彊彊鶉之奔奔叶逋珉反人之無良我以為君興也人謂宣姜君小君也孔氏曰夫人對君稱小君以夫妻一體言之亦得曰君襄九年左傳筮穆姜曰君必速出是也輔氏曰詩人疾惡宣姜至矣而猶不敢不以為小君也彼謂佼童碩鼠為稱其君者何哉鶉之奔奔二章章四句范氏曰宣姜之惡不可勝道也國人疾而刺之或逺言焉或切言焉逺言之者君子偕老是也切言之者鶉之奔奔是也衛詩至此而人道盡天理滅矣中國無以異于夷狄人類無以異於禽獸而國隨以亡矣胡氏曰楊時有言詩載此篇以見衛為狄所滅之因也故在定之方中之前彭氏曰陳氏云木必壊然後蠧生焉國必亂然後冦生焉聖人存此詩以為狄入衛張本使後世知所戒也因以是説考於歴代凡淫亂者未有不至於殺身敗國而亡其家者然後知古詩垂戒之大而近世有獻議乞於經筵不以國風進講者殊失聖經之㫖矣李迂仲曰淫亂非美事而不刪之者所以示鑒戒也亦如春秋亂臣賊子一一書之亦所以示戒也而唐太子𢎞受左傳至于楚世子商臣弑其君頵而請更受他書是不知聖人垂訓之意也近世有建言經筵不進國風是亦不知聖人垂訓之意也頵音均序刺衛宣姜也衛人以為宣姜鶉鵲之不若也見上定丁佞反之方中作于楚宫揆之以日作于楚室樹之榛栗椅於宜反桐梓漆爰伐琴瑟賦也定北方之宿營室星也此星昬而正中夏正十月也於是時可以營制宫室故謂之營室愚按夏正十月建亥春秋時十二月也農事已畢可以興作而人君居必南面故亥月昏時見定星當南方之午位因記此星為每嵗營作之候又因號為營室此葢成周以後之制上考唐虞之時定星以戌月昏中嵗久而差至周時定星始以亥月昏中下逮今日此星又以子月昏中矣楚宫楚丘之宫也揆度也樹八尺之臬齧而度其日出入之景以定東西又參日中之景以正南北也孔氏曰匠人云水地以懸置槷以懸眡以影為規識日出之景與日入之景晝參諸日中之景注云於四角立植而懸以水望其髙下髙下既定乃為位而平地於所平之地中央樹八尺之臬以懸正之𣙗與臬同愚按安成彭魯叔曰𣙗柱也縣垂繩也柱有四角四中垂以八繩繩皆附柱則其柱正矣柱正然後視之以測日影也又轉莛畫地為圓規朝識日景其端指西暮識日景其端指東兩端長短必與規齊測其端則東西正就其中屈之則南北亦可正也又于畫漏午時叅此日中之景可以正南方之位因以正北方之位也此周禮定方制度衛文公建宫室定四方之法葢亦如此楚室猶楚宫互文以協韻耳榛栗二木其實榛小栗大皆可供籩實本草注曰榛樹髙丈許子如小栗栗樹髙二三丈花青黄色實有房彚大者中子三五小者子唯一二椅梓實桐皮毛氏曰樹梓属桐梧桐也嚴氏曰陸璣言有青桐白桐赤桐此中琴瑟者白桐也椅桐梓漆之桐為白桐梧桐生矣之桐為青桐本草注曰桐有四種一種白桐可斵琴葉三权開白花不結子一種荏桐子可作油一種梧桐今人收其子炒作果一種岡桐無花不可作琴體重梓楸之疎理白色而生子者本草注曰梓似桐而葉小花紫亦有三種漆木有液黏念平聲黒可飾器物本草注曰漆樹髙三二丈皮白葉似椿花似槐以斧斫其皮開以竹筒承之汁滴則成漆也四木皆琴瑟之材也嚴氏曰樹桐可為琴瑟榛栗可備籩實梓漆可供器用但言伐琴瑟者取成句耳爰於也衛為狄所滅文公徙居楚丘營立宫室國人悦之而作是詩以美之蘇氏曰種木者求用於十年之後其不求近功凡此類也范氏曰此詩美其新造而志于永久埤雅曰言其所植皆能預備禮樂之用語曰一年之計莫如種穀十年之計莫如種木故文公于初作室之時早計如此愚按此章上四句言其得天時地利之宜下三句言其有久逺預備之計所謂悦之美之者皆追述其事如此也升彼虚起居反叶起吕反矣以望楚矣望楚與堂景山與京叶居良反降觀于桑卜云其吉終然允臧賦也虚故城也孔氏曰故墟髙可望猶僖二十八年晉侯登有華之虚也楚楚丘也堂楚丘之旁邑也景測景以正方面也與既景迺岡之景同或曰景憬山名見商頌京髙丘也桑木名葉可飼蠶者觀之以察其土宜也愚按衛詩多言桑如桑中與氓詩及此皆再三言之葢衛地跨冀兖二州桑者尤其土所宜而民生之所資也據楚丘在冀河之東兖州之境則文公所觀所説其桑王之野乎蔡氏曰兖地宜桑如桑間濮上可驗也允信臧善也此章本其始之望鄭氏曰望楚丘與傍邑審其髙下所依倚吕東萊曰升望以領畧其大勢景愚按建國之制必先辨方辨方之法必考日景故謂之景此章景山與京先審其丘山之方向也上章揆之以日復定其宫室之方向也觀蘇氏曰降觀其下有桑土可以居民吕東萊曰降觀以細察其土宜卜李迂仲曰建國必相土地之宜土地既善然後稽之卜筮文公既有以相土地之宜矣故其後曰卜云其吉林氏曰將遷國必考之卜如綿詩曰爰契我龜楚丘之遷亦曰卜云其吉是也而言以至於終而果獲其善也王介甫曰言今信善如卜所言也劉執中曰建國之初憂民之不得其所不敢遑寧曰終然允臧者喜其果遂於志願也靈雨既零命彼倌音官人星言夙駕説始鋭反于桑田叶徒因反匪直也人秉心塞淵叶一均反騋音來牝三千叶倉新反賦也靈善零落也倌人主駕者也星見星也説舍止也秉操塞實淵深也馬七尺以上為騋言方春時雨既降而農桑之務作文公於是命主駕者晨起駕車亟棘往而勞去聲勸之王介甫曰上章既言城市宫室於是言其政事葢人君先辨方正位體國經野然後可以施政事云率古人戴星而出戴星而入必是身耐勞苦方能得人然非獨此人所以操其心者誠實而淵深也葢其所畜之馬七尺而牝者亦已至於三千之衆矣葢人操心誠實而淵深則無所為而不成其致此富盛宜矣謝疊山曰秉心也實故事事朴實不尚髙虚之談秉心也淵故事事深長不為淺近之計富國强兵豈談髙虚務淺近者之所能辨哉蘇氏曰富彊之業必深厚者為之非輕揚淺薄者之所能致也記曰問國君之富數馬以對今言騋牝之衆如此則生息之蕃可見而衛國之富亦可知矣此章又要其終而言也定之方中三章章七句按春秋傳衛懿公九年冬狄入衛懿公及狄人戰于熒螢澤而敗死焉宋桓公迎衛之遺民渡河而南立宣姜子申以廬於漕是為戴公是年卒立其弟燬是為文公于是齊桓公合諸侯以城楚丘而遷衛焉文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乗季年乃三百乗程子曰一章言建國之事次章方言相土度地之初屬文之勢然也今文首言其事然後言其初者多矣既度其可然後卜以決之卜洛亦然人謀臧則龜筮從矣卒章則叙其勤勞以致殷富愚按春秋紀事用周月定星中時乃周之十二月衛懿公九年十二月狄滅衛戴公立而卒文公繼立以次年為元年至文公三年嵗首之月齊桓始城楚丘則詩人所指定星方中其在文公元年之終楚丘未城之先歟然詩言終然允臧騋牝三千則是詩葢作于文公之季言而追言其始遷時事耳故二章以前皆本其始二章以後則要其終也序美衛文公也衛為狄所滅東徙涉河野處漕邑齊桓公攘戎狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓説脱之國家殷富焉蝃丁計反蝀都動反在東莫之敢指女子有行逺于萬反父母兄弟叶待里反比也蝃蝀虹也日與雨交倐然成質似有血氣之類乃陰陽之氣不當交而交者葢天地之淫氣也孔氏曰雙出色鮮盛者為雄曰虹暗者為雌曰蜺劉辰翁曰何獨非陰陽之交而虹獨以不正之氣著見於野詩之托物如此在東者莫暮虹也虹隨日所映故朝西而莫東也愚按虹之為質不映日不成葢雲薄漏日日映雨氣則上也今以水噀日亦成青紅之暈此刺淫奔之詩言蝃蝀在東則人不敢指以比淫奔之惡人不可道況女子有行又當逺其父母兄弟豈可不顧此而冒行乎吕東萊曰女子有行逺父母兄弟此詩葢言女子終當適人非久在家者何為而犯禮也泉水竹竿葢衛女思家言女子分當適人雖欲常在父母兄弟之側不可得也一則欲常居家而不可得一則欲亟去家而不能得其善惡可見矣朝隮子西反于西崇朝其雨女子有行逺兄弟父母叶滿補反比也隮升也周禮十煇運九曰隮注以為虹葢忽然而見如自下而升也孔氏曰視祲注云隮虹也由升也氣所為故號虹為隮輝日光氣則隮亦日之光氣矣但日東則見西日西則見東崇終也從旦至食時為終朝言方雨而虹見則其雨終朝而止矣葢淫慝之氣有害於陰陽之和也今俗謂虹能截雨信然張南軒曰蝃蝀見則雨止初無東西之分驗之多矣陰陽和則成雨陰氣方凝聚而日氣自他方來感不以正陰受其感其正反為之解散故雨不能成也輔氏曰淫慝之氣害陰陽之和以比淫奔之惡害人道之正葢理所不容也乃如之人也懐昏姻也大無信叶斯人反也不知命叶彌并反也賦也乃如之人指淫奔者而言昏姻謂男女之欲程子曰女子以不自失為信命正理也言此淫奔之人但知思念男女之欲是不能自守其貞信之節而不知天理之正也程子曰人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣以道制欲則能順命王介甫曰男女之欲性也有命焉君子不謂性也今也従欲而不知命有所制此謂不知命也輔氏曰男女之欲人所不能無也要當有以制之無以制之則失其貞信之節而有害于天理之正道即是理理即是命以道制欲則能順命去其人欲則能循乎天理矣蝃蝀三章章四句序止奔也衛文公能以道化其民淫奔之恥國人不齒也鄭氏曰不齒者不與相長稚張南軒曰宣公無道國人化之讀桑中之詩無恥如此文公復國一以身率下於是無禮者見惡於相鼠淫奔者不齒於蝃蝀下所趨向係於一人如此相息亮反鼠有皮叶蒲何反人而無儀吁牛何反人而無儀不死何為叶吾禾反興也相視也鼠蟲之可賤惡者言視彼鼠而猶必有皮可以人而無儀乎人而無儀則其不死亦何為哉相鼠有齒人而無止人而無止不死何俟叶羽已反又音始興也止容止也俟待也相鼠有體人而無禮人而無禮胡不遄死叶想止也相鼠三章章四句輔氏曰每章章末甚疾之之辭首章言威儀次章言容止末言方言禮自淺以至深以皮興儀以齒興止以體興禮亦有輕重也又曰蝃蝀相鼠二詩皆文公之化行而人心去邪反正見國人之淫奔在位之無禮為可惡而作故其辭意此他詩特為嚴厲然亦未嘗不止於禮義也嚴氏曰凡獸皆有皮齒體獨言鼠舉卑汚可惡之物以惡人之無禮也吕東萊曰相鼠之惡無禮何其如是之甚也葢溺于淫亂之俗不如是不足以自抜也疾惡不深則遷善不力序刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也孑孑居熱反干旄在浚蘇俊反之郊叶音髙素絲紕符至反之良馬四之彼姝赤朱反者子何以畀必寐反之賦也孑孑特出之貌千旄以旄牛尾注於旗干之首而建之車後也程子曰注旄干首九旗皆然浚衛邑名邑外謂之郊紕織組也葢以素絲織組而維之也四之兩服兩驂凡四馬以載之也董氏曰馬在車中為服在車外為驂姝美也子指所見之人也畀與也言衛大夫乗此車馬建此旌旄以見賢者程子曰旄旟旌皆通言耳謂卿大夫建旗而來親浚之都禮下賢者彼其所見之賢者將何以畀之而答其禮意之勤乎此是傍人見此人有好善之誠曰彼姝者子何以告之葢指賢者而言也孑孑干旟在浚之都素絲組音祖之良馬五之彼姝者子何以予音與之賦也旟州里所建鳥隼之旗也上設旌旄其下繫斿由斿下属燭縿衫三縿旗之體也孔氏曰旟亦有旌旄章互文也言旄則有旒縿言旟則有旌旄矣皆畫鳥隼也周禮司常曰烏隼為旟考工記曰鳥旟七斿以象鶉火葢畫朱鳥及隼於斿縿之上也下邑曰都五之五馬言其盛也孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告姑沃反之賦也析羽為旌干旌葢析翟羽設于旗干之首也孔氏曰孫炎云析五采羽注旄上則干之上有旄有羽又爾雅注旄首曰旌則干旄干旌一也城都城也祝屬也六之六馬極其盛而言也五之六之取協韻耳亦極言其車馬之廣見其位髙勢重而能降屈於賢者如此非心誠好善不能也干旄三章章六句此上三詩小序皆以為文公時詩葢見其列於定中載馳之間故爾他無所考也然衛本以淫亂無禮不樂善道而亡其國今破滅之餘人心危懼正其有以懲創往事而興起善端之時也故其為詩如此葢所謂生於憂患死于安樂者小序之言疑亦有所本云愚按衛俗淫亂無禮不好善道以致亡國君臣上下葢嘗溺于三者之中而不知矣逮其滅亡之餘懲往事而興善念於是淫亂者有蝃蝀之刺無禮者有相鼠之惡樂善道者又有干旄之詩非文公之更化何以臻此序美好善也衛文公臣子多好善賢者樂告以善道也定之方中一篇經文明白故序得以不誤蝃蝀以下亦因其在此而以為文公之詩耳他未有考也載馳載驅叶祛無反歸唁衛侯驅馬悠悠言至於漕叶徂侯反大夫跋蒲末反涉我心則憂賦也載則也徂失國曰唁孔氏曰昭二十五年穀梁傳曰弔失國曰唁若對弔死曰弔則弔生曰言悠悠逺而未至之貌草行曰跋水行曰涉宣姜之女為許穆公夫人閔衛之亡馳驅而歸將以唁衛侯於漕邑此詩之作在定之方中之前則未知其為戴公時歟文公時歟未至而許之大夫有奔走跋渉而來者夫人知其必將以不可歸之義來告故心以為憂既而終不果歸乃作此詩以自言其意爾輔氏曰據此詩所言則是夫人既歸而許之大夫乃追之于路而告之以不可歸之義夫許大夫何不告而止之於欲行之時乎想夫人傷宗國之亡既請于穆公而公許之故遂行焉既而大夫及國人皆以為不可遂請於穆公追而止之耳觀夫人見其大夫之至亦知其必將以不可歸之義來告而心以為憂則夫人之行亦固知其于義有不可者矣特以惻恒之情有不能自止者故為是倉卒之行焉要知其初畢竟是犯不義但能聞義而自克為可取耳既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟賦也嘉臧皆善也逺猶忘也濟渡也自許歸衛必有所渡之水也閟閉也言思之不止也言大夫既至而果不以我歸為善則我亦不能旋反而濟以至于衛矣雖視爾不以我為善然我之所思終不能自己也王介甫曰宗國顛覆變之大者人情之至痛也夫人致其思如此然後盡于人心夫人致其思大夫致其義非先王之澤孰能使人如此輔氏曰使許穆夫人知人以已為不善而竟為之則是從欲者也知人以已為不善雖不復為而情終不能自己則是發乎情而止乎禮義者也陟彼阿丘言采其蝱音盲叶謨郎反女子善懐亦各有行叶户郎反許人尤之衆穉直吏反且狂賦也偏髙曰阿丘蝱貝母主療鬱結之疾善懐多憂思也猶漢書云岸善崩也溝洫志曰引洛水至商顔下岸善崩行道尤過也又言以其既不適衛而思終不止故其在塗或升髙以舒憂想之情或采蝱以療鬱結之疾葢女子所以善懐者亦各有道而許國之衆人以為過則亦少不更事而狂妄之人爾許人守禮非穉且狂但以其不知己情之切至而言若是爾然而卒不敢違焉則亦豈真以為穉且狂也哉我行其野芃芃蒲紅反其麥叶訖力反控若貢反于大邦誰因誰極大夫君子無我有尤叶于其反百爾所思叶新齎反不如我所之賦也芃芃麥盛長貌控特而告之也因如因魏莊子之因左傳襄四年無終子使孟樂如晉因魏莊子納虎豹之皮以請和諸戎極至也大夫即跋涉之大夫君子謂許國之衆人也又言歸途而涉芃芃之麥又自傷許國之小而力不能救故思欲為之控告于大邦而又未知其將何所因而何所至乎嚴氏曰味詩意夫人葢欲赴愬於方伯以圖救衛而托歸唁為詞爾大夫君子無以我為有過雖爾所以處此有方然不如使我得自盡其心之為愈也載馳四章二章章六句二章章八句事見春秋傳愚按見閔公二年舊説此詩五章一章六句二章三章四句四章六句五章八句蘇氏合二章三章以為一章按春秋傳叔孫豹賦載馳之四章而取其控于大邦誰因誰極之意與蘇説合今從之范氏曰先王制禮父母沒則不得歸寧者義也雖國滅君死不得往赴焉義重於亡故也嚴氏曰首章婉而未露也次章欲言而未言也三章始慨然責之四章乃言其情欲控告于大邦而求其能救衛者此至哀至切之情也其後齊桓公卒救衛而存之載馳詩煞有首尾委曲詳盡非大叚㑹底説不得殷聖人錄泉水于前所以著禮之經列載馳于後所以盡事之變夫宗國覆滅莫大之變顧以父母既終而不得歸則事變之微於是可知矣然則許穆夫人非賢矣哉夀因説宣姜生衛文公宋桓夫人許穆夫人衛子以此觀之則人生自有秉彛不係氣類輔氏曰宣公宣姜之惡極矣而其子如夀如文公其女如許穆夫人宋桓夫人則皆有賢徳如是是何所觀法哉亦自强於為善耳以是知人能自强于善則惡人不能汚邪世不能亂也序許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所滅國人分散露於漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也此亦經明白而序不誤者又有春秋傳可證鄘國十篇二十九章百七十六句衛一之五瞻彼淇奥於六反綠竹猗猗於宜反叶於何反有匪君子如切如磋如琢如磨瑟兮僴遐版反兮赫兮咺況晩反兮有匪君子終不可諼況元反叶況逺反兮興也淇水名奥隈煨也劉執中曰水涯灣曲之地綠色也淇上多竹漢世猶然所謂淇園之竹是也漢志武帝塞瓠子決河薪柴少乃下淇園之竹以為楗又冦恂傳伐淇園之竹為矢百餘萬揵音健猗猗始生柔弱而美盛也匪斐通文章著見之貌也君子指武公也孔氏曰武公和僖侯子治骨角者既切以刀斧而復磋以鑢錫治玉石者既琢以槌鑿而復磨以沙石言其徳之修飾有進而無己也饒氏曰有斐君子詳此文勢是説已做成君子之人言君子之所以斐然有文者其初自切磋琢磨中來也切琢皆裁物使成形質也磋磨皆治物使其滑澤切而復磋琢而復磨言治之有叙而益致其精也瑟矜莊貌僴武嚴貌咺宣著貌諼忘也衛人美武公之徳而以綠竹始生之美盛興其學問自修之進益也愚按此釋章内上五句彭氏曰陳氏云淇之澤深矣所可見者其隈之綠竹也君子平居切磋琢磨所以學問自脩者至矣徒見其外瑟僴赫喧而不思忘之是其積於中者厚矣輔氏曰以綠竹始生之美盛興武公道學自修之進益遂言其威儀之盛而盛徳至善民不能忘則固已極其始終而言之矣大學傳曰如切如磋者道學也如琢如磨者自脩也道言也學謂講習討論之事自脩者省察克治之功既學而猶慮其未至則復講習討論以求之猶治骨角者既切之而復磋之既脩而猶慮其未至則又省察克治以終之猶治玉石者既琢之而復磨之陳安卿曰切是窮究事物之理逐件分析有倫有敘磋是講究到純熟道理瑩徹所以如切而又磋琢是克去物欲之私使無瑕類磨是磨礲至那十分純粹處所以如琢而又磨問道學自脩此詩人美武公之本㫖邪曰武公大叚是有學問底人抑之一詩義理精密詩中如此者甚不易得貢問大學傳引此詩而以道學自脩釋之與論語子所引不同何也曰古人引詩斷章取義姑以發已之志或疎或密或同或異葢不能同也瑟兮僴兮者恂峻慄也赫兮咺兮者威儀也瑟嚴密貌僴武䝘貌赫咺宣著盛大之貌恂慄戰懼也威可畏也儀可象也恂慄者嚴敬之存乎中也威儀者輝光之著乎外也有斐君子終不可諼兮者道盛徳至善民之不能忘也盛徳至善葢人心之同然聖人既先得之而其充盛宣著又如此是以民皆仰之而不能忘也盛徳以身之所得而言也至善以理之所極而言也輔氐曰觀大學傳曾子所以解此詩首章後六句之説字義明白而㫖意詳備愈讀愈有意味此方可謂之善説詩葢後之説詩者詳於訓詁則或畧於㫖意泥於㫖意則或遺於訓詁惟曾子則於字義㫖意兩皆極其至也瞻彼淇奥綠竹青青子丁反有匪君子充耳琇瑩音營㑹占外反弁如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮興也青青堅剛茂盛之貌充耳瑱殿也琇瑩美石也天子玉瑱諸侯以石㑹縫去聲也弁皮弁也以玉飾皮弁之縫中如星之明也孔氏曰弁師注云㑹縫中也皮弁之縫中結玉為飾謂之綦武公諸侯則玉用三采而璂飾七也以竹之堅剛茂盛興其服飾之尊嚴愚按此釋上五句而見其徳之稱也愚按此釋下四句瞻彼淇奥綠竹如簀音責叶側歴反有匪君子如金如錫如圭如璧寛兮綽兮猗於綺反重直恭反較古岳反兮善戲謔兮不為虐兮興也簀棧潺上聲也記檀弓注簀謂床第即床棧也竹之密比去聲似之則盛之至也愚按盛而衆也金錫言其鍜鍊之精純圭璧言其生質之温潤孔氏曰此與首章互文首章論其學問自脩如器未成之初故須切磋琢磨此論道徳之成如已成之器故言圭璧金錫寛宏裕也綽開大也猗嘆辭也重較卿士之車也較謂兩輢倚上出軾者謂車兩傍也吕和叔曰古者車箱長四尺四寸三分前一後二横一木下去車床三尺三寸謂之式又于式上二尺二寸横一木謂之較若車床凡五尺五寸古人立乗若平常則馮較若應為敬則落手憑下式而頭得俯善戲謔不為虐者言其樂易而有節也程子曰言其樂易而以禮防節不至於過是不為虐也以竹之至盛興其徳之成就愚按此釋上五句而又言其寛廣而自如和易而中節也愚按此釋下四句葢寛綽無斂束之意戲謔非莊厲之時皆常情所忽而易致過差之地也然猶可觀而必有節焉則其動容周旋之間無適而非禮亦可見矣愚按綠竹自始生猗猗以至盛多如簀則成其生矣武公由學問自脩如金錫之出于鍜鍊如圭璧之成於琢磨則成其徳矣興之取義葢如此若其寛綽而居重較則自如而猶可觀也戲謔而不為虐和易而必有節也所以能然者由其徳之全備也陳夀翁曰充耳㑹弁則以徳之稱其服言重較則以徳之稱其車言也禮曰張而不㢮文武不能也㢮而不張文武不為也一張一㢮文武之道也此之謂也鄭氏曰君子之徳有張有弛故不常矜莊而時戲謔陳君舉曰古人張不廢弛屏不廢逞肅肅不廢雝雝僮僮不廢祁祁有所拘者必有所従也愚按前章瑟僴赫咺張之時也此章寛綽戲謔弛之時也淇奥三章章九句按國語武公年九十有五猶箴儆于國曰自卿以下至于師長士苟在朝者無謂我老耄而舍我必恪恭於朝以交戒我遂作懿讀為抑戒之詩以自警而賔之初筵亦武公悔過之作則其有文章而能聴規諌以禮自防也可知矣衛之他君葢無足以及此者故序以此詩為美武公而今從之也陳文蔚問曰武公進徳成徳之序始終可見一章言如切磋琢磨則學問自修之精密如此一章言威儀服飾之盛有諸中而形諸外也三章言如金錫圭璧則鍜鍊已精温純深粹而徳器成矣前二章皆有瑟僴赫咺之辭三章但言寛綽戲謔而已於此可見不事矜特而周旋中禮之意曰説得甚善武公學問之功甚不苟年九十五猶命羣臣使進規諌畢竟他去聖人近氣象自是不同序美衛武公之徳也有文章又能聴其規諌以禮自防故能入相于周美而作是詩也此序疑得之考槃在澗叶居賢反碩人之寛叶區權反獨寐寤言永矢弗諼況元反賦也考成也槃盤桓之意言成其隠處之室也陳氏曰考扣也槃器名葢扣之以節歌如鼓盆拊缶之為樂洛也二説未知孰是山夾水曰澗碩大寛廣永長矢誓諼忘也詩人美賢者隠處澗谷之間而碩大寛廣無戚戚之意雖獨寐而寤言猶自誓其不忘此樂也嚴氏曰碩人之寛易所謂肥遯者也陳少南曰碩人在澗考槃樂歌天子不得而臣諸侯不得而友雖寐寤永誓不忘此樂考槃在阿碩人之薖苦禾反獨寐寤歌永矢弗過古禾反賦也曲陵曰阿薖義未詳或云亦寛大之意也永矢弗過自誓所願不踰於此若將終身之意也輔氏曰退而窮處偪仄甚矣而能寛大自樂若將終身焉葢無入而不自得也考槃在陸碩人之軸獨寐寤宿永矢弗告如沃反賦也髙平曰陸軸盤桓不行之意蘇氏曰盤栢不行從容自廣之謂也寤宿已覺而猶卧也弗告者不以此樂告人也考槃三章章四句孔叢子子曰吾于考槃見遯世之士無聞于世輔氏曰孔叢子所記深得詩意序刺莊公也不能繼先公之業使賢者退而窮處此為美賢者窮處而能安其樂之詩文意甚明然詩文未有見棄於君之意則亦不得為刺莊公序葢失之而未有害於義也至於鄭氏遂有誓不忘君之惡誓不過君之朝誓不告君以善之説則其害義又有甚焉於是程子易其訓詁以為陳其不能忘君之意陳其不能過君之朝陳其不得告君以善則其意忠厚而和平矣然未知鄭氏之失生于序文之誤若但直據詩詞則與其君初不相涉也碩人其頎其機反衣於既反錦褧苦迥反衣齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私賦也碩人指莊姜也頎長貌孔氏曰猗嗟云頎而長兮錦文衣也褧禪單同也錦衣而加褧焉為其文之大著也褧儀禮作景禮記作絧古注以為禪衣所以襲錦衣者沈存中謂褧與檾同是用檾麻織疏布為之不知是否嚴氏曰褧以縠為之東宫太子所居之宫齊太子得臣也繫太子言之者明與同母言所生之貴也女子後生曰妹妻之姊妹曰姨姊妹之夫曰私邢侯譚公皆莊姜姊妹之夫互言之也蘇氏曰邢周公之後譚近齊孔氏曰春秋譚子奔莒則譚子爵吕東萊曰白虎通云臣子於其國中皆褒其君為公諸侯之子嫁于諸侯則尊同故歴言之愚按歴言此者以見莊姜之姊妹與莊公之姻姬其尊皆同也荘姜事見邶風綠衣等篇春秋傳曰莊姜美而無子衛人為之賦碩人即謂此詩而其首章極稱其族類之貴以見其為王嫡小君所宜親厚而重歎莊公之昏惑也孔氏曰其父母兄弟皆正大如此君何為不荅之乎嚴氏曰風人不直言莊姜不見荅之事但首章歴述其親族欲讀之者知其為莊姜則不見答之事國人自知之不待察察言之矣手如柔荑徒兮反膚如凝脂領如蝤似脩反躋音齊齒如瓠户故反犀螓音秦首蛾我波反眉巧笑倩七薦反兮美目盻匹莧反叶匹見反兮賦也茅之始生曰荑言柔而白也凝脂脂寒而凝者亦言白也領頸也蝤蠐木蟲之白而長者本草注曰郭璞云腐木根下有之瘦而白瓠犀瓠中之子方正潔白而比次整齊也螓如蟬而小其額廣而方正鄭氏曰螓蜻蜻蛾蠶蛾也其眉細而長曲倩口輔之美也孔氏曰服䖍云輔上頷車也是牙外之皮膚頰下之别名也盼白黒分明也此章言其容貌之美猶前章之意也鄭氏曰説莊姜容貌之美所宜親幸也碩人敖敖五刀反説始鋭反于農郊叶音髙四牡有驕起橋反叶音髙朱幩符云反鑣鑣表驕反叶音褒翟茀音弗以朝直遙反叶直豪反大夫夙退無使君勞賦也敖敖長貌説舍也農郊近郊也四牡車之四馬驕壯貌幩鑣飾也鑣者馬銜外鐵人君以朱纒之也鑣鑣盛也孔氏曰言以朱飾鑣而鑣鑣然盛翟翟車也夫人以翟羽飾車茀蔽也婦人之車前後設蔽孔氏曰婦人下露見車前後設障謂之茀因以翟羽為飾夙早也玉藻曰君日出而視朝鄭氏曰朝内朝路寢門外之正朝也退適路寢聴政使人視大夫大夫退然後適小寢釋服鄭氏曰小寢燕寢也釋服服𤣥端孔氏曰君出視朝畢乃適路寢以待大夫之所諮決事之多少大夫所主故大夫退然後罷此言莊姜自齊來嫁舍止近郊乗是車馬之盛以入君之朝國人樂得以為莊公之配故謂諸大夫朝於君者宜早退無使君勞于政事不得與夫人相親而歎今之不然也嚴氏曰君之不答莊姜惑于嬖妾之故也而此詩以為無使君勞母之不安其室淫風流行之故也而凱風以為勞苦而然風人之詞婉矣河水洋洋北流活活古濶反叶户劣反施罛音孤濊濊呼活反叶許月反鱣陟連反鮪于軌反發發補末反叶方月反葭音加菼他覽反掲掲易謁反庶姜孽孽魚竭反庶士有朅欺列反賦也河在齊西衛東北流入海洋洋盛大貌活活流貌施設也罛魚罟濊濊罟入水聲也説文曰濊礙流也鱣魚似龍黄色鋭頭口在頷下背上腹下皆有甲大者千餘斤孔氏曰鱣魚體有邪行甲無鱗大者長二三丈江東呼為黄魚鮪似鱣而小色青黒孔氏曰陸璣云鮪頭小而尖似鐵兠鍪口亦在頷下其甲可以摩薑大者不過七八尺一名鮥肉色味不如鱣也鍪音矛鮥音洛發發盛貌菼薍頑去聲也亦謂之荻掲掲長也庶姜謂姪娣孽孽盛飾也庶士謂媵臣朅武貌言齊地廣饒而夫人之來士女佼好禮儀盛備如此亦首章之意也碩人四章章七句孔氏曰此詩皆陳莊姜宜於見荅而君不親也嚴氏曰此詩無一語及莊姜不見答之事但言其姻族之貴容貌之美禮儀之備又言齊地廣饒士女俊好以深寓其憫惜之意而已惟大夫夙退無使君勞二句㣲見其意而辭亦深婉風人之詞大抵然也胡庭芳曰黄氏云綠衣詩言嬖妾之不當僣而僣碩人詩言夫人之宜見答而不見答也輔氏曰觀邶風燕燕等篇則莊姜之徳行文章皆未易及而此詩不之言何也曰此但指其人所易見者以刺莊公之昏惑而不知耳莊姜之美則固不止此也序閔莊姜也莊公惑於嬖妾使驕上僣莊姜賢而不荅終以無子國人閔而憂之此序據春秋傳得之氓之蚩蚩尺之反抱布貿莫豆反絲叶新齎反匪來貿絲來即我謀叶謨悲反送子涉淇至于頓丘叶袪奇反匪我愆期子無良媒叶謨悲反將七羊反子無怒秋以為期賦也氓民也葢男子而不知其誰何之稱也始見其來莫知其為誰何也既與之謀則爾汝之矣此言之序也蚩蚩無知之貌葢怨而鄙之也布幣孔氏曰幣者布帛之名貿買也釋文曰交易也貿絲葢初夏之時也頓丘地名嚴氏曰在朝歌之東漢志陳郡有頓丘縣師古云以丘為縣也丘一成為頓丘謂一頓而成也愆過也將願也請也此淫婦為人所棄而自敘其事以道其悔恨之意夫既與之謀而不遂往又責所無以難其事再為之約以堅其志此其計亦狡矣以御蚩蚩之氓宜其有餘而不免於見棄葢一失其身人所賤惡始雖以欲而迷後必以時而悟是以無往而不困耳士君子立身一敗而萬事瓦裂者何以異此可不戒哉輔氏曰讀先生之説令人惕然知戒不敢有一毫自恕之意也乗彼垝俱毁反垣音袁以望復闗叶圭員反不見復闗泣涕漣漣音連既見復闗載笑載言爾卜爾筮體無咎言以爾車來以我賄呼罪反遷賦也垝毁垣墻也復闗男子之所居也不敢顯言其人故託言之耳龜曰卜蓍曰筮體兆卦之體也龜嵗久則靈蓍生百年一本百莖亦物之靈者卜筮實問鬼神以蓍龜神靈之物故假之以騐其卦兆卜法以明火爇柴灼龜為兆筮法以四十九著分卦捰扐凡十八變而成卦孔氏曰兆卦之體謂龜兆筮卦也故左傳曰一薰一蕕十年尚有臭是龜之繇易曰困于石據于蒺藜是卦之繇二者皆有繇詞也繇音由賄財遷徙也與之期矣故及期而乗垝垣以望之既見之矣於是問其卜筮所得卦兆之體君無凶咎之言輔氏曰此章可見古人之尚卜筮然使其知易為君子謀不為小人謀則亦不敢求之筮矣愚按卜筮之法所以開物成務定天下之吉凶成天下之亶亹者曾謂有淫人之凟問而尚得無凶咎之言乎以其猶能自疑而欲決之也則請以蒙之六三告之葢使此氓而知勿用取行不順之戒此女而知不有躬無攸利之戒則必各求正應豈復至于相棄也哉則以爾之車來迎當以我之賄往遷也桑之未落其葉沃若于音吁下同嗟鳩兮無食桑葚音甚叶知林反于嗟女兮無與士耽叶持林反士之耽兮猶可説也女之耽兮不可説也比而興也沃若潤澤貌鳩鶻音骨鳩也似山雀而小短尾青黒色多聲嚴氏曰即莊子所謂鷽鳩也郭璞云似山鵲呼為鶻鵃音骨朝本草曰鶻鵃尾短黄色多聲葚桑實也鳩食葚多則致醉耽相樂也説解也言桑之潤澤以北己之容色光麗然又念其不不可恃此而從欲忘反故遂戒鳩無食桑葚以興下句戒女無與士耽也愚按此章比自比興自興下例泉則就以比辭起興葢有兩後凡言比而興者各以文意求之可也士猶可説而女不可説者婦人被棄之後深自愧悔之辭主言婦人無外事唯以貞信為節一失其正則餘無足觀耳不可便謂士之耽惑實無所妨也鄭氏曰士有百行可以功過相揜婦人唯以貞信為節愚按集傳所謂主言者葢以此婦立言之意專主于言婦人不可一失其節故其辭意抑揚重于女而輕于男非謂男有可耽之理而無所妨玩詩文猶之一字意亦可見讀者當不失性情之正也桑之落矣其黄而隕叶于貧反自我徂爾三嵗食貧淇水湯湯音傷漸子亷反車帷裳女也不爽叶師莊反士貳其行下孟反叶户郎反士也罔極二三其徳比也隕落徂往也湯湯水盛貌漸漬也帷裳車飾亦名童容婦人之車亦有之孔氏曰以帷障車之傍如裳以為容飾故謂童容爽差極至也言桑之黄落以比己之容色凋謝遂言自我往之爾家而值爾之貧於是見棄復乗車而渡水以歸復自言其過不在此而在比也輔氏曰女也不爽此但言其誓約之言不差耳豈不悔其初之失哉雖云曲不在己殊不知始既如此則終固宜然也愚按此婦首稱曰氓繼而曰子繼而曰爾又繼而謂之士繼而復曰爾又復曰士或鄙之或親之或貴之此所以為怨婦之辭歟三嵗為婦靡室勞矣夙興夜寐靡有朝叶直豪反矣言既遂矣至于㬥矣兄弟不知咥許意反其笑叶音燥矣靜言思之躬自悼矣賦也靡不夙早興起也咥笑貌言我三嵗為婦盡心竭力不以室家之務為勞早起夜卧無有朝旦之暇與爾始相謀約之言既遂而爾遽以暴戾如我兄弟見我之歸不知其然但咥然其笑而已葢淫奔従人不為兄弟所齒故其見棄而歸亦不為兄弟所恤理固有必然者亦何所歸咎哉但自痛悼而已及爾偕老老使我怨淇則有岸叶魚戰反隰則有泮音畔叶匹見反總角之宴言笑晏晏叶伊佃反信誓旦旦叶得絹反不思其反叶孚絢反反是不思叶新齎反亦已焉哉叶將黎反賦而興也及與也泮涯也髙下之判也總角女子未許嫁則未笄但結髮為飾也孔氏曰但結其髮為兩角晏晏和柔也旦旦明也言我與汝本期偕老不知老而見棄如此徒使我怨也愚按詩言總角之宴則此女未笄而已奔矣又言老使我怨則至老而後見棄也故前章以桑之黄落自此其色之衰也所謂三嵗為婦三嵗食貧者言其在夫家貧勞之嵗月耳淇則有岸矣隰則有泮矣而我總角之時與爾宴樂言笑成此信誓曾不思其反復以至於此也此則興也愚按此章興在賦外他章亦有就賦其事以起興如黍離之類者葢亦有兩例也後凡言賦而興者當各以其文意求之既不思其反復而至於此矣亦如之何哉亦已而已矣傳曰思其終也思其復也思其反之謂也襄公二十五年注曰思使終可成思其可復行也輔氏曰靜言思之躬自悼矣反是不思亦已焉哉皆悔恨之極也大凡人之處事須當思其反不然鮮有不惂干凶咎者欲心一縱則必不能思其反耳氓六章章十句劉執中曰夫婦者五品之本匹配雖自于人謀義理實根于天地順其道者足以安于其位逆其理者無以保于其生葢肇有人倫以來未有違理犯義終其身而弗悔者此氓詩之所由作也輔氏曰谷風與氓二詩皆怨然谷風雖怨而責之其辭直葢其初以正也氓之詩則怨而悔之耳其辭隠葢其初之不正也嘗謂二詩皆出于衛之婦人其文辭次序雖後世工文之士所不能及然考其行則一賢一否如是之不同所謂有言者不必有徳豈不信哉愚按此詩及邶谷風皆棄婦所作故其辭意多同桑之黄隕即涇濁之色也食貧靡勞即方舟泳游之苦也至于暴戾即有洸有潰之意也偕老而使我怨即既生育而比子于毒也然則宴爾新昏以我御窮則其過今在于夫女之耽兮不可説也則其過昔在于已今之過在夫故可責其不念昔者之來塈昔之過在已故終于自悔昔者之不思其反此詩自悔之深固不得如谷風歸怨之深也序刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也此非刺詩宣公未有考故序其事以下亦非是其曰美反正者尤無理籊籊他歴反竹竿以釣于淇豈不爾思逺莫致之賦也籊籊長而殺去聲也竹衛物淇衛地也衛女嫁於諸侯思歸寧而不可得故作此詩言思以竹竿釣于淇水而逺不可至也輔氏曰豈不爾思者言固不能不思也逺莫致之者以義有不可故託以逺而不能致耳泉源在左淇水在右叶羽軌反女子有行逺于萬反兄弟父母叶滿彼反賦也泉源即百泉也在衛之西北而東南流入淇故曰在左淇在衛之西南而東流與泉源合故曰在右胡庭芳曰以北為左南為右思二水之在衛而自歎其不如也輔氏曰女子有行逺父母兄弟安之之辭淇水在右泉源在左巧笑之瑳七可反佩玉之儺乃可反賦也瑳鮮白色笑而見齒其色瑳然猶所謂粲然皆笑也儺行有度也承上章言二水在衛而自恨其不得笑語遊戲於其間也淇水滺滺音由檜楫松舟駕言出遊以寫我憂賦也滺滺流貌檜木名似柏毛氏曰檜栢葉松身孔氏曰禹貢栝栢注栢葉松身曰栝與此一也楫所以行舟也與泉水之卒章同意竹竿四章章四句蘇氏曰泉水載馳竹竿皆異國詩而在衛者以其聲衛聲歟記曰鄭聲好濫淫志衛音促數煩志齊音傲僻驕志葢諸國之音未有同者衛女思歸而作詩其為衛音也宜序衛女思歸也適異國而不見答思而能以禮者也未見不答之意芄音丸蘭之支童子佩觿許規反雖則佩觿能不我知容兮遂兮垂帶悸其季反兮興也芄蘭草一名蘿摩蔓生斷之有白汁可啖淡注本草曰幽州人謂之雀瓢支枝同董氏曰石經作枝説文同觿錐也以象骨為之所以解結成人之佩非童子之飾也知猶智也言其才不足以知于我也容遂舒緩放肆之貌悸帶下垂之貌芄蘭之葉童子佩韘失涉反雖則佩韘能不我甲叶古恊反容兮遂兮垂帶悸兮興也韘決也以象骨為之著斫右手大指所以鈎弦闓開體鄭氏曰沓也即大射所謂朱極三是也以朱韋為之用以彄摳沓右手食指將指無名指也儀禮大射小射正取决興賛設決朱極三鄭氏曰極猶放也所以韜指利放弦也三者食指將指無名也甲長也言其才能不足以長于我也芄蘭二章章六句輔氏曰牆有茨傳謂宣公卒惠公幼而杜預又謂惠公即位時方十五六則小序以此詩屬之惠公亦可但他無所見而詩文又不明言其所以故先生直斷以為不知所謂不敢强斷也闕疑之義若必為刺衛惠公則便至有依託鑿空之失也序刺惠公也驕而無禮大夫刺之此詩不可考當闕誰謂河廣一葦韋鬼反杭户郎反之誰謂宋逺跂丘跂反予望叶武方反之賦也葦兼葭之属杭度也衛在河北宋在河南宣姜之女為宋桓公夫人生襄公而出歸于衛襄公即位夫人思之而義不可往葢嗣君承父之重與祖為體母出與廟絶不可以私反故作此詩言誰謂河廣乎但以一葦加之則可以渡矣誰謂宋國逺乎但一跂足嚴氏曰跂舉腫也脚跟音根不著地而望則可以見矣明非宋逺而不可至也乃義不可而不得往耳嚴氏曰箋謂宋襄即位其母思之而作河廣之詩疏因以為衛文公時非也衛都朝歌在河北宋都睢陽在河南自衛適宋必涉河衛自魯閔二年狄入之後戴公始渡河而南河廣之詩言誰謂河廣一葦杭之則是作於衛未遷之前矣時宋桓猶在㐮公方為世子衛戴文俱未立也舊説誤矣疏以河廣属衛風當為衛人所作非宋㐮公母所親作然宋襄公母本衛女又歸衛而作此詩不屬之衛何所屬乎誰謂河廣曾不容刀誰謂宋逺曾不崇朝賦也小船曰刀不容刀言小也崇終也行不終朝而至言近也嚴氏曰刀舠古字通用輔氏曰但言非河之廣而不可渡非宋之逺而不可見以極其情思焉而終不往言其義之不得往也此意最可玩范氏以為知禮而畏義者得之矣河廣二章章四句范氏曰夫人之不往義也天下豈有無母之人歟有干乗之國而不得養其母則人之不幸也為襄公者將若之何生則致其孝沒則盡其禮而已衛有婦人之詩自共姜至于襄公之母六人焉皆止於禮義而不敢過也夫以衛之政教淫僻風俗傷敗然而女子乃有知禮而畏義如此者則以先王之化猶有存焉故也輔氏曰范氏為襄公處者得其義矣所謂先王之化猶有存焉即大序所之謂止乎禮義先王之澤也必如此等詩方可當伯兮朅丘列反兮邦之桀兮伯也執殳市朱反為王前驅賦也伯婦人目其夫之字也朅武貌桀才過人也殳長丈二而無刀婦人以夫久從征役而作是詩言其君子之才之美如是今方執殳而為王前驅也輔氏曰先言其君子之才之美如是而後言方執殳而為王前驅則是惜其用之不得其所也自伯之東首如飛蓬豈無膏沭誰適都歴反為容賦也蓬草名其華如柳絮聚而飛如亂髮也膏所以澤髮者沐滌首去垢也適主也言我髮亂如此非無膏沐可以為容所以不為者君子行役無所主而為之故也傳曰女為説已容輔氏曰此其真情也東萊吕氏曰膏所以膏首面沭葢潘也左傳遺之潘沐杜預云潘米汁可以沐頭魯遣展喜以膏沐勞齊師則膏非專婦人用也胡庭芳曰内則女事父母舅姑五日潭湯請浴三日具沐其間面垢燂潘請沐足垢燂湯請洗注潘浙米汁靧洗面其雨其雨杲杲古老反出日願言思伯甘心首疾比也其者冀其將然之辭冀其將雨而杲然日出以比望其君子之歸而不歸也是以不堪憂思之苦而寧甘心于首疾也輔氏曰冀其歸而復不歸則其憂思為尤甚焉於䖍反得諼况袁反草言樹之背音佩願言思伯使我心痗呼内反賦也諼忘也諼草合歡食之令人忘憂者本草注曰一名鹿葱其花名宜男懐胎婦人佩其花生男也萱草味甘令人好歡樂忘憂背北堂也孔氏曰房室所居之地總謂之堂房半以北為北堂房半以南為南堂李寶之曰北堂有北階賈氏云房與室相連為之房無北壁故得北堂之名愚按北堂背南向北故謂之背痗病也言焉得忘憂之草樹之北堂以忘吾愛乎北堂葢古之植花草之處然終不忍忘也是以寧不求此草而但願言思伯雖至於心痗而不辭爾心痗則其病益深非特首疾而已也伯兮四章章四句范氏曰居而相離則思期而不至則憂此人之情也文王之遺戍役周公之勞歸士皆敘其家室之情男女之思以閔之故其民悦而忘死聖人能通天下之志是以能成天下之務兵者毒民於死者也孤人之子寡人之妻傷天地之和召水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷慘怛不啻在己是以治世之詩則言其君上閔恤之情亂世之詩則錄其室家怨思之苦以為人情不出乎此也輔氏曰范氏之説誠足以詔萬世人君而知此義則知謹重於用兵矣至于所謂治世之詩則述其君上憫恤之情亂世之詩則録其室家怨思之苦以為人情不出乎此者又深得聖人錄詩之意李迂仲曰古者師出不逾時所以重民力也春秋時用兵多矣未有書師還者獨於莊公八年書之以見逾時不反也然采薇之役逾年而歸東山之師三年而至詩人乃美之者葢用之得其道則民無怨懟之心不得其道則逾時之久而人怨矣序刺時也言君子行役為王前驅過時而不反焉舊説以詩有為王前驅之文遂以此為春秋所書従王伐鄭之事然詩人又言自伯之東則鄭在衛西不得為此行矣序言為王前驅葢用詩文然似未識其文意也吕東萊曰為王前驅特詩中之一語非大義也有狐綏綏在彼淇梁心之憂矣之子無裳比也狐者妖媚之獸綏綏獨行求匹之貌嚴氏曰狐性淫又多疑綏綏然獨行而遲疑有求匹之意無妻之人也本草曰狐鼻尖尾大善為妖魅石絶水曰梁在梁則可以裳矣國亂民散喪其妃耦有寡婦見鰥夫而欲嫁之故託言有狐獨行而憂其無裳也謝疊山曰見鰥夫無人縫裳而有憂則其情可知矣因其有言者以探其不言者可以言風人之㫖矣有狐綏綏在彼淇厲心之憂矣之子無帶叶丁計反比也厲深水可涉處也帶所以申束衣也在厲則可以帶矣有狐綏綏在彼淇側心之憂矣之子無服叶蒲比反比也濟乎水則可以服矣有狐三章章四句序刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏㑹男女之無夫家者所以育人民也男女失時之句未安其曰殺禮多昬者周禮大司徒以荒政十有二聚萬民十曰多昬者是也序者之意葢曰衛於此時不能舉此之政耳然亦非詩之正意也長樂劉氏曰夫婦之禮雖不可不謹於其始然民有細微貧弱者或困于凶荒必待禮而後昏則男女之失時者多無室家之養聖人傷之寧邦典之或違而不忍失其婚嫁之時也故有荒政多昏之禮所以使之相依以為生而又以育人民也詩不云乎愷悌君子民之父母苟無子育兆庶之心其能若此哉此則周禮之意也投我以木瓜叶攻乎反報之以瓊琚音居匪報也永以為好呼報反也比也木瓜楙茂木也實如小𤓰酢可食本草曰木狀如奈花生于春末深紅色其實大者如𤓰小者如拳爾雅謂之㮊徐氏曰𤓰有𤓰瓞桃有羊桃李有雀李此皆枝蔓也故言木𤓰木桃木李以別之也瓊玉之美者琚佩玉名孔氏曰瓊非玉名也琚瑶玖三者互言琚言佩玉名瑤玖亦佩玉名言人有贈我以微物我當報之以重寶而猶未足以為報也但欲其長以為好而不忘耳疑亦男女相贈荅之詞如靜女之類投我以木桃報之以瓊瑤匪報也永以為好也比也瑤美玉也投我以木李報之以瓊玖音久叶舉里反匪報也永以為好也比也玖亦玉名也説文曰玖玉黒色孔氏曰丘中有麻傳云玖石次玉者是玖非全玉也木瓜三章章四句序美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也説見本篇愚按桓公封衛以王法律之固為春秋之罪人自衛人視之則天地再造之恩也果如序説則桓公之徳僅可比于草木之實而衛人之報者未見乃遽自擬以重寶尚為知恩也哉序説非詩意矣集傳固不得從之也衛國十篇三十四章二百三句張子曰衛國地濵大河其地土薄故其人氣輕浮其地平下故其人質柔弱其地肥饒不費耕耨故其人心怠惰其人情性如此則其聲音亦淫靡故聞其樂使人懈慢而有邪僻之心也鄭詩放此輔氏曰鄭衛之俗淫靡非獨習俗之弊葢亦風土所致張子發此説可謂能通天地人矣陳夀翁曰此説大槩為淫詩言耳鄘柏舟定中淇奥等篇不在此限詩傳通釋卷三
