body:
  text: 詩傳通釋卷二十元劉瑾撰詩朱子集傳魯頌四之四魯少皥之墟在禹貢徐州䝉羽之野成王以封周公長子伯禽今襲慶東平府沂密海等州即其地也愚按襲慶府令兖州路東平府今東平路海州今寧海州與沂州密州並屬山東東西道成王以周公有大勳勞於天下故賜伯禽以天子之禮樂魯於是乎有頌以為廟樂其後又自作詩以美其君亦謂之頌王晦叔曰魯頌皆以美其君於宗廟無預其詩似用以燕樂此頌之變也吳必大問頌是告於神廟魯頌中如戎狄是膺荆舒是懲僖公豈有此事曰是頌禱之詞耳嚴氏曰魯頌頌之變也周之衰也風變而雅頌亡頌聲之恖前乎風雅之變矣越桓莊僖惠至襄而魯乃有頌是故雅變而亡頌亡而變雅之亡甚于變頌之亡甚于變也舊說皆以為伯禽十九世孫僖公申之詩孔氏曰從周公數之故為十九世今無所考獨閟宫一篇為僖公之詩無疑耳夫以其詩之僣如此然夫子猶録之者蓋其體固列國之風而所歌者乃當時之事則猶未純於天子之頌孔氏曰雖名為頌而體實國風非告神之歌又曰頌詠魯公功德才如變風之美者耳曹氏曰今以其體觀之分章斷句實國風之流耳若其所歌之事又皆有先王禮樂教化之遺意焉則其文疑若猶可豫也况夫子魯人亦安得而削之哉然因其實而著之而其是非得失自有不可掩者亦春秋之法也著之於篇所以見其僣也春秋書郊禘大雩雉門雨觀亦此意也削之則沒其實矣蓋其文豫之而實則不豫也考索某氏曰亦如存淫亂之詩使後世有見其非耳非謂其言之當也或曰魯之無風何也先儒以為時王褒周公之後比於先代故巡守不陳其詩而其篇第不列於太師之職是以宋魯無風其或然歟蘇八曰春秋之際大國皆有變風宋魯獨無風有頌守鄭氏云宋王者之後魯聖人之後是以天子巡不陳其詩所以禮之也或謂夫子有所諱而削之則左氏所記當時列國大夫賦詩及吳季子觀周樂皆無曰魯風者其說不得通矣駉駉古榮反牡馬叶滿補反在坰古榮反之野叶上與反薄言駉者叶章與反有驈尸橘反有皇有驪力知反有黃以車彭彭叶鋪郎反思無疆思馬斯臧賦也駉駉腹幹肥張貌邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰鄭氏曰必牧於坰野者避民居與良田也驪馬白跨曰驈孔氏曰驪黑色跨髀間也跨者所跨據之處黃白曰皇孔氏曰黃而微白色雜名皇純黑曰驪孔氏曰檀弓云夏后氏尚黑戎事乘驪故知純黑曰驪黃騂曰黃孔氏曰騂者赤色謂黃而微赤者也彭彭盛貌言其思之深廣無窮也臧善也此詩言僖公牧馬之盛由其立心之達輔氏曰僖公當作魯侯前云唯閟宫一篇為僖公之詩餘則無所考則不應於此定以為僖公也夫人立心既逺則所成必厚大凡富厚之事率非輕易浮淺者之所能致故美之曰思無疆則思馬斯臧矣衛文公秉心塞淵而騋牝三千亦此意也吕與叔曰僖公修政以誠心行之故言思無疆思無期思無繹思無邪馬之所以臧才作徂者其效也興衛風秉心塞淵騋北三千之意同古之賢君誠心以行善政其效皆若此非獨牧馬而已段氏曰苟思馬而馬善則凡其思慮之所及者無不善矣埤雁曰百里奚爵祿不入於心故飯牛而牛肥思無疆思馬斯臧殆此之謂也愚按美文公之馬則言其騋而北者有三千之衆美僖公之馬則言其駉而牡者有十六種之毛色蓋各極其盛而言皆以見其國之殷富也駉駉牡馬在坰之野薄言駉者有騅音佳有駓符悲反有騂有騏以車伾伾符丕反思無期思馬斯才叶前西反賦也倉白雜毛曰騅孔氏曰雜毛是二色相間雜上六黃白曰黃黃騂曰黃止一毛色之中自有淺深與此二色者異故不言雜毛也黃白雜毛曰駓孔氏曰今桃華馬也赤黃曰騂孔氏曰周人尚赤而牲用騂是騂為純赤言赤黃者謂其赤而黃其色鮮明者上云黃騂曰黃謂黃而微赤此云赤黃曰騂謂赤而微黃青黑曰騏孔氏曰青而微黑今之驄馬也伾伾有力也無期猶無疆也才材力也駉駉牡馬在坰之野薄言坰者有驒徒河反有駱有駵有雒以車繹繹叶弋灼反思無斁叶弋灼反思馬斯作賦也青驪驎曰驒色有深淺斑駁如魚鱗今之連錢驄也白馬黑鬛曰駱赤身黑鬛曰駵孔氏曰鬛馬騣駵為赤色若身鬛俱赤則騂馬故赤身黑鬛曰駵黑身白鬛曰雒繹繹不絶貌毛氏曰繹繹善走也斁厭也作奮起也駉駉牡馬在坰之野薄言駉者有駰音因有騢音遐叶洪孤反有驔音簟有魚以車袪袪起居反思無邪叶祥余反思馬斯徂賦也隂白雜毛曰駰陰淺黑色今泥驄也彤白雜毛曰騢孔氏曰彤赤也今赭白馬也豪骭間去聲曰驔豪在骭而白也孔氏曰骭腳脛蓋膝下之名二目白曰魚似魚目也孔氏曰爾雅云一目白瞷二目白魚袪袪彊健也徂行也孔子曰詩三百一言以蔽之曰思無邪蓋詩之言美惡不同或勸或懲皆有以使人得其情性之正如正風雅頌等詩可以起人善心如變風刺淫等詩可以使人知戒懼人讀好底詩固是知勸若讀不好底詩便知得此心不可如此所以讀詩者便思無邪也蓋詩之功用如此又曰所謂得情性之正者情性是貼思字正是貼無邪字此乃做時文相似然其明白簡切通于上下未有若此言者故特稱之以為可當三百篇之義以其要為不過乎此也學者誠能深味其言而審於念慮之間必使無所思而不出於正則日用云為莫非天理之流行矣彭氏曰夫子教人學詩之法思無邪一言乃學者之摳要也愚按詩之為教無非欲人得其情性之正然就詩經而指其要以示人則唯思無邪之語既明白簡切而足明各詩之直指又通於上下而足該衆詩之全體比於其他詩詞則多微婉而或不能明白簡切各言一事而或不能通于上下故夫子獨稱思無邪之一言以示學詩者守約施博之道誠意正心之方也蘇氏曰昔之為詩者未必知此也孔子讀詩至此而有合於其心焉是以取之蓋斷章云爾駉四章章八句序頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重榖牧于坰野魯人尊之於是季孫行父請命於周而史克作是頌孔氏曰克於文公時作魯史此序事實皆無可考詩中亦未見務農重穀之意序說鑿矣有駜蒲必反有駜怭彼乘繩證反黃夙夜在公明明叶謨郎反振振鷺鷺于下叶後五反鼓咽咽烏𤣥反醉言舞于胥樂音洛兮興也駜肥强貌明明辨治也歐陽子曰明明修明其職也振振羣飛貌鷺鷺羽舞者所持或坐或伏如鷺之下也咽與淵同鼓聲之深長也或曰鷺亦興也毛氏曰鷺興潔白之士也歐陽子曰取其修潔翔集有威儀也鄭氏曰潔白之士羣集於朝君與之飲酒以鼓節之咽咽然胥相也醉而起舞以相樂也此燕飲而頌禱之祠也愚按此為燕飲之詩唯卒章自今以始以下則頌禱之辭也有駜有駜駜彼乘牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮興也鷺于飛舞者振作鷺羽如飛也曹氏曰上章醉言舞以樂成之也此章醉言歸以禮節之也有駜有駜駜彼乘駽呼縣反夙夜在公在公載燕自今以始歲其有叶羽已反君子有穀詒孫豫叶奬里反于胥樂兮興也青驪曰駽今鐵驄也載則也有有年也穀善也曹氏曰君民如此治道得矣復何為哉若自此年穀常登子孫相承力於為善則無疆之休也或曰祿也貽遺也蘇氏曰願其君富且有後也頌禱之詞也有駜三章章九句輔氏曰駜彼乘黃恐是指來燕者所乘之馬故因以起興在公明明所謂精白一心以承休德也自今以始嵗其有為庶民之慮切矣君子有穀詒孫子為後世之慮深矣此可謂善頌善禱矣序頌僖公君臣之有道也此但燕飲之詩未見君臣有道之意思樂音洛泮普半反水薄采其芹其斤反魯侯戾止言觀其旗叶其斤反其旗茷茷蒲害反鸞聲噦噦呼㑹反無小無大從公于邁賦其事以起興也思發語辭泮水泮宫之水也諸侯之學鄉射之宫謂之泮宫其東西南有水形如半璧以其半於辟雍故曰泮水而宫亦以名也鄭氏曰辟雍者桀土壅水之外圓如璧四方來觀者均也泮之言半也泮水者蓋東西門以南通水北無也芹水菜也本草曰水芹一名水英可作菹味戾至也茷茷飛揚也噦噦和也李迂仲曰無小無大從公于邁國人無長幼皆從公而往以見國人從僖公之樂也又曰如漢明帝開辟雍冠帶縉紳之人園橋門而觀聽者蓋億萬計此飲於泮宫而頌禱之詞也愚按首章本其始而言魯侯與其衆至泮宫也三章以後然後言飲酒頌禱之事思樂泮水薄采其藻魯侯戾止其馬蹻蹻居表反其馬蹻蹻其音昭昭叶之繞反載色載笑匪怒伊教賦其事以起興也蹻蹻盛貌色和顔色也輔氏曰其音昭昭集傳遺此一句解鄭氏謂僖公之德音者是也故下而說載色載笑匪怒伊教以見善於教人載色載笑王氏以為洪範所謂而康而色者亦是也黃實夫曰魯人非樂乎泮水也樂乎僖公之賢而人才所賴以長育成就也芹藻微物也而樂之有餘所樂者在僖公而寓於芹藻也樂心一生則烏可已觀其旗則樂其茷茷鬩其鸞則樂其噦噦見其馬則樂其蹻蹻人之樂之也如此僖公何以得此於魯人哉載色載笑即之也溫匪怒伊教循循善誘僖公之育才可見矣愚按二章言魯侯至泮而和其笑語也思樂泮水薄采其茆叶謨九反魯侯戾止在泮飲水既飲㫖酒永錫難老叶魯吼反順彼長道叶徒吼反屈此羣醜賦其事以起興也茆鳬葵也葉大如手赤圓而滑江南人謂之蓴菜者也本草注曰蓴菜三四月後通名絲蓴味甜體軟霜降以後名塊蓴味苦體澀長道猶大道也屈服醜衆也彭氏曰唯難老則可以順長道而服羣衆也王介甫曰順從君子之長道而屈服此魯國之羣衆也此章以下皆頌禱之詞也輔氏曰首祈其夀考次祈其功業亦可謂善上頌善禱矣長道猶言長䇿謂長久之道也應難老之意其曰羣醜雖言羣衆便已含淮夷在其中愚按三章頌魯侯享夀考而盡君道也穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假音格烈祖靡有不孝自求伊祜侯仄仄賦也昭明假與格同烈祖周公魯公也李迂仲曰內能慎其明德外能慎其威儀表裏盡善此民所以則之也曹氏曰載色載笑匪怒伊教所謂允文也順彼長道屈此羣醜所謂允武也鄭氏曰信文矣為修泮宫也信武矣為伐淮夷也輔氏曰此章頌魯侯之德以為能盡孝道以自求多福威儀者君德之符文武者君德之備也愚按四章頌公之化其民孝其祖以享福祿也明明魯侯克明其德既作泮宫淮夷攸服叶蒲北反矯矯虎臣在泮獻馘古獲反叶况壁反淑問如臯陶叶夷周反在泮獻囚賦也矯矯武貌馘所格者之左耳也淑善也問訊囚也囚所虜獲者孔氏曰馘臨陳格殺之而取其耳也所馘者是不服之人須武臣之力殺取其耳故武臣如虎者獻之所囚者服罪之人察獄之吏受其辭而斷其罪故善聽獄如臯陶者獻之蓋古者將出兵受成於學記王制注曰定兵謀也及其反也釋奠於學而以訊馘告王制注曰釋菜奠幣禮先師也訊馘所生獲斷耳者愚按司馬公曰受成獻馘莫不在學所以然者欲其先禮義而後勇力也君子有勇而無義為亂小人有勇而無義為盜若専訓之以勇力而不使之知禮義奚所不為矣故詩人因魯侯之在泮而願其有是功也李迂仲曰古者建學養才在此飲酒在此受成在此獻功在此則學校之制不為徒設有補於風化多矣輔氏曰序以為修泮宫者正以此章既作泮宫一句生義將以作為創造則又恐魯不應舊來無學故遂以為修耳殊不知此乃魯侯與羣臣燕飲泮宫之詩而詩人頌禱欲其有以終獲淮夷之服耳故云魯國既作泮宫則淮夷既服其文德矣故于此下遂言願其獻馘獻囚之事也愚按五章頌願魯侯以德服人而獻功於學也濟濟子禮反多士克廣德心桓桓于征狄他歷反彼東南叶尼心反蒸蒸皇皇不吳音話不揚不告于訩音凶在泮獻功賦也廣推而大之也德心善意也狄猶逖也釋文曰狄遠也王介甫曰攘而逖之也東南謂淮夷也孔氏曰淮夷在魯之東南蒸蒸皇皇盛也曹氏曰其並進而向敵也蒸蒸然其合而大之也皇皇然不吳不揚肅也不告于訩師克而和不爭功也鄭氏曰訩訟也無以爭訟之事告於治獄之官者李迂仲曰征伐有交爭者必告治獄之官伯州釋之事是也又曰人心可謂廣矣惟為血氣所使一有毫髮之利則忿而爭其心於是乎隘矣惟其心廣故其征伐有狄逺淮夷之功蒸蒸皇皇不吳不揚未嘗爭訟惟在泮獻功而已愚按六章頌願公之臣士皆有才德以立功也角弓其觩音求束矢其搜色留反戎車孔博徒御無斁叶弋灼反既克淮夷孔淑不逆叶宜腳反式固爾猶淮夷卒獲叶黃郭反賦也觩弓健貌鄭氏曰言持弦急也五十矢為束或曰百矢也孔氏曰荀卿論兵操十二石之弩負矢五卜箇是一弩用五十矢大司冦云入束矢於朝注古者一弓百矢與書及左傳所言賜諸侯彤弓一彤矢百故又謂束矢當百箇搜矢疾聲也孔氏曰其發則搜然而徑疾博廣大也無斁競勸也逆違命也蓋能審固其謀猶則淮夷終無不獲矣蘇氏曰公之兵戎精繕士卒競勸故能克淮夷甚善而不逆于是告之使益固其道庶幾淮夷可盡得矣王介甫曰孔淑不逆言無復作慝而順以服也鄭氏曰堅固其軍謀謂度已之德慮彼之罪以出兵也輔氏曰此章又願其器械修整卒乘兢勸既勝淮夷甚善而無有違命者章末又致戒以為苟能審固其謀猷則淮夷豈終不可獲哉以詩意觀之是時魯國想必為淮夷所擾而未有以勝之也愚按七章願公之兵徒精好謀慮審固而終服淮夷也翩彼飛梟吁驕反集于泮林食我桑黮户荏反懷我好音憬九永反彼淮夷來獻其琛敕金反元龜象齒大賂南金興也梟惡聲之鳥也黮桑實也曹氏曰傳云桑黮甘甜鴟梟革響是知梟食桑黮則其音變而美也泮林有黮梟來食之歸我好音則淮夷被泮宫禮義之化其有不革而而柔服者哉憬覺悟也琛寶也元龜尺二寸史記曰龜千歲滿尺二寸孔氏曰漢志云龜不盈尺不得為寶賂遺去聲也南金荆揚之金也鄭氏曰荆揚貢金三品孔氏曰禹貢徐州淮夷蠙珠洎魚則淮夷其土不出龜象其國不屬荆揚而獻龜象南金者非謂淮夷之地出此物也李迂仲曰書載伯禽宅曲阜徐戎並興是淮夷世為魯患故願僖公能使之順服貢獻如此也此章前四句興後四句如行葦首章之例也愚按卒章又願魯公常使淮夷順服而來獻也泮水八章章八句胡庭芳曰蘇氏以為泮宫僖公因舊而修是以不見於春秋至於克淮夷則亦以為疑而朱子于三章以下以為頌禱之辭蓋以為僖公存日之詩也切謂春秋經也魯頌亦經也今幸有魯頌以補春秋之闕誦其詩者尚何過疑之有哉愚按朱子以作泮宫淮夷夷之事他無所考故不質其為僖公之詩而且以克服淮夷為頌禱之辭以愚考之春秋不書常事則夫作泮宫之事十二公之經固宜皆無所見也至于僖公克服淮夷雖亦不見于春秋而僖公十三年嘗從齊桓㑹於鹹為淮夷之病杞十六年嘗從齊桓㑹于淮為淮夷之病鄫矣但此詩所言不無過其實者要當為頌禱之溢辭也序頌僖公能修泮宫也此亦燕飲落成之詩不為頌其能修也蓋落成泮宫之際因獻頌禱之詞亦若斯于之詩也閟筆位反宫有侐况域反實實枚枚赫赫姜嫄音元其德不回上帝是依叶音隈無災無害彌月不遲叶陳回反是生后稷降之百福叶筆力反黍稷重直龍反穋音六叶六直反稙微力反稚菽麥叶訖力反奄有下國叶于逼反俾民稼穡有稷有黍有稻有秬求許反奄有下國纘禹之緒象吕反賦也閟深閟也宫廟也吕與叔曰魯廟非姜嫄廟也侐清靜也實實鞏固也枚枚礱密也孔氏曰枚枚者細密之意故云礱密晉語及書傳說天子廟飾皆云斫其材而礱之加密石焉是礱密之事也時蓋修之故詩人歌詠其事以為頌禱之詞而推本后稷之生而下及于僖公耳孔氏曰作者將美僖公追述逺祖上陳姜嫄后稷至於太王文武爰及成王封建之辭魯公受賜之命言其所以有魯之由回邪也依猶眷顧也說見生民篇愚按見生民篇前三章是也先種曰稙後種曰稚孔氏曰重穋稙稚生熟早晚之異稱非穀名奄有下國封於邰也嚴氏曰劉氏云奄有下國所以原其始奄有下土所以要其終緒業也禹治洪水既平后稷乃播種百穀孔氏曰禹能平水土稷能播種二者俱以利民故謂之繼禹之事稷之播種種禹所治之地也輔氏曰奄有下國封於邰也奄有下土指教民稼穡之事而言也使天下之民皆得以稼穡於其土地則是后稷奄有其土也禹稷之功相為終始相繼以相成無稷則禹之平水土何益無禹則稷之教稼穡何施李迂仲曰禹之平水土稷之稼穡其事雖不同其實相終始也非禹平水土雖稷教民種何自而施其功非稷教民種踓禹治水民何自而食惟前後相承故云纘也愚按首章推本僖公所奉閟宫之祖上出于后稷也后稷之孫實維大音泰王居岐之陽實始翦商至于文武纘大王之緒致天之届于牧之野叶上與反無二無虞上帝臨女音汝敦都曰反商之旅克咸厥功叶君古反王曰叔父扶雨反建爾元子叶子古反俾侯于魯大啓爾宇為周室輔扶雨反賦也翦斷短也太王自豳徙居岐陽四方之民咸歸往之於是而王迹始著蓋有翦商之漸矣趙氏曰蔡節齊云太王雖未始有翦商之志然大王始得民心王業之盛實基於此非謂大王有翦商之志也言翦商雖在武王之時而大王實基王迹乃翦商之所從始爾曾氏曰大王蓋諸侯之能興邦者本不必云肇基王迹也武王既有天下推其寖盛之由故曰肇基王迹耳所謂實始翦商者殆因肇王迹之語而言之過届極也猶言窮極也虞慮也無二無虞上帝臨女猶大明云上帝臨女無二爾心也敦治之也咸同也言輔佐之臣同有其功而周公亦與焉也王成王也叔父周公也元子魯公伯禽也李迂仲曰謂長子為元子啓開宇居也輔氏曰無二無虞上帝臨汝一有二心他慮則使與天為二下不足以致天之届矣所謂能治商之衆皆君臣上一德一心之功為周室輔則封魯公不特為魯公計乃所以為周家計矣愚按此章推言后稷以下至於周公伯禽也乃命魯公俾侯于東錫之山川土田附庸周公之孫壯公之子叶奬里反龍旗承祀叶養里反六轡耳耳春秋匪解音懈叶訖力反享祀不忒皇皇后帝皇祖后稷享以騂犧虛宜虛何二反是饗是宜牛竒牛何二反降福既多章移當何二反周公皇祖亦其福女音汝賦也附庸猶屬城也小國不能自達於天子而附於大國也上章既告周公以封伯禽之意此乃言其命魯公而封之也小國之地不足五十里者不能自達於天子因大國以姓名通謂之附庸若春秋邾儀父之類是也問顓火亦魯附庸在魯地七百里之中從孟子百里之說則魯安得七百里之地曰是禮記說封周公曲阜之地七百里所謂錫之山川土田附庸其勢必不止於百里愚按周室封建之法當以武成分土惟三者為正魯侯爵地方百里以司馬法及小司徒之制推之地方百里者積田萬井萬井之地以開方之法通算實占地三百萬里此蓋班祿之制所謂錫之土田者也故南軒張氏以為分土三等皆以其田言之地雖有山川相間廣狹不齊而制田之多寡則自若也故其山川城郭宫室塗巷皆在百里田制之外即所謂錫之山川者也若邾若須向若顓史又皆魯之附庸即所謂錫之附庸者蓋亦在百里田制之外是魯之疆域固不止百里矣然作明堂位者遽妄為七百里之說孔氏乃附㑹之以為封魯五百里之上加以九同七同五同三同四等附庸共為方百里者二十四并魯方百里者二十五積四十九同開方之得七百里其說恐難信也莊公之子其一閔公其一僖公知此是僖公者閔公在位不久未有可頌此必是僖公也愚按閔公名啓方在位二年僖公以庶兄繼立在位三十三年耳耳柔從也春秋錯舉四時也孔氏曰錯舉春秋以明冬夏忒過差也成王以周公有大功於王室故命魯公以夏正孟春郊祀上帝配以后稷牲用騂牡曹氏曰司常言日月為常王建之交龍為旗諸侯建之僖公雖僣郊禮而猶以龍旗承祀不敢全僣天子禮也明堂位乃曰魯公乘大輅載弧䪅旗十有二旒日月之常祀帝於郊則過矣皇祖謂羣公愚按上言皇祖在后稷上則是指后稷為皇祖此言皇祖在周公下故知是指羣公此章以後皆言僖公致敬郊廟而神降之福國人稱願之如此也愚按此章言自伯禽封魯以至僖公致敬郊廟而獲福也秋而載嘗夏而楅衡叶户郎反白牡騂剛犧尊將將七羊反毛炮薄交反胾側吏反羮叶盧當反邊豆大房此下當脫一句如鐘鼓喤喤之類萬舞洋洋孝孫有慶叶袪羊反俾而熾而昌俾而夀而臧保彼東方魯邦是常不虧不崩不震不騰三夀作朋如岡如陵賦也嘗秋祭名楅衡施於牛角所以止觸也周禮封人云凡祭飾其牛牲設其楅衡是也孔氏曰楅設於角衡設於鼻秋將嘗而夏楅衡其牛言夙戒也白牡周公之牲也騂剛魯公之牲也白牡殷牲也周公有王禮故不敢與文武同魯公則無所嫌故用騂剛孔氏曰公羊白傳云周公用牡魯公用騂剛羣公不毛不毛不純色也剛特也白牡謂白特騂剛亦特也愚按不敢使與文武同故牲用殷人所尚之色犧尊畫牛於尊腹也或曰尊作牛形鑿其背以受酒也孔氏曰阮諶禮圖云犧尊飾以牛腹上盡牛形又大和中魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊也毛炮周禮封人祭祀有毛炮之豚注云爓纎去其毛而炮之也胾切肉也羹大羹鉶羹也大羹大古之羹湆欽入聲煮肉汁不和去聲盛之以登貴其質也儀禮設大羹湆于醢北注云設之所以敬尸也不祭不濟大羹不為神非盛者也鉶羹肉汁之有菜和者也盛之鉶器故曰鉶羹大房半體之爼足下有跗如堂房也孔氏曰明堂位云周房爼房謂足下跗也上下相間有似於堂房然知是半體者周語云郊禘之事則有全蒸王公立飫則有房蒸親威燕享則有殽蒸全蒸謂全載牲體殽蒸謂體解節折則房蒸是半體可知萬舞名震騰驚動也曹氏曰不虧如日常盈不崩如山常固不震如地常靜不騰如水常平自俾爾熾而昌以下皆嘏辭三夀未詳鄭氏曰三卿也嚴氏曰願有夀考之三卿為朋友皆如岡陵之固祝其君臣同慶也或曰願公夀與岡陵等而為三也愚按此章専言僖公致敬宗廟而祝願其獲福夀也公車千乘繩證反叶神陵反朱英緑縢徒登反二矛重直龍反弓叶姑𢎞反公徒三萬貝胄朱綅息廉反叶息稜反蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾夀而富叶方未反黃髮台背叶蒲寐反夀胥與試俾爾昌而大叶特計反俾爾耆而艾吾蓋反叶五訃反萬有千歲眉夀無有害叶暇憩反賦也千乘大國之賦也成方十里出革車一乘甲士三人左持弓右持矛中人御步卒七十二人將重車二十五人千乘之地則三百十六里有竒也李迂仲曰按司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成出革車一乘則千乘之地方三百一十六里有竒若以孟子所言周公封魯地方百里則無緣有千乘司馬法之言不足信也包氏注論語以為古者井田方里為井十井為乘百里之國通計萬井則魯地百里當有千乘矣合從包氏說愚按王制謂公侯之田皆方百里以武成列爵分土之說推之與王制合是魯當有百里之土田明矣而古者以田賦出兵據司馬法及小司徒之說推之則成方十里為田百井出車一乘每乘馬四匹甲士步卒合七十五人外牛十二頭駕重車在後炊家子十人固守衣裝五人廄養五人樵汲五人合二十五人也同方百里為田萬井止出車百乘積十同為十萬井始得出車千乘其十萬井開方則方三萬一千六百井餘一萬八千畝有竒為方三百十六里餘六十步有竒然其里數增多不合於侯封百里之制故李氏以為當從包氏之說雖與集傳不合然朱子注孟子千乘之國亦嘗以為地方百里出車千乘矣朱英所以飾矛緑縢所以約弓也愚按縢如緄縢之縢二矛夷矛酋矛也重弓備折壞也徒步卒也三萬舉成數也車千乘法當用十萬人而為步卒者七萬二千人然大國之賦適滿千乘苟盡用之是舉國而行也故其用之大國三軍而已三軍為車三百七十五乘三萬七千五百人其為步卒不過二萬七千人舉其中而以成數言故曰三萬也嚴氏曰魯頌多夸大之詞曰千乘曰三萬不必求其數之盡合也貝胄貝飾胄也朱綅所以綴也孔氏曰貝者水蟲甲有文章胄謂兜鍪以貝為飾說文云綅線朱綅赤線也增增衆也戎西戎狄北狄膺當也荆楚之别號舒其與國也懲艾承禦也僖公嘗從齊桓公伐楚故以此美之孔氏曰僖四年公㑹齊侯等伐楚楚一名荆舒是楚之與國故連言荆舒其伐戎狄則無文李迂仲曰泮水美僖公能服淮夷皆無是事而美之則膺戎狄懲荆舒未必不如其服淮夷也蓋祝頌之詞例如此愚按荆者楚之本號蓋以荆山而得名春秋莊公十年始書荆以正其夷狄之號至僖公元年乃改稱楚四年僖公從齊伐楚遂盟召陵僖公雖不得専其功而詩人之辭容有溢美讀者當不以辭害意而祝其昌大夀考也夀胥與試之義未詳王氏曰夀考者相與為公用也蘇氏曰願其夀而相與試其才力以為用也曹氏曰老夀者相與試用則不特三夀作朋而已所用皆老成人也考索李氏曰此詩曰天錫公純嘏眉夀保魯復周公之宇與夫萬有千歲眉夀無有害皆是祝頌之辭若非祝頌之辭則是僖公果萬有千嵗乎嚴氏曰萬有千嵗猶曰千嵗萬歲也愚按此章承前章祭祀獲福之意而美公以武功祝公以福夀也泰山巖巖叶魚杴反魯邦所詹奄有龜蒙遂荒大東至于海邦叶卜工反淮夷來同莫不率從魯侯之功賦也泰山魯之望也詹與瞻同孔氏曰泰山在齊魯之界二國皆以為望也龜蒙二山名孔氏曰春秋齊人來歸鄆歡龜隂之田謂龜山之北田也論語說顓史云昔者先王以為東蒙主是魯之境內有此二山故言奄有曹氏曰龜則鄒之龜山蒙則費之東䝉山荒奄也大東極東也海邦近海之國也曹氏曰淮夷來同則淮浦諸夷在魯之南者同來㑹盟莫敢不率循而順從也愚按此亦承上章祭祀獲福之意而言願公治其境內以服逺國也遂荒以下皆期望之辭下章放此保有鳬繹叶弋灼反遂荒徐宅叶達各反至於海邦淮夷蠻貊叶莫博反及彼南夷莫不率從莫敢不諾魯侯是若賦也鳬繹二山名李迂仲曰禹貢徐州嶧陽孤桐此繹即嶧陽也宅居也謂徐國也諾應辭若順也泰山龜蒙鳬繹魯之所有其餘則國之東南勢相連屬可以服從之國也王介甫曰言魯之治東及于海邦南及于蠻貊愚按泰山曰所詹龜蒙曰奄有鳬繹曰保有皆以魯地而言也其餘非魯所有則皆以遂荒總發其詞而致其願望於公也天錫公純嘏叶果五反眉夀保魯居常與許復周公之宇魯侯燕喜令妻夀母叶滿委反宜大夫庶士鉏里反邦國是有叶將已反既多夀祉黃髮兒齒賦也常或作嘗在薛之旁許許田也魯朝宿之邑也皆魯之故地見侵於諸侯而未復者故魯人以是願僖公也曹氏曰漢地理志魯有薛縣而齊孟嘗君食邑於薛則嘗先當屬魯孔氏曰桓元年鄭伯以璧假許田杜預注成王營王城故賜周公許田以為魯國朝宿之地其地近鄭故鄭易之也令妻令善之妻聲姜也夀母夀考之母成風也愚按僖公娶齊女姜姓曰聲姜其母風姓曰成風為莊公之妾薨於文公四年閔公八歲被弒必是未娶其母叔姜亦應未老愚按閔公在位二年為慶父所弒其母叔姜莊公夫人哀姜之娣也此言令妻夀母又可見公為僖公無疑也有常有也兒齒齒落更生細者亦夀徵也蘇氏曰願公夀考以復魯之侵地宜其室家臣庶以保有其國也愚按此章稱願僖公享夀富康寧之福有夫妻子母之榮皆承前章祭祀獲福之意也徂來之松新甫之柏叶逋莫反是斷音短是度待洛反是尋是尺叶尺約反松桷音角有舄叶七約反路寢孔碩叶常約反新廟奕奕叶弋灼反奚斯所作孔曼音萬且碩同上萬民是若賦也徂來新甫二山名八尺曰尋舄大貌路寢正寢也愚按路亦訓大新廟僖公所修之廟愚按即前所謂閟宫也奚斯公子魚也作者教護屬音燭功課章程也孔氏曰公子魚為之主帥教令工匠監護其事屬付工役課其章程曼長碩大也萬民是若順萬民之望也輔氏曰九章則本其所以作是頌者言之取于二山斷而度之或長或短而松之為椽桷者猶舄然而大則其為梁為柱者可知既成廟後之正寢又甚宏大則僖公所修之廣大矣又言其教護屬功董其工役之人而曰此實奚斯所作其制度甚長且有所順萬民之望也有所興作而不順民心則興怨讟矣安能致彼如斯之頌禱哉愚按此章復詳言修廟之事與篇首兩句之意相首尾也閟宫九章五章章十七句內第四章脫一句二章章八句二章章十句舊說八章二章章十七句一章十二句一章三十八句二章章八句二章章十句多寡不均雜亂無次蓋不知第四章有脫句而然今正其誤胡庭芳曰竊謂閟宫是依倣殷武而作殷武首言髙宗伐荆楚次言侯國服從方及于夀考且寧遽結之以作寢廟朱子釋廟中之寢所以安髙宗之神得之矣閟宫首原僖公家世次及承祭祀攘夷狄復境土極頌其夀考亦遽結之以作新廟與殷武如出一手特殷武簡而嚴閟宫張而夸耳故朱子於殷武之末謂與閟宫卒章文意略同但先儒於此詩服淮夷蠻貊等事春秋所不載皆不無疑故黃氏以為未然之期望朱子以為頌禱之辭也蘇氏曰詩人願僖公上為神之所福內為國人之所安外為鄰國之所懷而修舊起發治其寢廟以順萬民之所望也陳夀翁曰僖公修閟宫以其新修故又曰新廟而路寢即廟中之正寢也毛鄭以閟宫為姜嫄廟者固非毛又以新廟為閔公廟者尤非也序頌僖公能復周公之宇也此詩言莊公之子又言新廟奕奕則為僖公修廟之詩明矣但詩所謂復周公之宇者祝其能復周公之土宇耳非謂其能修周公之屋宇也序文首句之繆如此而蘇氏信之何哉魯頌四篇二十四章二百四十三句考索李氏曰駉詩言牧馬之事有駜言君臣宴飲泮水言其修泮宫服淮夷所褒之事猶為可褒也至於閟宫則毁譽失真且如言姜嫄后稷至於文武與夫郊天之祭魯以諸侯而乃盛稱以示誇耀不亦過乎王介甫曰周頌之詞約約所以為嚴盛德故也魯頌之詞侈侈所以為夸德不足故也商頌四之五契為舜司徒而封於商傳十四世而湯有天下其後三宗迭興孔氏曰契為司徒有五教之功乃賜姓曰子而封于商從契至湯為十四世也釋文曰商者契所封之地名湯有天下遂以為國名愚按湯後九世至大戊而商道興廟號中宗大戊後十三世至武丁商道復興廟號髙宗武丁再傳而至祖甲所謂三宗迭興也蓋商人宗之皆為百世不遷之廟故周公作無逸歷舉言之但祖甲親盡之際適以國亡故未有宗號也歟及紂無道為武王所滅封其庶兄微子啓於宋修其禮樂以奉商後吳氏曰武王克殷封武庚於殷墟封微于於宋及武庚叛成王殺之始即微子已封之宋建之為上公以奉湯祀作微于之命以中之其地在禹貢徐州泗濵西及豫州盟孟豬之野孔氏曰宋之封域東至泗濵西至孟豬也其後政衰商之禮樂日以放失七世至戴公時孔氏曰自微子至戴公凡十君除二兄弟同世外是七世至戴公也大夫正考甫得商頌十二篇於周大師歸以祀其先王孔子編詩而又亡其七篇然其存者亦多闕文疑義今不敢强通也孔氏曰正考父生孔父嘉孔父嘉生木金父木金父生祁父祁父生防叔防叔遷魯為防大夫故曰防叔生伯夏伯夏生叔梁紇叔梁紇生仲尼則正考甫是孔子七世之祖周用六代之樂故有商頌吳必大問商頌恐是宋作曰宋襄一伐楚而已其事可考安有莫敢來享等事又問恐是宋人作之追述往事以祀其先王若是商時所作商尚質不應商頌反多于周頌曰商頌跡多如周頌覺得文勢自别周頌雖簡文自平易商頌自是奧古非宋人所能有作鄭氏曰列國政衰則變風作宋何獨無乎曰焉乃不録之王者之後時王所客也巡守不陳其詩商都亳宋都商丘皆在今應天府亳州界曹氏曰契封商今上雒商是也至湯凡八遷徙居亳從先王居帝譽嘗都也湯十九世至盤庚其間又五遷後居河南亳殷即湯故都故後世或稱商或稱殷或兼稱殷商愚按應天府今改歸德府與亳州並隸河南省猗於宜反與音余那與置我鞉音桃鼓奏鼓簡簡衎我烈祖賦也猗歎詞那多王介甫曰美商之樂歎而多之也曹氏曰言其美之不足故嗟歎而多之也置陳也歐陽子曰陳鞉與鼓書曰下管鞉鼓蓋自虞夏以來舊物常用之簡簡和大也衎樂也烈祖湯也毛氏曰有功烈之祖也記曰商人尚聲臭味未成滌音狄蕩其聲樂三闋然後出迎牲是也郊特牲注曰滌蕩猶搖動也愚按凡聲屬陽故曰樂由陽來商人祭祀尚聲所以先求諸陽者也舊說以此為祀成湯之樂也湯孫奏假音格綏我思成鞉鼓淵淵叶於申反嘒嘒管聲既和且平依我磬聲於音烏赫湯孫叶思倫反穆穆厥聲湯孫主祀之時王也歐陽子曰自大甲以下至紂皆可為湯孫但不知所斥者何王耳假與格同言奏樂以格於祖考也綏安也思成未詳鄭氏曰安我以所思而成之人謂神明來格也禮記曰齊齊之日思其居處思其笑語思其志意思其所樂聱去聲思其所嗜齊三日乃見其所為齊者孔氏曰所思五事先思居處後思樂嗜者先粗而後精自外而入內也何氏曰慕容氏云親之居處笑語志意樂嗜往而不反非有實也夫豈形體之所能交哉思之所至足以通之矣齊之三日思之之至雖親之不可見者如見其存微之顯誠之不可掩也如此親見所為齊者思之熟若見其所為齊之也祭之日入室僾然必有見乎其位孔氏曰入室初入廟室僾然髣佛見也如見親之在神位也周旋出户肅然必有聞乎其容聲孔氏曰孝孫薦爼酌獻行步周旋或出户當此時必有悚息肅肅然如聞舉動容止之聲也出户而聽愾然必有聞乎其歎息之聲設祭既畢孝子出户而聽也何氏曰馬氏云僾然言其貌肅然言其容愾然言其氣輔氏云既曰必有又曰僾然肅然愾然蓋誠之不可掩也此之謂思成蘇氏曰其所見聞本非有也生於思耳此二說近是蓋齊而思之祭而如有見聞則成此人矣嚴氏曰若神不來格則所思不遂今神明來格是安我以所思而成之人也鄭注頗有脫誤今正之輔氏曰商人尚聲於那可見綏我思成又見其尚鬼淵淵深逺也嘒嘒清亮也磬玉磬也堂上升歌之樂非石磬也孔氏曰磬非樂之主而六依我磬聲明此異於常磬非石磬也張子曰玉磬聲之最和平曰者可以養心其聲一定始終如一無隆殺也王介甫依我磬聲言與堂上之樂和也穆穆美也鄭氏曰於盛矣湯孫此樂之美其聲也愚按既言管聲又言磬聲又言穆穆厥聲盛稱聲樂見商人之尚聲連叶三聲字又見商人之質也輔氏曰穆穆厥聲亦是言樂言於赫哉之湯孫其樂聲其美也庸鼓有斁萬舞有奕我有嘉客亦不夷懌庸鏞通毛氏曰大鐘曰庸斁斁然盛也奕奕然有次序也濮氏曰周人之樂執籥秉翟者文舞也朱干玉戚者武舞也萬舞二舞之總也故邶風有公庭萬舞魯頌有萬舞洋洋春秋楚子元有振萬蓋時王樂也諸侯卿大夫士得所同用之特自八以下佾數有差等耳今言萬舞有奕正謂文武迭用而有序豈天下未為周而是舞之名已見於前代乎蓋上文言鞉鼓管籥作於堂下其聲依堂上之玉磬無相奪倫者至於此則九獻之後鐘鼓交作萬舞陳於庭而祀事畢矣愚按周制宗廟九獻之次尸未入前王裸於奧以降神一獻也后亞祼二獻也尸入薦血腥後王酌泛齊獻尸所謂朝踐三獻也后酌醴齊亞獻亦為朝踐四獻也薦熟畢王酌盎齊獻尸五獻也后酌緹齊亞獻六獻也皆所謂饋獻也尸乃食訖王更酌朝踐之泛齊以酳尸所謂朝獻七獻也后更酌饋獻之緹齊以亞酳所謂再獻八獻也又有諸臣為賔者之一獻凡九也若商之九獻則未有考嘉客先代之後來助祭者也亦不夷懌乎言皆悅懌也自古在昔先民有作溫恭朝夕執事有恪恪敬也言恭敬之道古人所行不可忘也閔馬父曰先聖王之傳恭猶不敢専稱曰自古古曰在昔昔曰先民輔氏曰馬父解自古在昔先民有作深得其㫖可以涵泳便見得敬是徹頭徹尾成始成終之意國語注曰有作言先聖人行此恭敬之道久矣不敢言創之於已乃云受之於先古也此其不敢専也顧豫蒸嘗湯孫之將將奉也言湯其尚顧我蒸嘗哉此湯孫之所奉者致其丁寧之意庶幾其顧之也愚按此詩章首兩以湯孫問稱於聲樂之間者所以重歎其樂之美所謂尚聲者然也章末結之以湯孫之將者又所以備見其禮之至也那一章二十二句閔馬父曰正考甫校商之名頌孔氏曰魯語注云名頌頌之美者考父恐其舛繆故就大師校之以那為首其輯之亂曰云云即此詩也序祀成湯也微子至于戴公其間禮樂廢壞有正考甫者得商頌十二篇於周之大師以那為首序以國語為文嗟嗟烈祖有秩斯祜候五反申錫無疆及爾斯所賦也烈祖湯也秩常申重也爾主祭之君蓋自歌者指之也愚按頌詩所以美盛德告成功而皆自歌工以導達主祭者之意也歌工自己身而指主祭者則曰爾自先祖之身而指主祭者則曰湯孫自主祭者之身而言則曰我曰豫立言雖殊所指之人則一如上篇所指亦然也又如周頌雍詩既稱天子則固自歌工之身而指主祭者矣下文又稱孝子亦若此詩稱湯孫也又稱豫稱我亦若此詩稱豫我也斯所猶言此處也此亦祀成湯之樂言嗟嗟烈祖嚴氏曰補傳云言烈祖而云嗟嗟以簡朴故也若周頌則言於穆於皇近於文矣有秩秩無窮之福可以申錫於無疆是以及於爾今王之所而修其祭祀如下所云也吕東萊曰及爾斯所言流慶無窮今方於爾之所其後猶未艾也所謂申錫無疆既載清酤叶候五反賚我思成叶音常亦有和羹叶音郎既戒既平叶音旁鬷中庸作奏今從之假音格無言叶音昻時靡有爭叶音章綏我眉夀黃耇無疆酤酒曹氏曰清酒冬釀夏成賚與也思成義見上篇和羹味之調節也鄭氏曰和羹者五味調腥熟得節也曹氏曰鉶羹也戒夙戒也平猶和也儀禮於祭祀燕享之始每言羹定訂蓋以羹熟為節然後行禮鄉飲酒禮鄉射禮燕禮大射儀公食大夫禮少牢饋食皆曰羹定鄭氏曰定猶熟也李實之曰不敢預勞賔故以羹定為速賔行禮之節吕東萊曰清酤和羹皆言祭之始也定即戒平之謂也鬷中庸作奏正與上篇義同蓋古聲奏族聲近族聲轉平而為鬷耳無言無爭肅敬而齊一也輔氏曰先酒而後羹亦其序也無言則是肅敬無爭則是齊一是乃諸福之所㑹也言其載清酤而既與我以思成矣及進和羹而肅敬之至則又安我以眉夀黃耇之福也歐陽子曰上言既載清酤下文亦有和羹乃是直陳祭時酒與羹爾而執事總無喧譁又不交侵其職位以見在廟之人皆肅敬而舉動得禮所以神眀錫以眉夀黃耇之福也約軧祈文反錯衡叶户郎反八鸞鶬鶊七羊反以假音格以享叶虗良反我受命溥將自天降康豐年穰穰來假音格來饗叶虛良反降福無疆約軧錯衡八鸞見采芑篇鶬見載兄篇鄭氏曰約軝穀飾也鸞在鑣四馬則八鸞諸侯來助祭者乘篆穀錯衡之車駕四馬其鸞鶬鶬然聲和愚按采芑作八鸞瑲然蒸民韓奕作八鸞鏘鏘此詩作鶬鶬載見曰鞗革有鶬字雖不同皆言其聲也言助祭之諸侯乘是車以假以享于祖宗之廟也輔氏曰約軝錯衡八鸞鶬鶬總言助祭之諸侯那則専言先代之後耳亦其序也漙廣將大也穰穰多也言我受命既廣大而天降以豐年黍稷之多使得以祭也曹氏曰諸侯助祭者如此是我之受命大得天人之助也得萬國之歡心以事其先王所謂得人也降康豐年所謂得天也吕東萊曰豐年穰穰言時和嵗豐祭禮得成所謂可以備物者得其一說也假之而祖考來假享之而祖考來饗胡庭芳曰歐陽氏云上言以享者謂諸侯來助致享於神也下云來享者謂神來至而歆享也以假來假其義亦然則降福無疆矣顧豫蒸嘗湯孫之將說見前篇蘇氏曰上言人既助之天又應之然後祖宗來格而享其祭報之以福故此曰其尚顧豫蒸嘗哉此湯孫之所奉也烈祖一章二十二句彭氏曰上章言鞉鼓管籥與執競之頌意同此篇言清酟和羹而不詳於樂則與那執競異也輔氏曰那與烈祖皆祀成湯之樂然那詩則専言樂聲至烈祖則及夫酒饃焉商人尚聲豈始作樂之時則歌那既祭而後歌烈祖歟大扺商頌簡古難看辭斷而意續孰讀自見序祀中宗也詳此詩未見其為祀中宗而末言湯孫則亦祭成湯之詩耳序但不欲連篇重出又以中宗商之賢君不欲遺之耳天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方賦也𤣥鳥鳦也孔氏曰燕色𤣥故又名𤣥鳥春分𤣥鳥降髙辛氏之妃有娀氏女簡狄祈於郊禖鳦遺卵簡狄吞之而生契其後世遂為有商氏以有天下事見史記孔氏曰𤣥鳥至日以太牢祀髙禖記其祈福之時故言天命𤣥鳥𤣥鳥來而謂之降者重之若自天來然嚴氏曰契封於商後因以為一代之號言生商謂生契也生契所以生商也史記殷本紀曰𤣥鳥翔水遺卵娀簡狄取而吞之三代世表曰契稷之父皆黃帝子孫詩言契生於卵后稷人迹者見其有天命精誠之意耳奈何無父而生乎故詩人美契曰天命𤣥鳥降而生商美稷曰厥初生民宅居也殷地名芒芒大貌鄭氏曰自契至於湯八遷始居亳之殷地而受命國日以廣大芒芒然古猶昔也帝上帝也武湯以其有武德號之也曹氏曰書曰惟我商王布昭聖武長發曰武王載斾有䖍秉鉞湯日吾甚武自號曰武王故此稱為武湯也正治也域封境也蘇氏曰湯始受命以正域於四方之諸侯也此亦祭祀宗廟之樂而追叙商人之所由生以及其有天下之初也愚按此詩推本商人生於𤣥鳥猶生民推本周人生於帝武此詩追叙契之生以及於湯有天下猶閟宫追叙后稷之生以及文武也方命厥后奄有九有叶羽已反商之先后受命不殆叶養里反在武丁孫子叶奬里反方命厥后四方諸侯無不受命也吕東萊曰鮮于氏云隨其所在之方而命羣后也九有九州也嚴氏曰域彼四方則九州在其中矣天命湯以四方為域湯能命其諸侯而奄有九有成天意也武丁髙宗也鄭氏曰武丁修德殷道復興故表顯之號為髙宗言商之先后受天命不危殆故今武丁孫子猶賴其福歐陽子曰武丁孫子謂武丁之孫子也武丁孫子武王靡不勝音升龍旗十乘繩證反大糦尺志反是承武王湯號而其後世亦以自稱也龍旗諸侯所建交龍之旗也嚴氏曰龍旗十乘舉諸侯之尊者言之耳大糦黍稷也承奉也言武丁孫子今襲湯號者其武無所不勝於是諸侯無不奉黍稷以來助祭也邦畿千里維民所止肇域彼四海叶虎洧反止居肇開也言王畿之內民之所止不過午里而其封域則極乎四海之廣也嚴氏曰京師諸夏之本王圻之內人心安止則四海之大皆在統理之內也四海來假音格下同來假祁祁景員維河殷受命咸宜叶牛何反百祿是何音荷叶如字愚按宜字恐不須叶音則祁與宜河與何皆隔句叶韻也假與格同祁祁衆多貌景員維河之義未詳或曰景山名商所都也見殷武卒章春秋傳亦曰商湯有景亳之命是也員與下篇幅隕義同蓋言周也河大河也言景山四周皆大河也何任也鄭氏曰百祿是何謂檐負天之多福春秋傳作荷上聲嚴氏曰章末總美殷家前後相承受天之命無有不宜能負荷天之百福謂成湯至髙宗以後也輔氏曰此又承上而言四海之逺諸侯無不來至而至者祁祁然衆多見商之所都所謂景山者四周皆大河其形勢之盛而居之安如此故又歎其殷之受命無所不宜此其所以能負其百福也𤣥鳥一章二十二句序祀髙宗也王介甫曰祀髙宗而上頌其祖下稱其孫子蓋上有以紹其祖下有以貽其子孫是乃髙宗之功美也詩有武丁孫子之句故序得以為据雖未必然然必是髙宗以後之詩矣濬哲維商長發其祥洪水芒芒禹敷下土方絶句楚辭天問禹降省下土方蓋用此語外大國是疆幅隕音員既長有娀息容反方將帝立子生商賦也濬深哲知李迂仲曰正猶書所謂濬哲文明也長久也方四方也外大國逺諸侯也幅猶言邊幅也隕讀作員謂周也嚴氏曰自其直方言之曰幅自其周圓言之曰員有娀契之母家也舊說有娀國在不周之北恐不應絶逺如此將大也言商世世有濬哲之君孔氏曰總歎商家深智不指斥一人也李迂仲曰惟其德之深故不溺於褊淺惟其德之明故不至於昏塞商之先世皆有深智之德愚按泛言濬哲之君蓋自湯以上契以下皆是也其受命之祥發見也久矣方禹治洪水以外大國為中國之竟而幅隕廣大之時有娀氏始大故帝立其女之子而造商室也蓋契於是時始為舜司徒掌布五教於四方而商之受命實基於此曹氏曰契雖未能有天下然其有天下之祥已於堯舜之時發見矣輔氏曰長發其祥則言商受天命其發見之祥既已逺矣自洪水芒芒下六句則皆述此句猶言天之裁培我商也久矣𤣥王桓撥叶必烈反受小國是達叶他悅反受大國是達率履不越遂視既發叶方月反相息亮反土烈烈海外有截賦也𤣥王契也𤣥者深微之稱或曰以𤣥鳥降而生也王者追尊之號孔氏曰國語𤣥王勤商十四世而興𤣥王為契明矣又云昔我先王后稷我先王不窟韋昭注商頌亦以契為𤣥王是其王為王之祖故呼王非號王也歐陽子曰書稱格王寧蓋古人往往以美稱加王爾𤣥者深微之稱老氏言𤣥之又𤣥是也不必為黑也桓武撥治達通也受小國大國無所不達言其無所不宜也王介甫曰達隨所受大小能達其道也與在邦必達同意率循履禮越過發應也言契能循禮不過越遂視其民則既發以應之矣相土契之孫也孔氏曰契子昭明昭明子相土截整齊也至是而商益大四方諸侯歸之截然整齊矣其後湯以七十里起豈嘗中衰也與輔氏曰契為司徒初不見有武之事然文武乃君之德既封為國君則是當有武德也撥即撥亂之撥乃武德之驗也既有武德又能撥亂以為治則其所受之國隨其大小而無所不宜又能循行禮法無或過越則其所以為下民之儀式者無所不備矣宜乎遂視其民則既發以應之也至於其孫相土之時則商益以烈烈然光大諸侯率皆歸之而極于海外莫不截然齊整也此章又叙契及相土之時帝命不違至于湯齊湯降不遲聖敬日躋昭假音格遲遲上帝是祗帝命式于九圍賦也湯齊之義未詳蘇氏曰至湯而王業成與天命㑹也降猶生也遲遲久也祗敬式法也九圍九州也孔氏曰謂九圍為九州者蓋九分天也下各為九處若規闈然故謂之九圍商之先祖既有明德天命未嘗去之以至於湯嚴氏曰商自契以來天命所向至湯而後與天齊謂王業至此成天命至此集天人適相符合也湯之生也應期而降適當其時聖敬又日躋升彭氏曰聖敬日躋即至誠無息也嚴氏曰苟日新又日新是聖敬日躋之實即文王之純亦不已也又湯工夫全在敬字上看來大段是一個修飭底人曰城湯之聖稱其德者有曰不邇聲色不殖貨利又曰以義制事以禮制心有曰從諌弗咈改過不吝又曰與人不求備撿身若不及此皆足以見其日新之實至於所謂聖敬日躋云者則其言愈約而意愈切矣以至昭假於天久而不息惟上帝是敬故帝命之以為法於九州也輔氏曰聖故云者言湯之敬乃聖人之敬也無一毫虧缺無一息間斷故能昭假於天與天為一也以此觀之則敬之一字乃入聖之門而學者成始成終之遒可見矣受小球音求大球為下國綴張衛反旒音流何音賀天之休不競不絿音求不剛不柔敷政優優百祿是遒子由反賦也小球大球之義未詳或曰小國大國所贄之玉玉也鄭氏曰小球鎮圭尺有二寸大球大圭三尺也皆天子之所執也曹氏曰玉藻云笏天子以球玉美玉也典瑞曰王搢大圭執鎮圭注鎮圭尺二寸以四鎮之山為瑑飾所以鎮安四方大圭三尺杼上終葵首明無所屈也下國諸侯也綴猶結也旒旗之垂者也孔氏曰大行人及考工記說旌旗之事皆云九旒七旒是旌旗垂者名為旒也言為天子而為諸侯所係屬如旗之縿衫為旒所綴著長入聲也嚴氏曰詩故云旗所垂為旒衆旒所著為縿何荷競强絿緩也優優寬裕之意遒聚也輔氏曰言湯能為天子受大國小國所執之玉則為諸侯所附屬如旗旒之與縿然此皆上帝休美之命使然也然湯之負荷天休者非有他也本其聖敬只中道上行更無偏倚故其為政不强不弱不剛不柔優游寬裕此固百福之所聚也受小共音恭叶居勇反大共為下國駿音峻厖莫邦反叶莫孔反何天之龍叶丑勇反敷奏其勇不震不動叶德總反不戁奴版反不竦小勇反百祿是總子孔反賦也小共大共駿厖之義未詳或曰小國大國所供之貢也鄭氏曰共上聲執也猶小球大球也愚按鄭意以小共為王所執鎮圭大共為王所執之大圭也蘇氏曰共珙通合珙之玉也傳曰駿大也厖厚也嚴氏曰湯受小國大國之共貢惟薄取之所以大厚天下也董氏曰齊詩作駿駹謂馬也胡庭芳曰駿駹是喻其有力量能負重致逺之意下國皆於我乎負載也龍寵也敷奏其勇猶言大進其武功也難恐竦懼也輔氏曰駿厖作汏厚無意味當從董氏說作駿駹謂馬也如此則與上章綴旒義相類皆是譬喻綴旒以喻為諸侯附著駿駹以喻能乘載諸侯也此唯德厚者能之上章言政事此章言武功先能自治然後能進其武功也不震動不戁竦即周頌所謂無二無虞之意臨大事固不可不懼然神武不殺者自能不震動不戁竦荷天之休則修政事荷天之寵則進武功亦其宜也武王載斾有䖍秉鉞音越如火烈烈則莫我敢曷漢書作遏阿葛反叶阿竭反苞有三蘖五葛反叶五竭反莫遂莫達叶他悅反九有有截韋顧既伐叶房越反昆吾夏桀賦也武王湯也曹氏曰湯以武定亂故號武王䖍敬言恭行天討也李迂仲曰顔師古云湯雖秉鉞以敬為先曷遏通或曰曷誰何也苞本也蘖旁生萌蘖也言一本生三蘖也本則夏桀蘖則韋也顧也昆吾也皆桀之黨也鄭氏曰韋彭姓顧昆吾已紀又音杞姓孔氏曰鄭語云祝融其後八姓己姓昆吾顧溫彭姓豕韋則商滅之言湯既受命載斾秉鉞以征不義桀與三蘖皆不能遂其惡而天下截然歸商矣段氏曰截者定于一之謂也初伐韋次伐顧次伐昆吾次伐夏桀當時用師之序如此輔氏曰載斾秉鉞不敢不䖍即所謂臨事而懼也此與不震動不戁竦並行而不相悖如火烈烈言其氣勢之盛也則莫我敢遏言舉天下莫能當也如此則有首出庶物之勢矣湯之興是甚麼氣勢天下安敢不截然齊整以歸商桀與三蘖安得不自然以次而消靡乎昔在中葉有震且業允也天子叶奬里反降于卿士鉏里反實維阿衡叶户郎反實左音佐右音又商王賦也葉世震懼業危也承上文而言昔在則前乎此矣豈謂湯之前世中衰時與允也天子指湯也降言天賜之也卿士則伊尹也言至於湯得伊尹而有天下也阿衡伊尹官號也輔氏曰昔在中葉有震且業分明是指相土之後成湯以前中衰之時言也久也天子言湯之為天子當乎人心降于卿士言伊尹不徒出乃天為湯而錫之也左左商王謂輔佐成湯以成王道也孔氏曰言卿士者三公兼卿士也阿依衡平伊尹湯所依倚而取平故以為官名蔡九峯曰言天下之所倚平也或曰伊尹之號長發七章一章八句四章章七句一章九句一章六句序以此為大禘之詩蓋祭其祖之所出而以其祖配也張子曰其祖之所自出則帝嚳也蘇氏曰大禘之祭所及者逺故其詩歷言商之先后又及其卿士伊尹蓋與祭於禘者也商書曰兹豫大享于先王爾祖其從與享之是禮也豈其起於商之世歟今按大禘不及羣廟之主此宜為祫祭之詩濮氏曰序以為大禘則禘不及羣廟之主無因言相土若以為祫祭則羣廟之主在焉而言湯事特詳末乃及伊尹相湯嘗意其為合祀宗廟而以阿衡配食之樂歟然經無明文不可考也陳壽翁曰此詩頌湯之興而推本於契之始成湯武之盛如此本其所以聖者不越乎敬而已是敬也即契率履不越之心也率履而不越之心其即舜命之以敬敷五教之心歟序大禘也疑見本篇撻他達反彼殷武奮伐荆楚冞面規反入其阻裒蒲侯反荆之旅有截其所湯孫之緒象吕反賦也撻疾貌曹氏曰言其兵威神速殷武殷王之武也冞冒裒聚湯孫謂髙宗舊說以此為祀髙宗之樂蓋自盤庚沒而殷道衰楚人叛之髙宗撻然用武以伐其國李迂仲曰楚為夷狄之國世亂則先叛世治則後服商室中微往往為患髙宗所以討之孔氏曰周始封熊繹為楚子於武丁之世不知楚君何人曹氏曰楚蓋荆州之楚地故或謂之荆楚猶商稱殷商也嚴氏曰解頥新語云或謂成王始封熊繹於荆至魯僖公元年始有楚號遂疑商時未有荆楚乃欲假此以實韓詩宋襄公時作商頌之說殊不思禹貢有荆州即荆楚也又有荆岐則雍州之荆詩人故以荆楚别荆岐耳孰謂周始有荆楚哉入其險阻以致其衆盡平其地使截然齊一皆髙宗之功也輔氏曰撻彼殷武言髙宗能疾於用武也奮伐荆楚知所怒也深入其阻不憚勞也裒荆之旅不縱殺也有截其所使之截然齊一各居其所也此其所以為髙宗之功緒也易曰髙宗伐鬼方三年克之蓋謂此歟既濟九三爻傳曰天下之事既濟而逺伐暴亂也三年而克之事之至難也維女音汝荆楚居國南鄉昔有成湯自彼氐都啼反羌莫敢不來享叶虛良反莫敢不來王曰商是常賦也氏羌夷狄國在西方曹氏曰漢志隴西郡有氐道縣羌即西域婼羌之屬也婼音綽享獻也世見現曰王孔氏曰逺夷一世而一見於王秋官大行人云九州外謂之蕃國世一見謂其父死子繼及嗣王即位乃來朝謂之世見也蘇氏曰既克之則告之曰爾雖逺亦居吾國之南耳曹氏曰商居河洛之間則荆楚在國南鄉昔成湯之世雖氏羌之逺猶莫敢不來朝曰此商之常禮也况汝荆楚曷敢不至哉孔氏曰首章言伐楚之功二章言責楚之義天命多辟音璧設都于禹之績嵗事來辟勿豫禍適直革反稼穡匪解音懈叶訖力反賦也多辟諸侯也來辟來王也適謫通言天命諸侯各建都邑於禹所治之地曹氏曰說命云明王奉若天道建邦設都則多辟雖受封於天子實天所命也益稷云禹荒度土功弼成五服至於五千州十有二師外薄四海咸建五長則諸侯設都之地皆禹之功也而皆以嵗事至于商以祈王之不譴曰我之稼穡不敢懈也庶可以免咎矣言荆楚既平而諸侯畏服也李迂仲曰言夷狄率服則天下無事所先者農事耳觀孟子載天子巡守惟以土地田野為慶讓之先誠以農事為重也稼穡項氏曰言以嵗事來享于君而冀以免于禍謫奉其而不敢懈也韻頌中有全篇句句是韻如殷武之類無兩句不是到稼穡自是缺了一句前輩分章全曉不得某細讀方知是缺了一句天命降監下與濫叶下民有嚴叶五剛反不僣不濫不敢怠遑命于下國叶越逼反封建厥福叶筆力反賦也監視嚴威也僣賞之差也濫刑之過也遑暇封大也言天命降監不在乎他皆在民之視聽則下民亦有嚴也惟賞不僣刑不濫而不敢怠遑則天命之以天下而大建其福此髙宗所以受命而中興也曹氏曰天既命多辟設都于禹之績又下監多辟有能嚴敬下民賞不僣刑不濫而不敢怠遑者則命之以天下封立其福也輔氏曰此章則又能言髙宗所以致中興之道曰天雖髙而實下其監視其可畏也民雖卑而天實以為視所不可忽也惟髙宗上畏天下敬民而見於刑賞者未嘗有僣濫之失存於中心者不敢有怠遑之意故天命之以天下而大建其福商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寧以保我後生叶桑經反賦也商邑王都也翼翼整敕貌極表也嚴氏曰言政教取正於比也赫赫顯盛也濯濯光明也言髙宗中興之盛如此夀考且寧云者蓋髙宗之享國五十有九年李迂仲曰書云嘉靖殷邦至於小大無時或怨肆髙宗之享國五十有九年非夀考且寧而何我後生謂後嗣子孫也輔氏曰商之都亳固有自來矣然盤庚之後殷道既衰則人亦易而視之矣至于髙宗中興王都始復翼翼然為四方之儀表是蓋有以使之然者矣不獨是也又有赫赫然風聲之盛濯濯然威靈之光此髙宗所以享國長久而又有以保安其後嗣子孫也陟彼景山叶所旃反松柏丸丸叶胡員反是斷音短是遷方斫陟角反是䖍松桷音角有梴丑連反旅楹有間叶胡田反寢成孔安叶於連反賦也景山名商所却也春秋傳云商湯有景亳之命而比言陟彼景山蓋商所都之山名衛詩亦言景山乃商舊都也丸丸直也遷徒方正也䖍亦截也梴長貌旅衆也間間然而大也謝疊山曰登彼景山而選材取松柏之易直者斷之遷之以繩墨取方正而斫削之以松為椽桷有梴然而長以松柏為衆楹有間然而大寢廟中之寢也安所以安髙宗之神也此蓋特為百世不遷之廟不在三昭三穆之數既成始祔而祭之之詩也輔氏曰林植之美規模之宏此髙宗之神之所安也言其有以當之矣其與閟宮之辛章文義略同蓋俱為宗廟始成而祭之詩豈作閟宫者亦取法於是詩乎愚按商書曰七世之廟可以觀德蓋天子七廟三昭三穆與大祖之廟而七八世九世而後隨其昭穆親盡遞遷其主而祧於太祖之廟其有功德之君則後世宗之雖親盡而不祧别立百世不遷之廟而特祔其主焉凡有功德者皆然初不可預限其數而商則止有三宗髙宗即其一也然嘗疑髙宗之廟未知立於何所三宗之後昭穆當祧者未知入於何廟竊意所立三宗中宗當穆髙宗祖甲當昭各隨昭穆之位特列其廟于太祖廟之兩傍三昭三穆之上如周文武世室之位也中宋之後則羣穆繼之者皆祧于其廟髙宗祖中之後則羣昭繼之者皆祧于其廟如周自文王以後羣穆祧于文世室自武王以後羣昭祧于武世室也然此章與閟宮之卒章文意略同未詳何謂殷武六章三章章六句二章章七句一章五句愚按篇內第三章為五句朱子疑其脫一句則此詩當作四章章六句二章章七句然此詩與閟宮全篇文義皆有相似者但閟宫為頌僖公修宗廟而作殷武為宗武丁特立廟而作故閟宮所以頌僖公服夷蠻享福夀者皆未然之期望而此詩所以頌式丁服夷夏享福壽者皆已然之實事卒章則皆述其作廟之事以結之序殷武祀髙宗也愚按髙宗七世親盡而立廟此詩其作於帝乙之世乎商頌五篇十六章一百五十四句張子曰商頌之詞粹濮氏曰賞聞魯頌之非頌孔氏已言之而商頌後三篇但稱述前王功德殊不及先祭之意亦自與前二篇異耳疊章非周頌也而其鋪叙事實全類大雅諸詩每讀而疑因志于此通典曰殷周之雅頌上本有娀姜嫄契稷相土公劉古公太伯王季姜女大任大姒之德乃及武湯文武受命武丁成康宣王中興下及輔佐阿衡周召太公申伯召虎仲山甫之屬君臣男女有功德者靡不褒揚於聲樂之間也詩傳通釋卷二十
