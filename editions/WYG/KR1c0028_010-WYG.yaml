body:
  text: 詩傳通釋卷十元劉瑾撰詩朱子集傳彤弓之什二之三彤弓弨尺昭反兮受言藏之我有嘉賔中心貺叶虚王反之鍾鼓既設一朝饗叶虚良反之賦也彤弓朱弓也孔氏曰弓皆漆之以禦霜露彤弓色赤玈弓色黒賜弓赤一而黒十以赤為重耳周禮無彤弓之名夏官司弓矢云唐弓大弓以授勞者注往來體若一曰唐弓大弓勞者勤勞王事也弨弛貌孔氏曰説文云弨弓反謂弛之而體反也嚴氏曰賜弓不張貺與也大飲䕃賔曰饗孔氏曰饗者烹大牢以飲賔殽牲俎豆盛于食燕劉執中曰行慶賞必與神人共之故行饗禮于廟此天子燕有功諸侯而錫以弓矢之樂歌也東萊吕氏曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也以王府寶藏之弓一朝舉以畀人未嘗有遲留顧惜之意也輔氏曰守之者不重則得之者亦輕予之而不誠則其感之也亦淺畀之而不速則其視之也亦玩而不以為恩也然其所以重所以誠所以速者非懼其得之輕感之淺視之玩也盡吾之理而已後之視府藏為己私分至有以武庫兵賜弄臣者許益之曰漢哀帝建平四年上發武庫兵送侍中董賢及乳母王阿含執金吾毋將隆奏武庫兵器天下公用今便僻弄臣私恩㣲妾而以天下公用給其私門非所以示四方也則與受言藏之者異矣賞賜非出于利誘則迫于事勢至于有朝賜鐵劵而暮屠戮者愚按如唐徳宗于李懐光昭宗于王行瑜是也則與中心貺之者異矣屯膏吝賞功臣解體至有印刓玩平聲而不忍予者愚按如項羽是也則與一朝饗之者異矣彤弓弨兮受言載叶子利反之我有嘉賔中心喜叶去聲之鍾鼓既設一朝右音文叶于記反之賦也載抗之也愚按載彤弓于弓檠抗弓體使正言其藏之謹也喜樂也右勸也尊也孔氏曰勸謂勸其功也王介甫曰尊而右之也謝疊山曰古人以右為尊也彤弓弨兮受言櫜古刀反叶古號反之我有嘉賔中心好呼報反之鍾鼓既設一朝醻市由反叶大到反之賦也櫜韜好説醻報也飲酒之禮主人獻賔賔酢主人主人又酌自飲而遂酌以飲賔謂之醻醻猶厚也勸也謝疊山曰主人酌賔曰獻賔飲主人曰酢一獻一酢報施足矣主人又酌賔謂之醻所以見其意厚也嚴氏曰鄭氏以醻為醻酢饗禮為訓共俟爵盈不飲未必有醻酢也彤弓三章章六句輔氏曰大抵此詩首章已盡其意下兩章只是詠歎以加重焉耳櫜重于載載重于藏好誠于喜喜誠于貺醻厚于右右尊于饗春秋傳寗武子曰諸侯敵王所愾嘅而獻其功于是乎賜之彤弓一彤矢百玈盧弓矢千以覺報宴注曰愾恨怒也覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂鄭氏曰凡諸侯賜弓矢然後專征伐東萊吕氏曰所謂專征者如四夷入邊臣子篡弑不容待報者其他則九伐之法乃大司馬所職非諸侯所專也與後世強臣拜表輒行者異矣周禮大司馬曰以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥散行則滅之愚按拜表輒行如晉穆帝永和中桓溫伐蜀是也序天子錫有功諸侯也菁菁子丁反者莪五何反在彼中阿既見君子樂音洛且有儀叶五何反興也菁菁盛貌莪蘿蒿也本草注曰一名莪蒿莖葉如青蒿開淡紅紫花結角子長二寸許㣲彎陸璣曰生澤田漸洳之處中阿阿中也大陵曰阿君子指賔客也此亦燕飲賔客之詩言菁菁者莪則在彼中阿矣既見君子則我心喜樂而有禮儀矣輔氏曰既見君子則我心喜樂而有禮儀夫見賢而樂禮或不足則愛心雖至而敬心不足矣樂且有儀則愛敬之心兩盡矣或曰以菁菁者莪比君子容貌威儀之盛也下章放此菁菁者莪在彼中沚音止既見君子我心則喜興也陳器之曰此篇朱子舊以為比今改為興而下文兼存此説矣但二章三章比字皆失改今悉正之中沚沚中也喜樂也菁菁者莪在彼中陵既見君子錫我百朋興也中陵陵中也古者貨貝五貝為朋孔氏曰漢食貨志以為大貝牡貝么貝小貝不成貝為五也為朋者謂小貝以上四貝各二貝為一朋而不成者不為朋鄭因經廣解之言有五種之貝其中以相與為朋非總五貝為一朋也錫我百朋者見之而喜如得重貨之多也埤雅曰獸二為友貝二為朋錫我百朋者言錫貝之多也汎汎芳劒反楊舟載沈載浮既見君子我心則休比也楊舟楊木為舟也載則也載沈載浮猶言載清載濁載馳載驅之類以比未見君子而心不定也休者休休然言安定也輔氏曰此章又追言其未見之時心之不定既見之後則休休然而安定矣其意味亦深長也菁菁者莪四章章四句序樂育材也君子能長育人材則天下喜樂之矣此序全失詩意六月棲棲音西戎車既飭音敕四牡騤騤求龜反載是常服叶蒲北反玁狁孔熾尺志反我是用急叶音棘王于出征以匡王國叶于逼反賦也六月建未之月也濮氏曰詩言六月徂暑則為夏正可知劉辰翁曰以為未月極是周以子月為歳首而月數未嘗改也棲棲猶皇皇不安之貌戎車兵車也吕東萊曰鄭氏云戎車有五周禮車僕掌戎路廣車闕車苹車輕車是也戎路王在軍所乗廣車横陳之車闕車補闕之車苹猶屏也對敵自隠蔽之車輕車馳敵致師之車也飭整也騤騤強貌常服戎事常服以韎昧韋為弁又以為衣而素裳白舄也周禮司服曰凡兵事韋弁服李寳之曰皮去毛熟治曰韋韎赤色也凡衣同冠色衣韎韋則弁亦韎韋也皮弁服素裳白舄韋弁服亦與之同也玁狁即獫狁北狄也孔甚熾盛匡正也成康既沒周室寖衰八世而厲王胡暴虐周人逐之出居于彘玁狁内侵逼近京邑愚按據詩文至于涇陽而言也王崩子宣王靖即位命尹吉甫帥師伐之有功而歸詩人作歌以序其事如此謝疊山曰戎車曰既飭則車甲器械士卒馬牛無一物不整齊矣四牡曰騤騤則無一馬不精強矣曰載是常服則無一衣一裳不經檢點矣司馬法冬夏不興師今乃六月而出師者以玁狁甚熾其事危急故不得已而王命于是出征以正王國也比毗志反物四驪閑之維則維此六月既成我服叶蒲北反我服既成于三十里王于出征以佐天子叶奬里反賦也比物齊其力也釋文曰比齊同也凡大事祭祀朝覲㑹同毛馬而頒之凡軍事物馬而頒之毛馬齊其色物馬齊其力吉事尚文武事尚強也則法也服戎服也三十里一舎也古者吉行日五十里師行日三十里既比其物而曰四驪則其色又齊可以見馬之有餘矣閑習之而皆中去聲法則又可以見教之有素矣孔氏曰戎事尚強而言四驪者雖以齊力為主亦不厭其同色故曰四騵彭彭又曰乘其四騏田獵齊足而曰四黄既駕是皆同色也無同色者乃取異毛耳騏駵是中騧驪是驂是也彭氏曰陳氏云以厲王大亂之餘而支獫狁之患意其必倉卒不暇為計而今也比物四驪閑之維則葢其車馬之修器械之備非一日也于是此月之中即成我服既成我服即日引道不徐不疾盡舎而止又見其應變之速從事之敏而不失其常度也愚按六月之中即成戎服則應變速矣我服既成即日引道則從事敏矣雖速雖敏而軍行止三十里則不失常度矣王命于此而出征欲其有以敵王所愾苦愛反而佐天子耳四牡修廣其大有顒玉容反薄伐獵狁以奏膚功有嚴有翼共音恭武之服叶蒲北反共武之服以定王國叶于逼反賦也修長廣大也顒大貌奏薦膚大公功嚴威翼敬也共與供同服事也言將帥皆嚴敬以共武事也謝疊山曰薄伐者叛則伐之服則捨之不窮征逺討也為將必嚴不嚴則軍心不齊為帥必敬不敬則軍心不整故曰有嚴有翼范氏曰凡兵事莫尚于嚴莫先于敬共武之服者如此則以定王國也輔氏曰兵隂事也用之當以嚴敬為主不嚴則不整不敬則不肅將帥皆嚴敬以共武事此王國之所以定也定則不止于匡矣有車馬為之用則足以却玁狁以成大功以嚴敬為之主則足以共武事而定王國吉甫之行師真足以繼南仲之軌迹矣宜宣王之中興也玁狁匪茹如豫反整居焦穫音護侵鎬胡老反及方至于涇陽織音志文鳥章白斾央央于良反元戎十乘繩證反以先啟行叶户郎反賦也茹度唐入聲整齊也焦穫鎬方皆地名焦未詳所在穫郭璞以為瓠中則今在耀州三原縣也愚按即今陜西省耀州三原縣也鎬劉向以為千里之鎬則非鎬京之鎬矣亦未詳其所在也前漢書劉向曰吉甫之歸周厚賜之其詩曰來歸自鎬我行永久千里之鎬猶以為逺顔師古曰鎬非豐鎬之鎬方疑即朔方也愚按南仲亦以獫狁之難往城朔方靈夏等州之地則此獫狁所侵疑即其地也涇陽涇水之北孔氏曰水北曰陽在豐鎬之西北言其深入為冦也愚按豐鎬之地在今安西路屬縣安西亦有涇陽縣織幟字同鳥章鳥隼之章也吕東萊曰日月為常交龍為旂之類皆幟之文也鳥章特其一耳白斾繼旐者也曹氏曰白帛也曰斾以絳帛為斾也以帛續旐未為燕尾戰則斾之央央鮮明貌元大也戎戎車也軍之前鋒也啓開行道也猶言發程也史記三王世家注曰韓嬰章句云車有大戎十乘謂車漫輪馬被甲衡軛之上盡有劍㦸名曰陷軍之車王介甫曰元戎十乘所謂選鋒也兵法兵無選鋒曰北謝疊山曰兵法所謂堂堂之陣正正之旗也元戎啓行可以摧鋒破陣左傳所謂先人有奪人之心也言玁狁不自度待洛反量深入為冦如此是以建此旌旗選鋒鋭進聲其罪而致討焉直而壯律而臧有所不戰戰必勝矣愚按左傳曰師直為壯曲為老今因玁狁為冦而聲罪致討則直而壯矣易曰師出以律否臧凶今討獫狁而旌旗鮮明選鋒鋭進則律而臧矣此所以為宣王中興之師也歟戎車既安叶於連反如輊竹二反如軒四牡既佶其乙反既佶且閑叶胡田反薄伐玁狁至于大音泰原文武吉甫萬邦為憲叶許言反賦也輊車之覆而前也軒車之却而後也凡車從後視之如輊從前視之如軒然後適調也凡車之勢一低一昂佶壯健貌謝叠山曰戎車既安矣必曰如輊如軒制度工巧則利于戰鬬也四牡既強矣必曰既佶且閑教訓習熟則耐于馳驅矣大原地名亦曰大鹵今在大原府陽曲縣愚按今大原路陽曲縣屬河南山西道至于大原言逐出之而已不窮追也先王治戎狄之法如此前漢書嚴尤曰宣王時獫狁内侵命將征之盡境而還其視戎狄之侵譬猶螡蝱之螫敺之而已吉甫尹吉甫此時大將也憲法也非文無以附衆非武無以威敵能文能武則萬邦以之為法矣謝叠山曰漢唐而下縉紳介胄分為兩途愚儒武夫各持一説不知三伐將帥必文武全才可以為萬邦之法則者也愚按此言吉甫之武必先之以文上言吉甫共武之服必本于嚴翼之徳末言吉甫飲至必及于孝友之友文事武備誠非兩途也北伐可見其武崧髙烝民詩可見其文吉甫燕喜既多受祉來歸自鎬我行永久叶舉里反飲音䕃反御諸友叶羽已反炰白交反鼈膾鯉侯誰在矣張仲孝友叶羽已反賦也祉福御進侯維也張仲吉甫之友也善父母曰孝善兄弟曰友此言吉甫燕飲喜樂多受福祉葢以其歸自鎬而行永久也是以飲酒進饌于朋友濮氏曰鼈龜屬俗呼團魚炰火熟之名膾細切肉也而孝友之張仲在焉言其所與宴者之賢所以賢吉甫而善是燕也王介甫曰忠也者移孝以為之者也順也者移友而為之者也故言忠順之臣必及孝友之友輔氏曰吉甫以天子之將有功而歸相與宴者固不一也後篇謂方叔嘗與伐玁狁者亦豈得而不與焉而詩人乃獨舉夫孝友張仲之為賢則又可見吉甫之文而不專以武功為美矣然此但也為吉甫既歸而私自與朋友燕飲而已非宣王燕之六月六章章八句吕與叔曰上三章言自治之備四章言玁狁來侵從而禦之五章言治戎有備車馬安閑驅之出境不窮追也六黷章言休兵飲至樂與孝友之臣同其燕樂則窮兵武之意消矣又曰北伐之事所以自治者常優暇而有餘所治于彼者常簡畧而不盡謝疊山曰一章曰戎車既飭四牡騤騤二章曰比物四驪三章曰四牡修廣五章曰戎車既安四牡既佶西北平原廣野舉目千里利于車戰故此詩以車馬為重序宣王北伐也此句得之鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福禄缺矣采薇廢則征伐缺矣出車廢則功力缺矣杖杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則亷恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣南有嘉魚廢則賢者不安下不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基隊矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四夷交侵中國㣲矣魚麗以下篇次為毛公所移而此序自南陔以下八篇尚仍儀禮次第獨以鄭譜分魚麗為文武時詩故遂移此序魚麗一句自華黍之下而升于南陔之上此一節與小序同出一手其得失無足議者但欲證毛公所移篇次之失與鄭氏獨移魚麗一句之私故論于此云薄言采芑音起于彼新田于此菑側其反畆叶每彼反方叔涖音利止其車三千師干之試叶詩止反下同方叔率止乘其四騏四騏翼翼路車有奭許力反簟笰音弗魚服叶蒲北反鉤膺鞗音條革叶訖力反興也芑苦菜也青白色摘其葉有白汁出肥可生食亦可蒸為茹即今苦蕒買菜冝馬食軍行采之人馬皆可食也田一嵗曰菑二嵗曰新田三嵗曰畬孔氏曰菑者災也始災殺其草木也新田新成柔田也畬和也田舒緩也今江東呼初耕地反草為菑是也方叔宣王卿士受命為將者也涖臨也其車三千法當用三十萬衆葢兵車一乘甲士三人步卒七十二人又二十五人將重車在後凡百人也愚按兵車戰鬬之車駕馬所謂小車也重車輜重之車駕牛所謂大車也兵車一乘則士卒共七十五人重車一乘則將之者二十五人其中炊家子十人固守衣甲五人廐養五人樵汲五人然此亦極其盛而言未必實有此數也孔氏以為兼起鄉遂之兵王氏謂㑹諸侯之師此皆以辭害意之過詩人但極其盛而稱之耳師衆干扞也試肄習也言衆且練也率總率之也翼翼順序貌路車戎路也奭赤貌蘇氏曰路車金路也金路赤飾孔氏曰瞻彼洛矣韎韐有奭彼茅蒐染為奭故知赤貌也簟笰以方文竹簟為車蔽也鉤膺馬婁頷有鈎而在膺有樊盤有纓也樊馬大帶纓鞅央上聲也孔氏曰五路惟金路有鈎以金為之馬頷之飾也在馬膺之飾唯有樊纓故引樊纓以解膺方叔不乘革路者以革路臨陣所乘鄭氏曰樊纓皆以五采罽飾之罽音計織毛為之鞗革見蓼蕭篇宣王之時蠻荆背叛王命方叔南征軍行采芑而食故賦其事以起興曰薄言采芑則于彼新田于此菑畆矣方叔涖止則其車三千師干之試矣又遂言其車馬之美以見軍容之盛也南征荆蠻想不甚費力不曽大段戰鬬故只盛稱其軍容之盛而已薄言采芑于彼新田于此中鄉方叔涖止其車三千旂旐央央方叔率止約軧祈支反錯衡叶户郎反八鸞瑲瑲七羊反服其命服朱芾音弗斯皇有瑲葱珩音衡叶户郎反興也中鄉民居其田尤治約束軧轂也以皮纒束兵車之轂而朱之也錯文也鈴在鑣曰鸞馬口兩旁各一四馬故八也瑲瑲聲也彭氏曰荀子云錯衡以養目和鸞之聲以養耳則錯衡八鸞皆以為耳目之懽也命服天子所命之服也朱芾黄朱之芾也孔氏曰諸侯黄朱皇猶煌煌也瑲玉聲葱蒼色如葱者也珩佩首横玉也禮三命赤芾葱珩孔氏曰三命至九命皆葱珩非謂方叔唯三命也曹氏曰芾佩非軍服金路非戎車和鸞非戎馬所以然者方叔克壯其猶如呉起將戰不帶劒諸葛武侯不親戎服羊祜輕裘而盛著威名杜預身不跨馬自能制勝故詩詠其車服之美而已彭氏曰此與上章言方叔帥兵之時其精神氣熖見于旌旗車馬佩服之間有以聳人觀聴其勝敵也必矣輔氏曰首章其車三千師干之試云者其車馬之衆盛與師衆之所以扞禦夫敵者又練習也三章其車三千旂旐央央云者則言其車馬之衆盛旗幟之鮮明也先言涖止而後言率止者始則臨之終則率之以行也首章乘其四騏以下言方叔所乘之戎路其飾甚備二章約軧錯衡以下又言車馬之盛命服之美所以見天子付託之重錫命之蕃而方叔之威儀整暇如此可以決其有成也其與後世以一勇之夫為民之司命者異矣鴥帷必反彼飛隼息允反其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦音征人伐鼓陳師鞠居六反旅顯允方叔伐鼓淵淵叶於中反振旅闐闐徒顛反叶徒鄰反興也隼鷂屬急疾之鳥也埤雅隼一名雀鷹戾至爰于也鉦鐃也鐲也伐擊也鉦以靜之鼓以動之鉦鼓各有人而言征人伐鼓互文也孔氏曰説文云鉦鐃也似鈴又云鐲鉦也則鐲鐃俱得以鉦名之鐲似小鐘鐃似鈴有大小之異耳凡軍進退皆鼓動鉦止非臨陣獨然此文在陳師鞠旅之上是未戰時事也濮氏曰周禮鼔人以金鐲節鼓以金鐃止鼓即無鉦名則鐲鐃通謂之鉦而節止實用于鼔故詩云然鞠告也二千五百人為師五百人為旅此言將戰陳其師旅而誓告之也陳師鞠旅亦互文耳淵淵鼓聲平和不暴怒也謂戰時進士衆也孔氏曰方叔身自伐鼓率其衆以作氣振止旅衆也言戰罷而止其衆以入也春秋傳曰出曰治兵入曰振旅是也孔氏曰治兵尚威武也振旅反尊卑也出則㓜賤在前貴勇力也入則尊老在前復常法也闐闐亦鼓聲也或曰盛貌鄭氏曰戰止又伐鼓闐闐然董氏曰闐闐衆行聲也程子曰振旅亦以鼓行金止言隼飛戾天而亦集于所止以興師衆之盛而進退有節如下所云也程子曰隼之急疾亦集于所止興兵雖強用之有節而不過也輔氏曰上二章但言其車馬服飾之盛美而已故此章又以鳥之急疾興其猛鷙又以亦集爰止興其進退有節也其進退之有節者葢以將戰而誓衆有法既戰而鼓聲不暴戰罷振旅而入則又齊一而無先後也蠢尺允反爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊音信獲醜叶尺由反戎車嘽嘽吐丹反嘽嘽焞焞吐雷反如霆如雷顯允方叔征伐玁狁蠻荆來威叶音隈賦也蠢者動而無知之貌蠻荆荆州之蠻也大邦猶言中國也元大猶謀也言方叔雖老而謀則壯也愚按方叔以元老而率師則師卦所謂文人所謂長子者也嘽嘽衆也焞焞盛也霆疾雷也爾雅註曰霆雷之急疾者謂霹靂方叔葢嘗與于北伐之功者是以蠻荆聞其名而皆來畏服也胡庭芳曰王氏云此章美其成功言以宿將董大衆荆人自服不待戰而屈也采芑四章章十二句陳少南曰北伐南征之詩班師時作六月之辭迫采芑之辭緩六月以討而定采芑以威而服也序宣王南征也我車既攻我馬既同四牡龐龐鹿同反駕言徂東賦也攻堅同齊也傳曰宗廟齊豪尚純也孔氏曰齊其毫毛尚純也戎事齊力尚強也孔氏曰齊其馬力田獵齊足尚疾也孔氏曰齊其馬足龐龐充實也東東都洛邑也周公相成王營洛邑為東都以朝諸侯周室既衰久廢其禮至于宣王内修政事外攘夷狄復文武之竟境土修車馬備器械復㑹諸侯于東都因田獵而選車徒焉故詩人作此詩以美之好田獵之事古人亦多刺之然宣王之田乃是因此見其車馬之盛紀律之嚴所以為中興之勢者在此其所謂田異乎尋常之田矣首章汎言將往東都也輔氏曰車以堅緻為善馬以齊同為盛首章既言其攻與同矣故二章但言其善與盛也田車既好叶許厚反四牡孔阜符有反東有甫草叶此苟反駕言行狩叶始九反賦也田車田獵之車好善也阜盛大也甫草甫田也後為鄭地今開封府中牟縣西圃田澤是也宣王之時未有鄭國圃田屬東都畿内故往田也愚按宣王嘗封庶弟于西都咸林之地是為鄭桓公其子武公當平王時徙封于東都然後圃田為鄭地開封府中牟縣即今汴梁路中牟縣也此章指言將往狩于圃田也之子于苗叶音毛選徒囂囂五刀反建旐設旄搏音博獸于敖賦也之子有司也不敢斥王故以有司言之苗狩獵之通名也選數也囂囂聲衆盛也數車徒者其聲囂囂則車徒之衆可知且車徒不譁而惟數者有聲又見其靜治也敖近滎陽地名也吕東萊曰敖山名晉師救鄭在敖鄗之間士季設七覆于敖前則敖山之下平曠可以屯兵翳薈可以設伏所謂東有甫草即此地也此章言至東都而選徒以獵也孔氏曰言選車徒備器械搏取禽獸于敖地也吕東萊曰宣王往東都以㑹諸侯為主而二章三章先言田獵者葢有司先為戒具以待㑹同畢而田獵也輔氏曰選徒囂囂言其衆且肅也既選其車徒矣則建設其旗旄焉見其序且整也方選徒以獵而遽曰搏獸于敖言其士衆之勇而氣大事小也徒手曰搏駕彼四牡四牡奕奕赤芾金舄㑹同有繹賦也奕奕連絡布散之貌赤芾諸侯之服上介甫曰人君宜朱芾而此赤芾者㑹同故也涖其臣庶則朱芾君道也故方叔服其命服則朱芾㑹同于王則赤芾臣道也故此㑹同則赤芾也金舄赤舄而加金飾亦諸侯之服也鄭氏曰金舄黄朱色也時見現曰㑹殷見曰同鄭氏曰時見言無常期殷衆也繹陳列聨屬燭之貌此章言諸侯來㑹朝于東都也决拾既佽音次與柴叶弓矢既調讀如同與同叶射夫既同助我舉柴子智反賦也决以象骨為之著于右手大指所以鉤弦開體拾以皮為之著于左臂以遂弦故亦名遂嚴氏曰决即衛芄蘭所謂韘也孔氏曰周禮繕人注云拾韝扞也著左臂裏佽比備也鄭氏曰謂手指相次比也調謂弓強弱與矢輕重相得也謝疊山曰弓既上弦必審視之端正則可用㣲有偏斜必加矯揉此弓之調也矢之輕重必視弓力之強弱弓強而矢輕則不中弓弱而矢重亦不中此矢之調也射夫葢諸侯來㑹者孔氏曰射夫即諸侯以下也夫男子之總名同協也柴説文作㧘謂積禽也使諸侯之人助而舉之言獲多也此章言既㑹同而田獵也四黄既駕兩驂不猗於寄於箇二反不失其馳叶徒卧反舎音捨矢如破彼寄譜過二反賦也猗偏倚不正也馳馳驅之法也愚按五御之目三曰過君表五曰逐禽左即御田車馳驅之法也舎失如破巧而力也蘇氏曰不善射御者詭遇則獲不然不能也今御者不失其馳驅之法而射者舎矢如破則可謂善射御矣輔氏曰首章云既同則齊其足矣而此又曰四黄與車攻比物四驪同義可見其馬之有餘也王介甫曰向曰四牡既言力之強今曰四黄又言色之純也兩驂不猗御能正其馬也不失其馳車行節而法也舍矢如破矢行巧而力也鄭氏曰射者之工矢發則中如椎碎物也此章言田獵而見其射御之善也蕭蕭馬鳴悠悠斾旌徒御不驚大庖蒲交反不盈賦也蕭蕭悠悠皆閒暇之貌孔氏曰軍旅齊整唯聞蕭蕭然馬鳴之聲見悠悠然斾旌之狀無有譁諠者徒步卒也御車御也驚如漢書夜軍中驚之驚愚按周亞夫傳亞夫擊呉楚深壁而守夜軍中驚頃之復定不驚言比匹志反至也卒事終事也不喧譁也大庖君庖也不盈言取之有度不極欲也葢古者田獵獲禽面傷不獻踐剪毛不獻孔氏曰面傷謂當面射之剪毛謂在傍而逆射之不獻者嫌誅降之義不成禽不獻孔氏曰惡其害幼小擇取三等自左膘縹而射石之達于右腢愚為上殺以為乾干豆奉宗廟釋文曰膘脅後髀前肉也腢肩前上殺中心死疾鮮潔也達右耳本者次之以為賔客孔氏曰亦自左射之達右耳本以其逺心死稍遲肉已㣲惡射左髀匪達于右䯚杳為下殺以充君庖孔氏曰髀股外䯚水膁也右䯚右脅䯚下殺以其中脇死最遲肉又益惡膁音嗛每禽取三十焉每等得十其餘以與士大夫習射于澤宫中者取之記射義注曰澤宫名所以擇士也士謂諸侯朝者諸臣及貢士也皆先令習射于澤已乃射于射宮課中否也榖梁傳曰射禽而中田不得禽則得禽田得禽而射不中則不得是以知古之貴仁義而賤勇力也是以獲雖多而君庖不盈也張子曰饌雖多而無餘者均及于衆而有法耳凡事有法則何患乎不均也舊説不驚驚也不盈盈也亦通鄭氏曰反其言而美之此章言其終事嚴而頒禽均也輔氏曰蕭蕭馬鳴悠悠斾旌見其整暇無始終之異也徒御不驚見其卒事而不驚擾也大庖不盈見其循禮守法而不從欲以取也夫力足以多取而不盡用焉此所以為王者之事也之子于征有聞音問無聲允矣君子展也大成賦也允信展誠也聞師之行而不聞其聲言至肅也信矣其君子也誠哉其大成也輔氏曰聞師之獵而不聞其聲則可見其師律之嚴肅矣大凡行軍用師要須如此方可不然皆苟道也章末二句乃美宣王也大成言其事之有始有終也彭氏曰宣王治兵之法其見于田獵已如此詩人固信其大有成也此章總序其事之始終而深美之也愚按楚辭集注曰凡作篇章既成撮其大要以為亂辭今此詩言田事以上七章既序其始終以成篇矣此章又言其始事之整肅終事之有成以深美之亦猶楚辭之有亂辭也車牽公劉卒章皆然車攻八章章四句以五章以下考之恐當作四章章八句愚按五章六章通言其田獵射御七章八章通言其始終整肅而且音韻各相諧叶故疑其當以八句成章以此推之則合首章二章八句通言車馬盛備將往東都圃田之地合三章四章八句通言天子諸侯來㑹東都之事總為四章章八句也序宣王復古也宣王能内修政事外攘夷狄復文武之竟土修車馬備器械復㑹諸侯于東都因田獵而選車徒焉吉日維戊叶莫吼反既伯既禱叶丁口反田車既好叶許口反四牡孔阜符有反升彼大阜從其羣醜賦也戊剛日也伯馬祖也謂天駟房星之神也孔氏曰伯者長也馬之祖始是長也夏官校人春祭馬祖天駟龍為天馬故房四星謂之天駟醜衆也謂禽獸之羣衆也此亦宣王之詩言田獵將用馬力故以吉日祭馬祖而禱之孔氏曰常祭在春將用馬力則又備禮禱之既祭而車牢馬健于是可以歴險而從禽也以下章推之是日也其戊辰歟吉日庚午既差我馬叶滿補反獸之所同麀音憂鹿麌麌愚甫反漆沮七徐反之從天子之所賦也庚午亦剛日也毛氏曰外事以剛日記曲禮注曰出郊為外事差擇齊其足也愚按此言差馬猶車攻言我焉既同也同聚也鹿牝曰麀麌麌衆多也漆沮水名在西都畿内涇渭之北所謂洛水今自鹽韋流入鄜孚坊至同州入河也李迂仲曰書疏云漆沮在涇水之東一名洛水職方氏所謂雍州其浸渭洛非河南之洛也愚按此言漆沮之從猶車攻言甫草敖地彼則狩于東都此則狩于西都也戊辰之日既禱矣越三日庚午遂擇其馬而乗之視獸之所聚麀鹿最多之處而從之惟漆沮之旁為盛宜為天子田獵之所也瞻彼中原其祁孔有叶羽已反儦儦表驕反俟俟叶于紀反或羣或友叶羽已反悉率左右叶羽已反以燕天子叶奬里反賦也中原原中也祁大也趣則儦儦行則俟俟獸三曰羣二曰友燕樂也言從王者視彼禽獸之多于是率其同事之人各共恭其事以樂天子也愚按此言率左右以樂天子猶車攻之射夫同而助舉㧘也既張我弓既挾子洽反我矢發彼小豝音巴殪於計反此大兕徐履反以御賔客且以酌醴賦也發發矢也豕牝曰豝一矢而死曰殪兕野牛也言能中㣲而制大也孔氏曰小豝云發言發則中之大兕言殪言射著即死愚按此言射者之善猶車攻言舍矢如破也御進也醴酒名周官五齊去聲二曰醴齊洼曰醴成而汁滓相將如今甜酒也言射而獲禽以為俎實進于賔客而酌醴也謝叠山曰田而得禽天子不以自奉故大庖不盈命有司以進賔客且以酌醴燕諸侯及羣臣也先王體羣臣懐諸侯常有恩惠其用心公溥而均齊常以一人養天下不以天下奉一人也也愚按此言進禽于賔客亦猶車攻言大庖不盈之意吉日四章章六句輔氏曰一章言祭禱馬祖以為田獵之備也二章言取擇其地以為田獵之所也三章言相與悉力以共田獵之事為天子之樂也四章言既獵而以其所得之獸供俎實使天子得與賔客燕飲也東萊吕氏曰車攻吉日所以為復古者何也葢蒐狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉可以見綜理之周焉欲明文武之功業者此亦足以觀矣輔氏曰東萊之説固善而先生又改動數字尤切王賦謂車馬之出軍實謂軍器之數師律謂進退之度上下之情諸侯及左右之人相率以共其事而天子又與之燕飲以為樂也綜理之周祭禱必講獵地必擇車馬有備射御有法終事嚴整頒禽之均酌醴之厚無一不至也愚按宣王所以復文武功業者固不止于二詩所言蒐狩之事然即二詩而觀之則其車馬徒御之所出可見王賦之復也旌旄車斾之備决拾弓矢之精可見軍實之盛也選徒則囂囂徒御則不驚行者有聞而無聲又可見師律之嚴也㑹同有繹而助我舉㧘悉率左右而以燕天子又可以見上下之情也將用馬力而既伯既禱頒禽之均而君庖不盈又見其綜理之周密葢一事之間而五美具焉即此推之則其餘可知矣序美宣王也能慎㣲接下無不自盡以奉其上焉序謹㣲以下非詩本意鴻鴈于飛肅肅其羽之子于征劬其俱反勞于野叶上與反爰及矜棘冰反人哀此鰥寡叶果五反興也大曰鴻小曰鴈孔氏曰俱是水鳥其形鴻大而雁小肅肅羽聲也之子流民自相謂也征行也劬勞病苦也矜憐也老而無妻曰鰥老而無夫曰寡舊説周室中衰萬民離散而宣王能勞澇來賚還旋定安集之王介甫曰勞者勞之來者來之往者還之優者定之危者安之散者集之故流民喜之而作此詩追叙其始而言曰鴻雁于飛則肅肅其羽矣之子于征則劬勞于野矣輔氏曰人民離散譬如鴻雁之飛四方無所不往徒聞其羽聲肅肅未知所止也且其劬勞者皆鰥寡可哀憐之人也輔氏曰爰及矜人哀此鰥寡又言其所與行者無非可憐之人而就其中又惟鰥寡之可哀也然今亦未有以見其為宣王之詩後三篇放此鴻鴈于飛集于中澤叶徒洛反之子于垣音袁百堵丁古反皆作雖則劬勞其究安宅叶達各反興也中澤澤中也一丈為板五板為堵孔氏曰版廣二尺故周禮説一堵之牆長丈髙一丈究終也流民自言鴻雁集于澤中以興已之得其所止而築室以居今雖勞苦而終獲安定也鴻鴈于飛哀鳴嗸嗸五刀反維此哲人謂我劬勞維彼愚人謂我宣驕叶音高比也流民以鴻雁哀鳴自比而作此歌也哲知宣示也知者聞我歌知其出于劬勞不知者謂我閒暇而宣驕也韓詩云勞者歌其事魏風亦云我歌且謠不知我者謂我士也驕大抵歌多出于勞苦而不知者常以為驕也輔氏曰葢非明知者真能體䘏我前日之情則亦焉能知其病苦之實哉若但見其今日之安定則必以我之此歌為閒暇而宣驕矣鴻鴈三章章六句序美宣王也萬民離散不安其居而能勞來還定安集之至于矜鰥寡無不得其所焉此以下時世多不可考夜如何其音基夜未央庭燎之光君子至止鸞聲將將七羊反賦也其語辭央中也胡氏曰説文云央中央也廣雅云央極中也秦風云宛在水中央央亦中也庭燎大燭也諸侯將朝則司烜毁以物百枚并卑政反而束之設于門内也孔氏曰庭燎者樹之于庭燎之光明司烜供之樹于門外曰大燭門内曰庭燎郊特牲注曰庭燎之差公五十侯伯子男皆三十是天子用百以物百枚并而纒束之今則用松韋竹灌以脂膏也君子諸侯也將將鸞鑣聲王將起視朝不安于寢而問夜之早晚日夜如何哉夜雖未央而庭燎光矣朝者至而聞其鸞聲矣夜如何其夜未艾音乂又如字庭燎晰晰之出反與艾叶君子至止鸞聲噦噦呼㑹反賦也艾盡也晰晰小明也王介甫曰其光衰也噦噦近而聞其徐行聲有節也愚按首章述王初問此章再問恐亦如齊風雞鳴之例也夜如何其夜鄉許亮反晨庭燎有煇許云反君子至止言觀其旂叶渠斤反賦也鄉晨近曉也胡氏曰從夜未中至未盡從未盡至鄉明也煇火氣也天欲明而見其烟光相雜也此是呉才老之説説此一字有功既至而觀其旂則辨色矣鄭氏曰見其旂是朝之時也朝禮辨色始入庭燎三章章五句愚按列女傳宣王嘗晏起姜后脱簪珥待罪于永巷宣王感悟于是勤于政事早朝晏退卒成中興之名以此証之或果宣王詩也序美宣王也因以箴之愚按詩文恐無箴意沔綿善反彼流水朝直遙反宗于海叶虎洧反鴥惟必反彼飛隼息允反載飛載止嗟我兄弟邦人諸友叶羽軌反莫肯念亂誰無父母叶滿洧反興也沔水流滿也諸侯春見現天子曰朝夏見曰宗蔡九峯曰水勢横趨于海猶諸侯朝宗于王也此憂亂之詩言流水猶朝宗于海飛隼猶或有所止而我之兄弟諸友乃無肯念亂者誰獨無父母乎亂則憂或及之是豈可以不念哉謝叠山曰一身之遇亂不足惜父母之遇亂深可憂誰無父母不為一身謀獨不為父母謀乎為父母謀則當念亂則必思所以捄亂也沔彼流水其流湯湯失羊反鴥彼飛隼載飛載揚念彼不蹟井亦反載起載行叶户郎反心之憂矣不可弭忘興也湯湯波流盛貌不蹟不循道也載起載行言憂念之深不遑寜處也弭止也水盛隼揚以興憂念之不能忘也鴥彼飛隼率彼中陵民之訛言寜莫之懲我友敬矣讒言其興興也率循訛偽懲止也隼之髙飛猶循彼中陵而民之訛言乃無懲止之者然我之友誠能敬以自持矣則讒言何自而興乎始憂于人而卒反諸已也輔氏曰凡有不得者皆反求諸已此自修之事也沔水三章二章章八句一章六句陳壽翁曰始念亂而憂及父母終憂讒而敬以反身憂念之中不忘孝敬詩人忠厚之意也疑當作三章章八句卒章脱前兩句耳序規宣王也鄭氏曰規者正圓之器也春秋傳曰近臣盡規孔氏曰物有不圓匝者規之使成圓人行有不周者規之使周備是匡諫之名愚按詩中但有規其親友止亂之意恐非規王之詩也鶴鳴于九皋聲聞音問于野叶上與反魚潛在淵或在于渚樂音洛彼之園爰有樹檀叶徒沿反下同其下維蘀音託他山之石可以為錯七落反比也鶴鳥名長頸竦身高脚頂赤身白頸尾黒其鳴高亮聞八九里皋澤中水溢出所為坎從外數至九喻深逺也釋文曰韓詩云九皋九折之澤輔氏曰澤曲曰皋見楚辭注蘀落也吕與叔曰落葉穢雜錯礪石也此詩之作不可知其所由然必陳善納誨之詞也輔氏曰然不正言其事而必比物而為言者正所謂諷刺上者皆不主于正事而主于文詞不以正諫而託意以諫也葢鶴鳴于九皋而聲聞于野言誠之不可揜也輔氏曰所以諷王之誠身也魚潛在淵而或在于渚言理之無定在也輔氏曰所以諷王之明善也園有樹檀而其下維蘀言愛當知其惡也他山之石而可以為錯言憎當知其善也輔氏曰所以風王力去私欲之蔽也夫必能去私欲之蔽然後可以明善而誠身此其序則由大以至小也由是四者引而伸之觸類而長之天下之理其庶幾乎濮氏曰鶴鳴于九皋其聲下聞于野上聞于天以比言有善惡而無逺近以見言之不可不謹也魚潛淵水之下而知其或在于渚或在于淵以比行有顯晦而無淺深以見行之不可不謹也樂彼之園以其有樹檀之美而不知其下有不材之木以比愛而忘其惡喜而容其佞信溺愛者不可不明也他山之石以其有磽砇之惡而不知其中有礛礪可以為攻玉之錯以比憎而忘其善惡而昧其美信偏惡者不可不審也鶴鳴于九皋聲聞于天叶鐡因反魚在于渚或潛在淵叶一均反樂彼之園爰有樹檀其下維榖他山之石可以攻玉比也榖一名楮惡木也孔氏曰陸氏云幽州人謂之榖桑荆揚交廣謂之榖中州人謂之楮殷中宗時榖桑共生是也今江南人績其皮以為布又擣以為紙樹皮斑者是楮白者是榖攻錯也程子曰玉之温潤天下之至美也石之麄厲天下之至惡也然兩王相磨不可以成器以石磨之然後玉之為器得以成焉猶君子之與小人處也横逆侵加然後修省畏避動心忍性増益預防而義理生焉道徳成焉吾聞諸邵子云邵子云有才之正者有才之不正者他山之石其小人之才乎謝疊山曰邪類與善類非同氣猶玉石不同山石而攻玉猶小人謗君子之無徳所以儆君子而進于徳欺君子之無才所以儆君子而勉為全才也鶴鳴二章章九句鶴鳴做得巧含蓄意思全不發露李迂仲曰二章殊無一句露己意其詩最為難曉詩傳通釋卷十
