body:
  text: 詩傳通釋卷八元劉瑾撰詩朱子集傳豳一之十五豳國名在禹貢雍州岐山之北原隰之野虞夏之際棄為后稷而封於邰及夏之衰棄稷不務棄子不窋迍入聲失其官守而自竄於戎狄之間孔氏曰韋昭以為不窋當大康之時不窋生鞠陶鞠陶生公劉能復修后稷之業民以富實乃相土地之宜而立國於豳之谷焉十世而大王徙居岐山之陽十二世而文王始受天命十三世而武王遂為天子武王崩成王㓜不能涖阼鄭氏曰涖視也不能視阼階行人君之事周公旦以冢宰攝政愚按成王諒隂周公固攝其政此謂不能涖阼而周公攝政則通免喪以後而言也乃述后稷公劉之化作詩一篇以戒成王謂之豳風而後人又取周公所作及凡為周公而作之詩以附焉劉元城曰名之為豳實周公詩耳周公作詩意在於豳而周公其他詩無所可係故因附之豳也胡庭芳曰詩乃周家之詩豳特夏之列國耳葢七月惟言豳民之風俗故得處變風之末彭氏曰七月公劉皆言民事其為詩一也然七月之詩微而及於昆蟲草木衣服飲食之末較之公劉莫非興王氣象其體固不同也愚按七月而後附以鴟鴞東山者亦周公所作也附以伐柯破斧九罭狼跋者衆人為周公而作之詩也豳在今邠州三水縣邰在今京兆府武功縣愚按今莊浪路有邠州鞏昌路鎮原州有三水縣故城安西路乾州冇武功縣並隷陝西省七月流火叶虎委反九月授衣叶上聲一之日觱音必發叶方吠反二之日栗烈叶力制及無衣無褐音曷叶許例反何以卒嵗或曰發烈褐皆如字而嵗讀如雪三之日于耜叶羊里反四之日舉趾同我婦子叶奬里反饁炎輙反彼南畆叶滿彼反田畯音俊至喜賦也七月斗建申之月夏之七月也後凡言月者放此愚按凡詩中月數皆以寅月起數不特此詩為然也流下也火大火心星也以六月之昏加於地之南方至七月之昏則下而西流矣愚按堯典曰永星火以正仲夏葢堯時仲夏日在鶉火故昏而大火中及周公攝政時凡一千二百四十餘年嵗差當退十六七度故六月而後日在鶉火大火昏中七月則日在鶉首而昏時大火西流於地之未位然此詩上述邠俗乃當夏商之時而言七月流火者葢據周公時所見而言耳九月霜降始寒而蠶績之功亦成故授人以衣使禦寒也一之日謂斗建子一陽之月二之日謂斗建丑二陽之月也變月言日言是月之日也後凡言日者放此張子曰言月又言日别無義例只是文順葢周之先公已用此以紀候故周有天下遂以為一代之正朔也觱發風寒也栗烈氣寒也王介甫曰風而寒尚非其至也無風而寒於是為至褐毛布也孔氏曰褐賤者所服今夷狄作褐皆織毛為之嵗夏正之嵗也于往耜田器也濮氏曰耜以起土者言之于耜言往修田器也舉趾舉足而耕也我家長自我也饁餉田也田畯田大夫勸農之官也周公以成王未知稼穡之艱難故陳后稷公劉風化之所由使瞽矇朝夕諷誦以教之真氏曰周家以農事開國成王幼冲周公作詩使瞽朦歌之庶幾王知小民之依不敢荒寧葢與無逸同一意也此章首言七月暑退將寒程子曰嵗過中而行暮矣當有卒嵗之具禦寒之備故以七月流火為首張子曰慮事有豫常於半年前提掇故頻舉七月為言故九月而授衣以禦之葢十一月以後風氣日寒不如是則無以卒嵗也正月則往修田器二月則舉趾而耕少者既皆出而在田故老者率婦子而餉之治田早而用力齊是以田畯至而喜之也歐陽子曰田大夫見其勸農樂業而喜愚按治田早者二月而即舉趾也用力齊者少壯則在田家長婦子則致餉也勸農之道無非欲其不後於時不懈於力邠人乃不待勸而能然田畯所以喜也此章前段言衣之始後段言食之始二章至五章終前段之意六章至八章終後段之意吕與叔曰七月流火則憂卒嵗之無衣三之日于耜以備秋成而有食愚按人情之常冬寒而始索衣然所以成衣者則不始於冬而始於七月之暑退秋成而始得食然所以足食者則不始於秋而始於三月之舉趾故此章前段以七月言衣褐之所始二章至五章既終其意而復言穹室墐戸之事後段以三之日言耕食之始六章至八章既終其章而并言蔬果祭享之事又皆所以廣此章衣食之意也七月流火九月授衣春日載陽有鳴倉庚叶古良反女執懿筐遵彼微行叶户郎反爰求柔桑春日遲遲采蘩祁祁巨之反女心傷悲殆及公子同歸賦也載始也陽温和也倉庚黄鸝也懿深美也遵循也微行小徑也柔桑稺桑也遲遲日長而暄也孔氏曰人在陽則舒在隂則惨遇春暄則四體舒泰覺晝景之稍稍長謂日行遲故以遲遲言之也蘩白蒿也所以生蠶今人猶用之葢蠶生未齊未可食桑故以此啖之也祁祁衆多也或曰徐也公子豳公之子也再言流火授衣者將言女功之始故又木於此遂言春日始和有鳴倉庚之時而蠶始生則執筐以求稺桑王介甫曰以九月授衣也故春日載陽則求桑而蠶鄭氏曰蠶始生宜稺桑也然又有生而未齊者則采蘩者衆而此治蠶之女感時而傷悲毛氏曰春女悲秋士悲感其物化也葢是時公子猶娶於國中而貴家大族連姻公室者亦無不力於蠶桑之務故其許嫁之女預以將及公子同歸而逺其父母為悲也輔氏曰周公作北詩所以體其民之意至纎至悉至於女心傷悲殆及公子同歸體之至此則其餘固無不盡也夫后稷先公之世去周公亦逺矣而能體其民如此則當時之民癢痾疾痛周公又豈冇不體之者乎所謂唯君子為能通天下之志而聖人之心能合天下為一體通古今為一息者周公之謂矣張子曰此言重昏嫁本人情愚按同歸者同親迎之公子而歸也其風俗之厚而上下之情交相忠愛如此後章凡言公子者放此張子曰我朱孔陽則已欲為公子裳采蘩祁祁則殆及公子同歸民愛邠公待之如家人其愛之深如此愚按後章言為公子裳為公子裘者固皆可見其俗之厚而有忠愛公子之情但此章因念及公子同歸而為離親之悲亦無非忠愛其上之心也七月流火八月萑戸官反葦韋鬼反蠶月條它彫反桑取彼斧斨七羊反以伐逺揚猗於宜反彼女桑七月鳴鶪圭覔反八月載績載𤣥載黄我朱孔陽為公子裳賦也萑葦即蒹葮也蠶月治蠶之月王介甫曰蠶長非一月故不指言某月也愚按蠶月雖不可指定某月然其既條取大桑復猗彼女桑大約當在建辰之月蠶盛之時先儒或疑此詩獨闕三月葢已具於蠶月之間矣條桑枝落之采其葉也孔氏曰斬條於地采之也斧隋駝妥二音銎穹斨方銎釋文曰隋孔形狹而長銎斧孔也孔氏曰斨即斧也唯鞏孔異耳逺揚逺枝揚起者也孔氏曰長條揚起手所不及故枝落之而采其葉取葉存條曰猗女桑小桑也孔氏曰女是人之弱者女桑柔桑也小桑不可條取故取其葉而存其條猗猗然耳蘇氏曰猗長也葉盡則條猗猗其長也鶪伯勞也孔氏曰夏至來冬至去應隂氣之動其聲鶪鶏以聲得名胡庭芳曰補傳云仲夏始鳴七月則鳴之極鶪鶪以七月鳴則隂氣至而衆芳歇矣鴂鶪音相近服䖍陸佃以為題鴂即鶪也績緝也𤣥黒而有赤之色朱朱色陽明也言七月暑退將寒而是嵗禦冬之備亦庶幾其成矣又當預擬來嵗治蠶之用故於八月萑葦既成之際而收蓄之將以為曲薄孔氏曰月令季春具曲植筐筥注曲薄也植槌也薄用萑葦為之至來嵗治蠶之月則采桑以供蠶食而大小畢取見蠶盛而人力至也蠶事既備又於鳴鶪之後麻熟而可績之時則績其麻以為布王介甫曰蠶生於陽氣之淑時故以倉庚為候麻成於隂氣之慝時故以鶪為候而凡此蠶績之所成者皆染之或𤣥或黄而其朱者尤為鮮明皆以供上而為公子之裳言勞於其事而不自愛以奉其上葢至誠慘怛之意上以是施之下以是報之也程子口為公子裘獻豜于公皆北義也民之知義如此則美俗成矣愚按至誠慘怛之情一施一報即所謂交相忠愛者也以上二章專言蠶績之事以終首章前段無衣之意愚按二章三章雖皆以終首章無衣之意而其意則益深逺葢二章之終其意者推言暑退將寒而授衣其衣之成實始於春月之蠶桑此章又推言暑退之後是嵗蠶桑之功既成而來嵗蠶桑之備方始以至預言八月載績又皆預恐來嵗之無衣焉其慮之逺而備之悉者如此四月秀葽於遙反五月鳴蜩徒彫反八月其穫戸郭反十月隕于敏反蘀音託一之日于貉戸各反取彼狐貍力之反為公子裘叶渠之反二之日其同載纘子管反武功言私其豵子公反獻豜古年反于公賦也不榮而實曰秀爾雅釋草曰木謂之華草謂之榮葽草名逺志也本草一名葽繞蜩蟬也王介甫曰陽生則言日隂生則言月然四月正陽秀葽言月何也秀葽以言隂也四月隂生者氣之先至也葽感隂氣而先秀蜩感隂氣而先鳴張子曰秀葽者物成之初鳴蜩者嵗秋之漸穫禾之早者可穫也隕墜蘀落也謂草木隕落也貉狐貍也于貉猶言于耜謂往取狐貍也同竭作以狩也王介甫曰唯田國人竭作故曰同孔氏曰獨說冬獵者以取皮在冬也纘習而繼之也孔氏曰繼纘武事年常習之使不忘戰也豵一嵗豕豜三嵗豕言自四月純陽而厯一隂四隂以至純隂之月則大寒之候將至鄭氏曰秀葽也鳴蜩也穫禾也隕蘀也四者皆物成而將寒之候物成自秀葽始雖蠶桑之功無所不備猶恐其不足以禦寒故于貉而取狐貍之皮以為公子之裘也李迂仲曰采桑采蘩則其勤於蠶事可謂至矣又於鳴鶪之候麻事興焉至於染𤣥黄之色為公子裳取狐貍之皮為公子裘凡所以輔蠶事者無不致力也真氏曰上言織薄於秋求桑於春躬蠶織之勞以為衣者無所不至猶恐其未足也于貉為裘又有以相之獸之小者私之以為已有而大者則獻之於上亦愛其上之無已也此章專言狩獵以終首章前段無褐之意愚按前兩章終無衣之意固有至誠慘怛忠愛其上之情而此章終無褐之意一則曰為公子裘二則曰獻豜于公亦如上章之意焉是則下之憂夫無衣無褐而欲為之備者皆汲汲邠公家人之身而不敢以已之温暖為先非邠公有以施之安能使之若是哉五月斯螽音終動股六月莎素和反雞振羽七月在野叶上與反八月在宇九月在户後五反十月蟋蟀入我牀下叶後五反八字一句穹起弓反窒珍窒反熏許云反鼠塞向墐音覲户同上嗟我婦子叶兹五反曰為改嵗入此室處賦也斯螽莎雞蟋蟀一物隨時變化而異其名胡庭艻曰集傳本伊川說而三物名色各異動股始躍而以股鳴也振羽能飛而以翅鳴也陸璣曰斯螽股似玳瑁五月中兩股相切作聲聞數十歩江東呼蚱蜢莎雞如蝗班色毛翅數重其翅正赤六月中飛而振羽索索作聲范氏曰五月而隂生動股振羽氣使之然也宇簷下也暑則在野寒則依人鄭氏曰自在野至入我牀下皆謂蟋蟀也穹空孔隙也窒塞也向北出牖也墐塗也庶人篳户冬則塗之李迂仲曰月令孟冬之月命有司曰天氣上騰地氣下降閉塞而成冬則以十月為塞向墐戸之候孔氏曰篳户以荆竹織門以其通風故泥之也東萊吕氏曰十月而曰改嵗三正之通于民俗尚矣周特舉而迭用之耳周厯夏商其未有天下之時固用夏商之正朔然其國僻逺無純臣之義又自有私記其時月者故三正皆曽用也愚按嵗字之義有以天時一周而言者有以正朔所紀而言者天時一周必始於孟春而終於季冬首章所謂二之日何以卒嵗是也正朔所紀則子丑寅之迭建與此十月而謂改嵗者是也夫夏書有怠棄三正之語則自夏以前已有子丑之正是三正通于民俗其來既逺故邠公創國偏方亦有十月改嵗之俗及至周有天下又因以為一代之正朔正如公劉徹田為糧之法其後亦為成周之徹法也然考東萊詩記周字上有商字似謂子丑之正非創自商周商周迭興不過舉前代之制而迭用之耳今朱子所引乃無商字而又謂周人三正皆曽用似與東萊本意不同未知何也言覩蟋蟀之依人則知寒之將至矣李迂仲曰自純陽而一隂生積而至於大冬其來固有漸也故記此三物始而在野既而在宇在戸皆自外而之内自逺而之近既入于牀下則近人而寒至矣楊氏曰堯命羲和以昏中之星正四時鳥獸氄毛希革之類為之應七月所陳以倉庚鳴鶪為蠶績之候以莠葽隕蘀其穫為取皮之候以斯螽蟋蟀為處室之候皆此意也於是室中空隙者塞之熏鼠使不得穴於其中塞向以當北風墐户以禦寒氣而語其婦子曰嵗將改矣天既寒而事亦已可以入此室處矣此見老者之愛也前漢食貨志曰春令民畢出在埜多則畢入於邑曰同我婦子饁彼南畆又曰嗟我婦子入此室處所以順隂陽也愚按老者之愛其家人如此亦所謂上以是施之者也此章亦以終首章前段禦寒之意愚按此章推言窒塞墐户亦以終首章前段意也已上三章皆言所以為公上禦寒之計此章然後自言禦寒可見其君臣之義尊卑之序矣六月食鬱及薁於六反七月烹普庚反葵及菽音叔八月剥普卜反棗叶音走十月穫稻叶徒苟反為此春酒以介睂夀叶殖酒反七月食瓜叶音孤八月斷壺九月叔苴七餘反采荼音徒薪樗敕書反食音嗣我農夫賦也鬱棣屬薁蘡纓又音鶯薁也孔氏曰鬱樹髙五六尺實大如李而正赤食之甜本草云一名雀李一名車下李與棣相類薁薁李二者相類同時熟本草注曰葡萄即薁蘡生隴西五原山谷葵菜名陸農師曰葵有紫白二種葵心隨日光所轉輙低覆其根爾雅曰莖大葉小花紫黄色可茹菽豆也濮氏曰菽豆葉謂之藿剥擊也穫稻以釀酒也本草注曰粳糯通名為稻糯温故以為酒鄭氏曰穫稻而漬米麴至春為酒蘇氏曰夏不可以釀故為此酒以繼之介助也介睂夀頌禱之詞也王介甫曰養氣體以助之也孔氏曰睂夀者年老有毫睂秀出壺瓠也劉執中曰枯者可為壺嫩者可供茹八月宜斷其梢令勿復老實所以堅其壺而大其茹食瓜斷壺亦去圃為場之漸也叔拾也苴麻子也孔氏曰拾取麻子以供食也荼苦菜也樗惡木也孔氏曰樗唯堪為薪故曰惡木本草注曰樗木類椿江東呼為鬼目葉脫處有痕如眼目故得名其木最無用莊子所謂大本不中繩墨小枝不中規矩者也自此至卒章皆言農圃飲食祭祀燕樂以終首章後段之意李迂仲曰于耜舉趾則其勤於田事可謂至矣穫稻納禾則田事之畢至於食鬰及薁亨葵及菽開氷祭韭朋酒羔羊凡所以助飲食者無不至也而此章果酒嘉蔬以供老疾奉賓祭瓜瓠苴荼以為常食少長之義豐儉之節然也程子曰食鬱以下皆為老者之具食瓜以下皆為壯者之食陳少南曰取豵以為私取豜以獻公上下之分著矣以美者養老惡者自養長幼之義明矣愚按此章終首章言食之意而以美者養老惡者常食是亦可見其愛歇於上之無已猶四章終無褐之意也抑又可見其豐於供老奉賓而儉於自養也九月築場圃傳故反十月納禾稼叶古護反黍稷重直容反穋音六叶六直反禾麻菽麥叶訖力反嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯徒刀反亟紀力反其乗屋其始播百穀賦也場圃同地物生之時則耕治以為圃而種菜茹物成之際則築堅之以為場而納禾稼葢自田而納之於場也彭氏曰築場於圃地地無遺利也禾者穀連藳秸戞之總名禾秀實而在野曰稼先種後熟曰重後種先熟曰穋再言禾者稻秫述苽孤粱之屬皆禾也本草注曰稻米有秔有糯秫米是粟秫似黍米而粒小不堪為飯最粘冝作酒苽又謂之茭白嵗久中心生白臺謂之菰米臺中有黒者謂之茭鬱至後結實乃雕胡黒米粱米皆是粟類孔氏曰麻與菽麥則無禾稱故於麻麥之上更言禾字以總諸禾也同聚也王介甫曰言所納之備也宫邑居之宅也古者民受五畆之宅二畆半為廬在田春夏居之二畆半為宅在邑秋冬居之功葺治之事也王介甫曰上入執宫功城中之宅也中田有廬田中之廬也出而作於田入而休於室皆授之以時愚按十月禾稼既同之後而入治邑居既蟋蟀入床下而塞向墐戸之時也或曰公室官府之役也古者用民之力嵗不過三日是也索絞也綯索也乗升也胡庭芳曰如集傳或說則晝爾于茅之下已是歸治其屋言納於場者無所不備則我稼同矣可以上入都邑而執治宫室之事矣李迂仲曰自田野入都邑故謂之上故晝徃取茅夜而絞索亟升其屋而治之葢以來嵗將復始播百穀而不暇於此故也不待督責而自相警戒不敢休息如此輔氏曰黍稷重穋未麻菽麥則凡一嵗所種者先後大小皆舉之矣故後總言之曰我稼既同謂畢聚也嗟我婦子歎其為生之弱也食我農夫憐其自養之薄也嗟我農夫歎其愛上之忠也其曰我者親之愛之重之之辭上入執宫功觀上之一字恐當從范氏董氏說以為公宫官府之役於其田畆則曰雨我公田逺及我私於其居室則曰上入執宫功然後索綯以乗屋周人之忠君親上發於真誠如此固不待使之而然也七月之民其事則不外於農乗其心其心則不忘乎君上治天下之未能使斯民至於如此則皆苟道也王介甫曰宵可以息矣而索綯冬可以息矣而乗屋程子曰古者功作之事皆於冬月閑隙之際加修完室廬墻垣之類皆為來嵗計皆是一嵗既終則復慮其始也輔氏曰詩言民之趨於農功自然如此其亟故孟子引之以證其民事不可緩之說吕氏曰此章終始農事以極憂勤艱難之意范氏曰天運而不息人勤而不已故我稼既同則又將始播殖也王介甫曰如易所謂終則有始也愚按此章終首章言食之意而終始農事之艱難亦猶三章終無衣之意既終蠶桑之功復擬來嵗治蠶之用也二之日鑿冰沖沖三之日納于凌力證反陰叶於容反四之日其蚤音早獻羔祭韭音九叶已小反九月肅霜十月滌徒力反場朋酒斯饗叶虚艮反曰殺羔羊躋子奚反彼公堂稱彼兕觥虢彭反叶古黄反萬壽無疆賦也鑿氷謂取氷於山也沖沖鑿氷之意周禮十二月令斬氷是也孔氏曰周禮凌人十二月斬水則即以其月納之納藏也藏氷所以備暑也鄭氏曰上言備寒此言備暑凌隂氷室也豳土寒多正月風未解凍故氷猶可藏也蚤蚤朝也韭菜名獻羔祭韭而後啓之月令仲春獻羔開氷先薦寢廟是也孔氏曰祭韭者以時韭新出故薦之鄭氏曰獻羔祭司寒而出氷薦於宗廟乃後賦之蘇氏曰古者藏氷發氷以節陽氣之盛夫陽氣之在天地譬如火之著長入聲於物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納氷於地中至於二月四陽作蟄蟲起陽始用事則亦始啓氷而廟薦之至於四月陽氣畢逹隂氣將絶則氷於是大發食肉之禄老病喪浴氷無不及孔氏曰二月間氷公始用之未賜臣也至於夏初其出之也朝之禄位賔客喪祭於是乎普用之杜氏曰食肉之禄謂在朝廷治其職事就官食者老謂致仕在家者是以冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無災霜雹癘疾不降民不天札也杜氏曰愆過也謂冬温伏隂謂夏寒凄寒也苦雨霖雨為人所患苦短折為夭夭死為扎胡氏曰藏氷開氷亦聖人輔相燮調之一事耳不專恃此以為治也肅霜氣肅而霜降也滌場者農事畢而掃場地也兩尊曰朋鄉飲酒之禮尊兩壺于房户間是也孔氏曰鄉飲酒有四四則黨正十二月因大蜡而飲酒也李寳之曰房戸間者房西室戸束於堂為東西之中當兩楹間躋升也公堂君之堂也稱舉也疆竟也張子曰此章見民忠愛其君之甚既勸趨其藏氷之役又相戒速畢場功殺羊以獻于公舉酒而祝其壽也問民何以得升君之堂曰周初國小君民相親其禮樂法制亦未甚備而民事艱難君則盡得以知之成王之時禮樂備法制立然但知為君之尊而未必知為國之初此等意思也故周公特作此詩使之因是以知民事也嚴氏曰補傳云君民相親不啻如家人父子周之王業由於得民世三十年八百基於此歟國人以朋酒羊羔自詣公堂其禮甚野其意甚真雖立國之初庶事草草然非三代之時安得此風俗也輔氏曰以介睂夀祝其親也萬夀無疆祝其君也周之先公以農枽教民而使民給足於衣食然未嘗以為惠也周之民亦自力於農桑之事以樂其生至於嵗終休暇之時則殺羊為酒祝君之夀以致其尊君親上之誠亦未嘗以為是足以報其上也上以誠愛下下以誠事上而两不知其所以然此所謂皥皥如也愚按此章推言氷食飲宴以終言食之意而見其民忠愛之情亦猶二章三章四章終言衣褐之意而見其風俗之厚上下之情交相忠愛也七月八章章十一句周禮籥章中仲春晝擊土鼓龡豳詩以逆暑仲秋夜迎寒亦如之即謂此詩也鄭氏曰土鼓以瓦為匡以革為兩面可擊吹之者以籥為之聲七月言寒著之事迎氣歌具類也迎暑以晝求諸陽迎寒以夜求諸隂王氏曰仰觀星日霜露之變俯察昆蟲草木之化以知天時以授民事女服事乎内男服事乎外上以誠愛下下以忠利上父父子子夫夫婦婦養老而慈幼食力而助弱其祭祀也時其燕饗也節此七月之義也程子曰十月大意憂思深逺欲成王知先公致王業之由民之勞力趨時艱難如此此時多陳節物大要言嵗序之遷人事當及時耳王介甫曰不作無益也預備乎田桑之事而已不貴異物也致美乎田器而已人無遺力矣故事不足治也地無遺利矣故物不可勝用也女不淫而仁也又有禮焉士不惰而武也又有義焉非道之以政齊之以刑所能致也風化而已嚴氏曰七月一詩一言以蔽之曰豫而已凡感節物之變而修人事之備皆豫為之謀也輔氏曰此詩前三章皆以暑退將寒為言故以七月流火一句為始至四章則以四月秀葽純陽之月為始五章則以五月斯螽動股為始六章則以六月食鬱及薁為始而迄乎九月叔苴七章則遂以九月築場圃為始而繼以十月納禾稼八章則以十二月正月二月為始而終於九月十月周正之嵗終焉其所舉時月雖若參差不齊而細觀之則亦有次序如此真氏曰農者衣食之本唯其闗生民之大命是以服天下之至勞今以此詩考之是其心無一念不在乎農也一嵗之間無一日不專乎農也一家之内無一人不力乎農也近世張栻入侍經筵言周公之告成王見於詩有如七月見於書有如無逸欲其知稼穡之艱難與小人之依帝王所傳心法之要端在於此其論最為懇至臣愚不佞願詔儒臣以今農夫紅女耕蠶勞勩之狀作為歌詩退朝之暇使人日誦乎前且繪畫成圖揭之宫掖布之戚里庶㡬聖心惕然不忘小民之依而六宫嬪御外戚近屬亦知衣食所自來而不侈汰之習也序陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也董氏曰先儒以七月為周公居東而作考其詩則陳后稷公劉所以治其國者方風諭以成其徳故是未居東也至于鴟鴞則居東而作其在書可知矣鴟鴞鴟鴞既取我子又叶入聲無毁我室又叶上聲恩斯勤斯鬻由六反子之閔叶睂貧反斯比也為鳥言以自比也鴟鴞鵂鶹惡鳥攫鳥子而食者也吕與叔曰惡聲之鷙鳥也有鴞萃止翩彼飛鴞為梟為鴟盖梟之類也室鳥自名其巢也恩情愛也勤篤厚也鬻養閔憂也武王克商使弟管叔鮮蔡叔度監于紂子武庚之國武王崩成王立周公相之而二叔以武庚叛且流言於國曰周公將不利於孺子潘子善問周公使管叔監殷豈非以愛兄之心勝故不敢疑之耶曰若說不敢疑則已是有可疑者也盖周公以管叔是吾之兄事同一體今既克商使之監殷又何疑焉非是不敢疑乃是即无可疑之事也不知他自差異周公為之奈何哉董叔重因云孟子所謂周公之過不亦宜乎者正謂此也先生曰然故周公東征二年乃得管叔武庚而誅之而成王猶未知周公之意也公乃作此詩以貽王託為鳥之愛巢者呼鴟鴞而謂之曰鴟鴞鴟鴞爾既取我之子矣無更毁我之室也以我情愛之心篤厚之意鬻養此子誠可憐憫今既取之其毒甚矣况又毁我室乎以比武庚既敗管蔡不可更毁我王室也彭氏曰鴟鴞以比武庚子以比羣叔室以比王室或問既取我子无毁我室解者以為武庚既敗管蔡不可復亂王室畢竟是富初管蔡挾武庚為亂曰詩人之言只得如此不成歸怨管蔡愚按此詩歸罪於武庚而於三叔則有閔惜之意盖為親者諱也如書之大誥亦然此皆兄弟私情見於立言之際然而公義則不可掩故史臣於書既曰管叔及其羣弟流言於國又曰周公位冢宰羣叔流言乃皆以公義直書之者也迨天之未隂雨徹彼桑土音杜徒古反綢直留繆莫侯反牖户後五反今女音汝下民或敢侮予叶演女反比也迨及徹取也桑土桑根也桑根之皮也釋文曰韓詩作杜方言云東齊謂根曰杜綢繆纒綿也牖巢之通氣處戸其出入處也亦為鳥言我及天未隂雨之時而往取桑根以纒綿巢之隙冗使之堅固以備隂雨之患則此下土之民誰敢有侮予者亦以比已深愛王室而預防其患難之意故孔子賛之曰為此詩者其知道乎能治其國家誰敢侮之張南軒曰鳥於天未隂雨而撤桑土葺牖戸是猶於國家安泰之日而經理備預者也盖消息盈虚之相盪安危治亂之相承理之常然非知我者孰能審微於未形而御變於將來哉輔氏曰言已之深愛王室先事為備以防禍亂之意疑當時流言必以為周公平日勤勞皆是自為已謀故今攝政而欲不利於孺子耳故周公言此以曉成王也予手拮音吉据音居予所捋力活反荼予所畜租子胡反予口卒瘏音徒曰予未有室家叶古胡反比也拮据手口共作之貌釋文曰韓詩云口足為事曰拮据捋取也荼萑丸苕迢可藉巢者也孔氏曰薍為萑萑苕謂薍之秀穗也薍頑去聲蓄積租聚也卒盡瘏病也輔氏曰拮据手口共作之貌將荼蓄租則其所作之事也先言手之拮据終言口之卒瘏亦言之法室家巢也亦為鳥言作巢之始所以拮据以捋荼蓄租勞苦盡病者嚴氏曰手拮据而捋荼蓄租而口卒瘏交錯言之也以巢之未成也以比已之勤勞如此者以王室之新造而未集故也予羽譙譙在消反予尾翛翛素彫反予室翹翹所消反風雨所漂匹遥反摇予維音嘵嘵呼堯反比也譙譙殺去聲也翛翛敝也翹翹危也嘵嘵急也亦為鳥言羽殺尾敝以成其室而未定也風雨又從而飄摇之則我之哀鳴安得而不急哉以比已既勞悴王室又未安而多難乗之則其作詩以喻王亦不得而不汲汲也輔氏曰此詩固是周公赤心至誠然流言自以周公為已謀而周公自以王室為已之室家無所避也此又可見其正大之情程子曰此公之詩所以詞哀而意切也愚按上章及此周公自比其勤勞如此者盖公以貴戚大臣宗社安危係於其身者非一日矣成王既惑於流言則夫自言其勞而不為誇謂王室為予室而不為嫌良以嘵嘵之音出於忠愛之情所不能已也然而成王之信其勤勞王家猶有待於他日雷風之變又以見讒說之易以入人忠言之難於見信而惜成王之見不明且速也鴟鴞四章章五句事見書金縢篇金縢曰管叔及其羣弟流言於國曰公將不利於孺予周公乃告二公曰我之弗辟我無以告我先王周公居東三年則罪人斯得于後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公蔡氏傳曰流言無根之言也商人兄弟争立者多周公攝政商人固已疑之又管叔於周公為兄尢所覬覦故武庚管蔡流言於國以危懼成王而動摇周公也辟讀為避鄭氏詩傳曰周公辟居東都是也周公言我不避則於義有所不盡無以告先王於地下也居東居國之東也鄭氏謂避居東都未知何據孔氏以居東為東征非也方流言之起成王未知罪人為誰二年之後王始知罪人之為管蔡斯得者遲之之詞也誚讓也按東山詩言自我不見于今三年則居東之非東征明矣盖周公居東二年成王因風雷之變既親迎以歸三叔懷流言之罪遂脅武庚以叛成王命周公征之其東征往返首尾又自三年也弗辟之說只從鄭氏為是向董叔重得書亦辨此一時信筆荅之謂當從古注說從來思之不然三叔方流言周公處骨肉之間豈應以片言半語遽然興師以征之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請之於王亦未必見從雖曰聖人之心公平正大區區嫌疑似不必避但舜避堯之子禹避舜之子自是合如此若居堯之宫逼堯之子即為簒矣或謂周公居東不幸成王終不悟不知周公又如何處愚謂公亦惟盡其忠誠而已矣問鴟鴞詩其詞艱苦深奥不知當時成王如何便理㑹得曰當時事變在眼前故讀其詩者便知其用意所在自今讀之既不及見當時事所以謂其詩難曉然成王雖得此詩亦只是未敢誚公其心未必能遂無疑及至雷風之變啓金縢之書後方始釋然開悟先生却問必大曰成王因何知有金縢啓得之必大曰此二公賛之也又問二公何故許乆不説若雷不響風不起時又如何必大曰聞之吕大著云此見二公功夫處二公在裏而調護非一日矣但他人不得而知爾曰東萊愛説一般如此道理以大問其事畢竞如何曰是時周公握了大權成王自是轉動周公未得便假瑾風雷之變周公亦須别有道理李懷光反其子瑾告徳宗曰臣父能危陛下陛下不能制臣父借此可見當時事勢然於周公之事則不過使成王終於省悟耳詩詞多出於當時鄉談雜而為之如鴟鴞拮据捋荼之語皆此類也周公不知其人如何其言聱牙難曉考於書如周公之言便難讀如立政君奭篇是也最好者惟無逸一書中間用字亦有譸張為幻之語愚按集傳以為公遭流言即東征二年而誅管叔武庚其後乃作此詩成王得詩又感風雷之變迎公以歸公乃作東山之詩此盖用孔氏書註弗辟之説後來既與九峯辨其不然以為當從鄭氏而於詩傳則未及追改耳盖流言之興而公弗避居以待成王之察則其心雖無私而義有未盡故曰我無以告我先王是以避居二年之後成王既知流言之罪人而疑慮未釋乃作鴟鴞以喻之觀其告鴟鴞以無毁我室可見其詩作於武庚未誅之先自雷風之變而周公既歸乃承王命作大誥東征一書之中首言王若曰繼而屢言王曰又言冲人又曰寜考皆自成王而言可見公之東征王實命之當在王既感悟而迎公以歸之後也序周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟鴞焉此序以金縢為文最為有據我徂東山慆慆吐刀反不歸無韻未詳我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行戸郎反枚叶謨悲反蜎蜎烏𤣥反者蠋音蜀烝在桑野叶上與反敦都迴反彼獨宿亦在車下叶後五反賦也東山所征之地也李迁仲曰周在豐鎬管蔡三監叛其地在王室之東周公征之自西而東故謂之東征慆慆言久也陳少南曰慆慢也有流而不止之意零落也濛雨貌裳衣平居之服也勿士行枚未詳其義鄭氏曰士事也行陣也枚如箸銜之有繣壤又音畫結項中以止語也鄭氏曰軍法止語為相疑惑蜎蜎動貌蠋桑蟲似蠶者也烝發語辭敦獨處不移之貌此則興也成王既得鴟鴞之詩又感雷風之變始悟而迎周公於是周公東征已三年矣既歸因作此詩以勞歸士鄭氏曰管蔡流言周公避居東都成王既得金縢之書親迎周公公歸攝政三監叛公乃東伐之三年而後歸盖為之述其意而言曰我之東征既久而歸途又有遇雨之勞董氏曰我徂東山記其地也慆慆不歸記其久也我來自東記其還也零雨其濛記其時也范氏曰人之情憚往而樂歸於其歸猶閔其遇雨則其往可知矣因追言其在東而言歸之時心已西嚮而悲於是制其平居之服而以為自今可以勿為行陳銜枚之事矣吕東萊曰此亦歸士之情也所謂序其情而閔其勞也及其在塗則又覩物起興而自嘆曰彼蜎蜎者蠋則在彼桑野矣此敦然而獨宿者則亦在此車下矣王介甫曰古用車戰則將卒有所蔽倚止則為菅衞與塹柵無以異兵械衣服皆可以載其中我徂東山慆慆不歸我來自東零雨其濛果臝力果反之實亦施羊豉反于宇伊威在室蠨音蕭蛸所交反在戸後五反町他項反畽他短反鹿場熠以執反燿以照反宵行叶戸郎反亦可畏叶於非反也伊可懷叶胡威反也賦也果臝栝括樓也本草曰栝樓實名黄𤓰生苗引藤蔓實在花下大如拳九月熟施延也蔓生延施于宇下也伊威䑕婦也室不掃則有之劉執中曰伊威壁落間小蟲也無人掃則出行于室本草曰鼠婦一名負蟠多在下濕處及土坎中常惹著鼠背故名鼠負今誤作婦字所謂濕生蟲也多足其色如蚓背有横紋蠨蛸小蜘蛛也户無人出入則結網當之陸璣曰蠨蛸名長踦小如蜘蛛而足長喜結綱當户人觸之則伸前後足如草使人不疑為蟲故名長踦踦音欺孔氏曰小蜘蛛長脚者俗呼為蟢子亦町畽舍傍隙地也程子曰廬傍畦壠埤雅曰言町畦林疃之中也無人焉故鹿以為場也熠燿明不定貌宵行蟲名如蠶夜行喉下有光如螢濮氏曰舊說以熠燿即螢以宵行為夜飛與下章熠燿其羽相戾當知宵行乃蟲名章首四句言其往來之勞在外之久故每章重言見其感念之深遂言已東征而室廬荒廢至於如此亦可畏矣然豈可畏而不歸哉亦可懷思而已此則述其歸未至而思家之情也程子曰丁夫於伇田事廢而室廬荒果臝以下是也在彼思念其如此也嚴氏曰别家於久住之處猶或相忘至於歸心已動行而未至則思家之情最切故序其在途之情以慰勞之我徂東山慆慆不歸我來自東零雨其濛鸛古玩反鳴于垤田節反叶地一反婦嘆于室洒掃穹窒我征聿至叶入聲有敦都迴反𤓰苦烝在栗薪自我不見于今三年叶尼因反賦也鸛水鳥似鶴者也陸璣曰似鶴而大長頸赤喙白身黒尾翅本草注曰頭無丹項無烏帶身似鶴不善唳但以喙相擊而鳴亦有二種白鸛烏鸛蛭蟻塚也孔氏曰蟻輦土為塚以避濕濮氏曰垤土之高也孟子曰秦山之於丘垤舊說以垤為蟻封恐非穹窒見七月將陰雨則穴處者先知故蟻出垤而鸛就食之遂鳴于其上也詩攷曰巢處知風穴處知雨孔氏曰將陰雨水泉上潤故螘避濕而上塚鸛是好水之鳥知天將雨故長鳴而喜也行者之妻亦思其夫之勞苦而嘆息於家鄭氏曰行者於陰雨尤苦婦念之則嘆於室也於是洒掃穹窒以待其歸而其夫之行忽已至矣因見苦𤓰繫於栗薪之上而曰自我之不見此亦已三年矣栗周土所宜木與苦𤓰皆微物也見之而喜則其行久而感深可知矣我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁邦角反其馬叶滿補反親結其縭叶離羅二音九十其儀叶宜俄二音其新孔嘉叶居宜居何二反其舊如之何叶奚何二音賦而興也倉庚飛昏姻時也熠燿鮮明也愚按上章熠燿言宵行蟲之光故以為明不定貌此章言倉庚之羽故以為鮮明集傳隨文解義類如此黄白曰皇孔氏曰謂馬色有黄處有白處駵白曰駁孔氏曰謂馬色有駵處有白處駵赤色也縭婦人之褘暉也母戒女而為之施衿欽去聲結帨也爾雅孫炎注褘帨巾也郭璞注衿衣小帶也孔氏曰昏禮言結帨此言結縭則縭當是帨九其儀十其儀言其儀之多也賦時物以起興而言東征之歸士未有室家者及時而昏姻既甚美矣其有室家者相見而喜當如何邪程子曰言歸而及時成昏姻之禮人情之所樂也東山四章章十二句序曰一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以說也說以使民民忘其死其惟東山乎愚謂完謂全師而歸無死傷之苦思謂未至而思有愴恨之懷至於室家望女男女及時亦皆其心之所願而不敢言者上之人乃先其未發而歌詠以勞苦之則其歡欣感激之情為如何哉盖古之勞詩皆如此其上下之際情志交孚雖家人父子之相語無以過之此其所以維持鞏固數十百年而無一旦土崩之患也李迂仲曰此詩所以勞歸士也而但述其懷思之情盖載其情於詩是其情周公知之矣知其情所以勞之也也東山詩曲盡人情方其盛時則作之於上東山是及其衰世則作之於下伯兮是也輔氏曰周公之詩七月述后稷公劉衣食斯民之事以告成王見君人之道也鴟鴞述已之勤勞以悟成王見為臣之義也東山述歸士之意以慰勞之見用民之宜也三詩誠足以為萬世法非周公其孰能為之愚按古之勞詩如四牡采薇出車杕杜等篇皆足以交通上下之情而為固結人心之本也序周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以説也説以使民民忘其死其惟東山乎此周公勞歸士之詞非大夫美之而作也既破我斧又缺我斨七羊反周公東征四國是皇哀我人斯亦孔之將賦也隋妥二音銎芎曰斧方銎曰斨征伐之用也四國四方之國也皇匡也董氏曰齊詩作四國是匡賈公彦引以為据將大也從軍之士以前篇周公勞已之勤故言此以答其意輔氏曰東山之詩周公能得歸士之心也破斧之詩歸士能得周公之心也所謂上下交而其志同者也曰東征之役既破我斧而缺我斨其勞甚矣然周公之為此舉盖將使四方莫敢不一於正而後已其哀我人也豈不大哉然則雖有破斧缺斨之勞而義有所不得辭矣聖人之心詩人真是形容得出這是答東山之詩古人苟利國家雖殺身為之而不辭今人箇箇計較利害看他四國如何不安也得不寜也得只是䕶我斨斧莫得缺壞了此詩説出極分明毛註却云四國是管蔡商奄詩裏多少處説四國如正是四國之類猶言四海他却不照這例自恁地説公又曰須看那周公東征四國是皇見得周用心始得這箇却是箇好話頭夫管蔡流言以謗周公而公以六軍之旅往而征之使其心一有出於自私而不在於天下則撫之雖勤勞之雖至而從役之士豈能不怨也哉今觀此詩固足以見周公之心大公至正天下信其無有一毫自愛之私抑又以見當是之時雖被堅執鋭之人亦皆能以周公之心為心而不自為一身一家之計盖亦莫非聖人之徒也學者於此熟玩而有得焉則其心正大而天地之情真可見矣陳安卿問何以謂被堅執鋭皆聖人之徒曰不是聖人之徒便是盗賊之徒此説大槩是如此不必恁粘皮帶骨看不成聖人之徒便是聖人且如孶孶為善是舜之徒然孶孶為善亦有多少淺深對曰只是疑被堅執鋭是麄人曰有麄底聖人之徒亦有讀書説義理底是盗賊之徒要此詩大有好理㑹處安卿適來只説那一句没緊底對曰此詩見得周公之心分明天地正大之情只被那一句碍了曰只泥那一句便未見得他意味黄直卿曰詩人洞見聖人之情以為破斧缺斨者盖欲誅管蔡而正四國也集傳曰學者於此熟玩而有得焉則其心正大而天地之情真可見矣今人須是存得箇正大之心不然則是邪小底人焉得謂之大丈夫既破我斧又缺我錡巨宜反叶巨何反周公東征四國是吪五戈反哀我人斯亦孔之嘉叶居何反賦也錡鑿屬釋文曰韓詩云木屬吪化嘉美也既破我斧又缺我銶音求周公東征四國是遒在羞反哀我人斯亦孔之休賦也銶木屬釋文曰韓詩云鑿屬一解云今之獨頭斧遒歛而固之也休美也破斧三章章六句范氏曰象日以殺舜為事舜為天子也則封之管蔡啓商以叛周公之為相也則誅之迹雖不同其道則一也盖象之禍及於舜而已故舜封之管蔡流言將危周公以間王室得罪於天下故周公誅之非周公誅之天下之所共誅也周公豈得而私之哉游氏曰象之志不過富貴而已故舜得以是而全之周公愛兄宜無不盡者管叔之事聖人之不幸也封之誅之此天理人倫之至其用心一也輔氏曰舜與周公皆處聖人之不幸使其易地而處則皆然也此乃是以天理處人倫之極至處陳安卿曰周公誅管蔡自公義言之其心固正大直截自私恩言之則其情終有不自滿處所以孟子謂周公之過不亦宜乎李堯卿問是時可調䕶莫殺否曰他已叛只得殺如何調䕶得蔡叔霍叔性較慢罪較輕所以只囚于郭隣降于庶人序美周公也周大夫以惡四國焉此歸士美周公之辭非大夫惡四國之詩也且詩所謂四國猶言斬伐四國耳序說以為管蔡商奄尤無理也伐柯如何匪斧不克取七喻反妻如何匪媒不得比也柯斧柄也克能也媒通二姓之言者也周公居東之時東人言此以比平日欲見周公之難伐柯伐柯其則不逺我覯古豆反之子籩豆有踐賤淺反比也則法也我東人自我也之子指其妻而言也籩竹豆也豆木豆也濮氏曰籩豆禮器形制相類竹曰籩以薦果核木曰豆以薦葅醢其實容四升故量云容四升曰豆踐行列之貌言伐柯而有斧則不過即此舊斧之柯而得其新柯之法言執柯伐木以為柯者彼柯長短之法在此柯耳娶妻而有媒則亦不過即此見之而成其同牢之禮矣愚按昏禮用特豚夫婦各一胖合升于鼎俎所謂同牢而食也然其禮有醯醬二豆葅醢四豆無設籩之文讀者不以辭害意可也東人言此以比今日得見周公之易深喜之之詞也伐柯二章章四句序美周公也周大夫刺朝廷之不知也胡庭芳曰首序云美周公猶未甚失而所謂刺朝廷之不知已是詩中所無之意解者又推求不知二字謂不知所以還周公之道豈非所謂傳之愈失其真也哉朱子非之當矣愚按朱子説見下篇序九罭于逼反之魚鱒才損反魴音房我覯之子衮古本反衣繡裳興也九罭九囊之網也爾雅曰緵罟謂之九罭魚網也孫炎云謂魚之所入有九囊郭璞云緵今之百囊網也鱒以鯶渾上聲而鱗細眼赤埤雅曰鱒魚圓魴魚方鱒好獨行制字從尊殆以此也魴已見上愚按見汝墳皆魚之美者也我東人自我也之子指周公也衮衣裳九章一曰龍二曰山三曰華蟲雉也四曰火五曰宗彛虎蜼壘佑胃三音也皆繢繪於衣六曰藻七曰粉八曰黼九曰黻皆繡於裳蔡九峯曰龍取其變也山取其鎮也華蟲取其文也火取其明也宗彛取其孝也藻水草取其潔也粉米白米取其養也黼若斧形取其斷也黼兩已相戾取其辨也天子之龍一升二降上公但有降龍以龍首卷衮然故謂之衮也此亦周公居東東人喜得見之而言九罭之網則有鱒魴之魚矣我遘之子則見其衮衣繡裳之服矣鴻飛遵渚公歸無所於女音汝下同信處興也遵循也渚小洲也女東人自相女也再宿曰信東人聞成王將迎周公又自相謂而言鴻飛則遵渚矣公歸豈無所乎今特於女信處而已此章飛歸字是句腰亦用韻詩中亦有此體鴻飛遵陸公歸不復於女信宿興也髙平曰陸不復言將留相王室而不復來東也是以有衮衣兮無以我公歸兮無使我心悲兮賦也承上二章言周公信處信宿於此是以東方有此服衮衣之人又願其且留於此無遽迎公以歸歸則將不復來而使我心之悲也九罭四章一章四句三章章三句此詩分明是東人願其來故致願留之意公歸豈無所於汝但寓信處耳公歸將不復來於汝但寓信宿耳是以兩宇而今都不説盖本謂縁公暫至於此是以此間有被衮之人其為東人願留之詩豈不甚明白正縁序有刺朝廷不知之句故後之説詩者悉委曲附㑹之費多少辭語到底鶻突某嘗謂去後千百年須有人知此意自看來直是盡得聖人之心愚按周官司服云凡兵事韋弁服盖用赤色皮為弁與衣而素裳白舄今東人所見者乃公之冕服則此詩其作於周公避居之日成王將迎公歸之際乎序美周公也周大夫刺朝廷之不知也二詩東人喜周公之至而願其留之詩序說皆非寛裕温柔詩教也若如今人説九罭之詩乃責其君之詞何處討寛裕温柔之意狼跋蒲未反其胡載疐丁四反其尾公孫音遜碩膚赤舄音昔几几興也跋躐也胡頷下懸肉也載則疐跲鍼入聲也説文曰跲躓也老狼有胡進而躐其胡則退而跲其尾公周公也孫讓碩大膚美赤舄冕服之舄也鄭氏曰舄有三等赤舄為上冕服之舄詩云王錫韓侯𤣥衮赤舄則諸侯與王同複下曰舄禪下曰屨禪音丹李寶之曰天子諸侯冕服用舄他服用屨几几安重貌王介甫曰几人所馮以為安故几几安也周公雖遭疑謗然所以處之不失其常故詩人美之言狼跋其胡則疐其尾矣公遭流言之變而其安肆自得乃如此盖其道隆徳盛而安土樂天有不足言者所以遭大變而不失其常也此興是反説亦有些意羲畧似程子説但程子説得深如云狼性貪之類程子曰周公至公無私進退以道無利欲之蔽故雖危疑之地安於舒泰赤舄几几然安也嚴氏曰凡人處利害之變則舉趾不安其常懼者或至於喪屨喜者或至於折屐詩人以赤舄几几見周公之聖其善觀聖人矣夫公之被毁以管蔡之流言也而詩人以為此非四國之所為乃公自讓其大美而不居耳盖不使讒邪之口得以加乎公之忠聖此可見其愛公之深敬公之至而立言亦有法矣問集傳謂詩人以為非四國所為乃公自讓其美看來詩之意也囘護委曲却大傷巧曰自是作詩之體常如此詩人只得如此説如春秋公孫于齊不成説昭公出奔聖人也只得如此説自是體當如此魯昭公分明是為季氏所逐春秋却書孫齊如其自出云耳愚按集傳所謂四國盖指管蔡商奄與破斧詩所言四國又不同也狼疐其尾載跋其胡公孫碩膚徳音不瑕叶洪孤反興也徳音猶令聞也瑕疵病也孔氏曰瑕者玉病庇亦玉病程子曰周公之處已也夔夔然存恭畏之心其存誠也蕩蕩然無顧慮之意所以不失其聖而徳音不瑕也狼跋二章章四句范氏曰神龍或潜或飛能小能大其變化不測然得而畜之若犬羊然有欲故也唯其可以畜之是以亦得醢而食之也凡有欲之類莫不可制焉唯聖人無欲故天地萬物不能易也富貴貧賤死生如寒暑晝夜相代乎前吾豈有二其心乎哉亦順受之而已矣舜受堯之天下不以為泰孔子阨於陳蔡而不以為戚周公逺則四國流言近則王不知而赤舄几几徳音不瑕其致一也序美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也豳國七篇二十七章二百三句程元問於文中子曰敢問豳風何風也曰變風也元曰周公之際亦有變風乎曰君臣相誚其能正乎成王終疑周公則風遂變矣非周公至誠其孰能正之哉元曰居變風之末何也曰夷王以下變風不復正矣夫子盖傷之也故終之以豳風言變之可正也唯周公能之故係之以正變而克正危而克扶始終不失其本其惟周公乎係之豳逺矣哉范氏曰邠居風雅之間何也風之所為終而雅之所為始也變風終於曹思明王賢伯之不可得於是次之以邠反之於周公而後至於鹿鳴言周之所以盛者由周公也籥章龡豳詩以逆暑迎寒已見於七月之篇矣鄭氏曰邠詩邠風七月也又曰祈年于田祖則龡豳雅以樂田畯鄭氏曰祈年祈豐年也田祖始畊田者謂神農也田畯古之先教田者祭蜡乍則龡豳頌以息老物鄭氏曰蜡歲十二月而合聚萬物索饗之也蜡之祭也主先嗇而祭司嗇也萬物助犬成歲事至此為其老而勞乃祀而老息之則考之於詩未見其篇章之所在故鄭氏三分七月之詩以當之其道情思者為風正禮節者為雅樂成功者為頌愚按鄭氏分一章二章為風三章四章五章六章之半為雅又以六章之半七章八章為頌又於籥章注云邠雅者以其言男女之正邠頌者以其言歲終人功之成然一篇之詩首尾相應乃剟取其一節而偏用之恐無此理故王氏不取而但謂本有是詩而亡之其説近是或者又疑但以七月全篇隨事而變其音節或以為風或以為雅或以為頌則於理為通而事亦可行饒氏曰雅有雅之音頌有頌之音風有風之音故邠風亦曰邠雅亦曰邠頌盖一詩而備三體也如又不然則雅頌之中凡為農事而作者皆可冠以豳號其説具於大田良耜諸篇讀者擇焉可也詩傳通釋卷八
