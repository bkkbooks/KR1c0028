body:
  text: 詩傳通釋卷十八元劉瑾撰詩朱子集傳蕩之什三之三蕩蕩上帝下氏之辟必亦反疾威上帝其命多辟匹亦反天生烝民其命匪諶市林反或叶市隆反靡不有初鮮克有終叶諸深反或如字賦也蕩蕩廣大貌辟君也疾威猶暴虐也多辟多邪辟也烝衆諶信也言此蕩蕩之上帝乃下民之君也今此暴虐之上帝其命乃多邪僻者何哉盖天生衆民其命有不可信者盖其降命之初無有不善而人少能以善道自終是以致此大亂使天命亦罔克終如疾威而多僻也盖始為怨天之辭而卒自解之如此嚴氏曰疾威者厲王所為而天實命之是天為此疾威天實為之則無所歸咎然天亦豈欲令厲王為惡乎天生衆民其命有不可信者其初皆善而其終鮮善是人自暴自棄非天使之然王自不為善豈天賦予以惡哉劉康公曰熊剛大曰劉采邑名康謚也康公定王同母弟所謂王季子也民受天地之中以生所謂命也能者養之以福不能者敗以取禍此之謂也熊剛大曰天地之中猶言天地之性也以此理無過不及而言故謂之中人之生必禀受此理而俱生此乃所賦之命也能順其則順天地之命者也所以得福不能循其則逆天地之命者也所以得禍王介甫曰受天地之中一也則靡不有初敗以取禍者衆則鮮克有終鮮克有終則命靡諶矣文王曰咨咨女音汝殷商曾是彊禦曾是掊蒲侯反克曾是在位曾是在服叶蒲比反天降慆他刀反徳女興是力賦也此設為文王之言也咨嗟也殷商紂也曹氏曰自契始封商地在上洛湯受命毫殷地在蒙今曰殷商并舉之也强禦暴虐之臣也謝疊山曰强强梁禦如禦人於國門之外之禦掊克聚斂之臣服事慆慢興起也力如力行之力詩人知厲王之將亡故為此詩託於文王所以嗟嘆殷紂者嚴氏曰二章以下設為文王之詞盖陳厲王之失而託之商也所謂借秦為諭耳言此暴虐聚斂之臣在位用事乃天降慆慢之徳而害民王介甫曰强梁掊克是為慆慢輔氏曰此章以下托為文王歎紂之辭者盖厲王暴虐詩人不敢直刺其惡故耳且厲王之虐大畧似紂以謂與亂同事罔不亡也自古危亂之君率是暴虐與聚斂之臣並用盖此兩等人實相須也非暴虐則無以為聚斂之資非聚斂則無以極暴虐之惡也慆徳謂慢天之人即暴虐聚斂之臣也所以敢為暴斂之事者只縁慢天故爾然非其自為之也乃汝興起此人而力為之耳文王曰咨咨女殷商而秉義類彊禦多懟直類反流言以對冠攘式内侯作側慮反侯祝周救反靡届靡究賦也而亦女也義善懟怨也流言浮浪不根之言也侯維也作讀為詛詛祝怨謗也言汝當用善類而反任此暴虐之人使用流言以應對胡庭芳曰强禦多懟流言以對者正如所謂禦人以口給之意强禦與前章相應指所用之人也則是為寇盜攘竊而反居内矣是以致怨謗之無極也文王曰咨咨女殷商女炰白交反烋火交反于中國叶于逼反斂怨以為徳不明爾徳時無背布内反無側爾徳不明以無陪蒲回反無卿賦也炰烋氣健貌謝疊山曰以傲狠作氣勢以暴虐作威聲如虎狼炰烋之狀斂怨以為徳多為可怨之事而反自以為徳也背後側傍陪貳也孔氏曰陪貳謂副貳王者則三公也言前後左右公卿之臣皆不稱其官如無人也李迂仲曰亂世之君是非顛倒邪正錯亂無人以輔弼之故也文王曰咨咨女殷商天不湎面善反爾以酒不義從式叶式吏反既愆爾止靡明靡晦叶呼洧反式號式呼火故反俾晝作夜叶羊茹反賦也湎飲酒變色也式用也言天不使爾沈湎以酒而惟不義是從是用耳止容止也嚴氏曰非天使之是汝自為惡也爾之容止既自取愆過又無明無晦而飲酒不息呌號讙呼使晝作夜荒亂甚矣文王曰咨咨女殷商如蜩如螗音唐如沸如羮叶盧當反小大近喪息浪反叶平聲人尚乎由行叶户郎反内奰皮器反于中國覃及鬼方賦也蜩螗皆蟬也如蟬鳴如沸羹皆亂意也小者大者幾於喪亡矣尚且由此而行不知變也胡庭芳曰所謂安其危而利其菑樂其所以亡者也奰怒覃延也鬼方逺夷之國也胡庭芳曰夏曰獯鬻商曰鬼方周曰獫狁漢曰匈奴魏曰突厥見唐髙祖紀其實一國而異其名也言自近及逺無不怨怒也文王曰咨咨女殷商匪上帝不時叶上止反殷不用舊叶巨已反雖無老成人尚有典刑曾是莫聴湯經反大命以傾賦也老成人舊臣也典刑舊法也謝疊山曰三代而上國有大政有大議有大疑皆决於老成人之言曰圖任舊臣人共政殷先王所以立國也曰人惟求舊曰無侮老成人盤庚所以興也曰汝惟商老成人宅心知訓周公所以誨康叔也犂老播棄格人罔敢知吉紂所以亡也在位罔有耆舊俊在厥服平王所以東遷也言非上帝為此不善之時但以殷不用舊致此禍爾雖無老成人與圖先王舊政然典刑尚在可以循守乃無聴用之者是以大命傾覆而不可救也文王曰咨咨女殷商人亦有言顛沛之掲紀竭去例二反枝葉未有害許曷暇憇二反本實先撥蒲末反叶方吠筆烈二反殷鑒不逺在夏后之世叶始制私列二反賦也顛沛仆拔也掲本根蹶起之貌撥猶絶也鑒視也夏后桀也言大木掲然將蹶枝葉未有折傷而其根本之實已先絶然後此木乃相隨而顛拔爾蘇氏曰商周之衰典刑未廢諸侯未畔四夷未起而其君先為不義以自絶於天莫可救止正猶此耳嚴氏曰王者天下之本也天下未有禍敗而王身無道本先撥矣枝葉盖將従之也殷鑒在夏蓋為文王嘆紂之辭然周鑒之在殷亦可知矣歐陽子曰非獨周之鑒殷殷之鑒夏後之興者當又鑒厲王也蕩八章章八句潘氏曰首章前四句有怨天之詞後四句乃解前四句謂天之降命本無不善惟人不以善道自終故天命亦不克終如疾威而多邪僻也此章意既如此故自次章以下託文王告紂之詞皆就人君身上説使知其非天之過如汝興是力汝徳不明與天不湎爾以酒匪上帝不時之類皆是發首章之意愛彭氏曰板蕩之詩深刺其君之惡盖大臣憂國君之心不敢不如是也序召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也蘇氏曰蕩之名篇以首句有蕩蕩上帝耳序説云云非詩之本意也抑抑威儀維徳之隅人亦有言靡哲不愚庶人之愚亦職維疾叶疾二反哲人之愚亦維斯戾賦也抑抑宻也隅廉角也孔氏曰隅者角也廉者稜也角必有稜故曰廉隅鄭氏曰人宻審於威儀者是其徳必嚴正也故古之賢者道行心平可外占而知内如宫室之制内有繩直則外有廉隅也吕東萊曰此詩以威儀為主修身之道至切至近莫過於此也王介甫曰徳譬則宫城也儀譬則隅也視其隅則宫城之中可知矣嚴氏曰首章第一義言威儀之當慎威儀云者聲音笑貌云乎哉容貌顔色曽子所謂道動容周旋中禮孟子所謂盛徳也彭氏曰惟徳之隅盖有諸中必形於外也制於外所以養其中也觀曽子所言正顔色動容貌孟子所言見於面盎於背是也哲知庶衆職主戾反也衛武公作此詩使人日誦於其側以自警嚴氏曰詩皆自警之言修身治國平天下之道與中庸大學相表裏言抑抑威儀乃徳之隅則有哲人之徳者固必有哲人之威儀矣而今之所謂哲者未嘗有其威儀則是無哲而不愚矣輔氏曰徳與威儀内外之符也哲與愚徳性之反也觀賔之初筵一詩則當時習俗都無威儀可知矣此所以有靡哲不愚之嘆也夫衆人之愚盖有稟賦之偏宜有是疾不足為怪王介甫曰庶人之愚則天性之疾也孔子曰民有三疾哲人而愚則反戾其常矣無競維人四方其訓之有覺徳行下孟反四國順之訏况于反謨定命逺猶辰告叶古得反敬慎威儀維民之則賦也競强也覺直大也訏大謨謀也大謀謂不為一身之謀而有天下之慮也吕東萊曰所謀不止於一身而計天下之安危也定審定不改易也命號令也猶圖也逺謀謂不為一時之計而為長久之規也吕東萊曰所謀不止於一時而鑒百世之損益也辰時告戒也辰告謂以時播告也輔氏曰不為一身之謀而為天下之慮者訏謨也所謀者大則其命令之出也必審定而不易朝令夕改者不能訏謨者也不為一時之計而為長久之規者逺猶也所圖者逺則告戒于下者必以時而不忽號令不時者不能逺猶者也則法也言天地之性人為貴故能盡人道則四方皆以為訓有覺徳行則四國皆順從之故必大其謀定其命逺圖時告敬其威儀然後可以為天下法也輔氏曰盡人道也覺徳行也治己之事也訏謨定命也逺猶辰告也治國之事也内則治己外則治國諸侯之職舉矣終之以敬慎威儀為民之則者又所以著威儀之為重也謝疊山曰人君以一身之法為天下之法也其在于今叶音經興迷亂于政叶音征顛覆厥徳荒湛都南反下同于酒叶子小反女音汝雖湛樂音洛從弗念厥紹市沼反罔敷求先王克共九勇反明刑叶胡光反賦也今武公自言己今日之所為也興尚也鄭氏曰興猶尊尚也女武公使人誦詩而命己之詞也後凡言女言爾言小子者放此問抑詩東萊硬要做刺厲王縁以爾汝字碍曰如幕中之辨人反以女為叛臺中之評人反以汝為傾等類亦是自謂古人此様亦多湛樂從言惟湛樂之是從紹謂所承之緒也敷求先王廣求先王所行之道也共執刑法也肆皇天弗尚叶平聲如彼泉流無淪胥以亡夙興夜寐灑掃廷内維民之章修爾車馬弓矢戎兵叶晡亡反用戒戎作用遏他厯反蠻方賦也弗尚厭棄之也淪陷胥相章表戒備戎兵作起逷逺也言天所不尚則無乃淪陷相與而亡如泉流之易乎是以内自庭除之近外及蠻方之逺細而寢興灑掃之常大而車馬戎兵之變慮無不周備無不飭也輔氏曰此承上章而言所為如此則必為天所厭棄矣無乃淪胥以亡如泉流之不可止歟是豈可不自警乎故必無内外無近逺無細大無常變皆當整辦飭備如此然後庶幾近而吾民有所儀表逺而蠻方有所畏避也上章所謂訏謨定命逺猶辰告者於此見矣質爾人民謹爾侯度用戒不虞叶元具反慎爾出話敬爾威儀叶牛何反無不柔嘉叶居何反白圭之玷丁簟反尚可磨也斯言之玷不可為叶吾禾反也賦也質成也定也輔氏曰質訓成與定惟成而後能定也侯度諸侯所守之法度也虞慮話言柔安嘉善玷缺也言既治民守法防意外之患矣蘇氏曰苟失其民心慢其侯度則將有不虞之禍起輔氏曰益之告舜以儆戒無虞亦以罔失法度為先能謹我之法度則可以免不虞之患矣又當謹其言語盖玉之玷缺尚可磨鑢使平言語一失莫能救之其戒深切矣輔氏曰上三句治國之事也中三句治己之事也身正而后國治此尤不可不謹前但言威儀而已至此章又兼話言言之威儀形於身者言語出於口者皆徳之符也下四句又極言其言語之不可不慎也陳夀翁曰上以出話威儀對言下専以言語言盖容貌詞氣皆徳之符其不可不謹一也故此詩於威儀凡六言之而於言語亦三致意焉前章之命告此章之言玷下章之無易由言是也段氏曰言行均不可以有失而言之失尤易能謹其易者則行可知也故此章末唯戒夫斯言之玷故南容一日三復此章而孔子以其兄之子妻之家語曰獨居思仁公居言義一日三復白圭之玷是宫縚之行也黄直卿曰三復謂每誦至此再三反復以識之非謂一次三復亦非謂只一日三次誦之也不是一日讀此乃是日日讀之玩味此詩而欲謹言也邦又曰南容深有意於謹言此邦有道所以不廢無道所以免禍故孔子以兄子妻之無易以豉反由言無曰苟矣此二句不用韻莫捫音門朕舌言不可逝叶音折與舌叶矣無言不讎叶市又反無徳不報叶蒲救反惠于朋友叶羽已反庶民小子叶奬里反子孫繩繩萬民靡不承賦也易輕捫持逝去讎答承奉也言不可輕易其言盖無人為我執持其舌者故言語由己易致差失常當執持不可放去也嚴氏曰由言者由己言之也所謂唯其言而莫予違也且天下之理無有言而不讎無有徳而不報者若爾能惠于朋友孔氏曰朋友謂卿大夫等庶民小子則子孫繩繩嚴氏曰繩繩如繩之牽連不絶也而萬民靡不承矣皆謹言之效也視爾友君子輯音集柔爾顔叶魚堅反不遐有愆相息亮反在爾室尚不愧於屋漏無日不顯莫予云覯神之格叶剛鶴反思不可度待洛反思矧可射音亦叶弋灼反思賦也輯和也遐何通愆過也尚庶幾也屋漏室西北隅也李寳之曰曽子問謂之當室之白孫炎云當室之白日光所漏入也覯見也格至度測矧况也射斁通厭也言視爾友於君子之時和柔爾之顔色其戒懼之意常若自省曰豈不至於有過乎盖常人之情其修於顯者無不如此然視爾獨居於室之時亦當庶幾不愧於屋漏然後可爾無曰此非明顯之處而莫予見也當知鬼神之妙無物不體其至於是有不可得而測者不顯亦臨猶懼有失况可厭射而不敬乎輔氏曰輯柔爾顔言其顔色之温柔也不遐有愆言其心思之警懼也有是心則有是顔此亦内外之符也常能如是則豈至於有過失乎然人心操則存舍則亡天理存亡只在敬肆之間須當於暗室屋漏之中不睹不聞之際常若十手所指十目所視兢兢業業之心不可有一息之間斷方可若曰此非顯明之處人莫予見也此心一萌則便間斷矣所以如此者盖鬼神體物而不遺洋洋乎如在其上如在其左右其至也尚不可測度况可厭射之乎唯不敢有所厭斁則此心始無間斷也養相在爾室以下只是做存工夫此言不但修之於外又當戒謹恐懼乎其所不睹不聞也彭氏日視爾友君子以下以誠而交於人修之於顯也相在爾室以下以誠而對乎天慎之於静也吕東萊曰此章教以内外交修也謝疊山曰莊子云為不善於顯明之中者人得而非之為不善於幽闇之中者鬼神得而責之君子無人非無鬼責亦此意也子思子曰君子不動而敬不言而信君子之戒謹恐懼無時不然不待言動而後敬信也陳安卿曰屋漏人迹不到之地須是戒懼方無愧怍君子不待於動而應事接物方始敬未接物之前已無非敬矣不待發言而後信實未發言之前本來真實無非信矣又曰夫微之顯誠之不可揜如此陳安卿曰此理雖隠微而甚顯以隂陽之往來屈伸皆是真實而無妄所以發見之不可揜如此此正心誠意之極功而武公及之則亦聖賢之徒矣愚按不遐有愆者是省察之功所以遏人欲於將萌即中庸之内省不疚而慎獨之事也能慎獨則意無不誠矣不愧屋漏者是存養之功所以存天理之本然即中庸之不睹不聞而戒懼之事也能戒懼則心無不正矣所謂正心誠意之極功者也盖由武公本亦聖賢之徒宜其所言合乎聖賢之道也辟爾為徳俾臧俾嘉叶居何反淑慎爾止不愆于儀叶牛何反不僭不賊鮮息淺反不為則投我以桃報之以李彼童而角實虹户公反小子叶奬里反賦也辟君也指武公也愚按此章之中首言辟者武公自君道言之也繼言爾者自君臣親宻言之也末言小子則公之謙調也止容止也僭差賊害則法也無角曰童虹潰亂也嚴氏曰虹謂幻惑也如蝃蝀不正之氣暫見于天須㬰散滅既戒以修徳之事吕東萊曰戒以君爾為徳俾臧俾嘉欲其盡君徳之善也淑慎爾止不愆於儀此詩以威儀為主故屢言之而又言為徳而人法之猶投桃報李之必然也輔氏曰不僭則又言永無差謬不賊則又言永無虧損如是則鮮有不為人所法則者此必然之效也彼謂不必修徳而可以服人者是牛羊之童者而求其角也亦徒潰亂汝而已豈可得哉黄實夫曰武公極言君臣相應之機必即物理之易見者言之荏而甚反染而漸反柔木言緡之絲叶新夷反温温恭人維徳之基其維哲人告之話言順徳之行與言叶其維愚人覆謂我僭叶七尋反民各有心興也荏染柔貌柔木柔忍刃之木也緡綸也被之綸以為弓也張子曰柔和之木乃弓之材温恭之人乃徳之質真氏曰温者和易之意築室者以基為固修身者以敬為本故此温温恭謹之人有立徳之基也首章驗其徳之隅此章立其徳之基熟味其辭武公作聖之功於是焉在輔氏曰武公三以温柔為言無不柔嘉也輯柔爾顔也至此又明言温柔為進徳之基盖人才温柔則便是消磨了那客氣消磨得客氣則其徳方可進故明道謂義理與客氣常相勝只看消長分數為君子小人之别消盡者為大賢而横渠亦言學者先須去其客氣惟温柔則可以進學話言古之善言也覆猶反也僭不信也民各有心言人心不同愚智相越之逺也吕東萊曰言人之質有美有惡故有可告語者有不可告語者於音烏乎音呼小子叶奬禮反未知臧否音鄙匪手􅂝之言示之事叶上止反匪面命之言提其耳借曰未知亦既抱子同上民之靡盈誰夙知而莫音慕成賦也非徒手􅂝之也而又示之以事非徒面命之也而又提其耳所以喻之者詳且切矣嚴氏曰曲禮云長者與之提携則兩手奉長者之手負劔辟咡詔之注云傾頭與語又云口耳之間曰咡是携手提耳皆長者教誨小子之常假令言汝未有知識則汝既長大而抱子宜有知矣輔氏曰武公老矣而使人謂其小子可謂不自盈滿矣只此便見其温柔之意言示之事諭之明也言提其耳告之切也告之者既明且切則宜有警矣而猶不知覺何哉借曰未有知識則亦既抱子矣况耄期之年乎則是宜有警也人若不自盈滿能受教戒則豈有既早知而反晚成者乎昊天孔昭叶音灼我生靡樂音洛視爾夢夢莫公反我心慘慘當作懆七到反叶七各反誨爾諄諄之純反聴我藐藐美角反匪用為教叶入聲覆用為虐借曰未知亦聿既耄叶音莫賦也夢夢不明亂意也慘慘憂貌諄諄詳熟也藐藐忽畧貌耄老也八十九十曰耄左史所謂年九十有五時也輔氏曰昊天孔昭我生靡樂者言昊天甚明其知我生之靡樂也其所以靡樂者即下文所謂視爾夢夢我心慘慘也武公平日之視人想亦如此故令人誦詩以警己而云然也曹氏曰前云借曰未知亦既抱子是方壯時也今曰借曰未知遂至於耄則終無所知矣於乎小子見上章告爾舊止聴用我謀庶無大悔叶虎委反天方艱難曰喪息浪反厥國叶于逼反取譬不逺昊天不忒他得反回遹于橘反其徳俾民大棘賦也舊舊章也或曰久也止語詞庶幸悔恨忒差遹僻棘急也言天運方此艱難將喪厥國矣我之取譬夫豈逺哉觀天道禍福之不差忒則知之矣今汝乃回遹其徳而使民至於困急則喪厥國也必矣抑十二章三章章八句九章章十句楚語左史倚相曰昔衛武公年數九十五矣猶箴儆於國曰自卿以下至于師長士真氏曰卿者執政之官師長官師之長士謂上中下士苟在朝者無謂我老耄而舍我必恭恪於朝夕以交戒我在輿有旅賁奔之規周禮旅賁氏掌執戈盾夾車而趨車止則持輪位宁有官師之典倚几有誦訓之諫真氏曰誦訓主誦書之官居寢有􅉏薛御之箴真氏曰􅉏御謂近習也臨事有瞽史之道真氏曰瞽史知大道者宴居有師工之誦真氏曰師工樂官史不失書矇不失誦以訓御之於是作懿戒以自儆及其没也謂之睿聖武公真氏曰自卿以下無一人不使任箴規之職自在與以下無一處不欲聞箴規之言猶且作抑詩使人誦之不離其側如是而意不誠心不正者未之有也韋昭曰懿讀為抑即此篇也左史所云箴諫之詞或即謂此詩耳董氏曰侯包言武公行年九十有五猶使人日誦是詩而不離於其側然則序說為刺厲王者誤矣輔氏曰衛武公可謂老而好學不厭者也其所以至於睿聖者盖本於此一詩之中曲折次第唯篤志力行者當自知之未死之前誓當以此自警也胡庭芳曰抑詩國語之說既明賔之初筵韓詩作飲酒悔過皆為有據矣但不知二雅王者事也何武公二詩獨得入二雅乎愚按周之諸侯唯衛武公於國風二雅皆有詩淇奥則見公之可美賔筵及此則見公之所修固可以為聖賢之徒矣風有淇奥無可疑也賔筵抑詩所以得入二雅者豈公作此二詩在於為王朝卿士之日而二詩之體製音節又有合於大小雅乎然而二詩但得列於變雅則與先王雅樂亦自無相亂矣序衛武公刺厲王亦以自警也此詩之序有得有失盖其本例以為非美非刺則詩無所為而作又見此詩之次適出於宣王之前故直以為刺厲王之詩又以楚語有左史之言故又以為亦以自警以詩考之則其曰刺厲王者失之而曰自警者得之也若謂刺王亦以自警不應一詩既刺人又有自警之理夫曰刺厲王之所以為失者史記衛武公即位於宣王之三十六年不與厲王同時一也嚴氏曰今考年表武公以宣王十六年即位詩記謂其齒四十餘是也䟽以為三十六年恐誤詩以小子目其君而爾汝之無人臣之禮與其所謂敬威儀謹出話者自相背戾二也厲王無道貪虐為甚詩不以此箴其膏肓而徒以威儀詞令為諄切之戒緩急失宜三也詩詞倨慢雖仁厚之君有所不能容者厲王之暴何以堪之四也或以史記之年不合而以為追刺者則詩所謂聴用我謀庶無大悔非所以望於既往之人五也曰自警之所以為得者國語左史之言一也詩曰謹爾侯度二也又曰喪厥國三也又曰亦聿既耄四也詩意所指與淇奥所美賔筵所悔相表裏五也以為武公自警之詩則意味甚長國語云武公九十餘嵗作此詩其間亦聿既耄可以為據又如謹爾侯度則是侯國之度曰喪厥國亦是諸侯自謂無疑盖武公作此詩使人日夕諷誦以警已耳所以有小子告爾之類皆是箴戒作文之體自指耳後漢侯包亦有此說二說之得失其佐驗明白如此必去其失而取其得然後此詩之義明今序者乃欲合而一之則其失者固已失之而其得者亦未足為全得也然此猶自其詩之外而言之也若但即其詩之本文而各以其一說反覆讀之則其訓義之顯晦疎宻意味之厚薄淺深可以不待考證而判然於胷中矣此又讀詩之簡要直訣學者不可以不知也菀音欝彼桑柔與劉憂叶篇内多放此其下侯旬捋力活反采其劉瘼音莫此下民不殄心憂倉初亮反兄與怳同填舊說古塵字兮倬彼昊天叶鐵因反寧不我矜比也菀茂旬徧劉殘殄絶也倉兄與愴創怳况同悲閔之意也填未詳舊說與陳塵同盖言久也或疑與瘨音顛字同為病之義但召旻篇内二字並出又恐未然今姑闕之胡庭芳曰填滿也積也倉兄填兮言悲閔積滿於中之意倬明貌舊說此為芮伯刺厲王而作春秋傳亦曰芮良夫之詩則其說是也孔氏曰芮伯周同姓國杜預云芮國在馮翊臨晉縣則在西都之畿内也左傳引大風有隧以為芮良夫之詩以桑為比者桑之為物其葉最盛然及其采之也一朝而盡無黄落之漸故取以比周之盛時如葉之茂其隂無所不徧至於厲王肆行暴虐以敗其成業王室忽焉凋弊如桑之既采民失其䕃而受其病故君子憂之不絶於心悲閔之甚而至於病遂號天而訴之也愚按呼天者亦無所歸咎之意也後章言天之意皆然四牡騤騤旟旐有翩叶批賓反亂生不夷靡國不泯叶彌鄰反民靡有黎具禍以燼叶咨辛反於音烏乎音呼有哀叶音依國步斯頻賦也夷平泯滅黎黑也謂黑首也王介甫曰周曰黎民秦曰黔首黎則黔首之謂也民靡有黎則是黔首靡有孑遺也具俱也燼灰燼也步猶運也頻急蹙也厲王之亂天下征役不息故其民見其車馬旌旗而厭苦之輔氏曰王者豈能無所征役但出於不得已則民將悅而從之以忘其勞今也使人見其車馬旌旗而厭苦若是則民不可得而用矣亂生不夷亂日生而無平定之期也無國不滅無民不燼則甚言之耳君子之哀則哀其國家運祚之急蹙也自此至第四章皆征役者之怨辭也愚按皆芮伯述怨者之詞也國步蔑資天不我將叶子兩反靡所止疑魚乞反叶如字云徂何往君子實維秉心無競叶其兩反誰生厲階叶居奚反至今為梗古杏反叶古黨反賦也蔑滅資咨將養也疑讀如儀禮疑立之疑定也士昏禮注曰疑立正立自定之貌徂亦往也競争厲怨梗病也錢氏曰梗水上浮木壅水者斷梗也言國將危亡天不我養居無所定徂無所往李迂仲曰無所逃於天地之間矣然非君子之有争心也誰實為此禍階使至今為病乎蓋曰禍有根原其所從來也逺矣輔氏曰居無所定則無以自安也徂無所往則無以避患也凡為君子則其心自無所争耳然不知誰實為此厲階而使至今為病乎此則指厲王言之也其辭婉矣憂心慇慇念我土宇我生不辰逢天僤都但反怒叶暖五反自西徂東叶音丁靡所定處多我覯痻武巾反孔棘我圉賦也土鄉宇居辰時僤厚覯見痻病棘急圉邊也或曰禦也鄭氏曰禦冦之事也多矣我之見病也急矣我之在邊也鄭氏曰此士卒厭苦自傷之言吕東萊曰一章至四章皆極言其亂也輔氏曰土宇謂鄉甲與室家也周在西故曰自西徂東前三章雖皆是征役者怨辭然二章則言亂生不已而要其禍亂之終三章則言行止無定而原其禍亂之始四章則言多矣我之見病也急矣我之在邊也情益切而辭益哀矣為謀為毖叶音必亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺叶奴學反賦也毖慎况滋也孔氏曰况訓賜也賜人之物則益滋多故况為滋也序爵辨别賢否之道也李迂仲曰爵自有序上賢則加以上爵中賢則次之下賢則又次之若小加大淫破義則失其序矣曹氏曰外之公侯伯子男内之公卿大夫士皆爵也執熱手持熱物也逝語詞也蘇氏曰王豈不謀且慎哉然而不得其道適所以長亂而自削耳故告之以其所當憂而誨之以序爵且曰誰能執熱而不濯者賢者之能已亂猶濯之能解熱耳不然則其何能善哉相與入於陷溺而已鄭氏曰我語汝以天下之憂教汝以次序賢能之爵其為之當如手執熱物之用濯謂治國之道當用賢者如彼遡風叶孚音反亦孔之僾音愛民有肅心荓普耕反云不逮好呼報反是稼穡力民代食稼穡維寳代食維好賦也遡鄉向僾唈庵入聲肅進荓使也蘇氏曰君子視厲王之亂悶然如遡風之人唈而不能息孔氏曰風唈人氣故不能喘息雖有欲進之心皆使之曰世亂矣非吾所能及也於是退而稼穡盡其筋力與民同事以代禄食而已當是時也仕進之憂甚於稼穡之勞故曰稼穡維寳代食維好言雖勞而無患也天降喪息浪反亂滅我立王降此蟊賊稼穡卒痒音羊哀恫音通中國具贅之芮反卒荒靡有旅方以念穹蒼賦也恫痛具俱也贅屬燭也言危也春秋傳曰君若綴旒然與此贅同公羊傳襄公十六年㑹于溴梁大夫盟君若贅旒然注旒旗旒贅繫屬之辭溴音扃入聲卒盡荒虚旅與膂同穹蒼天也穹言其形蒼言其色言天降喪亂固已滅我所立之王矣又降此蟊賊則我之稼穡又病而不得以代食矣哀此中國皆危盡荒是以危困之極無力以念天禍也此詩之作不知的在何時其言滅我立王則疑在共和之後也李迂仲曰大子静匿召穆公家國人闈之召公乃以其子代大子大子卒得脫穆公乃與周公行政謂之共和共和十四年厲王死於彘乃立大子静是為宣王愚按此詩果作於共和之時則厲王尚在故詩人得以追叙其事而刺之也維此惠君民人所瞻叶側姜反秉心宣猶考慎其相息亮反叶平聲維彼不順自獨俾臧自有肺腸俾民卒狂賦也惠順也順於義理也宣徧猶謀相輔狂惑也言彼順理之君所以為民所尊仰者以其能秉持其心周徧謀度考擇其輔相必衆以為賢而後用之彼不順理之君則自以為善而不考衆謀自有私見而不通衆志所以使民眩惑至於狂亂也瞻彼中林甡甡所中反其鹿朋友已譖子念反叶子林反不胥以榖人亦有言進退維谷興也甡甡衆多並行之貌譖不信也胥相穀善谷窮也言朋友相譖不能相善曾鹿之不如也曹氏曰不如鹿性善羣得食則相呼而共之慮患則環居以禦之也言上無明君下有惡俗是以進退皆窮也吕東萊曰此言君暗於上俗毁於下自傷處斯世之難也維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌叶臣已反賦也聖人炳於幾先所視而言者無逺而不察愚人不知禍之將至而反狂以喜今用事者盖如此我非不能言也如此畏忌何哉言王暴虐人不敢諫也吕東萊曰言朝皆小人安其危而利其菑欲諫而不敢也嚴氏曰厲王得衛巫使監謗者以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣召公曰是障之也防民之口甚於防川川壅而潰傷人必多民亦如之是故為川者决之使道為民者宣之使言故天子聴政使公卿至於列士獻詩瞽獻曲史獻書師箴瞍賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖王不聴於是國人莫敢出言維此良人弗求弗迪叶徒沃反維彼忍心是顧是復房六反民之貪亂寧為荼毒賦也迪進也忍殘忍也顧念復重也荼苦菜也味苦氣辛能殺物故謂之荼毒也言不求善人而進用之其所顧念重復而不已者乃忍心不仁之人民不堪命所以肆行貪亂而安為荼毒也吕東萊曰言王棄君子而厚小人民不堪命而王不知也輔氏曰上章之聖人愚人乃泛言之以刺厲王耳此章之良人忍心則指當時士大夫言也大風有隧音遂有空大谷維此良人作為式穀維彼不順征以中垢古口反叶居六反興也隧道式用穀善也征以中垢未詳其義或曰征行也中隠暗也垢汙穢也大風之行有隧蓋多出於空谷之中以興下文君子小人所行亦各有道也輔氏曰此章以風之行有道以興君子小人之所行亦各有道也作起也良人則起而為者皆用善道不順則違道悖理之人也其所行者唯以隠暗汙穢而已大抵君子之所為必光明小人之所為必隠暗君子之所行必髙潔小人之所行必汙穢光明髙潔即所謂善道也大風有隧貪人敗類聴言則對誦言如醉匪用其良覆俾我悖叶蒲寐反興也敗類猶圯痞族也蔡九峯曰圯敗族類也言與衆不和傷人害物也王使貪人為政我以其或能聴我之言而對之然亦知其不能聴也故誦言而中心如醉由王不用善人而反使我至此悖眊也輔氏曰上章以上兩句興下四句此章則以上一句興下一句耳大風則有隧矣貪人則敗類矣聴言則對四句集傳以為一串說都載在下句我字上厲王說榮夷公芮良夫曰王室其將卑乎夫榮公好專利而不備大難夫利百物之所生也天地之所載也而或専之其害多矣此詩所謂貪人其榮公也與芮伯之憂非一日矣嗟爾朋友予豈不知而作如彼飛蟲時亦弋獲叶胡郭反既之隂叶于鴆反女音汝反予來赫叶黒各反賦也如彼飛蟲時亦弋獲言己之言或亦有中猶曰千慮而一得也之往隂覆也赫威怒之貌我以言告女是往隂覆於女女反來加赫然之怒於己也張子曰既往宻告於女反謂我來恐動也亦通愚按釋文隂或音如字赫本亦作嚇音瑕莊子云以梁國嚇我是也張子之說盖用釋文二字之意民之罔極職凉善背叶必墨反為民不利如云不克民之回遹職競用力賦也職專也凉義未詳傳曰凉薄也鄭讀作諒信也疑鄭說為得之善背工為反覆也克勝也回遹邪僻也言民之所以貪亂而不知所止者専由此人名為直諒而實善背又為民所不利之事如恐不勝而力為之也又言民之所以邪僻者亦由此輩専競用力而然也反覆其言所以深惡之也民之未戾職盜為冦凉曰不可覆背善詈力智反雖曰匪予既作爾歌叶韻未詳賦也戾定也民之未定者由有盜臣為之冦也盖其信也亦以小人為不可矣及其反背也則又工為惡言以詈君子是其色厲内荏真可謂穿窬之盜矣然其人又自文飾以為此非我言也則我已作爾歌矣言得其情且事已著明不可揜覆也嚴氏曰上章凉言刻薄競言强禦盜言貪黷三者皆小人當時必有所指由此三人致亂故皆以職言之民之亂無窮極者主由此刻薄之人善為欺背之事也彼為民所不利之事如恐不勝也民之所以邪僻者主由此强禦之人用力為虐也民之所以未定者主由此盜臣為冦攘之行也羣小不和自相訾毁其凉者見盗者貪黷已甚亦言其不可而覆背以詈之矣謂其黨亦自知其非也凉背盜而詈之故上章言職凉善背也胡庭芳曰此二章言凉臣競臣盜臣凡所以為民害者大約是爾三等之臣為之也今爾三臣者雖自曰匪予則我盖已知之而既作爾歌以述其事矣言得其情而不可揜覆也章末二句盖是總結此二章所論三等之臣也桑柔十六章八章章八句八章章六句王晦叔曰風雅未有如此詩十六章者其言反覆不已而有倫次大意在於刺王用小人一章言其無以庇民二章言其征伐不息三四章皆言其亂離五章告以救亂六章言仕於朝則有禍七章言退處田野亦不不能安存八章刺其獨用小人九章并刺在位之善十十一章以聖愚善惡相對言之所以刺愚人不能逺慮忍人不可信用也十二章言民之不善十三章言王之不善皆由在位之不賢也十四章至十六章則皆規諷其僚友之詞也序芮伯刺厲王也序與春秋傳合愚按序者之意恐亦據春秋傳而言也倬彼雲漢昭回於天叶鐵因反王曰於音烏乎音呼何辜今之人天降喪息浪反亂饑饉薦在甸反臻靡神不舉靡愛斯牲叶桑經反圭璧既卒寧莫我聴吐丁反賦也雲漢天河也昭光回轉也言其光隨天而轉也曹氏曰漢在天似雲非雲故曰雲漢也漢者水之祥而雨者水之施也天將雨其兆先見於漢故閔雨則望雲漢而占之也天漢起於東方經尾箕之間是為漢津委蛇向西南行至七星南而没此其回旋之度也薦荐通重也臻至也靡神不舉所謂國有凶荒則索鬼神而祭之也孔氏曰求廢祀而修之也圭璧禮神之玉也孔氏曰春官大宗伯以蒼璧禮天黄琮禮地以青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方典瑞云四圭有邸以祀天兩圭有邸以祀地祼圭有瓉以祀先王圭璧以祀日月星辰璋邸射以祀山川皆祭神所用言圭璧總稱卒盡寧猶何也舊說以為宣王承厲王之烈烈暴虐也内有撥亂之志遇烖而懼側身修行欲銷去之天下喜於王化復行百姓見憂孔氏曰側者反側也憂不自安故處身反側也王之憂旱正為百姓是天下百姓見被憂矜百姓見憂見憂恤於王也故仍叔作此詩以美之孔氏曰仍氏叔字春秋桓公五年天王使仍叔之子來聘上距宣王之崩七十餘年至其初則百餘也春秋之世晉知氏世稱伯趙氏世稱孟仍氏或亦世稱言雲漢者夜晴則天河明故述王仰訴於天之詞如此也曹氏曰雲漢昭回則其非雨之候可知矣王介甫曰瞻仰昊天不見雨候於是歎傷人之無辜而遇此喪亂饑饉也謝疊山曰桑柔以稼穡卒痒為天降喪亂雲漢以饑饉薦臻為天降喪亂王以民為天民以食為天民無食皆可言天降喪亂也古人之重民食如此旱既大音泰甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨叶力中反耗斁丁故反下土寧丁我躬賦也藴蓄隆盛也蟲蟲熱氣也曹氏曰藴者陽氣之蓄積也隆者陽氣之驕亢也蟲蟲者欎積驕亢之氣熏炙而病人者也濮氏曰蟲與爞同旱熱熏人殄絶也郊祀天地也宫宗廟也上祭天下祭地奠其禮瘞其物王介甫曰天神地示人鬼内外上下無不禋祀矣孔氏曰奠謂置之於地瘞謂埋之於地禮與物皆謂禮神之物酒食性玉之屬也天言奠其禮地言瘞其物互以相通濮氏曰祭畢凡幣帛祝冊之屬燎而瘞之宗尊也劉氏曰前曰靡神不舉則秩而祭之後曰靡神不宗則尊而事之克勝也言后稷欲救此旱灾而不能勝也臨享也稷以親言帝以尊言也曹氏曰宫之神莫親於后稷固肯臨我而其力不足以勝旱災郊之神莫尊於上帝其力能勝旱災而不肯臨我輔氏曰先郊後宫先尊而後親也上下先天而後地也靡神不宗徧舉所祭之鬼神也前言舉舉其禮此言宗極其尊也后稷不克上帝不臨先親而後尊也不言地及他鬼神者舉尊親以該之也斁敗丁當也何以當我之身而有是災也或曰與其耗斁下土寧使災害當我身也亦通旱既大甚則不可推吐雷反兢兢業業如霆如雷周餘黎民靡有孑遺叶夷回反下同昊天上帝則不我遺胡不相畏先祖於摧在雷反賦也推去也兢兢恐也業業危也如霆如雷言畏之甚也孑無右臂貌遺餘也孑獨立之貌遺脫也言大亂之後周之餘民無復有半身之遺者孟子曰說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也集注曰若但以其辭而已則如雲漢之言是周之民真無遺種矣惟以意逆志則知作詩者之志在於憂旱而非真無遺民也而上天又降旱災使我亦不見遺也摧滅也言先祖之祀將自此而滅也旱既大甚則不可沮在吕反赫赫炎炎云我無所大命近止靡瞻靡顧叶果五反羣公先正則不我助叶牀所反父母先祖胡寧忍予叶演女反賦也沮止也赫赫旱氣也炎炎熱氣也無所無所容也大命近止死將至也瞻仰顧望也羣公先正月令所謂雩祀百辟卿士之有益於民者以祈穀實者也孔氏曰正者長也先世為官之長月令注云百辟卿士古之上公以下勾龍后稷之類也於羣公先正但言其不見助至父母先祖則以恩望之矣所謂垂涕泣而道之也愚按忍之一辭可見望之以恩之意旱既大甚滌滌徒厯反山川叶樞倫反旱魃蒲末反為虐如惔音談如焚叶符勻反我心憚暑憂心如熏羣公先正則不我聞叶微匀反昊天上帝寧俾我遯叶徒匀反賦也滌滌言山無木川無水如滌而除之也魃旱神也孔氏曰神異經云南方有人長二三尺祖身而目在頂上走行如風名魃所見之國大旱一名旱母盖是鬼魅之物惔燎之也憚勞也畏也熏灼遯逃也言天又不肯使我得逃遯而去也旱既大甚黽勉畏去胡寧瘨都田反我以旱憯七感反不知其故祈年孔夙方社不莫音慕昊天上帝則不我虞叶元具反敬恭明神宜無悔怒賦也黽勉畏去出無所之也瘨病憯曾也祈年孟春祈穀於上帝孟冬祈來年於天宗是也方祭四方也社祭土神也曹氏曰月令祈穀注云謂以上辛郊祀天也天宗注云謂日月星辰也夫自去歳之孟冬已祈今歳之豐稔可謂夙矣謝疊山曰古之聖王無一日不為民慮稼之方納預祈來年於天宗農之始耕先祈穀于上帝春祈社稷己願百穀之堅實秋報社稷又願嗣歳之豐登所謂孔夙不莫也虞度悔恨也言天曾不度我之心如我之敬事明神宜可以無恨怒也輔氏曰言欲去則出無所之故復黽勉而不敢去也蘇氏以畏為不敢甚當胡寧瘨我以旱憯不知其故祈年則孔夙方社則不莫皆自反之辭也我雖自反如此而天則不我虞度也然我之敬恭明神不敢少怠則明神宜亦無所恨怒也旱既大甚散無友紀鞫居六反哉庶正疚哉冢宰叶奬里反趣七口反馬師氏膳夫左右叶羽已反靡人不周無不能止瞻卬音仰昊天云如何里賦也友紀猶言綱紀也孔氏曰散無友紀者由困於飢不能如常相紀故謂之散或曰友疑作有鞠窮也庶正衆官之長也疚病也冢宰又衆長之長也趣馬掌馬之官師氏掌以兵守王門者膳夫掌食之官也嵗凶年穀不登孔氏曰四時一終曰嵗取嵗星行一次也年取穀一熟也嵗凶謂此歳凶也年穀不登於此年之穀不成熟也故言嵗凶為之目則趣馬不秣孔氏曰不以粟秣養其馬師氏弛其兵孔氏曰弛廢其兵不用馳道不除秦漢謂天子所行之道為馳道孔氏曰所驅馳之大道不使人除治之祭事不縣懸孔氏曰祭祀不縣其樂膳夫徹膳孔氏曰減徹王之膳食左右布而不修孔氏曰左右之宫布列於位不令有所修造大夫不食粱士飲酒不樂孔氏曰凡此皆當先有成文故毛傳引以明凶年之禮鄭氏曰以上皆自為貶損憂民也周救也無不能止言諸臣無有一人不周救百姓者無有自言不能而遂止不為也里憂也吕東萊曰釋文云里本作㾖爾雅作悝釋詁云悝憂也與漢書無俚之俚同聊賴之意也輔氏曰瞻卬昊天云如何里盖又呼天而訴之言其如我之憂何也此亦人窮則反本之意愚按孟子稽大不理於口集注訓賴亦引季布傳無俚之俚為証然則里理俚盖通用瞻卬昊天有嘒呼惠反其星大夫君子昭假音格無嬴音盈大命近止無棄爾成何求為于偽反我以戾庶正叶諸盈反瞻仰昊天曷惠其寧賦也嘒明貌昭明假至也久旱而仰天以望雨則有嘒然之明星未有雨徵也然羣臣竭其精誠而助王以昭假于天者已無餘矣雖今死亡將近而不可以棄其前功當益求所以昭假者而修之固非求為我之一身而已乃所以定衆正也蘇氏口未有民不寧而庶官定者也於是語終又仰天而訴之曰果何時而恵我以安寧乎張子曰不敢斥言雨者畏懼之甚且不敢必云爾雲漢八章章十句段氏曰李氏云宣王之早告於上天又告於父母先祖又告於百官以見情之切念之深也李迂仲曰春秋傳宋大水公子御説對魯數語耳而臧孫逹曰是宜為君有恤民之心宣王之憂民如此而不中興乎呂東萊曰宣王小雅始於六月言其功也大雅始於雲漢言其心也無是心安有是功哉序仍叔美宣王也宣王承厲王之烈内有撥亂之志遇哉而懼側身修行欲銷去之天下喜於王化復行百姓見憂故作是詩也此序有理崧息中反髙維嶽駿音峻極于天叶鐵因反維嶽降神生甫及申維申及甫維周之翰叶胡干反四國于蕃叶分邅反四方于宣賦也山大而髙曰崧嶽山之尊者東岱南霍西華北恒是也李迂仲曰凡大而高者皆曰崧所爾雅注曰岱宗泰山也霍即天柱山潛水出華華隂山恒常山也駿大也甫甫侯也即穆王時作吕刑者孔氏曰孔安國云吕侯後為甫侯故詩及禮記作甫尚書與外傳作吕林氏曰吕與甫猶荆與楚商與殷或曰此是宣王時人而作吕刑者之子孫也吕東萊曰甫申意者皆宣王時賢諸侯同有功於王室者甫雖不見於經以文意考之盖當如此鄭氏乃逺取甫侯殆非也申申伯也皆姜姓之國也李迂仲曰申侯爵以其為方伯故謂之申伯南陽有申城申伯國也甫侯未知其國所在翰幹蕃蔽也宣王之舅申伯出封于謝而尹吉甫作詩以送之言嶽山髙大而降其神靈和氣以生甫侯申伯實為周之楨幹屏蔽而宣其徳澤於天下也孔氏曰此詩送申伯而及甫侯者美其上世俱出四岳故連言之盖申伯之先神農之後為唐虞四嶽總領方嶽諸侯而奉嶽神之祭能修其職嶽神享之故此詩推本申伯之所以生以為嶽降神而為之也黄寳夫曰維岳降神乃詩人形容之辭以見上天興周之意不必泥其有無也胡庭芳曰范氏云申甫指仲山甫申伯也說者泥四岳之說以為神祐其子孫遂以甫為甫侯申為申伯夫逺取穆王之臣以配申伯已不可信而謂神専佑掌祀者之子孫抑又近誣詩人盖於申伯言國山甫言字安用逺取甫侯哉且崧髙以申甫為岳之降神烝民以山甫為天之所生其義既同而維申及甫維周之翰其事亦同也彭氏曰孔子閒居注曰周道將興崧岳為之生賢佐仲山甫申伯嚴氏曰鄭氏注禮記以甫為山甫而箋詩乃以為甫侯自為異義且申伯光輔中興而逺取周道始衰之甫侯以匹之非所以褒揚申伯也亹亹申伯王纉祖管反之事于邑于謝南國是式叶失吏反王命召伯叶逋莫反定申伯之宅叶達各反登是南邦叶卜工反世執其功賦也亹亹强勉之貌與亹亹文王者異矣纉繼也使之繼其先世之事也輔氏曰申伯之亹亹乃大禹孜孜之心也唯其有是心故王使之纉其先世之事邑國都之處也謝在今鄧州南陽縣周之南土也曹氏曰後漢地理志南陽宛縣有申伯國棘陽縣東北百里有謝城其地盖相近申伯先封于申宣王使紹封于謝也愚按宋南陽縣屬鄧州今改屬南陽府隷河南省式使諸侯以為法也孔氏曰申伯之賢當使南國法之召伯召穆公虎也登成也世執其功言使申伯後世常守其功也彭氏曰申伯之先已為諸侯故王使繼其事而邑於謝式於南邦此加地進律之賞也故曰登是南邦盖言升之南邦使為牧伯之任而世執其功子子孫孫與國咸休也或曰大封之禮召公之世職也孔氏曰王肅云召公為司空主繕治營築城郭召伯所主其事也嚴氏曰次章述封謝也愚按如或說則此章前四句述王褒封申伯之事後四句述王命穆公為申伯定邑居常守康公之職也王命申伯式是南邦叶卜功反因是謝人以作爾庸王命召伯徹申伯土田叶地因反王命傅御遷其私人賦也庸城也言因謝邑之人而為國也釋文曰庸亦作墉鄭氏曰庸功也為國以起其功也徹定其經界正其賦稅也錢氏曰厲王後徹法漸壤故使召伯正之謝疊山曰由漢以來功臣賜田地者多矣未聞天子命元勳重徳董其事者定申伯宅徹申伯土田皆曰王命召伯盖申伯必有非常之功為天下所敬仰者惜乎經史皆不載也傅御申伯家臣之長也私人家人遷使就國也輔氏曰庸恐只是言城定居宅作城郭徹土田王皆使召伯先營之居宅定然後築城郭城郭立然後徹土田觀下章有俶其城則城亦召伯為之家也王命傅御遷其私人者申伯為卿大夫時盖必有臣今出封於謝不敢自與之往也故王命其家臣之長使遷之漢明帝送侯印與東平王蒼諸子而以手詔賜其國中傅盖古制如此蒼來朝歸帝乃遣使手詔賜東平國中傅曰云云今送列侯印十九枚諸王子年五嵗以上能趨拜者皆令帶之申伯之功召伯是營有俶尺叔反其城寢廟既成既成藐藐王錫申伯叶逋各反四牡蹻蹻渠畧反鉤膺濯濯賦也俶始作也藐藐深貌蹻蹻壯貌濯濯光明貌曹氏曰凡營國宗廟為先故言寢廟既成也王遣申伯路車乗繩證反馬叶滿補反我圖爾居莫如南土錫爾介圭以作爾寳叶音補往近鄭音記按說文從辵從丌今従斤誤王舅南土是保叶音補賦也介圭諸侯之封圭也吕東萊曰韓奕云以其介圭入覲于王則是諸侯之瑞圭介之為言大也非周官之介圭也近辭也讀如彼己之子之己愚按玉篇注近行也嚴氏曰五章述遣之也輔氏曰此章言王遣申伯之有禮也路車乗馬所以終上章之意我圖爾居莫如南土非苟封之謝也錫爾介圭以作爾寳非苟與之圭也往近王舅南土是保欲其保障此南土也申伯信邁王餞淺賤反于郿芒悲反申伯還南謝于誠歸王命召伯徹申伯土疆以峙直里反其粻音張式遄市専反其行叶户郎反賦也郿在今鳳翔府郿縣愚按郿縣今屬安西路𨽻陜西省在鎬京之西岐周之東而申在鎬京之東南時王在岐周故餞于郿也孔氏曰自鎬適申則塗不經郿時宣王盖省視岐周故餞之於郿既餞還經於鎬而後適申也言信邁誠歸以見王之數留疑於行之不果故也孔氏曰謝于誠歸古人語多倒峙積粻糧遄速也召伯之營謝也則已斂其稅賦積其餱糧使廬市有止宿之委去聲積恣故能使申伯無留行也吕東萊曰是詩載封申伯如遷其私人以峙其粻莫不曲盡宣王之待元舅其恩意周浹綜理微宻如此嚴氏曰六章述申伯往謝也輔氏曰此章言王餞申伯之誠意也王先使召伯為之定居宅作城郭以成其國徹土田遷私人以分其業終又斂賦稅積餱糧而後申伯之行無道路留滯之虞於是以禮餞之則王之待申伯者可謂至矣申伯畨畨音波叶分邅反既入於謝徒御嘽嘽吐丹反周邦咸喜戎有良翰叶胡干反不顯申伯王之元舅文武是憲叶虚言反賦也畨畨武勇貌嘽嘽衆盛也戎女也申伯既入於謝周人皆以為喜而相謂曰汝今有良翰矣元長憲法也言文武之士皆以申伯為法也或曰申伯能以文王武王為法也輔氏曰不顯申伯言申伯之甚顯也親則為王之元舅賢則為文武之士之法則始言畨畨但見其武故終則并文言之胡庭芳曰蘇氏云言其文武皆足法也然則文武是憲有三義也愚按如上三說皆通但以前章南國是式式是南邦之語証之則集傳第一說為勝而蘇氏之意亦在其中矣曽氏曰此章所謂文武後章所謂柔惠且直辭異而實同皆美其全徳耳嚴氏曰七章述申伯至謝此方送行而豫道其事也申伯之徳柔惠且直揉汝又反此萬邦聞音問於四國叶於逼反吉甫作誦其詩孔碩其風肆好以贈申伯賦也揉治也吉甫尹吉甫周之卿士孔氏曰吉甫之先嘗為尹官因氏焉誦工師所誦之詞也孔氏曰詩者工師樂人誦之以為樂曲碩大風聲肆遂也謝疊山曰此雅也正言其事形容宣王眷遇申伯之意有風人之體故曰風輔氏曰柔惠柔徳之善也直剛徳之善也其徳剛柔相濟文武兼資故能治萬邦而名聞著於四方之侯國此尹吉甫之詩所以不容不作也嵩髙八章章八句嚴氏曰此詩多申複之詞既曰王命召伯定申伯之宅又曰申伯之功召伯是營既曰南國是式又曰式是南邦既曰于邑于謝又曰因是謝人既曰王命召伯徹申伯土田又曰王命召伯徹申伯土疆既曰謝於誠歸又曰既入于謝既曰登是南邦又曰南土是保既曰四牡蹻蹻鉤膺濯濯又曰路車乘馬每事申言之寓丁寧鄭重之意自是一體難以一一穿鑿分别也城問崧髙烝民二詩皆是遣大臣出為諸侯築曰此也不得曉封諸侯固是大事看黍苗詩當初召伯帶領許多車徒人馬去也是勞攘胡庭芳曰崧髙與黍苗相表裏黍苗不過述召伯營謝之功崧髙則尹吉甫送申伯雖美申伯多述王命故雅有大小之不同也序尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉此尹吉甫送申伯之詩因可以見宣王中興之業耳非専為美宣王而作也下三篇放此天生蒸民有物有則民之秉彛音夷好呼報反是懿徳天監有周昭假音格於下叶後五反保兹天子生仲山甫賦也烝衆則法秉執彛常懿美監視昭明假至保佑也仲山甫樊侯之字也孔氏曰周語稱樊仲山甫諫宣王是山甫為樊國之君也樊邑在東都畿内宣王命樊侯仲山甫築城於齊而尹吉甫作詩以送之言天生衆民有是物必有是則盖自百骸九竅五藏而達之君臣父子夫婦長㓜朋友無非物也而莫不有法焉如視之明聴之聰貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性故其情無不好此美徳者天之生此物必有箇當然之則故民執之以為常道所以無不好此懿徳者物物有則止於仁君之則也止於敬臣之則也視逺惟明目之則也聴徳惟聰耳之則也從作義言之則也恭作肅貌之則也四肢百骸萬物萬事莫不各有當然之則真氏曰盈天地之間莫非物也人亦物也事亦物也有是物則具此理是所謂則也則者準則之謂一定而不可易也彜而言東者渾然一理具於吾心不可移奪若秉執然為其有此故於美徳無不知好之者仁義忠孝所謂美徳也人無賢愚莫不好之也而况天之監視有周能以昭明之徳感格於下故保佑之而為之生此賢佐曰仲山甫焉輔氏曰天佑人君莫先於生賢佐莫切於生賢子孫則所以鍾其秀氣而全其美徳者又非特如凡民而已也嚴氏曰民皆秉此常性故皆好此懿徳於均禀同賦之中而有賢者獨鍾氣之粹焉是以關於國家盛衰之數而非偶然也昔孔子讀詩至此而賛之曰為此詩者其知道乎故有物必有則民之秉彛也故好是懿徳而孟子引之以證性善之說其指深矣讀者其致思焉張南軒曰天命所賦謂之則人性所禀謂之彜存於心而有所得者謂之徳其實一而已矣孔子又加一必字於有則之上加一故字於好是之上其㫖愈明矣孟子舉此詩盖謂秉彜好徳心之所好處即是性之發動處就性初發動處指出以示人方見得此性之本善楊氏曰孟子所引詩於其本文加四字而已而詩語自分明今之說詩者殊不知此輔氏曰首四句尹吉甫亦是平說將下來而包涵至大義味淵永使孔子讀之而賛其知道而孟子又引以為性善之証其㫖深矣所謂有徳者之言也宣王之臣有尹吉甫之學問文章以宣揚道達上下之情有仲山甫之才徳功業以輔賛彌縫宣勞内外則其致中興也宜哉陳夀翁曰天之生人氣以成形理亦賦焉氣之成形者物也理之成性者則也自性之確然有定者言之謂之則自性之秩然有常者言之謂之彜自其行道而得此性理於心者言之謂之徳好以情言也惟其有此則是以秉此彜惟其性秉此彛是以情好此徳情之所發好善如此則性之本善可知矣此言賦受性情至精至微之理三百篇第一義也仲山甫之徳柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦叶韻若賦未詳賦也嘉美令善也儀威儀也色顔色也翼翼恭敬貌古訓先王之遺典也式法力勉若順賦布也東萊吕氏曰柔嘉維則不過其則也過其則斯為弱不得謂之柔嘉矣令儀令色小心翼翼言其表裏柔嘉也古訓是式威儀是力言其學問進修也天子是若明命使賦言其發而措之事業也此章盖備舉仲山甫之徳輔氏曰令儀令色柔嘉之發於外也小心翼翼柔嘉之存於内也古訓是式學問之不忘也威儀是力進修之不怠也其措之事業則上以承順乎天子下以布宣乎王命是皆柔嘉之徳致然也陳才卿問五章云柔亦不茹剛亦不吐言仲山甫之徳剛柔不偏也而二章首舉仲山甫之徳獨以柔嘉維則蔽之崧髙稱申伯畨畨終論其徳亦曰柔惠且直然則入徳之方其可知矣曰如此則乾卦不用得了人之資稟自有柔徳勝者自有剛徳勝者如范文正富鄭公輩是以剛徳勝如范忠宣范淳夫趙清獻蘇子容輩是以柔徳勝只是他却柔得好如山甫令儀令色小心翼翼却是柔但其中自有骨子不是一向柔去看文字要得言外之意若以柔嘉維則為入徳之方則不可人之進徳須要剛健不息王命仲山甫式是百辟音壁無韻未詳纉戎祖考王躬是保出納王命王之喉舌賦政於外四方爰發叶方月反賦也式法戎女也王躬是保所謂保其身體者也然則仲山甫盖以冡宰兼大保而大保抑其世官也與其言式是百辟則是為宰相可知其曰保兹天子王躬是保則是為大保可知此正召康公之舊職出承而布之也納行而復之也胡庭芳曰如書出納朕命盖謹審上之命令命之善者宣出之不善者繳納之如後世封還詞頭之類喉舌所以出言也發發而應之也東萊吕氏曰仲山甫之職外則總領諸侯黄寳夫曰天子之職論一相宰相之職統百官故一時諸侯得山甫以為之式内則輔養君徳入則典司政本出則經營四方輔氏曰式是百辟與崧髙言式是南邦同謂為諸侯之所法也此言冡宰之事纉戎祖考王躬是保此言太保之職出納王命王之喉舌所謂典司政本也賦政於外四方爰發此言經營四方也至於今兹築城於齊則亦經營之一事也彭氏曰纉祖考保王躬盖欲其以孝於父祖者而忠於君出納王命賦政於外盖使之以忠於君者而及於民胡庭芳曰出納則居中以通達上下之情賦政則出外以經營四方之治此章盖備舉仲山甫之職肅肅王命仲山甫將之邦國若否音鄙仲山甫明叶謨郎反之既明且哲以保其身夙夜匪解佳賣反以事一人賦也肅肅嚴也將奉行也若順也順否猶臧否鄙也鄭氏曰猶善惡也明謂明於理哲謂察於事保身盖順理以守身非趨利避害而偷以全軀之謂也只是上文肅肅王命仲山甫將之邦國若否仲山甫明之便是明哲所謂明哲者只是曉天下事理順理而行自然災害不及其身可以保其禄位今人以邪心讀書謂明哲知幾知微先去占取便宜如揚子雲謂明哲煌煌旁燭無疆遜於不虞以保天命便是占便宜底說話所以他一生被這幾句誤然明哲保身亦足是常法若到那舍生取義處又不如此論饒氏曰明者大無不照之謂以徳之大者而言也哲者微無不察之謂以徳之小者而言也保身者其中庸不驕不倍足興足容之謂乎解怠也一人天子也輔氏曰肅肅尊嚴之意王命之尊嚴如此山甫則奉而行之邦國則有順有否山甫則能明而辨之此則承上章賦政於外四方爰發而言之也大凡徇外者多忘乎内而山甫又能以明哲而保其身守己者或簡於人山甫又能夙夜匪解以事一人此其為全徳也歟人亦有言柔則茹忍與反之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜古頑反寡吐果五反不畏彊禦賦也人亦有言世俗之言也茹納也曹氏曰茹者吞㗖之名若茹草茹毛然不茹柔故不侮矜寡不吐剛故不畏强禦孔氏曰茹柔吐剛喻見寡弱者則侵侮之强盛者則畏避之惟山甫則不然也不侮不畏既是不茹不吐既言其喻又言其實以充之以此觀之則仲山甫之柔嘉非軟美之謂而其保身未嘗枉道以徇人可知矣謝氏曰柔不茹剛不吐此强之寛仁之勇柔嘉維則者也輔氏曰二章既稱仲山甫之徳柔嘉故此章又以其剛亦不吐不畏强禦者言之柔而不過乎則則時當剛而剛矣先王謂柔嘉非軟美保身不枉道者併上章以保其身而言之也愚按周子以柔善為慈柔惡為懦弱剛惡為强梁剛善為嚴毅山甫不茹不侮則有柔善而無剛惡也不吐不畏則有剛善而無柔惡也有柔善而復有剛善故其柔嘉不為軟美無剛惡又無柔惡故其保身不至枉道盖其剛柔合徳而發皆中節也人亦有言徳輶羊久反如毛民鮮息淺反克舉之我儀圖叶丁五反之維仲山甫舉之愛莫助叶牀五反之衮職有闕維仲山甫補之賦也輶輕劉濟曰駟驖曰輶車者亦取其馳逐之輕故輶有輕之義儀度圖謀也衮職王職也天子龍衮不敢斥言王闕故曰衮職有闕也言人皆言徳甚輕而易舉然人莫能舉也輔氏曰徳者人之固有自一身而言之隨用而足故舉之甚易不啻如一毛之輕只為氣質物欲為之遮蔽故懵然不知非知至意誠者莫能舉也我於是謀度其能舉之者鄭氏曰我吉甫自我也則惟仲山甫而已是以心誠愛之而恨其不能有以助之盖愛之者秉彛好徳之性也而不能助者能舉與否在彼而已固無待於人之助而亦非人之所能助也黄寳夫曰助者生於有所不足今山甫能舉衆人不能舉之徳則無所不足何助之有故雖愛之而莫能助之也至於王職有闕失亦維仲山甫獨能補之盖惟大人然後能格君心之非未有不能自舉其徳而能補君之闕者也嚴氏曰此推尊其徳足以格君也輔氏曰舉在我之徳補在君之徳此亦非强立者不能山甫之徳至是又不可獨以柔稱矣仲山甫出祖四牡業業征夫捷捷在接反每懷靡及叶極業反四牡彭彭叶鋪郎反八鸞鏘鏘七羊反王命仲山甫城彼東方賦也祖行祭也曹氏曰顔師古云祖者送行之祭因享飲焉昔黄帝之子纍祖好逺遊而死於道故後人祭之以為行神其祭設軷於門外是出門而後祖祭故云出祖也業業健貌捷捷疾貌曹氏曰車徒之行如是其速而山甫每以不及事為懷盖言其忠也輔氏曰每懷靡及應四章之夙夜匪懈也東方齊也傳曰古者諸侯之居逼隘則王者遷其宅而定其居蓋去薄姑而遷於臨菑也孔氏曰史記齊獻公元年徙薄姑都治臨菑計獻公當夷王之時與此傳不合豈徙於夷王之時至是而始備其城郭之守歟四牡騤騤求龜反八鸞喈喈音皆叶居奚反仲山甫徂齊式遄其歸吉甫作誦穆如清風叶孚愔反仲山甫永懷以慰其心賦也式遄其歸不欲其久於外也穆深長也清風清微之風化養萬物者也以其逺行而有所懷思故以此詩慰其心焉曾氏曰賦政於外雖仲山甫之職然保王躬補王闕尤其所急城彼東方其心永懷盖有所不安者尹吉甫深知之作誦而告以遄歸所以安其心也輔氏曰人不足適政不足間惟大人為能格君心之非山甫内外之事無不總理而其輕重緩急之序則於心自有定見吉甫知之故告以遄歸焉所以安其心也穆如清風者言如清微之風化養萬物感而入之意味深長也烝民八章章八句看烝民詩左傳國語周人說底話多好處也是文武周公立學校教養得許多人如烝民詩大故細膩陳夀翁曰首章推原天生衆人稟氣受性之所同而仲山甫則鍾氣之秀而全性之徳者篇内諸章多與開端之語相應柔嘉維則之則即有物有則之則儀色之令威儀之力皆所以全物中之則柔不茹剛不吐則剛柔不過其則也民之禀氣受性雖同而氣未必皆秀性未必皆全故徳雖易舉而不能舉也山甫鍾其秀氣而全其美徳是以獨能舉此徳而異於凡民耳序尹吉甫美宣王也任賢使能周室中興焉同上陳少南曰崧髙烝民二詩皆尹吉甫贈行之詩而序詩者皆以為美宣王何也盖人君委任得人而僚友之間賦詩以相娱樂則人君之美亦可見矣愚按朱子之説則以此詩為非專為美宣王而作也奕奕梁山維禹甸之有倬其道下與考叶韓侯受命王親命之纉戎祖考上與道叶無廢朕命夙夜匪解音懈叶訟力反䖍共爾位朕命不易榦古旦反不庭方以佐戎辟音璧賦也奕奕大也梁山韓之鎮也今在同州韓城縣愚按今陜西省安西路所治甸治也劉辰翁曰將言韓侯而先言禹甸賦之紆餘深逺如此倬明貌韓國名侯爵武王之後也受命盖即位除喪以士服入見天子而聴命也纉繼戎汝也言王錫命之使繼世而為諸侯也䖍敬易改也黄寳夫曰君之於臣任之不專信之不篤則彼亦將無以自安也榦正也鄭氏曰作楨榦而正之也不庭方不來庭之國辟君也鄭氏曰戎辟汝君王自謂也此又戒之以修其職業之詞也韓侯初立來朝始受王命而歸詩人作此以送之將言韓侯故先序其國曰梁山之下有倬然之道此韓侯之所從朝周以受命者也纉戎祖考以下述王親命之詞也輔氏曰夙夜匪解勤也䖍共爾位敬也為諸侯而能勤與敬若此則能無廢朕命矣榦不庭方以佐戎辟言我既信任於汝如此之篤則韓侯自可力修其職業有不來庭之諸侯則助王以榦正之也以末章觀之則其所正者亦追貃之國耳序亦以為尹吉甫作今未有據下篇云召穆公凡伯者放此四牡奕奕孔修且張韓侯入覲以其介圭入覲於王王錫韓侯淑旂綏章簟茀錯衡叶户郎反𤣥衮赤舄鉤膺鏤音漏錫音羊鞹苦郭反鞃苦𢎞反淺幭莫厯反鞗音條革金厄叶於栗反賦也修長張大也介圭封圭執之為贄以合瑞于王也孔氏曰崧髙以介圭為所執之瑞此介圭亦為瑞也曹氏曰周官典瑞五等諸侯各執其圭璧以朝覲宗遇㑹同于王既覲則王班而復之乃以車馬旂服賜之如下所云也淑善也交龍曰旂綏章染鳥羽或旄牛尾為之注於旂竿之首為表章者也孔氏曰夏米注云徐州貢夏翟之羽有虞以為綏後世或無染鳥羽或旄牛尾為之綴於幢上然則綏者即交龍旂竿所建與旂共一竿為貴賤之表章故云綏章鏤刻金也馬眉上飾曰錫今當盧也孔氏曰以鏤金加於馬面之錫當盧者當馬之額盧在眉眼之上鞹去毛之革也鞃式中也謂兩較之間横木可憑者以鞹持之使牢固也孔氏曰以去毛之皮施於軾之中央持車使牢固也淺虎皮也毛氏曰虎皮淺毛也幭覆浮去聲式也字一作幦又作幎以有毛之皮覆式上也孔氏曰幭幦幎字異而義同玉藻言有羔幦鹿幦春官巾車言犬䄙豻䄙皆以有毛之皮為幦幦是盖覆之名覆在式上也鞗革轡首也曹氏曰以鞗皮為轡其有餘而垂者謂之革也金厄以金為環纒搤轡首也釋文曰搤厄同王晦叔曰此章乃言所錫之多以見恩寵之厚也韓侯出祖出宿於屠顯父音甫餞之清酒百壺其殽維何炰白交反鱉鮮魚其蓛音速維何維筍恤尹反及蒲其贈維何乗繩證反馬路車籩豆有且子余反侯氏燕胥賦也既覲而反國必祖者尊其所往去則如始行焉孔氏曰始行為祖祭者為尊其所往也反則自歸其國非復所尊而亦祖祭故云尊其所往如始行焉祖於國外畢乃出宿屠地名或曰杜也愚按在今安西路鄠縣杜詩注曰漢志注云古杜伯國漢宣帝𦵏其地因曰杜陵在長安南五十里顯父周之卿士也謝疊山曰申伯之行王親餞之韓侯之行王使顯父餞之禮亦有等差也䔩菜殽對肉殽故云菜殽謂菹也筍竹萌也蒲蒲蒻弱也孔氏曰醢人加豆之實有深蒲筍菹蒲始生水中取其中心入地蒻大如匕柄正白生噉之甘脆輔氏曰酒之多及衆也殽之薄示儉也贈之厚示恩也且多貌侯氏覲禮諸侯來朝者之稱吕東萊曰覲禮來朝之諸侯皆曰侯氏此則指韓侯也胥相也或曰語辭王晦叔曰此章言已覲而返也韓侯取七住反妻汾符云反王之甥蹶俱衛反父音甫之子叶奬里反韓侯迎魚覲反止於蹶之里百兩音亮又如字彭彭叶鋪郎反八鸞鏘鏘不顯其光諸娣大計反從之祁祁巨移反如雲韓侯顧之爛其盈門叶眉貧反賦也此言韓侯既覲而還遂以親迎也汾王厲王也厲王流於彘在汾水之上故時人以目王焉猶言莒郊公黎比毗公也嚴氏曰解頥新語云晉侯居翼謂之翼侯晉人納諸鄂謂之鄂侯鄭叔段居京謂之京城大叔及出奔謂之共叔其皆汾王之類乎說者以莒之郊公黎比公為比非也按左氏傳莒夷無謚於是號曰黎比公曰郊公曰兹不公曰著丘公皆以號稱與汾王以地為稱不類矣蹶父周之卿士姞極姓也諸娣諸侯一娶九女二國媵之皆有娣姪迭又音秩也愚按嫡妻有娣有姪同姓二國之媵亦有娣有姪則九女也祁祁徐靚净也愚按徐言其行動靚言其容飾如雲衆多也蹶父孔武靡國不到為于偽反韓姞其一反相息亮反攸莫如韓樂音洛叶力告反孔樂韓土川澤訏訏况甫反魴鱮甫甫塵鹿噳噳愚甫反有熊有羆有貓苗茅二音有虎慶既令居叶斤御斤於二反韓姞燕譽叶羊茹羊諸二反賦也韓姞蹶父之子韓侯妻也王介甫曰婦人稱姓今以姓配夫之國故謂之韓姞相攸擇可嫁之所也訏訏甫甫大也噳噳衆也愚按吉日噳作虞貓似虎而淺毛爾雅曰虎竊毛謂之虦貓注竊淺也虦音棧慶喜令善也喜其有此善居也燕安譽樂也謝疊山曰此章專言韓姞從夫而樂其家曹氏曰此章與碩人卒章意同齊近河韓多山各賦其所有一則美其父母之國一則美其所嫁之國也溥彼韓城燕因肩反師所完以先祖受命因時百蠻王錫韓侯其追其貃母伯反奄受北國因以其伯實墉實壑實畝實籍獻其貔音毗皮赤豹黄羆賦也溥大也燕召公之國也師衆也追貃夷狄之國也墉城壑池籍稅也孔氏曰公羊傳曰仆一而籍是籍為稅之義也貔猛獸名孔氏曰一名執夷虎豹之屬也陸機曰貔似虎或曰似熊赤豹毛赤而文黒羆大於熊有黄羆赤羆貔言皮則豹羆亦獻皮也韓初封時召公為司空王命以其衆為築此城如召伯營謝山甫城齊春秋諸侯城邢城楚丘之類也孔氏曰左傳云邗晉應韓武之穆也是韓侯之先武王之子也其封當在成王時命為侯也來不知當初何故不教本土人築又須去别處發人豈不大勞攘古人重勞民如此等事却又不然更不可曉强說便成穿鑿如漢築長安城却去别處調人來如今建州南劒上下築城却去建康府發人來這般却曉不得吕東萊曰春秋之時城邢城楚丘城縁陵城杞之類皆合諸侯為之霸今尚如此則周之盛時命燕城韓固常政也王以韓侯之先因是百蠻而長之故錫之追貃使為之伯李迂仲曰因以其伯即上文纉戎祖考也以修其城池治其田畝正其稅法而貢其所有於王也謝疊山曰髙城深池可以固圍徹田為糧可以足食宣王為邊方盧亦詳矣輔氏曰此章則又言王之委重於韓侯而勉以强於自治而修其職貢於王也但言三獸之皮者猛獸韓國所富有故令貢其皮焉亦以見不强責其所無也韓奕六章章十二句序尹吉甫美宣王也能錫命諸侯同上其曰尹吉甫者未有據下二篇同其曰能錫命諸侯則尤淺陋無理矣既為天子錫命諸侯自其常事春秋戰國之時猶有能行之者亦何足為美哉江漢浮浮武夫滔滔叶他侯反匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪賦也浮浮水盛貌滔滔順流貌蘇氏曰自周而南出於江漢之間召公率兵循江而下也淮夷夷之在淮上者也孔氏曰召公伐淮夷當在淮南魯僖伐淮夷應在淮北淮之南北皆有夷也陳少南曰淮夷之地不一徐州有夷則在淮北者也揚州有夷則在淮南者也江漢常武二篇同言淮夷以地理考之曰江漢之滸者是淮南之夷也若在淮北則江漢非所由入之路也曰率彼淮浦省此徐土者是淮北之夷也若在淮南則徐土非聫接之地矣吕東萊曰江漢合流之處在今漢陽軍之大别山下但去淮夷絶逺或者㑹江漢之師以伐之歟鋪陳也陳師以伐之也宣王命召穆公平淮南之夷詩人美之此章總序其事言行者皆莫敢安徐而曰吾之來也惟淮夷是求是伐耳輔氏曰其志專其氣銳有不戰戰必勝矣江漢湯湯書羊反武夫洸洸音光經營四方告成於王四方既平王國庶定叶唐丁反時靡有争叶甾陘反王心載寧賦也洸洸武貌庶幸也彭氏曰用兵非人主之美事不得已而興師故召公告成於王曰王國庶定庶云者幸其僅然非以是為美也此章言既伐而成功也曹氏曰宣王厲志開復北伐玁狁南征蠻荆至於常武江漢而夷之居淮南北悉已討定故召伯以經營四方之功告成於王也嚴氏曰首章言王師之持重二章即言告成盖淮夷望風而服不待戰也輔氏曰四方既平則王國庶可平定所謂柔逺能邇也時靡有争王心載寧又見宣王之以天下為心一有争鬭則王心之不安也讀此章見宣王能以天下之心為心而召公又能以宣王之心為心也江漢之滸音虎王命召虎式辟音闢四方徹我疆土匪疚匪棘王國來極于疆于理至於南海叶虎委反賦也虎召穆公名也辟與闢同徹井其田也疚病棘急也極中之表也居中而為四方所取正也言江漢既平王又命召公再言江漢之滸者繫上事起下事也陳少南曰非謂宣王臨江漢之滸而命召虎也闢四方之侵地而治其疆界非以病之非以急之也但使其來取正於王國而已於是遂疆理之盡南海而止也嚴氏曰古人伐叛討貳之後必去其苛政平其賦斂以慰民心故此章言徹法之事然武事僅定即行疆理稅賦之法疑於病民且疑於急迫矣宣王謂我非疚也非棘也盖仆一天下之中正乃我周之定制欲天下皆於王國來取中焉耳召公於是往而疆之以正其疆界往而理之以分其土宜推而至於南海之逺淮夷在南故曰至於南海輔氏曰辟其侵地治其疆界井其田畝豈無以為病者淮夷甫平而遽然為此豈無以為急者而王之心則不然也但欲反舊而使之取正於王國之法度耳愚按此章言穆公因平淮夷而又成開復之功也王命召虎來旬來宣文武受命召公維翰叶胡干反無曰予小子叶奬里反召公是似叶養里反肇敏戎公用錫爾祉賦也旬徧李迂仲曰十月為旬則旬訓徧明甚宣布也自江漢之滸言之故曰來召公召康公奭也翰幹也予小子王自稱也肇開戎汝公功也又言王命召虎來此江漢之滸徧治其事以布王命而曰昔文武受命惟召公為楨榦今女無曰以予小子之故也但自為嗣女召公之事耳能開敏女功則我當錫女以祉福如下章所云也鄭氏曰此述其祖之功以勸之也愚按此章追述王命召公之詞以終上章所言經營疆理之意而起下章所叙賞賜之事釐力之反爾圭瓉才旱反秬音巨鬯初亮反一卣音酉無韻未詳告於文人錫山土田叶地因反於周受命叶滿并反下同自召祖命虎拜稽首天子萬年叶彌因反賦也釐賜卣尊也孔氏曰釋器云卣中尊按鬰人掌和鬰鬯以實彛而陳之則鬯當在彛而此及尚書左傳皆云秬鬯一卣者當祭之時乃在彛未祭則在卣賜時未祭故卣盛之文人先祖之有文徳者謂文王也周岐周也召祖穆公之祖康公也此叙王賜召公策命之詞孔氏曰上言用錫爾祉此言賜之之事言錫爾圭瓉秬鬯者使之以祀其先祖又告於文人而錫之山川土由以廣其封邑蓋古者爵人必於祖廟示不敢專也孔氏曰祭統云賜爵禄必於大廟又使往受命於岐周從其祖康公受命於文王之所以寵異之孔氏曰虎祖康公在岐周事文武有功而受采地今虎嗣其業功與之等故往岐周命之謝疊山曰錫山川土田必使召虎受賜於岐周用文武封康公之禮以待之此時此意賞非宣王之賞如禀命於乃祖文武也功非召虎之功如受教於乃祖康公也召虎思文武之徳思康公之徳必能盡心盡力以報宣王之徳矣三代令王不責人子以事功惟勉臣子以忠孝本於人心天理而感動之也盤庚亦得此意而召公拜稽首以受王命之策書也人臣受恩無可以報謝者但言使君夀考而已虎拜稽首對揚王休叶虚久反作召公考叶去久反天子萬夀叶殖酉反明明天子叶奬里反令聞音問不已矢其文徳洽此四國叶越逼反賦也對答揚稱休美考成矢陳也言穆公既受賜遂答稱天子之美命作康公之廟器而勒王策命之詞以考其成且祝天子以萬夀也愚按上章虎拜稽首天子萬夀者述穆公受冊書而祝謝其君之詞也此復言虎拜稽首天子萬夀者述穆公銘祖廟器而祝君之詞也以考古圖觀之疑此章皆是述其勒銘廟器之詞古器物銘云􅌏弁拜稽首敢對揚天子休命用作朕皇考龔恭伯尊敦對􅌏其眉夀萬年無疆語正相類但彼自祝其夀而此祝君夀耳此章大抵類古器物銘識盖古人文字之常體也考古圖曰􅌏周大夫也有功錫命為其考作祭器也􅌏拜稽首對揚天子休命用作皇考龔伯尊敦者古者爵有徳禄有功必賜於大廟祭之日一獻君行立於阼階之南南面所命者北面史由君若執策命之再拜稽首受書以歸而舍奠於其廟也此策命之禮所圖器多有是詞既又美其君之令聞而進之以不已勸其君以文徳而不欲其極意於武功古人愛君之心於此可見矣輔氏曰穆公本以平淮夷而受賜今乃不言其武功而但願天子陳其文徳以洽四方之國則用兵豈聖人之得已哉而穆公愛君之忠誠亦至矣愚按上章王命穆公則欲其於召公是似而肇敏戎功此章穆公祝君則欲其長保令聞而陳其文徳上下之情可謂交相愛矣江漢六章章八句黄實夫曰此詩乃召公奏凱之日所作也初則整師而往非為邀功特以淮夷作患不能自安耳次則淮夷患除而其功成次則安民之政舉而其功廣次則即公而論賞次則論定而賞行次則人臣報塞之義也嚴氏曰周興西北岐豐去江漢最逺故淮夷最難服從化則後倡亂則先周人經理淮夷用力最多成王初年淮夷同三監以叛其後人同奄國以叛伯禽就封人同徐戎以叛宣王一命吉甫北方旋定繼命方叔伐蠻荆後命召公平淮南之夷人命皇甫平淮北之夷盖南方之役至再至三淮夷未定則一方倡亂天下皆危故至淮夷平然後四方定比江漢常武所以為宣王之終事而繫之於宣王大雅之末也楊氏曰聖主得賢臣而𢎞功業古人皆然也昔宣王中興有吉甫召虎仲山甫之徒以之伐玁狁以之平淮夷卒致再造之業諸臣之力居多宣王何力哉易未濟六五之光亦九四震用伐鬼方之力也五何力哉三年有賞于大國此詩之末所以言宣王之錫命也序尹吉甫美宣王也能興衰撥亂命召公平淮夷吉甫見上他説得之赫赫明明王命卿士叶音所南仲大音泰下同祖大師皇父音甫整我六師以修我戎叶音汝既敬既戒叶訖力反惠此南國叶越偪反賦也卿士即皇甫之官也南仲見出車篇大祖始祖也大師皇父之兼官也陳少南曰自家宰而下謂之六卿大師而下謂之三公既曰王命卿士又曰大師皇父周家不特設三公皆兼職而已如周公以冢宰兼大師也孔氏曰十月之交皇父與此皇父得為一人或皇氏父字傳世稱之亦未可知也我為宣王之自我也戎兵器也宣王自將以伐淮北之夷而命卿士之謂南仲為大祖兼大師而字皇父者整治其從行之六軍修其戎事以除惟夷之亂而惠此南方之國董氏曰師嚴器備當恭敬以臨戒懼以處之伐其暴亂所以惠之也輔氏曰既敬既戒臨事而懼也敬戒乃用兵第一義能如是則成功可必而南國可惠矣南方之國則淮南諸國也盖徐州之夷南侵諸國為之不安故其言如此胡庭芳曰既敬則不敢輕肆既戒則不敢妄殺此其所以為王者之師嚴重詳審而為南國之惠也詩人作此以美之必言南仲大祖者稱其世功以美大之也謝疊山曰宣王命將多取之世臣何也文事武備素講於家庭定亂持危常在其念慮一日用之必老成持重不以輕易悞國事矣輔氏曰稱其世功以美大之者見當時之重世臣也王謂尹氏命程伯休父左右陳行户郎反戒我師旅率彼淮浦省此徐土不留不處三事就緒象吕反賦也尹氏吉甫也盖為内史掌䇿命卿大夫也程伯休父周大夫孔氏曰楚語云重黎氏世叙天地其在周程伯休父其後也當宣王時失其官守而為司馬氏則是宣王始命程伯休父為司馬也程國伯爵休父字也濮氏曰程畿内邑在豊三事未詳或曰三農之事也三農上中下農夫也曹氏曰師之所處荆棘生焉故必不留不處然後三農得以就緒王介甫曰此所謂耕者不廢也言王詔尹氏策命程伯休父為司馬使之左右陳其行列循淮浦而省徐州之土盖伐淮北之夷也下章所謂徐方徐國亦即此爾曹氏曰徐州南至淮淮夷則東夷之種散處於淮浦者耳上章既命皇父而此章又命程伯休父者盖王親命大師以三公治其軍事而使内史命司馬以六卿副之耳輔氏曰天子親命大師以三公出將又使内史命司馬以六卿副之皆所以重其事命大將則曰整我六師以修我戎既敬既戒惠此南國命其副則曰左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緖者宜也大將則總其網副將則詳其目也兵以速為上久則毒民而傷財鄭氏曰軍禮司馬掌其戒誓愚按此上兩章皆言命戒將士之事赫赫業業叶宜却反有嚴天子王舒保作匪紹匪遊徐方繹騷叶蘇侯反震驚徐方如雷如霆徐方震驚賦也赫赫顯也業業大也嚴威也天子自將其威可畏也輔氏曰赫赫業業言有嚴天子之威靈氣燄烜赫而盛大如此也王舒保作未詳其義或曰舒徐保安作行也言王師舒徐而安行也曹氏曰雖以天子之威重如此亦安徐詳諦而後動紹糾緊也遊遨遊也繹連絡也騷擾動也夷厲以來周室衰弱至是而天子自將以征不庭其師始出不疾不遲而徐方之人皆已震動如雷霆作於其上不遑安矣王介甫曰江漢曰匪安匪舒此曰王舒保作盖江漢武夫之事此則王者之事也如雷如霆先加以聲也如震如怒復致其實也愚按此章言王師在道而徐夷已震恐也王奮厥武如震如怒叶暖五反進厥虎臣闞呼檻反如虓火交反虎鋪普吳反敦淮濆符云反仍執醜虜截彼淮浦王師之所賦也進鼓而進之也闞奮怒之貌虓虎之自怒也埤雅曰虎之自怒虓然闞如虓虎以言將帥之勇發於忠毅非激而怒之也鋪布也布其師旅也敦厚也厚集此陳也仍就也老子曰攘臂而仍之截截然不可犯之貌輔氏曰言王師在淮浦之上有截然不可犯之勇也愚按此言王師至徐布陳而制勝也王旅嘽嘽吐丹反如飛如翰如江如漢如山之苞叶鋪鉤反如川之流緜緜翼翼不測不克濯征徐國叶起逼反賦也嘽嘽衆盛貌翰羽苞本也如飛如翰疾也如江如漢衆也如山不可動也如川不可禦也孔氏曰兵法有動有静静則不可驚動故以山喻動則不可禦故以川喻緜緜不可絶也翼翼不可亂也不測不可知也不克不可勝也濯大也輔氏曰此章則承上章而言王旅之盛如此疾言其栗衆言其盛不可動言其静不可禦言其强不可絶言其屬不可亂言其整不可知言其深不可勝言其無敗之形以此濯征徐夷焉得而不服乎愚按此章極言王師之無敵也王猶允塞徐方既來叶六直反徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸叶古回反賦也猶道允信塞實庭朝回違也還歸班師而歸也前篇召公帥師以出歸告成功故備載其褒賞之詞此篇王實親行故於卒章反復其詞以歸功於天子言王道甚大而逺方懷之非獨兵威然也序所謂因以為戒者是也輔氏曰言由王道之信大故徐夷自然來服非獨兵威使然也甫得其不相違悖王則振旅而歸無求多之意既盡歸美之義而又寓規戒之忠焉曹氏曰宣王待夷狄以誠實之道不用詭詐徐方於是服而來歸來未必同也至於上下内外咸服而無二心然後謂之同徐方來同則由宣王推赤心置其腹中故也故以為天子之功宣王北伐玁狁西征羌戎南威蠻荆獨徐方未服今來朝於王庭則四方既平矣於是王命凱旋而行飲至萊勲之禮焉嚴氏曰宣王憤揮天戈克淮服徐無不如意召公慮其狃勝而喜功也故因美而戒之愚按此言王師成功而歸因戒之以王猶允塞亦若上篇卒章言矢其文徳也常武六章章八句序召穆公美宣王也有常徳以立武事因以為戒然召穆公見上所解名篇之意未知其果然否然於理亦通詩中無常武字特名其篇盖有二義有常徳以立武則可以武為常則不可此所以有美而有戒也段氏曰詩中摘字名篇則名未必有意特立篇名則名必有意瞻卬昊天則不我惠孔填舊說古塵字不寧降此大厲邦靡有定士民其瘵側界反叶側例反蟊音牟賊蟊疾靡有夷屇音戒叶居氣反罪罟不收靡有夷瘳敕留反賦也填久厲亂瘵病也蟊賊害苗之蟲也夷平届極罟網也此刺幽王嬖褒姒任奄人以致亂之詩首言昊天不惠而降亂無所歸咎之詞也蘇氏曰國有所定則民受其福無所定則受其病於是有小人為之蟊賊刑罪為之罔罟凡此皆民之所以病也鄭氏曰如蟊賊之害未稼無有息時施刑罪以羅罔天下而不收歛亦無止息時人有土田女音汝反有酉由二音之人有民人女覆奪徒活反之此宜無罪女反收殖酉殖由二反之彼宜有罪女覆說音脫之賦也反覆劉氏曰女反有之奪之言王削黜諸侯及卿大夫無罪者收拘說赦也謝疊山曰宜無罪者反拘之宜有罪者反赦之亂世昏君刑罰不中皆此類也輔氏曰上四句承上章蟊賊之害而述其侵牟奪取於人者反覆無常也下四句則承上章罪罟之言而述其拘繫縱釋於人者反覆不當也哲夫成城哲婦傾城懿厥哲婦為梟古堯反為鴟處之反婦有長舌維厲之階叶居奚反亂匪降自天叶鉄因反生自婦人匪教匪誨叶呼位反時維婦寺賦也哲知也城猶國也哲婦盖指褒姒也傾覆懿美也梟鴟惡聲之鳥也陸氏曰說文云梟不孝鳥也梟食母破獍食父鴟怪鴟鴞也鵩也鵂鷼也即墓門有鴞萃止也長舌能多言者也階梯也寺奄掩艶淹三音人也鄭氏曰奄精氣閉藏者今謂之宦人言男子正位乎外為國家之主故有知則能立國婦人以無非無儀為善無所事哲哲則適以覆國而已故此懿美之哲婦而反為梟鴟盖以其多言而能為禍亂之梯也若是則亂豈真自天降如首章之說哉特由此婦人而已盖其言雖多而非有教誨之益者是惟婦人與奄人耳豈可近哉王介甫曰幽王如上所刺則荒昏故也其荒昏則婦言是用故也上文但言婦人之禍末句兼以奄人為言盖二者常相倚而為奸不可不并以為戒也歐陽公常言宦者之禍甚於女寵其言尤為深切有國家者可不戒哉歐陽子曰女色而已宦者之害非一端也女色之感不幸而不悟則禍斯及矣使其一悟猝而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是矣孔氏曰奄人防守門誾親近人主庸君以其少小慣習朝夕給使顧訪無猜憚之心恩狎有可悅之色且其人久處宫掖頗曉舊章探知主意或乃色和貌厚挾術懷奸或乃捷對敏才飾巧亂實遂能迷罔視聴愚主信而任之國之滅亡多由此作鞫人忮之䜴反忒譖子念反始竟背音佩叶必墨反豈曰不極伊胡為慝如賈音古三倍君子是識婦無公事休其蠶織賦也鞫窮忮害忒變也譛不信也竟終背反極已慝惡也賈居貨者也三倍獲利之多也公事朝廷之事蠶織婦人之業言婦寺能以其智辯窮人之言其心忮害而變詐無常胡庭芳曰此章極言婦寺之惡也鞫如鞠獄之鞠推勘窮究之意婦寺所以鞠人者其心忮害變忒而已既以譛妄唱始於前而終或不能驗於後則亦不復自謂其言之放恣無所極已而反曰是何足為慝乎輔氏曰知則哲也辯其長舌也此章亦承上章而言婦人而有知辯者之為害也以其知辯窮人之言用心忮害而變詐讒愬不知自咎責而但曰不為害此說盡婦寺之情狀夫商賈之利非君子之所宜識如朝廷之事非婦人之所宜與也今賈三倍而君子識其所以然婦人無朝廷之事而舍其蠶織以圖之則豈不為慝哉胡庭芳曰譬如君子當求仁義賈利三倍不當君子是識婦人當事蠶織朝廷公事不當婦人是預今也不惟不使預於公事又且聴其譛毁惟婦言是用矣欲不速亡得乎天何以刺叶音砌何神不富叶方味反舍音捨爾介狄維予胥忌不弔不祥威儀不類人之云亡邦國殄瘁賦也刺責介大胥相弔閔也言天何用責王神何用不富王哉凡以王信用婦人之故也是必將有夷狄之大患今王舍之不忌而反以我之正言不諱為忌何哉輔氏曰夷狄隂類也自古寵任婦者多致夷狄之禍危亂之君大抵不忌其所當忌而惟忌忠臣義士之正已者此其所以淪胥于滅亡也夫天之降不祥庶幾王懼而自修今王遇災而不恤又不謹其威儀又無善人以輔之則國之殄瘁宜矣謝疊山曰君有君之威儀臣有臣之威儀今幽王自亂于威儀不類乎人君之威儀矣又曰國有賢人如一身之有元氣元氣亡則身必喪賢人亡則國必危殄如脈絶瘁如病危或曰介狄即指婦寺猶所謂女戎者也國語晉獻公伐驪戎獲驪姬歸史蘇曰有男戎必有女戎晉以男戎勝戎而戎亦必以女戎勝晉注云戎兵也女兵言其禍猶兵也天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣賦也罔罟優多幾近也盖承上章之意而重言之以警王也吕東萊曰前章曰不弔不祥威儀不類故此曰維其優矣維其幾矣前章曰人之云亡邦國殄瘁故此曰心之憂矣心之悲矣觱音必沸音弗檻胡覽反泉維其深矣心之憂矣寧自今矣不自我先不自我後叶下五反藐藐昊天無不克鞏叶音古無忝皇祖式救爾後同上興也觱沸泉涌貌檻泉泉正出者藐藐髙逺貌鞏固也言泉之瀵涌上出其源深矣我心之憂亦非適今日然也然而禍亂之極適當此時盖已無可為者惟天髙逺雖若無意於物然其功用神明不測雖危亂之極亦無不能鞏固之者幽王苟能改過自修而不忝其祖則天意可回來者猶必可救而子孫亦䝉其福矣瞻卬七章三章章十句四章章八句序凡伯刺幽王大壞也凡伯見上曹氏曰凡伯作板詩在厲王末至幽王大壞之時七十餘年矣决非一人猶家父也旻天疾威天篤降喪息浪反叶桑郎反瘨都田反我饑饉民卒流亡我居圉魚吕反卒荒賦也篤厚瘨病卒盡也居國中也圉邊陲也此刺幽王任用小人以致饑饉侵削之詩也輔氏曰言天之威怒甚為急疾故其所降之喪亂甚厚病我以饑饉使斯民盡以流亡内而國中外而邊境悉皆荒虚也此與瞻仰首章同皆極言其喪亂也愚按此詩刺王而首言旻天疾威又言天篤降喪下章又言天降罪罟者固為無所歸咎之詞矣而首章則言饑饉之災卒章則言侵削之事餘章則皆言用小人之意也天降罪罟蟊賊内訌户工反昬椓下角反靡共音恭潰潰回遹實靖夷我邦叶卜工反賦也訌潰也昏椓昏亂椓喪之人也共與恭同一說與供同謂共其職也潰潰亂也回遹邪僻也靖治夷平也言此蟊賊昏椓者胡庭芳曰犬戎之害在外小人之害在内幽王之亂其國乃在内之小人耳故詩人形容之曰蟊賊内訌閻盖蟊賊之害稼亦在内而不在外也指昏椓為言并宦在其中矣皆潰亂邪僻之人而王乃使之治平我邦所以致亂也王介甫曰言所使靖夷我邦者非其人也臯臯訿訿音紫曾不知其玷丁險反兢兢業業孔填已見上篇不寧我位孔貶賦也臯臯頑慢之意胡庭芳曰如魯臯之臯亦綏慢之意訿訿務為謗毁也玷缺也填久也言小人在位所為如此而王不知其缺至於戒敬恐懼甚久而不寧者其位乃更見貶黜其顛倒錯亂如此如彼嵗旱草不潰集註作遂茂如彼棲音西苴七如反我相息亮反此邦無不潰止叶韻未詳賦也潰遂也棲苴水中浮草棲於木上者言枯槁無潤澤也相視潰亂也輔氏曰以旱草喻其國之無生意終必潰亂而已嚴氏曰谷風有洸有潰潰怒也小旻是用不潰于成召旻草不潰茂潰遂也潰潰回遹無不潰止潰亂也項氏云水之潰者其勢横暴而四出故怒之甚者為潰恕遂之甚者為潰遂亂之甚者為潰亂皆一理也愚按此章二潰字異義維昔之富不如時維今之疚不如兹彼䟽斯粺簿賣反胡不自替職兄音况下同斯引叶韻未詳賦也時是疚病也䟽糲也粺則精矣九章栗米之法糲十粺九鑿八侍御七糲米一斛治而成粺則九斗矣鑿音作替廢也兄怳同引長也言昔之富未嘗若是之疚也而今之疚又未有若此之甚也彼小人之與君子如䟽與粺其分審矣而曷不自賛以避君子乎而使我心專為此故至於愴怳引長而不能自已也輔氏曰愴怳謂憂亂而無情緒之意池之竭矣不云自頻泉之竭矣不云自中叶諸仍反溥斯害矣職兄斯𢎞不烖我躬叶姑𢎞反賦也或問此章疑是比體如何先生曰作比為是愚按恐當作比而賦頻厓溥廣𢎞大也池水之鍾也泉水之發也故池之竭由外之不入泉之竭由内之不出言禍亂有所從起而今不云然也看詩不須着意去訓解只平平地涵泳自好因舉池之竭矣四句吟詠久之此其為害亦以廣矣是使我心専為此故至於愴怳日益𢎞大而憂之曰是豈不烖及我躬也乎輔氏曰上章言禍亂之日亟此章言禍亂之從起不云者猶言豈不云也與下文不烖義同而先生解作今不云然者何哉池之竭豈不云由外之不入乎泉之竭豈不云由内之不出乎然則幽王之所以政亂者豈不由任用之非人乎不烖我躬者言害之廣憂之大而將有無妄之烖及於我身也昔先王受命有如召公日辟音闢國百里今也日蹙子六反國百里於音烏乎音呼哀哉維今之人不尚有舊叶巨已反賦也先王文武也召公康公也辟開蹙促也文王之世周公治内召公治外故周人之詩謂之周南諸侯之詩謂之召南所謂日闢國百里云者言文王之化自北而南至於江漢之間服從之國日以益衆及虞芮質成而其旁諸侯聞之相帥歸周者四十餘國焉今謂幽王之時促國盖犬戎内侵諸侯外畔也又歎息哀痛而言今世雖亂豈不猶有舊徳可用之人哉言有之而不用耳輔氏曰此則明言先王用得其人而興今日用非其人而亂任用一乖而效驗大異因歎今世雖亂而豈不猶有舊徳可用之人乎嚴氏曰此章思召公而惜王之不用舊人也曹氏曰當是時禍亂雖已窮極然去宣王中興之日不逺其舊臣故老無尚存者乎陳夀翁曰此詩及前篇末皆有拳拳望治之意前詩望其改過而無忝皇祖此詩望其改圖而擢用舊人審如是則否猶可泰危猶可安也豈至有犬戎禍哉召旻七章四章章五句三章章七句因其首章稱旻天卒章稱召公故謂之召旻以别小旻也陳君舉曰周南係於周公召南係於召公豈非化之盛者必有待乎二公也至於風之終係以邠雅之終係以召旻豈非化之衰者必有思乎二公也愚按此詩之次居變雅之終而第七章又居此詩之終慨然有懐文武召公之盛以見亂極思治之理其亦猶下泉之終變風歟序凡伯刺幽王大壞也旻閔也閔天下無如召公之臣也凡伯見上旻閔以下不成文理蕩之什十一篇九十二章七百六十九句詩傳通釋卷十八
