body:
  text: 詩傳通釋卷四元劉瑾撰詩朱子集傳王一之六王國謂周東都洛邑王城畿内方六百之地孔氏曰漢志云周封圻東西長南北短短長相覆千里臣瓉按西都方八百里八八六十四為方百里者六十四東都方六百里六六三十六為方百里者三十六二都方百里者百方千里也在禹貢豫州大華外方之間北得河陽漸冀州之南也孔氏曰漸冀南境也周室之初文王居豐武王居鎬至成王周公始營洛邑為時㑹諸侯之所以其土中四方來者道里均故也自是謂豐鎬為西都而洛邑為東都鄭氏曰洛邑謂之王城是為東都今河南是也周公又營成周今洛陽是也陳大猷曰鎬京謂之宗周以其為天下所宗也洛邑謂之東都又謂之成周以周道成於此也洛邑天下之至中豐鎬天下之至險於洛邑定鼎以朝諸侯宅土中以涖四海其示天下也公於鎬京定都以據形勝處上遊以制六合其慮天下也逺漢唐並建兩京葢亦深識天下形勢之所在而有得於成王周公之遺意歟至幽王嬖褒姒生伯服廢申后及太子宜臼宜臼奔申申侯怒與犬戎攻宗周弑幽王于戲羲嚴氏曰戲驪山下地名亦水名晉文侯鄭武公迎宜臼于申而立之是為平王徙居東都王城孔氏曰鎬京為西周王城為東周及敬王去王城而遷成周自是又謂王城為西周成周為東周於是王室遂卑與諸侯無異故其詩不為雅而為風然王號未替也故不曰周而曰王蘇氏曰其風及其境内而不能被天下與諸侯比問王風是他風如此不是降為國風曰其辭語可見風多出於在下之異人雅乃士大夫所作雅雖有刺而其辭與風黄實夫曰黍離之為國風以其詩之體為風也周室未遷則其音天下之正聲也平王遷而東之則其音乃東土之音耳故曰王國風孔氏曰平王地狹于千里比於列國當言周而言王尊之也其地則今河南府及懐孟等州是也愚按河南府今隸河南省懐州今改懐孟路與孟川皆隸今河東山西道彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天叶鐡因反下同此何人哉賦而興也黍穀名苗似蘆高大餘穗黑色實圓重嚴氏曰黍似粟而非粟有二種米粘者為秫可以釀酒不粘者為黍本草注云黍冇數種又有月黒黒黍謂之秬丹黍皮赤米黄離離垂貌稷亦穀也一名穄祭似黍而小或曰粟也孔氏曰楚威王曰寡人心搖搖然如懸旌而无所薄搖搖是心憂而無附著之意悠悠逺貌蒼天者據逺而視之蒼蒼然也周既東遷大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆徬徨不忍去故賦其所見黍之離離與稷之苗以興行之靡靡心之搖搖既嘆時人莫識已意鄭氏曰怪我久留而不去又傷所以致此者果何人哉追念之深也李迂仲曰呼天而愬曰致此者何人哉葢含畜其詞不欲指斥其人也彼黍離離彼稷之穗音遂行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也穗秀也稷穗下垂如心之醉故以起興毛氏曰中心似醉醉於憂也彼黍離離彼稷之實行邁靡靡中心如噎於結反於悉反知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也噎憂深不能喘息如噎之然孔氏曰噎咽喉閉塞之名言憂深也稷之實如心之噎故以起興黍離三章章十句元城劉氏曰常人之情於憂樂之事初遇之則其心變焉次遇之則其變少衰三遇之則其心如常矣至於君子忠厚之情則不然其行役往來固非一見也初見稷之苗矣又見稷之穗矣又見稷之實矣張子曰言苗言穗言實作文者須是如此不可都謂之苗也而所感之心終始如一不少變而愈深此則詩人之意也輔氏曰久而不忘者天理之常也暴集旋個者人欲之無定也情得其正則自然久而不忘矣謝疊山曰天王而沒于夷狄天地之大變中國之大恥東周臣子之大讐也文武成康之宗廟而盡為禾黍聞者當流涕矣心搖搖而不忍去天悠悠而不我知能為閔周之詩者一行役大夫之外無人也不知平王而聞此詩也亦有惻于中否乎吾觀書至文侯之命知平王之不足以有為矣所以訓戒晉文侯者惟曰自保其國而已王室之盛衰故都之興廢悉置度外吾於黍離之詩重有感也夫愚按小弁詩曰踧踧周道鞠為茂草我心憂傷愍焉如𢷬正若此詩之意然則黍離之感慨有不待於火夫行役之時而已兆于褒姒母子僣亂之日大夫追怨之詞有所歸矣序閔宗周也周大夫行役至於宗廟過故宗廟宫室盡為禾黍閔周室之顛覆徬徨不忍去而作是詩也君子于役不知其期曷至哉叶將黎反雞棲音西于塒音時日之夕矣羊牛下來叶陵之反君子于役如之何弗思叶新齎反賦也君子婦人目其夫之辭鑿墻而棲曰塒日夕則羊先歸而牛次之埤雅曰羊性畏露晩出而早歸常先於牛也大夫久役于外其室家思而賦之曰君子行役不知其反還之期且今亦何所至哉雞則棲于塒矣日則夕矣牛羊則下來矣是則畜勗産出入尚有旦暮之節而行役之君子乃無休息之時使我如何而不思也哉輔氏曰知其歸期則知其所出也知其所在則思冇所向也今也不知其期則不知其㡬時可歸也曷至哉則不知其今在何所也如之何勿思覩物興思雖欲自己而有所不能也君子于役不日不月曷其有佸户括反叶户劣反雞棲于桀日之夕矣羊牛下括古活反叶古劣反君子于役苟無飢渇叶巨列反賦也佸㑹桀杙弋括至苟且也君子行役之久不可計以日月而又不知其何時可以來㑹也亦庶㡬其免於飢渇而已矣此憂之深而思之切也輔氏曰可以日月計則思有節也知其㑹期則思猶有止也不日不月則不可計以日月也曷其有佸則不知其何時可以來㑹也苟無飢渇則不敢必其歸而但幸其不至于飢渇而已其憂思之情益甚矣君子于役二章章八句謝疊山曰兩雪霏霏遣戍役而預言歸期也卉木萋萋勞還率而詳言歸期也卉木萋止勞還役而詳言歸期也四牡之使寧㡬何時勞之日我心傷悲吉甫在鎬不過千里勞之曰我行永久吾觀先王之心惟恐一人之勞苦惟恐一人之怨咨何也不如是非所謂體羣臣也本于推己及物之恕發而為序情閔勞之仁豈有無期度者哉今君子于役至于不知其期仁恕之意泯然矣文武宣王之治何時而可復見乎序刺平王也君子行役無期度大夫思其危難以風焉此國人行役而室家念之之辭序説誤矣其曰刺平王亦未有考君子陽陽左執簧音黄右招我由房其樂音洛只音止且子徐反賦也陽陽得志之貌董氏曰陽陽者氣充於内容貌不枯也簧笙竽管中金葉也葢笙竽皆以竹管值於匏中而竅其管底之側以薄金葉障之吹則鼓之而出聲所謂簧也故笙竽皆謂之簧笙十三簧或十九簧竽三十六簧也由從也房東房也房只是人出入處古人于房前冇壁後無壁所以通内李寶之曰堂屋次棟之架曰楣後楣以北為室與房人君左右房大夫東房西室而已只且語助辭此詩疑亦前篇婦人所作葢其夫既歸不以行役為勞而安於貧賤以自樂其家人又識其意而深嘆美之皆可謂賢矣豈非先王之澤哉或曰序説亦通宜更詳之輔氏曰謂此詩疑亦前篇婦人所作者葢兩篇之首皆以君子為言而人相聨屬此固不害於義然亦安知其非偶然而然也故又取或者之説以為序説亦通宜更詳之葢欲仍舊也孔氏曰君子之人陽陽然左手執簧右手招我從房中樂官之位時世衰亂且相與樂此而已天子諸侯皆有房中之樂胡庭芳曰朱子初解云君子知道之不行為貧而仕所以辭尊居卑辭富居貧相招為禄仕雖役于伶官之賤而陽陽自得若誠有樂乎此者其所以全身逺害之計深矣雖非聖賢出處之正然比於不量其力貪利以没身者豈不賢哉君子陶陶左執翿徒刀反右招我由敖五刀反其樂只且賦也陶陶和樂之貌翿舞者所持羽旄之屬敖舞位也君子陽陽二章章四句序閔周也君子遭亂相招為禄仕全身逺害而已説同上篇輔氏曰此序得之葢右之樂官實掌教事如舜命夔典樂教冑子周官大司樂掌教國子可見故賢者多隠於樂工如簡兮詩之類至春秋時如魯太師摯諸人猶知踰河蹈海以去亂不賢者能如是乎使賢者隠于樂工而以全身逺害為樂則時可知矣揚之水不流束薪彼其音記之子不與我戍申懐叶胡威反下同哉懐哉曷月予還音旋歸哉興也揚悠揚也水緩流之貌彼其之子戍人指其室家而言也戍屯兵以守也申姜姓之國平王之母家在今鄧州信陽軍之境愚按申國屬宋鄧州南陽縣及信陽軍今南陽縣改屬南陽府信陽軍改信陽州並隸河南省懐思曷何也平王以申國近楚數被侵伐故遣畿内之民戍之而戍者怨思作此詩也興取之不二字如小星之例輔氏曰彼其之子是戍人指其室家而言則不與我戌申云者葢言不得同其室家以往耳懐哉懐哉言其思念不一而足也曷月予還歸哉言不知何日可以還歸以安其室家也興取之不二字如小星之例此興體之中又别是一例不然則又似比體愚按先儒多以為水弱不流薪楚喻平王微弱不能徵發諸侯葢由誤認此詩之體此詩乃興之不取義者特取之不二字相應耳故集傳特指其例以明之揚之水不流束楚彼其之子不與我戍甫懐哉懐哉曷月予還歸哉興也楚木也甫即吕也亦姜姓書吕刑禮記作甫刑而孔氏以為吕侯後為甫侯是也當時葢以申故而并戍之今未知其國之所在計亦不逺於申許也孔氏曰言甫與許者以其俱為姜姓既重章以變文因借甫許以言申其實不戍許甫也六國時秦趙同為嬴姓史記漢書多謂秦為趙亦此類也揚之水不流束蒲叶滂古反彼其之子不與我戍許懐哉懐哉曷月予還歸哉興也蒲蒲栁春秋傳云董澤之蒲杜氏云蒲楊栁可以為箭者是也孔氏曰陸機云蒲栁有兩種皮正青者曰小楊其一種皮紅者曰大楊其葉皆長廣於栁葉皆可為箭幹故宣公十二年傳曰董澤之蒲可勝既乎嚴氏曰毛以為草鄭以為蒲栁皆通蒲草見陳澤陂蒲栁見陳東門之揚許國名亦姜姓亦潁昌府許昌縣是也錢氏曰許在今許州揚之水三章章六句申侯與犬戎攻宗周而弑幽王則申侯者王法必誅不赦之賊而平王與其臣庶不共戴天之讐也今平王知有母而不知有父知其立已為有徳而不知其弑父為可怨至使復讐討賊之師反為報施酧恩之舉則其忘親逆理而得罪於天已甚矣項氏口自天理觀之則申侯為平王不共戴天之讐自平王觀之則申侯乃賈充成濟也其戍之宜矣愚按小弁詩曰何辜于天又曰君子信讒又曰君子不惠不舒究之又曰舍彼有罪予之佗矣皆為怨父之詞吾意平王所以但知母家之重而不知弑父之讐者皆自疇昔怨父一念之差所致也究其忘親逆理之罪吾於其傳與有責焉又況先王之制諸侯有故則方伯連帥以諸侯之師討之王室有故則方伯連帥以諸侯之師救之天子鄉遂之民供貢賦衛王室而已今平王不能行其威令於天下無以保其母家乃勞天子之民逺為諸侯戍守故周人之戍申者又以非其職而怨思焉則其衰懦微弱而得罪於民又可見矣程子曰諸侯有患天子命保衛之亦宜也平王獨思其母家耳非有王者保天下之心人怨宜也況天子當使方伯鄰國共保助之李迂仲曰以公存心則如采薇以私存心則如揚之水遣戍則同而美刺則異也嗚呼詩亡而後春秋作其不以此也哉輔氏曰忘親逆理以賊人之秉彛非法枉道以使民之勞役此民之所以怨思也欲其悉力致死以報其上難矣哉所謂民至愚而神於此可見先王之所以畏而敬之也此正平王之詩故曰詩亡然後春秋作其不以此也哉張南軒曰胡文定云按邶鄘而下多春秋時詩而謂詩亡然後春秋作何也自黍離降為國風天下無復有雅而王者之詩亡春秋作於隠公適當雅亡之後夫黍離所以為國風者平王自為之也平王忘讐於是王者之迹熄而詩亡天下貿貿焉日趨於徇私滅理之塗故孔子懼而作春秋愚按以上兩節觀之則王迹所以熄雅所以亡而春秋所以作者皆平王忘親逆理而衰懦微弱之所致也歟序刺平王也不撫其民而逺屯戍于母家周人怨思焉中谷有蓷吐雷反暵呼但反其乾矣有女仳匹指反離嘅口愛反其嘆上丹反矣嘅其嘆矣遇人之艱難矣興也蓷鵻錐也葉以萑凡方莖白華華生節間即今益母草也木草曰茺蔚一名益母節節生花如雞冠其子三稜嚴氏曰撑本草茺蔚正生海濵他澤其性宜濕暵燥仳别也嘅歎聲艱難窮厄也池凶年饑饉室家相棄婦人覽物起興而自述其悲歎之辭也中谷有蓷暵其脩叶式竹反矣有女仳離條其歗叶息六反矣條其歗矣遇人之不淑矣興也脩長也陳少南曰長茂者亦為所暵或曰乾也如脯之脩也條條然歗貌歗蹙口出聲也悲恨之深不止於嘆矣淑善也古者謂死喪饑饉皆曰不淑董氏曰古人傷死者之詞曰如何不淑葢以吉慶為善事凶禍為不善事雖今人語猶然也曾氏曰凶年而遽相棄背葢衰薄之甚者而詩人乃曰遇斯人之艱難遇斯人之不淑而無怨懟過甚之詞焉厚之至也中谷有蓷暵其濕矣有女仳離啜張劣反其泣矣啜其泣矣何嗟及矣興也暵濕者旱甚則草之生於濕者亦不免也孔氏曰先言乾次言脩後言濕見凶年之淺深也劉辰翁曰乾者已暵脩者又暵濕者亦暵其為旱勢可勝言哉旱愈甚則仳離之愁嘆愈甚矣啜泣貌何嗟及矣言事已至此末如之何窮之甚也蘇氏曰嘆之者知其不得已也歗者怨之深矣位則窮之甚也輔氏曰歎則忍歎而已歗則悲而恨焉泣則悲而至于傷矣方其歎且恨之時而曰遇人之艱難遇人之不淑而無怨懟過甚之辭固見其厚矣及其至於傷而泣也則亦曰何嗟及矣而已殆有知其不可奈何而安於命之意此尤見其厚也豈非先王之澤哉中谷冇蓷三章章六句范氏曰世治則室家相保者上之所養也世亂則室家相棄者上之所殘也其使之也勤其取之也厚則夫婦日以衰薄而凶年不免於離散矣伊尹曰匹夫匹婦不獲自盡民主罔與成厥功故讀詩者於一物失所而知王政之惡一女見棄而知人民之困周之政荒民散而將無以為國於此亦可見矣輔氏曰范氏之説甚得讀詩之㫖使讀詩者能如此則詩之為敎於人大矣謝疊山曰凶年饑嵗上而王朝有司徒荒政十二以聚民下而有司能以時告其上發倉廪開府庫懋遷化居以賑民必無夫婦衰薄室家相棄之事矣此詩三章始暵其乾中暵其脩終暵其濕言物之暵一節急一節始嘅其歎中條其歗終啜其泣民之怨恨者一節深一節始曰遇人之艱難憐其窮苦也中曰遇人之不淑憐其遭凶禍也終曰何嗟及矣夫婦既已離别雖怨嗟亦無及也又曰夫婦人之大倫也饑饉而相棄人道之大變也婦無一語怨其夫而有哀矜惻怛之意焉知其無可奈何而安之苦命此義婦也與忠臣孝子同道人不幸而處三綱之變以此存心則綽綽然有餘裕矣序閔周也夫婦日以衰薄凶年饑饉室家相棄爾有兔爰爰雉離于羅我生之初尚無為叶吾禾反我生之後逢此百罹叶良何反尚寐無吪比也性陰狡爰爰緩意雉性耿介離麗羅網尚猶罹憂也尚庶㡬也愚按二尚字義不同吪動也周室衰微諸侯背叛君子不樂其生而作此詩言張羅本以取今狡得脱而雉以耿介反離于羅以比小人致亂而以巧計幸免君子無辜而以忠直受禍也吕東萊曰此因所見為比也之大以比諸侯雉之小以自比也言諸侯之背叛者怨睢自如而周人反受其禍也為此詩者葢猶及見西周之盛故曰方我生之初天下尚無事及我生之後而逢時之多難如此然既無如之何則但庶㡬寐而不動以死耳或曰興也以爰興無為以雉離興百罹也劉辰翁曰有免爰爰舒緩而無虞者此我生之初承平之人也雉離于羅求死不得此我生之後百憂之人也安得一寐而死不復見此之為快哉下章放此有爰爰雉離于罦音孚叶步廟反我生之初尚無造我生之後逢此百憂叶一笑反尚寐無覺居孝反叶居笑反比也罦覆車也可以掩孔氏曰釋器云繴謂之罿罬也罬謂之罦覆車也郭璞云今之翻車也有兩轅中施罥以捕鳥繴音壁罬音拙罥音絹造亦為也覺寤也有爰爰雉離于罿昌鍾反我生之初尚無庸我生之後逢此百凶尚寐無聰比也罿罬也即罦也或曰施羅於車上也庸用聰聞也無所聞則亦死耳爰三章章七句序閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉君子不樂其生一句得之餘皆衍説其指桓王葢據春秋傳鄭伯不朝王以諸侯伐鄭鄭伯禦之王卒大敗祝聃射王中肩之事然未有以見此詩之為是而作也緜緜葛藟力軌反在河之滸呼五反終逺于萬反兄弟謂他人父夫矩反謂他人父亦莫我顧叶果五反興也緜緜長而不絶之貌岸上曰滸世衰民散有去其鄉里家族而流離失所者作此詩以自歎言緜緜葛藟則在河之滸矣胡旦曰葛也藟也必生於山谷丘野之地延蔓于草木條枚之上不生於河滸水涯生不得其地則失物之性也今乃終逺兄弟而謂他人為己父已雖謂彼為父而彼亦不我顧則其窮也甚緜緜葛藟在河之涘音俟叶矣始二音終逺兄弟謂他人母叶蒲彼反謂他人母亦莫我有叶羽已反興也水涯曰涘謂他人父者其妻則母也冇識冇也春秋傳曰不有寡君嚴氏曰莫我有言視之若無也緜緜葛藟在河之漘順春反終逺兄弟謂他人昆叶古勻反謂他人昆亦莫我聞叶微勻反興也夷上洒跣下曰漘漘之為言脣也爾雅注曰涯上平坦而下水深為漘不發聲昆兄也聞相聞也葛藟三章章六句序王族刺平王也周室道衰棄其九族焉序説未有據詩意亦不類説已見本篇彼采葛叶居謁反兮一日不見如三月兮賦也采葛所以為絺綌葢淫奔者託以行也故因以指其人而言思念之深未久而似久也彼采蕭叶疎鳩反兮一日不見如三秋兮賦也蕭荻也白葉莖麄科生有香氣祭則焫爇以報氣故采之孔氏曰蕭荻今人謂之荻蒿可作燭有香氣故祭祀以脂爇之也曰三秋則不止三月矣彼采艾兮一日不見如三嵗本與艾叶兮賦也艾蒿屬乾之可灸故采之吕東萊曰葛為絺綌蕭共祭祀艾療疾特訓釋三物見采之由不於此取義也曰三嵗則不止三秋矣采葛三章章三句輔氏曰采葛采蕭采艾其説託言明矣而灸思念之情流而不止如此則為淫奔之辭者宜哉序懼讒也此淫奔之詩其篇與大車相屬其事與采唐采葑采麥相似其詞與鄭子矜正同序説誤矣大車檻檻毳昌鋭反衣如菼吐敢反豈不爾思畏子不敢賦也大車大夫車檻檻車行聲也毳衣天子大夫之服王介甫曰王之大夫四命與子男同服也菼蘆之始生也毳衣之屬衣繪而裳繡五色皆備其青者如菼劉濟曰毳衣以宗彛為首葢畫虎蜼虎蜼淺毛故謂毳蜼音壘胃右愚按毳衣所畫者三畫章宗彛也藻也粉米也裳所繡者二章黼也黻也所所繡皆備五色所謂以五采彰施于五色者也爾淫奔者相命之詞也子大夫也不敢不敢奔也周衰大夫猶冇能以刑政治其私邑者故淫奔者畏而歌之如此蘇氏曰其止之有道氏聞其車聲而見其衣服則畏而不敢矣非待刑之而後已也然其去二南之化則逺矣此可以觀世變也吕東萊曰此詩唯能止其奔未能革其心與行露之詩異矣亦僅勝於東遷之初而已輔氏曰漢廣之遊女端莊靜一人見而知其不可求野有死麕之女子貞潔自守人見而知其不可犯此所以為二南之化也豈至於冇淫奔之心待有所畏而後不敢哉今觀此詩則世變之愈下可知矣大車啍啍他敦反毳衣如璊音門豈不爾思畏子不奔賦也啍啍重遲之貌璊玉赤色五色備則有赤孔氏口啍啍行之貌故為重遲上言行冇聲此言行之貌互相見也毳衣裳繢繡皆五色青者如菼赤者如璊各舉其耳穀則異室死則同穴叶户橘反謂予不信有如皦古了反日賦也穀生穴壙曠皦白也民之欲相奔者畏其大夫自以終身不得如其志也故曰生不得相奔以同室庶㡬死得合葬以同穴而已謂予不信有如皦日約誓之辭也輔氏曰世變雖下而大夫能使人畏之如此亦可謂賢也已始則不敢奔而已終則知其雖殁身不得遂其志則其刑政之效亦非無常者之所能也大車三章章四句序刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聴男女之訟焉非刺大夫之詩乃畏大夫之詩丘中有麻彼留子嗟彼留子嗟將七羊反其來施施叶時遮反賦也麻穀名子可食皮可績為布本草曰一名麻勃此麻上花勃勃者麻子味甘平無毒園圃所蒔今人作布及履川之子嗟男子之字也將願也施施喜悦之意婦人望其所與私者而不來故疑丘中有麻之處復有與之私而留之者今安得其施施然而來乎丘中有麥彼留子國彼留子國將其來食賦也子國亦男子字也來食就我而食也丘中有李彼留之子叶奨里反彼留之子貽我佩玖叶舉里反賦也之子并指前二人也貽我佩玖冀其有以贈已也丘中有麻三章章四句序思賢也莊王不明賢人放逐國人思之而作是詩也此亦淫奔者之詞其篇上屬大車而語意不莊非望賢之意序亦誤矣王國十篇二十八章百六十二句輔氏曰讀詩者可以怨則詩人固無忿懟過甚之辭然予讀王風也則見其怨詩尤為平和此可見周人之風俗鄭一之七鄭邑名本在西都畿内咸林之地宣王以封其弟友為采菜地後為幽王司徒而死於犬戎之難是為桓公其子武公掘一作滑並音鶻突定平王於東都亦為司徒又得虢檜之地鄭氏曰武王取虢檜鄢蔽補丹依疇厯華十邑之地右洛左濟前華後河食溱洧焉乃徙其封而施舊號於新邑是為新鄭咸林在今華州鄭縣愚按即今安西路華州鄭縣隸陜西省新鄭即今之鄭州是也愚按即今汴梁路鄭州隸河南省其封域山川詳見檜風緇衣之宜兮敝予又改為兮適子之館叶古玩反兮還予授子之粲兮賦也緇黑色緇衣卿大夫居私朝之服也孔氏曰緇衣即士冠禮所云𤣥冠朝服緇帶素韠是也卿士朝於工服皮弁不服緇衣退適私朝服緇衣以聴其所朝之政也宜稱去聲改更平聲適之舘舍鄭氏曰卿士之舘如今之諸盧也孔氏曰考工記説王宫之制外有九室九卿朝焉注外路寢之表九室如今朝堂諸曹治事之處粲餐孫也鄭氏曰設餐飲食之或曰粲粟之精鑿作者漢有白粲之刑給舂導之役是也舊説鄭桓公武公相繼為周司徒善於其職周人愛之故作是詩言子之服緇衣也甚宜敝則我將為子更為之且將適子之舘既還而又授子之粲言好之無已也輔氏曰緇衣之宜兮此美武公之徳稱其服也敝予又改為兮欲其服之常新也還予授子之粲兮欲其栗之常繼也既欲其服之常新又欲其粟之常繼發乎情形於歌詠如此則其好善之誠心於是為至也程子曰好賢無己之意當就敝予還予二字上看范氏曰適子之舘親之也授子之粲又授之以飲食也既親之又授以飲食此好賢之至也緇衣之好兮敝予又改造叶在早反兮適子之舘兮還予授子之粲兮賦也好猶宜也緇衣之蓆叶祥籥反兮敝予夂改作兮適子之舘兮還予授子之粲兮賦也蓆大也程子曰蓆有安舒之義服稱其徳則安舒也緇衣三章章四句記曰好賢如緇衣又曰於緇衣見好賢之至吕東萊曰孔叢子曰於緇衣見好賢之至所謂賢即謂武公父子也范氏曰桓公武公上得於君下得於氏君子好之愈久而愈不厭序美武公也父子並為周司徒善於其職國人宜之故美其徳以明有國善善之功焉此未有據今姑從之將匕羊反仲子兮無踰我里無折之舌反我樹杞豈敢愛之畏我父母叶滿彼反仲可懐叶胡威反下同也父母之言亦可畏叶於非反也賦也將請也仲子男子之字也我女子自我也里二十五家所居也杞栁屬生水傍樹如栁葉麄而白色理微赤葢里之地域溝樹也莆田鄭氏曰此淫奔者之辭輔氏曰此雖為淫奔之詩然其心猶有所畏未至于蕩然而無忌也故列於鄭詩之首以見其為風之始變也歟愚按此女猶能知此畏憚故其託詞如此鄭風之中亦所罕見也將仲子兮無踰我墻無折我樹桑豈敢愛之畏我諸兄叶虚陽反仲可懐也諸兄之言亦可畏也賦也墻垣也古者樹墻下以桑將仲子兮無踰我園無折我樹檀叶徒㳂反豈敢愛之畏人之多言仲可懐也人之多言亦可畏也賦也園者圃之藩其内可種木也檀皮青滑澤材彊韌可為車將仲子三章章八句胡庭芳曰三章皆有所畏而不輕身以從其所懐亦庶㡬止乎禮義者也序刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聴小不忍以致大亂焉事見春秋傳愚按見隠公元年然莆田鄭氏謂此實淫奔之詩無與於莊公叔段之事序葢失之而説者又從而巧為之説以實其事誤益甚矣今從其説叔于田叶地因反巷無居人豈無居人不如叔也洵美且仁賦也叔莊公弟共叔段也事見春秋隠公元年夏五月鄭伯克叚于鄢左傳曰鄭武公娶于申曰武姜生莊公及共叔叚田取禽也孔氏曰以取禽於田因名曰田巷里塗也孔氏曰里内之塗洵信美好也仁愛人也叚不義而得衆國人愛之故作此詩言叔出而田則所居之巷若無居人矣非實無居人也雖有而不如叔之美且仁是以若無人耳嚴氏曰叔叚豈其美且仁哉謂其黨私之之言猶何朔之人安史為聖也或疑此亦民間男女相恱之詞也叔于狩叶始九反巷無飲酒豈無飲酒不如叔也洵美且好叶許厚反賦也冬獵曰狩杜氏曰狩圍守也冬物畢成獲則取之無所擇也叔適野叶上與反巷無服馬叶滿補反豈無服馬不如叔也洵美且武賦也適之也郊外曰野服乘也叔于田三章章五句彭氏曰某氏云玩味此詩宛然如見叔段輕擐浮揚之意如今之貴族輕薄子閭里少年朋徒追逐而極口誇美之也次篇放此序刺莊公也叔處于京繕甲治兵以出于田國人説而歸之國人之心貳於叔而歌其田狩適野之事初非以刺莊公亦非説出于田而後歸之也或曰段以國君貴弟受封大邑有人民兵甲之衆不得出居閭巷下雜民伍此詩恐亦民間男女相説之詞耳叔于田乘乗下繩證反馬叶滿補反執轡如組音祖兩驂如舞叔在藪素口反叶素苦反火烈具舉襢音但楊素厯反暴虎獻于公所將七羊反叔無狃女九反叶女古反戒其傷女音汝賦也叔亦段也車衡外兩馬曰驂如舞謂諧和中節董氏曰五御之法有舞交衢者即所謂如舞也服馬制於衡不得如舞其如舞者驂也饒氏曰如舞者節奏謂御中節也皆言御之善也愚按善御其馬是以轡則柔順如組驂則諧和如舞也藪澤也釋文曰韓詩云禽獸居之曰藪火焚而射也曹氏曰王制云昆蟲未蟄不以火田故爾雅謂火田為狩惟冬田乃用火若夫刈草以為防驅禽而納諸防中然後焚而射焉則四時之田皆然也烈熾盛貌具俱也襢裼肉袒也孔氏曰李巡云襢裼脱衣見體曰肉袒孫炎云襢去裼衣暴空手摶虎也黄直卿曰暴徒摶也有慢侮欺陵之意公莊公也孔氏曰公與之俱田也狃習也國人戒之曰請叔無習此事恐其或傷女也葢叔多材好勇而鄭人愛之如此愚按章首四句所謂才也次四句所謂勇也末二句則國人愛之之詞也叔于田乘乘黄兩服上襄兩驂鴈行户郎反叔在藪火烈具揚叔善射忌音記又良御叶魚駕反忌抑磬苦定反控口貢反忌抑縱送忌賦也乗黄四馬皆黄也衡下夾轅兩馬曰服襄駕也馬之上者為上駕猶言上駟鄭氏曰上駕言馬之最良也鴈行者驂少次服後如鴈行也揚起也忌抑皆語助辭騁馬曰磬止馬曰控舍捨㧞跋曰縱覆彇蕭曰送孔氏曰能磬人能控能縱又能送是叔之善射御也廣韻注曰彇弓弭弭弓末輔氏曰章末四句美叔之才藝也叔于田乘乘鴇音保叶補苟反兩服齊首兩驂如首叔在藪火烈具阜符有反叔馬慢叶黄半反忌叔發罕叶虚肝反忌抑釋掤音冰忌抑鬯勅亮反弓叶姑𢎞反忌賦也驪白雜毛曰鴇今所謂烏驄也齊首如手兩服並首在前而兩驂在旁稍次其後如人之兩手也阜盛慢遲也發發矢也罕希釋解也掤矢筩葢春秋傳作冰孔氏曰昭公二十五年左傳云公徒執冰而踞字異義同服䖍云冰櫝丸葢杜預云櫝丸是箭筩嚴氏曰用矢則舉掤以用筩既用則納矢筩中釋下掤以覆筩鬯弓囊也與韔同孔氏曰鬯弓謂弢弓而納諸鬯中弢音韜言其田事將畢而從容整暇如此鄭氏曰田事且畢則馬行遲發矢希葢矢而弢弓亦喜其無傷之詞也愚按上章及此亦皆言其田獵射御之善而喜其畢事無傷皆所謂多才好勇而得衆者也大叔于田三章章十句陸氏曰首章作大叔于田者誤蘇氏曰二詩皆曰叔于田故加大以别之不知者乃以段有大叔之號而讀曰泰又加大于首章失之矣小嘉鄭氏曰段以國君介弟之親京城大叔之貴而所好者馳騁弋獵也所矜者袒裼暴虎也所賢者射御足力也出而人思之者飲酒服馬之儔也氣習到此而又恃其君母之愛玩於莊公之惟其所欲而不誰何也欲不為亂得乎序刺莊公也叔多才而好勇不義而得衆也此詩與上篇同意非刺莊公也下兩句得之清人在彭叶普郎反駟介旁旁補彭反叶補岡反二矛重直龍反英叶於良反河上乎翺翔賦也清邑名清人清邑之人也彭河上地名駟介四馬而被甲也旁旁馳驅不息之貌二矛酋矛夷矛也英以朱羽為矛飾也孔氏曰魯頌説矛之飾謂朱英則以朱染為英飾葢絲纒而朱染之酋矛長二大夷矛長二大四尺並建於車上則其英重疊而見翺翔逰戲之貌鄭文公惡髙克使將清邑之兵禦狄于河上孔氏曰文公捷厲公子閔公二年冬十二月狄入衛衛在河北鄭在河南恐其渡河侵鄭故使髙克將清邑之兵於河上禦之久而不召師散而歸鄭人為之賦此詩言其師出之久無事而不得歸但相與遊戲如此其勢必至於潰散而後已爾永嘉鄭氏曰夫擁大衆於外而無所事不為亂則必潰散耳清人在消駟介麃麃表驕反二矛重喬河上乎逍遙賦也消亦河上地名麃麃武貌矛之上句勾曰喬所以懸英也英弊而盡所存者喬而已清人在軸叶音胄駟介陶陶叶徒候反左旋右抽叶勅救反中軍作好叶許候反賦也軸亦河上地名孔氏曰彭消軸皆河上之地久不得歸師有遷移三地亦應不甚相逺陶陶樂而自適之貌左謂御在將軍之左執轡而御馬者也旋還車也右謂勇力之士在將軍之右執兵以擊刺者也抽抜刃也中軍謂將在鼓下居車之中即高克也孔氏曰此謂將所乘車若士卒兵車則左人持弓右人持矛而中人御好謂容好也東萊吕氏曰言師久而不歸無所聊賴姑遊戲以自樂必潰之勢也不言已潰而言將潰其詞深其情危矣清人三章章四句事見春秋愚按見閔公二年胡氏曰人君擅一國之名寵生殺予奪惟我所制耳使髙克不臣之罪已著按而誅之可也情狀未明黜而退之可也愛惜其才以禮馭之亦可也烏可假以兵權委諸竟上坐視其離散而莫之卹乎春秋書曰鄭棄其師其責之深矣序刺文公也高克好利而不顧其君文公惡而欲逺之不能使高克將兵而禦狄于竟陳其師旅翺翔河上久而不召衆散而歸高克奔陳公子素惡高克進之不以禮文公退之不以道危國亡師之本故作是詩也按此序葢本春秋傳而以他説廣之未詳所据孔氏正義又据序文而以是詩為公子素之作然則進之當作之進今文誤矣羔裘如濡叶而朱而由二反洵直且侯叶洪姑洪鉤二反彼其音記之子舍音赦命不渝叶容朱容周二反賦也羔裘大夫服也如濡潤澤也洵信直順侯美也其語助辭舍處渝變也言此羔裘潤澤毛順而美彼服此者當生死之際又能以身居其所受之理而不可奪鄭氏曰謂守死善道見危授命之等嚴氏曰命者天所賦予於我者舍則居之而安也君子能安於命臨利害而不變輔氏曰舍命不渝所包者潤命有二有指理而言者有指氣而言者此葢兼之以理而言則居其理而不變以氣而言則居其分而不渝理可以兼氣故集傳止以理言之葢美其大夫之詞而不知其所指矣羔裘豹飾孔武有力彼其之子邦之司直賦也飾縁去聲袖也禮君用純物臣下之故羔裘而以豹皮為飾也孔甚也豹甚武而有力故服其所飾之裘者如之司主也羔裘晏兮三英粲兮彼其之子邦之彦叶魚肝反兮賦也晏鮮盛也三英裘飾也未詳其制程子曰若素絲五紽之類葢衣服制度之節粲光明也彦者士之美稱羔裘三章章四句輔氏曰首章言其能舍命而不渝次章言其為邦之司直末乃以為邦之彦而結之然則為臣之道主於正直不阿而已雖孔子之在朝亦以便便誾誾侃侃為常至於柔行巽入委曲以就事亦固有時而當用要之其出於不得已而已序刺朝也言古之君子以風其朝焉序以變風不應有美故以此為言古以刺今之詩今詳詩意恐未必然且當時鄭之大夫如子皮子産之徒豈無可以當此詩者但今不可考耳遵大路兮摻所覽反執子之祛叶起據反兮無我惡烏路反兮不寁市坎反故也賦也遵循摻擥覽祛袂孔氏曰袂是祛之本祛是袂之末俱是衣袖寁速故舊也淫婦為人所棄故於其去也􅒆其祛而留之日子無惡我而不留故舊不可以遽絶宋玉賦有有遵大路兮攬子祛之句亦男女相説之詞也愚按宋玉登徒子好色賦曰鄭衛溱洧之問羣女出桑臣觀其麗者田稱詩曰遵大路兮攬子祛贈以芳華詞甚妙注云攬衣袖欲與同歸折芳誦詩以贈遊女也集傳援此為證者葢宋玉去此詩之時未逺其所引用當得詩人之本㫖彼為男語女之詞猶此詩為女語男之詞也遵大路兮摻執子之手兮無我魗市由反叶凿九反兮不寁好叶許口反也賦也魗與醜同欲其不以已為醜而棄之也好情好也遵大路二章章四句序思君子也莊公失道君子去之國人思望焉此亦淫亂之詩序説誤矣女曰雞鳴士曰昩旦子興視夜明星有爛將翺將翔弋鳬音符與鴈賦也昧晦旦明也昧旦天欲旦昧晦末辨之際也吕東萊曰列子云將旦昧爽之交日夕昏明之際明星啓明之星先日而出者也弋繳灼射謂以生絲繋矢而射也鳬水烏如鴨青色背上有文此詩人述賢夫婦相警戒之詞言女曰雞鳴以警其夫而士曰昧旦則不止於雞鳴矣婦人又語其夫曰若是則子可以起而視夜之如何意者明星已出而爛然則當翶翔而往弋取鳬鴈而歸矣其相與警戒之言如此則不留於宴眤之私可知矣歐陽子曰此賢夫婦相警勵以勤生之語也弋言加叶居之居何二反之與子宜叶無奇無何二反之宜言飲酒與子偕老叶魯吼反琴瑟在御莫不靜好叶許厚反賦也加中去聲也史記所謂以弱弓微繳加諸鳬鴈之上是也埤雅曰加與𤣥鶴加加雙鶤之加同意葢弱弓微矢乗風振之曰弋故史記謂楚人好以弱弓微矢加諸歸鴈之上宜和其所宜也内則所謂鴈宜麥之屬是也鄭氏曰言其氣味相成射者男子之事而中饋婦人之職故婦謂其夫既得鳬鴈以歸則我當為子和其滋味之所宜以之飲酒相樂期於偕老而琴瑟之在御者亦莫不安靜而和好其和樂而不淫可見矣知子之來叶六直反之雜佩以贈叶音則之知子之順之雜佩以問之知子之好呼報反之雜佩以報之賦也來之致其來者如所謂修文徳以來之雜佩者左右佩玉也上横曰珩下繫二組貫以蠙頻珠中組之半貫一大珠曰瑀末懸一玉兩端皆鋭曰衝牙兩旁組半各懸一玉長博而方曰琚其末各懸一玉如半璧而向内曰璜又以兩組貫珠上繫珩兩端下交貫於瑀而下繫兩璜行則衝牙觸璜而冇聲也吕氏曰非獨玉也觿揮燧箴與針同管凡可佩者皆是也熊剛大曰婦人左佩紛帨刀礪小觿金燧右佩箴管線纊大觿木燧之屬備尊者使令也觿解結狀如錐以象骨為之燧取火箴貯以管贈進順愛問遺也孔氏曰曲禮云凡以苞苴簞笥問人者左傳衛侯使人以弓問子貢皆遺人物謂之問婦又語其夫曰我苟知子之所致而來及所親愛者則當解此雜佩以送遺報答之葢不惟治其門内之職又欲其君子親賢友善結其讙心而無所愛於服飾之玩也輔氏曰一意而三疊之以見其情之不能自己也夫勤勞以成業和樂以宜家此婦之賢徳然情猶未巳也故無所愛于服飾之玩而欲其君子之親賢以輔成其徳是又加於人一等矣女曰雞鳴三章章六句此詩意思甚好讀之使人有不知手舞足蹈者輔氏曰觀此詩則鄭國之俗雖曰淫亂然在下之人夫婦之間猶知禮義勤生業不眤於宴私相安於和樂而又能賛助其君子親賢樂善以輔成其徳此可以觀先王之澤與民性之善矣序刺不説徳也陳古義以刺今不説徳而好色也此亦未有以見陳古刺今之意輔氏曰詩詞正是説徳而不昵於色序者意鄭國之風不宜有此故强以為陳古義以刺今其思窄狹固滯甚矣鄭風雖曰淫亂而天理民􅂜豈容遂殄滅哉惟其鄭風而有此詩此聖人之所以録之也觀歐陽公於五代史載逆旅婦人事亦可見矣有女同車顔如舜華叶芳無反將翶將翔佩玉瓊琚彼美孟姜洵美且都賦也舜木槿也樹如李其華朝生暮落陸璣曰舜取瞬之義孟字姜姓洵信都閑雅也此疑亦淫奔之詩言所與同車之女其美如此而又嘆之曰彼美色之孟姜信美矣而又都也輔氏曰鄭詩惟此篇為男悦女之辭有女同行叶户郎反顔如舜英叶於良反將翺將翔佩玉將將七羊反彼美孟姜徳音不忘賦也英猶華也將將聲也徳音不忘言其賢也王介甫曰於瓊琚言徳之容于將將言徳之音各以其類也輔氏曰所謂徳音是亦日月詩之徳音類也世衰道降徇情肆欲所美非美者多矣有女同車二章章六句序刺忽也鄭人刺忽之不昏于齊太子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之按春秋傳齊侯欲以文姜妻鄭太子忽忽辭人問其故忽曰人各有耦齊大非吾耦也詩曰自求多福在我而已大國何為其後北戎侵齊鄭伯使忽帥師救之敗戎師齊侯又請妻之忽曰無事於齊吾猶不敢令以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯祭仲曰君多内寵子無大援將不立忽又不聴及即位遂為祭仲所逐此序文所據以為説者也然以令考之此詩未必為忽而作序者但見孟姜二字遂指以為齊女而附之於忽耳假如其説則忽之辭昏未為不正而可刺至其失國則又特以勢孤援寡不能自定亦未有可刺之罪也序乃以為國人作詩以刺之其亦誤矣後之讀者又襲其誤必欲煆煉羅織文致其罪而不肯赦徒欲以循説詩者之謬而不知其失是非之正害義理之公以亂聖經之本指而壊學者之心術故予不可以不辨山有扶蘇隰有荷華叶芳無反不見子都乃見狂且子餘反興也扶蘇扶胥疎須二音小木也荷華芙蕖也釋氏曰未開曰菡萏已發曰芙蕖子都男子之美者也孟子曰至於子都天下莫不知其狡者也狂狂人也且辭也淫女戲其所私者曰山則有扶蘇矣隰則有荷華矣今乃不見子都而見此狂人何哉山有橋松隰有游龍不見子充乃見狡童興也上竦無枝曰橋亦作喬游枝葉放縱也龍紅草也一名馬蓼葉大而色白生水澤中髙大餘張子曰龍是葒草其枝榦樛屈著土處便有根如龍也本草曰葒草一名鴻䕵如馬蓼而大即水紅也詩注云一名馬蓼馬蓼自是一種也䕵音纈子充猶子都也董氏曰子充不見於書疑亦以美著也狡獞狡獪之小兒也山有扶蘇二章章四句序刺忽也所美非美然此下四詩及揚之水皆男女戲謔之辭序之者不得其説而例以為刺忽殊無情理最是鄭忽可憐凡鄭風中惡詩皆以為刺之東萊又欲主小序煆煉得鄭忽罪不勝誅蘀他落反兮蘀兮風其吹女音汝叔兮伯兮倡昌亮仄予和胡卧反叶户志反女興也蘀木槁而將落者也女指蘀而言也叔伯男子之字也予女子自予也女叔伯也此淫女之詞言蘀兮蘀兮則風將吹女矣叔兮伯兮則盍倡予而予將和女矣蘀兮蘀兮風其漂匹遙反女叔兮伯兮倡予要於遙反女興也漂飄同要成也蘀兮二章章四句序刺忽也君弱臣强不倡而和也見上彼狡童兮不與我言兮維子之故使我不能餐七丹反叶七宣反兮賦也此亦淫女見絶而戲其人之詞言悦我者衆子雖見絶未至於使我不能餐也彼狡童兮不與我食兮維子之故使我不能息兮賦也息安也狡童二章章四句序刺忽也不能與賢人圖事權臣擅命也昭公嘗為鄭國之君而不幸失國非冇大惡使其民疾之如冦讐也況方刺其不能與賢人圖事權臣擅命則是公猶在位也豈可忘其君臣之分而遽以狡童目之耶且昭公之為人柔懦疎濶不可謂狡即位之時年已壯大不可謂童以是名之殊不相似而序於山有扶蘇所謂狡童者方指昭公之所美至於此篇則遂移以指公之身焉則其舛乂甚而非詩之本㫖明矣大抵序者之於鄭詩凡不得其説者則舉而歸之於忽文義一失而其害於義理有不可勝言者一則使昭公無辜而被謗二則使詩人脱其淫謔之實罪而麗於誹上背理之虚惡三則厚誣聖人刪述之意以為實踐昭公之守正而深與詩人之無禮於其君凡此皆非小失而後之説者猶或主之其論愈精其害愈甚學者不可以不察也鄭忽之罪不至已甚往往如宋襄這般人大言無當有甚狡處若鄭突却是狡詩意本不如此又曰鄭忽如何做得狡童若是狡自㑹托婚大國而借其助矣謂之頑童可也許多鄭風只是孔子一言斷了曰鄭聲淫如將仲子自是男女相與之詞却干祭仲共叔段甚事如褰裳自是男女相咎之詞却千忽與突爭國甚事嚴氏曰狡童或以為指忽或以為指祭仲忽為鄭君國人不得目為狡童也若指祭仲則祭仲自莊公時已為卿且為莊公取鄧曼而生昭公當昭公即位仲已老矣不應日為童也聖人刪詩以垂世教安得目君為狡童也陳少南曰説者以衛有雄雉鄭有狡童魏有碩鼠皆以目君不然也序文誤耳子惠思我褰裳涉溱側巾反子不我思豈無他人狂童之狂也且子餘反賦也惠愛也溱鄭水名狂童猶狂且狡童也且語辭也淫女語其所私者曰子惠然而思我則將褰裳而涉溱以從子子不我思則豈無他人之可從而必於子哉狂童之狂也且亦謔之之辭子惠思我褰裳涉洧叶于已反子不我思豈無他士鉏里反狂童之狂也且賦也洧亦鄭水名前漢地理志曰洧水出潁州陽城山東南至長平入潁士未娶者之稱褰裳二章章五句序思見正也狂童恣行國人思大國之正已也此序之失葢本於子太叔韓宣子之言而不察其斷章取義之意耳子之丰芳容反叶芳用反兮俟我乎巷叶胡貢反兮悔予不送兮賦也丰豐滿也巷門外也婦人所期之男子已俟乎巷而婦人以有異志不從既則悔之而作是詩也子之昌兮俟我乎堂兮悔予不將兮賦也昌盛壯也將亦送也衣於既反錦褧苦迴反衣裳錦褧裳叔兮伯兮駕予與行叶户郎反賦也褧禪丹也鄭氏曰葢以禪縠為之中衣裳用錦而上加禪穀焉惡其文之著也叔伯或人之字也婦人既悔其始之不送而失此人也則曰我之服飾既盛備矣豈無駕車以迎我而偕行者乎裳錦褧裳衣錦褧衣叔兮伯兮駕予與歸賦也婦人謂嫁曰歸丰四章章三句二章章四句序刺亂也昏姻之道缺陽倡而陰不和男行而女不隨此淫奔之詩序説誤矣劉辰翁曰諸詩朱氏一以為淫女之辭其識甚逺東門之墠音善叶上演反茹音如藘力於反在阪音反叶孚臠反其室則邇其人甚逺賦也東門城東門也墠除地町町挺者孔氏曰除地去草故云町町茹藘茅蒐也一名茜舊可以染絳本草曰一名地血葉似棗葉頭尖下濶莖葉俱澀四五葉對生節間蔓延草木上根紫赤色陂坡者曰阪孔氏曰陂陀不平而可種者曰阪門之旁有墠墠之外有阪阪之上有草識志其所與淫者之居也室邇人逺者思之而未得見之詞也東門之栗有踐家室豈不爾思子不我即賦也踐行列貌門之旁有栗栗之下有成行列之家室亦識其處也即就也東門之墠二章章四句序刺亂也男女有不待禮而相奔者也此序得之風雨凄凄子西反雞鳴喈喈音皆叶居奚反既見君子云胡不夷賦也凄淒寒涼之氣喈喈雞鳴之聲風雨晦冥葢淫奔之時君子指所期之男子也夷平也淫奔之女言當此之時見其所期之人而心悦也風雨瀟瀟雞鳴膠膠叶音驕既見君子云胡不瘳叶憐蕭反賦也瀟瀟風雨之聲膠膠猶喈喈也嚴氏曰羣雞之聲瘳病愈也言積思之病至此而愈也風雨如晦叶呼洧反雞鳴不已既見君子云胡不喜賦也晦昏已止也風雨三章章四句序思君子也亂世則思君子不改其度焉序意甚美然考詩之詞輕佻狎䁥非思賢之意也青青子矜音金悠悠我心縱我不往子寧不嗣音賦也青青純凖縁去聲之色具父母衣純以青孔氏曰物色雖一青而重言青青者古人之復言也如都人士狐裘黄黄謂狐色黄耳深衣云其父母衣純以青孤子衣純以素子男子也衿領也悠悠思之長也我女子自我也嗣音繼續其聲問也此亦淫奔之詩青青子佩叶蒲眉反悠悠我思叶新齎反縱我不往子寧不來叶陵之反賦也青青組綬之色佩佩王也孔氏曰禮不佩青玉而云青青子佩者佩玉以組綬帶之挑他刀反兮達他末反叶他悦反兮在城闕兮一日不見如三月兮賦也挑輕儇烜平聲跳躍之貌達放恣也輔氏曰此淫女望其所與私者既無音問又不見其來而極其怨之辭也子衿三章章四句序刺學校廢也亂世則學校不脩焉疑同上篇葢其辭意儇薄施之學校尤不相似也愚按朱子白鹿洞賦有曰廣青衿之疑問又曰樂菁莪之長育用此二事又皆從序説與集傳不同者彼葢斷章取義耳揚之水不流束楚終鮮息淺仄兄弟維予與女女汝同無信人之言人實迋居望仄女興也兄弟婚姻之稱爾雅曰婦之黨為婚兄弟壻之黨為姻兄弟主云古人皆謂婚姻為兄弟禮所謂不得嗣為兄弟是也記曽子問篇陳惵解曰夫婦有兄弟之義夫唱婦隨猶兄先弟從所謂宴爾新昏如兄如弟是也陳澔解曰兄弟者亦親之之辭也予女男女自相謂也人他人也迋與誑同淫者相謂言揚之水則不流束楚矣終鮮兄弟則維予與女矣豈可以他人離問之言而疑之哉彼人之言特誑女耳揚之水不流束薪終鮮兄弟維予二人無信人之言人實不信叶斯人反興也揚之水二章章六句序閔無人臣也君子閔忽之無忠臣良士終以死亡而作是詩也此男女要結之詞序説誤矣出其東門有女如雲雖則如雲匪我思存縞古老反衣綦巨基反巾聊樂音洛我員于云反賦也如雲美且衆也縞白色綦蒼艾色孔氏曰戰國䇿云强弩之餘不能穿魯縞則縞是薄繒不染故色白也綦青色之小别艾謂青而微白為艾草之色縞衣綦巾女服之貧陋者此人自目其室家也嚴氏曰猶云荆釵布裙也員與云同語辭也人見淫奔之女而作此詩以為此女雖美且衆而非我思之所存也如已之室家雖貧且陋而聊可自樂也是時淫風大行而其問乃有如此之人亦可謂能自好而不為習俗所移矣羞惡之心人皆有之豈不信哉輔氏曰出其東門有女如雲目之所覩若可美也雖則如雲匪我思存反之於心而知其非所當慕樂也縞衣綦巾聊樂我云則安分自樂而不徇俗以忘已也大序所謂發乎情止乎禮義先王之澤者於此可以觀矣出其闉音因闍音都有女如荼音徒雖則如荼匪我思且子餘反縞衣茹藘聊可與娛賦也闉曲城也陳少南曰門之外冇副城回曲以障門者謂之闉闍城臺也孔氏曰闍是城上之臺謂當門臺也荼茅華輕白可愛者也孔氏曰釋草有荼苦菜又有荼委葉􅆁風荼苦即苦菜也周頌荼蓼即委葉也此言如荼乃是茅草秀出之橞非彼二種荼也且語助辭茹藘可以染絳故以名衣服之色娛樂也出其東門二章章六句此詩却是箇識道理人做鄭詩雖淫亂然此詩却如此好女曰雞鳴一詩亦好輔氏曰鄭詩唯女曰雞鳴與此詩為得夫婦之道夫子録之正以見人性之本善而先王之澤猶未泯也曽氏曰氓以華落色衰而相棄背谷風以淫於新昏而棄舊室唯出其東門則不然序閔亂也公子五爭兵革不息男女相棄民人思保其室家焉五爭事見春秋傳愚按其事散見左傳桓公十一年十五年十七年十八年莊公十四年然非此之謂也此乃惡淫奔者之詞序誤劉辰翁曰舍序讀詩辭意甚美野有蔓草零露􅄎徒端反叶上兖反兮有美一人清揚婉兮邂逅相遇適我願叶五逺反兮賦而興也蔓延也溥露多貌清揚眉目之間婉然美也邂逅不期而㑹也男女相遇於野田草露之間故賦其所在以起興言野有蔓草則零露溥兮有美一人則清揚婉矣邂逅相遇則得以適我願矣野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧賦而興也瀼瀼亦露多貌臧美也與子偕臧言各得其所欲也野有蔓草二章章六句序思遇時也君之澤不下流民窮於兵革男女失時思不期而㑹焉東萊吕氏曰君之澤不下流迺講師見零露之語從而附益之溱與洧方渙渙叶于元反兮士與女方秉蕳古顔反叶古賢反兮女曰觀乎士曰既且子餘反且往觀乎洧之外洵訏況于反且樂音洛維士與女伊其相謔贈之以勺藥賦而興也渙渙春水盛貌葢冰解而水散之時也詩考曰三月桃花水下之時蕳蘭也其莖葉似澤蘭廣而長節節中赤高四五尺且語辭洵信訏大也勺藥亦香草也三月開花芳色可愛蘭與澤蘭相似生水傍紫莖赤節緑葉光潤尖長有岐陰小紫木草注曰芍藥有二種有草芍藥木芍藥鄭國之俗三月上已之辰采蘭水上以祓除不样故其女問於士曰盍往觀乎士曰吾既往矣女復要之曰且往觀乎葢洧水之外其地信安天而可樂也於是士女相與戲謔且以芍藥相贈而結恩情之厚也此詩淫奔者自叙之詞溱與洧瀏音留其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥賦而興也瀏深貌殷衆也將當作相聲之誤也溱洧二章章十二句輔氏曰鄭國之士地寛平人物繁麗情意駘蕩風俗淫泆讀是詩者可以盡得之詩可以觀詎不信然序刺亂也兵革不息男女相棄淫風大行莫之能救焉鄭俗淫亂乃其風聲氣習流傳已久不為兵革不息男女相棄而後然也鄭國二十一篇五十三章二百八十三句鄭衛之樂皆為淫聲然以詩考之衛詩三十有九而淫奔之詩才四之一鄭詩二十有一而淫奔之詩已不翅七之五衛猶為男悦女之詞而鄭皆為女惑男之語衛人猶多刺譏懲創之意而鄭人㡬於蕩然無復羞愧悔悟之萌是則鄭聲之淫冇甚於衛矣故夫子論為邦獨以鄭聲為戒而不及衛葢舉重而言固自有次第也詩可以觀豈不信哉范氏曰樂之淫者鄭衛如有王者必放鄭聲然則亂關雎者莫如鄭衛故鄭詩終於亂之極者焉詩考曰公羊疏許氏云鄭詩二十一篇説婦人者十九愚按鄭風之有緇衣羔裘女曰雞鳴出其東門數篇乃礫中之玉也他如大叔于田及清人詩雖無足尚猶幸非為淫奔而作若叔于田則亦未免冇男女相悦之疑是其二十一篇之中曉然不為淫奔而作者五六篇而已故曰淫奔之詩不翅七之五然自昔説詩者唯以東門之墠與溱洧為淫詩今朱子乃例以淫奔斥之者葢即其詞而得其情正以發明放鄭聲之㫖不然則衛齊陳詩諸篇非無淫聲夫子何獨以鄭聲為當放哉詩傳通釋卷四
