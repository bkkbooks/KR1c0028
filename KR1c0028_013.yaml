body:
  text: 詩傳通釋卷十三元劉瑾撰詩朱子集傳北山之什二之六陟彼北山言采其杞偕偕士子叶奬里反朝夕從事叶上止反王事靡盬憂我父母叶蒲彼反賦也偕偕强壯貌士子詩人自謂也大夫行役而作此詩自言陟北山而采杞以食者皆强壯之人而朝夕從事者也蓋以王事不可以不勤是以貽我父母之憂耳鄭氏曰王事無不堅固故我當盡力勤勞於役久不得歸父母思已而憂愚按此章可見詩人忠孝之心也溥音普天之下叶後五反莫非王土率土之濵莫非王臣大夫不均我從事獨賢叶下珍反賦也溥大率循濵涯也言土之廣臣之衆而王不均平使我從事獨勞也饒氏曰無才者多逸有才者多勞以其能任事故也言凡為王臣者皆當任王事何獨使我為賢而勞之乎謝疊山曰自古君子常任其勞小人常處其逸君子常任其憂小人常享其樂雖曰役使不均我獨賢勞然君子本心亦不願逸樂也不斥王而曰大夫不言獨勞而曰獨賢詩人之忠厚如此四牡彭彭叶鋪郎反王事傍傍布彭反叶布光反嘉我未老鮮息淺反我方將旅力方剛經營四方賦也彭彭然不得息也傍傍然不得已也嘉善鮮少以為少而難得也將壯也旅與膂同言王之所以使我者善我之未老而方壯膂力可以經營四方耳猶上章之言獨賢也謝疊山曰此詩本為役使不均獨勞於王事而作此章乃曰天子嘉我之未老善我之方壯喜我之旅力方剛而可以經營四方故獨見任使反以王為知已忠厚之至也愚按此章言所以從事獨賢之意或燕燕居息或盡瘁事國叶越逼反或息偃在床或不已于行叶户郎反賦也燕燕安息貌瘁病已止也言役使之不均也下章放此輔氏曰此章而下則方言其不均之實然亦不過以其勞逸者對言之使上之人白察耳但言之重辭之復則其望於上者亦切矣詩可以怨謂此類也愚按以下三章凡十二句為偶皆以他人之逸樂對已之憂勞所以形容不均之意或不知呌號户刀反或慘慘七感反劬勞或栖音西遲偃仰或王事鞅於兩反掌賦也不知呌號深居安逸不聞人聲也鞅掌失容也言事凡勞不暇為儀容也輔氏曰燕安也重言之見安之甚也或燕燕而自居於休息或盡瘁而力為國事或息偃在牀以自逸或不已於行以自苦或深居而不接人聲或憂慘而自極劬勞或栖遲于家而偃仰自適或煩勞於國而儀容不整或耽樂飲酒以自樂或慘慘畏咎以自憂或出入風議而親近從容或靡事不為而疏逺勞勩或湛都南反樂飲酒或慘慘畏咎巨九反或出入風音諷議叶魚羈反或靡事不為賦也咎猶罪過也出入風議言親信而從容也北山六章三章章六句三章章四句李迂仲曰孔子云公則說若不均則雖征役未甚勞苦而人亦怨矣觀大東之詩則有粲粲衣服者有葛屨履霜者北山之詩則有息偃在床者有不已于行者則天下安得而說服哉胡庭芳曰補傳云大東言賦之不均北山言役之不均序大夫刺幽王也役使不均已勞於從事而不得養其父母焉無將大車祗音支自塵兮無思百憂祗自疧劉氏曰當作疧與痻同眉貧反兮興也將扶進也大車平地任載之車駕牛者也祇適疧病也此亦行役勞苦而憂思者之作言將大車則塵汙之思百憂則病及之矣輔氏曰夫行役者進而有王事之期程唯恐其有不期之悔退而有家事之多端唯恐其有意外之虞所可憂者因不一而足也故曰百憂戒之以無思者言姑置之勿以為念可也不然適所以自病而已矣無將大車維塵冥冥叶莫迥反無思百憂不出于熲古迥反興也冥冥昏晦也熲與耿同小明也在憂中耿耿然不能出也無將大車維塵雍於勇於容二反兮無思百憂祗自重直勇直龍二反兮興也雍猶蔽也重猶纍也無將大車三章章四句序大夫悔將小人也此序之誤由不識興體而誤以為比也明明上天照臨下土我征徂西至于艽音求野叶上與反二月初吉載離寒暑心之憂矣其毒大音泰苦念彼共音恭下章並同人涕零如雨豈不懷歸畏此罪罟音古賦也征行徂往也艽野地名蓋荒逺之地也二月亦以夏正數之建卯月也初吉朔日也毒言心中如有藥毒也共人僚友之處者也懷思罟網也大夫以二月西征至于嵗暮而未得歸故呼天而訴之輔氏曰明明上天照臨下土宜無不察也故呼而訴之復念其僚友之處者且自言其畏罪而不敢歸也謝疊山曰僚友雖以恭敬自持然上無明君下無賢相無愛惜善類不知果能免禍否所以念之深至於涕零也輔氏曰言其涉行之逺歷時之久故其心之憂如中藥之毒而甚苦也共人即靖共爾位之寮友也寮友不一而足有出者有處者宜也已之征役固勞苦矣然以其所謂罪罟譴怒蹙急反覆觀之則寮友之處者亦豈有樂事哉此所以思之而涕零如兩又自言我亦豈不懷歸而相與共事哉正以畏不測之罪而不敢歸爾罪罟言其以罪而加人如罔罟之取物而物有不及知者也不言思其室家而欲歸乃言思其竂友者善為辭也然室家之思固亦在其中矣昔我往矣日月方除直慮反曷云其還嵗聿云莫音慕念我獨兮我事孔庶心之憂矣憚丁佐反我不暇叶胡故反念彼共人眷眷音眷懷顧豈不懷歸畏此譴怒賦也除除舊生新也謂二月初吉也庶衆憚勞也眷眷勤厚之意譴怒罪責也言昔以是時往今未知何時可還而嵗已莫矣蓋身獨而事衆是以勤勞而不暇也輔氏曰眷眷懷顧言已之於寮友勤厚眷眷及耳然懷思而顧念之也譴怒則明言其罪貴之昔我往矣日月方奧於六反曷云其還政事愈蹙子六反嵗聿云莫采蕭穫菽心之憂矣自詒伊戚叶子六反念彼共人興言出宿豈不懷歸畏此反覆芳福反賦也奧暖孔氏曰即春溫亦謂二月也蹙急詔遺戚憂興起也反覆傾側無常之意也言以政事愈急是以至此嵗暮而猶不得歸輔氏曰采蕭穫菽則嵗莫之事也又自咎其不能見幾逺去而自遺此憂至於不能安寢而出宿於外也鄭氏曰夜卧起宿於外憂不能宿於內也謝疊山曰興言出宿又不止於眷眷懷顧矣嗟爾君子無恆安處靖共爾位正直是與神之聽之式榖以女音汝賦也君子亦指其僚友也謝疊山曰即所謂共人也恆常也靖與靜同謝疊山曰靖如自靖自獻之靖凡事謀之心而安也共如溫共朝夕之共凡事共敬而不敢慢也君子本共又勉之以靖共也與猶助也榖祿也以猶與也上章既自傷悼此章又戒其僚友曰嗟爾君子無以安處為常言當有勞時勿懷安也當靖共爾位惟正直之人是助則神之聽之而以榖祿與女矣嗟爾君子無恆安息靖共爾位好呼報反是正直神之聽之介爾景福叶筆力反賦也息猶處也好是正直愛此正直之人也介景皆大也輔氏曰居亂朝事暗主與回邪之人共處易得隨風而靡惡直醜正故戒之以正直是與好是正直則神明所祐而福祿至焉不必求之於人也小明五章三章章十二句二章章六句吕東萊曰前三章皆悔仕亂世厭於勞役欲安處休息而不可得故每章有懷歸之歎然而知其不可歸矣故四章逺戒其同列卒章則又申言之胡庭芳曰此詩豈西征之大夫寄其僚友之處者乎歐陽子曰大雅明明在上謂之大明小雅明明上天謂之小明自是名萹者偶為志别爾了不關詩義也陳夀翁曰此詩因已之久役於外而思僚友之安處於內者且於已無賢勞之恨而謂憂感之自詒於彼無憎疾之辭而勉以為正直之是助哀而不傷怨而不怒視北山之詩稍庶幾馬豈賦北山者有父母故其辭極哀怨賦小明者已無父母故共辭頗和平也歟序大夫悔仕於亂世也鼓鐘將將七羊反淮水湯湯音傷憂心且傷淑人君子懷允不忘賦也將將聲也淮水出信陽軍桐柏山至楚州漣水軍入海愚按信陽軍即今汴梁路信陽州漣水軍即今淮西道安東州漣水縣並隸河南省湯湯沸騰之貌淑善懷思允信也此詩之義未詳王氏曰幽王鼓鐘淮水之上為流連之樂久而忘反聞者憂傷李迂仲曰聲之所感皆因人之哀樂將亡之政其民困故聞其聲以悲以見樂與政通而不專係於音也而思古之君子不能忘也輔氏曰懷允不忘言其傷今思古而信不能忘也鼓鐘喈喈音皆叶居奚反淮水湝湝户皆反叶賢雞反憂心且悲淑人君子其德不回叶乎為反賦也喈喈猶將將湝湝猶湯湯悲猶傷也回邪也輔氏曰悲甚於傷樂所以象德其德不回則言古之君子樂與德稱也鼓鐘伐鼛古毛反叶居尤反淮有三洲憂心且妯敕留反淑人君子其德不猶賦也鼛大鼓也周禮作臯云臯鼓尋有四尺愚按集傳所引周禮考工記韗人文也然地官鼓人又云以鼛鼓鼓役事則字亦作鼛矣注云長丈二尺即尋有四尺也三洲淮上地吕東萊曰三洲作詩者賦當時所見也蘇氏曰始言湯湯水盛也中言湝湝水流也終言三洲水落而洲見也言幽王之久於淮上也妯動猶若也言不若今王之荒亂也輔氏曰伐鼛舉樂器之大者言之以見其樂之盛也妯甚於悲謂常動而不息也其德不猶言與今之君子不相似也將將喈喈伐鼛言其樂之盛也湯湯湝湝三洲言其時之久也且傷且悲且妯言其憂之甚也樂之盛作之久也而民心之憂益甚則與古之王者憂民之憂樂民之樂者異矣鼓鍾欽欽鼓瑟鼓琴笙磬同音以雅以南叶尼心反以籥以灼反不僭子念反叶七心反賦也欽欽亦聲也磬樂器以石為之琴瑟在堂笙磬在下同音言其和也雅二雅也南二南也籥籥舞也僭亂也言三者皆不僭也蘇氏曰言幽王之不德豈其樂非古歟樂則是而人則非也濮氏曰但時非古之時聞其樂祗見其可傷也孟子告齊宣王者可以觀矣鼓鐘四章章五句此詩之義有不可知者今姑釋其訓詁名物而略以王氏蘇氏之說解之未敢信其必然也胡庭芳曰歐公云鼓鐘序但言刺幽王不知刺何事據詩文則是作樂於淮上矣然旁考詩書史記皆無幽王東巡之事書曰徐夷並興蓋自成王時徐夷及淮夷已皆不為周臣宣王時嘗遣將征之亦不自往初無幽王東至淮徐之事然則不得作樂於淮上矣當闕其所未詳嚴氏謂古事亦有不見於史而因經以見者詩即史也其論固當然而詩文亦不明言其為幽王也故集傳以為未詳又曰未敢信其必然得之矣序刺幽王也此詩文不明故序不敢質其事但隨例為刺幽王耳實皆未可知也楚楚者茨言抽敕留反其棘自昔何為我藝魚世反黍稷我黍與與音餘我稷翼翼我倉既盈我庾維億以為酒食以享以祀叶逸織反以妥湯果反以侑音又叶夷益反以介景福叶筆力反賦也楚楚盛密貌茨蒺藜也抽除也我為有田祿而奉祭祀者之自稱也與與翼翼皆蕃盛貌露積如字又音漬曰庾孔氏曰甫田言曽孫之庾如坁如京是積粟也故曰露積周語云野有庾積十萬曰億享獻也妥安坐也禮曰詔妥尸郊特牲注曰尸始入祝則詔主人拜安尸使之坐蓋祭祀筮族人之子為尸李寶之曰曲禮云為人子者祭祀不為尸則尸筮無父者皆用孫之倫有爵者為之既奠迎之使處神坐而拜以安之也少牢禮曰祝設几于筵上祝酌奠主人西面再拜祝出迎尸于廟門外尸入升筵祝主人皆拜妥尸尸不言答拜遂坐李實之曰祭統云君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟則全於君侑勸也恐尸或未飽祝侑之曰皇尸未實也少牢曰尸告飽祀獨侑曰皇尸未實侑尸又食主人不言拜侑尸又三飯介大也景亦大也此詩述公卿有田祿者力於農事以奉其宗廟之祭吳伯豐問自后稷以農事肇祀其詩未嘗不眷眷於此孟子亦曰禮曰諸侯耕助以供粢盛粢盛不潔不敢以祭古之人未有不先成民而後致力於神者恐不必專指公卿言之先生答曰此諸篇在小雅而非天子之詩故止得矣以公卿言之蓋皆畿內諸侯故言蒺藜之地有抽除其棘者古人何乃為此事乎蓋將使我於此蓻黍稷也輔氏曰首四句推本而言以見其不忘所白也王氏以為我倉既盈則無所藏之而露稍為庾其數至億者是也然此亦甚言之以見有餘之意耳故我之黍稷既盛倉庾既實則為酒食以享祀妥侑而介大福也濟濟子禮反蹌蹌七羊反潔爾牛羊以往蒸嘗或剝或亨普庚反叶鋪郎反或肆或將祝祭于祊補彭反叶補光反祀事孔明叶謨郎反先祖是皇神保是饗叶虛良反孝孫有慶叶祛羊反報以介福萬壽無疆賦也濟濟蹌蹌言有容也輔氏曰古之祭祀用人甚多此言濟濟蹌蹌者謂几與祭之人皆有容儀也冬祭曰蒸秋祭曰嘗剝解剝其皮也亨煮熟之也肆陳之也蘇氏曰肆謂陳其骨休於爼也將奉捧持而進之也輔氏曰剝亨肆將各有其人皆蒙濟濟蹌蹌一句祊廟門內也孝子不知神之所在故使祝博求之於門內待賔客之處也記郊特牲曰索祭祝于祊不知神之所在於彼乎於此乎注云索求神也愚按門內待賔之處恐即大門之內屏墻之外人君生時所寧立見賔之地在寢謂也之寧在庿謂之祊恐其神或在此故使祀祭于其處孔甚也明猶備也著也輔氏曰王氏云凡祀祼鬯則求諸隂焫蕭則求諸陽索祭祝于祊則求諸隂陽之間蓋魂無不之神無不在求之之備如此祀事所以孔明也者是矣集傳又以為明字兼備著兩義者尤善皇大也君也輔氏曰君也者如府君之謂所以尊之也保安也神保蓋尸之嘉號楚辭所謂靈保亦以巫降神之稱也靈保神巫也神降而託於巫蓋身則巫而心則神也今詩中不說巫當便是尸也愚按祖考之神降而安於尸之身故因以號尸也孝孫主祭之人也慶猶福也執爨七亂反踖踖七亦反叶七略反為俎孔碩叶常約反或燔音煩或炙之敕反叶陟略反君婦莫莫音麥叶木各反為豆孔庶叶陟略反為賔為客叶克各反獻酬市由反交錯禮儀卒度叶徒洛反笑語卒獲叶黃郭反神保是格叶剛鶴反報以介福萬夀攸酢賦也爨竈也毛氏曰饔爨廪爨也孔氏曰饔爨以煮肉廪爨以炊米少牢云饔爨在門東南北上廪爨在饔爨之北踖踖敬也俎所以載牲體也碩大也燔燒肉也炙炙肝也皆所以從獻也特牲主人獻尸賔長以肝從主婦獻尸兄弟以燔從是也燔者火燒之名炙者逺火之稱以難熟者近火易熟者逺之故肝炙而肉燔也儀禮特牲饋食曰主人洗角酌酳尸賔長以肝從主婦洗爵酌亞獻尸兄弟長以燔從李實之曰羞肝亦以俎君婦主婦也莫莫清靜而敬至也王介甫曰執爨賤者也賤者踖踖則貴者可知也君婦尊者也尊者莫莫則卑者可知也輔氏曰莫莫有冲漠之意唯淸靜而敬之至者方有此意思曰君婦者君即上也又所以尊稱之也豆所以盛內羞庶羞主婦薦之也鄭氏曰二羞所以盡歡心內羞則酏食糝食庶羞羊臐豕膮皆有胾醢酏音移臐音熏膮音枵胾音志李寶之曰內羞榖物庶羞牲物庶衆也賔客筮而戒之使助祭者輔氏曰為俎為豆為賔為客四為字足意皆有為之之意故先生解為賔為客云筮而戒之使與祭者是也既獻尸而遂與之相獻酬也主人酌賔曰獻賔飲主人曰酢主人又自飲而復飲賔曰酬賔受之奠於席前而不舉至旅而後少長相勸而交錯以遍也愚按特牲主人酳尸主婦亞獻賔三獻畢主人遂酌以獻賔賔飲獻爵主人飲酢爵遂以觶酌于西方之尊以酬賔又自飲再酌飲賔賔奠觶于薦南至旅酬乃舉其觶酬長兄弟遂自飲更酌于東方之尊以飲長兄弟長兄弟卒觶酌于西方之尊以飲受旅者其衆賔及衆兄弟交錯以遍皆如初儀交錯猶東西也卒盡也度法度也獲得其宜也李寶之曰笑語得宜者古者於旅也語格來酢報也輔氏曰禮儀卒度言其禮儀盡合法度也笑語卒獲言其於旅而語之時其笑語無不得其宜也此神保之所以來格介福之所以來報萬夀之所以來酢也我孔熯而善反矣式禮莫愆叶起中反工祝致告徂賚孝孫叶須倫反苾蒲必反芬孝祀叶逸織反神嗜飲食卜爾百福叶筆力反如幾音機如式既齊既稷既匡既敕永錫爾極時萬時億賦也熯竭也善其事曰工苾芬香也卜豫也豫與同幾期也春秋傳曰易幾而哭是也式法齊整稷疾匡正敕戒極至也禮行既久筋力竭矣而式禮莫愆敬之至也於是祝致神意以嘏假主人輔氏曰徂賚孝孫鄭氏以為徂往也賚豫也所以重釋上句致告之義如言以其所致告者往而豫孝孫也集傳失解此二字曰爾飲食芳潔故報爾以福祿使其來如幾其多如法爾禮容莊敬故報爾以衆善之極使爾無一事而不得乎此輔氏曰禮容莊敬解既齊既稷既匡既敕二句故報爾以衆善之極解永錫爾極一句使爾無一事而不得乎此解時萬時億一句各隨其事而報之以其類也李寶之口工祝致告以下皆序嘏主人之詞少牢嘏詞少牢曰主人酳尸尸酢主人佐食取黍授尸尸執以命祝祝受以東北面嘏主人曰云云曰皇尸命工祝承致多福無疆于女音汝孝孫注曰承猶傳也來注曰讀曰釐賜也李寶之曰亦若賚女孝孫使女受祿于天宜稼于田眉壽萬年勿替引之注曰引長也言無廢止時長如是也此大夫之禮也愚按羊豕曰少牢少牢饋食諸侯之大夫祭禮也曲禮又曰凡祭大夫以索牛者謂天子之大夫也此詩為天子公卿之禮故有潔爾牛羊之文也禮儀既備叶蒲北反鐘鼓既戒叶訖力反孝孫徂位叶力入反工祝致告叶古得反神具醉止皇尸載起鼓鍾送尸神保聿歸諸宰君婦廢徹直列反不遲諸父兄弟備言燕私叶息夷反賦也戒告也輔氏曰禮儀既備言其禮之無不舉也鐘鼓既戒言其樂之無不奏也如此則祭祀以畢矣徂位祭事既畢主人往阼階上西面之位也致告祝傳尸意告利成於主人言孝子之利養成畢也少牢曰主人出立于阼階上西面祝出西階東面告利成注曰利猶養也成畢也於是神醉而尸起送尸而神歸矣孔氏曰尸與神為節度者也神無形故尸象馬少牢曰告利成畢祝入主人降立于阼階東西而尸遂出于庿門外李寶之曰尸在廟門外則疑於臣故送迎尸皆以廟門為斷曰皇尸者尊稱之也鼓鍾者尸出入奏肆夏也周禮大司樂曰尸出入奏肆夏鍾師注曰先擊鍾次擊鼓以奏時邁也鬼神無形言其醉而歸者誠敬之至如見之也諸宰家宰非一人之稱也廢去也鄭氏曰諸宰徹去諸饌君婦籩豆而已不遲以疾為敬劉執中曰不敢怠緩如神猶在也亦不留神惠之意也祭畢既歸賔客之俎同姓則留與之燕以盡私恩所以尊賔客親骨肉也愚按儀禮主人之俎佐食徹之尸俎則佐食徹而有司歸之賔俎則有司徹而歸之祝及兄弟衆賔之俎則皆自徹而出拜賔于門外而不敢留歸賔俎而不敢後所以尊賔也主人以阼俎豆籩及尸祝兄弟之庶羞宴族人於堂主婦以祝豆籩及姑姊妹之俎宴內兄弟於房所以親親也樂具入奏叶音族以綏後祿爾殽既將莫怨具慶叶祛羊反既醉既飽叶補苟反小大稽首神嗜飲食使君壽考叶去九反孔惠孔時維其盡叶子忍反之子子孫孫勿替天帝反引之賦也凡廟之制前廟以奉神後寢以藏衣冠愚按廟及寢皆南向廟屋五架中架以南通謂之堂以北則分其東為房西為室此大夫之制也室有户牖户東而牖西牖之內為奧神位所在也房之東室之西近南各有箱爾雅所謂室有東西箱曰廟者是也廟之後别為寢以藏祖宗之遺衣冠祭時則授尸以服之其寢如廟之制而無東西箱爾雅所謂室無東西箱曰寢者是也祭於廟而燕於寢故於此將燕而祭時之樂皆入奏於寢也孔氏曰上章云備言燕私此章即言燕私之事又曰燕祭不得同樂而云皆入者歌詠雖異樂器則同故皆入也且於祭既受祿矣故以燕為將受後祿而綏之也爾殽既進與燕之人無有怨者而皆歡慶醉飽稽首董氏曰稽首頭拜至地也而言曰向者之祭神既嗜君之飲食矣是以使君夀考也又言君之祭祀甚順甚時無所不盡董氏曰內盡禮外盡物子子孫孫當不廢而引長之也楚茨六章章十二句吕氏曰楚茨極言祭祀所以事神受福之節致詳致備所以推明先王致力於民者盡則致力於神者詳觀其威儀之盛物品之豐所以交神明逮羣下至於受福無疆者非德盛政修何以致之輔氏曰一章言黍稷既成為酒食以祭祖考二章言潔牛羊以為牲求隂陽以備著三章言俎豆有碩多之實主婦有靜敬之德賔客之賢獻酬之禮四章言行禮之久筋力雖竭而式禮莫愆祝致神意以嘏豫主人之事五章言禮樂備舉祭事既畢留同姓而燕之事六章則言燕私之事而并載燕者之慶辭也愚按詩中言濟濟蹌蹌踖踖莫莫卒度卒獲式禮莫愆齊稷匡敕者威儀之盛此德盛所致也倉庚之積牛羊之潔爼豆之碩庶飲食之苾芬者物品之豐此政修所致也德與政儀與物內外兩盡而本末兼備故以之交神明則為妥侑為蒸嘗以之速羣下則為獻酬為燕私曰萬夀無疆曰萬夀攸酢曰卜爾旨福曰以綏後祿所謂受福無疆也又按周禮樂師之教樂儀大馭之馭玉路記玉藻言君子佩玉皆曰行以肆夏趍以采薺或謂采薺即楚茨也序刺幽王也政煩賦重田萊多荒饑饉降喪民卒流亡祭祀不饗故君子思古焉自此篇至車牽凡十篇似出一手詞氣和平稱述詳雅無風刺之意序以其在變雅中故皆以為傷今思古之作詩固有如此者然不應十篇相屬而絶無一言以見其為衰世之意也竊恐正雅之篇有錯脫在此者耳序皆失之楚茨之詩精深宏博如何做得變雅輔氏曰精深宏博四字說盡此詩之義誠敬之至威儀之敕鬼神之享福夀之報此其所謂精深也禮樂之備品物之豐逮及之遍施被之逺此其所謂宏慱也讀者更熟玩而深索之信彼南山維禹甸田見反叶徒鄰反之畇畇音勻原隰曽孫田叶地因反之我疆我理南東其畝叶滿彼反賦也南山終南山也甸治也畇畇墾辟音闢貌孔氏曰墾耕其地闢除草萊以成柔田也曽孫主祭者之稱曽重也自曽祖以至無窮皆得稱之也疆者為之大界也理者定其溝塗也劉執中曰疆謂有夫有畛有塗有道有路以經界之也理謂有遂有溝有洫有澮有川以疏道之也畝壟也長樂劉氏曰其遂東入于溝則其畝南矣其遂南入于溝則其畝東矣此詩大指與楚茨略同此即其篇首四句之意也輔氏曰此詩亦是詩人述公卿有田祿者力於農事以奉宗廟之祭也言信乎此南山者本禹之所治董氏曰雍州之山荆岐既旅終南惇物則禹固治之矣嚴氏曰言禹甸治之則平水患理溝洫皆在其中愚按禹平水土大舜美其功曰地平天成萬世永賴今考於詩尤信也其見於小雅則有此詩大雅則曰豐水東注維禹之績又曰奕奕梁山維禹甸之魯頌則曰纘禹之緒商頌則曰禹敷下土方又曰設都于禹之績可以見禹功之在人心可以見人心之知所本也故其原隰墾闢而我得田之於是為之疆理而順其地勢水勢之所宜或南其畝或東其畝也愚按地之勢東南下水勢皆趨之故順其勢以縱為遂以橫為溝而或南其畝東其畝也上天同雲雨于付反雪氛氛敷云反益之以霡亡革反霂音木既優既渥叶烏谷反既霑既足生我百榖賦也同雲雲一色也將雪之候如此氛氛雪貌霡霂小雨貌陸農師曰三農之事雪則欲盛而遍故言氛氛雨欲微而潤故言霡霂優渥霑足皆饒洽之意也冬有積雪春而益之以小雨潤澤則饒洽矣彭氏曰上章言地利此章言天時俗云蝗産子於地中至春夏而出地若冬有雪寒氣逼之深入於地春夏不能出矣一雪入地三尺三雪則入地九尺故三白為豐年之兆也疆場音亦翼翼黍稷彧彧於六反叶于逼反曽孫之穡以為酒食畀必寐反我尸賔壽考萬年叶尼因反賦也場畔也前漢書注曰至此易主故曰易翼翼整飭貌彧彧茂盛貌畀與也言其田整飭而榖茂盛者皆曽孫之穡也愚按詩人本欲言此章之事而先言首章田畝之墾闢疆理次章雨雪之滋生百榖而以此章首二句承上章之意言之也於是以為酒食而獻之於尸及賔客也丘氏曰與尸謂獻熟食并酌齊獻尸是也與賔謂助祭之賔酌齊獻尸尸酌酢賔并祭未燕同姓於寢是也此祭始終用酒食之事愚按三獻尸之後主人亦有獻賔之禮隂陽和萬物遂而人心歡悅以奉宗廟則神降之福故壽考萬年也輔氏曰首章言我之得以墾辟夫田者禹之功也二章言我之得以生長夫榖者天之賜也此章首句則重言首章之意二句則重言二章之意可見其不忘所自也第三句方言此乃曽孫之穡鄭氏謂斂穫曰穡是也曽孫既有此穡則以為酒食奉祭祀以盡我之孝心又皆不忘其本之意也至於逺不忘乎大禹甸治之功近不忘乎上天饒洽之賜與夫孝奉宗廟之祭是又皆可以膺受多福而不忝愚按集傳所謂隂陽和者亦承上章雨雪饒治之意也中田有廬疆埸有瓜叶攻乎反是剝是菹側居反獻之皇祖曽孫壽考叶孔五反受天之祜侯古反賦也中田田中也菹酢音醋菜也祜福也一井之田其中百畝為公田內以二十畝分八家為廬舍以便田事董氏曰每家廬舍二畝半孔氏曰古者宅在都邑農時則出而就田須有廬舍後漢書注曰井田法人受私田一百畝公田十畝廬舍直內貴人也公田次之重公也私田在外賤私也於畔上種瓜以盡地利王介甫曰地無遺利也瓜成剝削淹漬以為菹而獻皇祖貴四時之異物順孝子之心也祭以清酒從以騂息營反牡享于祖考叶去久反執其鸞刀以啓其毛取其血膋音聊叶音勞賦也清酒清潔之酒鬱鬯之屬也嚴氏曰猶鳬鷖言爾酒既清烈祖既載清酤也草鬱鬯者禮家以為釀秬為酒煮鬱金香和之其氯芬芳而條暢也騂赤色周所尚也孔氏曰三代各用其所尚之毛色祭禮先以鬱鬯灌地求神於隂董鼎曰酒以灌地降神取其馨香下達然後迎牲執者主人親執也鸞刀刀有鈴也膋脂膏也孔氏曰力環有鈴其聲中節膋者腸間脂也啓其毛以告純也取其血以告殺也取其膋以升臭也合之黍稷實之於蕭而燔之以求神於陽也孔氏曰楚語云毛以示物物色也是毛以告純以脂膏合之黍稷置之蕭乃以火燒之合其馨香之氣是升臭也謝疊山曰祭祝之事各有司存執刀啓毛取血膋必躬親之何也事死如事生事亡如事存子孫之養祖考必身親其勞自致其力然後盡其心馬耳記曰周人尚臭灌用鬯臭絶句一以鬯字絶句鬱合如字一音閣鬯絶句臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也鄭氏曰灌以圭瓚酌鬯始降神也已乃迎牲於庭殺之天子諸侯之禮也蕭合黍稷臭陽達於墻屋故既奠然後焫音爇蕭合羶馨同薌香同鄭氏曰奠謂薦孰時也蕭薌蒿也染以脂合黍稷燒之也凡祭慎諸此魂氣歸于天形魄歸于地故祭求諸隂陽之義也天地隂陽之氣交合便成人氯便是魂精便是魄到得將死熱氣上出所謂魂升下體漸冷所謂魄降所以祭祀燎以求諸陽灌以求諸隂也問祖先已死以何而求曰只是以我之氣承接其氣便是有求底道理古人於祭祀極重直是要求而得之商人求諸陽便先作樂發散即陽氣以求之周人求諸隂便焚燎鬱鬯以隂去求之求又曰如言殂落殂升也是魂之遊落是魄之降祭諸陽所以求其魂求諸隂所以求其魄是蒸是享叶虛良反苾苾芬芬祀事孔明叶謨郎反先祖是皇報以介福萬壽無疆賦曰蒸進也或曰冬祭名嚴氏曰蒸畀祖妣之蒸不必謂蒸嘗之蒸輔氏曰若以為冬祭則其義亦如楚茨二章董氏說上章既言有酒有牲以享于祖考故此章於是言以是牲酒為冬祭之蒸而飲食苾芬祭事備著也先祖於是既大且尊而降福無疆信南山六章章六句愚按李寶之曰大夫之祭不祼不薦血腥而自薦熟始故名其禮曰饋食天子諸侯則薦熟以前有祼鬯薦血腥之禮今考此詩與楚茨雖大指略同而楚茨獨言薦熟此詩則言清酒血膋意楚茨為天子大夫之祭禮此詩或諸侯為王朝公卿者之禮歟序刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉曽孫古者事神之稱序專以為成王則陋矣倬陟角反彼甫田叶地因反嵗取十千叶倉新反我取其陳食音嗣我農人自古有年叶泥因反今適南畝叶滿彼反或耘或耔音子叶奬里反黍稷薿薿魚起反攸介攸止蒸我髦音毛士鉏里反賦也倬明貌甫大也十千謂一成之田地方十里為田九萬畝而以其萬畝為公田蓋九一之法也鄭氏曰井田之法九夫為井井稅一夫其田百畝井十為通通稅十夫其田千畝通十為成成方十里成稅百夫其田萬畝我食祿主祭之人也陳舊粟也農人私百畝而養公田者也有年豐年也適往也耘除草也耔雍本也蓋后稷為田一畝三畎廣去聲尺深去聲尺而播種上聲於其中苗葉以上稍耨壠草因壝其土以附苗根壠盡畎平則根深而能音耐風與旱也薿茂盛貌陳器之曰按西漢志葉上有生字壝作隤漢書曰趙過能為代田一畝三畎嵗代處故曰代田古法也耔附根也言苗稍壯每耨輒附根比盛暑壠盡而根深能風與旱故擬擬而盛也介大蒸進髦俊也俊士秀民也古者士出於農而工啇不與焉管仲曰農之子恆為農野處而不昵其秀民之能為士者必足賴也即謂此也國語管仲曰農從事於田野少而習焉其心安焉不見異物而遷焉故其父兄之教不肅而成子弟之學不勞而能故農之子云云注曰昵近也秀民民之秀出者也輔氏曰言農夫而終之以髦士所以重農也此詩述公卿有田祿者力於農事以奉方社田祖之祭輔氏曰楚茨信南山二詩皆是述公卿有田祿者力於農事以奉其宗廟之祭故首皆推言昔人墾辟之功而我得以耕治以奉祭祀之意甫田之詩乃述公卿有田祿者力於農事以奉方社田祖之祭故首言有年之多與蓄積之富以見於神不可不報之意故言於此大田嵗取萬畝之入以為祿食及其積之久而有餘則又存其新而散其舊以食農人補不足助不給也蓋以自古有年是以陳陳相因所積如此然其用之之節又合宜而有序如此所以粟雖甚多而無紅腐不可食之患也謝疊山曰民生於三代之前其命制乎君民生於三代之後其命制乎天吾求其所以制命之道矣取民常少與民常多斂散得宜豐凶有備新者方收入廩陳者即取以食農人補不足助不給皆取其陳者也從古以來豈無水旱霜蝗吾民常如有年者上之人斂散得其道也愚按嵗取萬畝之入取之有常也積粟有餘而能散以周農則用之合宜也於有餘之中必散舊而存新則用之有序也存新散舊而無紅腐之患又見其不至於暴棄天物也又言自古既有年矣今適南畝農人方且或耘或耔而其黍稷又已茂盛則是又將復有年矣故於其所美大止息之處進我髦士而勞之也以我齊音咨明叶謨郎反與我犧羊以社以方我田既臧農夫之慶叶祛羊反琴瑟擊鼓以御牙嫁反田祖以祈甘雨以介我稷黍以榖我士女賦也齊與粢同曲禮曰稷曰明粢此言齊明便文以協韻耳犧羊純色之羊也社后土也以句音勾龍氏配孔氏曰后土者地之大名也鄭云社者五土之神能生萬物州者也以古之有大功者配之祭法共工氏之霸九也其子曰句龍能平九州死以配神社而祭之方秋祭四方報成萬物周禮所謂羅弊獻禽以祀祊音方是也夏官大司馬曰中秋獮田羅弊致禽以祊祊注云羅弊罔止也秋田用罔皆殺而罔止衆皆獻其所獲禽焉祊當為方聲之誤也秋田主祭四方報成萬物臧善慶福御迎也田祖先嗇也謂始耕田者即神農也周禮籥章凡國祈年于田祖則吹豳雅擊土鼓以樂田畯是也孔氏曰謂神農始教造田謂之田祖先為稼穡謂之先嗇神其農業謂之神農名殊而實同也王介甫曰生為田畯死為田祖若樂工之死而為樂祖也穀養也又曰善也言倉廪食而知禮節也言奉其齊音咨盛音成犧牲以祭方社而曰我田之所以善者非我之所能致也乃賴農夫之福而致之耳又作樂以祭田祖而祈雨庶有以大其稷黍而養其民人也胡庭芳曰此章分兩節農夫之慶以上秋報也琴瑟擊鼓以下又是春祈也彭氏曰齊明犧羊此祀社方之禮也鼓鐘琴瑟此祀田祖之樂也我田既臧農夫之慶此報於社方者然也以祈甘雨介稷黍榖士女此祈於田祖者然也曽孫來止以其婦子叶奬里反饁于輒反彼南畝叶滿彼反田畯音俊至喜攘如羊反其左右叶羽已反嘗其㫖否叶補美反禾易以鼓反長畝同上終善且有叶羽已反曽孫不怒農夫克敏叶母鄙反賦也曽孫主祭者之稱非獨宗廟為然曲禮外事曰曽孫某侯某武王禱名山大川曰有道曽孫周王發是也饁餉攘取㫖美易治長竟有多敏疾也曽孫之來適見農夫之婦子來饁耘者於是與之偕至其所而田畯亦至而喜之乃取其左右之饋而嘗其㫖否言其上下相親之甚也輔氏曰㫖則幸而喜矣否則慘然為之不樂也不曰取而曰攘者以公卿之貴而食農者之粗糲彼必有所不敢獻者故攘而取之以見上下相親如家人父子之無間也吕東萊曰此言省耕之時曽孫在上耕者在下田畯往來其間勸勞而撫摩之熙然其若一家也曰攘者喜之甚而取之疾以言其相親無間也既又見其禾之易治竟畝如一而知其終當善而且多是以曽孫不怒而其農夫益以敏於其事也吕東萊曰不曰喜而曰不怒者若不敏於農則怒矣彭氏曰喜怒非自外至田畯言喜曽孫言不怒則其上下相與皆誠心之至也曽孫之稼如茨才私反如梁曽孫之庾羊主反如坻直基反如京叶居良反乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶叶祛羊反報以介福萬壽無疆賦也茨屋蓋言其密比也孔氏曰謂以茅覆屋言其積聚髙大如屋茨耳梁車梁言其穹隆也愚按小戎所謂梁輈是也坻水中之髙地也京髙丘也箱車箱也此言收成之後禾稼既多則求倉以處之求車以載之而言凡此黍稷稻梁皆賴農夫之慶而得之是宜報以大福使之萬壽無疆也其歸美於下而欲厚報之如此輔氏曰夫以時斂散補助不足而勞來勸相以致農夫之敏者固賴乎上之人而火耕水耘沾體塗足勞苦自竭以致禾稼之登者則實農夫之力也歸美于彼而欲報之厚宜矣若夫用其力享其奉而曰豫不戕禮則然矣則是末世薄俗之所為古無是事甫田四章章十句序刺幽王也君子傷今而思古焉此序專以自古有年一句生說而不察其下文今適南畝以下亦未嘗不有年也大田多稼既種章勇反既戒既備乃事叶上止反以我覃以冉反耜叶養里反俶載南畝叶滿洧反播厥百榖叶工洛反既庭且碩叶常約反曽孫是若賦也種擇其種也戒飭其具也覃利俶始載事庭直碩大若順也蘇氏曰田大而種多故於今嵗之冬具來嵗之種戒來嵗之事凡既備矣然後事之取其利耜而始事於南畝王介甫曰畝大扺以南為正故每曰南畝既耕而播之其耕之也勤而種之也時故其生者皆直而大以順曽孫之所欲輔氏曰農夫以百榖庭碩為順曽孫之欲則上之意孚于下而下之意順乎上矣此詩為農夫之詞以頌美其上若以答前篇之意也吕東萊曰大田多稼總言之也以下至卒章自始及末以次陳之愚按此章言田事修飭而苗生盛美也既方既皂叶子苟反既堅既好叶許苟反不稂音郎不莠餘久反去起吕反其螟莫延反螣音特及其蟊莫侯反賊無害我田稚音稚田祖有神秉畀炎火叶虎委反賦也方房也謂孚甲始生而未合時孔氏曰穗上已有孚甲孚者米外之粟皮甲者在孚外若鎧甲之在人表實未堅者曰皂劉執中曰榖粒之生而未充滿曰皂稂童梁莠似苗皆害苗之草也孔氏曰稂莠苗既似禾實亦似粟董氏曰莠秕草也食心曰螟食葉曰螣食根曰蟊食節曰賊皆害苗之蟲也孔氏曰此四種蟲皆蝗也稚幼禾也孔氏曰蟲灾禾稚者偏甚言其苗既盛矣鄭氏曰盡生房矣盡成實矣盡堅熟矣盡齊好矣而無稂莠擇種之善民力之專時氣之和所致之又必去此四蟲然後可以無害田中之禾然非人力所及也故願田祖之神為我持此四蟲而付之炎火之中也輔氏曰既方既皂既堅既好自禾之秀而言以至於成實也其察之密矣又必無稂莠以分其土力無蟲蝗以戕其根株然後害不及其稚禾稚禾猶且不害則其庭碩者可知矣然稂莠則人力足以除之蟲蝗則非人力所及也故願田祖之神持此四蟲付之炎火之中也姚崇遣使捕蝗引此為證夜中設火火邊掘坑且焚且瘞蓋古之遺法如此愚按此章言苗既秀實而願其無損也有淹於檢反萋萋七西反興雨祁祁雨于付反我公田遂及我私叶息夷反彼有不穫稚此有不斂力檢反穧才訃反彼有遺秉此有滯穗伊寡婦之利賦也淹雲興貌萋萋盛貌祁祁徐也雲欲盛盛則多雨雨欲徐徐則入土公田者方里而井井九百畝其中為公田八家皆私百畝而同養公田也方一里為一井其田九百畝中百畝為公田外八百畝為私田公田以為君子之祿而私田野人之所受也愚按司馬決以六尺為步步百為畝畝百為夫是一畝之田實積百步而方十步一夫之田實積百畝而方十畝為方一百步以九夫為一井則方三夫為方三百步古者以三百步作一里所謂方一里為一井也穧束秉把也滯亦遺棄之意也劉執中曰稚謂穗之低小刈穫之所不及者穧謂刈而遺忘秉縛之所不及者秉謂來而輦載之所不盡者滯謂刈而折亂秉穫之所不通者皆緑豐稔故也言農夫之心先公後私故望此雲雨而曰天其雨我公田而遂及我之私田乎翼怙君德而蒙其餘惠使收成之際彼有不及穫之稚禾此有不及斂之穧束彼有遺棄之禾把此有滯漏之禾穗而寡婦尚得取之以為利也此見其豐成有餘而不盡取又與鰥寡共之既足以為不費之惠而亦不棄於地也不然則粒米狼戾不殆於輕視夫物而慢棄之乎謝疊山曰三代盛時君之愛民無所不用其極民之愛君亦無所不用其極農夫望雨如飢渴之望飲食也惟願其田中之洋溢今所願者公田之雨優渥霑足其餘波及我私田也尊君親上之心亦厚矣稚有不穫穧冇不斂秉有遺穗有滯此樂嵗粒米狼戾之時也農夫何見而乃能留冇餘不盡之和以養鰥寡此上好仁而下好義也輔氏曰既無稂莠之害又無蟲蝗之害則其不可無者雨而已故此章又言其望雲與雨先公田而後私曰如此則成有年矣鰥寡孤獨聖人雖不欲有此等人然亦不能使其無也但發政施人則先及之而已雨我公田尊君之義也伊寡婦之利及衆之仁也陳夀翁曰此章欲雨公田不至知有已而不知有君利及寡婦不至知有已而不知有人忠厚若此其豳風之氣象乎愚按此章復願其雨澤溥及而收成有餘也曽孫來止以其婦子饁彼南畝子畝並見前篇田畯至喜來方禋音因祀叶逸織反以其騂黑與其黍稷以享以祀同上以介景福叶筆力反賦也精意以享謂之禋農夫相告曰曽孫來矣劉執中曰曽孫以其西成乃出郊省民之斂也愚按此詩為農夫之詞故以此為農夫相告言曽孫之來省斂與上篇章㫖不同也於是與其婦子饁彼南畝之穫者而田畯亦至而喜之也王介甫曰喜其趨穫事也曽孫之來又禋祀四方之神而賽禱焉四方各用其方色之牲此言騂黑舉南北以見其餘也吕東萊曰南方用騂北方用黑孔氏所謂略舉二方以為韻句是也以介景福農夫欲曽孫之受福也愚按卒章言其收穫之後而報祀穫福也大田四章二章章八句二章章九句前篇有擊鼓以御田祖之文故或疑此楚茨信南山甫田大田四篇即為豳雅其詳見於豳風之末亦未知其是否也吳伯豐問楚茨以下四篇先生謂即豳雅反覆讀之其辭氣與七月載芟良耜等篇大抵相類斷無可疑然前篇上之人以我田既臧為農夫之慶而欲報之以介福此篇農夫以雨我公田遂及我私而欲其享祀以介景福上下之情所以相賴而相報者如此非盛德其孰能之輔氏曰上之欲報其下者如此則是君以民為體也下之欲報其上者如此則是民以君為心也上下之情相類以為一則君之德固厚而民之德亦厚也李迂仲曰楚茨信南山甫田大田其始皆言黍稷次言祭祀乃以福祿終之張文潜曰受莫大之福而其君有安寧夀考之樂此天下至美極治之時也而其本於倉廪之盈原隰之治田廬之修耕耘之時而後及於祭祀禮樂之事也蓋田事備則衣食足衣食足而禮樂備禮樂備而和平興和平興而人君有夀考安樂之盛此詩人探其本而要其終言之序如此詩考曰蕭望之云爰及矜人哀此鰥寡上惠下也雨我也公田遂及我私下急上序刺幽王也言矜寡不能自存焉此序專以寡婦之利一句生說瞻彼洛矣維水泱泱於良反無韻未詳君子至止福祿如茨韎音昧韐音閣有奭許力反以作六師賦也洛水名在東都會諸侯之處也問洛水或云兩處曰此只就洛邑言之泱泱深廣也君子指天子也茨積也韎茅搜所染色也李寶之曰茅搜一名舊可以染絳韋昭謂急疾呼茅搜成韎故因以名其所染也韐韠也合韋為之孔氏曰是蔽膝之衣李寶之曰合韋為之故謂之韐周官所謂韋辨兵事之服也愚按韋辨詳見六月常服注奭赤貌作猶起也六師六軍也天子六軍愚按天子六軍出自六鄉蓋一萬二千五百家為鄉凡起徒役毋過家一人故一萬二千五百家為二軍六軍總七萬五千人也此天子會諸侯于東都以講武事而諸侯芙天子之詩言天子至此洛水之上御戎服而起六師也瞻彼洛矣維水泱泱君子至止鞞補頂反琫必孔反有珌賔一反君子萬年保其家室賦也鞞容刀之鞞今刀鞘音笑也琫上飾珌下飾亦戎服也毛氏曰天子玉琫而珧珌諸侯璗琫而璆珌珧音遙蕩音蕩璆音求孔氏曰珧蜃甲也黃金謂之璗瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦叶卜工反賦也同猶聚也瞻彼洛矣三章章六句詩多有酬酢應答之篇瞻彼洛矣是臣歸美其君君子指君也當時朝㑹於洛水之上而臣祝其君如此裳裳者華又是君報其臣桑扈鴛鴦皆然陳壽翁曰講武事而不忘武備乃所以久福祿而保國晉家之道也知此則後世之廢武備而不戒不虞如武者其不能久安長治宜也序刺幽王也思古明王能爵命諸侯賞善罰惡焉此序以命服為賞善六師為罰惡然非詩之本意也濮氏曰洛邑初成成王嘗往受諸侯之朝宣王復命諸侯于此序所謂明王即指此矣安知非當時美之之時何以别其為思古歟以君子至止為諸侯來受爵命以作六師為使之攝卿士以行軍而因以賞善罰惡稱之何其誕妄而不怍也裳裳者華其葉湑思吕反兮我覯之子我心寫叶想與反兮我心寫兮是以有譽處兮興也裳裳猶堂堂董氏云古本作常常棣也湑盛貌覯見處安也此天子美諸侯之辭蓋以答瞻彼洛矣也言裳裳者華則其葉湑然而美盛矣我覯之子則其心傾寫而悅樂之矣夫能使見者悅樂之如此則其有譽處宜矣此章與蓼蕭首章文勢全相似輔氏曰為諸侯而使天子見之悅樂如此是宜有譽處矣先生正以此章與蓼蕭首章文勢相似故知其為天子美諸侯之詩以答瞻彼洛矣也裳裳者華藝其黃矣我覯之子維其有章矣維其有章矣是以有慶叶墟羊反矣興也藝黃盛也章文章也有文章斯有福慶矣輔氏曰文章則德之弸中而彪外者德之彰著如此則固宜其有福慶也裳裳者華或黃或白叶僕各反我覯之子乘其四駱乘其四駱六轡沃若興也言其車馬威儀之盛左叶祖戈反之左同上之君子宜叶牛何反之右叶羽已反之右同上之君子有叶羽已反之維其有同上之是以似叶養里反之賦也言其才全德備以左之則無所不宜以右之則無所不有維其有之於內是以形之於外者無不似其所有也裳裳者華四章章六句序刺幽王也古之仕者世祿小人在位則讒諂並進棄賢者之類絶功臣之世焉此序只用似之二字王說此山之什十篇四十六章三百三十四句詩傳通釋卷十三
