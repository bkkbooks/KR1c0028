body:
  text: 詩傳通釋卷十六元劉瑾撰詩朱子集傳大雅三說見小雅大雅非聖賢不能為平易明白正大光明熊去非曰按小雅集傳云正大雅㑹朝之樂受釐陳戒之辭文王大明綿三篇國語皆以為兩君相見之樂朱子謂特舉其一端而言其實天子諸侯㑹朝之樂也今誦其詩則於其詠歌洋溢之中而凜然有嚴重齊莊之意猶使人有所興起況親聞其樂者乎皇矣追述大王王季之德業與大明綿詩同意生民人推本后稷所以積行纍功之由朱子疑為郊祀之後受釐頒胙之詩旱麓詩中有玉瓉享祀神勞等語或亦受釐之樂思齊追述大任大姒大姜之德言文王御家在宫之事為詳疑此入而燕處之樂靈臺豈亦出而遊觀之樂乎若棫朴言文王之德下武有聲皆兼言武王之事其樂或用之宗廟或用之朝廷今皆不可知若行葦以下四篇為受釐之辭公劉以下三篇為陳戒之辭則又明白曉然者矣惜其被之聲歌者其音節已不復存然善觀詩者但玩其辭氣亦足以識先王之雅道矣文王之什三之一文王在上於音烏下同昭于天叶鐵因反周雖舊邦其命維新有周不顯帝命不時叶上紙反文王陟降在帝左右叶羽已反賦也於歎辭昭明也命天命也不顯猶言豈不顯也愚按雅頌稱不顯凡十二此詩三大明及嵩髙韓奕清廟維天之命執競烈文各一皆與此詩同義思齊抑各一則詞指有不同者帝上帝也不時猶言豈不時也左右旁側也周公追述文王之德明周家所以受命而代商者皆由於此以戒成王胡庭芳曰此篇周公作於成王之時推本周家受天命之由而歸美文王之詩愚按周家受命始於文王固由文王之德所致一章二章三章則專言受命之事也周家代商始於武王亦由文王之德所致四章以下則兼言代商之事也此章言文王既沒而其神在上昭明於天是以周邦雖自后稷始封千有餘年而其受天命則自今始也嚴氏曰文王未嘗稱王曰文王者追稱之也董鼎曰朱漢上云人之死各返其根體冕陰也故降而在下魂氣陽也故升而在上況聖人清明在躬志氣如神故其沒也精神在天與天為一文王在上尊膽之辭也於昭于天嘆其德之昭明上徹于天與天同德也周問受天命如何曰命如何受於天只是人與天同自后稷以來積仁纍義到此時人心奔趨自有不容已嚴氏曰補傳云舊命后稷以國新命武王以天下也夫文王在上而昭于天則其德顯矣周雖舊邦而命則新則其命時矣故又曰有周豈不顯乎帝命豈不時乎王介甫曰不顯所以甚言其顯不時所以甚言其時唯其德之顯所以為命之時蓋以文王之神在天一升一降無時不在上帝之左右是以子孫蒙其福澤而君有天下也言文王德合乎天與之同運而無違也問文王陟降曰理是如此若道真箇一上一下則不可輔氏曰文王在上於昭于天文王陟降在帝左右正與中庸所謂洋洋乎如在其上如在其左右之意同蓋非貌說實理然也蘇氏曰聖人先天而弗違後天而奉天時與天如一故詩於天人之際多以陟降言之胡庭芳曰文王之靈一陟一降在帝左右若陰有以相之是以子孫蒙其福澤以有天下蓋歸美文王之德而武王由之以受命有天下也春秋傳天王追命諸侯之詞曰叔父陟恪在我先王之左右以佐事上帝語意與此正相似昭公七年衛襄公卒王使成簡公如衛弔且追命襄公云云或疑恪亦降字之誤理或然也亹亹音尾文王令聞音問不已陳錫哉周侯文王孫子叶奠里反文王孫子本支百世凡周之士不顯亦世賦也亹亹强勉之貌輔氏曰亹亹雖訓强勉然亦有繼續不已之意與四章緝熙二字相似令聞善譽也陳猶敷也哉語辭侯維也本宗子也支庶子也孔氏曰適譬本幹庶譬其枝也文王非有所勉也純亦不已而人見其若有所勉耳其德不已故今既沒而其令聞猶不已也李迂仲曰惟文王亹亹故其令聞亦不已蓋有實者必有名也苟為無本安能不已乎嚴氏曰文王之誠不已而令聞亦不已此誠之著也令聞不已是以上帝敷錫於周維文王孫子則使之本宗百世為天子支庶百世為諸侯而又及其臣子使凡周之士孔氏曰士者下至諸侯及王朝公卿大夫總稱亦世世修德與周匹休焉輔氏曰臣之傳世既顯則周之傳世亦顯矣上天以文王王之故敷錫周家之子孫而又及其臣子則君臣同體亦可見矣或禍或福豈得而偏逃哉李迂仲曰非特文王之子孫也凡周之士亦皆世世而顯天之所以敷錫文王可謂至矣不顯亦世猶曰豈不顯乎其亦世也蓋言其傳世永久而以不顯二字嘆之以足其辭也嚴氏曰使周之臣子皆光明俊偉其德甚顯亦世世相傳與周匹休焉黃實夫曰文王德澤廣及其臣士非惟周召尚父泰顛散宜生之徒與周相為無窮而其餘者亦皆世守爵祿世竭忠誠以輔周家之子孫彭氏曰亹亹者不已之體也令聞則不已之形見也陳錫于周子孫百世仕者世祿不已之效驗也嚴氏曰次章述文王德澤之逺也世之不顯厥猶翼翼思皇多士生此王國叶于逼反王國克生維周之楨音貞濟濟子禮反多士文王以寧賦也猶謀翼翼勉敬也輔氏曰勉則無怠敬則無他謀猶如此則其忠誠可知矣思語辭皇美楨幹也幹者版築之楨幹今人築墻必立二木於中為骨謂之夜義木橫曰楨直曰幹濟濟多貌此承上章而言其傳世豈不顯乎而其謀猷愚按兩其字皆指周士皆能勉敬如此也美哉此衆多之賢士而生於此文王之國也文王之國能生此衆多之士則足以為國之幹而文王亦賴以為安矣輔氏曰多士之生於周國乃所以為周國之楨幹也二程子論治天下之道未始不以求賢才為先務者以此然則天之所以使周士傳世之顯者非所以為周之士乃所以為周之國也自文王之時言之則文王之身固以多士寧矣自成王之時言之則文王之神亦以多士寧也嚴氏曰墻恃幹而立國恃人而立此章述周士之盛劉執中曰多士本由文王教化陶範而後生也而文王之國又待多士以為安焉猶人勤於菑田反以自養樂於植材反以自庇蓋言文王得人之盛而宜其傳世之顯也愚按言賢材之益於國者如此宜其子孫傳世之顯也穆穆文王於緝士入反熙敬止假古雅反哉天命有商孫子商之孫子其麗不億上帝既命侯于周服叶蒲北反賦也穆穆深逺之意緝續熙明亦不已之意絹如緝麻之緝連緝不已之意止語辭假大麗數也不億不止於億也侯維也言穆穆然文王之德不已其敬如此嚴氏曰文王德容穆穆然可見故穆穆足以形容之所難言者心之敬也故緝熙不足以發而又以於發之緝熙敬止者中庸之至誠無息也是以大命集焉以有商孫子觀之則可見矣蓋商之孫子其數不止於億然以上帝之命集於文王而今皆維服于周矣孔氏曰此作在成王之時從後見其歸周推本而美之耳嚴氏曰服事也用也故為臣而見用謂之服言服行其職也此章述文王以敬德為受命代商之由也輔氏曰先生謂四章始言文王之所以聖與夫上昭于天不已其令聞者止在於敬之緝續熙明不已而已可謂深得周公之心及文王之德也程先生曰毋不敬可以對越上帝觀文王之詩則可見矣侯服于周天命靡常殷士膚敏祼古亂反將于京叶居良反厥作祼將常服黼音甫冔况甫反王之藎才刃反臣無念爾祖賦也諸侯之大夫入天子之國曰某士則殷士者商孫子之臣屬也董鼎曰葉氏云春秋傳晉士起是也膚美敏疾也祼灌鬯也將行也酌而送之也孔氏曰小宰云凡祭祀贊祼將之事以將為送言灌時送爵行之也於禮王正祼后亞祼而殷士助祭行灌鬯耳嚴氏曰洛誥王入大室祼謂以圭瓉酌於爵以獻尸尸受酒不飲灌於地故謂灌祼灌古字通用宗廟有祼天地大神不灌京周之京師也黼黼裳也冔殷冠也董氏曰黼繡於裳雖章數不同皆以黼為裳也孔氏曰祭服不止於黼舉一章以表之耳嚴氏曰黼裳商周所同黼裳而冔冠則商之制也毛氏曰夏后氏曰收周曰冕蓋先代之後統承先王修其禮物作賔于王家蔡九峯曰修其先王興禮文物不使廢壞以備一王之法也賔以客禮遇之也熊去非曰此見周家忠厚之至一代之興雖改正朔易服色以示作新之政然考之詩書則一代之禮樂固未嘗廢也常服黼冔猶用商之衣冠也王訪于箕子稱十有三祀奔走臣我監稱五祀猶用商之紀年也一則曰商王士二則曰殷多士何嘗敢有一毫鄙夷之心其視後世亡人之國則絶人之祀衣冠禮樂能存先代之舊亦鮮矣此皆出於疑慮之過而不知以公天下為心者周家忠厚之澤所以為不可及也夫時王不敢變焉而亦所以為戒也王指成王也藎進也言其忠愛之篤進進無已也無念猶言豈得無念也爾祖文王也言商之子孫而侯服于周以天命之不可常也王介甫曰天嘗命商使有九有之師矣今服于周所謂靡常也故殷之士助祭於周京而服商之服也於是呼王之藎臣而告之曰得無念爾祖文王之德乎藎以戒王而不敢斥言猶所謂敢告僕夫云爾嚴氏曰不以文王為念則將墜厥緒周之孫子臣士又將服周之服而助祭于他人之廟矣此章述殷士祼將之事以為戒也襄公四年左傳注曰告僕夫不敢斥尊也愚按呼藎臣告僕夫其皆因卑達尊之義乎劉向曰孔子論詩至於殷士膚敏祼將于京喟然嘆曰大哉天命善不可不傳于後嗣是以富貴無常蓋傷微子之事周而痛殷之亡也輔氏曰殷士雖膚敏而祼將于周京天命所在不敢違也此盛德之事漢唐以下皆不及矣夫以殷士服殷之服而助祭于周焉最可念也最可警也故於此呼王之藎臣而告之使念文王之德焉劉向所述孔子之言使人讀之憂思慘怛有不能堪者蓋孔子乃殷後而向亦宗室也真氏曰以商之孫子而為周之諸侯以商之美士而奔走周廟之祭天命何常之有哉成湯惟其仁也故天命歸于商紂惟其不仁故天命轉而歸周也無念爾祖聿于筆反修厥德永言配命自求多福叶筆力反殷之未喪息浪反師克配上帝宜鑒于殷駿音峻命不易以豉反賦也聿發語辭永長配合也命天理也師衆也上帝天之主宰也駿大也不易言其難也言難保也言欲念爾祖在於自修其德而又常自省察使其所行無不合於天理則盛大之福自我致之有不外求而得矣李迂仲曰成王欲念爾祖則在乎聿修厥德而已能修德則可以長合天理而福祿自來矣孟子曰禍福無不自己求之者商自求禍周自求福耳天何容心於其間哉王介甫曰以德求福則非有待於外也嚴氏曰自求多福謂求諸已而不求諸天也又言殷未失天下之時其德足以配乎上帝矣吕東萊曰王者代天理物操興禮命討之柄以臨天下故曰配命又曰配上帝今其子孫乃如此宜以為鑒而自省焉則知天命之難保矣大學傳曰得衆則得國失衆則失國此之謂也嚴氏曰德者民之所歸得民斯得天不修厥德則失其民而天命去之故宜以殷為鑒也此章戒成王念祖而鑒殷也漢書翼奉曰成王有上賢之才因文武之業然周公猶作詩書深成成王恐易失天下書則曰王毋若殷王紂詩則曰宜鑒于殷駿命不命之不易無遏爾躬叶姑𢎞反宣昭義問有虞殷自天叶鐵因反上天之載無聲無臭叶初尤取儀刑文王萬邦作孚叶房尤反賦也遏絶宣布昭明義善也問聞通有又通虞度載事儀象刑法孚信也言天命之不易保故告之使無若付之自絶於天歐陽子曰知天命之不易無使天命至爾躬而止武王數紂云自絶于天爾林節之問無遏爾躬曰無自遏絶於躬如家自毁國有伐而布明其善譽於天下輔氏曰宣昭義問乃是接首章於昭于天與令聞不已之意不曰令聞而曰義問者所以戒成王也所為合義則譽聞自令也又度殷之所以廢興者而折之於天然上天之事無聲無臭不可得而度也惟取法於文王則萬邦作而信之矣胡庭芳曰天無聲臭之可尋文王陟降在帝左右文王即天矣但以爾祖文王為法則萬邦自孚信之天命庶乎其可保不至爾躬而遏絶也味此辭㫖凜乎其嚴哉吕與叔曰凡欲配天命者當法天然天無聲臭可求苟儀刑文王則天德全矣此萬邦所以作孚記緇衣注曰儀法文王之德而行之則天下無不信者也嚴氏曰七章申六章鑒殷法祖之意也子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已夫知天之所以為天又知文王之所以為文則夫與天同德者可得而言矣是詩首言文王在上於昭于天文王陟降在帝左右而終之以此其㫖深矣輔氏曰文王之詩七章以一章言之首尾只是言文王與天為一以一篇言之首尾亦是言文王與天為一但首章則専說文王末章則欲成王之法文王耳胡庭芳曰此篇首言文王陟降在帝左右終言天無聲臭儀刑文王天其文王乎文王其天乎愚按天髙在上而文王之神亦在上帝為天之主宰而文王之神則升降乎帝之左右是天帝所在即文王所在也何以知文王之能然哉以其與天同德而已天之德於穆不已所以為天文王之德純亦不已所以為文於穆不已者天之誠也純亦不已者文王之誠也是文王之德即天之德儀刑文王即儀刑於天也天與文王一而已矣文王七章章八句東萊吕氏曰吕氏春秋引此詩以為周公所作味其詞意信非周公不能所作也今按此詩章言文王有顯德而上帝有成命也二章言命集於文王則不唯尊榮其身又使其子孫百世為天子諸侯也三章言命周之福不唯及其子孫而又及其羣臣之後嗣也四章言天命既絶於商則不唯誅罰其身又使其子孫亦來臣服于周也五章言絶商之禍不唯及其子孫而又及其羣臣之後嗣也六章言周之子孫臣庶當以文王為法而以商為監也七章又言當以商為監而以文王為法也其於天人之際興亡之理丁寧反覆至深切矣故立之樂官而因以為天子諸侯朝㑹之樂蓋將以戒乎後世之君臣而又以昭先王之德於天下也國語以為兩君相見之樂特舉其一端而言耳輔氏曰天人之際指文王與天而言也反覆丁寧言七章相粘綴而說不一而足也周公作此本以戒成王立之樂官而因以為天子諸侯朝㑹之樂則又將以戒乎後世之君臣也愚按一章以文王之德與上帝之命對言也二章言天之命周與四章言天之絶商為對三章言命周之羣臣後嗣與五章言絶商之羣臣後嗣為對六章先言法文王後言監商七章先言監商後言法文王亦對舉而互言之周公既以文王之德播之聲詩以戒成王矣而復叶之音律下以為朝㑹通用之樂則又以告成王者告諸天後世焉其意逺矣哉然此詩之首章言文王之昭于天而不言其所以昭次章言其令聞不已而不言其所以聞至於四章然後所以昭明而不已者乃可得而見焉愚按四章所謂熙者光明也即所以昭明于天之本也所謂緝者繼續也即所以不已其聞之本也文王之生也繼續光明而不已其敬故其沒也昭明于天而不已其聞焉然亦多詠嘆之言而語其所以為德之實則不越乎敬之一字而已然則後章所謂修厥德而儀刑之者豈可以他求哉亦勉於此而已矣輔氏曰敬之一字聖學之所以為始終者又可見於此二程先生挈出此一字以詔後學其有功於聖學多矣學者舍是實無以為進德之階也愚按敬者千聖傳心之法即所謂欽也虞書五篇言欽者十有三言敬者七唐虞君臣相天傳相戒固惟在於此也故仲虺告湯亦曰欽崇道尚父告武王亦曰敬勝怠者吉是創業垂統者固在於此敬而持盈守成者尤在于此敬也然則成王所以念祖修德儀刑文王之事者誠不可以他求亦唯法文王之敬德而已又若召誥召公告王亦曰曷其奈何弗敬又曰王敬作所又曰不可不敬德又曰王其疾敬德又兩曰惟不敬厥德乃早墜厥命又曰肆惟王其疾敬德其語意尤為諄復剴切也成王之為令主也宜哉序受命作周也受命受天命也作周造周室也嚴氏曰受命作周者推本之辭也作造也造周之王業猶康誥言肇造區夏也文王之德上當天心下為天下所歸往三分天下而有其二則已受命作周矣武王繼之遂有天下亦卒文王之功而已然漢儒惑於䜟緯始有朱雀丹書之說又謂文王因此遂稱王而改元孔氏曰中候云赤雀銜丹書入豐止於昌户元命苞云鳯凰銜丹書西伯得書於是稱王改正朔誅崇侯虎胡庭芳曰文王以大聖之德宜王不王說詩者乃因小序有受命之詞又見大明云有命既集有命自天文王有聲言文王受命有此武功於是直謂文王受命改元稱王則不勝其誣也殊不知二詩所言天命文王文王受命特不過作配作邑伐崇之事初未嘗出乎侯伯職分之外也嚴氏曰天命歸於文王文王退然不敢當故泰誓牧誓猶皆不言受命至大誥武成乃曰我又考文王誕膺天命蓋武王既得天下之後推本言之中庸曰武王末受命武王末年方受命文王何嘗受命乎史遷因詩書有文王受命之語因謂文王受命稱王而斷虞芮之訟漢儒又雜以䜟緯之說則亦誣矣殊不知所謂天之所以為天者理而已矣理之所在衆人之心而已矣衆人之心是非向背若出於一而無一毫私意雜於其間則是理之自然而天之所以為天者不外是矣今天下之心既以文王為歸矣則天命將安往哉文王受命只是天下歸之書所謂天視自我民視天聽自我民聽所謂天聰明自我民聰明天明畏自我民明威皆謂此爾豈必赤雀丹書而稱王改元哉稱王改元之說歐陽公蘇氏游氏辨之已詳歐陽子曰孔子云三分天下有其二以服事殷使西伯不稱臣而稱王安能服事殷乎夷齊義士也聞西伯之賢共往歸之使西伯稱王是僣叛之國二子不以為非依之久而不去至武王伐紂始以為非不非其父而非其子此豈近於人情耶泰誓稱十有一年說者因為文王受命九年及武王居喪三年并數之爾故以西伯聽虞芮之訟謂之受命以為元年古者人君即位稱元年西伯即位久矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣而又不改元由是言之謂文王受命改元武王冒文王之元年者皆妄也游氏曰君臣之分猶天尊地卑紂未可去而文王稱王是二天子也服事殷之道固如是耶書所謂九年大統未集者後世以虞芮質成為文王受命之始故也觀武王於泰誓三篇稱文王為文考至武成而柴望然後稱文考為文王則可知矣趙氏曰按眉山二蘇氏說與歐陽氏殊不同朱子所引未知何也當考問先儒以為文王稱王曰自大史公以來皆如此說子但歐公力以為非東坡亦有一說但書說惟九年大統未集豫小子其承厥志却是有這一箇痕瑕或推泰誓諸篇皆只稱文考武成方稱王只是當初三分天下有其二以服事殷也只是羈縻那事體自是不同了去此而論則此序本亦得詩之大㫖而於其曲折之意有所未盡已論於本篇矣明明在下赫赫在上叶辰羊反天難忱市林反斯不易以䜴反維王天位殷適音的使不挾子燮反四方賦也明明德之明也赫赫命之顯也忱信也不易難也天位天子之位也殷適殷之適嗣也挾有也此亦周公戒成王之詩將陳文武受命故先言在下者有明明之德則在上者有赫赫之命達于上下去就無常嚴氏曰明明在下君之善惡不可掩也赫赫在上天之豫奪為甚嚴也在下而明明則達乎上在上而赫赫則達乎下天人相與之際甚可畏也程子曰人與天合明明在下乃其赫赫在上者也此天之所以難忱而為君之所以不易也紂居天位為殷嗣乃使之不得挾四方而有之蓋以此爾王介甫曰今紂所居之尊則天位也所傳之正則殷適也使不挾四方其不可保恃如此吕東萊曰天位殷適使不挾四方則下章所陳眷顧周家有加無已者非天私我有周也我者培之傾者覆之因其材而篤焉耳嚴氏曰首章專述天命喪殷之事摯音至仲氏任音壬自彼殷商來嫁于周曰嬪毗申反于京叶居良反乃及王季維德之行叶户郎反大音泰任有身叶户羊反生此文王賦也摯國名仲中丁仲反女也任摯國姓也殷商商之諸侯也嬪婦也京周京也曰嬪于京疊言以釋上句之意猶曰釐降二女于媯規汭嬪于虞也蔡九峯曰釐理降下也言堯治裝下嫁二女于媯汭使為舜婦于虞氏之家也王季文王父也身懷孕也將言文王之聖而追本其所從來者如此蓋曰自其父母而已然矣曹氏曰摯仲氏任繫於姓而言之以為王季之配也今曰大任繫其子而言之以為文王之母也目列女傳曰大任端一誠莊惟德之行及其娠文王不視惡色耳不聽淫聲口不出敖言生文王而明聖大任教之以一而識百卒為周宗君子謂大任為能胎教輔氏曰維德之行所謂以成德為行也只此一句足以盡王季大任之事可謂辭約而義博也嚴氏曰次章述大任生文王也劉執中曰乾健而不息坤順以相承物理自然也王季有大任以配其德故克生文王焉陳夀翁曰聖賢之生不偶然也有配偶之賢而後有嗣續之賢故詩推本聖賢之生往往自其所從來如生民言稷而及姜嫄此言文王而及大任下章言武王而及大姒皆是也其意深矣維此文王小心翼翼昭事上帝聿懷多福叶筆力反厥德不回以受方國叶越逼反賦也小心翼翼恭慎之貌即前篇之所謂敬也文王之德於此為盛昭明懷來回邪也方國四方來附之國也輔氏曰前篇釋厥猶翼翼為勉敬此篇說小心翼翼為恭慎其義雖一而有在臣在君之不同此須是以心體之則自見其有廣狹也昭事上帝言文王之敬洞洞屬屬終日對越上帝也如此則盛大之福自然來集而文王之敬直上直下更無回曲之時所以又能受四方來附之國也一有回曲則此心便息此理便絶天人上下皆不相管攝矣嚴氏曰三章言文王之德天人所與也小心恭敬明事上帝至誠之運與天周旋也遂能懷來多福蓋其德不邪故能受此四方侯國之歸有一毫覬幸之心則邪矣天監在下有命既集叶昨合反文王初載天作之合在洽之陽在渭之涘音士叶羽已反文王嘉止大邦有子叶奬禮反賦也監視集就載年合配也洽水名本在今同州郃音洽陽夏陽縣今流已絶故去水而加邑渭水亦徑此入河也嘉婚禮也大邦莘國也子大姒也將言武王伐商之事故此又推其本而言天之監照實在于下其命既集於周矣故於文王之初年而默定其配所以洽陽渭涘王氏曰莘國所在也當文王將婚之期而大邦有子也蓋曰非人之所能為矣嚴氏曰四章述天生大姒以配文王也愚按二章言王季大任之德以及文王故言自其父母而已然此言天命既集天作之合故以為非人之所能為然則六章之所以篤生武王者又豈人之所能為哉大邦有子俔牽遍反天之妹文定厥祥親迎魚敬反于渭造舟為梁不顯其光賦也俔磬也韓詩作磬說文云俔譬也孔氏曰如今俗語譬喻物曰磬作然也文禮祥吉也言卜得吉而以幣帛之禮定其祥也王氏曰譬天之妹言其德可以繼天也上天之載無聲無臭儀刑文王萬邦作孚然則非德可以繼天孰能為之既大姒能為之配故備其禮以定其祥程子曰先儒以親迎于渭謂天子類親迎文王親迎時乃為公子未為君也況周國自在渭旁不是出疆造作梁橋也作船於水比之而加版於其上以通行者即今之浮橋也傳曰天子造舟諸侯維舟大夫方舟士特舟爾雅注曰造舟比船為橋維舟維連四船方舟併兩船特舟單船張子曰造舟為梁文王所制而周世遂以為天子之禮也嚴氏曰五章述文王親迎之事也有命自天命此文王于周于京叶居良友纘子管反女維莘所中反長丁丈反子維行叶户郎反篤生武王保右音祐命爾燮伐大商賦也纘繼也莘國名長子長女大姒也行嫁篤厚也言既生文王而又生武王也王介甫曰生文王又生武王是之謂篤中庸曰天之生物必因其材而篤焉饒氏曰文王生于祖甲之三十一年武王後文王二十年生是商道始微之際二人已生矣右助燮和也胡庭芳曰陳氏云燮有和順之意言天既命文王於周之京矣而克纘大任之女事者維此莘國以其長女來嫁於我也丘氏曰將言篤生武王之事故又本而發之天又篤厚之使生武王保之助之命之而使之順天命以伐商也輔氏曰天監在下有命既集言其始也有命自天命此文王言其終也篤生謂天地儲蓄其精氣之厚也天之生聖人者其用力多矣既以篤生之故保護之右助之所謂哉者培之所以命之燮伐大商也征伐本非和者之事而曰燮伐者所謂剛中而應行險而順者也大其商所以大文武之事也王介甫曰言大商則乃所以大文武之德以為商大矣非德大則不能燮伐也嚴氏曰因天人之所欲是之謂燮伐此章述大姒生武王也劉辰翁曰燮伐者當伐則伐也古人厚故稱大商殷商之旅其㑹如林矢于牧野維豫侯興叶音歆上帝臨女音汝無二爾心賦也如林言衆也書曰受率其旅若林矢陳也牧野在朝歌南七十里侯維二疑也爾武王也此章言武王伐紂之時紂衆㑹集如林以拒武王而皆陳于牧野則維我之師為有興起之勢耳然衆猶恐武王以衆寡之不敵而有所疑也故勉之曰上帝臨女毋二爾心蓋知天命之必然而贊其決也然武王非有所疑也設言以見衆心之同非武王之得已耳吕東萊曰紂以如林之衆來戰武王苟較强弱而計衆寡其心必疑矣然當是時武王方一心以奉天討若上帝實臨之較計之私豈得而容哉此蓋設為勉之之詞以形容武王奉天討之心也輔氏曰上帝臨女無二爾心女與爾雖皆指武王其實則是設言以見衆心之同非武王之得已也然辭意嚴恪洋洋乎如在其上如在其左右學者當常常涵泳此二句以存心飬性而事天也愚按武王誓師曰受有臣億萬惟億萬心豫有臣三千惟一心商罪貫盈天命誅之又曰朕夢協朕卜襲于休祥戎商必克又曰雖有周親不如仁人觀是語也則武王固知上帝之監臨矣固知衆寡之不足疑矣嚴氏曰七章述武王伐商也牧野洋洋檀車煌煌駟騵音元彭彭叶鋪郎反維師尚父時維應揚涼音亮彼武王肆伐大商㑹朝清明叶謨郎反賦也洋洋廣大之貌檀堅木宜為車者也煌煌鮮明貌駵馬白腹曰騵孔氏曰檀弓亦言戎事乘騵因武王所乘遂為一代常法彭彭强盛貌師尚父大公望為大師而號尚父也鷹揚如鷹之飛揚而將擊言其猛也涼漢書作亮佐助也王莽傳注曰亮助也肆縱兵也㑹朝㑹戰之旦也此章言武王師衆之盛將帥之賢鄭氏曰戰地寬廣兵車鮮明馬又强盛尚父佐文王為之上將伐商以除穢濁不崇朝而天下清明孔氏曰王肅云不崇朝而殺紂天下乃大清明無復濁亂彭氏曰當癸亥之夕俟天休命之前猶有如陰曀之中及甲子昧爽一戰之後民情大悅向者昏亂穢濁之氣一洗而出之豈不快哉愚按天下本清而紂汨濁之故伯夷太公避之以待其清及去紂則源清而流悉清矣故武王泰誓以永清四海為己任詩人歌之亦以㑹朝清明歎其扶亂反正之神速蓋知其心唯在於清四海而已所以終首章之意也嚴氏曰八章終上章伐紂之事也陳夀翁曰篇首之明明以德之明言之也篇末之清明以治象之明言之也此名篇所以言明也然不崇朝而天下清明非德之明者能之乎愚按此章可以見天位殷適而不挾四方焉可以見天之難信而為君之不易焉又可以見有明明之德則有赫赫之命焉首章開其端此章終其意唯以紂與武王觀之則成王之所當監者大豈逺哉大明八章四章章六句四章章八句名義見小旻篇李迂仲曰大雅之詩則謂之大明小雅之詩則謂之小明一章言天命無常惟德是與二章言王季大任之德以及文王三章言文王之德四章五章六章言文王大姒之德以及武王七章言武王伐紂八章言武王克商以終首章之意嚴氏曰首章泛言天人之理見殷亡之由為美文王張本次章乃述大任生文王其後乃又述文王生武王及伐殷之事以成首章之意其言皆有次序也輔氏曰君有明德則天有明命有王季文王則有大任大姒有王季大任則有文王有文王大姒則有武王有武王之君則有太公之臣讀大明之詩則當知天人夫婦父子君臣之際安危治亂廢興存亡之機如影響形聲之相似皆非苟然也其章以六句八句相間又國語以此及下篇皆為兩君相見之樂說見上篇愚按事見外傳魯語叔孫穆子之言也序文王有明德故天復命武王也此詩言王季大任文王大姒武王皆有明德而天命之非必如序說也綿綿瓜瓞田節反民之初生自土沮七余反漆音七古公亶都但反父音甫陶音桃復音福陶冗叶户橘反未有家室比也綿綿不絶貌大曰瓜小曰瓞瓜之近本初生者常小其蔓不絶至末而後大也民周人也自從土地也沮漆二水名在豳地古公號也亶父名也或曰字也後乃追稱大王焉趙氏曰古公猶言先公也蓋未追王前之本號古公當殷末時猶尚質故亶父以名言陶窰竈也孔氏曰陶瓦器竈也蓋以陶去其土而為之故謂之陶復重窰也冗土室也家門內之通名也豳地近西戎而苦寒故其俗如此此亦周公戒成王之詩追述大王始遷岐周以開王業愚按八章以上所言是也而文王因之以受天命也愚按八章以下所言是也此其首章言瓜之先小後大以比周人始生於漆沮之上曹氏曰公劉以前微弱甚矣僅能不絶其緒故以綿綿况之王介甫曰周國嘗幾亡矣其後土漆沮而國復興故以為民之初生也孔氏曰周語云我先王不窋用失其官而自竄於戎狄之間公劉之篇說公劉適邠其言甚詳蓋不窋已嘗失官逃竄至公劉往居焉愚按周人之生盛於岐周豐鎬之時而始於公劉居邠之日公劉以前固生於后稷而不窋奔竄周民幾無生矣故厥初生民時維姜嫄此一初也民之初生自土沮漆又一初也而古公之時居於窰竈土室之中其國甚小至文王而後大也嚴氏曰首章述大王初居邠之事也古公亶父來朝走馬叶滿補反率西水滸呼五反至于岐下叶後五反爰及姜女聿來胥宇賦也朝早也走馬避狄難也吕東萊曰來朝走馬形宅容其初遷之時略地相精神風采也滸水崖也漆沮之側也岐下岐山之下也姜女大王妃也胥相去聲宇宅也孟子曰大王居邠狄人侵之事之以皮幣珠玉犬馬而不得免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市皮謂虎豹麋鹿之皮也幣帛也屬㑹集也土地本生物以養人今爭地而殺人是以其所以養人者害人也邑作邑歸市人衆而爭先也張南軒曰大王於狄人事以皮幣大馬珠玉本期以保民也而狄人侵陵不已是欲吾土地也曰君子不以其所養人者害人其言何其忠厚而不迫邪人王之遷本以全民不敢必民之歸而强民以徙特曰二三子何患乎無君此天地之心真保民之王也民心自不庸釋乎大王非特斯言有以感動之蓋民之戴其仁有素矣曰如歸市以見其誠心樂趨無一毫强勉之意也張子曰書稱大王肇基王迹蓋見得民心之始也方其去邠民皆㩗持而隨之固未嘗率之也王迹之始莫大於此蓋民歸之則天命之矣周原膴膴音武堇音謹荼如飴音移爰始爰謀叶謨悲反爰契苦計反我龜曰止曰時築室于兹叶津之反賦也周地名在岐山之南廣平曰原膴膴肥美貌堇烏頭也荼苦菜蓼屬也飴餳夕清反也本草曰烏頭與附子同根形似烏鳥之頭蜀人謂烏頭苗為堇草孔氏曰餳乾糖也契所以然火而灼龜者也儀禮所謂楚焞音寸又音暾是也孔氏曰春官菙氏掌共燋契以待卜事注云士喪禮曰楚焞置于燋在龜東楚焞即契也楚荆也卜者以楚焞之木燒之於燋炬之火既然執之以灼龜菙垂上聲燋音爵或曰以刀刻龜甲欲鑽之處也前漢書注曰契刻也詩曰爰契我龜言刻開之灼而卜之挈音契言周原土地之美雖物之苦者亦甘於是大王始與豳人之從已者謀居之又契龜而卜之嚴氏曰爰始謀及乃心也爰謀謀及卿士庶人也契龜謀及卜筮也林氏曰大王遷岐衛文遷楚丘未嘗不卜然君臣既有定議乃卜洪範所以先乃心卿士庶人而後卜筮也杜氏曰言先人事後卜筮既得吉兆乃告其民曰可以止於是而築室矣或曰時謂土功之時也王介甫曰曰止則命其臣民止於兹也曰時則命其臣民以土功之時也既命以土功之時遂築室也嚴氏曰三章述大王定宅於歧也乃慰乃止乃左乃右叶羽已反乃疆乃理乃宣乃畝叶滿彼反自西徂東周爰執事叶上止反賦也慰安止居也左右東西列之也孔氏曰據公宫在中民居左右故王肅云乃左右開地置邑以居其民疆謂畫其大界理謂别其條理也也宣布散而居也或曰導其溝洫也畝治其田疇也自西徂東自西水滸而徂東也周遍也言靡事不為也輔氏曰第一二句則民居各有定而得以營立矣三四句則民田各有分而得以耕治矣五六句總言其從西水滸而徂東凡經始之事所當為者無不盡也孔氏曰言築室耕田無不勸樂也嚴氏曰四章述定民居治田畝也乃召司空乃召司徒俾立室家叶古胡反其繩則直縮色六反版以載叶節力反作廟翼翼賦也司空掌營國邑司徒掌徒役之事孔氏曰司空之屬有匠人掌營國廣狹之度廟社朝市之位司徒之屬有小司徒凡用衆庶則掌其政教曹氏曰量地以制邑度地以居民司空之職故先召之致衆庶令徒役司徒之職故次召之繩所以為直凡營度位處皆先以繩正之既正則東板而築也孔氏曰位處者即匠人所謂左祖右社面朝後市之類是也社人君國都如井田樣畫為九區而朝背市左祖右中間一區則君之宫室宫室前一區為外朝凡朝㑹藏庫之屬皆在焉後一區為市市四面有門左右各三區皆民所居而外朝一區左則宗廟右則社稷焉此國君都邑規模之大概也縮束也載上下相承也言以索束版投土築訖則升下而上以相承載也劉執中曰築宗廣之垣墉墻壁也君子將營宫室宗廟為先廄庫為次居室為後翼翼嚴正也曹氏曰此章俾立室家則定其規模而已若其營作則先於廟故其序如此嚴氏曰五章述將營宫室先作宗廟也劉執中曰二章言遷三章四章言先營民之居處授民之耕種此章始營公室焉救音俱之陾陾耳升反度待洛反之薨薨築之登登削屢馮馮扶氷反百堵丁古反皆興鼛音臯鼓弗勝音升賦也救盛土於器也陾陾衆也度投土於版也薨薨衆聲也登登相應聲削屢墻成而削治重復也馮馮墻堅聲蘇氏曰既成而削之其聲馮馮然堅也劉執中曰謂墻成脫版削其堅凸以就平直凸音迭五版為堵興起也此言治宫室也鼛鼓長一丈二尺以鼓役事弗勝者言其樂事勸功鼓不能止也考索曰古人云以鼛鼓鼓役事春秋傳云魯人之臯蓋臯者緩也役事以弗亟為義故以臯鼓節之古者上之使下以仁常欲緩而不迫故名鼓以臯下之事上以義常欲敏而有功以鼓節之而弗止故曰鼛鼓弗勝嚴氏曰六章述作宫室也愚按古人以墻為壁故於作室多言版築之事乃立臯門臯門有伉苦浪反叶苦郎反乃立應門應門將將七羊反乃立冡土戎醜攸行叶户郎反賦也傳曰王之郭門曰臯門伉髙貌王之正門曰應門將將嚴正也大王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉書言天子有應門春秋書魯有雉門禮記云魯有庫門家語云衛有庫門皆無云諸侯有臯應者則臯應為天子之門明矣胡庭芳曰毛氏因戴記明堂位言魯以庫門為天子臯門雉門為天子應門遂謂天子郭門為臯正門為應而諸侯門當名庫雉朱子取毛說證之書春秋禮記家語而斷之曰大王初作臯應二門後尊為天子之制諸侯不得立焉當矣考索曰天子五門臯者逺也明最在外故曰臯庫門則有藏於此故也雉門者取其文明也應門者則居此以應治也路門則取其大也此五門各有其義然書又在畢門南門則路門之别名也周禮又有中門則雉門之别名也爾雅有正門則應門之别名也若諸侯三門鄭氏以為庫雉路也冡土大音泰社也亦大王所立而後以為天子之制也大王立歧周之社武王既有殷國遂通立周之社於天下以為大社猶漢初今民立漢社稷也王介甫曰宗廟宫室內事也自內及外故於卒言立冡土也戎醜大衆也起大事動大衆必有事乎社而後出謂之宜輔氏曰戎醜攸行便帶了下章伐昆戎之意二門既立而大社遂立大社既立而大衆攸行周家之勢至是蓋勃勃然有不可得而禦者矣昆夷其得而不服哉百堵皆興鼛鼓弗勝則人心之樂事勸功可知矣乃立冢土戎醜攸行則征伐之事蓋有不容已者矣孔氏曰宜祭社之名也嚴氏曰七章言作門社也愚按上四章之序營立宗廟居室社稷皆在居民之後先王重民之意如此蓋國以民為本也肆不殄田曲反厥愠紆問反亦不隕韻敏反厥問柞子洛反棫音域拔蒲貝反矣行道兑吐外反矣混音昆夷駾徒對反矣維其喙吁貴反矣賦也肆故今也猶言遂也承上起下之辭殄絶愠怒隕墜也問聞通謂聲譽也柞樂也枝長葉盛叢生有刺棫白桵緌也小木亦叢生有刺爾雅注曰實如耳璫紫赤可啖拔挺拔而上不拳曲䝉密也兑通也始通道於柞棫之間也駾突喙息也吕與叔曰喙張喙而息也奔趨者其狀如此言大王雖不能殄絶混夷之愠怒亦不隕墜已之聲聞蓋雖聖賢不能必人之不怒已但不廢其自修之實耳輔氏曰肆不殄厥愠不責夫人之厲已也亦不殞厥問唯盡夫自治之道而已若專於治人而不反之身與雖務反身而不免責於人者皆非聖人事也自修之實而但言其聲問者有其實則有其名也其與後世所謂以虛聲恐喝之者不同矣然大王始至此歧下之時林木深阻人物鮮少至於其後生齒漸繁歸附日衆則木拔道通昆夷畏之而奔突竄伏維其喙息而已輔氏曰四箇矣字可見不期然而然之意言德盛而混夷自服也蓋已為文王之時矣吕東萊曰此章或以為專指大王或以為專指文王義皆未安孟子曰文王事昆夷文王猶事昆夷則大王安得有昆夷駾矣維其喙矣之事乎皇矣曰帝省其山柞棫斯拔松柏斯兑帝作邦作對自大伯王季然則柞棫柭行道兑安可指為文王之時乎蓋總叙周家王業積施屈伸之理始於大王而終於文王耳嚴氏曰八章言大王文王調服昆夷也陳氏謂孟子借此章首二句以說文王鄭氏踵之遂誤専以為文王之詩焉愚按下章之首即言虞芮質成之事則此章之末固通文王而言矣蓋其始也昆夷不服而大王不墜其聞及其終也文王德盛而昆夷自服一章之間神祖聖孫實相首尾集傳既曰大王始至又曰至於其後又曰已為文王之時則其歷年亦久矣若以皇矣三章及天作之頌證之則此章通言大王王季文王之事明矣虞芮如鋭反質厥成文王蹶居衛反厥生叶桑經反豫曰有疏附叶上聲豫曰有先息薦反後胡豆反叶下五反豫曰有奔奏與走通叶宗五反豫曰有禦侮賦也虞芮二國名質正成平也嚴氏曰曲直得其平則無爭也傳曰虞芮之君相與爭田久而不平乃相與朝周入其境則耕者讓畔行者讓路熊剛大曰畔謂田之疆界讓畔則兩界之地耕墾皆不及讓路如少避長賤避貴之類入其邑男女異路孔氏曰邑謂城中如王制云道路男子由右女人由左注云以為地道尊右故也斑白不提挈孔氏曰年老其髮白黑雜提挈有少者代之也入其朝士讓為大夫大夫讓為卿熊剛大曰古者任官必推其人才可以為卿則為卿才止於大夫者不敢居卿之位可以為大夫則為大夫才止於士者不敢居大位之位無躁競之風有遜讓之實三國之君感而相謂曰我等小人不可以履君子之境乃相讓以其所爭田為閒田而退天下聞之而歸者四十餘國熊剛大曰被文王之化自然興起而歸附之三分天下有其二而說者以虞芮質成之年為文王受命之年亦以此歟胡庭芳曰來歸者四十餘國要亦道化之所漸被非謂有其疆土版圖也蘇氏曰虞在陜之平陸芮在同之馮翊平陸有閒原焉則虞芮之所讓也曹氏曰虞芮皆在歧周之東蹶生未詳其義或曰蹶動而疾也生猶起也蹶動也生是興起之意當是一日之間虞芮質成而來歸者四十餘國其勢張盛忽然見之如跳起豫詩人自豫也率下親上曰疏附相道前後曰先後喻德宣譽曰奔走孔氏曰喻天下以王德宣揚王之之聲舉使天下皆奔走而歸趨武臣折衝曰禦侮孔氏曰武力之臣能折止敵人之衝突者言昆夷既服而虞芮來質其訟之成於是諸侯歸周者衆張子曰虞芮質厥成訟獄者不之紂而之文王又曰文王之於天下惟知正己而物正也河內諸侯歸之猶不知怪今河外諸侯亦來獄訟故以此為纍而身甚危也易云其文王與紂之事邪是故其辭危此其時也家語子曰文王之道其不可加焉不令而從不教而聽至矣哉而文王由此動其興起之勢是雖其德之盛然亦由有此四臣之助而然故各以豫曰起之其辭繁而不殺者所以深歎其得人之盛也輔氏曰質虞芮之訟初非期於興起也而其興起之勢蹶然而動焉此聖人之事也然亦豈一己所能獨致哉故周公以為四臣之助為多其辭諄復深嘆其得人之盛其意深矣其所以戒成王亦切矣所謂四臣者謂有此四等之臣耳因非止為四人而已也綿九章章六句一章言在豳二章言至岐三章言定宅四章言授田居民五章言作宗廟六章言治宫室七章言作門社八章言至文王而服混夷孟子曰肆不殄厥愠亦不隕厥問文王也集注曰本言大王事昆夷雖不能殄絶其愠怒亦不自墜其聲問之美孟子以為文王之事可以當之九章遂言文王受命之事愚按所謂受命者蓋諸侯歸文王則文王於天命似有不得而辭者矣然亦推原之詞耳非謂其有改元稱王之事也餘說見上篇輔氏曰以上三篇皆周公作以戒成王之詩文王則專美文王之德大明則追述王季大任文王大姒以及武王之德綿則又追述大王大姜文王之德而其意則藎歷述其先王積纍德業之盛耳以見成王之任大責重不可不謹戒而保守之序文王之興本由大王也彭氏曰周之得天自之文王之得民始民心歸周自大王之得民始故序言文王之事本由大王而一詩之意大要主民而言也曹氏曰書所謂大王肇基王迹是也陳夀翁曰王迹肇基於大王而王業漸大於文王此追王所以自大王始而此詩推本文王之受命亦自大王之遷岐始也然言文王受命唯至于虞芮質成者蓋人心所歸即天命所在也芃芃薄紅反棫雨逼反朴音卜薪之槱音酉之濟濟子禮反辟音壁王左右趣叶此苟反之興也芃芃木盛貌朴叢生也言根枝迫迮音窄相附著直略反也槱積也嚴氏曰積以侍其乾而用之濟濟容貌之美也辟君也君王謂文王也此亦以詠歌文王之德言芃芃棫朴則薪之槱之矣濟濟辟王則左右趣之矣蓋德盛而人心歸附趣向之也濟濟辟王左右奉璋奉璋峩峩五歌反髦士攸宜叶牛何反賦也半圭曰璋祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉孔氏曰玉人云大璋中璋邊璋皆是璋瓉也郊特牲曰灌以圭璋故知璋為璋瓉祭統云君執圭瓉祼尸大宗伯執璋瓉亞祼小宰云凡祭祀贊祼將之事是助行祼事非獨一人左右奉之其判在內亦有趣向之意峩峩盛壯也錢氏曰衣冠偉壯之貌髦俊也輔氏曰此章則因首章所言而賦以足成其意後髦之士至誠一意於奉璋助祭之時峩峩然無不得其所宜此則尤可見其趣向之意先生謂左右之奉璋瓉其判在內亦有趣向之意則此章雖是賦體而亦兼興意也渒匹世反彼涇音經舟蒸徒楫音接叶籍入反之周王于邁六師及之興也渒舟行貌涇水名王介甫曰涇在周地興所見也蒸衆楫櫂于往邁行也六師六軍也嚴氏曰文王未有六軍以大雅皆述王者之事故言六軍言渒彼涇舟則舟中之人無不楫之周王于邁則六師之衆追而及之蓋衆歸其德不令而從也陳氏曰汲汲然而及之不待戒命而至輔氏曰此章又見不徒奉璋助祭之士歸向之如此至於文王一有所往則六軍之衆亦必追而及之則人心之歸向又可見矣是于邁謂有所征往也如伐崇與密須及戡黎之事皆也助祭內事也于邁外事也或外或內而人心之歸向無異焉則文王之振作綱紀之道至矣故下兩章遂言之倬陟角反彼雲漢為章于天叶鐵因反周王夀考遐不作人興也倬大也雲漢天河也在箕斗二星之間其長竟天爾雅往曰箕龍尾斗南斗天漢之津梁也章文章也文王九十七而終故言夀考遐與何同遐古注并諸家皆作逺字甚無道理禮記注訓胡字甚好劉良翁曰遐不何不也作人謂變化鼓舞之也鼓之舞之之謂作如擊鼓然自然使人跳舞踴躍曹氏曰作者鼓舞振動之意商之末世士氣卑弱甚矣非鼓舞振動之烏能自奮而有成哉人此章只是說雲漢為章于天周王夀考豈不能作也上二句皆是引起下面說略有些意思傍著不須深求只如此讀過便得輔氏曰此章方言人心之所以歸向于文王者又王能有以振作之故也作人非一日偶然之可為也必積纍漸漬之久乃底于成故曰周王夀考遐不作人先生嘗語學者曰此等語言自有箇血脈流通但涵詠久之自然見得條暢浹洽不必多引外來道理言語却壅滯了詩人活底意思也周王既是夀考豈不作成人才此事已自分明更著箇倬彼雲漢為章于天喚起來便愈見活潑潑地此六義所謂興也興乃興起之義凡言興者皆當以此例觀之易以言不盡意而立象以盡意蓋亦如此嚴氏曰雲嘆倬然明大為文章于天矣文王自少至老所以興起人者多矣人心之善作之則興凡自暴自棄習俗益流于下者由上之人無以興起之耳故孟子曰待文王而后興者凡民也蓋人同此心心同此理非外立一道以强其所無特作而興之使之自不能已不知所以然而然如樂則生矣生則烏可已不知手之舞之足之蹈之也陳少南曰聖人久于其道而天下化成也追對回反琢陟角反其章金玉其相勉勉我王綱紀四方興也追雕也金曰雕玉曰琢孔氏曰此經上下相成所追琢者即金玉也相質也勉勉猶言不已也凡網罟張之為綱理之為紀孔氏曰綱者綱之太繩舉綱為張綱之目故張之即為綱紀者别理絲縷故理之為紀劉辰翁曰綱紀是作人之意追之琢之則所以美其文者至矣金之玉之則所以美其質者至矣勉勉我王則所以綱紀乎四方者至矣遐不作人只是說他鼓舞作興底事功夫細密處又在此一章如曰勉勉我王綱紀四方四方都在他線索內牽著都動文蔚曰勉勉却是純亦不已否曰然如追琢其章金玉其相是那工夫到後文章真箇是盛美資質真箇是堅實所吳伯豐問傳曰追琢其章所以美其文金玉其相以美其質然不知所美之人為誰先生曰追琢金玉以興我王之勉勉爾夫文王能自追琢而至于有其文章能自金玉而至于成其美質則其所以自勉自治者極其深厚矣故詩人贊詠之曰勉勉我王所以綱紀四方者至矣綱謂張設之紀謂經理之也嚴氏曰文王作成人才而提綱領以振起之外則追琢之使有成器之文內則金玉之使有可貴之質作人之功如此文王則勉勉不已以維持四方而綱紀之也棫朴五章章四句此詩前三章言文王之德為人所歸後二章言文王之德有以振作綱紀天下之人而人歸之輔氏曰四章言振作五章言綱紀振作謂變化鼓舞之不容怠廢也綱紀謂統括維繫之不容渙散也此天下之人奉璋之士六軍之衆四方之民所以無不歸附趣向之也愚按一章二章則言左右近臣歸向文王三章則言六軍之衆歸向文王也四章言文王振作天下之人也五章言文王綱紀天下之人也然歸向之者不離于前後左右則其振作綱紀于人者無不至也振作綱紀之者至于久逺則其歸向之者益以衆也自此以下至于假樂皆不知何人所作疑多出於周公也序文王能官人也序誤瞻彼旱麓音鹿榛楛音户濟濟子禮反豈弟君干祿豈弟興也旱山名嚴氏曰不知山所在闕之可也麓山足也榛以栗而小楛似荆而赤濟濟衆多也豈弟樂易也君子指文王也此亦以咏歌文王之德言旱山之麓則榛楛濟濟然矣豈弟君子則其干祿也豈弟矣干祿豈弟言其干祿之有道猶曰其爭也君子云爾彭氏曰吕氏云旱麓之木所以濟濟者非有藝植灌溉之勤特不使戕之者至焉耳君子福祿之盛者非致力于其間也特以豈弟保其所有而已此所謂干祿豈弟也六章始末皆言豈弟干祿不中變而之他也陳氏曰君子求福也亦樂易而已其諸異乎人之求歟嚴氏曰豈弟者德盛仁熟和順充積之謂也干祿非文王之心詩人言干祿者謂在我有以致之猶曰自求多福非有心求之也首章言文王受祿以德也輔氏曰樂易則無汲汲勞苦之意蓋優游寬裕以自盡其在我之理而已是非有意于干祿也自詩人詠歌之則以為得所以干祿之道云耳瑟所乙反彼玉瓚才旱反黃流在中豈弟君子福祿攸降叶乎攻反興也瑟縝密貌玉瓚圭瓉也以圭為柄黃金為勺青金為外而朱其中也孔氏曰圭以玉為之指其體謂鬯之玉瓉據成器謂之圭瓉瓉盛酒以黃金為勺有鼻口酒從中流出玉人云祼圭尺有二寸有瓉以祀宗廟典瑞注引漢禮瓉槃大五升口徑八寸下有槃口徑一尺則瓉如勺為槃以承之也黃流鬱鬯也釀秬黍為酒築鬱金煮而和之使芬芳條鬯以瓉酌而祼之也孔氏曰秬黑黍一秠二米者也讓秬為酒以鬱金和之草名鬱金則黃如金色酒在器流動故曰黃流周禮鬱人掌和鬱鬯注鬱草名十葉為貫百二十貫為築以煮之鐎中秬鬯是不和鬱者本草注曰鬱金草其花十二葉為百草之英三月有花狀如紅藍煮之用為鬯合而釀酒以降神也攸所降下也言瑟然之玉瓉則必有黃流在其中豈弟之君子則必有福祿下其躬明寶器不薦于䙝味而黃流不注于瓦缶則知盛德必享于祿夀而福澤不降于淫人矣嚴氏曰言各以類應也次章言盛德必得其福輔氏曰此又承上章言豈弟君子則福祿自然降下其躬蓋亦不待乎求之之意鳶弋専反飛戾天叶鐵因反魚躍于淵叶一均反豈弟君子遐不作人興也鳶鴟類戾至也李氏曰抱朴子曰鳶之在下無力及至乎上聳身直翅而已蓋鳶之飛全不用力亦如魚躍怡然自得而不知其所以然也遐何通言鳶之飛則戾于天矣魚之躍則出于淵矣豈弟君子遐不作人乎言其必作人也張子曰鳶飛魚躍物樂其生豈弟君子遐不作人乎嚴氏曰三章言作人之妙也鳶飛魚躍言天壤之內莫不自得其性而不知所以然也豈弟文王何不作人乎言必有以興起之而使之不自已也謝上蔡曰鳶飛戾天魚躍于淵猶韓愈謂魚川泳而鳥雲飛上下各得其所也詩人言如此氣象周家作人似之輔氏曰棫朴之詩言文王德盛而人心自然歸向之草麓之詩言文王之德盛而上天自然福祿之如此則棫朴之詩言作人可也而旱麓亦言作人之事者何哉愚讀洪範五皇極章有曰皇建其有極斂時五福用敷錫厥庶民蓋言人君能建其極則為五福之所聚而又有使民觀感而化焉則是又能布此福而與其民也大抵其一章首尾皆以成就天下人才為說由是推之則旱麓之詩亦以作人為言者亦宜矣蓋聖人之得名位者豈以其身自斂其福祿哉必使天下之人各羞其行而邦其昌然後為福也清酒既載叶節力反騂息營反牡既備叶蒲北反以享以祀叶逸織反以介景福叶筆力反賦也載在尊也備全具也承上章言有豈弟之德則祭必受福也李迂仲曰君子之受福豈以騂牡之故而得之哉古人奉牲以告所謂馨香無讒慝也故有豈弟之德則受福嚴氏曰四章述祭則受福也瑟彼柞棫民所燎力召反矣豈弟君子神所勞力報反矣興也瑟茂密貌愚按上章玉瓉故言縝密此章柞棫故言茂密燎爨也或曰熂音係燎除其旁草使木茂也程子曰今人種榆亦焚之使茂嚴氏曰箋以為柞棫所以茂者乃人熂燎除其旁草治之使無害不若若以為民取以供燎不費詞也勞慰撫也孔氏曰上言祭以受福此言得福之事君子所以得福者正以為神所勞來輔氏曰此章又承上章而言豈弟君子必為神所慰撫則祭必受福亦其宜也嚴氏曰五章言受福之本也莫莫葛藟力執反施以豉反于條枚莫回反豈弟君子求福不回興也莫莫盛貌回邪也鄭氏曰言樂易君子其求福修德以俟之不為回邪之行以要之嚴氏曰六章言求福之心也文王樂易求福不回表記言得之自是不得自是以聽天命遂引此章蓋有一毫覬幸之心則邪矣旱麓六章章四句陳夀翁曰詩有玉瓉福祿享祀也神勞等語疑此祭而祝嘏之詩序受祖也周之先祖世修后稷公劉之業大王王季申以百福干祿焉序大誤其曰百福干祿者尤不成文理思齊側皆反大音泰任文王之母莫後反思媚美記反周姜京室之婦房九反大同上姒嗣徽音則百斯男叶尼心反賦也思語辭齊莊媚愛也周姜大王之妃大姜也京周也大姒文王之妃也孔氏曰大姜大任大姒皆稱大明皆尊而稱之唯武王之妃邑姜不稱大蓋避大姜故也徽美也百男舉成數而言其多也按春秋傳云管蔡郕霍魯衛毛聃郜雍曹滕畢原豐邭文之昭也并伯邑考武王十八人然此特其見于書傳者耳亦可見其多矣此詩亦歌文王之德而推本言之曰此莊敬之大任乃文王之母實能媚于周姜而稱其為周室之婦王介甫曰齊者母道也媚者婦道也為人母盡母道為人婦盡婦道者大任也至於大姒又能繼其美德之音而子孫衆多上有聖母所以成之者逺內有賢妃所以助之者深也李迂仲曰觀列女傳載胎教則文王由大任而成德可知矣劉辰翁曰母妻如此所以有文王也美之至也輔氏曰棫檏詩言文王德盛而人歸之旱麓言文王德盛而天福之思齊又推本而言文王之所以德盛者由聖母賢妃成之之逺助之之深而然也陳少南曰此詩言文王之聖本于大任大姒或曰使文王以頑為父以嚚為母將不得其聖乎曰瞽叟頑嚚舜之所以始而終之者孝也舜終不倦而瞽叟豫此舜之所以聖也舜文王一也文王處其易舜處其難文王處君臣之難舜處其易惠于宗公神罔時怨神罔時恫音通刑于寡妻至于兄弟以御牙嫁反于家邦叶卜工反賦也惠順也宗公宗廟先公也恫痛也刑儀法也陳君舉曰古人于夫婦之分極加嚴焉刑於寡妻刑于二女刑之一言蓋其法近於忍不止于巽與也王晦叔曰大姒雖賢非文王有以儀刑之豈能全此婦德之懿乎寡妻猶言寡小君也御迎也嚴氏曰御鄭讀如字訓治也孔氏曰王肅云以迎治天下國家言文王順于先公而鬼神歆之無怨恫者其儀法內施於閨門而至于兄弟以御于家邦也吕東萊曰毫髮不愧于隱微然後近者孚故神罔怨恫始可以刑于寡妻兄弟輔氏曰此章則言文王之德足以和神人治國家以足前章之意其序則先尊而後卑先親而後疏也彭氏曰某氏云文王上順其先公推其心以事天地鬼神而無有怨恫下治其室家推其道以御宗族邦國而無有不順言文王之治自其近者始而皆一道也孔子曰家齊而后國治愚按大學傳齊家治國章三引詩文始言家人次言兄弟終言四國朱子亦嘗謂即刑寡妻至兄弟御家邦之意孟子曰言舉斯心加諸彼而已張南軒曰文王之刑寡妻至兄弟御家邦亦舉斯心加諸彼而已蓋無非是心之所存也聖人雖無事乎推然其自身以及家自家以及國亦固有序矣張子曰言接神人各得其道也嚴氏曰言文王以昭事神明之德推之齊家治國也雍雍於容反在宫肅肅在廟叶音貌不顯亦臨無射音亦亦保叶音鮑賦也雍雍和之至也肅肅敬之至也不顯幽隱之處也射與斁同厭也嚴氏曰無射如孔子云學不厭如董仲舒云復而不厭之謂道言安行之久也保守也言文王在閨門之內則極其和在宗廟之中則極其敬雖居幽隱亦常若有臨之者雖無厭射亦常有所守焉其純亦不已蓋如是嚴氏曰在宫則和在廟則敬其誠隨所寓而形見也不顯之處人所不見而亦若有所臨洋洋乎如在上也無厭之時踐履已熟而亦目保守悠久無疆也陳少南曰皆文王之誠也吕東萊曰聖人神人之主也如前章所載神人孚格可謂得為主之道矣欲求所以格孚者當於此章觀之熊去非曰此承上章而言雍雍在宫即刑于寡妻以下之事肅肅在廟即惠于宗公以下之事肆戎疾不殄烈假古雅反不瑕不聞亦式不諫亦入此與下章用韻未詳賦也肆故今也戎大也疾猶難也大難如羑里之囚及昆夷玁狁之屬也殄絶烈光假大瑕過此兩句與不殄厥愠不隕厥問相表裏愚按不殄厥愠不隕厥問大王事也文王戎疾不殄烈假不瑕可謂繩其祖武然則不殄厥愠不隕厥問文王之事固在其中矣其後周公遭變孫碩膚而德音不瑕雖其天縱之聖抑亦有得於家庭之訓化歟聞前聞也式法也承上章言文王之德如此故其大難雖不殄絶而光大亦無玷缺吕東萊曰文王之德如上章所陳故雖遭大難而不失其聖光大不缺也雖事之無所前聞者而亦無不合於法度雖無諫諍之者而亦未嘗不入於善傳所謂性與天合是也輔氏曰此章則托其所遭之實事言之如昆夷玁狁之伐羑里之囚皆所謂戎疾也大難之來是亦定數雖聖人有所不能免特處之有道爾故言其大難雖不能殄絶之而使無而在我光大之德終無瑕玷焉此樂天之事非聖人不能也不聞亦式從心所欲不踰矩之事不諫亦入所謂不思不勉從容中道也文王之德至是則無以復加矣李迂仲曰其性德不勉而中不思而得豈待於有所聞有所諌而後中道哉嚴氏曰此章言從容中道也肆成人有德小子有造古之人無斁音亦譽髦斯士賦也冠以上為成人小子童子也造為也古之人指文王也吕東萊曰典謨作於虞夏其稱堯舜禹臯陶已曰稽古則以文王為古之人復何疑哉譽名髦俊也承上章言文王之德見於事者如此劉辰翁曰兩章兩肆皆言其效故一時人材皆得其所成就孔氏曰言長者道德已成幼者有業學習蓋由其德純而不已故令此士皆有譽於天下而成其俊又之美也輔氏曰此章則遂言其德盛而無斁故天下人才無小無大皆有所觀感而䝉其成就是以令其為士者得其名譽於天下而成其俊又之美也以上三詩皆言文王之德之盛而皆及於作成人才之事以是觀之則聖人之德必見於作成一世之人才者然後為至在易觀卦曰觀我生君子無咎象曰觀我生觀民也意蓋如此嚴氏曰此章言至誠為能化也吕東萊曰聖人流澤萬世者莫大於作人所以續天地生生之大德也故此詩以是終焉文王之無斁夫子之誨人不倦其心一也王介甫曰初言太姒則化成乎內也終言譽髦斯士則化成乎天下矣思齊五章二章章六句三章章四句陳夀翁曰文王之聖生之者聖母助之者賢妃然文王固不能不資助於太姒而實能修身以刑于寡妻三四章皆言修身事也未章則不特成已而且能成物矣序文王所以聖也嚴氏曰此詩五章皆言文王所以為聖也皇矣上帝臨下有赫叶黑各反監觀四方求民之莫維此二國其政不獲叶胡郭反維彼四國爰究爰度待洛反上帝耆之憎其式廓乃眷西顧此維與宅叶達各反賦也皇大臨視也赫威明也監亦視也莫定也二國夏商也不獲謂失其道也四國四方之國也究尋度謀也耆憎式廊未詳其義或曰耆致也程子曰頌云耆定爾功毛氏傳曰耆致也愚按耆釋文音鬐集傳疑訓為致則當音指讀如耆定爾功之耆憎當作增式廓猶言規模也輔氏曰式如式樣之式廓如匡廓之廓此謂岐周之地也此詩叙太王太伯王季之德以及文王伐密伐崇之事也愚按一章至四章叙太王太伯王季之德五章至八章則叙文王之德業此其首章先言天之臨下甚明但求民之安定而已彼夏商之政既不得矣故求於四方之國程子曰此泛言天佑下民作之君長使得安定也天惟求民所定故君不善則絶之如彼夏商二國不得其政則於四方之國求謀有德之君使王天下孔氏曰紂既喪殷桀亦亡夏其惡既等故配而言之猶嵩髙之美申伯而及甫侯也苟上帝之所欲致者則增大其疆境之規模於是乃眷然顧視西土以此岐周之地與大王為居宅也輔氏曰皇矣上帝臨下有赫者言天之威明可畏也監觀四方求民之莫者言天之心意所在也夏商之政不得其道則遂舍之而不顧四國之君則於是尋究於是謀度然後豫之而不敢輕易焉大抵天之為道栽培之者難傾覆之者易也作之屏必領反之其菑莊持反其翳一訃反修之平之其灌其栵音例啓之辟婢亦反之其柳丑貞反其椐羌居反叶紀庶反攘之剔它歷反之其檿烏劍反其柘章夜反叶都故反帝遷明德串古患反夷載路天立厥配受命既固賦也作拔起也屏去之也菑木立死者也翳自斃者也孔氏曰立死之木妨他木生長為木之害故曰菑生木自倒枝葉覆地為隂翳故曰翳或曰小木䝉密蔽翳者也修平皆治之使疏密正直得宜也灌叢生者也栵行生者也啓辟芟除也柳河柳也似楊赤色生河邊爾雅注云今河傍赤莖小楊陸機云生水傍皮正赤如絳一名雨師松葉似松椐匱音匱也腫節似扶老可為杖者也陸璣曰節中腫似扶老即今靈夀是也今人以為馬鞭及杖攘剔謂穿剔去其繁冗使成長也檿山桑也與柘皆美材可為弓幹又可蠶也本草曰柘木裏有紋亦可旋為器明德謂明德之君即大王也串夷載路未詳或曰串夷即混夷載路謂滿路而去所謂混夷駾矣者也配賢妃也謂大姜此章言大王遷於岐周之事蓋岐周之地本皆山林險阻無人之竟而近於昆夷大王居之人物漸盛然後漸次開闢如此歐陽子曰此章本周作宅之始岐周之民樂就有德皆共刊除樹木而營理邑居乃上帝遷此明德之君使居其地而昆夷逺遁矣又為之立賢妃以助之是以受命堅固而卒成王業也輔氏曰此章首八句人事也後四句天命也由天命時故人事應由人事治故天命從也菑翳則因其死斃而拔去之灌栵則因其叢列而修治之柳椐凡木則芟除之檿柘美才則攘剔之蓋順理而為之舉此開辟林木一事言之則餘可知矣彭氏曰太王之遷從之者如歸市非人之所能為也必有主宰之者故詩人託辭以為帝遷之帝遷之則天命之蓋帝所以主宰乎天者也書言昭受上帝而後言天其申命用休言帝休而後言天乃大命文王皆此類也帝省息井反其山柞棫斯拔蒲具反松柏斯兌徒外反帝作邦作對自大音泰伯王季維此王季因心則友叶羽已反則友其兄叶虛王反則篤其慶叶祛羊反載錫之光受祿無喪息喪反叶平聲奄有四方賦也拔兌見綿篇此亦言其山林之間道路通也對猶當也作對言擇其可當此國者君君之也大伯大王之長子王季大王之少子也因心非勉强也嚴氏曰李氏云孝弟中道豈可以僞為哉大其心而然耳生而無不知愛其親長而無不知敬其兄本於良知良能豈非因心而然哉善兄弟曰友兄謂大伯也篤厚載則也奄字之義在忽遂之間言帝省其山而見其木拔道通則知民之歸之者益衆矣於是既作之邦又與之賢君以嗣其業蓋自其初生太伯王季之時而已定矣彭氏曰柞棫斯拔松柏斯兌精神氣象見於林木之間有方興未艾之象夫以周之建國既得其地而為君者人得其人皆非人力所能為故詩人又託詞以為帝省帝作蓋有主宰之者也於是太伯見王季生文王又知天命之有在故適吳不反太王沒而國傳於王季及文王而周道大興也太王欲傳位季厯以及昌太伯知之逃之荆蠻於是太王乃立季厯傳國至昌是為文王又曰太王欲立賢子聖孫為其道足以濟天下而非有愛憎之間利欲之私也是以太伯去之而不為狷王李受之而不為貪蓋處君臣父子之變而不失乎中庸此所以為至德也黃勉齊曰太伯知王季之後又有文王之聖必能基成王業從而讓之亦太王之志也是太伯之讓上以繼太王之志下以成王季之業無非為天下之公而不為一身之私也然以太伯而避王季則王季疑於不友故又特言王季所以友其兄者乃因其心之自然而無待於勉强真氏曰王季之友太伯蓋其因心之本然非以其遜已而後友之使太伯未嘗有遜國之事王季所以友之者亦若是而已既受太伯之讓則益修其德以厚周家之慶而與其兄以讓德之光猶曰彰其知人之明不為徒讓耳彭氏曰太伯以天下讓則是詔其慶於王季矣王季乃能篤其慶而有以成其光使太伯讓國之美赫然光顯於後世者王季與之也其德如是故能受天祿而不失至於文武而奄有四方也真氏曰夫王季之友不過盡其事兄之道耳豈有心於求福哉閨門之內敬順休洽固産祥隤祉之基也故厚其慶而錫之光受天之祿而有天下天之報施其亦明矣維此王季帝度待洛反其心貊武伯反其德音其德克明克明克類克長丁丈反克君王如字或于況反此大邦克順克比必里反比毗至反于文王其德靡悔叶虎洧反既受帝祉音恥施以豉反于孫子叶奬里反賦也度能度物制義也貊春秋傳樂記皆作莫謂其莫然清靜也克明能察是非也克類能分善惡也克長教誨不倦也克君賞慶刑威也言其賞不僣故人以為慶刑不濫故人以為威也順慈和遍服也比上下相親也比于至于也悔遺恨也言上帝制王季之心使有尺寸能度義猶言天誘其表使能制義也輔氏曰孟子曰權然後知輕重度然後知長短物皆然心為甚先生解以為人心有本然之權度者蓋謂是也又清靜其德音使無非間之言是以王季之德能此六者嚴氏曰明類是一意長君是一意順比是一意類者明之克君者長之權比者順之積也彭氏曰克長則出於其類也克君則居人上而為之君也王此大邦則可以朝諸侯有天下由小至大其序如此孔氏曰王季君其國耳以其追號為王故以王言之莆田鄭氏曰能為人長能為人君故使之主此大邦又能惠順親比其民人也至於文王而其德尤無遺恨是以既受上帝之福而延及于子孫也嚴氏曰比及文王其德無有可悔人有過則悔恨靡悔則無過從容中道無毫髮之慊也言王季之德傳於文王而益盛故能受天之福而延於孫子也帝謂文王無然畔援于願反無然歆羡餞面反誕先登于岸叶魚戰反密人不恭敢距大邦叶卜攻反侵阮魚宛反徂共音恭王赫斯怒叶暖五反爰整其旅以按音遏徂旅以篤周祜候五反以對于天下叶後五反賦也帝謂文王設為天命文王之詞如下所言也天豈諄諄然命之只是文王要恁地便是理合恁地便是天命之也嚴氏曰天不言以意謂之也必謂之帝謂者言文王之心天實知之也無然猶言不可如此也畔離畔也援攀援也言舍此而取彼也歆欲之動也羡愛慕也言肆情以徇物也吕與叔曰畔援中有所離歆羡外有所慕皆私心也岸道之極至處也密密須氏也姞其入聲姓之國在今寧州阮國名在今涇州徂往也共阮國之地名今涇州之共池是也胡庭芳曰阮共距岐周不逺故云敢距大邦愚按岐周在今鳯翔路岐山縣與今鞏曷路寧州莊浪路涇州皆隸陜西省其旅周師也按遏也徂旅密師之往共者也愚按二旅字所指不同祜福對答也人心有所畔援有所歆羡則溺於人欲之流而不能以自濟文王無是二者故獨能先知先覺以造道之極至蓋天實命之而非人力之所及也彭氏曰登岸喻此心之無所溺也蓋無畔援則中正而不溺於私無歆羡則剛大而不溺於欲故能造道之極也王氏曰人心未嘗不正也有所畔援則不得其正有所歆羡則不得其正無畔援歆羡則使之正其心也輔氏曰用兵行師之際情欲易縱之時而二病不去幾何而不流於窮黷也哉故此章將言文王之征伐而先言文王之無此病也誕先登于岸以涉水為譬也是以密人不恭敢違其命而擅興師旅以侵阮而往至于共則赫怒整兵而往遏其衆以厚周家之福而答天下之心蓋亦因其可怒而怒之初未嘗有所畔援歆羡也吕與叔曰雖赫怒用師皆出於無心也畔援歆羡皆有心者也王介甫曰有所畔援歆羡不得其欲而怒則其怒也私而已文王之怒是乃與民同患而異乎人之私怒也此詩稱文王德處是從無然畔援歆羡上說起後而却說不識不知順帝之則見得文王先有箇工夫此心無一毫之私故見於伐崇伐密皆是道理合著恁地初非聖人之私怒也孟子曰此文王之勇也文王一怒而安天下之民此文王征伐之始也胡庭芳曰此是文王興師之始詩人必原於天之所命以見文王之怒非出於己私也依其在京叶居良反侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池叶徒何反度待洛反其鮮息淺反原居岐之陽在渭之將萬邦之方下民之王賦也依安貌京周京也矢陳鮮善將側方鄉也孔氏曰鄉人嚮望之也言文王安然在周之京而所整之兵既遏密人遂從阮疆而出以侵密嚴氏曰侵自阮疆謂自阮疆而侵密猶春秋書公至自晉密阮接境也愚按春秋書法潛師掠境曰侵聲罪致討曰伐此詩於密言侵於崇言伐固非如春秋書法例然其師既按徂共之衆則密人退歸矣故周師既出阮疆而遂侵之蓋亦出其不意而謂之侵也所陟之岡即為我岡而人無敢陳兵於陵飲水於泉以拒我也嚴氏曰文王以西伯討密之罪豈有一毫畔援之私耶阮不幸而與密為鄰幸而遇文王為伯也伐崇有訊馘伐肆之事而伐密不言者是師次其境而密人即服不待戰也於是相其髙原而徙都焉所謂程邑也輔氏曰文王之兵侵密乃遽曰我陵我阿我泉我池無敢陳其兵飲其水者辭直理正威靈氣焰莫有敵者所謂帝王之道出萬全者也程邑在岐山之南渭水之側為萬邦之所趨向下民之所歸往嚴氏曰文王用心廣大威德暢洽歸者益衆非舊邑所能容故也胡庭芳曰度其鮮原以下即上章以篤周祜以對天下之實事也其字指密而言孔氏曰程邑在岐山之陽是去舊都不逺也愚按文王伐密之後而作程邑亦猶伐崇之後而作豐邑方其伐之討罪而已固未嘗先有作邑之心也自常情觀之必謂貪其土地矣詩人知其心之無私故言伐密伐崇之事皆先以帝命發之其地於漢為扶風安陵今在京兆府咸陽縣愚按即今安西路咸陽縣亦隸陜西省帝謂文王豫懷明德不大聲以色不長丁丈反夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援音爰與爾臨衝以伐崇墉賦也豫設為上帝之自稱也懷眷念也明德文王之明德也以猶與也夏革未詳吕東萊曰此句雖難强通然與不大聲以色立文既同訓詁亦當相類聲以色謂聲音與笑貌夏以革謂侈大與變革也則法也仇方讎國也丘氏曰即崇也兄弟與國也彭氏曰以諸侯之國為兄弟亦未嘗稱王一驗也鉤援鉤梯也所以鉤引上城所謂雲梯者也臨臨車也在上臨下者也衝衝車也從旁衝突者也皆攻城之具也崇國名在今京兆府鄠縣愚按鄠縣即今安西路鄠縣亦隸陕西省墉城也史記崇侯虎譛西伯於紂紂囚西伯於羑里西伯之臣閎天之徒求美女竒物獻馬以獻紂紂乃赦西伯賜之弓矢鈇鉞得專征伐曰譛西伯者崇侯虎也西伯歸三年伐崇侯虎而作豐邑言上帝眷念文王而言其德之深微不暴著其形迹程子曰天謂文王豫懷爾之明德不大其聲色而人化夫聖人之誠感無不通故所過者化所存者神豈暴著其形迹也哉是不發見大其聲色也故曰聲色之於以化民未也吕東萊曰不大聲以色則不事外飾不長夏以革則不縱私意明德之實也愚按明德者文王之德所得乎天之木體也不大不長者文王之心不暴其德之形迹也又能不作聰明以循天理嚴氏曰不識不知不作聰明也天理自然謂之則謂理之不可踰也故又命之以伐崇也詩人稱伐密伐崇事皆以帝謂文王言之若曰此蓋天意云爾吕氏曰此言文王德不形而功無跡與天同體而已雖興兵以伐崇莫非順帝之則而非我也輔氏曰文王之明德上則與天為一下則三分天下有其二可謂至矣然未嘗暴著於聲色之間其所云為但不識不知順帝之則而已此天所以又命之使伐仇方也夫文王之以崇為仇蓋亦天理之當然也嚴氏曰崇侯譛文王而文王伐之疑於報私怨者然虎倡紂為不道乃天人之所共怒文王奉天討罪何容心哉蓋由其心純乎天理故喜怒皆與天合所仇者非私怨所同者非苟合也臨衝間間叶胡員反崇墉言言執訊音信連連攸馘古獲反安安叶於肩反是類是禡馬稼反叶滿補反是致是附叶上聲四方以無侮臨衝茀茀音弗叶分聿反崇墉仡仡魚乞反是伐是肆是絶是忽叶虛屈反四方以無柫叶分聿反賦也間間徐緩也言言髙大也連連屬續狀馘割耳也軍法獲者不服則殺而獻其左耳孔氏曰王藻云聽嚮任左故不服者殺而獻其左耳曰馘罪其不聽命服罪故取其耳以計功也安安不輕暴也類將出師祭上帝也禡至所征之地而祭始造軍法者謂黃帝及蚩尤也考索曰漢書稱髙祖祠黃帝蚩尤於沛庭管仲稱蚩尤作劍㦸史記稱黃帝與蚩尤戰于阪泉豈軍法之興始於此故後世祭之歟致致其至也附使之來附也茀茀强盛貌仡仡堅壯貌肆縱兵也忽滅拂戾也春秋傳曰文王伐崇三旬不降退修教而復伐之因壘而降孔氏曰僖十九年左傳云因壘而降則似兵合不戰此言執馘必嘗戰矣蓋知戰不敵然後乃降言文王伐崇之初緩攻徐戰告祀羣神程子曰暴明其罪告之神明伐而告神明其伐合神明之道也以致附來者而四方無不畏服及終不服則縱兵以滅之而四方無不順從也輔氏曰是致是附仁也是絶是拂義也仁以附之天下畏之而不敢侮仁之至也義以絶之天下從之而不敢拂義之至也非文王與天同德者其孰能之李迂仲曰文王所伐者崇耳而四方之國無不服從以文王之伐當其罪故也夫始攻之緩戰之徐也非力不足也非示之弱也將以致附而全之也愚按此其三旬不降之時乎及其終不下而肆之也則天誅不可以留而罪人不可以不得故也愚按此其復伐之日乎此所謂文王之師也程子曰聖人之伐未有不俟其革心順服者既不服然後攻之也皇矣八章章十二句一章二章言天命大王嚴氏曰首章原天初眷大王之意次章述大王遷岐也愚按兩章稱帝者三稱天者一可見天之所以命大王者矣蓋其始去邠則邠人從之其居于岐則四方歸之民之歸往如此即大王已受天命矣然而求大王之所以得乎天者則以帝遷明德而然也三章四章言天命王季嚴氏曰三章述大伯王季相遜之事為文王張本四章則述王季之德以及文王也愚按三四章內言帝者四可見天之命王季者矣然而王李之所以得乎天者則以其德克明而然也五章六章言天命文王伐密七章八章言天命文王伐崇程子曰文王之伐始於密王功之始也終於崇天下遂無不服王功之成也看來文王只是不伐紂耳其他事亦都做了如伐密勘黎伐崇之類後人因孔子以服事殷一句遂委曲回護文王說教好看殊不知孔子只是說文王不伐紂耳又曰詩自從大王說來如云至于大王實始翦商如文王伐崇一節不是小小侵掠詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉此見大段動衆岐山之下與崇相去自是多少里因甚如此這般處要做文王無意出做事都不得又如說侵自阮疆陟我髙岡我陵我阿我泉我池這看見都自據有其土地這自大段施張了或云紂命文王得專征伐紂不得已授之文王不得已受之橫渠云不以聲色為政不以革命有中國默順帝則而天下歸焉其惟文王乎若如此說恰似內無純臣之義外亦不屬於商這也未必如此只是事勢自是不可已當商之季上下崩頽忽於岐山下突出許多人也是誰當得文王之事惟孟子識之故七篇之中所以告列國之君莫非勉之以王道愚按五章至八章言帝者四而帝之所以命文王者唯拳拳於武功求其所以然者則又以帝之懷具明德也唯其祖父子孫相傳一德是以天之眷命有加而無替及至商罪貫盈而天又命武王誅之天豈私於有周也哉序美周也天監代殷莫若周周世世修德莫若文王經始靈臺叶田飴反經之營之庶民攻之不日成之經始勿亟居力反庶民子來叶六直反賦也經度也靈臺文王所作謂之靈者言具倏然而成如神靈之所為也天子靈臺始此毛氏曰神之精明者稱靈四方而髙曰臺愚按文王之臺其名如此豈至周有天下遂以為天子之臺而諸侯别名觀臺也歟營表攻作也不日不終日也嚴氏曰不多日也亟急也國之有臺所以望氛祲音浸察災祥時觀游節勞佚也吕東萊曰作臺主於望氛祲觀民俗以察天人之意因以疏瀹精神宣節勞佚蓋一弛一張無非事也愚按韻注氛祥氣祲妖氣蓋察災祥則於此望氣節勞佚則於此遊觀皆取其髙明也文王之臺方其經度營表之際而庶民已來作之所以不終日而成也雖文王心恐煩民戒令勿亟而民心樂之如子趨父事不召自來也輔氏曰經始勿亟庶民子來兩句乃申說上四句意陳夀翁曰不欲其急而過於勞者愛民之仁子來而忘其勞者事君大義未有上好仁而下不好義也張南軒曰文王則勿亟庶民則子來君民之相輿如此李迂仲曰速成出於民之意則可出於君之意則不可出於君之意則為勦民出於民之意則見其得民心也𠞰焦上聲嚴氏曰首章述作臺之功孟子曰文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼此之謂也言文王雖用民力而民反歡樂之加以美名也王在靈囿叶音郁麀音憂鹿攸伏麀鹿濯濯直角反白鳥翯翯户角反王在靈沼叶音灼於音於下同牣音刃魚躍賦也靈囿臺之下有囿所以域養禽獸也孔氏曰築墻為界域禽獸在其中麀牝鹿也伏言安其所處不驚擾也劉執中曰鹿易逸王在靈囿徒御非少乃不驚不逸而攸伏也濯濯肥澤貌翯翯潔白貌靈沼囿之中有沼也牣滿也魚滿而躍言多而得其所也曹氏曰鹿自如而不驚鳥翔集而不去魚亦跳躍而自適則文王之時飛潜走伏皆遂其性也嚴氏曰次章言既作臺而遊焉夫車馬羽旄一也有見之而欣欣喜色者有見之而疾首蹙煩者由人心之樂不樂也文王鳥獸魚鱉何以異於人哉特民心樂之耳孟子最善說詩只民樂其有麋鹿魚鱉一語道盡一詩意虡音巨業維樅七凶反賁扶云反鼓維鏞音庸於論廬門反下同鼓鐘於樂音洛辟音璧雍賦也虡植木以懸鐘磬其橫者曰栒筍業栒上大版刻之捷業如鋸齒者也孔氏曰兩端有植木其上有橫木謂直立者為虡謂橫牽者為栒栒上加大版刻版如鋸齒為飾鄭氏曰虡也栒也所以懸鐘鼓也樅業上懸鐘磬處以綵色為崇牙其狀樅樅然者也孔氏曰以綵色為大牙其狀隆然謂之崇牙段氏曰鐘虡飾以裸屬磬虡飾以羽屬器異異虡故也鐘磬之栒皆飾以鱗屬其文若竹之有筍然筍兩端又有璧翣鄭氏謂戴璧垂羽是也蓋簨虡所以架鐘磬崇牙璧翣所以飾筍虡夏后氏飾以龍而無崇牙商飾以崇牙而無璧翣至周則極文而三者具矣此有瞽所以言設業設虡崇牙樹羽也賁大鼓也釋文曰賁亦作鼖長八尺鼓四尺愚按賁鼓身髙八尺而其鼓之面皮所冒者徑四尺也中圍加三之一愚按中圍者謂鼓腹也鼓面徑四尺則其圍十二尺鼓腹之圍加以三之一則其圍十六尺而徑五尺三寸三分寸之一也鏞大鐘也論倫也言得其倫理也黃實夫曰樂之不能已而言之不能盡故曰於論於樂於嘆辭也辟璧通雍澤也辟雍天子之學大射行禮之處也水旋丘如璧以節觀者故曰辟雍天子辟雍始此振鷺之詩曰于彼西雍說者以雍為澤蓋即旋丘之水而其學即所謂澤宫也孟子所謂序者射也則學蓋有以射為主者矣蘇氏引莊周言文王有辟雍之樂則是又以為習樂之所也張子亦曰辟雍古無此名其制蓋始于此及周有天下遂以名天子之學而諸侯不得立焉孔氏曰璧體圓而內有孔此水亦圓而內有地猶璧然以水繞丘所以節約觀者令在外觀也嚴氏曰三章四章皆述辟雍作樂之事文王既逰囿沼遂於辟雍作樂也愚按古之教者固不廢樂而大射之禮亦先用樂作樂於辟雍無可疑者此後兩章自說辟雍作樂之事前兩章自說游觀臺囿之事也於論鼓鐘於樂辟雍鼉徒河反鼓逢逢薄紅反矇音䝉瞍音叟奏公賦也鼉似蜥蜴長丈餘皮可冒鼓逢逢和也埤雅曰夏小正云剝鼉以為鼓其皮堅厚臤以冒鼓故曰鼉鼓鼉鼓非特有取於皮亦其鼓聲逢逢然象鼉之鳴續博物志曰鼉長一丈其聲如鼓有眸子而無見曰矇無眸子曰瞍古者樂師皆以瞽者為之以其善聽而審於音也公事也聞鼉鼓之聲而知矇瞍方奏其事也嚴氏曰申言鐘鼓辟雍之樂詠歎不能已樂之更端曰奏故九成謂之九奏言方奏其事樂之不厭之詞也靈臺四章二章章六句二章章四句東萊吕氏曰前二章樂文王有臺池鳥獸之樂後二章樂文王有鐘鼓之樂也皆述民樂之詞也陳夀翁曰靈臺一詩辟雍之教寓焉臺池鳥獸鐘鼓之樂樂之形也其樂也外辟雍教化道義之樂樂之本也其樂也內民樂其樂蓋至此矣黃實夫曰民樂具有靈臺沼囿而亦樂其有麀鹿魚鱉所謂愛人而及其物也饒氏曰文王未嘗無靈臺靈沼然與民同樂便是天理文王畢竟自朝至于日中昃不遑暇食用咸和萬民人必得所然後有此樂嚴氏曰文王始作靈臺民樂成之其遊於囿沼也又樂其有鳥獸魚鱉其作樂於辟雍也又樂其有鐘鼓之音所謂聞王鼓樂於此欣欣然有喜色也言之不能盡而嗟嘆之不能已則民之愛戴者深矣孔氏曰鄭氏云韓詩說辟雍者天子之學所以教天下春射秋饗尊事三老五更在南方七里之內左氏說天子靈臺在太廟之中壅之以靈沼謂之辟雍皆無明文𤣥按靈臺一篇有靈臺有靈囿有靈沼有辟雍則辟雍及三靈或同處矣序民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉文王作靈臺之時民之歸周也久矣非至此而始附也其曰有靈德者亦非命名之本意吕東萊曰所以謂之靈者不過如孟子之說而已下武維周世有哲王三后在天王配于京叶居良反賦也下義未詳嚴氏曰下武以武為下也或曰字當作文言文王武王實造周也哲王通言大王王季也三后大王王季文王也在天既沒而其精神上與天合也輔氏曰下箇精神字甚有意須深思之王武王也配對也謂繼其位以對三后也京鎬京也陳氏曰哲王之在天則大王王季文王也其在鎬京則武王也在鎬京者足以配彼在天者此章美武王能纘大王王季文王之緒而有天下也王配于京世德作求永言配命成王之孚叶孚尤反賦也言武王能繼先王之德李迂仲曰武王所以配三后者則以惟世德作求故也起而求以繼之也嚴氏曰康誥曰我時其惟殷先哲王德用康人民作求林氏曰作起而求之如敏以求之之求而長言合於天理故能成王者之信於天下也若暫合而遽離暫得而遽失則不足以成其信矣輔氏曰永言配命己解于文王詩此章言武王得以對彼在天三王於鎬京者以其能起求先世之德而繼之此孚字與書所謂作周孚先之孚同夫王者之信豈一朝一夕之所能成哉陳夀翁曰配祖宗而與世德一即配天而與天理一者命原于天而三后亦在天配三后即配天矣配命則必能配三后矣嚴氏曰武王所求者先世之德故能長配天命有天下而傳無窮遂成王者之信也王者之事業莫大於信信則天下心服而王也愚按章內二配字義不同成王之孚下土之式永言孝思孝思維則賦也式則皆法也言武王所以能成王者之信而為四方之法者以其長言孝思而不忘是以其孝可為法耳求其世德而成王之孚孝思之至孰大於是王氏曰武王作求至於成王之孚下土之式則亦惟先人之故繼其志述其事也陳少南曰王者之德著於人而可信者謂之孚存於心而不忘者謂之孝天下皆知法王者之德而不知德之可法者本於聖人之孝愚按武王之孝可為天下之法此所以為達孝所謂德教加于百姓刑于四海此天子之孝是也媚兹一人應侯順德永言孝思昭哉嗣服叶蒲北反賦也媚愛也一人謂武王應如丕應徯志之應侯維服事也言天下之人皆愛戴武王以為天子而所以應之維以順德是武王能長言孝思而明哉其嗣先王之事也嚴氏曰天下媚愛武王而應之以順德謂天下化之也孝者德之順故又言武王永有孝思昭昭然能嗣其先世之事也序所謂能昭先人之功也輔氏曰下武六章下章都疊上章一句說獨四章不然者蓋承上二章三章兩章而言武王既能成王者之信又能使天下以其孝思為法故天下之人皆戴武王而所以應之維是順德焉順德即孝之所感也上以孝感下下以順應焉至此然後再疊上章一句永言孝思說起而又言明乎其嗣先王之事也夫嗣先王之事即是世德作求世德作求昭哉嗣服又皆是孝孝即是順德上以孝感下以順德尤非一朝一夕暫行復輟者之所能致也王晦叔曰武王之順德有於繼志而天下應之則其孝能嗣先王之事者不可掩矣昭茲來許繩其祖武於萬斯年受天之祜候古反賦也昭茲承上句而言茲哉聲相近古蓋通用也昭茲漢碑作昭哉洪氏隸釋兹哉叶韻來後世也許猶所也繩繼武迹也言武王之道昭明如此來世能繼其迹則久荷天祿而不替矣輔氏曰此章又言武王既明乎其繼先王之事則來世亦必能繼先王之迹矣如此則於萬斯年世有哲王永受天祿而不替又不止此四王大王王季文王武王而已也胡庭芳曰集傳釋祖武自來世視武王言之也若然則萬年受祜與下章皆為期望後世之事矣切謂此詩專詠武王也言武王能明其道於來世使繩其先祖之德於萬斯年即詩人期武王夀考之辭受天之祜則祝其福祿之延洪也如是則下章皆詠武王之事矣嚴氏曰承上章昭兹嗣服而言武王繼述之業所以昭昭乎顯著有自來矣由能繩繼其先祖之迹宜其萬年受天之福也愚按集傳以此詩作於成王時故所釋如此然胡氏嚴氏之說似亦通愚亦竊疑此詩作於武王存日也受天之祜四方來賀於萬斯年不遐有佐賦也賀朝賀也周末秦强天子致胙諸侯皆賀黃實夫曰孝弟之至則通于神明光于四海而得萬國之歡心也所以受天之祜四方來賀也愚按事見周顯王二十六年此借引之故朱子初解此下有曰其事則猶此也但秦以力周以德耳遐何通佐助也蓋曰豈不有助乎云爾王晦叔曰受天之福則四方諸侯皆來朝賀雖千萬年相與佐助也輔氏曰豈不有助乎者言天下皆來朝賀于周則豈不有助乎周家也哉陳夀翁曰天且福之人將焉往宜來世之得人與得天相為長久也不徒賀之而尤佐之見人心蕃屏王室之至也下武六章章四句輔氏曰首章言武王能纘大王王季文王之緒而有天下中三章言武王善繼善述之孝又有常永不已之誠故能成王者之信為天下之法以致天下之愛戴如此末兩章又言武王之成效大驗如此則其後世子孫亦將善繼其先人之緒而久受上天之福多得天下之助也陳夀翁曰此詩美武王繼三后於已往開後嗣於方來惟以求世德永孝思而上合天理下孚人心者為之本耳或疑此詩有成王字當為康王以後之詩然考尋文意恐當只如舊說且其文體亦與上下篇血脈通貫非有誤也愚按成王之孚特如酒誥所謂助成王德顯耳非王誦之諡也但朱子以下武之武為武王之諡又疑下字作文蓋以此詩為作於成王時也切疑首句若果以文武並言而下句又指太王王季則是四王皆在天矣未應其下但言三后在天而謂武王對之於鎬京也詳王配于京語意似據武王生時言之且其後並不重出武王之諡而四章又言媚兹一人切意此篇作於武王存日其首章所謂武者但泛言周家之武功耳黃實夫曰中庸言武王纘太王王季文王之緒身不失天下之顯名而此詩言武王得天下亦言其配三后之德故中庸言逹孝而此詩言其孝思中庸言孝者善繼志述事而此詩言孝亦曰成王之孚也序繼文也武王有聖德復受天命能昭先人之功焉下字恐誤說見本篇文王有聲遹伊橘反駿音峻有聲遹求厥寧遹觀厥成文王蒸哉賦也遹義未詳疑與聿同發語詞駿大蒸君也此詩言文王遷豐武王遷鎬之事愚按四章以上言文王遷豐六章以下言武王遷鎬而首章推本之曰文王之有聲也鄭氏曰聲令聞也甚大乎其有聲也蓋以求天下之安寧而觀其成功耳曹氏曰文王之道務在安民而已是以視民如傷吕與叔曰文王征伐皆求所以安民皆觀所以成業之效文王之德如是信乎其克君也哉輔氏曰文王之所以大有聲者本由於征伐而其所以征伐者不過是求天下安寧而欲觀太王王季之功底于成耳此其所以克君也哉蓋已包三章之意文王受命有此武功既伐于崇作邑于豐文王蒸哉賦也伐崇事見皇矣篇作邑徙都也豐即崇國之地在今鄠縣杜陵西南孔氏曰武功非獨伐崇而已所伐邗耆密須昆夷之屬皆是也别言伐崇者以其功最大其伐最後故特言之為作邑張本言功成乃作邑也嚴氏曰文王受天命以討罪不容自已故有此征伐之功最後伐崇威德益著國勢寖盛程邑又不足容乃作豐邑居之誠得人君之道也築城伊淢況域反作豐伊匹匪棘居力反其欲禮記作猶遹追來孝叶許六反或呼侯反王后蒸哉賦也淢成溝也方十里為成成間有溝深廣並去聲各八尺匹稱棘急也王后亦指文王也輔氏曰王王也追稱也后君也本稱也蘇氏曰克崇作豐而王業成故以王后稱之言文王營豐邑之城因舊溝為限而築之其作邑居亦稱其城而不侈大孔氏曰此述作豐之制皆非急成己之所欲也特追先人之志而來致其孝耳輔氏曰作城而限於域作豐而稱其城則其規模本不大也然亦非是文王急於成已之欲而苟作之也特以追先王之志而來致其孝耳陳夀翁曰上章言作豐受命于天此章言作豐追孝于前乃天與前人之心也嚴氏曰此明作豐之心也愚按孝者善繼志善述事者也故文王之孝在於伐崇作豐武王之孝在於成王之孚文王所求乎子即文王所以事父者也故曰父作之子述之王公伊濯直角反維豐之垣音袁四方攸同王后維翰叶胡田反王后蒸哉賦也公功也濯著明也吕與叔曰濯如滌言明白而不昧王之功所以著明者以其能築此豐之垣故爾四方於是來歸而以文王為楨幹也吕與叔曰文王建都邑而天下知所歸往皆倚以為幹王日休曰維豐之垣有形之勢王后維翰無形之勢也豐水東注維禹之績四方攸同皇王維辟皇王蒸哉賦也豐水東北流徑豐邑之東入渭而注于河績功也皇王有天下之號指武王也嚴氏曰皇大也一統天下其事又大辟君也言豐水東注由禹之功董氏曰周之建都豐水正在其傍於是思禹之故續而見周之成功也孔氏曰左傳劉定公見洛水曰美哉禹之功也此亦見豐水而思禹故四方得以來同於此而以武王為君嚴氏曰豐水所以東注于河者是禹之功也四方之所以同歸周者以武王為天下之君也蓋以武王之功配禹皆除害濟民也此武王未作鎬京時也鎬京辟雍自西自東自南自北無思不服叶蒲北反皇王蒸哉賦也鎬京武王所營也在豐水東去豐邑二十五里張子曰周家自后稷居邰公劉居豳太王邑岐而文王則遷于豐至武王又居于鎬愚按先儒謂岐在邰西北無百里邠在岐西北四百餘里豐在岐山東南二百餘里當是時民之歸者日衆其地有不能容不得不遷也劉執中曰武王以諸侯之朝覲四夷之來王非豐邑可容也故作鎬京焉宫秦始皇營朝宫渭南史以為咸陽人多先王之庭小故作之想遷鎬之意亦是如此辟雍說見前篇張子曰靈臺辟雍文王之學也鎬京辟雍武王之學也至此始為天子之學矣無思不服心服也孟子曰天下不心服而王者未之有也此言武王徙居鎬京講學行禮而天下自服也彭氏曰建國君民教學為先故遷鎬而成辟雍劉濟曰都鎬而先建學首善之地教化之原也嚴氏曰四方之服也久矣此言辟雍之化深入其心也四方先言西鎬京在西近者先被其化也繼伐之詩而言教化者見武王德化流行而人心服也輔氏曰見武王得天下以教化為先也務也先生謂以見武王之得天下非以力取之者是考卜維王宅是鎬京叶居良反維龜正叶諸盈反之武王成之武王蒸哉賦也考稽董氏曰卜筮之道必先斷於心故曰考卜維王則王志先定矣其考卜者所以齊衆志也洪範稽疑以汝則從為主宅居正決也成之作邑居也輔氏曰言武王居鎬稽決於龜而成其居邑亦非私意之所為與三章言文王匪棘其欲之意同張子曰此舉諡者追述其事之言也愚按此詩五章六章先稱武王為皇王至此章以後乃舉武王之諡故朱子引橫渠說明此詩為追述武王之事以證其後所論鄭譜之誤爾豐水有芑武王豈不仕鉏里反詒厥孫謀以燕翼子叶奬里反武王蒸哉興也芑草名仕事詒遺燕安翼敬也子成王也鎬京猶在豐水下流故取以起興言豐水猶有芑武王豈無所事乎孔氏曰豐水猶以潤澤生芑菜況武王豈不以澤及後人為事乎詒厥孫謀以燕翼子則武王之事也謀及其孫則子可以無事矣蘇氏曰遺其孫之謀以安後世之敬者王介甫曰雖詒之以謀非翼子亦不能以燕也或曰賦也言豐水之傍生物繁茂武王豈不欲有事於此哉但以欲遺孫謀以安翼子故不得而不遷耳輔氏曰此章兩說雖不同然以遺孫謀安翼子為武王之事則同也第二說雖覺輕快然首句著筒豐水有芑一句畢竟似興體文王有聲八章章五句此詩以武功稱文王至於武王則言皇王維辟無思不服而已蓋文王既造具始則武王續而終之無難也又以見文王之文非不足於武而武王之有天下非以力取之也輔氏曰每章皆言蒸哉以結之者不獨以見其歎美無己之意又以示後世子孫使之知其必如文王武王之為然後於君天下為宜也故其丁寧不一而足耳孔氏曰上四章言文王之事下四章言武王君天下服四方定鎬京安後世之事武問使文王更在十三四年將終事紂乎抑為王牧野之舉乎曰詩中言武功都是文王做來詩載武王武功却少但卒其伐功耳觀文王氣勢如此度必不終竟休了一似果實文王待他黃熟自落下來吕東萊曰此詩未嘗一言及武王伐功何耶蓋創業而詒厥孫謀固非大告武功之前所能致也詩人亦有言其意而略其事者矣不可一體求也愚按允文文王而有此武功則非不足於武也桓桓武王而鎬京辟雍則非不足於文也所謂一張一弛文武之道也序繼伐也武王能廣文王之聲卒其伐功也鄭譜之誤說見本篇愚按其說見下文文王之什十篇六十六章四百一十四句鄭譜此以上為文武時詩以下為成王周公時詩今按文王首句即云文王在上則非文王之詩矣又曰無念爾祖則非武王之詩矣大明有聲并言文武者非一安得為文武之時所作乎蓋正雅皆成王周公以後之詩但此什皆為追述文武之德故譜因此而誤耳詩傳通釋卷十六
